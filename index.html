<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CARENOTE – 내 몸을 기록하는 노트</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    :root {
      /* CARENOTE Design Tokens v2.0 */
      --cn-brand:        #2F6BFF;
      --cn-brand-600:    #1F4FD9;
      --cn-brand-100:    #EAF1FF;
      --cn-ink:          #0B1B3B;
      --cn-ok:           #10B981;
      --cn-ok-100:       #E6FAF4;
      --cn-warn:         #F59E0B;
      --cn-warn-100:     #FFF7E0;
      --cn-danger:       #EF4444;
      --cn-danger-100:   #FFECEC;
      --cn-low:          #8B5CF6;
      --cn-low-100:      #F3EDFF;
      --bg:              #F4F6FB;
      --bg-soft:         #ECF0F8;
      --card-bg:         #FFFFFF;
      --card-border:     #E5EAF2;
      --card-shadow:     0 1px 2px rgba(11,27,59,0.04), 0 4px 16px rgba(11,27,59,0.05);
      --text:            #0B1B3B;
      --text-sub:        #5B6B85;
      --text-mute:       #8C98AD;
      --input-bg:        var(--input-bg);
      --input-border:    #E5EAF2;
      --divider:         #EEF1F6;
      --chart-grid:      rgba(11,27,59,0.08);
      --chart-axis:      #8C98AD;
      --modal-scrim:     rgba(11,27,59,0.55);
      --font-num: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    }
    body.dark {
      --cn-brand:        #5B8CFF;
      --cn-brand-600:    #3A6FE8;
      --cn-brand-100:    #12244A;
      --cn-ink:          #E8EEF9;
      --cn-ok:           #34D399;
      --cn-ok-100:       #06281D;
      --cn-warn:         #FBBF24;
      --cn-warn-100:     #2A1F00;
      --cn-danger:       #FB7185;
      --cn-danger-100:   #2A0B10;
      --cn-low:          #A78BFA;
      --cn-low-100:      var(--cn-low-100);
      --bg:              #000000;
      --bg-soft:         #050507;
      --card-bg:         #0A0A0F;
      --card-border:     #1C1F28;
      --card-shadow:     0 1px 2px rgba(0,0,0,0.6), 0 6px 20px rgba(0,0,0,0.5);
      --text:            #F2F5FA;
      --text-sub:        #A0ABC0;
      --text-mute:       #6B7689;
      --input-bg:        #0D0F15;
      --input-border:    #1C1F28;
      --divider:         #161923;
      --chart-grid:      rgba(255,255,255,0.06);
      --chart-axis:      #6B7689;
      --modal-scrim:     rgba(0,0,0,0.82);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { margin: 0; padding: 0; overflow-x: clip; max-width: 100%; }
    body {
      margin: 0; padding: 0;
      overflow-x: hidden;
      max-width: 100%;
      width: 100%;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      word-break: keep-all;
      transition: background 0.25s, color 0.25s;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
    input, textarea, select { font-family: inherit; font-size: inherit; }
    button { font-family: inherit; }
    .med-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--cn-brand); flex-shrink: 0; }
    .chart-wrap { position: relative; height: 200px; }
    .cn-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      margin-bottom: 18px;
      transition: background 0.25s, border-color 0.25s;
    }
    .cn-divider { border-color: var(--divider); }

    /* ── 다크모드 포괄 오버라이드 ── */
    body.dark input,
    body.dark textarea,
    body.dark select {
      background: var(--input-bg) !important;
      color: var(--text) !important;
      border-color: var(--input-border) !important;
      color-scheme: dark;
    }
    body.dark input::placeholder,
    body.dark textarea::placeholder { color: var(--text-sub) !important; opacity: 1 !important; }

    /* ── 혈압 숫자 입력 — iOS Safari 블랙 배경 방지 ── */
    .bp-num-input {
      background: transparent !important;
      -webkit-appearance: none;
      appearance: none;
      color-scheme: inherit;
    }
    body:not(.dark) .bp-num-input {
      background: transparent !important;
      color-scheme: light;
    }
    body.dark .bp-num-input {
      background: transparent !important;
      color-scheme: dark;
    }

    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr !important; } }

    /* 혈당 입력 스피너 제거 (숫자와 단위 겹침 방지) */
    .bs-num-input::-webkit-inner-spin-button,
    .bs-num-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .bs-num-input { -moz-appearance: textfield; }
  .cn-num, .cn-num * { font-family: var(--font-num) !important; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }

  /* ── Tab Navigation System ── */
  /* 기본: 모바일에서 모든 Card는 숨김. data-current-tab과 매치되는 것만 표시 */
  @media (max-width: 1023px) {
    body[data-current-tab] .cn-card[data-tab]:not([data-tab=""]) { display: none; }
    /* !important 필수: :not() 때문에 숨기는 규칙의 CSS 특이성이 더 높아서 덮어씌워짐 방지 */
    body[data-current-tab="home"]      .cn-card[data-tab="home"]      { display: block !important; }
    body[data-current-tab="record"]    .cn-card[data-tab="record"]    { display: block !important; }
    body[data-current-tab="report"]    .cn-card[data-tab="report"]    { display: block !important; }
    body[data-current-tab="challenge"] .cn-card[data-tab="challenge"] { display: block !important; }
    body[data-current-tab="profile"]   .cn-card[data-tab="profile"]   { display: block !important; }
    /* 모바일에서 RIGHT 컬럼이 별도 보이지 않도록 그리드 단일컬럼 */
    .main-grid { grid-template-columns: 1fr !important; gap: 12px !important; }
    /* 날짜 이동은 기록 탭에서만 의미있게 보이게, 다른 탭에선 전역 표시 유지 OK */
  }
  .cn-tab-only-mobile { display: block; }
  @media (min-width: 1024px) { .cn-tab-only-mobile { display: none; } }
  .cn-tabbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card-bg);
    border-top: 1px solid var(--card-border);
    display: grid; grid-template-columns: repeat(5, 1fr);
    z-index: 100; padding: 6px 0 max(6px, env(safe-area-inset-bottom));
    box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  }
  .cn-tab-btn {
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 4px; color: var(--text-mute);
    font-size: 11px; font-weight: 600; font-family: inherit;
    transition: color 0.15s ease;
  }
  .cn-tab-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .cn-tab-btn.active { color: var(--cn-brand); }
  .cn-tab-btn:hover { color: var(--text); }
  .cn-tab-btn.active:hover { color: var(--cn-brand); }
  body.has-tabbar { padding-bottom: calc(68px + env(safe-area-inset-bottom, 0px)); }
  /* 데스크톱에서는 탭바 숨기고 기존 레이아웃 유지 */
  @media (min-width: 1024px) {
    .cn-tabbar { display: none; }
    body.has-tabbar { padding-bottom: 0; }
    .cn-tab-content { display: block !important; }
    .main-grid { display: grid !important; }
    /* 데스크탑 전용 사이드바 리포트 */
    .cn-sidebar-report { display: block !important; }
    /* 리포트 탭 카드는 데스크탑에서 사이드바로 대체 → 숨김 */
    .cn-report-tab-only { display: none !important; }
  }
  @media (max-width: 1023px) {
    /* 모바일에서 사이드바 리포트 숨김 (탭으로 보임) */
    .cn-sidebar-report { display: none !important; }
    .cn-report-tab-only { display: block; }
    /* 모바일에서 sticky 해제 */
    .cn-sidebar-right { position: static !important; max-height: none !important; overflow-y: visible !important; }
  }
  /* 사이드바 리포트 */
  .cn-sidebar-report { display: block; }
  .cn-sidebar-right { display: block; }
  @media (max-width: 1023px) {
    .main-grid { grid-template-columns: 1fr !important; gap: 10px !important; }
    .main-grid > * { min-width: 0 !important; }
    /* 헤더: 모바일에서 불필요한 요소 숨김 */
    .cn-hdr-user    { display: none !important; }
    .cn-hdr-dark    { display: none !important; }
    .cn-hdr-sub     { display: none !important; }
    .cn-hdr-actions { display: none !important; }
    .cn-hdr-logo    { width: 30px !important; height: 30px !important; }
    .cn-hdr-logo svg { width: 30px !important; height: 30px !important; }
    .cn-hdr-title   { font-size: 16px !important; letter-spacing: 0.3px !important; }
    /* 모바일 좌우 여백 — vw 기반으로 화면 크기에 비례 (3vw = 390px에서 약 12px) */
    .cn-main-pad    { padding: 8px 3vw !important; width: 100% !important; box-sizing: border-box !important; }
    .cn-card        { padding: 14px 3vw !important; border-radius: 12px !important; margin-bottom: 10px !important; min-width: 0 !important; width: 100% !important; box-sizing: border-box !important; }
    /* 탭바 높이 및 safe-area */
    .cn-tabbar {
      padding-bottom: env(safe-area-inset-bottom, 0px);
      height: auto;
    }
  }
  .cn-challenge-card {
    background: linear-gradient(135deg, var(--cn-brand-100), var(--card-bg));
    border: 1px solid var(--cn-brand);
    border-radius: 12px; padding: 10px 14px; margin-bottom: 8px;
  }
  /* 배지 제거됨 */
  .cn-streak-big { font-family: var(--font-num); font-size: 34px; font-weight: 700; color: var(--cn-brand); line-height: 1; letter-spacing: -0.02em; }
  /* 배지 CSS 제거됨 */

  /* ── 대시보드 홈탭 추가 스타일 ── */
  .dash-score-card { background: linear-gradient(135deg, var(--card-bg) 0%, var(--bg-soft) 100%); border: 1px solid var(--card-border); border-radius: 16px; padding: 18px; margin-bottom: 14px; display: flex; align-items: center; gap: 18px; box-shadow: var(--card-shadow); }
  .dash-score-info { flex: 1; }
  .dash-score-title { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 2px; }
  .dash-score-breakdown { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
  .dash-score-row { display: flex; align-items: center; gap: 6px; }
  .dash-score-bar-bg { flex: 1; height: 5px; background: var(--bg-soft); border-radius: 3px; border: 1px solid var(--card-border); overflow: hidden; }
  .dash-score-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .dash-metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .dash-metric-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 13px 14px; box-shadow: var(--card-shadow); display: flex; flex-direction: column; gap: 4px; }
  .dash-metric-label { font-size: 11px; font-weight: 700; color: var(--text-sub); }
  .dash-metric-val { font-size: 22px; font-weight: 900; line-height: 1.1; letter-spacing: -0.5px; }
  .dash-metric-unit { font-size: 11px; color: var(--text-mute); }
  .dash-trend { display: inline-flex; align-items: center; gap: 2px; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
  .dash-trend-up { background: rgba(239,68,68,0.12); color: var(--cn-danger); }
  .dash-trend-dn { background: rgba(16,185,129,0.12); color: var(--cn-ok); }
  .dash-trend-st { background: var(--cn-brand-100); color: var(--cn-brand); }
  .dash-insight-card { background: linear-gradient(135deg, var(--cn-brand-100), var(--bg-soft)); border: 1px solid var(--cn-brand); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .dash-insight-text { font-size: 13px; line-height: 1.7; color: var(--text); }
  .dash-steps-bars { display: flex; align-items: flex-end; gap: 5px; height: 56px; }
  .dash-step-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .dash-step-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height 0.4s; }
  .dash-step-day { font-size: 9px; color: var(--text-mute); }

  /* ── 모바일 탭별 최적화 (max-width: 600px) ── */
  @media (max-width: 600px) {

    /* ─ 홈 탭 ─ */
    .dash-score-card {
      padding: 12px !important;
      gap: 12px !important;
      margin-bottom: 10px !important;
      border-radius: 14px !important;
    }
    .dash-score-breakdown { gap: 4px !important; margin-top: 8px !important; }
    .dash-metric-grid { gap: 8px !important; margin-bottom: 10px !important; }
    .dash-metric-card { padding: 10px 12px !important; border-radius: 10px !important; gap: 3px !important; }
    .dash-metric-val  { font-size: 18px !important; }
    .dash-metric-label { font-size: 10px !important; }
    .dash-metric-unit  { font-size: 10px !important; }
    .dash-insight-card { padding: 10px 12px !important; margin-bottom: 6px !important; border-radius: 10px !important; }
    .dash-insight-text { font-size: 12px !important; line-height: 1.6 !important; }
    .dash-steps-bars   { height: 44px !important; gap: 4px !important; }
    .dash-step-day     { font-size: 8px !important; }

    /* ─ 기록 탭: 혈당 입력 ─ */
    .bs-num-input { font-size: 30px !important; }
    .bs-input-wrap { width: 58px !important; }
    /* ─ 기록 탭: 혈압 입력 ─ */
    .bp-num-input { font-size: 34px !important; background: transparent !important; color-scheme: inherit; -webkit-appearance: none; }
    /* ─ 기록 탭: 혈압 범례 축소 ─ */
    .bp-legend { font-size: 10px !important; gap: 5px !important; margin-bottom: 10px !important; }

    /* ─ 리포트 탭: 차트 높이 줄임 ─ */
    .chart-wrap { height: 160px !important; }

    /* ─ 챌린지 탭 ─ */
    .cn-challenge-card { padding: 10px 12px !important; }
    .cn-streak-big { font-size: 28px !important; }

    /* ─ 공통 카드 헤더·폰트 ─ */
    .cn-card-title, h3 { font-size: 14px !important; }
    .cn-section-title  { font-size: 13px !important; }
  }

  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef, useMemo } = React;

  /* ── 복약 기본 데이터 ─────────────────────────────────── */
  const DEFAULT_MEDS = [
    { slot:'아침 식전',    key:'morn_pre',   color:'var(--cn-brand)', bg:'var(--cn-brand-100)', border:'var(--cn-brand)', icon:'💉',
      items:[{ id:'fiasp_am',      name:'피아스포',           dose:'4단위 주사' }] },
    { slot:'아침 식후 30분', key:'morn_post', color:'var(--cn-ok)', bg:'var(--cn-ok-100)', border:'var(--cn-ok)', icon:'💊',
      items:[{ id:'teneliaam_am', name:'테넬리아앰서방정',   dose:'10/500mg 1정' },
             { id:'thioctacid',   name:'치옥타시드에이취알정', dose:'600mg 1정' }] },
    { slot:'점심 식전',    key:'lunch_pre',  color:'var(--cn-brand)', bg:'var(--cn-brand-100)', border:'var(--cn-brand)', icon:'💉',
      items:[{ id:'fiasp_lunch',   name:'피아스포',           dose:'4단위 주사' }] },
    { slot:'저녁 식전',    key:'din_pre',    color:'var(--cn-brand)', bg:'var(--cn-brand-100)', border:'var(--cn-brand)', icon:'💉',
      items:[{ id:'fiasp_din',     name:'피아스포',           dose:'4단위 주사' }] },
    { slot:'저녁 식후 30분', key:'din_post', color:'var(--cn-ok)', bg:'var(--cn-ok-100)', border:'var(--cn-ok)', icon:'💊',
      items:[{ id:'lipitor',       name:'리피토정',           dose:'10mg 1정' },
             { id:'teneliaam_pm', name:'테넬리아앰서방정',   dose:'10/500mg 1정' },
             { id:'lyrica',        name:'리리카캡슐',         dose:'75mg 1캡슐' }] },
    { slot:'취침 전',      key:'bed',        color:'var(--cn-low)', bg:'var(--cn-low-100)', border:'var(--cn-low)', icon:'💉',
      items:[{ id:'toujeo',        name:'투제오 솔로스타',    dose:'14단위 주사' }] }
  ];
  const genId = () => 'med_' + Math.random().toString(36).slice(2,9);

  const BS_FIELDS = [
    { id:'bs_bf_am', label:'아침 식전',       icon:'🌅', target:'70–130' },
    { id:'bs_af_am', label:'아침 식후 2시간', icon:'☀️',  target:'<180'  },
    { id:'bs_bf_lu', label:'점심 식전',       icon:'🕛', target:'70–130' },
    { id:'bs_af_lu', label:'점심 식후 2시간', icon:'🌤',  target:'<180'  },
    { id:'bs_bf_di', label:'저녁 식전',       icon:'🌆', target:'70–130' },
    { id:'bs_af_di', label:'저녁 식후 2시간', icon:'🌙',  target:'<180'  },
    { id:'bs_bed',   label:'취침 전',         icon:'🌑', target:'100–140'}
  ];

  /* 시간대별 혈당 매핑 윈도우 (애플 건강 연동용) */
  const TIME_WINDOWS = [
    { id:'bs_bf_am', startH:5.5,  endH:8.5  },
    { id:'bs_af_am', startH:9.0,  endH:11.5 },
    { id:'bs_bf_lu', startH:11.0, endH:13.0 },
    { id:'bs_af_lu', startH:13.5, endH:15.5 },
    { id:'bs_bf_di', startH:17.0, endH:19.5 },
    { id:'bs_af_di', startH:20.0, endH:22.0 },
    { id:'bs_bed',   startH:22.0, endH:24.0 }
  ];

  const MEALS = [
    { id:'breakfast', label:'아침 식사', icon:'🌅',
      ph:'예: 현미밥 반공기, 된장국, 두부조림, 나물\n→ 탄수화물 약 45g' },
    { id:'lunch',     label:'점심 식사', icon:'🕛',

      return Array.isArray(raw) ? raw[0] : raw;
    };

    // 1차: 전체 이름으로 검색
    let result = await trySearch(name);
    if (result) return result;

    // 2차: 뒤쪽 제형·용량 접미어 제거 후 재검색
    const stripped = name
      .replace(/\s*(솔로스타|에이취알정|에치알정|이알정|서방형캡슐|서방정|연질캡슐|캡슐|정[0-9]*|주사|주\s*\d*단위|주\b).*$/i, '')
      .trim();
    if (stripped && stripped !== name && stripped.length >= 2) {
      result = await trySearch(stripped);
      if (result) return result;
    }

    // 3차: 앞 4글자(공백 제거)로 검색
    const short = name.replace(/\s+/g, '').slice(0, 4);
    if (short.length >= 3 && short !== stripped.replace(/\s+/g,'')) {
      result = await trySearch(short);
      if (result) return result;
    }

    // 모두 실패 — 주사제 여부 판단해서 메시지 분기
    const isInjectable = /주사|인슐린|솔로스타|단위\s*주|주사제/.test(name);
    if (isInjectable) {
      const err = new Error(`주사제·인슐린은 e약은요 DB 미수록 약품입니다`);
      err.isInjectable = true;
      throw err;
    }
    throw new Error(`식약처 e약은요 DB에서 찾을 수 없는 약품입니다`);
  };

  const genUUID = () => 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16);
  });
  const getOrCreateUserId = () => {
    let id = localStorage.getItem('dm_user_id');
    if (!id) { id = genUUID(); localStorage.setItem('dm_user_id', id); }
    return id;
  };

  /* ── 애플 건강 파싱 (2MB 청크 스트리밍 - 대용량 파일 지원) ── */
  const parseAppleHealthXML = async (getChunks, totalBytes, onProgress) => {
    const glucoseByDay = {};
    const weightByDay  = {};
    const bodyFatByDay = {};
    const bpSysByDay   = {}; // 수축기 혈압
    const bpDiaByDay   = {}; // 이완기 혈압

    const TARGET_KEYS = {
      'HKQuantityTypeIdentifierBloodGlucose':           'glucose',
      'HKQuantityTypeIdentifierBodyMass':                'weight',
      'HKQuantityTypeIdentifierBodyFatPercentage':       'fat',
      'HKQuantityTypeIdentifierBloodPressureSystolic':   'bp_sys',
      'HKQuantityTypeIdentifierBloodPressureDiastolic':  'bp_dia',
    };

    const processRecord = (rec) => {
      let type = null;
      for (const [k, t] of Object.entries(TARGET_KEYS)) {
        if (rec.includes(k)) { type = t; break; }
      }
      if (!type) return;
      const val  = parseFloat((rec.match(/\bvalue="([^"]+)"/) || [])[1]);
      const unit = (rec.match(/\bunit="([^"]+)"/) || [])[1] || '';
      const dm   = rec.match(/\bstartDate="(\d{4}-\d{2}-\d{2})\s+(\d{2}):(\d{2})/);
      if (!dm || isNaN(val)) return;
      const dayKey = dm[1];
      const hour   = parseInt(dm[2]) + parseInt(dm[3]) / 60;
      if (type === 'glucose') {
        const mgdl = unit === 'mmol/L' ? Math.round(val * 18.015) : Math.round(val);
        if (!glucoseByDay[dayKey]) glucoseByDay[dayKey] = [];
        glucoseByDay[dayKey].push({ hour, value: mgdl });
      } else if (type === 'weight') {
        const kg = unit === 'lb' ? Math.round(val * 0.453592 * 10) / 10 : Math.round(val * 10) / 10;
        weightByDay[dayKey] = kg;
      } else if (type === 'fat') {
        bodyFatByDay[dayKey] = val <= 1 ? Math.round(val * 100 * 10) / 10 : Math.round(val * 10) / 10;
      } else if (type === 'bp_sys') {
        // 같은 날 여러 번 측정 시 가장 마지막(hour 기준) 값 사용
        if (!bpSysByDay[dayKey] || hour > bpSysByDay[dayKey].hour)
          bpSysByDay[dayKey] = { hour, value: Math.round(val) };
      } else if (type === 'bp_dia') {
        if (!bpDiaByDay[dayKey] || hour > bpDiaByDay[dayKey].hour)
          bpDiaByDay[dayKey] = { hour, value: Math.round(val) };
      }
    };

    let tail = '';           // 이전 청크에서 잘린 불완전한 레코드
    let bytesProcessed = 0;
    let recCount = 0;

    for await (const chunk of getChunks()) {
      const text = tail + chunk;
      let pos = 0;
      let lastEnd = 0;

      while (true) {
        const recStart = text.indexOf('<Record', pos);
        if (recStart === -1) break;
        const recEnd = text.indexOf('/>', recStart);
        if (recEnd === -1) break; // 청크 경계에서 잘린 레코드 → tail로 보관

        const rec = text.substring(recStart, recEnd + 2);
        if (Object.keys(TARGET_KEYS).some(k => rec.includes(k))) processRecord(rec);
        lastEnd = recEnd + 2;
        pos = lastEnd;
        recCount++;
        // 매 50건마다 브라우저에 양보 (UI 반응성 유지)
        if (recCount % 50 === 0) await new Promise(r => setTimeout(r, 0));
      }

      // 마지막 완전한 레코드 이후 텍스트를 다음 청크로 넘김
      tail = text.substring(lastEnd);
      if (tail.length > 30000) tail = tail.slice(-30000); // 안전장치

      bytesProcessed += chunk.length;
      if (onProgress && totalBytes) {
        onProgress(Math.min(99, Math.round(bytesProcessed / totalBytes * 100)));
      }
    }

    // 수축기/이완기 쌍이 모두 있는 날만 혈압으로 저장
    const bpByDay = {};
    Object.keys(bpSysByDay).forEach(d => {
      if (bpDiaByDay[d]) {
        bpByDay[d] = { sys: String(bpSysByDay[d].value), dia: String(bpDiaByDay[d].value) };
      }
    });

    if (onProgress) onProgress(100);
    return { glucoseByDay, weightByDay, bodyFatByDay, bpByDay };
  };

  /* ── 삼성 헬스 ZIP 파싱 (체중·체지방) ─────────────────── */
  const parseSamsungHealthZip = async (file, onProgress) => {
    if (typeof JSZip === 'undefined') throw new Error('ZIP 라이브러리 로드 실패. 인터넷 연결을 확인해 주세요.');
    onProgress && onProgress('ZIP 압축 해제 중...');
    const zip = await JSZip.loadAsync(file);
    const allFiles = Object.keys(zip.files);

    // 삼성 헬스는 com.samsung.shealth.weight.{timestamp}.csv 형태
    const weightFile = allFiles.find(n => /com\.samsung\.(shealth|health)\.weight/i.test(n) && n.endsWith('.csv'));
    // 혈압 파일: com.samsung.health.blood_pressure.*.csv
    const bpFile = allFiles.find(n => /com\.samsung\.(shealth|health)\.blood_pressure/i.test(n) && n.endsWith('.csv'));

    if (!weightFile && !bpFile) {
      const csvFiles = allFiles.filter(n => n.endsWith('.csv')).slice(0, 8).join('\n');
      throw new Error(`삼성 헬스 체중/혈압 파일을 찾을 수 없어요.\n발견된 CSV 파일:\n${csvFiles || '없음'}\n\n삼성 헬스 → 설정 → 개인 데이터 다운로드에서 내보낸 ZIP인지 확인해 주세요.`);
    }

    const weightByDay  = {};
    const bodyFatByDay = {};
    const bpByDay      = {};

    // ── 체중/체지방 파싱
    if (weightFile) {
      onProgress && onProgress('체중 데이터 분석 중...');
      const csvText = await zip.files[weightFile].async('string');
      const lines = csvText.split('\n').map(l => l.trim()).filter(Boolean);
      const headerIdx = lines.findIndex(l => !l.startsWith('#') && (l.includes('weight') || l.includes('start_time')));
      if (headerIdx >= 0) {
        const headers = lines[headerIdx].split(',').map(h => h.trim().replace(/"/g, ''));
        const iWeight  = headers.findIndex(h => /weight\.weight$|^weight$/i.test(h));
        const iFat     = headers.findIndex(h => /body_fat|fat_percent|fat$/i.test(h));
        const iTime    = headers.findIndex(h => /start_time|create_time|time/i.test(h));
        for (let i = headerIdx + 1; i < lines.length; i++) {
          if (lines[i].startsWith('#')) continue;
          const cols = lines[i].split(',').map(c => c.trim().replace(/"/g, ''));
          if (cols.length < 2) continue;
          const timeStr = iTime >= 0 ? cols[iTime] : '';
          const dayKey  = timeStr ? timeStr.slice(0, 10) : null;
          if (!dayKey || !/^\d{4}-\d{2}-\d{2}$/.test(dayKey)) continue;
          if (iWeight >= 0) {
            const w = parseFloat(cols[iWeight]);
            if (!isNaN(w) && w > 20 && w < 300) weightByDay[dayKey] = w;
          }
          if (iFat >= 0) {
            const f = parseFloat(cols[iFat]);
            if (!isNaN(f) && f > 0)
              bodyFatByDay[dayKey] = f <= 1 ? Math.round(f * 100 * 10) / 10 : Math.round(f * 10) / 10;
          }
        }
      }
    }

    // ── 혈압 파싱
    if (bpFile) {
      onProgress && onProgress('혈압 데이터 분석 중...');
      const bpText = await zip.files[bpFile].async('string');
      const bpLines = bpText.split('\n').map(l => l.trim()).filter(Boolean);
      const bpHdrIdx = bpLines.findIndex(l => !l.startsWith('#') && (l.includes('systolic') || l.includes('diastolic') || l.includes('start_time')));
      if (bpHdrIdx >= 0) {
        const bpHeaders = bpLines[bpHdrIdx].split(',').map(h => h.trim().replace(/"/g,''));
        const iSys  = bpHeaders.findIndex(h => /systolic/i.test(h));
        const iDia  = bpHeaders.findIndex(h => /diastolic/i.test(h));
        const iTime2 = bpHeaders.findIndex(h => /start_time|create_time|time/i.test(h));
        for (let i = bpHdrIdx + 1; i < bpLines.length; i++) {
          if (bpLines[i].startsWith('#')) continue;
          const cols = bpLines[i].split(',').map(c => c.trim().replace(/"/g,''));
          if (cols.length < 2) continue;
          const timeStr = iTime2 >= 0 ? cols[iTime2] : '';
          const dayKey  = timeStr ? timeStr.slice(0, 10) : null;
          if (!dayKey || !/^\d{4}-\d{2}-\d{2}$/.test(dayKey)) continue;
          const sys = iSys >= 0 ? parseInt(cols[iSys]) : NaN;
          const dia = iDia >= 0 ? parseInt(cols[iDia]) : NaN;
          if (!isNaN(sys) && !isNaN(dia) && sys > 50 && dia > 30) {
            bpByDay[dayKey] = { sys: String(sys), dia: String(dia) };
          }
        }
      }
    }

    onProgress && onProgress('완료');
    return { weightByDay, bodyFatByDay, bpByDay };
  };

  const buildDashboardData = ({ glucoseByDay, weightByDay, bodyFatByDay = {}, bpByDay = {} }) => {
    const result = {};
    Object.entries(glucoseByDay).forEach(([day, readings]) => {
      const bs = {};
      TIME_WINDOWS.forEach(w => {
        const inWin = readings.filter(r => r.hour >= w.startH && r.hour < w.endH).map(r => r.value);
        const med = median(inWin);
        if (med) bs[w.id] = String(med);
      });
      if (Object.keys(bs).length) { result[day] = result[day] || emptyDay(); result[day].bs = bs; }
    });
    Object.entries(weightByDay).forEach(([day, weight]) => {
      result[day] = result[day] || emptyDay();
      result[day].weight = String(Math.round(weight * 100) / 100);
    });
    Object.entries(bodyFatByDay).forEach(([day, bodyFat]) => {
      result[day] = result[day] || emptyDay();
      result[day].bodyFat = String(bodyFat);
    });
    Object.entries(bpByDay).forEach(([day, bp]) => {
      result[day] = result[day] || emptyDay();
      result[day].bp = bp;
    });
    return result;
  };

  /* ── LibreView CSV 파싱 ─────────────────────────────────── */
  const parseCSVRow = (line) => {
    const out = []; let inQ = false; let cur = '';
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    out.push(cur.trim());
    return out;
  };

  const parseLVTimestamp = (s) => {
    s = s.replace(/"/g, '').trim();
    // MM-DD-YYYY HH:MM AM/PM (영어/한국어 오전오후)
    let m = s.match(/(\d{1,2})[/-](\d{1,2})[/-](\d{4})\s+(\d{1,2}):(\d{2})\s*(AM|PM|오전|오후)/i);
    if (m) {
      const [,p1,p2,yyyy,hh,min,ap] = m;
      let h = parseInt(hh);
      if (/PM|오후/i.test(ap) && h!==12) h+=12;
      if (/AM|오전/i.test(ap) && h===12) h=0;
      // LibreView는 MM-DD-YYYY 형식
      return { dayKey:`${yyyy}-${String(p1).padStart(2,'0')}-${String(p2).padStart(2,'0')}`, hour:h+parseInt(min)/60 };
    }
    // YYYY-MM-DD HH:MM
    m = s.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{1,2}):(\d{2})/);
    if (m) {
      const [,yyyy,mm,dd,hh,min] = m;
      return { dayKey:`${yyyy}-${mm}-${dd}`, hour:parseInt(hh)+parseInt(min)/60 };
    }
    return null;
  };

  const parseLibreViewCSV = (csvText) => {
    const lines = csvText.split(/\r?\n/);
    let headerIdx = -1;
    for (let i = 0; i < Math.min(lines.length, 20); i++) {
      if (/timestamp|타임스탬프|时间戳|장치.?타임스탬프/i.test(lines[i])) { headerIdx = i; break; }
    }
    if (headerIdx === -1) return null;

    const headers = parseCSVRow(lines[headerIdx]);
    const tsIdx   = headers.findIndex(h => /timestamp|타임스탬프|장치.?타임스탬프/i.test(h));
    const typeIdx = headers.findIndex(h => /record.?type|레코드|기록.?유형/i.test(h));
    const histIdx = headers.findIndex(h => /historic.?glucose|히스토리.*포도당|과거.?혈당/i.test(h));
    const scanIdx = headers.findIndex(h => /scan.?glucose|스캔.*포도당|혈당.?스캔/i.test(h));

    if (tsIdx === -1) return null;

    const glucoseByDay = {};
    for (let i = headerIdx + 1; i < lines.length; i++) {
      const row = parseCSVRow(lines[i]);
      if (row.length <= tsIdx || !row[tsIdx]) continue;
      const recType = (row[typeIdx] || '').replace(/"/g,'').trim();
      if (recType !== '0' && recType !== '1') continue;

      const rawVal = recType === '0'
        ? parseFloat((row[histIdx]||'').replace(/"/g,''))
        : parseFloat((row[scanIdx]||'').replace(/"/g,''));
      if (isNaN(rawVal) || rawVal <= 0) continue;

      const parsed = parseLVTimestamp(row[tsIdx]);
      if (!parsed) continue;
      const { dayKey, hour } = parsed;
      if (!glucoseByDay[dayKey]) glucoseByDay[dayKey] = [];
      glucoseByDay[dayKey].push({ hour, value: Math.round(rawVal) });
    }
    return glucoseByDay;
  };

  /* ── 가져오기 모달 ─────────────────────────────────────── */
  const ImportModal = ({ onClose, onImport }) => {
    const dm = _dm;
    const [tab,     setTab]     = useState('libreview'); // 'apple' | 'android' | 'libreview'
    const [status,  setStatus]  = useState('idle');
    const [preview, setPreview] = useState(null);
    const [errMsg,  setErrMsg]  = useState('');
    const [progress, setProgress] = useState('');
    const fileRef = useRef(null);

    const reset = () => { setStatus('idle'); setErrMsg(''); setPreview(null); };
    const onTabChange = (t) => { setTab(t); reset(); };

    const processFile = async (file) => {
      setStatus('loading'); setErrMsg('');
      try {
        /* ── 안드로이드: 삼성 헬스 ZIP ── */
        if (tab === 'android') {
          const { weightByDay, bodyFatByDay } = await parseSamsungHealthZip(file, (msg) => setProgress(msg));
          const wDays  = Object.keys(weightByDay).length;
          const bfDays = Object.keys(bodyFatByDay).length;
          if (!wDays && !bfDays) throw new Error('체중·체지방 데이터를 찾을 수 없어요.\n삼성 헬스에 체성분 데이터가 있는지 확인해 주세요.');
          const mapped = buildDashboardData({ glucoseByDay:{}, weightByDay, bodyFatByDay });
          setPreview({ mapped, gDays:0, wDays, bfDays, totalReadings:0, source:'android' });
          setStatus('preview');
          return;
        }

        /* ── LibreView CSV ── */
        if (file.name.endsWith('.csv')) {
          setProgress('CSV 파일 분석 중...');
          await new Promise(r => setTimeout(r, 30));
          const csvText = await file.text();
          const glucoseByDay = parseLibreViewCSV(csvText);
          if (!glucoseByDay) throw new Error('LibreView CSV 형식을 인식할 수 없어요.\nlibreview.com에서 내보낸 파일인지 확인해 주세요.');
          const totalDays = Object.keys(glucoseByDay).length;
          const totalReadings = Object.values(glucoseByDay).reduce((a,b)=>a+b.length,0);
          if (!totalDays) throw new Error('혈당 데이터를 찾을 수 없어요. 파일을 다시 확인해 주세요.');
          const mapped = buildDashboardData({ glucoseByDay, weightByDay:{} });
          setPreview({ mapped, gDays:totalDays, wDays:0, totalReadings, source:'libreview' });
          setStatus('preview');
          return;
        }

        /* ── 애플 건강 ZIP / XML (청크 스트리밍) ── */
        const CHUNK_SIZE = 2 * 1024 * 1024;
        let getChunks, totalBytes;

        if (file.name.endsWith('.zip')) {
          setProgress('ZIP 압축 해제 중... (잠시 기다려 주세요)');
          if (typeof JSZip === 'undefined') throw new Error('ZIP 라이브러리 로드 실패. 인터넷 연결을 확인하거나 직접 압축 해제 후 export.xml을 선택해 주세요.');
          const zip = await JSZip.loadAsync(file);
          const allFiles = Object.keys(zip.files);
          const xmlFile = allFiles.find(name =>
            /export\.xml$/i.test(name) && !/cda/i.test(name)
          ) || allFiles.find(name => /\.xml$/i.test(name) && !/cda/i.test(name));
          if (!xmlFile) {
            const found = allFiles.filter(n => !zip.files[n].dir).slice(0,10).join(', ');
            throw new Error(`ZIP 안에서 export.xml을 찾을 수 없어요.\n발견된 파일: ${found || '없음'}`);
          }
          setProgress('XML 추출 중...');
          const xmlBlob = await zip.files[xmlFile].async('blob');
          totalBytes = xmlBlob.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = xmlBlob.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else if (file.name.endsWith('.xml')) {
          totalBytes = file.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = file.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else {
          throw new Error('.csv / .zip / .xml 파일만 지원해요.');
        }

        setProgress('혈당·체중·체지방 데이터 추출 중... 0%');
        const parsed = await parseAppleHealthXML(getChunks, totalBytes, (pct) => {
          setProgress(`데이터 분석 중... ${pct}%`);
        });
        const mapped = buildDashboardData(parsed);

        const gDays  = Object.keys(parsed.glucoseByDay).length;
        const wDays  = Object.keys(parsed.weightByDay).length;
        const bfDays = Object.keys(parsed.bodyFatByDay).length;
        const totalReadings = Object.values(parsed.glucoseByDay).reduce((a,b) => a+b.length, 0);

        if (!gDays && !wDays && !bfDays) throw new Error('혈당, 체중, 체지방 데이터를 찾을 수 없어요.\n리브레2가 애플 건강과 연동되어 있는지 확인해 주세요.');

        setPreview({ mapped, gDays, wDays, bfDays, totalReadings });
        setStatus('preview');
      } catch (e) {
        setErrMsg(e.message || '파일 처리 중 오류가 발생했어요.');
        setStatus('error');
      }
    };

    const confirm = () => { onImport(preview.mapped); setStatus('done'); };

    const isLV      = tab === 'libreview';
    const isAndroid = tab === 'android';
    const accent  = isLV ? 'var(--cn-low)' : isAndroid ? 'var(--cn-ok)' : 'var(--cn-brand)';
    const accentL = isLV ? 'var(--cn-low-100)' : isAndroid ? 'var(--cn-ok-100)' : 'var(--cn-brand-100)';
    const accentB = isLV ? 'var(--cn-low)' : isAndroid ? 'var(--cn-ok)' : 'var(--cn-brand)';

    return (

    const [isSearching, setIsSearching] = useState(false);
    const searchTimer = useRef(null);
    const slotListEndRef = useRef(null);

    // 기본 선택 슬롯
    useEffect(() => {
      if (cfg.length > 0 && !newSlotKey) setNewSlotKey(cfg[0].key);
    }, []);

    const [searchErr, setSearchErr] = useState('');

    const handleNameInput = (val) => {
      setNewName(val);
      setSuggestions([]);
      setSearchErr('');
      clearTimeout(searchTimer.current);
      if (val.trim().length < 2) return;
      searchTimer.current = setTimeout(async () => {
        setIsSearching(true);
        try {
          const res = await fetch(`${EDGE_URL}?q=${encodeURIComponent(val.trim())}`, {
            headers: { 'apikey': SUPA_KEY }
          });
          if (!res.ok) { setSearchErr('❌ 검색 서버 오류 (' + res.status + ')'); setIsSearching(false); return; }
          const data = await res.json();
          if (Array.isArray(data)) {
            setSuggestions(data);
            if (data.length === 0) setSearchErr('검색 결과 없음 — 직접 입력 후 추가하기를 누르세요');
          }
        } catch(e) {
          setSearchErr('❌ 연결 실패: ' + e.message);
        }
        setIsSearching(false);
      }, 400);
    };

    const selectSuggestion = (drug) => {
      setNewName(drug.itemName);
      setSuggestions([]);
      setSearchErr('');
    };

    const addDrugToSlot = () => {
      if (!newName.trim()) { setAddMsg('⚠️ 약 이름을 입력해 주세요.'); setTimeout(()=>setAddMsg(''),2500); return; }
      if (!newSlotKey)     { setAddMsg('⚠️ 시간대를 선택해 주세요.');  setTimeout(()=>setAddMsg(''),2500); return; }
      const id = genId();
      setCfg(c => c.map(s => s.key === newSlotKey
        ? { ...s, items: [...(s.items||[]), { id, name: newName.trim(), dose: newDose, startDate: newStart, endDate: newEnd }] }
        : s));
      const added = newName.trim();
      setNewName(''); setNewDose(''); setNewStart(''); setNewEnd(''); setSuggestions([]);
      setAddMsg('✅ ' + added + ' 추가됐어요!');
      setTimeout(() => setAddMsg(''), 3000);
    };

    // 복약 설정 불러오기 — 4단계 폴백
    // ① 현재 Supabase 계정(authUser.id) → ② localStorage(authUser.id 키)
    // → ③ 예전 기기 UUID(dm_user_id) Supabase → ④ 예전 localStorage 키
    const loadFromCloud = async () => {
      if (!userId) { setLoadMsg('⚠️ 로그인이 필요해요.'); setTimeout(()=>setLoadMsg(''),2500); return; }
      setLoadingCloud(true); setLoadMsg('');
      try {
        // ① 현재 계정 Supabase
        const { data: row } = await supa.from('diabetes_data')
          .select('payload').eq('user_id', userId).eq('date', '_user_settings_').maybeSingle();
        const fromSB = row?.payload?.medsConfig;
        if (fromSB && Array.isArray(fromSB) && fromSB.length > 0) {
          setCfg(JSON.parse(JSON.stringify(fromSB)));
          setLoadMsg('✅ 계정 저장 데이터에서 ' + fromSB.flatMap(s=>(s.items||[])).length + '개 약을 불러왔어요!');
          setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),3500); return;
        }

        // ② 현재 계정 localStorage
        const ls1 = localStorage.getItem(`hcd_meds_config_${userId}`);
        const fromLS1 = ls1 ? JSON.parse(ls1) : null;
        if (fromLS1 && Array.isArray(fromLS1) && fromLS1.length > 0) {
          setCfg(JSON.parse(JSON.stringify(fromLS1)));
          setLoadMsg('✅ 이 기기의 로컬 데이터에서 ' + fromLS1.flatMap(s=>(s.items||[])).length + '개 약을 불러왔어요!');
          setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),3500); return;
        }

        // ③ 예전 UUID 조회 (localStorage dm_user_id + 직접 입력값 모두 시도)
        const legacyId = localStorage.getItem('dm_user_id');
        const candidates = [...new Set([legacyId, legacyInput.trim()].filter(x => x && x !== userId))];
        for (const lid of candidates) {
          const { data: legacyRow } = await supa.from('diabetes_data')
            .select('payload').eq('user_id', lid).eq('date', '_user_settings_').maybeSingle();
          const fromLegacySB = legacyRow?.payload?.medsConfig;
          if (fromLegacySB && Array.isArray(fromLegacySB) && fromLegacySB.length > 0) {
            setCfg(JSON.parse(JSON.stringify(fromLegacySB)));
            // 이 UUID를 기억해 다음번엔 자동으로 찾게 함
            localStorage.setItem('dm_user_id', lid);
            localStorage.setItem('cn_legacy_uid', lid);
            setLoadMsg('✅ 이전 계정 데이터에서 ' + fromLegacySB.flatMap(s=>(s.items||[])).length + '개 약을 불러왔어요! 저장을 눌러 현재 계정에 연결하세요.');
            setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),6000); return;
          }
          // ④ 예전 기기 localStorage 키
          const ls2 = localStorage.getItem(`hcd_meds_config_${lid}`);
          const fromLS2 = ls2 ? JSON.parse(ls2) : null;
          if (fromLS2 && Array.isArray(fromLS2) && fromLS2.length > 0) {
            setCfg(JSON.parse(JSON.stringify(fromLS2)));
            setLoadMsg('✅ 이전 로컬 데이터에서 ' + fromLS2.flatMap(s=>(s.items||[])).length + '개 약을 불러왔어요! 저장을 눌러 현재 계정에 연결하세요.');
            setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),6000); return;
          }
        }

        // ⑤ 최후 수단: Supabase 일별 기록에서 복약 ID 스캔해 복구
        try {
          const { data: allRows } = await supa.from('diabetes_data')
            .select('payload').eq('user_id', userId);
          const medIdSet = new Set();
          (allRows || []).forEach(r => {
            if (r.payload?.meds) Object.keys(r.payload.meds).forEach(id => medIdSet.add(id));
          });
          if (medIdSet.size > 0) {
              const recovered = [{
              slot: '복구된 복약 목록', key: 'recovered_' + Date.now(), icon: '💊',
              ...SLOT_COLORS_DEF[0],
              items: Array.from(medIdSet).map(id => ({ id, name: '약 이름 입력 필요', dose: '', startDate: '', endDate: '' }))
            }];
            setCfg(recovered);
            setLoadMsg('🔍 기록에서 ' + medIdSet.size + '개 복약 항목을 발견했어요! 약 이름을 ✏️로 수정 후 저장하세요.');
            setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),6000); return;
          }
        } catch {}

        setLoadMsg('ℹ️ 저장된 복약 데이터가 없어요. 아래에서 직접 추가해 주세요.');
      } catch(e) {
        setLoadMsg('❌ 불러오기 실패: ' + (e.message||'오류'));
      }
      setLoadingCloud(false);
      setTimeout(()=>setLoadMsg(''), 4000);
    };

    // 편집 시작 시 이름 input 자동 포커스 + 전체 선택
    useEffect(() => {
      if (editingMed && nameInputRef.current) {
        setTimeout(() => {
          nameInputRef.current?.focus();
          nameInputRef.current?.select();
        }, 50);
      }
    }, [editingMed]);

    const updSlotName = (key, val) => setCfg(c => c.map(s => s.key===key ? {...s, slot:val} : s));
    const updSlotIcon = (key, val) => setCfg(c => c.map(s => s.key===key ? {...s, icon:val} : s));
    const updSlotTime = (key, val) => setCfg(c => c.map(s => s.key===key ? {...s, notifTime:val} : s));

    const requestNotifPermission = async () => {
      if (!('Notification' in window)) { alert('이 브라우저는 알림을 지원하지 않아요.'); return; }
      const perm = await Notification.requestPermission();
      if (perm === 'granted') alert('✅ 알림이 허용됐어요! 복약 시간에 알림이 울려요.');
      else alert('알림을 허용해야 복약 알람을 받을 수 있어요.');
    };
    const delSlot = (key) => { if(window.confirm('이 시간대를 삭제할까요?')) setCfg(c => c.filter(s => s.key!==key)); };
    const moveSlot = (key, dir) => setCfg(c => {
      const idx = c.findIndex(s => s.key===key);
      const next = idx + dir;
      if (next < 0 || next >= c.length) return c;
      const arr = [...c];
      [arr[idx], arr[next]] = [arr[next], arr[idx]];
      return arr;
    });
    const addSlot = () => {
      const key = 'slot_' + Date.now();
      const col = SLOT_COLORS_DEF[cfg.length % SLOT_COLORS_DEF.length];
      setCfg(c => [...c, { slot:'새 시간대', key, icon:'💊', items:[], ...col }]);
      setEditingSlot(key);
      setTimeout(() => slotListEndRef.current?.scrollIntoView({ behavior:'smooth', block:'center' }), 150);
    };
    const updMedField = (slotKey, medId, field, val) =>
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items: (s.items||[]).map(m => m.id===medId ? {...m, [field]:val} : m)} : s));
    const delMed = (slotKey, medId) =>
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items: (s.items||[]).filter(m => m.id!==medId)} : s));
    const addMed = (slotKey) => {
      const id = genId();
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items:[...(s.items||[]), {id, name:'', dose:'', startDate:'', endDate:''}]} : s));
      setEditingMed({slotKey, medId:id});
    };
    const reset = () => { if(window.confirm('복약 목록을 전부 삭제할까요?')) setCfg([]); };

    const inpSt = { border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, borderRadius:'6px', padding:'6px 10px', fontSize:'16px', width:'100%', outline:'none' };

    return (
      <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.55)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2000,padding:'16px'}}
           onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div style={{background:'var(--card-bg)',borderRadius:'18px',padding:'20px',maxWidth:'520px',width:'100%',maxHeight:'92vh',overflowY:'auto',boxShadow:'0 24px 80px rgba(0,0,0,0.25)'}}>

          {/* ── 헤더 ── */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
            <div style={{fontSize:'15px',fontWeight:'800',color:'var(--text)'}}>💊 복약 설정</div>
            <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
              <button onClick={loadFromCloud} disabled={loadingCloud}
                style={{background:loadingCloud?'var(--divider)':'var(--cn-brand-100)',border:'1px solid var(--cn-brand)',
                        borderRadius:'8px',padding:'5px 10px',cursor:loadingCloud?'default':'pointer',
                        fontSize:'11px',fontWeight:'700',color:'var(--cn-brand)',whiteSpace:'nowrap'}}>
                {loadingCloud ? '⏳' : '☁️ 불러오기'}
              </button>
              <button onClick={onClose} style={{background:'var(--divider)',border:'none',borderRadius:'8px',width:'32px',height:'32px',cursor:'pointer',fontSize:'14px'}}>✕</button>
            </div>
          </div>

          {/* ── 클라우드 로드 메시지 ── */}
          {loadMsg && (
            <div style={{background: loadMsg.startsWith('✅')||loadMsg.startsWith('🔍')?'var(--cn-ok-100)':loadMsg.startsWith('❌')?'var(--cn-danger-100)':'var(--cn-warn-100)',
                         border:`1px solid ${loadMsg.startsWith('✅')||loadMsg.startsWith('🔍')?'var(--cn-ok)':loadMsg.startsWith('❌')?'var(--cn-danger)':'var(--cn-warn)'}`,
                         borderRadius:'8px',padding:'8px 12px',marginBottom:'10px',fontSize:'13px',fontWeight:'600',
                         color:loadMsg.startsWith('✅')||loadMsg.startsWith('🔍')?'var(--cn-ok)':loadMsg.startsWith('❌')?'var(--cn-danger)':'#92400e'}}>
              {loadMsg}
            </div>
          )}

          {/* ════════════════════════════════════════
              ➕  새 약 추가 패널 (PRIMARY ACTION)
          ════════════════════════════════════════ */}
          <div style={{background:'var(--cn-brand-100)',border:'2px solid var(--cn-brand)',borderRadius:'14px',padding:'16px',marginBottom:'16px'}}>
            <div style={{fontSize:'14px',fontWeight:'800',color:'var(--cn-brand)',marginBottom:'12px'}}>➕ 새 약 추가</div>

            {/* 약 이름 + 자동완성 */}
            <div style={{marginBottom:'8px',position:'relative'}}>
              <div style={{fontSize:'12px',color:'var(--text-sub)',fontWeight:'600',marginBottom:'5px'}}>
                💊 약 이름 <span style={{fontWeight:'400',color:'var(--text-mute)'}}>입력하면 자동 검색</span>
                {isSearching && <span style={{marginLeft:'6px',color:'var(--cn-brand)'}}>🔍</span>}
              </div>
              <input
                value={newName}
                onChange={e => handleNameInput(e.target.value)}
                onKeyDown={e => e.key==='Enter' && addDrugToSlot()}
                placeholder="예: 아스피린, 메트포르민, 리피토…"
                style={{width:'100%',border:'1px solid var(--cn-brand)',borderRadius:'8px',
                        padding:'10px 12px',fontSize:'14px',outline:'none',
                        background:'var(--card-bg)',color:'var(--text)',boxSizing:'border-box'}}/>
              {/* 자동완성 드롭다운 */}
              {suggestions.length > 0 && (
                <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:100,
                             background:'var(--card-bg)',border:'1px solid var(--card-border)',
                             borderRadius:'10px',boxShadow:'0 8px 24px rgba(0,0,0,0.15)',
                             maxHeight:'220px',overflowY:'auto',marginTop:'4px'}}>
                  {suggestions.map((drug, idx) => (
                    <button key={idx}
                      onClick={() => selectSuggestion(drug)}
                      style={{width:'100%',display:'block',padding:'10px 14px',background:'transparent',
                              border:'none',borderBottom: idx < suggestions.length-1 ? '1px solid var(--divider)':'none',
                              cursor:'pointer',textAlign:'left'}}>
                      <div style={{fontSize:'13px',fontWeight:'700',color:'var(--text)'}}>{drug.itemName}</div>
                      {drug.efcyQesitm && (
                        <div style={{fontSize:'11px',color:'var(--text-mute)',marginTop:'2px',
                                     overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          {drug.efcyQesitm.slice(0,60)}
                        </div>
                      )}
                    </button>
                  ))}
                  <div style={{padding:'6px 14px',fontSize:'11px',color:'var(--text-mute)',borderTop:'1px solid var(--divider)'}}>
                    목록에 없으면 직접 입력 후 추가하기 누르세요
                  </div>
                </div>
              )}
              {/* 검색 에러/결과없음 메시지 */}
              {searchErr && suggestions.length === 0 && (
                <div style={{fontSize:'12px',color:'var(--text-mute)',marginTop:'4px',padding:'4px 2px'}}>
                  {searchErr}
                </div>
              )}
            </div>

            {/* 용량 */}
            <div style={{marginBottom:'8px'}}>
              <div style={{fontSize:'12px',color:'var(--text-sub)',fontWeight:'600',marginBottom:'5px'}}>📦 용량</div>
              <input value={newDose} onChange={e=>setNewDose(e.target.value)}
                placeholder="예: 100mg 1정, 500mg 2정"
                style={{width:'100%',border:'1px solid var(--card-border)',borderRadius:'8px',padding:'9px 12px',
                        fontSize:'14px',outline:'none',background:'var(--card-bg)',color:'var(--text)',boxSizing:'border-box'}}/>
            </div>

            {/* 복약 시기 */}
            <div style={{marginBottom:'10px'}}>
              <div style={{fontSize:'12px',color:'var(--text-sub)',fontWeight:'600',marginBottom:'5px'}}>
                📅 복약 시기 <span style={{fontWeight:'400',color:'var(--text-mute)'}}>(미입력 시 항상 표시)</span>
              </div>
              <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                <input type="date" value={newStart} onChange={e=>setNewStart(e.target.value)}
                  style={{flex:1,border:'1px solid var(--card-border)',borderRadius:'8px',padding:'8px',
                          fontSize:'13px',outline:'none',background:'var(--card-bg)',color:'var(--text)'}}/>
                <span style={{color:'var(--text-mute)',fontSize:'13px',flexShrink:0}}>~</span>
                <input type="date" value={newEnd} onChange={e=>setNewEnd(e.target.value)}
                  style={{flex:1,border:'1px solid var(--card-border)',borderRadius:'8px',padding:'8px',
                          fontSize:'13px',outline:'none',background:'var(--card-bg)',color:'var(--text)'}}/>
              </div>
            </div>

            {/* 복약 시간대 */}
            <div style={{marginBottom:'12px'}}>
              <div style={{fontSize:'12px',color:'var(--text-sub)',fontWeight:'600',marginBottom:'6px'}}>⏰ 복약 시간대</div>
              <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                {cfg.map(slot => (
                  <button key={slot.key} onClick={()=>setNewSlotKey(slot.key)}
                    style={{padding:'7px 14px',borderRadius:'20px',fontSize:'13px',fontWeight:'700',cursor:'pointer',
                            border:`2px solid ${newSlotKey===slot.key?slot.color:'var(--card-border)'}`,
                            background:newSlotKey===slot.key?slot.bg:'var(--card-bg)',
                            color:newSlotKey===slot.key?slot.color:'var(--text-sub)'}}>
                    {slot.icon} {slot.slot}
                  </button>
                ))}
              </div>
            </div>

            {/* 피드백 */}
            {addMsg && (
              <div style={{fontSize:'12px',fontWeight:'700',
                           color:addMsg.startsWith('✅')?'var(--cn-ok)':'var(--cn-warn)',
                           marginBottom:'8px',padding:'6px 10px',
                           background:addMsg.startsWith('✅')?'var(--cn-ok-100)':'var(--cn-warn-100)',
                           borderRadius:'8px'}}>
                {addMsg}
              </div>
            )}

            <button onClick={addDrugToSlot}
              style={{width:'100%',padding:'12px',background:'var(--cn-brand)',color:'#fff',border:'none',
                      borderRadius:'10px',cursor:'pointer',fontSize:'15px',fontWeight:'800'}}>
              💊 추가하기
            </button>
          </div>

          {/* ── 현재 복약 목록 ── */}
          <div style={{fontSize:'13px',fontWeight:'700',color:'var(--text-sub)',marginBottom:'8px'}}>📋 현재 복약 목록</div>

          {cfg.map(slot => (
            <div key={slot.key} style={{background:slot.bg,border:`1px solid ${slot.border}`,borderRadius:'12px',padding:'12px 14px',marginBottom:'10px'}}>
              {/* 슬롯 헤더 */}
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}}>
                {editingSlot===slot.key ? (
                  <>
                    <input value={slot.icon} onChange={e=>updSlotIcon(slot.key,e.target.value)}
                      style={{width:'44px',border:'1px solid var(--card-border)',borderRadius:'6px',padding:'4px',fontSize:'14px',textAlign:'center'}}/>
                    <input value={slot.slot} onChange={e=>updSlotName(slot.key,e.target.value)} autoFocus
                      style={{flex:1,border:'1px solid var(--card-border)',borderRadius:'6px',padding:'6px 10px',fontSize:'16px',fontWeight:'700'}}/>
                    <button onClick={()=>setEditingSlot(null)} style={{background:slot.color,color:'#fff',border:'none',borderRadius:'6px',padding:'5px 10px',cursor:'pointer',fontSize:'14px'}}>완료</button>
                  </>
                ) : (
                  <>
                    <span style={{fontSize:'14px'}}>{slot.icon}</span>
                    <span style={{fontSize:'16px',fontWeight:'700',color:slot.color,flex:1}}>{slot.slot}</span>
                    {/* 알람 시간 */}
                    <input type="time" value={slot.notifTime||''} onChange={e=>updSlotTime(slot.key,e.target.value)}
                      title="알람 시간"
                      style={{border:'1px solid var(--card-border)',borderRadius:'6px',padding:'3px 6px',fontSize:'13px',color:'var(--text)',background:'var(--card-bg)',cursor:'pointer',width:'90px'}}/>
                    <button onClick={()=>moveSlot(slot.key,-1)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'13px',color:'var(--text-mute)',padding:'0 2px'}} title="위로">▲</button>
                    <button onClick={()=>moveSlot(slot.key,+1)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'13px',color:'var(--text-mute)',padding:'0 2px'}} title="아래로">▼</button>
                    <button onClick={()=>setEditingSlot(slot.key)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'14px',color:'var(--text-sub)'}}>✏️</button>
                    <button onClick={()=>delSlot(slot.key)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'14px',color:'var(--cn-danger)'}}>🗑️</button>
                  </>
                )}
              </div>

              {(slot.items||[]).length === 0 && (
                <div style={{fontSize:'12px',color:'var(--text-mute)',padding:'4px 0 4px 2px',fontStyle:'italic'}}>등록된 약 없음</div>
              )}

              {/* 약 목록 */}
              {(slot.items||[]).map(med => (
                <div key={med.id} style={{background:'var(--card-bg)',borderRadius:'8px',padding:'8px 10px',marginBottom:'6px',border:'1px solid var(--card-border)'}}>
                  {editingMed?.slotKey===slot.key && editingMed?.medId===med.id ? (
                    <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                      <input ref={nameInputRef} value={med.name}
                        onChange={e=>updMedField(slot.key,med.id,'name',e.target.value)}
                        onFocus={e=>e.target.select()}
                        placeholder="약 이름" style={inpSt}/>
                      <input value={med.dose} onChange={e=>updMedField(slot.key,med.id,'dose',e.target.value)}
                        placeholder="용량 (예: 10mg 1정)" style={inpSt}/>
                      <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                        <div style={{flex:1}}>

              {info && <div style={{ fontSize:'14px', color:'var(--text-sub)', marginTop:'3px' }}>{info.entpName}</div>}
            </div>
            <button onClick={onClose} style={{ background:'var(--divider)', border:'none', borderRadius:'8px', width:'32px', height:'32px', cursor:'pointer', fontSize:'14px', color:'var(--text-sub)', flexShrink:0 }}>✕</button>
          </div>

          {loading && (
            <div style={{ textAlign:'center', padding:'40px 0', color:'var(--text-sub)' }}>
              <div style={{ fontSize:'31px', marginBottom:'10px' }}>🔍</div>
              <div style={{ fontSize:'14px' }}>의약품 정보 검색 중...</div>
            </div>
          )}
          {error && (
            <div style={{ textAlign:'center', padding:'30px 0', color:'var(--text-sub)' }}>
              <div style={{ fontSize:'31px', marginBottom:'10px' }}>{injectable ? '💉' : '🔍'}</div>
              <div style={{ fontSize:'14px', color:dm?'var(--text-mute)':'var(--text-sub)', fontWeight:'600' }}>{error}</div>
              {injectable ? (
                <div style={{ fontSize:'14px', marginTop:'10px', color:'var(--text-sub)', lineHeight:'1.7', background:'var(--input-bg)', borderRadius:'10px', padding:'12px 16px', textAlign:'left' }}>
                  <b>이유:</b> 식약처 e약은요 서비스는 일반 소비자용 경구약 정보를 제공하며,
                  인슐린·주사제 등 전문 주사약은 수록 대상에서 제외됩니다.<br/>
                  <span style={{ color:'var(--cn-brand)' }}>→ 처방전·약사·제조사 자료를 참고하세요.</span>
                </div>
              ) : (
                <div style={{ fontSize:'14px', marginTop:'8px', color:dm?'var(--text-sub)':'var(--text-mute)' }}>
                  약품명 철자를 확인하거나 복약설정에서 이름을 수정해 보세요
                </div>
              )}
            </div>
          )}
          {info && !loading && (
            <div>
              {info.itemName && info.itemName !== medName && (
                <div style={{ background:dm?'var(--cn-brand-100)':'var(--cn-brand-100)', borderRadius:'8px', padding:'8px 12px', fontSize:'14px', color:'var(--cn-brand)', marginBottom:'16px' }}>
                  검색 결과: {info.itemName}
                </div>
              )}
              <Sec icon="✅" label="효능·효과"   content={info.efcyQesitm} />
              <Sec icon="📋" label="용법·용량"   content={info.useMethodQesitm} />
              <Sec icon="⚠️" label="주의사항"    content={info.atpnQesitm} />
              <Sec icon="🚨" label="경고"        content={info.atpnWarnQesitm} />
              <Sec icon="🔄" label="상호작용"    content={info.intrcQesitm} />
              <Sec icon="😣" label="부작용"      content={info.seQesitm} />
              <Sec icon="📦" label="보관법"      content={info.depositMethodQesitm} />
            </div>
          )}
        </div>
      </div>
    );
  };

  /* ── 로그인 / 회원가입 화면 ───────────────────────────── */
  const LoginScreen = () => {
    const dm = _dm;
    const [mode,         setMode]         = useState('login');
    const [email,        setEmail]        = useState('');
    const [emailChecked, setEmailChecked] = useState(null); // null | 'ok' | 'dup'
    const [emailChecking,setEmailChecking]= useState(false);
    const [password,     setPassword]     = useState('');
    const [password2,    setPassword2]    = useState('');
    const [name,         setName]         = useState('');
    const [phone,        setPhone]        = useState('');
    const [signupHeight, setSignupHeight] = useState('');
    const [busy,         setBusy]         = useState(false);
    const [error,        setError]        = useState('');
    const [message,      setMessage]      = useState('');

    // 비밀번호 강도 체크
    const pwChecks = {
      len:     password.length >= 8,
      letter:  /[a-zA-Z]/.test(password),
      number:  /[0-9]/.test(password),
      special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(password),
    };
    const pwStrong = Object.values(pwChecks).every(Boolean);
    const pwMatch  = password === password2 && password2.length > 0;

    // 이메일 중복 확인
    const checkEmail = async () => {
      if (!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
        setError('올바른 이메일 형식을 입력해 주세요.'); return;
      }
      setEmailChecking(true); setEmailChecked(null); setError('');
      // Supabase signUp으로 중복 확인 (실제 가입 없이 오류 메시지로 판단)
      const { error: e } = await supa.auth.signInWithOtp({ email, options: { shouldCreateUser: false } });
      // shouldCreateUser:false → 미가입이면 오류, 가입이면 OTP 발송
      // 더 안전한 방법: cn_profiles에서 이메일 조회
      const { data } = await supa.from('cn_profiles').select('id').eq('email', email).maybeSingle();
      setEmailChecking(false);
      if (data) { setEmailChecked('dup'); setError('이미 가입된 이메일이에요. 로그인해 주세요.'); }
      else       { setEmailChecked('ok'); }
    };

    const handleSubmit = async (e) => {
      e.preventDefault();
      setBusy(true); setError(''); setMessage('');
      try {
        if (mode === 'login') {
          const { error } = await supa.auth.signInWithPassword({ email, password });
          if (error) throw error;
        } else {
          if (!name.trim())   throw new Error('이름을 입력해 주세요.');
          if (!phone.trim())  throw new Error('전화번호를 입력해 주세요.');
          if (emailChecked !== 'ok') throw new Error('이메일 중복 확인을 해 주세요.');
          if (!pwStrong)      throw new Error('비밀번호 조건을 확인해 주세요.');
          if (!pwMatch)       throw new Error('비밀번호가 일치하지 않아요.');
          const { error } = await supa.auth.signUp({
            email, password,
            options: { data: { name: name.trim(), phone: phone.trim(), height: signupHeight || null } }
          });
          if (error) throw error;
          setMessage('✅ 가입 확인 이메일을 보냈어요. 이메일을 확인하고 링크를 클릭해 주세요.');
        }
      } catch(e) {
        const msg = e.message || '오류가 발생했어요.';
        setError(
          msg.includes('Invalid login')      ? '이메일 또는 비밀번호가 올바르지 않아요.' :
          msg.includes('already registered') ? '이미 가입된 이메일이에요. 로그인해 주세요.' :
          msg.includes('Password should')    ? '비밀번호 조건을 확인해 주세요.' : msg
        );
      }
      setBusy(false);
    };

    const handleGoogle = async () => {
      setBusy(true); setError('');
      const { error } = await supa.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + window.location.pathname }
      });
      if (error) { setError(error.message); setBusy(false); }
    };

    const borderCol = dm ? 'var(--card-border)' : 'var(--card-border)';
    const inp = {
      width:'100%', padding:'12px 16px',
      border: `1.5px solid ${borderCol}`,
      borderRadius:'10px', fontSize:'15px', outline:'none',
      fontFamily:'inherit', boxSizing:'border-box',
      background: dm ? 'var(--bg)' : '#fff',
      color: dm ? 'var(--text)' : 'var(--cn-ink)',
      transition:'border-color 0.2s',
    };

    return (
      <div style={{ minHeight:'100vh', position:'relative', overflow:'hidden',
                    background:'linear-gradient(160deg,#060d1a 0%,#0f2244 50%,#0d3068 100%)',
                    display:'flex', alignItems:'center', justifyContent:'center', padding:'20px' }}>

        {/* 배경 장식 원형들 */}
        <div style={{ position:'absolute', top:'-80px', right:'-80px', width:'360px', height:'360px',
                      borderRadius:'50%', background:'rgba(37,99,235,0.12)', pointerEvents:'none' }}/>
        <div style={{ position:'absolute', bottom:'-60px', left:'-60px', width:'280px', height:'280px',
                      borderRadius:'50%', background:'rgba(74,222,128,0.07)', pointerEvents:'none' }}/>
        <div style={{ position:'absolute', top:'40%', left:'5%', width:'120px', height:'120px',
                      borderRadius:'50%', background:'rgba(99,102,241,0.08)', pointerEvents:'none' }}/>

        {/* 카드 */}
        <div style={{ position:'relative', zIndex:1, background: dm ? 'rgba(22,27,34,0.95)' : 'rgba(255,255,255,0.97)',
                      backdropFilter:'blur(20px)', borderRadius:'28px', padding:'40px 36px',
                      maxWidth:'420px', width:'100%',
                      boxShadow: dm ? '0 32px 80px rgba(0,0,0,0.6)' : '0 32px 80px rgba(0,0,0,0.25)',
                      border: dm ? '1px solid rgba(255,255,255,0.07)' : '1px solid rgba(255,255,255,0.8)' }}>

          {/* 로고 영역 */}
          <div style={{ textAlign:'center', marginBottom:'32px' }}>
            <div style={{ display:'inline-flex', alignItems:'center', justifyContent:'center',
                          background:'linear-gradient(135deg,#0f172a,#1e3a5f)',
                          borderRadius:'20px', padding:'14px', marginBottom:'16px',
                          boxShadow:'0 8px 24px rgba(15,23,42,0.4)' }}>
              <CareNoteLogo size={48} />
            </div>
            <div style={{ fontSize:'26px', fontWeight:'900', letterSpacing:'2px',
                          background:'linear-gradient(90deg,var(--cn-brand),var(--cn-ok))',
                          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
                          marginBottom:'6px' }}>CARENOTE</div>
            <div style={{ fontSize:'13px', color: dm ? 'rgba(148,163,184,0.9)' : 'var(--text-sub)',
                          fontWeight:'500', letterSpacing:'0.3px' }}>내 몸을 기록하는 노트</div>
          </div>

          {/* 단축어 데이터 수신 알림 */}
          {(() => {
            try {
              const pending = JSON.parse(localStorage.getItem('cn_pending_patch') || 'null');
              if (pending && pending.patch && (Date.now() - (pending.ts||0)) < 86400000) {
                const p = pending.patch;
                const items = [];
                if (p.steps) items.push(`👟 걸음수 ${Number(p.steps).toLocaleString()}걸음`);
                if (p.cal)   items.push(`🔥 칼로리 ${Number(p.cal).toLocaleString()}kcal`);
                if (p.dist)  items.push(`📍 거리 ${p.dist}km`);
                if (p.weight) items.push(`⚖️ 체중 ${p.weight}kg`);
                if (p.bp?.sys) items.push(`💓 혈압 ${p.bp.sys}/${p.bp.dia}`);
                if (!items.length) return null;
                return (
                  <div style={{ background: dm?'rgba(16,185,129,0.15)':'#ecfdf5', border:'1px solid var(--cn-ok)',
                                borderRadius:'12px', padding:'12px 14px', marginBottom:'20px', textAlign:'center' }}>
                    <div style={{ fontSize:'13px', fontWeight:'700', color:'var(--cn-ok)', marginBottom:'4px' }}>
                      📲 건강 데이터를 받았어요
                    </div>
                    <div style={{ fontSize:'12px', color: dm?'var(--text-sub)':'#065f46' }}>
                      {items.join(' · ')}
                    </div>
                    <div style={{ fontSize:'11px', color:'var(--text-mute)', marginTop:'4px' }}>
                      로그인하면 자동으로 저장됩니다
                    </div>
                  </div>
                );
              }
            } catch {}
            return null;
          })()}

          {/* 탭 */}
          <div style={{ display:'flex', background: dm ? 'rgba(255,255,255,0.06)' : 'var(--divider)',
                        borderRadius:'14px', padding:'4px', marginBottom:'22px' }}>
            {['login','signup'].map(m => (
              <button key={m} onClick={() => { setMode(m); setError(''); setMessage(''); }}
                style={{ flex:1, padding:'10px', border:'none', borderRadius:'11px', cursor:'pointer',
                         fontSize:'14px', fontWeight:'700', transition:'all 0.2s',
                         background: mode===m ? (dm ? '#1e3a5f' : '#fff') : 'transparent',
                         color: mode===m ? (dm ? 'var(--cn-brand)' : '#1d4ed8') : (dm ? 'var(--text-sub)' : 'var(--text-mute)'),
                         boxShadow: mode===m ? (dm ? '0 2px 8px rgba(0,0,0,0.4)' : '0 1px 4px rgba(0,0,0,0.1)') : 'none' }}>
                {m === 'login' ? '🔐 로그인' : '✏️ 회원가입'}
              </button>
            ))}
          </div>

          {/* 에러 / 성공 메시지 */}
          {error   && <div style={{ background:dm?'rgba(127,29,29,0.4)':'var(--cn-danger-100)', border:'1px solid var(--cn-danger)',
                                    color: dm?'var(--cn-danger)':'var(--cn-danger)', borderRadius:'10px',
                                    padding:'10px 14px', fontSize:'14px', marginBottom:'16px' }}>{error}</div>}
          {message && <div style={{ background:dm?'rgba(20,83,45,0.4)':'var(--cn-ok-100)', border:'1px solid var(--cn-ok)',
                                    color: dm?'var(--cn-ok)':'#166534', borderRadius:'10px',
                                    padding:'10px 14px', fontSize:'14px', marginBottom:'16px' }}>{message}</div>}

          {/* 폼 */}
          <form onSubmit={handleSubmit} style={{ display:'flex', flexDirection:'column', gap:'12px' }}>

            {/* 이메일 + 중복확인 */}
            <div style={{ display:'flex', gap:'6px' }}>
              <input type="email" value={email}
                onChange={e=>{ setEmail(e.target.value); setEmailChecked(null); }}
                placeholder="이메일 주소" required
                style={{ ...inp, flex:1,
                  borderColor: emailChecked==='ok' ? 'var(--cn-ok)' : emailChecked==='dup' ? 'var(--cn-danger)' : borderCol }}
                onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                onBlur={e=>e.target.style.borderColor=
                  emailChecked==='ok'?'var(--cn-ok)':emailChecked==='dup'?'var(--cn-danger)':borderCol} />
              {mode==='signup' && (
                <button type="button" onClick={checkEmail} disabled={emailChecking||!email}
                  style={{ padding:'0 14px', border:`1.5px solid ${emailChecked==='ok'?'var(--cn-ok)':emailChecked==='dup'?'var(--cn-danger)':'var(--cn-brand)'}`,
                    borderRadius:'10px', background: emailChecked==='ok'?'var(--cn-ok)':emailChecked==='dup'?'var(--cn-danger)':'var(--cn-brand)',
                    color:'#fff', fontSize:'12px', fontWeight:'700', cursor:'pointer', whiteSpace:'nowrap', fontFamily:'inherit', flexShrink:0 }}>
                  {emailChecking?'확인중…':emailChecked==='ok'?'✓ 사용가능':emailChecked==='dup'?'✗ 중복':'중복확인'}
                </button>
              )}
            </div>

            {/* 비밀번호 */}
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
              placeholder={mode==='signup'?'비밀번호 (8자 이상, 영문+숫자+기호)':'비밀번호'} required style={inp}
              onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
              onBlur={e=>e.target.style.borderColor=borderCol} />

            {/* 비밀번호 강도 표시 (회원가입만) */}
            {mode==='signup' && password.length > 0 && (
              <div style={{ background: dm?'rgba(255,255,255,0.04)':'var(--bg)', border:'1px solid var(--card-border)',
                borderRadius:'10px', padding:'10px 14px', fontSize:'12px', lineHeight:'1.8' }}>
                {[
                  [pwChecks.len,    '8자 이상'],
                  [pwChecks.letter, '영문 포함'],
                  [pwChecks.number, '숫자 포함'],
                  [pwChecks.special,'기호 포함 (!@#$%^&* 등)'],
                ].map(([ok, label]) => (
                  <div key={label} style={{ color: ok?'var(--cn-ok)':'var(--cn-danger)', display:'flex', alignItems:'center', gap:'6px' }}>
                    <span style={{ fontWeight:'700' }}>{ok?'✓':'✗'}</span> {label}
                  </div>
                ))}
              </div>
            )}

            {/* 비밀번호 확인 (회원가입만) */}
            {mode==='signup' && (
              <div>
                <input type="password" value={password2} onChange={e=>setPassword2(e.target.value)}
                  placeholder="비밀번호 확인" required
                  style={{ ...inp, borderColor: password2.length>0?(pwMatch?'var(--cn-ok)':'var(--cn-danger)'):borderCol }}
                  onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                  onBlur={e=>e.target.style.borderColor=password2.length>0?(pwMatch?'var(--cn-ok)':'var(--cn-danger)'):borderCol} />
                {password2.length>0 && (
                  <div style={{ fontSize:'12px', marginTop:'4px', color: pwMatch?'var(--cn-ok)':'var(--cn-danger)', fontWeight:'600' }}>
                    {pwMatch ? '✓ 비밀번호가 일치해요' : '✗ 비밀번호가 일치하지 않아요'}
                  </div>
                )}
              </div>
            )}

            {/* 회원가입 추가 필드 */}
            {mode === 'signup' && (<>
              <input type="text" value={name} onChange={e=>setName(e.target.value)}
                placeholder="이름 (필수)" required style={inp}
                onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                onBlur={e=>e.target.style.borderColor=borderCol} />
              <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)}
                placeholder="전화번호 (필수, 예: 010-1234-5678)" required style={inp}
                onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                onBlur={e=>e.target.style.borderColor=borderCol} />
              <div style={{ position:'relative' }}>
                <input type="number" value={signupHeight} onChange={e=>setSignupHeight(e.target.value)}
                  placeholder="키 (cm) — 선택, BMI 자동계산에 활용" style={{...inp, paddingRight:'46px'}}
                  onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                  onBlur={e=>e.target.style.borderColor=borderCol} />
                <span style={{ position:'absolute', right:'14px', top:'50%', transform:'translateY(-50%)',
                  fontSize:'12px', color:'var(--text-mute)', pointerEvents:'none' }}>cm</span>
              </div>
            </>)}

            <button type="submit" disabled={busy}
              style={{ padding:'13px', border:'none', borderRadius:'12px',
                       fontSize:'15px', fontWeight:'700', cursor: busy?'default':'pointer',
                       background: busy ? 'var(--text-sub)' : 'linear-gradient(135deg,var(--cn-brand-600),var(--cn-brand))',
                       color:'#fff', boxShadow: busy ? 'none' : '0 4px 16px rgba(37,99,235,0.4)',
                       transition:'all 0.2s', marginTop:'4px' }}>
              {busy ? '처리 중...' : mode === 'login' ? '로그인하기' : '가입하기'}
            </button>
          </form>

          {/* 구분선 */}
          <div style={{ display:'flex', alignItems:'center', gap:'12px', margin:'20px 0' }}>
            <div style={{ flex:1, height:'1px', background: dm ? 'rgba(255,255,255,0.1)' : 'var(--card-border)' }}/>
            <span style={{ fontSize:'12px', color: dm ? 'var(--text-sub)' : 'var(--text-mute)', fontWeight:'500' }}>또는</span>
            <div style={{ flex:1, height:'1px', background: dm ? 'rgba(255,255,255,0.1)' : 'var(--card-border)' }}/>
          </div>

          {/* 구글 로그인 */}
          <button onClick={handleGoogle} disabled={busy}
            style={{ width:'100%', padding:'12px 16px',
                     background: dm ? 'rgba(255,255,255,0.05)' : '#fff',
                     border: `1.5px solid ${dm ? 'rgba(255,255,255,0.12)' : 'var(--card-border)'}`,
                     borderRadius:'12px', fontSize:'14px', fontWeight:'600',
                     cursor: busy?'default':'pointer',
                     display:'flex', alignItems:'center', justifyContent:'center', gap:'10px',
                     color: dm ? 'var(--text)' : '#374151', transition:'all 0.2s' }}
            onMouseOver={e=>{ e.currentTarget.style.borderColor='var(--cn-brand)'; e.currentTarget.style.background=dm?'rgba(59,130,246,0.1)':'#f0f7ff'; }}
            onMouseOut={e=>{ e.currentTarget.style.borderColor=dm?'rgba(255,255,255,0.12)':'var(--card-border)'; e.currentTarget.style.background=dm?'rgba(255,255,255,0.05)':'#fff'; }}>
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google 계정으로 계속하기
          </button>

          <div style={{ textAlign:'center', marginTop:'20px', fontSize:'12px', color: dm ? '#334155' : 'var(--text-mute)' }}>
            로그인 시 서비스 이용약관에 동의한 것으로 간주됩니다
          </div>
        </div>
      </div>
    );
  };

  /* ── App ──────────────────────────────────────────────── */

  /* ── 커뮤니티 탭 (챌린지 통합) ── */
  const ChallengeTab = ({ data, date, userId, userEmail, darkMode: dm }) => {
    const _dm = dm;

    // ── 챌린지 stats ──
    const streak = React.useMemo(() => {
      let count = 0, d = date;
      for (let i = 0; i < 365; i++) {
        const dd = data[d];
        if (!dd) break;
        if (!Object.values(dd.bs || {}).some(v => parseInt(v) > 0)) break;
        count++; d = shiftDate(d, -1);
      }
      return count;
    }, [data, date]);

    const last7 = React.useMemo(() => {
      let inRange = 0, total = 0;
      for (let i = 0; i < 7; i++) {
        const d = shiftDate(date, -i);
        const dd = data[d]; if (!dd) continue;
        Object.values(dd.bs || {}).forEach(v => { const n = parseInt(v); if (n > 0) { total++; if (n >= 70 && n <= 140) inRange++; } });
      }
      return { inRange, total, pct: total ? Math.round((inRange / total) * 100) : 0 };
    }, [data, date]);

    const medStreak = React.useMemo(() => {
      let count = 0, d = date;
      for (let i = 0; i < 30; i++) {
        const dd = data[d];
        if (!dd || !dd.meds || !Object.values(dd.meds).some(Boolean)) break;

        {writeErr && <div style={{ background:'var(--cn-danger-100)', border:'1px solid var(--cn-danger)', borderRadius:'8px', padding:'10px 12px', fontSize:'13px', color:'var(--cn-danger)', marginBottom:'12px' }}>{writeErr}</div>}

              <div style={{ fontFamily:'var(--font-num)', fontSize:'22px', fontWeight:'900', color:'var(--cn-ok)' }}>{last7.pct}<span style={{ fontSize:'11px', marginLeft:'2px' }}>%</span></div>
            </div>
