    const allMedIds = useMemo(() => medsConfig.flatMap(s => s.items.map(m => m.id)), [medsConfig]);
    const medDone = allMedIds.filter(id => day.meds[id]).length;
    const medPct  = allMedIds.length ? Math.round((medDone / allMedIds.length) * 100) : 0;
    const bsVals  = Object.values(day.bs).filter(v => parseInt(v) > 0);
    const bsAvg   = bsVals.length ? Math.round(bsVals.reduce((a,b) => a+parseInt(b), 0) / bsVals.length) : null;

    /* Weekly chart */
    const weekData = useMemo(() => Array.from({length:7}, (_,i) => {
      const d = shiftDate(date, i-6);
      const dd = data[d] || emptyDay();
      const vals = Object.values(dd.bs).filter(v => parseInt(v) > 0);
      return { label: fmtDate(d).short, avg: vals.length ? Math.round(vals.reduce((a,b)=>a+parseInt(b),0)/vals.length) : null };
    }), [data, date]);

    useEffect(() => {
      if (!chartRef.current) return;
      if (chartInst.current) { chartInst.current.destroy(); chartInst.current = null; }
      chartInst.current = new Chart(chartRef.current, {
        type: 'line',
        data: {
          labels: weekData.map(d => d.label),
          datasets: [{
            label: '평균 혈당', data: weekData.map(d => d.avg),
            borderColor: 'var(--cn-brand)', backgroundColor: 'rgba(37,99,235,0.08)',
            borderWidth: 2.5, pointBackgroundColor: weekData.map(d => bsColor(d.avg)),
            pointRadius: 5, fill: true, tension: 0.35, spanGaps: true
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend:{display:false}, tooltip:{ callbacks:{ label: c => c.raw ? `${c.raw} mg/dL` : '기록 없음' } } },
          scales: {
            y: { min:50, max:320, grid:{color:'var(--divider)'}, ticks:{font:{size:11}} },
            x: { grid:{display:false}, ticks:{font:{size:11}} }
          }
        }
      });
      return () => { if(chartInst.current){chartInst.current.destroy(); chartInst.current=null;} };
    }, [weekData]);

    const isToday = date === todayStr();

    // 체중 트렌드 (IIFE 없이 미리 계산)
    const _prevDayWt  = data[shiftDate(date, -1)] || emptyDay();
    const _prevW      = parseFloat(_prevDayWt.weight)  || null;
    const _prevBf     = parseFloat(_prevDayWt.bodyFat) || null;
    const _curW       = parseFloat(day.weight)  || null;
    const _curBf      = parseFloat(day.bodyFat) || null;
    const _wDiff      = (_prevW && _curW)  ? _curW  - _prevW  : null;
    const _bfDiff     = (_prevBf && _curBf) ? _curBf - _prevBf : null;
    const _wArrow     = _wDiff  === null ? null : _wDiff  > 0.04 ? '↑' : _wDiff  < -0.04 ? '↓' : '→';
    const _bfArrow    = _bfDiff === null ? null : _bfDiff > 0.04 ? '↑' : _bfDiff < -0.04 ? '↓' : '→';
    const _wArrowClr  = _wDiff  === null ? 'var(--text-mute)' : _wDiff  > 0.04 ? '#ef4444' : _wDiff  < -0.04 ? 'var(--cn-brand)' : 'var(--text-mute)';
    const _bfArrowClr = _bfDiff === null ? 'var(--text-mute)' : _bfDiff > 0.04 ? '#ef4444' : _bfDiff < -0.04 ? 'var(--cn-brand)' : 'var(--text-mute)';

    // 인증 로딩 중
    if (!authReady) return (
      <div style={{ minHeight:'100vh', background:'var(--bg)', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ textAlign:'center', color:'var(--text-sub)' }}>
          <CareNoteLogo size={56} />
          <div style={{ fontSize:'19px', fontWeight:'700', color:'var(--text)', marginTop:'14px' }}>CARENOTE</div>
          <div style={{ fontSize:'14px', marginTop:'6px' }}>로딩 중...</div>
        </div>
      </div>
    );

    // 미인증 → 로그인 화면
    if (!authUser) return <LoginScreen />;

    return (
      <div style={{ minHeight:'100vh', background:'var(--bg)', paddingBottom:'48px' }}>

        {/* ── CARENOTE Header ── */}
        <div style={{ background: darkMode ? 'linear-gradient(135deg,#020617 0%,#0f172a 100%)' : 'linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)', padding:'10px 20px', boxShadow:'0 2px 14px rgba(0,0,0,0.45)', position:'sticky', top:0, zIndex:100 }}>

          {/* ─ 1행: 로고+브랜드 · 날짜 · 유저 ─ */}
          <div style={{ maxWidth:'1140px', margin:'0 auto', display:'flex', alignItems:'center', justifyContent:'space-between', gap:'10px' }}>

            {/* 로고 + 사이트명 + 슬로건 */}
            <div style={{ display:'flex', alignItems:'center', gap:'10px', flexShrink:0 }}>
              <CareNoteLogo size={40} />
              <div>
                <div style={{ fontSize:'19px', fontWeight:'800', color:'#fff', letterSpacing:'0.5px', lineHeight:'1.15' }}>CARENOTE</div>
                <div style={{ fontSize:'11px', color:'rgba(147,197,253,0.8)', fontWeight:'500', letterSpacing:'0.2px', marginTop:'1px' }}>내 몸을 기록하는 노트</div>
              </div>
              <div style={{ marginLeft:'6px', display:'flex', gap:'5px', alignItems:'center' }}>
                {saveStatus==='saving' && <span style={{ fontSize:'12px', color:'rgba(255,255,255,0.6)' }}>저장 중...</span>}
                {saveStatus==='saved'  && <span style={{ fontSize:'12px', color:'var(--cn-ok)' }}>✓ 저장됨</span>}
                {saveStatus==='error'  && <span style={{ fontSize:'12px', color:'var(--cn-danger)' }}>⚠ 저장 실패</span>}
              </div>
            </div>

            {/* 날짜 네비 */}
            <div style={{ display:'flex', alignItems:'center', gap:'8px', flexShrink:0 }}>
              <button onClick={() => setDate(shiftDate(date,-1))} style={navBtnSt}>‹</button>
              <div style={{ textAlign:'center', minWidth:'164px' }}>
                <div style={{ color:'#fff', fontWeight:'700', fontSize:'14px', whiteSpace:'nowrap' }}>{fmtDate(date).full}</div>
                {!isToday && <button onClick={() => setDate(todayStr())} style={{ background:'rgba(255,255,255,0.2)', border:'1px solid rgba(255,255,255,0.35)', color:'#fff', borderRadius:'6px', padding:'2px 8px', fontSize:'12px', cursor:'pointer', marginTop:'2px' }}>오늘로 이동</button>}
              </div>
              <button onClick={() => setDate(shiftDate(date,1))} style={navBtnSt}>›</button>
            </div>

            {/* 다크모드 토글 + 이메일 + 로그아웃 */}
            <div style={{ display:'flex', alignItems:'center', gap:'8px', flexShrink:0 }}>
              {/* 다크모드 토글 */}
              <button onClick={() => { _dm=!_dm; document.body.classList.toggle('dark',_dm); localStorage.setItem('cn_dark',_dm?'1':'0'); setDarkMode(_dm); }}
                title={darkMode ? '라이트 모드로 전환' : '다크 모드로 전환'}
                style={{ background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)', color:'#fff', borderRadius:'20px', padding:'4px 12px', cursor:'pointer', fontSize:'13px', fontWeight:'600', whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:'5px' }}>
                {darkMode ? '☀️ 라이트' : '🌙 다크'}
              </button>
              <div style={{ display:'flex', alignItems:'center', gap:'6px', background:'rgba(0,0,0,0.2)', borderRadius:'8px', padding:'4px 10px' }}>
                <span style={{ fontSize:'12px', color:'rgba(255,255,255,0.8)', maxWidth:'140px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                  {authUser.email}
                </span>
                <button onClick={() => supa.auth.signOut()} style={{ background:'rgba(255,255,255,0.18)', border:'none', color:'#fff', borderRadius:'6px', padding:'3px 8px', cursor:'pointer', fontSize:'12px', fontWeight:'700', whiteSpace:'nowrap' }}>
                  로그아웃
                </button>
              </div>
            </div>
          </div>

          {/* ─ 2행: 복약·혈당 현황 + 기능 버튼 ─ */}
          <div style={{ maxWidth:'1140px', margin:'7px auto 0', display:'flex', alignItems:'center', gap:'8px', flexWrap:'nowrap', borderTop:'1px solid rgba(255,255,255,0.08)', paddingTop:'7px' }}>
            <span style={{ background: medPct===100?'rgba(22,163,74,0.85)':'rgba(255,255,255,0.15)', color:'#fff', borderRadius:'20px', padding:'3px 12px', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap', flexShrink:0 }}>
              💊 {medDone}/{allMedIds.length} 완료
            </span>
            {bsAvg && <span style={{ background: bsColor(bsAvg), color:'#fff', borderRadius:'20px', padding:'3px 12px', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap', flexShrink:0 }}>🩸 {bsAvg} mg/dL · {bsLabel(bsAvg)}</span>}
            <div style={{ flex:1 }} />
            <button onClick={() => setShowMedSettings(true)} style={{ background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)', color:'#fff', borderRadius:'7px', padding:'4px 12px', cursor:'pointer', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap', flexShrink:0 }}>
              ⚙️ 복약설정
            </button>
            <button onClick={() => setShowImport(true)} style={{ background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)', color:'#fff', borderRadius:'7px', padding:'4px 12px', cursor:'pointer', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap', flexShrink:0 }}>
              📱 가져오기
            </button>
            <button onClick={() => setRefreshKey(k => k + 1)} disabled={syncing}
              style={{ background: syncing ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)', color: syncing ? 'rgba(255,255,255,0.45)' : '#fff', borderRadius:'7px', padding:'4px 12px', cursor: syncing ? 'default' : 'pointer', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap', flexShrink:0 }}>
              {syncing ? '⏳ 로딩중...' : '🔄 새로고침'}
            </button>
            {isAdmin && (
              <button onClick={() => setShowAdmin(true)}
                style={{ background:'rgba(255,165,0,0.2)', border:'1px solid rgba(255,165,0,0.4)', color:'#fbbf24', borderRadius:'7px', padding:'4px 12px', cursor:'pointer', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap', flexShrink:0 }}>
                🛠️ 관리자
              </button>
            )}
            {lastImport && <span style={{ fontSize:'12px', color:'rgba(255,255,255,0.45)', whiteSpace:'nowrap', flexShrink:0 }}>마지막: {lastImport}</span>}
          </div>
        </div>

        {/* Banner: 헤더 바로 아래 */}
        <BannerSlot slotId="top" />

        {/* Main */}
        <div style={{ maxWidth:'1140px', margin:'0 auto', padding:'22px 16px' }}>
          <div className="main-grid" style={{ display:'grid', gridTemplateColumns:'1fr 330px', gap:'18px' }}>

            {/* ── LEFT ── */}
            <div>
              {/* 복약 */}
              <Card tab="record">
                <STitle icon="💊" label="오늘의 복약 체크리스트" right={`${medDone}/${allMedIds.length} 완료`} />
                <div style={{ background:'var(--card-border)', borderRadius:'6px', height:'6px', marginBottom:'16px', overflow:'hidden' }}>
                  <div style={{ width:`${medPct}%`, height:'100%', borderRadius:'6px', background:medPct===100?'var(--cn-ok)':'var(--cn-brand)', transition:'width 0.5s ease' }}/>
                </div>
                {medsConfig.length === 0 && (
                  <div style={{ textAlign:'center', padding:'28px 16px', background:'var(--input-bg)', borderRadius:'12px', border:'1.5px dashed var(--card-border)' }}>
                    <div style={{ fontSize:'32px', marginBottom:'10px' }}>💊</div>
                    <div style={{ fontSize:'15px', fontWeight:'700', color:'var(--text)', marginBottom:'6px' }}>복약 정보가 없어요</div>
                    <div style={{ fontSize:'13px', color:'var(--text-sub)', marginBottom:'14px' }}>복용 중인 약을 등록하면 매일 체크할 수 있어요</div>
                    <button onClick={() => setShowMedSettings(true)}
                      style={{ background:'var(--cn-brand)', color:'#fff', border:'none', borderRadius:'8px', padding:'8px 20px', cursor:'pointer', fontSize:'13px', fontWeight:'700' }}>
                      ⚙️ 복약 설정하기
                    </button>
                  </div>
                )}
                {medsConfig.map(slot => {
                  const activeItems = slot.items.filter(med => {
                    if (med.startDate && date < med.startDate) return false;
                    if (med.endDate   && date > med.endDate)   return false;
                    return true;
                  });
                  if (!activeItems.length) return null;
                  return (
                  <div key={slot.key} style={{ background:slot.bg, border:`1px solid ${slot.border}`, borderRadius:'10px', padding:'12px 14px', marginBottom:'10px' }}>
                    <div style={{ fontSize:'16px', fontWeight:'800', color:slot.color, marginBottom:'8px', display:'flex', gap:'6px', alignItems:'center' }}>
                      {slot.icon} {slot.slot}
                    </div>
                    {activeItems.map(med => (
                      <div key={med.id} style={{ display:'flex', alignItems:'center', gap:'10px', padding:'5px 0', borderTop:'1px solid rgba(0,0,0,0.05)' }}>
                        <input type="checkbox" className="med-checkbox" checked={!!day.meds[med.id]} onChange={() => togMed(med.id)} />
                        <label onClick={() => togMed(med.id)} style={{ flex:1, cursor:'pointer' }}>
                          <div style={{ fontSize:'14px', fontWeight:'600', color:day.meds[med.id]?'var(--text-mute)':'var(--cn-ink)', textDecoration:day.meds[med.id]?'line-through':'none', transition:'all 0.2s' }}>{med.name}</div>
                          <div style={{ fontSize:'14px', color:'var(--text-sub)' }}>{med.dose}</div>
                        </label>
                        <button onClick={e => { e.stopPropagation(); setDrugInfoModal(med.name); }} title="약 정보 보기"
                          style={{ background:dm?'var(--cn-brand-100)':'var(--cn-brand-100)', border:'1px solid #bfdbfe', borderRadius:'6px', cursor:'pointer', fontSize:'14px', color:'var(--cn-brand)', padding:'3px 8px', flexShrink:0, fontWeight:'600' }}>약정보</button>
                        {day.meds[med.id] && <span style={{ color:'var(--cn-ok)', fontSize:'14px' }}>✓</span>}
                      </div>
                    ))}
                  </div>
                  );
                })}
              </Card>

              {/* Banner: 복약 체크리스트 아래 */}
              <BannerSlot slotId="after_meds" />

              {/* 혈당 */}
              <Card tab="record">
                <STitle icon="🩸" label="혈당 기록" right="단위: mg/dL" />
                <div style={{ display:'flex', gap:'10px', marginBottom:'14px', flexWrap:'wrap', fontSize:'16px' }}>
                  {[{c:'var(--cn-low)',t:'저혈당 (<70)'},{c:'var(--cn-ok)',t:'정상 (70–140)'},{c:'var(--cn-warn)',t:'주의 (140–180)'},{c:'var(--cn-danger)',t:'높음 (>180)'}].map(l => (
                    <div key={l.t} style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                      <div style={{ width:'9px', height:'9px', borderRadius:'50%', background:l.c }}/>
                      <span style={{ color:'var(--text-sub)' }}>{l.t}</span>
                    </div>
                  ))}
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:'10px' }}>
                  {BS_FIELDS.map(f => {
                    const v = day.bs[f.id] || ''; const c = bsColor(v);
                    return (
                      <div key={f.id} style={{ background:'var(--input-bg)', borderRadius:'12px', padding:'12px 14px', border:v?`2px solid ${c}`:'1px solid var(--card-border)', transition:'border-color 0.2s' }}>
                        <div style={{ fontSize:'13px', color:'var(--text-sub)', marginBottom:'6px' }}>{f.icon} {f.label}</div>
                        {/* 숫자 + 단위 + 배지 — 같은 가로줄, 3자리 고정폭 */}
                        <div style={{ display:'flex', alignItems:'center', gap:'6px', flexWrap:'nowrap' }}>
                          {/* 3자리 기준 고정폭 컨테이너 */}
                          <div style={{ width:'82px', flexShrink:0 }}>
                            <input
                              type="text" inputMode="numeric" pattern="[0-9]*"
                              value={v} onChange={e => { const n = e.target.value.replace(/[^0-9]/g,''); updBS(f.id, n); }}
                              placeholder="---"
                              style={{ width:'100%', border:'none', background:'transparent', fontSize:'40px', fontWeight:'900',
                                color:v?c:'var(--text-mute)', outline:'none', padding:0, lineHeight:1.1, letterSpacing:'-1px',
                                fontVariantNumeric:'tabular-nums' }}
                            />
                          </div>
                          {/* 단위 */}
                          <span style={{ fontSize:'12px', color:'var(--text-sub)', fontWeight:'600', flexShrink:0 }}>mg/dL</span>
                          {/* 상태 배지 또는 목표 */}
                          {v
                            ? <span style={{ background:c, color:'#fff', borderRadius:'20px', padding:'3px 10px', fontSize:'12px', fontWeight:'700', flexShrink:0, whiteSpace:'nowrap' }}>{bsLabel(v)}</span>
                            : <span style={{ fontSize:'11px', color:dm?'var(--text-sub)':'#d1d5db', flexShrink:0, whiteSpace:'nowrap' }}>목표: {f.target}</span>
                          }
                        </div>
                      </div>
                    );
                  })}
                </div>
              </Card>

              {/* Banner: 혈당 입력 아래 */}
              <BannerSlot slotId="after_bs" />

              {/* 혈압 */}
              {(() => {
                const bp  = day.bp || {sys:'',dia:''};
                const sys = parseInt(bp.sys) || 0;
                const dia = parseInt(bp.dia) || 0;
                const hasBP = sys > 0 && dia > 0;

                // 혈압 분류 (대한고혈압학회 기준)
                const bpInfo = (() => {
                  if (!hasBP) return null;
                  if (sys < 120 && dia < 80)  return { label:'정상',       color:'var(--cn-ok)', bg:'var(--cn-ok-100)', border:'var(--cn-ok)' };
                  if (sys < 130 && dia < 80)  return { label:'주의혈압',    color:'#65a30d', bg:'#f7fee7', border:'#bef264' };
                  if (sys < 140 || dia < 90)  return { label:'고혈압 전단계', color:'var(--cn-warn)', bg:'var(--cn-warn-100)', border:'var(--cn-warn)' };
                  if (sys < 160 || dia < 100) return { label:'고혈압 1기',   color:'#ea580c', bg:'#fff7ed', border:'#fdba74' };
                  return                              { label:'고혈압 2기',   color:'var(--cn-danger)', bg:'var(--cn-danger-100)', border:'var(--cn-danger)' };
                })();

                // 최근 7일 혈압 추이
                const bpWeek = Array.from({length:7}, (_,i) => {
                  const d  = shiftDate(date, i-6);
                  const dd = data[d] || emptyDay();
                  return { label: fmtDate(d).short, sys: parseInt(dd.bp?.sys)||null, dia: parseInt(dd.bp?.dia)||null };
                });
                const hasBPWeek = bpWeek.some(x => x.sys);

                return (
                  <Card tab="record">
                    <STitle icon="💓" label="혈압 기록" />

                    {/* 분류 기준 범례 */}
                    <div style={{ display:'flex', gap:'8px', marginBottom:'14px', flexWrap:'wrap', fontSize:'12px' }}>
                      {[
                        { c:'var(--cn-ok)', t:'정상 (<120/80)' },
                        { c:'#65a30d', t:'주의 (120–129/~80)' },
                        { c:'var(--cn-warn)', t:'전단계 (130–139/80–89)' },
                        { c:'#ea580c', t:'1기 (140–159/90–99)' },
                        { c:'var(--cn-danger)', t:'2기 (≥160/≥100)' },
                      ].map(l => (
                        <div key={l.t} style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                          <div style={{ width:'8px', height:'8px', borderRadius:'50%', background:l.c }}/>
                          <span style={{ color:'var(--text-sub)' }}>{l.t}</span>
                        </div>
                      ))}
                    </div>

                    {/* 입력 영역 */}
                    <div style={{ background:hasBP&&bpInfo ? bpInfo.bg : 'var(--input-bg)', borderRadius:'14px', padding:'16px 18px', border: hasBP&&bpInfo ? `2px solid ${bpInfo.border}` : '1px solid var(--card-border)', transition:'all 0.2s', marginBottom:'14px' }}>
                      <div style={{ display:'flex', alignItems:'center', gap:'12px', flexWrap:'wrap' }}>

                        {/* 수축기 */}
                        <div style={{ display:'flex', flexDirection:'column', alignItems:'center' }}>
                          <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'4px', fontWeight:'600' }}>수축기 (최고)</div>
                          <div style={{ display:'flex', alignItems:'baseline', gap:'4px' }}>
                            <input
                              type="text" inputMode="numeric" pattern="[0-9]*"
                              value={bp.sys} onChange={e => updBP('sys', e.target.value.replace(/[^0-9]/g,''))}
                              placeholder="---"
                              size={bp.sys ? Math.max(2, bp.sys.length) : 3}
                              style={{ width:'auto', border:'none', background:'transparent', fontSize:'44px', fontWeight:'900',
                                color: hasBP&&bpInfo ? bpInfo.color : 'var(--text-mute)', outline:'none', padding:0, lineHeight:1.1, letterSpacing:'-1px' }}
                            />
                            <span style={{ fontSize:'13px', color:'var(--text-sub)', fontWeight:'500' }}>mmHg</span>
                          </div>
                        </div>

                        {/* 구분 슬래시 */}
                        <div style={{ fontSize:'40px', color:'var(--card-border)', fontWeight:'300', lineHeight:1, alignSelf:'center', marginTop:'16px' }}>/</div>

                        {/* 이완기 */}
                        <div style={{ display:'flex', flexDirection:'column', alignItems:'center' }}>
                          <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'4px', fontWeight:'600' }}>이완기 (최저)</div>
                          <div style={{ display:'flex', alignItems:'baseline', gap:'4px' }}>
                            <input
                              type="text" inputMode="numeric" pattern="[0-9]*"
                              value={bp.dia} onChange={e => updBP('dia', e.target.value.replace(/[^0-9]/g,''))}
                              placeholder="---"
                              size={bp.dia ? Math.max(2, bp.dia.length) : 3}
                              style={{ width:'auto', border:'none', background:'transparent', fontSize:'44px', fontWeight:'900',
                                color: hasBP&&bpInfo ? bpInfo.color : 'var(--text-mute)', outline:'none', padding:0, lineHeight:1.1, letterSpacing:'-1px' }}
                            />
                            <span style={{ fontSize:'13px', color:'var(--text-sub)', fontWeight:'500' }}>mmHg</span>
                          </div>
                        </div>

                        {/* 상태 배지 */}
                        {hasBP && bpInfo && (
                          <div style={{ marginLeft:'auto', display:'flex', flexDirection:'column', alignItems:'center', gap:'4px' }}>
                            <span style={{ background:bpInfo.color, color:'#fff', borderRadius:'20px', padding:'4px 14px', fontSize:'13px', fontWeight:'800', whiteSpace:'nowrap' }}>{bpInfo.label}</span>
                            <span style={{ fontSize:'11px', color:'var(--text-sub)', whiteSpace:'nowrap' }}>{sys}/{dia} mmHg</span>
                          </div>
                        )}
                      </div>
                    </div>

                    {/* 건강앱 가져오기 */}
                    <div style={{ marginBottom:'14px' }}>
                      <div style={{ fontSize:'12px', fontWeight:'700', color:'var(--text-sub)', marginBottom:'6px' }}>📲 건강앱에서 혈압 가져오기</div>
                      <div style={{ display:'flex', gap:'8px', flexWrap:'wrap' }}>
                        {/* iOS */}
                        <button onClick={() => weightFileRef.current?.click()} disabled={weightImporting || androidImporting}
                          style={{ flex:1, minWidth:'130px', display:'flex', alignItems:'center', justifyContent:'center', gap:'6px',
                            background:dm?'var(--cn-brand-100)':'var(--cn-brand-100)', border:'1px solid var(--cn-brand)', borderRadius:'10px',
                            padding:'9px 12px', cursor:'pointer', color:'var(--cn-brand)', fontWeight:'700', fontSize:'13px',
                            opacity:(weightImporting||androidImporting)?0.6:1 }}>
                          <span style={{ fontSize:'16px' }}></span> iOS 건강앱
                        </button>
                        {/* Android */}
                        <button onClick={() => androidFileRef.current?.click()} disabled={weightImporting || androidImporting}
                          style={{ flex:1, minWidth:'130px', display:'flex', alignItems:'center', justifyContent:'center', gap:'6px',
                            background:dm?'var(--cn-ok-100)':'var(--cn-ok-100)', border:'1px solid var(--cn-ok)', borderRadius:'10px',
                            padding:'9px 12px', cursor:'pointer', color:'var(--cn-ok)', fontWeight:'700', fontSize:'13px',
                            opacity:(weightImporting||androidImporting)?0.6:1 }}>
                          <span style={{ fontSize:'16px' }}>🤖</span> 삼성 헬스
                        </button>
                      </div>
                      {weightImporting  && <div style={{ fontSize:'12px', color:'var(--cn-brand)', marginTop:'6px', fontWeight:'600' }}>⏳ {weightImportMsg}</div>}
                      {androidImporting && <div style={{ fontSize:'12px', color:'var(--cn-ok)', marginTop:'6px', fontWeight:'600' }}>⏳ {androidImportMsg}</div>}
                      {!weightImporting  && weightImportMsg  && <div style={{ fontSize:'12px', color: weightImportMsg.startsWith('✅')?'var(--cn-ok)':'var(--cn-danger)', marginTop:'6px', fontWeight:'600' }}>{weightImportMsg}</div>}
                      {!androidImporting && androidImportMsg && <div style={{ fontSize:'12px', color: androidImportMsg.startsWith('✅')?'var(--cn-ok)':'var(--cn-danger)', marginTop:'6px', fontWeight:'600' }}>{androidImportMsg}</div>}
                      <div style={{ fontSize:'11px', color:'var(--text-sub)', marginTop:'5px' }}>
                        iOS: 건강앱 → 내보내기 .zip · Android: 삼성 헬스 → 설정 → 개인 데이터 다운로드 .zip
                      </div>
                    </div>

                    {/* 7일 추이 */}
                    {hasBPWeek && (() => {
                      const sysVals = bpWeek.filter(x => x.sys).map(x => x.sys);
                      const diaVals = bpWeek.filter(x => x.dia).map(x => x.dia);
                      const minV = Math.min(...diaVals, 60) - 5;
                      const maxV = Math.max(...sysVals, 140) + 5;
                      return (
                        <div style={{ background:'var(--input-bg)', borderRadius:'10px', padding:'12px', marginBottom:'8px' }}>
                          <div style={{ fontSize:'13px', color:'var(--text-sub)', marginBottom:'8px', fontWeight:'600' }}>📈 최근 7일 혈압 추이</div>
                          <div style={{ display:'flex', gap:'4px', alignItems:'flex-end', height:'60px', marginBottom:'4px' }}>
                            {bpWeek.map((d, i) => {
                              if (!d.sys) return (
                                <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end', height:'60px' }}>
                                  <div style={{ width:'100%', height:'4px', background: dm?'var(--divider)':'var(--card-border)', borderRadius:'2px' }}/>
                                  <div style={{ fontSize:'9px', color:'var(--text-sub)', marginTop:'3px', whiteSpace:'nowrap' }}>{d.label}</div>
                                </div>
                              );
                              const sysH = Math.round(((d.sys - minV) / (maxV - minV)) * 50);
                              const diaH = Math.round(((d.dia - minV) / (maxV - minV)) * 50);
                              const bpI2 = (() => {
                                if (d.sys < 120 && d.dia < 80)  return 'var(--cn-ok)';
                                if (d.sys < 130 && d.dia < 80)  return '#65a30d';
                                if (d.sys < 140 || d.dia < 90)  return 'var(--cn-warn)';
                                if (d.sys < 160 || d.dia < 100) return '#ea580c';
                                return 'var(--cn-danger)';
                              })();
                              return (
                                <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end', height:'60px', position:'relative' }}>
                                  {/* 수축기 바 */}
                                  <div style={{ width:'55%', height:`${sysH}px`, background:bpI2, borderRadius:'3px 3px 0 0', minHeight:'4px', position:'absolute', bottom:'14px', left:'22.5%' }}/>
                                  {/* 이완기 바 */}
                                  <div style={{ width:'55%', height:`${diaH}px`, background:bpI2, opacity:0.45, borderRadius:'3px 3px 0 0', minHeight:'4px', position:'absolute', bottom:'14px', left:'22.5%' }}/>
                                  <div style={{ fontSize:'9px', color:'var(--text-sub)', position:'absolute', bottom:0, whiteSpace:'nowrap' }}>{d.label}</div>
                                </div>
                              );
                            })}
                          </div>
                          {/* 값 표시 행 */}
                          <div style={{ display:'flex' }}>
                            {bpWeek.map((d, i) => (
                              <div key={i} style={{ flex:1, textAlign:'center', fontSize:'9px', lineHeight:'1.4' }}>
                                {d.sys ? <><span style={{ color:'var(--cn-danger)', fontWeight:'700', display:'block' }}>{d.sys}</span><span style={{ color:'var(--cn-brand)', fontWeight:'700', display:'block' }}>{d.dia}</span></> : ''}
                              </div>
                            ))}
                          </div>
                          <div style={{ display:'flex', gap:'8px', marginTop:'6px', fontSize:'10px', color:'var(--text-sub)' }}>
                            <span style={{ display:'flex', alignItems:'center', gap:'3px' }}><span style={{ width:'8px', height:'8px', background:'var(--cn-danger)', borderRadius:'2px', display:'inline-block' }}/> 수축기</span>
                            <span style={{ display:'flex', alignItems:'center', gap:'3px' }}><span style={{ width:'8px', height:'8px', background:'var(--cn-brand)', borderRadius:'2px', display:'inline-block', opacity:0.6 }}/> 이완기</span>
                          </div>
                        </div>
                      );
                    })()}
                  </Card>
                );
              })()}

              {/* 식사 */}
              <Card tab="record">
                <STitle icon="🍽️" label="식사 기록" />
                <div style={{ background:dm?'var(--cn-ok-100)':'var(--cn-ok-100)', border:'1px solid var(--cn-ok)', borderRadius:'10px', padding:'12px 14px', marginBottom:'12px', fontSize:'14px' }}>
                  <div style={{ fontWeight:'700', color:'var(--cn-ok)', marginBottom:'8px' }}>💡 당뇨 식단 가이드</div>
                  <div style={{ display:'flex', gap:'20px', flexWrap:'wrap' }}>
                    <div><div style={{ color:'var(--cn-ok)', fontWeight:'700', marginBottom:'3px' }}>✅ 권장</div><div style={{ color:'var(--text)', lineHeight:'1.8' }}>현미·잡곡밥 · 닭가슴살 · 두부 · 생선<br/>채소류 · 달걀 · 콩류 · 견과류(소량)</div></div>
                    <div><div style={{ color:'var(--cn-danger)', fontWeight:'700', marginBottom:'3px' }}>❌ 제한</div><div style={{ color:'var(--text)', lineHeight:'1.8' }}>흰쌀밥 · 흰빵 · 라면 · 과자<br/>사탕·주스 · 탄산음료 · 술</div></div>
                  </div>
                </div>
                <div style={{ background:dm?'var(--cn-warn-100)':'var(--cn-warn-100)', border:dm?'1px solid var(--cn-warn)':'1px solid var(--cn-warn)', borderRadius:'10px', padding:'12px 14px', marginBottom:'14px', fontSize:'14px' }}>
                  <div style={{ fontWeight:'700', color:dm?'var(--cn-warn)':'var(--cn-warn)', marginBottom:'5px' }}>📝 식단 기입 방법</div>
                  <div style={{ color:dm?'var(--cn-warn)':'var(--cn-warn)', lineHeight:'1.8' }}>
                    <strong>형식:</strong> 음식명 + 양 + 탄수화물(g)<br/>
                    <strong>예:</strong> 현미밥 반공기(30g), 닭가슴살 100g, 브로콜리 1컵<br/>
                    <strong>한 끼 탄수화물 목표:</strong> 45–60g (하루 130–180g)
                  </div>
                </div>
                {MEALS.map(m => (
                  <div key={m.id} style={{ marginBottom:'16px' }}>
                    {/* 라벨 + 사진 버튼 */}
                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'6px', flexWrap:'wrap', gap:'6px' }}>
                      <div style={{ fontSize:'16px', fontWeight:'700', color:'var(--text)' }}>{m.icon} {m.label}</div>
                      {analyzing===m.id ? (
                        <span style={{ fontSize:'14px', color:'var(--cn-low)', fontWeight:'700' }}>⏳ 분석 중...</span>
                      ) : (
                        <div style={{ display:'flex', gap:'6px' }}>
                          {/* 카메라 촬영 */}
                          <button onClick={() => camRefs[m.id].current?.click()} disabled={!!analyzing}
                            style={{ background:dm?'var(--cn-low-100)':'var(--cn-low-100)', border:dm?'1px solid var(--cn-low)':'1px solid var(--cn-low)', color:'var(--cn-low)', borderRadius:'8px', padding:'5px 11px', cursor:'pointer', fontSize:'14px', fontWeight:'700' }}>
                            📸 촬영
                          </button>
                          {/* 앨범 선택 */}
                          <button onClick={() => imgRefs[m.id].current?.click()} disabled={!!analyzing}
                            style={{ background:dm?'var(--cn-brand-100)':'var(--cn-brand-100)', border:'1px solid var(--cn-brand)', color:'var(--cn-brand)', borderRadius:'8px', padding:'5px 11px', cursor:'pointer', fontSize:'14px', fontWeight:'700' }}>
                            🖼️ 앨범
                          </button>
                        </div>
                      )}
                      {/* 카메라용 input */}
                      <input ref={camRefs[m.id]} type="file" accept="image/*" capture="environment"
                        onChange={e => e.target.files[0] && handlePhotoSelect(e.target.files[0], m.id)}
                        style={{ display:'none' }} />
                      {/* 앨범용 input */}
                      <input ref={imgRefs[m.id]} type="file" accept="image/*"
                        onChange={e => e.target.files[0] && handlePhotoSelect(e.target.files[0], m.id)}
                        style={{ display:'none' }} />
                    </div>

                    {/* 분석 결과 카드 */}
                    {analysisResult?.mealId === m.id && (
                      <div style={{ border:dm?'1px solid var(--cn-low)':'1px solid var(--cn-low)', borderRadius:'12px', marginBottom:'10px', overflow:'hidden' }}>
                        {/* 헤더 */}
                        <div style={{ background:'linear-gradient(135deg,var(--cn-low),#a855f7)', padding:'10px 14px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                          <span style={{ color:'#fff', fontWeight:'700', fontSize:'16px' }}>🤖 AI 식단 분석 결과</span>
                          <span style={{ color:'rgba(255,255,255,0.7)', fontSize:'16px' }}>Powered by Gemini</span>
                        </div>
                        {/* 내용 */}
                        <div style={{ background:dm?'var(--cn-low-100)':'var(--cn-low-100)', padding:'14px', fontSize:'16px', color:'var(--text)', whiteSpace:'pre-line', lineHeight:'1.9', maxHeight:'400px', overflowY:'auto' }}>
                          {analysisResult.text}
                        </div>
                        {/* 버튼 */}
                        <div style={{ background:'#f5f3ff', padding:'10px 14px', display:'flex', gap:'8px', borderTop:'1px solid #e9d5ff' }}>
                          <button onClick={() => applyAnalysis(m.id, analysisResult.text)}
                            style={{ flex:2, padding:'9px', background:'var(--cn-low)', color:'#fff', border:'none', borderRadius:'8px', cursor:'pointer', fontWeight:'700', fontSize:'16px' }}>
                            ✅ 식사 기록에 추가
                          </button>
                          <button onClick={() => setAnalysisResult(null)}
                            style={{ flex:1, padding:'9px', background:'var(--card-bg)', color:'var(--text-sub)', border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, borderRadius:'8px', cursor:'pointer', fontSize:'16px' }}>
                            닫기
                          </button>
                        </div>
                      </div>
                    )}

                    <textarea value={day.meals[m.id]||''} onChange={e=>updMeal(m.id,e.target.value)} placeholder={m.ph} rows={3}
                      style={{ width:'100%', border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, borderRadius:'8px', padding:'10px 12px', fontSize:'16px', color:'var(--text)', resize:'vertical', outline:'none', lineHeight:'1.6', background:'#fafafa', transition:'border-color 0.2s' }}
                      onFocus={e=>e.target.style.borderColor='var(--cn-brand)'} onBlur={e=>e.target.style.borderColor='var(--card-border)'} />
                  </div>
                ))}
              </Card>

              {/* 주간 차트 */}
              <Card tab="report">
                <STitle icon="📈" label="최근 7일 평균 혈당" />
                <div className="chart-wrap"><canvas ref={chartRef}/></div>
                <div style={{ display:'flex', gap:'14px', marginTop:'10px', justifyContent:'center', fontSize:'14px', color:'var(--text-sub)' }}>
                  <span>🟣 저혈당</span><span>🟢 정상</span><span>🟡 주의</span><span>🔴 높음</span>
                </div>
                <div style={{ fontSize:'16px', color:'var(--text-sub)', textAlign:'center', marginTop:'6px' }}>
                  혈당 기록이 쌓이면 의사 선생님과 인슐린 용량 조정 상담에 활용하세요
                </div>
              </Card>
            </div>

            {/* ── RIGHT ── */}
            <div>
              {/* Banner: 사이드바 상단 */}
              <BannerSlot slotId="sidebar_top" />

              {/* 대시보드 홈 */}
              <DashboardHome data={data} date={date} medsConfig={medsConfig} allMedIds={allMedIds}/>

              {/* 체중 / 체지방 */}
              <Card tab="record">
                <STitle icon="⚖️" label="체중 · 체지방 기록" />

                {/* 입력 행 */}
                <div style={{ display:'flex', gap:'10px', marginBottom:'12px', flexWrap:'wrap' }}>
                  <div style={{ flex:1, minWidth:'100px' }}>
                    <div style={{ fontSize:'13px', color:'var(--text-sub)', marginBottom:'4px' }}>체중</div>
                    <div style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                      <input type="text" inputMode="decimal" value={day.weight||''} onChange={e=>upDay({weight:e.target.value.replace(/[^0-9.]/g,'')})} placeholder="00.0"
                        style={{ width:'82px', border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, borderRadius:'8px', padding:'8px 10px', fontSize:'22px', fontWeight:'800', color:'var(--text)', outline:'none', textAlign:'center' }} />
                      {_wArrow && <span style={{ fontSize:'20px', fontWeight:'800', color:_wArrowClr, flexShrink:0 }}>{_wArrow}</span>}
                      <span style={{ color:'var(--text-sub)', fontWeight:'600', fontSize:'16px', flexShrink:0 }}>kg</span>
                    </div>
                    {_prevW && _curW && <div style={{ fontSize:'11px', color:_wArrowClr, marginTop:'3px' }}>전일 대비 {_wDiff > 0 ? '+' : ''}{_wDiff.toFixed(1)}kg</div>}
                  </div>
                  <div style={{ flex:1, minWidth:'100px' }}>
                    <div style={{ fontSize:'13px', color:'var(--text-sub)', marginBottom:'4px' }}>체지방율</div>
                    <div style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                      <input type="text" inputMode="decimal" value={day.bodyFat||''} onChange={e=>upDay({bodyFat:e.target.value.replace(/[^0-9.]/g,'')})} placeholder="00.0"
                        style={{ width:'82px', border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, borderRadius:'8px', padding:'8px 10px', fontSize:'22px', fontWeight:'800', color:'var(--cn-low)', outline:'none', textAlign:'center' }} />
                      {_bfArrow && <span style={{ fontSize:'20px', fontWeight:'800', color:_bfArrowClr, flexShrink:0 }}>{_bfArrow}</span>}
                      <span style={{ color:'var(--text-sub)', fontWeight:'600', fontSize:'16px', flexShrink:0 }}>%</span>
                    </div>
                    {_prevBf && _curBf && <div style={{ fontSize:'11px', color:_bfArrowClr, marginTop:'3px' }}>전일 대비 {_bfDiff > 0 ? '+' : ''}{_bfDiff.toFixed(1)}%</div>}
                  </div>
                  <div style={{ flex:1, minWidth:'80px' }}>
                    <div style={{ fontSize:'13px', color:'var(--text-sub)', marginBottom:'4px' }}>키</div>
                    <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                      <input type="text" inputMode="decimal" value={height} onChange={e=>saveHeight(e.target.value.replace(/[^0-9.]/g,''))} placeholder="000"
                        style={{ width:'72px', border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, borderRadius:'8px', padding:'8px 8px', fontSize:'22px', fontWeight:'800', color:'var(--text)', outline:'none', textAlign:'center' }} />
                      <span style={{ color:'var(--text-sub)', fontWeight:'600', fontSize:'16px' }}>cm</span>
                    </div>
                  </div>
                </div>

                {/* BMI 계산 */}
                {(() => {
                  const w  = parseFloat(day.weight);
                  const h  = parseFloat(height);
                  if (!w || !h || h < 100) return null;
                  const bmi = w / ((h / 100) ** 2);
                  const bmiRounded = Math.round(bmi * 10) / 10;

                  // 한국/아시아 기준
                  const ranges = [
                    { label:'저체중',    max:18.5, color:'var(--cn-brand)', bg:'var(--cn-brand-100)' },
                    { label:'정상',      max:23.0, color:'var(--cn-ok)', bg:'var(--cn-ok-100)' },
                    { label:'과체중',    max:25.0, color:'var(--cn-warn)', bg:'var(--cn-warn-100)' },
                    { label:'비만',      max:30.0, color:'#ea580c', bg:'#fff7ed' },
                    { label:'고도비만',  max:99,   color:'var(--cn-danger)', bg:'var(--cn-danger-100)' },
                  ];
                  const cur = ranges.find(r => bmiRounded < r.max) || ranges[ranges.length-1];

                  // 게이지 위치 (13~35 구간으로 매핑)
                  const pct = Math.min(100, Math.max(0, (bmiRounded - 13) / (35 - 13) * 100));

                  return (
                    <div style={{ background:'var(--input-bg)', borderRadius:'12px', padding:'14px', marginBottom:'12px', border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}` }}>
                      {/* 헤더 */}
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'10px' }}>
                        <span style={{ fontSize:'13px', fontWeight:'700', color:'var(--text-sub)' }}>📐 BMI (한국 기준)</span>
                        <div style={{ textAlign:'right' }}>
                          <span style={{ fontSize:'28px', fontWeight:'900', color:cur.color, letterSpacing:'-1px' }}>{bmiRounded}</span>
                          <span style={{ fontSize:'13px', color:'var(--text-sub)', marginLeft:'4px' }}>kg/m²</span>
                          <div style={{ fontSize:'12px', fontWeight:'700', color:cur.color }}>{cur.label}</div>
                        </div>
                      </div>

                      {/* 게이지 바 */}
                      <div style={{ position:'relative', marginBottom:'8px' }}>
                        <div style={{ display:'flex', borderRadius:'6px', overflow:'hidden', height:'10px' }}>
                          {[
                            { w:'20%', color:'var(--cn-brand)' },
                            { w:'25%', color:'var(--cn-ok)' },
                            { w:'12%', color:'var(--cn-warn)' },
                            { w:'27%', color:'#fb923c' },
                            { w:'16%', color:'#f87171' },
                          ].map((s,i) => <div key={i} style={{ width:s.w, background:s.color }}/>)}
                        </div>
                        {/* 내 위치 마커 */}
                        <div style={{ position:'absolute', top:'-3px', left:`calc(${pct}% - 6px)`, width:'12px', height:'16px', background:'var(--cn-ink)', borderRadius:'3px', border:'2px solid #fff', boxShadow:'0 1px 4px rgba(0,0,0,0.3)', transition:'left 0.4s ease' }}/>
                      </div>

                      {/* 범례 */}
                      <div style={{ display:'flex', gap:'6px', flexWrap:'wrap' }}>
                        {[
                          { label:'저체중', val:'~18.4', color:'var(--cn-brand)' },
                          { label:'정상',   val:'18.5~22.9', color:'var(--cn-ok)' },
                          { label:'과체중', val:'23~24.9', color:'var(--cn-warn)' },
                          { label:'비만',   val:'25~29.9', color:'#ea580c' },
                          { label:'고도비만',val:'30~', color:'var(--cn-danger)' },
                        ].map(r => (
                          <div key={r.label} style={{ display:'flex', alignItems:'center', gap:'3px' }}>
                            <div style={{ width:'8px', height:'8px', borderRadius:'2px', background:r.color, flexShrink:0 }}/>
                            <span style={{ fontSize:'10px', color:'var(--text-sub)' }}>{r.label} <span style={{ color:r.color, fontWeight:'600' }}>{r.val}</span></span>
                          </div>
                        ))}
                      </div>

                      {/* 정상 체중 범위 안내 */}
                      <div style={{ marginTop:'8px', fontSize:'11px', color:'var(--text-sub)', borderTop:`1px solid ${dm?'var(--divider)':'var(--divider)'}`, paddingTop:'7px' }}>
                        정상 체중 범위: <strong style={{ color:'var(--cn-ok)' }}>{(18.5 * (h/100)**2).toFixed(1)}~{(22.9 * (h/100)**2).toFixed(1)} kg</strong>
                        {w > 22.9 * (h/100)**2 &&
                          <span style={{ color:'var(--cn-warn)', marginLeft:'8px' }}>
                            목표까지 <strong>{(w - 22.9 * (h/100)**2).toFixed(1)} kg</strong> 감량
                          </span>
                        }
                      </div>
                    </div>
                  );
                })()}

                {/* 7일 체중 추이 */}
                {(() => {
                  const wk = Array.from({length:7}, (_,i) => {
                    const d = shiftDate(date, i-6);
                    const dd = data[d] || emptyDay();
                    return { label: fmtDate(d).short, w: parseFloat(dd.weight)||null, bf: parseFloat(dd.bodyFat)||null };
                  });
                  const hasW  = wk.some(x => x.w);
                  const hasBf = wk.some(x => x.bf);
                  if (!hasW && !hasBf) return null;
                  const minW = hasW ? Math.min(...wk.filter(x=>x.w).map(x=>x.w)) - 1 : 0;
                  const maxW = hasW ? Math.max(...wk.filter(x=>x.w).map(x=>x.w)) + 1 : 1;
                  const minBf = hasBf ? Math.min(...wk.filter(x=>x.bf).map(x=>x.bf)) - 1 : 0;
                  const maxBf = hasBf ? Math.max(...wk.filter(x=>x.bf).map(x=>x.bf)) + 1 : 1;
                  return (
                    <div style={{ background:'var(--input-bg)', borderRadius:'10px', padding:'10px', marginBottom:'10px' }}>
                      <div style={{ fontSize:'16px', color:'var(--text-sub)', marginBottom:'6px' }}>최근 7일 추이</div>

                      {/* 체중 차트 */}
                      {hasW && <>
                        <div style={{ fontSize:'14px', color:'var(--cn-brand)', fontWeight:'600', marginBottom:'4px' }}>⚖️ 체중 (kg)</div>
                        <div style={{ display:'flex', gap:'4px', alignItems:'flex-end', height:'48px' }}>
                          {wk.map((d,i) => {
                            const h = d.w ? Math.round(((d.w - minW)/(maxW - minW || 1)) * 38 + 6) : 4;
                            return (
                              <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:'2px' }}>
                                <div style={{ width:'100%', height:`${h}px`, background: d.w ? 'var(--cn-brand)' : 'var(--card-border)', borderRadius:'3px 3px 0 0', transition:'height 0.3s' }}/>
                                <div style={{ fontSize:'9px', color:'var(--text-sub)', whiteSpace:'nowrap' }}>{d.label}</div>
                              </div>
                            );
                          })}
                        </div>
                        <div style={{ display:'flex', marginTop:'4px' }}>
                          {wk.map((d,i) => {
                            const prev = i > 0 ? wk[i-1].w : null;
                            const diff = (prev && d.w) ? d.w - prev : null;
                            const arr  = diff === null ? '' : diff > 0.04 ? ' ↑' : diff < -0.04 ? ' ↓' : ' →';
                            const clr  = diff === null ? 'var(--cn-brand)' : diff > 0.04 ? '#ef4444' : diff < -0.04 ? 'var(--cn-brand)' : 'var(--text-mute)';
                            return (
                              <div key={i} style={{ flex:1, textAlign:'center', fontSize:'9px', color: d.w ? clr : 'var(--card-border)', fontWeight:'700' }}>
                                {d.w ? `${d.w.toFixed(1)}${arr}` : ''}
                              </div>
                            );
                          })}
                        </div>
                      </>}

                      {/* 체지방 차트 */}
                      {hasBf && <div style={{ marginTop: hasW ? '10px' : '0' }}>
                        <div style={{ fontSize:'14px', color:'var(--cn-low)', fontWeight:'600', marginBottom:'4px' }}>💪 체지방률 (%)</div>
                        <div style={{ display:'flex', gap:'4px', alignItems:'flex-end', height:'48px' }}>
                          {wk.map((d,i) => {
                            const h = d.bf ? Math.round(((d.bf - minBf)/(maxBf - minBf || 1)) * 38 + 6) : 4;
                            return (
                              <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:'2px' }}>
                                <div style={{ width:'100%', height:`${h}px`, background: d.bf ? 'var(--cn-low)' : 'var(--card-border)', borderRadius:'3px 3px 0 0', transition:'height 0.3s' }}/>
                                <div style={{ fontSize:'9px', color:'var(--text-sub)', whiteSpace:'nowrap' }}>{d.label}</div>
                              </div>
                            );
                          })}
                        </div>
                        <div style={{ display:'flex', marginTop:'4px' }}>
                          {wk.map((d,i) => {
                            const prev = i > 0 ? wk[i-1].bf : null;
                            const diff = (prev && d.bf) ? d.bf - prev : null;
                            const arr  = diff === null ? '' : diff > 0.04 ? ' ↑' : diff < -0.04 ? ' ↓' : ' →';
                            const clr  = diff === null ? 'var(--cn-low)' : diff > 0.04 ? '#ef4444' : diff < -0.04 ? 'var(--cn-brand)' : 'var(--text-mute)';
                            return (
                              <div key={i} style={{ flex:1, textAlign:'center', fontSize:'9px', color: d.bf ? clr : 'var(--card-border)', fontWeight:'700' }}>
                                {d.bf ? `${d.bf.toFixed(1)}${arr}` : ''}
                              </div>
                            );
                          })}
                        </div>
                      </div>}
                    </div>
                  );
                })()}

                {/* 건강앱 가져오기 — iOS / Android */}
                <input ref={weightFileRef}  type="file" accept=".zip,.xml" onChange={e => e.target.files[0] && handleWeightImport(e.target.files[0])} style={{ display:'none' }} />
                <input ref={androidFileRef} type="file" accept=".zip"      onChange={e => e.target.files[0] && handleAndroidImport(e.target.files[0])} style={{ display:'none' }} />

                <div style={{ fontSize:'12px', fontWeight:'700', color:'var(--text-sub)', marginBottom:'6px' }}>📲 건강앱에서 가져오기</div>
                <div style={{ display:'flex', gap:'8px', marginBottom:'4px' }}>
                  {/* iOS */}
                  <button onClick={() => weightFileRef.current?.click()} disabled={weightImporting || androidImporting}
                    style={{ flex:1, padding:'8px 6px', background: weightImporting?'var(--divider)':'var(--cn-brand-100)', border:`1px solid ${weightImporting?'var(--card-border)':'var(--cn-brand)'}`, color: weightImporting?'var(--text-mute)':'#1d4ed8', borderRadius:'8px', cursor: weightImporting||androidImporting?'not-allowed':'pointer', fontWeight:'700', fontSize:'12px', lineHeight:'1.4' }}>
                    🍎 iOS 건강앱<br/><span style={{ fontSize:'10px', fontWeight:'500', color:'var(--text-sub)' }}>export.zip 또는 export.xml</span>
                  </button>
                  {/* Android */}
                  <button onClick={() => androidFileRef.current?.click()} disabled={weightImporting || androidImporting}
                    style={{ flex:1, padding:'8px 6px', background: androidImporting?'var(--divider)':'var(--cn-ok-100)', border:`1px solid ${androidImporting?'var(--card-border)':'var(--cn-ok)'}`, color: androidImporting?'var(--text-mute)':'var(--cn-ok)', borderRadius:'8px', cursor: weightImporting||androidImporting?'not-allowed':'pointer', fontWeight:'700', fontSize:'12px', lineHeight:'1.4' }}>
                    🤖 Android<br/><span style={{ fontSize:'10px', fontWeight:'500', color:'var(--text-sub)' }}>삼성 헬스 ZIP</span>
                  </button>
                </div>

                {/* iOS 메시지 */}
                {weightImportMsg && (
                  <div style={{ fontSize:'13px', color: weightImportMsg.startsWith('✅')?'var(--cn-ok)': weightImportMsg.startsWith('❌')?'var(--cn-danger)':'var(--text-sub)', textAlign:'center', padding:'3px 0', fontWeight:'600' }}>
                    🍎 {weightImportMsg}
                  </div>
                )}
                {/* Android 메시지 */}
                {androidImportMsg && (
                  <div style={{ fontSize:'13px', color: androidImportMsg.startsWith('✅')?'var(--cn-ok)': androidImportMsg.startsWith('❌')?'var(--cn-danger)':'var(--text-sub)', textAlign:'center', padding:'3px 0', fontWeight:'600' }}>
                    🤖 {androidImportMsg}
                  </div>
                )}

                {/* 안내 */}
                <div style={{ marginTop:'6px', display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px' }}>
                  <div style={{ fontSize:'10px', color:'var(--text-sub)', lineHeight:'1.6', background:'var(--input-bg)', borderRadius:'6px', padding:'6px 8px' }}>
                    <strong style={{ color:'#1d4ed8' }}>🍎 iOS</strong><br/>
                    건강 앱 → 프로필 → 건강 데이터 내보내기 → export.zip 전송
                  </div>
                  <div style={{ fontSize:'10px', color:'var(--text-sub)', lineHeight:'1.6', background:'var(--input-bg)', borderRadius:'6px', padding:'6px 8px' }}>
                    <strong style={{ color:'var(--cn-ok)' }}>🤖 Android</strong><br/>
                    삼성 헬스 → 설정(⚙️) → 개인 데이터 다운로드 → ZIP 전송
                  </div>
                </div>
                <div style={{ fontSize:'11px', color:'var(--cn-ok)', fontWeight:'500', marginTop:'6px' }}>💡 5% 체중 감량만으로 혈당이 크게 개선될 수 있어요</div>
              </Card>

              {/* 운동 */}
              <Card tab="record">
                <STitle icon="🏃" label="운동 기록" />
                <div style={{ marginBottom:'10px' }}>
                  <div style={{ fontSize:'14px', color:'var(--text-sub)', marginBottom:'4px' }}>운동 종류</div>
                  <input type="text" value={day.exercise?.type||''} onChange={e=>updEx('type',e.target.value)} placeholder="예: 걷기, 수영, 자전거…" style={inpSt} />
                </div>
                <div style={{ marginBottom:'10px' }}>
                  <div style={{ fontSize:'14px', color:'var(--text-sub)', marginBottom:'4px' }}>운동 시간 (분)</div>
                  <input type="number" min="0" value={day.exercise?.mins||''} onChange={e=>updEx('mins',e.target.value)} placeholder="30" style={inpSt} />
                </div>
                <div style={{ fontSize:'11px', color:'var(--cn-ok)', fontWeight:'500', lineHeight:'1.7' }}>
                  💪 식후 30분 걷기 30분이 혈당 조절에 가장 효과적<br/>🎯 하루 최소 30분, 주 5일 목표
                </div>
              </Card>

              {/* 메모 */}
              <Card tab="home">
                <STitle icon="📝" label="오늘의 메모" />
                <textarea value={day.note||''} onChange={e=>upDay({note:e.target.value})} placeholder="특이사항, 컨디션, 저혈당 증상, 의사 선생님께 전달할 내용 등…" rows={4}
                  style={{ ...inpSt, resize:'vertical', lineHeight:'1.6', fontFamily:'inherit' }} />
              </Card>

              {/* 목표 카드 */}
              <Card tab="home" style={{ background:'linear-gradient(135deg,var(--cn-brand-100),var(--cn-ok-100))', border:'1px solid #bfdbfe' }}>
                <div style={{ fontSize:'14px', fontWeight:'700', color:dm?'var(--cn-brand)':'var(--cn-brand-600)', marginBottom:'10px' }}>🎯 인슐린 졸업을 향해!</div>
                <div style={{ fontSize:'14px', color:'var(--text)', lineHeight:'2' }}>
                  ✅ 혈당 꾸준히 기록 (리브레2 연동)<br/>
                  ✅ 탄수화물 조절 (한 끼 45–60g)<br/>
                  ✅ 식후 걷기 30분<br/>
                  ✅ 체중 점진적 감량<br/>
                  ✅ 주치의와 정기 상담<br/><br/>
                  <span style={{ color:'var(--cn-danger)', fontWeight:'600', fontSize:'11px' }}>⚠️ 인슐린은 반드시 의사 지시에 따라 조정하세요.</span>
                </div>
              </Card>
            </div>
          </div>

          {/* ── 챌린지 탭 ── */}
          <div style={{ maxWidth:'1140px', margin:'0 auto', padding:'0 16px 22px' }}>
            <ChallengeTab data={data} date={date} userId={userId} />
          </div>

          {/* ── 프로필 탭 ── */}
          <div style={{ maxWidth:'1140px', margin:'0 auto', padding:'0 16px 22px' }}>
            <ProfileTab
              authUser={authUser} userId={userId}
              onMedSettings={() => setShowMedSettings(true)}
              onImport={() => setShowImport(true)}
              onSync={() => setShowSync(true)}
              onAdmin={() => setShowAdmin(true)}
              onRefresh={() => setRefreshKey(k => k + 1)}
              syncing={syncing}
              darkMode={darkMode}
              onToggleDark={() => { _dm=!_dm; document.body.classList.toggle('dark',_dm); localStorage.setItem('cn_dark',_dm?'1':'0'); setDarkMode(_dm); }}
              onChangePassword={() => setShowChangePw(true)}
            />
          </div>

          {/* Banner: 페이지 맨 아래 */}
          <BannerSlot slotId="bottom" />
        </div>

        {/* ── 하단 탭바 (모바일 전용) ── */}
        <nav className="cn-tabbar">
          {[
            { id:'home',      label:'홈',    icon:<><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/></>    },
            { id:'record',    label:'기록',   icon:<><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></> },
            { id:'report',    label:'리포트', icon:<><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-5"/></>       },
            { id:'challenge', label:'챌린지', icon:<><circle cx="12" cy="8" r="6"/><path d="M8.5 13L7 22l5-3 5 3-1.5-9"/></> },
            { id:'profile',   label:'프로필', icon:<><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></> },
          ].map(t => (
            <button key={t.id} className={'cn-tab-btn' + (currentTab===t.id?' active':'')}
              onClick={() => setCurrentTab(t.id)}>
              <svg viewBox="0 0 24 24">{t.icon}</svg>
              <span>{t.label}</span>
            </button>
          ))}
        </nav>

        {/* 로딩 오버레이 */}
        {loading && (
          <div style={{ position:'fixed', inset:0, background:'rgba(255,255,255,0.85)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:3000 }}>
            <div style={{ fontSize:'32px', marginBottom:'16px' }}>⏳</div>
            <div style={{ fontSize:'14px', fontWeight:'700', color:'var(--text)' }}>데이터 불러오는 중...</div>
            <div style={{ fontSize:'16px', color:'var(--text-sub)', marginTop:'6px' }}>Supabase에서 동기화하고 있어요</div>
          </div>
        )}

        {/* Drug Info Modal */}
        {drugInfoModal && <DrugInfoModal medName={drugInfoModal} onClose={() => setDrugInfoModal(null)} />}

        {/* Import Modal */}
        {showImport && <ImportModal onClose={() => setShowImport(false)} onImport={handleImport} />}

        {/* Sync Modal */}
        {showSync && <SyncModal userId={userId} onClose={() => { setShowSync(false); setRefreshKey(k => k + 1); }} onChangeId={() => { setRefreshKey(k => k + 1); }} />}

        {/* Med Settings Modal */}
        {showMedSettings && <MedSettingsModal meds={medsConfig} onSave={saveMeds} onClose={() => setShowMedSettings(false)} userId={userId} />}

        {/* Change Password Modal */}
        {showChangePw && <ChangePasswordModal onClose={() => setShowChangePw(false)} />}

        {/* Admin Modal */}
        {showAdmin && <AdminModal onClose={() => setShowAdmin(false)} userEmail={authUser?.email} />}
      </div>
    );
  };

  /* ── 공통 스타일 상수 ─────────────────────────────────── */
  const navBtnSt = { background:'rgba(255,255,255,0.2)', border:'none', color:'#fff', borderRadius:'8px', padding:'8px 16px', cursor:'pointer', fontSize:'14px', fontWeight:'700', lineHeight:1 };
  /* inpSt는 App 안에서 dm 없이 쓰이므로 CSS 오버라이드로 처리됨 */
  const inpSt    = { width:'100%', border:'1px solid var(--input-border)', borderRadius:'8px', padding:'8px 12px', fontSize:'14px', outline:'none', background:'var(--input-bg)', color:'var(--text)' };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
