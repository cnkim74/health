                onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                onBlur={e=>e.target.style.borderColor=
                  emailChecked==='ok'?'var(--cn-ok)':emailChecked==='dup'?'var(--cn-danger)':borderCol} />
              {mode==='signup' && (
                <button type="button" onClick={checkEmail} disabled={emailChecking||!email}
                  style={{ padding:'0 14px', border:`1.5px solid ${emailChecked==='ok'?'var(--cn-ok)':emailChecked==='dup'?'var(--cn-danger)':'var(--cn-brand)'}`,
                    borderRadius:'10px', background: emailChecked==='ok'?'var(--cn-ok)':emailChecked==='dup'?'var(--cn-danger)':'var(--cn-brand)',
                    color:'#fff', fontSize:'12px', fontWeight:'700', cursor:'pointer', whiteSpace:'nowrap', fontFamily:'inherit', flexShrink:0 }}>
                  {emailChecking?'нҷ•мқёмӨ‘вҖҰ':emailChecked==='ok'?'вң“ мӮ¬мҡ©к°ҖлҠҘ':emailChecked==='dup'?'вң— мӨ‘ліө':'мӨ‘ліөнҷ•мқё'}
                </button>
              )}
            </div>

            {/* л№„л°ҖлІҲнҳё */}
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
              placeholder={mode==='signup'?'л№„л°ҖлІҲнҳё (8мһҗ мқҙмғҒ, мҳҒл¬ё+мҲ«мһҗ+кё°нҳё)':'л№„л°ҖлІҲнҳё'} required style={inp}
              onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
              onBlur={e=>e.target.style.borderColor=borderCol} />

            {/* л№„л°ҖлІҲнҳё к°•лҸ„ н‘ңмӢң (нҡҢмӣҗк°Җмһ…л§Ң) */}
            {mode==='signup' && password.length > 0 && (
              <div style={{ background: dm?'rgba(255,255,255,0.04)':'var(--bg)', border:'1px solid var(--card-border)',
                borderRadius:'10px', padding:'10px 14px', fontSize:'12px', lineHeight:'1.8' }}>
                {[
                  [pwChecks.len,    '8мһҗ мқҙмғҒ'],
                  [pwChecks.letter, 'мҳҒл¬ё нҸ¬н•Ё'],
                  [pwChecks.number, 'мҲ«мһҗ нҸ¬н•Ё'],
                  [pwChecks.special,'кё°нҳё нҸ¬н•Ё (!@#$%^&* л“ұ)'],
                ].map(([ok, label]) => (
                  <div key={label} style={{ color: ok?'var(--cn-ok)':'var(--cn-danger)', display:'flex', alignItems:'center', gap:'6px' }}>
                    <span style={{ fontWeight:'700' }}>{ok?'вң“':'вң—'}</span> {label}
                  </div>
                ))}
              </div>
            )}

            {/* л№„л°ҖлІҲнҳё нҷ•мқё (нҡҢмӣҗк°Җмһ…л§Ң) */}
            {mode==='signup' && (
              <div>
                <input type="password" value={password2} onChange={e=>setPassword2(e.target.value)}
                  placeholder="л№„л°ҖлІҲнҳё нҷ•мқё" required
                  style={{ ...inp, borderColor: password2.length>0?(pwMatch?'var(--cn-ok)':'var(--cn-danger)'):borderCol }}
                  onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                  onBlur={e=>e.target.style.borderColor=password2.length>0?(pwMatch?'var(--cn-ok)':'var(--cn-danger)'):borderCol} />
                {password2.length>0 && (
                  <div style={{ fontSize:'12px', marginTop:'4px', color: pwMatch?'var(--cn-ok)':'var(--cn-danger)', fontWeight:'600' }}>
                    {pwMatch ? 'вң“ л№„л°ҖлІҲнҳёк°Җ мқјм№ҳн•ҙмҡ”' : 'вң— л№„л°ҖлІҲнҳёк°Җ мқјм№ҳн•ҳм§Җ м•Ҡм•„мҡ”'}
                  </div>
                )}
              </div>
            )}

            {/* нҡҢмӣҗк°Җмһ… м¶”к°Җ н•„л“ң */}
            {mode === 'signup' && (<>
              <input type="text" value={name} onChange={e=>setName(e.target.value)}
                placeholder="мқҙлҰ„ (н•„мҲҳ)" required style={inp}
                onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                onBlur={e=>e.target.style.borderColor=borderCol} />
              <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)}
                placeholder="м „нҷ”лІҲнҳё (н•„мҲҳ, мҳҲ: 010-1234-5678)" required style={inp}
                onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                onBlur={e=>e.target.style.borderColor=borderCol} />
              <div style={{ position:'relative' }}>
                <input type="number" value={signupHeight} onChange={e=>setSignupHeight(e.target.value)}
                  placeholder="нӮӨ (cm) вҖ” м„ нғқ, BMI мһҗлҸҷкі„мӮ°м—җ нҷңмҡ©" style={{...inp, paddingRight:'46px'}}
                  onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                  onBlur={e=>e.target.style.borderColor=borderCol} />
                <span style={{ position:'absolute', right:'14px', top:'50%', transform:'translateY(-50%)',
                  fontSize:'12px', color:'var(--text-mute)', pointerEvents:'none' }}>cm</span>
              </div>
            </>)}

            <button type="submit" disabled={busy}
              style={{ padding:'13px', border:'none', borderRadius:'12px',
                       fontSize:'15px', fontWeight:'700', cursor: busy?'default':'pointer',
                       background: busy ? 'var(--text-sub)' : 'linear-gradient(135deg,var(--cn-brand-600),var(--cn-brand))',
                       color:'#fff', boxShadow: busy ? 'none' : '0 4px 16px rgba(37,99,235,0.4)',
                       transition:'all 0.2s', marginTop:'4px' }}>
              {busy ? 'мІҳлҰ¬ мӨ‘...' : mode === 'login' ? 'лЎңк·ёмқён•ҳкё°' : 'к°Җмһ…н•ҳкё°'}
            </button>
          </form>

          {/* кө¬л¶„м„  */}
          <div style={{ display:'flex', alignItems:'center', gap:'12px', margin:'20px 0' }}>
            <div style={{ flex:1, height:'1px', background: dm ? 'rgba(255,255,255,0.1)' : 'var(--card-border)' }}/>
            <span style={{ fontSize:'12px', color: dm ? 'var(--text-sub)' : 'var(--text-mute)', fontWeight:'500' }}>лҳҗлҠ”</span>
            <div style={{ flex:1, height:'1px', background: dm ? 'rgba(255,255,255,0.1)' : 'var(--card-border)' }}/>
          </div>

          {/* кө¬кёҖ лЎңк·ёмқё */}
          <button onClick={handleGoogle} disabled={busy}
            style={{ width:'100%', padding:'12px 16px',
                     background: dm ? 'rgba(255,255,255,0.05)' : '#fff',
                     border: `1.5px solid ${dm ? 'rgba(255,255,255,0.12)' : 'var(--card-border)'}`,
                     borderRadius:'12px', fontSize:'14px', fontWeight:'600',
                     cursor: busy?'default':'pointer',
                     display:'flex', alignItems:'center', justifyContent:'center', gap:'10px',
                     color: dm ? 'var(--text)' : '#374151', transition:'all 0.2s' }}
            onMouseOver={e=>{ e.currentTarget.style.borderColor='var(--cn-brand)'; e.currentTarget.style.background=dm?'rgba(59,130,246,0.1)':'#f0f7ff'; }}
            onMouseOut={e=>{ e.currentTarget.style.borderColor=dm?'rgba(255,255,255,0.12)':'var(--card-border)'; e.currentTarget.style.background=dm?'rgba(255,255,255,0.05)':'#fff'; }}>
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google кі„м •мңјлЎң кі„мҶҚн•ҳкё°
          </button>

          <div style={{ textAlign:'center', marginTop:'20px', fontSize:'12px', color: dm ? '#334155' : 'var(--text-mute)' }}>
            лЎңк·ёмқё мӢң м„ңл№„мҠӨ мқҙмҡ©м•ҪкҙҖм—җ лҸҷмқҳн•ң кІғмңјлЎң к°„мЈјлҗ©лӢҲлӢӨ
          </div>
        </div>
      </div>
    );
  };

  /* в”Җв”Җ App в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */

  /* в”Җв”Җ м»Өл®ӨлӢҲнӢ° нғӯ (мұҢлҰ°м§Җ нҶөн•©) в”Җв”Җ */
  const ChallengeTab = ({ data, date, userId, userEmail, darkMode: dm }) => {
    const _dm = dm;

    // в”Җв”Җ мұҢлҰ°м§Җ stats в”Җв”Җ
    const streak = React.useMemo(() => {
      let count = 0, d = date;
      for (let i = 0; i < 365; i++) {
        const dd = data[d];
        if (!dd) break;
        if (!Object.values(dd.bs || {}).some(v => parseInt(v) > 0)) break;
        count++; d = shiftDate(d, -1);
      }
      return count;
    }, [data, date]);

    const last7 = React.useMemo(() => {
      let inRange = 0, total = 0;
      for (let i = 0; i < 7; i++) {
        const d = shiftDate(date, -i);
        const dd = data[d]; if (!dd) continue;
        Object.values(dd.bs || {}).forEach(v => { const n = parseInt(v); if (n > 0) { total++; if (n >= 70 && n <= 140) inRange++; } });
      }
      return { inRange, total, pct: total ? Math.round((inRange / total) * 100) : 0 };
    }, [data, date]);

    const medStreak = React.useMemo(() => {
      let count = 0, d = date;
      for (let i = 0; i < 30; i++) {
        const dd = data[d];
        if (!dd || !dd.meds || !Object.values(dd.meds).some(Boolean)) break;
        count++; d = shiftDate(d, -1);
      }
      return count;
    }, [data, date]);

    // в”Җв”Җ м»Өл®ӨлӢҲнӢ° state в”Җв”Җ
    const COMM_CATS = [
      { id:'notice',  label:'рҹ“ў кіөм§ҖмӮ¬н•ӯ', adminOnly: true  },
      { id:'health',  label:'рҹ’Ҡ кұҙк°•м •ліҙ', adminOnly: false },
      { id:'question',label:'вқ“ м§Ҳл¬ё',     adminOnly: false },
      { id:'review',  label:'вӯҗ нӣ„кё°',     adminOnly: false },
    ];
    const [commCat,    setCommCat]    = React.useState('notice');
    const [posts,      setPosts]      = React.useState([]);
    const [postsLoading, setPostsLoading] = React.useState(false);
    const [showWrite,  setShowWrite]  = React.useState(false);
    const [writeTitle, setWriteTitle] = React.useState('');
    const [writeBody,  setWriteBody]  = React.useState('');
    const [writeBusy,  setWriteBusy]  = React.useState(false);
    const [writeErr,   setWriteErr]   = React.useState('');
    const [detailPost, setDetailPost] = React.useState(null);
    const [comments,   setComments]   = React.useState([]);
    const [commentText,setCommentText]= React.useState('');
    const [commentBusy,setCommentBusy]= React.useState(false);

    const ADMIN_EMAIL_COMM = 'cnkim74@gmail.com';
    const isAdmin = userEmail === ADMIN_EMAIL_COMM;
    const currentCat = COMM_CATS.find(c => c.id === commCat);

    const loadPosts = React.useCallback(async (cat) => {
      setPostsLoading(true); setPosts([]);
      try {
        const { data: rows, error } = await supa
          .from('cn_community')
          .select('id,title,content,author_email,category,is_approved,created_at,view_count')
          .eq('category', cat)
          .eq('is_approved', true)
          .order('created_at', { ascending: false })
          .limit(50);
        if (!error) setPosts(rows || []);
      } catch(e) {}
      setPostsLoading(false);
    }, []);

    React.useEffect(() => { loadPosts(commCat); }, [commCat]);

    const loadComments = async (postId) => {
      const { data: rows } = await supa
        .from('cn_comments')
        .select('id,content,author_email,created_at')
        .eq('post_id', postId)
        .order('created_at', { ascending: true });
      setComments(rows || []);
    };

    const openDetail = async (post) => {
      setDetailPost(post); setCommentText(''); setComments([]);
      supa.rpc('bump_view_count', { p_post_id: String(post.id) }); // RLS: лӮЁмқҳ кёҖ мЎ°нҡҢмҲҳлҸ„ мҳ¬лҰ¬лҸ„лЎқ м„ңлІ„ н•ЁмҲҳ мӮ¬мҡ©
      loadComments(post.id);
    };

    const submitComment = async () => {
      if (!commentText.trim() || !userId) return;
      setCommentBusy(true);
      await supa.from('cn_comments').insert({
        post_id: detailPost.id, content: commentText.trim(),
        author_email: userEmail, user_id: userId
      });
      setCommentText('');
      loadComments(detailPost.id);
      setCommentBusy(false);
    };

    const submitPost = async () => {
      if (!writeTitle.trim()) { setWriteErr('м ңлӘ©мқ„ мһ…л Ҙн•ҙ мЈјм„ёмҡ”.'); return; }
      if (!writeBody.trim())  { setWriteErr('лӮҙмҡ©мқ„ мһ…л Ҙн•ҙ мЈјм„ёмҡ”.'); return; }
      setWriteBusy(true); setWriteErr('');
      const { error } = await supa.from('cn_community').insert({
        title: writeTitle.trim(), content: writeBody.trim(),
        author_email: userEmail, user_id: userId,
        category: commCat,
        is_approved: isAdmin, // кҙҖлҰ¬мһҗ кёҖмқҖ л°”лЎң мҠ№мқё
      });
      setWriteBusy(false);
      if (error) { setWriteErr('м ҖмһҘ мӢӨнҢЁ: ' + error.message); return; }
      setWriteTitle(''); setWriteBody(''); setShowWrite(false);
      loadPosts(commCat);
    };

    const fmtAgo = (d) => {
      if (!d) return '';
      const diff = Math.floor((Date.now() - new Date(d)) / 1000);
      if (diff < 60)   return 'л°©кёҲ м „';
      if (diff < 3600) return Math.floor(diff/60) + 'л¶„ м „';
      if (diff < 86400)return Math.floor(diff/3600) + 'мӢңк°„ м „';
      return new Date(d).toLocaleDateString('ko-KR', { month:'short', day:'numeric' });
    };

    // в”Җв”Җ мғҒм„ё ліҙкё° в”Җв”Җ
    if (detailPost) return (
      <div className="cn-card" data-tab="challenge">
        <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'14px' }}>
          <button onClick={() => setDetailPost(null)}
            style={{ background:'var(--bg-soft)', border:'none', borderRadius:'8px', padding:'6px 12px', cursor:'pointer', fontSize:'13px', fontWeight:'700', color:'var(--text-sub)' }}>
            вҶҗ лӘ©лЎқ
          </button>
          <span style={{ fontSize:'11px', color:'var(--text-mute)' }}>{COMM_CATS.find(c=>c.id===detailPost.category)?.label}</span>
        </div>
        <div style={{ fontSize:'17px', fontWeight:'800', color:'var(--text)', marginBottom:'6px', lineHeight:1.4 }}>{detailPost.title}</div>
        <div style={{ display:'flex', gap:'10px', fontSize:'12px', color:'var(--text-mute)', marginBottom:'14px', flexWrap:'wrap' }}>
          <span>вңҚпёҸ {detailPost.author_email?.split('@')[0]}</span>
          <span>рҹ•җ {fmtAgo(detailPost.created_at)}</span>
          <span>рҹ‘Ғ {detailPost.view_count || 0}</span>
        </div>
        <div style={{ fontSize:'14px', lineHeight:1.8, color:'var(--text)', whiteSpace:'pre-wrap', paddingBottom:'16px', borderBottom:'1px solid var(--divider)', marginBottom:'16px' }}>
          {detailPost.content}
        </div>

        {/* лҢ“кёҖ */}
        <div style={{ fontSize:'13px', fontWeight:'700', color:'var(--text-sub)', marginBottom:'10px' }}>
          рҹ’¬ лҢ“кёҖ {comments.length}
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:'8px', marginBottom:'14px' }}>
          {comments.length === 0 && <div style={{ fontSize:'13px', color:'var(--text-mute)', textAlign:'center', padding:'12px 0' }}>мІ« лҢ“кёҖмқ„ лӮЁкІЁліҙм„ёмҡ”!</div>}
          {comments.map(c => (
            <div key={c.id} style={{ background:'var(--bg-soft)', borderRadius:'10px', padding:'10px 12px' }}>
              <div style={{ fontSize:'11px', color:'var(--text-mute)', marginBottom:'4px', display:'flex', gap:'8px' }}>
                <span style={{ fontWeight:'700', color:'var(--text-sub)' }}>{c.author_email?.split('@')[0]}</span>
                <span>{fmtAgo(c.created_at)}</span>
              </div>
              <div style={{ fontSize:'13px', color:'var(--text)', lineHeight:1.6 }}>{c.content}</div>
            </div>
          ))}
        </div>
        {userId ? (
          <div style={{ display:'flex', gap:'8px' }}>
            <input value={commentText} onChange={e=>setCommentText(e.target.value)}
              onKeyDown={e => e.key==='Enter' && !e.shiftKey && submitComment()}
              placeholder="лҢ“кёҖ мһ…л Ҙ..."
              style={{ flex:1, border:'1px solid var(--input-border)', borderRadius:'8px', padding:'9px 12px', fontSize:'13px', outline:'none', background:'var(--input-bg)', color:'var(--text)', fontFamily:'inherit', minWidth:0 }} />
            <button onClick={submitComment} disabled={commentBusy || !commentText.trim()}
              style={{ background:'var(--cn-brand)', color:'#fff', border:'none', borderRadius:'8px', padding:'9px 14px', cursor:'pointer', fontSize:'13px', fontWeight:'700', flexShrink:0, opacity: commentBusy||!commentText.trim()?0.5:1 }}>
              л“ұлЎқ
            </button>
          </div>
        ) : (
          <div style={{ fontSize:'13px', color:'var(--text-mute)', textAlign:'center', padding:'8px' }}>лЎңк·ёмқё нӣ„ лҢ“кёҖмқ„ лӮЁкёё мҲҳ мһҲм–ҙмҡ”</div>
        )}
      </div>
    );

    // в”Җв”Җ кёҖм“°кё° в”Җв”Җ
    if (showWrite) return (
      <div className="cn-card" data-tab="challenge">
        <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'16px' }}>
          <button onClick={() => { setShowWrite(false); setWriteErr(''); }}
            style={{ background:'var(--bg-soft)', border:'none', borderRadius:'8px', padding:'6px 12px', cursor:'pointer', fontSize:'13px', fontWeight:'700', color:'var(--text-sub)' }}>
            вҶҗ м·ЁмҶҢ
          </button>
          <span style={{ fontSize:'15px', fontWeight:'800' }}>вңҸпёҸ кёҖм“°кё° В· {currentCat?.label}</span>
        </div>
        {writeErr && <div style={{ background:'var(--cn-danger-100)', border:'1px solid var(--cn-danger)', borderRadius:'8px', padding:'10px 12px', fontSize:'13px', color:'var(--cn-danger)', marginBottom:'12px' }}>{writeErr}</div>}
        <input value={writeTitle} onChange={e=>{setWriteTitle(e.target.value);setWriteErr('');}}
          placeholder="м ңлӘ©мқ„ мһ…л Ҙн•ҳм„ёмҡ”"
          style={{ width:'100%', border:'1px solid var(--input-border)', borderRadius:'10px', padding:'11px 14px', fontSize:'15px', fontWeight:'700', outline:'none', background:'var(--input-bg)', color:'var(--text)', fontFamily:'inherit', marginBottom:'10px', boxSizing:'border-box' }} />
        <textarea value={writeBody} onChange={e=>{setWriteBody(e.target.value);setWriteErr('');}}
          placeholder="лӮҙмҡ©мқ„ мһ…л Ҙн•ҳм„ёмҡ”..."
          rows={8}
          style={{ width:'100%', border:'1px solid var(--input-border)', borderRadius:'10px', padding:'11px 14px', fontSize:'14px', outline:'none', background:'var(--input-bg)', color:'var(--text)', fontFamily:'inherit', resize:'vertical', lineHeight:1.7, marginBottom:'12px', boxSizing:'border-box' }} />
        {!isAdmin && <div style={{ fontSize:'12px', color:'var(--text-mute)', marginBottom:'12px' }}>вңҚпёҸ мһ‘м„ұ нӣ„ кҙҖлҰ¬мһҗ мҠ№мқё мқҙнӣ„ кІҢмӢңлҗ©лӢҲлӢӨ.</div>}
        <button onClick={submitPost} disabled={writeBusy}
          style={{ width:'100%', background: writeBusy?'var(--divider)':'var(--cn-brand)', color: writeBusy?'var(--text-mute)':'#fff', border:'none', borderRadius:'10px', padding:'13px', fontSize:'15px', fontWeight:'800', cursor: writeBusy?'default':'pointer' }}>
          {writeBusy ? 'кІҢмӢң мӨ‘...' : 'кІҢмӢңн•ҳкё°'}
        </button>
      </div>
    );

    // в”Җв”Җ л©”мқё в”Җв”Җ
    return (
      <>
        {/* мұҢлҰ°м§Җ мҡ”м•Ҫ (м»ҙнҢ©нҠё) */}
        <div className="cn-card" data-tab="challenge" style={{ marginBottom:'8px' }}>
          <div style={{ display:'flex', gap:'8px', alignItems:'center' }}>

  /* в”Җв”Җ лӮҙ м •ліҙ мҲҳм • лӘЁлӢ¬ в”Җв”Җ */
  const ProfileEditModal = ({ authUser, userId, onClose, onAvatarUpdate }) => {
    const [profile, setProfile] = React.useState({ name:'', phone:'', height:'', avatar_url:'' });
    const [loading, setLoading] = React.useState(true);
    const [saving, setSaving] = React.useState(false);
    const [uploading, setUploading] = React.useState(false);
    const [msg, setMsg] = React.useState('');
    const avatarRef = React.useRef(null);

    React.useEffect(() => {
      if (!userId) { setLoading(false); return; }
      supa.from('cn_profiles').select('name,phone,height,grade,avatar_url').eq('id', userId).single()
        .then(({ data }) => {
          if (data) setProfile({ name: data.name||'', phone: data.phone||'', height: data.height||'', avatar_url: data.avatar_url||'' });
          setLoading(false);
        });
    }, [userId]);

    const handleAvatarChange = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) { setMsg('вқҢ мӮ¬м§„мқҖ 2MB мқҙн•ҳл§Ң к°ҖлҠҘн•ҙмҡ”.'); return; }
      setUploading(true); setMsg('');
      const ext = file.name.split('.').pop();
      const path = `${userId}/avatar.${ext}`;
      const { error: upErr } = await supa.storage.from('avatar').upload(path, file, { upsert: true, contentType: file.type });
      if (upErr) { setMsg('вқҢ м—…лЎңл“ң мӢӨнҢЁ: ' + upErr.message); setUploading(false); return; }
      const { data: { publicUrl } } = supa.storage.from('avatar').getPublicUrl(path);
      const url = publicUrl + '?t=' + Date.now();
      await supa.from('cn_profiles').update({ avatar_url: url }).eq('id', userId);
      setProfile(p => ({ ...p, avatar_url: url }));
      if (onAvatarUpdate) onAvatarUpdate(url);
      setUploading(false);
      setMsg('вң… мӮ¬м§„мқҙ м—…лҚ°мқҙнҠёлҗҗм–ҙмҡ”!');
    };

    const save = async () => {
      setSaving(true); setMsg('');
      const h = profile.height ? parseFloat(profile.height) : null;

        setTimeout(onClose, 1200);

        <div style={{ background:'var(--card-bg)', borderRadius:'18px', padding:'24px', width:'100%', maxWidth:'420px', boxShadow:'0 8px 40px rgba(0,0,0,0.25)', maxHeight:'90vh', overflowY:'auto' }}>

            </button>

  /* в”Җв”Җ мҝ нҢЎ нҢҢнҠёл„ҲмҠӨ н•„мҲҳ кі м§Җл¬ё в”Җв”Җ */
  const COUPANG_DISCLOSURE = 'мқҙ нҷ”л©ҙм—җлҠ” мҝ нҢЎ нҢҢнҠёл„ҲмҠӨ нҷңлҸҷмқҳ мқјнҷҳмңјлЎң, мқҙм—җ л”°лҘё мқјм •м•Ўмқҳ мҲҳмҲҳлЈҢлҘј м ңкіөл°ӣлҠ” л§ҒнҒ¬к°Җ нҸ¬н•Ёлҗ  мҲҳ мһҲмҠөлӢҲлӢӨ.';

  const CoupangProducts = () => {

  /* в”Җв”Җ кҙҖлҰ¬мһҗмҡ©: мҝ нҢЎ нҢҢнҠёл„ҲмҠӨ м„Өм • лӘЁлӢ¬ в”Җв”Җ */
  const CoupangAdminModal = ({ onClose }) => {

    const addLink = () => setCfg(c => ({ ...c, links: [ ...(c.links||[]), { title:'', url:'' } ] }));
    const delLink = (i) => setCfg(c => ({ ...c, links: (c.links||[]).filter((_,idx)=>idx!==i) }));
    const save = async () => {
      setBusy(true); setMsg('');
      const payload = { id:1, coupang_enabled: !!cfg.coupang_enabled, coupang_id: cfg.coupang_id || null,
        coupang_note: cfg.coupang_note || null, links: (cfg.links||[]).filter(l => l.url && l.url.trim()),

      const { error } = await supa.from('cn_ad_config').upsert(payload, { onConflict:'id' });

    };

    return (
      <div style={{ position:'fixed', inset:0, background:'var(--modal-scrim)', zIndex:5000,
                    display:'flex', alignItems:'center', justifyContent:'center', padding:'20px' }} onClick={onClose}>
        <div style={{ background:'var(--card-bg)', borderRadius:'18px', padding:'24px', width:'100%', maxWidth:'460px', maxHeight:'90vh', overflowY:'auto' }}
             onClick={e => e.stopPropagation()}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'14px' }}>
            <div style={{ fontSize:'20px', fontWeight:'800', color:'var(--text)' }}>рҹӣ’ мҝ нҢЎ нҢҢнҠёл„ҲмҠӨ м„Өм •</div>
            <button onClick={onClose} style={{ background:'var(--divider)', border:'none', borderRadius:'10px', width:'40px', height:'40px', cursor:'pointer', fontSize:'18px', color:'var(--text-sub)' }}>вң•</button>
          </div>

          {/* м•ҲлӮҙл¬ё */}
          <div style={{ fontSize:'13px', color:'var(--text-sub)', lineHeight:1.75, background:'var(--input-bg)', borderRadius:'12px', padding:'14px 16px', marginBottom:'16px', border:'1px solid var(--card-border)' }}>
            <div style={{ fontWeight:'800', color:'var(--text)', marginBottom:'6px' }}>рҹ“Ң мҝ нҢЎ нҢҢнҠёл„ҲмҠӨ м•ҲлӮҙ</div>
            в‘  <strong>partners.coupang.com</strong> к°Җмһ… нӣ„ мғҒн’Ҳ/л§ҒнҒ¬ мғқм„ұ<br/>
            в‘Ў мғқм„ұлҗң <strong>м ңнңҙ л§ҒнҒ¬</strong>лҘј м•„лһҳм—җ л¶ҷм—¬л„Јкё°<br/>
            в‘ў нҷңм„ұнҷ”н•ҳл©ҙ мӮ¬мҡ©мһҗ нҷ”л©ҙ 'м¶”мІң мғҒн’Ҳ'м—җ л…ём¶ңлҗ©лӢҲлӢӨ<br/>
            в‘Ј <strong>кіөм •мң„ кі м§Җ л¬ёкө¬лҠ” мһҗлҸҷмңјлЎң н‘ңмӢң</strong>лҗ©лӢҲлӢӨ(мқҳл¬ҙ)<br/>
            в‘Ө мҲҳмқөмқҖ нҡҢмӣҗлӢҳ мҝ нҢЎ нҢҢнҠёл„ҲмҠӨ кі„м •м—җ м ҒлҰҪлҸјмҡ”
          </div>

          {!cfg ? <div style={{ padding:'20px', textAlign:'center', color:'var(--text-sub)' }}>л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div> : (
            <div>
              {/* нҷңм„ұнҷ” нҶ кёҖ */}

                <input type="checkbox" checked={!!cfg.coupang_enabled} onChange={e => upd({ coupang_enabled: e.target.checked })} style={{ width:'22px', height:'22px' }} />
              </label>

              <div style={{ fontSize:'13px', fontWeight:'700', color:'var(--text-sub)', marginBottom:'6px' }}>нҢҢнҠёл„ҲмҠӨ лӢүл„Өмһ„/ID (м„ нғқ)</div>
              <input value={cfg.coupang_id || ''} onChange={e => upd({ coupang_id: e.target.value })} placeholder="мҳҲ: carenote" style={{ ...inp, marginBottom:'16px' }} />

              <div style={{ fontSize:'13px', fontWeight:'700', color:'var(--text-sub)', marginBottom:'8px' }}>м¶”мІң мғҒн’Ҳ л§ҒнҒ¬</div>
              {(cfg.links || []).map((l, i) => (
                <div key={i} style={{ display:'flex', gap:'6px', marginBottom:'8px', alignItems:'center' }}>
                  <div style={{ flex:1, display:'flex', flexDirection:'column', gap:'6px' }}>
                    <input value={l.title || ''} onChange={e => setLink(i,'title',e.target.value)} placeholder="мғҒн’Ҳ мқҙлҰ„ (мҳҲ: лҰ¬лёҢл Ҳ мҶҢлӘЁн’Ҳ)" style={inp} />
                    <input value={l.url || ''} onChange={e => setLink(i,'url',e.target.value)} placeholder="мҝ нҢЎ нҢҢнҠёл„ҲмҠӨ л§ҒнҒ¬ (https://...)" style={inp} />
                  </div>
                  <button onClick={() => delLink(i)} style={{ flexShrink:0, width:'40px', height:'40px', border:'1px solid var(--card-border)', borderRadius:'10px', background:'none', color:'var(--cn-danger)', cursor:'pointer', fontSize:'18px' }}>вң•</button>
                </div>
              ))}
              <button onClick={addLink} style={{ width:'100%', padding:'12px', border:'1.5px dashed var(--card-border)', borderRadius:'12px', background:'none', color:'var(--text-sub)', fontWeight:'700', fontSize:'15px', cursor:'pointer', fontFamily:'inherit', marginBottom:'14px' }}>пјӢ мғҒн’Ҳ л§ҒнҒ¬ м¶”к°Җ</button>

              <div style={{ fontSize:'12px', color:'var(--text-mute)', lineHeight:1.6, marginBottom:'14px' }}>

              </div>

                style={{ width:'100%', padding:'15px', border:'none', borderRadius:'14px', background:'var(--cn-brand)', color:'#fff', fontWeight:'800', fontSize:'17px', cursor:'pointer', fontFamily:'inherit', opacity: busy?0.6:1 }}>

  };

  /* в”Җв”Җ н”јліҙнҳёмһҗ лҚ°мқҙн„° мҡ”м•Ҫ(ліөм•Ҫ/мң„н—ҳнҳҲлӢ№) вҖ” л°°м§ҖВ·м•ҢлҰј кіөмҡ© в”Җв”Җ */
  const summarizeWard = (rows) => {
    const settings = ((rows || []).find(r => r.date === '_user_settings_') || {}).payload || {};
    const meds = (settings.medsConfig || []).flatMap(s => (s.items || []).map(m => ({ id:m.id, name:m.name })));
    const byDate = {}; (rows || []).forEach(r => { if (r.date !== '_user_settings_') byDate[r.date] = r.payload || {}; });
    const t = new Date();
    const todayKey = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const today = byDate[todayKey] || {};
    const medDone = meds.length ? meds.filter(m => today.meds && today.meds[m.id]).length
                                : Object.values(today.meds || {}).filter(Boolean).length;
    const medTotal = meds.length || Object.keys(today.meds || {}).length;
    const bsVals = Object.values(today.bs || {}).map(v => parseInt(v)).filter(v => v > 0);
    const low = bsVals.some(v => v < 70), high = bsVals.some(v => v > 250);
    return { medDone, medTotal, medMissed: medTotal > 0 && medDone < medTotal,
             bsRisk: low || high, low, high, hasToday: !!byDate[todayKey] };
  };

  /* в”Җв”Җ кҙҖлҰ¬мһҗмҡ©: н”јліҙнҳёмһҗ нҳ„нҷ© лҢҖмӢңліҙл“ң(мқҪкё° м „мҡ©) в”Җв”Җ */
  const WardDashboard = ({ wardId, wardName, onClose }) => {
    const [rows, setRows] = React.useState(null);
    const [err, setErr]   = React.useState('');
    React.useEffect(() => {
      (async () => {
        const { data, error } = await supa.from('diabetes_data').select('date,payload').eq('user_id', wardId);
        if (error) { setErr(error.message || 'л¶Ҳлҹ¬мҳӨкё° мӢӨнҢЁ'); setRows([]); return; }
        setRows(data || []);
      })();
    }, [wardId]);
    const info = React.useMemo(() => {
      if (!rows) return null;
      const settings = (rows.find(r => r.date === '_user_settings_') || {}).payload || {};
      const meds = (settings.medsConfig || []).flatMap(s => (s.items || []).map(m => ({ id:m.id, name:m.name })));
      const byDate = {}; rows.forEach(r => { if (r.date !== '_user_settings_') byDate[r.date] = r.payload || {}; });
      const dates = Object.keys(byDate).sort();
      const t = new Date();
      const todayKey = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
      const today = byDate[todayKey] || {};
      const lastDate = dates[dates.length-1];
      const last = lastDate ? byDate[lastDate] : {};
      const bsFrom = (d) => { const b=(d&&d.bs)||{}; let v=null; ['bs_bf_am','bs_af_am','bs_bf_lu','bs_af_lu','bs_bf_di','bs_af_di','bs_bed'].forEach(k=>{ if(b[k]) v=b[k]; }); return v; };
      const medState = meds.map(m => ({ ...m, taken: !!(today.meds && today.meds[m.id]) }));
      const medTaken = medState.filter(m => m.taken).length;
      const medTotal = meds.length || Object.keys(today.meds || {}).length;
      const medTakenFallback = medState.length ? medTaken : Object.values(today.meds || {}).filter(Boolean).length;
      return {
        meds: medState, medTaken: medTakenFallback, medTotal,
        lastBs: bsFrom(today) || bsFrom(last),
        steps: today.steps || last.steps || 0,
        weight: today.weight || last.weight || '',
        bp: (today.bp && today.bp.sys) ? today.bp : ((last.bp && last.bp.sys) ? last.bp : null),
        hasToday: !!byDate[todayKey], lastDate,
      };
    }, [rows]);
    const card = { background:'var(--input-bg)', border:'1px solid var(--card-border)', borderRadius:'14px', padding:'16px 18px', marginBottom:'12px' };
    const lbl  = { fontSize:'14px', color:'var(--text-sub)', fontWeight:'700', marginBottom:'6px' };
    return (
      <div style={{ position:'fixed', inset:0, background:'var(--modal-scrim)', zIndex:5200,
                    display:'flex', alignItems:'center', justifyContent:'center', padding:'20px' }} onClick={onClose}>
        <div style={{ background:'var(--card-bg)', borderRadius:'18px', padding:'24px', width:'100%', maxWidth:'440px', maxHeight:'88vh', overflowY:'auto' }}
             onClick={e => e.stopPropagation()}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px' }}>
            <div style={{ fontSize:'21px', fontWeight:'800', color:'var(--text)' }}>рҹ’ҷ {wardName || 'н”јліҙнҳёмһҗ'} нҳ„нҷ©</div>
            <button onClick={onClose} style={{ background:'var(--divider)', border:'none', borderRadius:'10px', width:'40px', height:'40px', cursor:'pointer', fontSize:'18px', color:'var(--text-sub)' }}>вң•</button>
          </div>
          {!info && !err && <div style={{ padding:'30px 0', textAlign:'center', color:'var(--text-sub)' }}>л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div>}
          {err && <div style={{ padding:'16px', color:'var(--cn-danger)', fontSize:'14px' }}>мҳӨлҘҳ: {err}</div>}
          {info && (
            <div>
              <div style={{ fontSize:'13px', color:'var(--text-mute)', marginBottom:'14px' }}>
                {info.hasToday ? 'мҳӨлҠҳ кё°лЎқ кё°мӨҖ' : (info.lastDate ? `мөңк·ј кё°лЎқ: ${info.lastDate}` : 'м•„м§Ғ кё°лЎқмқҙ м—Ҷм–ҙмҡ”')}
              </div>

              <div style={card}>
                <div style={lbl}>рҹ’Ҡ мҳӨлҠҳ ліөм•Ҫ</div>
                {info.meds.length > 0 ? (
                  <>
                    <div style={{ fontSize:'26px', fontWeight:'900', color: info.medTaken===info.medTotal ? 'var(--cn-ok)' : 'var(--cn-warn)' }}>
                      {info.medTaken} / {info.medTotal} мҷ„лЈҢ
                    </div>
                    <div style={{ display:'flex', flexWrap:'wrap', gap:'6px', marginTop:'10px' }}>
                      {info.meds.map(m => (
                        <span key={m.id} style={{ fontSize:'13px', fontWeight:'700', padding:'6px 10px', borderRadius:'999px',
                          background: m.taken ? 'var(--cn-ok-100)' : 'var(--input-bg)', color: m.taken ? 'var(--cn-ok)' : 'var(--text-sub)',
                          border: `1px solid ${m.taken ? 'var(--cn-ok)' : 'var(--card-border)'}` }}>
                          {m.taken ? 'вң“ ' : 'в—Ӣ '}{m.name || 'м•Ҫ'}
                        </span>
                      ))}
                    </div>
                  </>
                ) : <div style={{ fontSize:'22px', fontWeight:'900', color:'var(--text)' }}>{info.medTaken}кұҙ ліөмҡ©</div>}
              </div>

              <div style={card}>
                <div style={lbl}>рҹ©ё мөңк·ј нҳҲлӢ№</div>
                {info.lastBs ? (
                  <div style={{ fontSize:'30px', fontWeight:'900', color: bsColor(String(info.lastBs)) }}>
                    {info.lastBs} <span style={{ fontSize:'14px', color:'var(--text-sub)', fontWeight:'700' }}>mg/dL В· {bsLabel(String(info.lastBs))}</span>
                  </div>
                ) : <div style={{ color:'var(--text-mute)' }}>кё°лЎқ м—ҶмқҢ</div>}
              </div>

              <div style={{ display:'flex', gap:'12px' }}>
                <div style={{ ...card, flex:1, marginBottom:0 }}>
                  <div style={lbl}>рҹ‘ҹ кұёмқҢмҲҳ</div>
                  <div style={{ fontSize:'22px', fontWeight:'900', color:'var(--text)' }}>{Number(info.steps||0).toLocaleString()}</div>
                </div>
                <div style={{ ...card, flex:1, marginBottom:0 }}>
                  <div style={lbl}>рҹ©ә нҳҲм••</div>
                  <div style={{ fontSize:'22px', fontWeight:'900', color:'var(--text)' }}>{info.bp ? `${info.bp.sys}/${info.bp.dia}` : 'вҖ”'}</div>
                </div>
              </div>

              <div style={{ fontSize:'12px', color:'var(--text-mute)', marginTop:'16px', lineHeight:1.6 }}>
                в„№пёҸ мқҪкё° м „мҡ©мһ…лӢҲлӢӨ. к°’мқҖ н”јліҙнҳёмһҗк°Җ кё°лЎқВ·мһҗлҸҷмҲҳм§‘н•ң лҚ°мқҙн„°мҳҲмҡ”.
              </div>
            </div>
          )}
        </div>
      </div>
    );
  };

  /* в”Җв”Җ к°ҖмЎұ м—°кІ°(ліҙнҳё кҙҖкі„) лӘЁлӢ¬ в”Җв”Җ */
  const FamilyModal = ({ onClose }) => {
    const [list, setList] = React.useState({ asGuardian:[], asWard:[] });
    const [email, setEmail] = React.useState('');
    const [busy, setBusy] = React.useState(false);
    const [msg, setMsg] = React.useState('');
    const [viewing, setViewing] = React.useState(null);
    const [summaries, setSummaries] = React.useState({});
    const load = async () => {
      try { const { data } = await supa.rpc('cn_guardian_list');
        const ag = (data && data.asGuardian) || [], aw = (data && data.asWard) || [];
        setList({ asGuardian: ag, asWard: aw });
        const sums = {};
        await Promise.all(ag.filter(w => w.status === 'active').map(async w => {
          const { data: rows } = await supa.from('diabetes_data').select('date,payload').eq('user_id', w.personId);
          if (rows) sums[w.personId] = summarizeWard(rows);
        }));
        setSummaries(sums);
      } catch(e) {}
    };
    React.useEffect(() => { load(); }, []);
    const invite = async () => {
      if (!email.trim()) { setMsg('мғҒлҢҖмқҳ CARENOTE к°Җмһ… мқҙл©”мқјмқ„ мһ…л Ҙн•ҳм„ёмҡ”'); return; }
      setBusy(true); setMsg('');
      const { data, error } = await supa.rpc('cn_guardian_invite', { p_ward_email: email.trim() });
      setBusy(false);
      if (error) { setMsg('мҳӨлҘҳ: ' + error.message); return; }
      if (!data?.ok) { setMsg('вқҢ ' + (data?.error || 'мҙҲлҢҖ мӢӨнҢЁ')); return; }
      setMsg('вң… мҙҲлҢҖлҘј ліҙлғҲм–ҙмҡ”. мғҒлҢҖк°Җ мҲҳлқҪн•ҳл©ҙ м—°кІ°лҗ©лӢҲлӢӨ.'); setEmail(''); load();
    };
    const respond = async (id, ok) => { await supa.rpc('cn_guardian_respond', { p_id:id, p_accept:ok }); load(); };
    const revoke  = async (id) => { await supa.rpc('cn_guardian_revoke', { p_id:id }); load(); };
    const STLABEL = { pending:'лҢҖкё° мӨ‘', active:'м—°кІ°лҗЁ', rejected:'кұ°м ҲлҗЁ' };
    const STCOLOR = { pending:'var(--cn-warn)', active:'var(--cn-ok)', rejected:'var(--text-mute)' };
    const inp = { width:'100%', padding:'14px 16px', border:'1.5px solid var(--card-border)', borderRadius:'12px',
                  fontSize:'16px', outline:'none', fontFamily:'inherit', boxSizing:'border-box',
                  background:'var(--input-bg)', color:'var(--text)' };
    const personRow = (item, mode) => (
      <div key={item.id} style={{ display:'flex', alignItems:'center', gap:'12px', padding:'14px 16px',
             background:'var(--input-bg)', border:'1px solid var(--card-border)', borderRadius:'14px', marginBottom:'8px' }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:'16px', fontWeight:'800', color:'var(--text)' }}>{item.name || item.email || 'мӮ¬мҡ©мһҗ'}</div>
          <div style={{ fontSize:'13px', color:'var(--text-sub)', wordBreak:'break-all' }}>{item.email || ''}</div>
          {mode === 'guardian' && item.status === 'active' && summaries[item.personId] && (() => {
            const s = summaries[item.personId];
            const bad = s.medMissed || s.bsRisk;
            const parts = [];
            parts.push(s.medTotal > 0 ? `ліөм•Ҫ ${s.medDone}/${s.medTotal}` : 'ліөм•Ҫ кё°лЎқ м—ҶмқҢ');
            if (s.low) parts.push('м ҖнҳҲлӢ№вҡ пёҸ'); else if (s.high) parts.push('кі нҳҲлӢ№вҡ пёҸ');
            else if (s.medTotal > 0 && !s.medMissed) parts.push('м •мғҒ');
            else if (s.medMissed) parts.push('лҜёмҷ„лЈҢ');
            return <div style={{ fontSize:'12px', fontWeight:'800', marginTop:'4px', color: bad ? 'var(--cn-warn)' : 'var(--cn-ok)' }}>{parts.join(' В· ')}</div>;
          })()}
        </div>
        <span style={{ fontSize:'13px', fontWeight:'800', color:STCOLOR[item.status] }}>{STLABEL[item.status] || item.status}</span>
        {mode === 'ward' && item.status === 'pending' ? (
          <div style={{ display:'flex', gap:'6px' }}>
            <button onClick={() => respond(item.id, true)} style={{ padding:'9px 12px', border:'none', borderRadius:'10px', background:'var(--cn-ok)', color:'#fff', fontWeight:'800', fontSize:'14px', cursor:'pointer', fontFamily:'inherit' }}>мҲҳлқҪ</button>
            <button onClick={() => respond(item.id, false)} style={{ padding:'9px 12px', border:'1px solid var(--card-border)', borderRadius:'10px', background:'none', color:'var(--text-sub)', fontWeight:'700', fontSize:'14px', cursor:'pointer', fontFamily:'inherit' }}>кұ°м Ҳ</button>
          </div>
        ) : (
          <div style={{ display:'flex', gap:'6px' }}>
            {mode === 'guardian' && item.status === 'active' && (
              <button onClick={() => setViewing({ id:item.personId, name:item.name || item.email })}
                style={{ padding:'9px 14px', border:'none', borderRadius:'10px', background:'var(--cn-brand)', color:'#fff', fontWeight:'800', fontSize:'14px', cursor:'pointer', fontFamily:'inherit' }}>нҳ„нҷ©</button>
            )}
            <button onClick={() => revoke(item.id)} style={{ padding:'9px 12px', border:'1px solid var(--card-border)', borderRadius:'10px', background:'none', color:'var(--cn-danger)', fontWeight:'700', fontSize:'13px', cursor:'pointer', fontFamily:'inherit' }}>н•ҙм ң</button>
          </div>
        )}
      </div>
    );
    return (
      <div style={{ position:'fixed', inset:0, background:'var(--modal-scrim)', zIndex:5000,
                    display:'flex', alignItems:'center', justifyContent:'center', padding:'20px' }} onClick={onClose}>
        <div style={{ background:'var(--card-bg)', borderRadius:'18px', padding:'24px', width:'100%', maxWidth:'440px', maxHeight:'88vh', overflowY:'auto' }}
             onClick={e => e.stopPropagation()}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'14px' }}>
            <div style={{ fontSize:'21px', fontWeight:'800', color:'var(--text)' }}>рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§ к°ҖмЎұ м—°кІ°</div>
            <button onClick={onClose} style={{ background:'var(--divider)', border:'none', borderRadius:'10px', width:'40px', height:'40px', cursor:'pointer', fontSize:'18px', color:'var(--text-sub)' }}>вң•</button>
          </div>
          <div style={{ fontSize:'15px', color:'var(--text-sub)', lineHeight:1.6, marginBottom:'18px' }}>
            к°ҖмЎұмқҳ <strong>ліөм•ҪВ·нҳҲлӢ№</strong>мқ„ мӣҗкІ©мңјлЎң нҷ•мқён•  мҲҳ мһҲм–ҙмҡ”. мғҒлҢҖк°Җ <strong>мҲҳлқҪ</strong>н•ҙм•ј м—°кІ°лҗ©лӢҲлӢӨ.
          </div>

          {/* лӮҳлҘј лҸҢліҙлҠ” к°ҖмЎұ (мҲҳлқҪ лҢҖмғҒ) */}
          {list.asWard.length > 0 && (
            <div style={{ marginBottom:'20px' }}>
              <div style={{ fontSize:'15px', fontWeight:'800', color:'var(--text)', marginBottom:'10px' }}>лӮҳлҘј лҸҢліҙлҠ” к°ҖмЎұ</div>
              {list.asWard.map(it => personRow(it, 'ward'))}
            </div>
          )}

          {/* лӮҙк°Җ лҸҢліҙлҠ” к°ҖмЎұ (мҙҲлҢҖ) */}
          <div style={{ fontSize:'15px', fontWeight:'800', color:'var(--text)', marginBottom:'10px' }}>лӮҙк°Җ лҸҢліҙлҠ” к°ҖмЎұ</div>
          <div style={{ display:'flex', gap:'8px', marginBottom:'10px' }}>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="к°ҖмЎұмқҳ CARENOTE мқҙл©”мқј" style={inp} autoComplete="off" />
            <button onClick={invite} disabled={busy}
              style={{ flex:'0 0 auto', padding:'0 20px', border:'none', borderRadius:'12px', background:'var(--cn-brand)', color:'#fff', fontWeight:'800', fontSize:'16px', cursor:'pointer', fontFamily:'inherit', opacity: busy?0.6:1 }}>
              мҙҲлҢҖ
            </button>
          </div>
          {msg && <div style={{ fontSize:'14px', color:'var(--text)', lineHeight:1.5, background:'var(--input-bg)', borderRadius:'10px', padding:'10px 12px', marginBottom:'10px' }}>{msg}</div>}
          {list.asGuardian.map(it => personRow(it, 'guardian'))}
          {list.asGuardian.length === 0 && <div style={{ fontSize:'13px', color:'var(--text-mute)', padding:'6px 2px' }}>м•„м§Ғ лҸҢліҙлҠ” к°ҖмЎұмқҙ м—Ҷм–ҙмҡ”. мң„м—җм„ң мқҙл©”мқјлЎң мҙҲлҢҖн•ҳм„ёмҡ”.</div>}

          <div style={{ fontSize:'12px', color:'var(--text-mute)', marginTop:'16px', lineHeight:1.6 }}>
            в„№пёҸ мғҒлҢҖмқҳ кұҙк°• м •ліҙлҘј м—ҙлһҢн•ҳл Өл©ҙ мғҒлҢҖмқҳ лҸҷмқҳ(мҲҳлқҪ)к°Җ н•„мҡ”н•©лӢҲлӢӨ. ліҙнҳёмһҗлҠ” <strong>мқҪкё° м „мҡ©</strong>мһ…лӢҲлӢӨ.
          </div>
          {viewing && <WardDashboard wardId={viewing.id} wardName={viewing.name} onClose={() => setViewing(null)} />}
        </div>
      </div>
    );
  };

  /* в”Җв”Җ нҷҲ мӣҗн„°м№ҳ мһ…л Ҙ: нҳҲлӢ№(нҒ° мҠӨн…ҢнҚј) в”Җв”Җ */
  const QuickGlucose = ({ day, onSave }) => {
    const pickDefault = () => {
      const now = new Date(); const h = now.getHours() + now.getMinutes() / 60;
      const w = TIME_WINDOWS.find(t => h >= t.startH && h < t.endH);
      return w ? w.id : 'bs_bf_am';
    };
    const [slot, setSlot] = React.useState(pickDefault);
    const [val,  setVal]  = React.useState(() => { const c = day?.bs?.[slot]; return c ? parseInt(c) : 110; });
    const [justSaved, setJustSaved] = React.useState(false);
    React.useEffect(() => { const c = day?.bs?.[slot]; setVal(c ? parseInt(c) : 110); setJustSaved(false); }, [slot]);
    const field = BS_FIELDS.find(f => f.id === slot);
    const c = bsColor(String(val));
    const bump = (d) => { setVal(v => Math.max(20, Math.min(600, v + d))); setJustSaved(false); };
    const save = () => { onSave(slot, String(val)); setJustSaved(true); };
    const rnd = { border:'none', borderRadius:'14px', cursor:'pointer', fontFamily:'inherit', fontWeight:'900', color:'#fff' };
    return (
      <div style={{ marginBottom:'20px' }}>
        <div style={{ fontSize:'15px', fontWeight:'700', color:'var(--text-sub)', marginBottom:'8px' }}>рҹ©ё нҳҲлӢ№ л№ лҘё кё°лЎқ</div>
        <div style={{ display:'flex', gap:'6px', overflowX:'auto', paddingBottom:'6px', marginBottom:'10px' }}>
          {BS_FIELDS.map(f => {
            const on = f.id === slot;
            return (
              <button key={f.id} onClick={() => setSlot(f.id)}
                style={{ flex:'0 0 auto', padding:'8px 12px', borderRadius:'20px', cursor:'pointer', fontFamily:'inherit',
                         fontSize:'13px', fontWeight:'700', whiteSpace:'nowrap',
                         border: on ? '2px solid var(--cn-brand)' : '1px solid var(--card-border)',
                         background: on ? 'var(--cn-brand)' : 'var(--input-bg)', color: on ? '#fff' : 'var(--text-sub)' }}>
                {f.icon} {f.label}
              </button>
            );
          })}
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:'10px' }}>
          <button onClick={() => bump(-1)} style={{ ...rnd, width:'56px', height:'56px', fontSize:'28px', background:'var(--cn-brand)' }}>пјҚ</button>
          <div style={{ flex:1, textAlign:'center' }}>
            <div style={{ fontSize:'52px', fontWeight:'900', color:c, lineHeight:1, fontVariantNumeric:'tabular-nums' }}>{val}</div>
            <div style={{ fontSize:'13px', color:'var(--text-sub)', marginTop:'2px' }}>mg/dL В· {bsLabel(String(val))}</div>
          </div>
          <button onClick={() => bump(1)} style={{ ...rnd, width:'56px', height:'56px', fontSize:'28px', background:'var(--cn-brand)' }}>пјӢ</button>
        </div>
        <div style={{ display:'flex', gap:'8px', marginTop:'10px' }}>
          <button onClick={() => bump(-10)} style={{ ...rnd, flex:'0 0 auto', padding:'12px 14px', fontSize:'15px', background:'var(--text-mute)' }}>пјҚ10</button>
          <button onClick={save} style={{ ...rnd, flex:1, padding:'14px', fontSize:'17px', background: justSaved ? 'var(--cn-ok)' : 'var(--cn-brand)' }}>
            {justSaved ? 'вң“ м ҖмһҘлҗЁ' : `${field ? field.label : ''} м ҖмһҘ`}
          </button>
          <button onClick={() => bump(10)} style={{ ...rnd, flex:'0 0 auto', padding:'12px 14px', fontSize:'15px', background:'var(--text-mute)' }}>пјӢ10</button>
        </div>
      </div>
    );
  };

  /* в”Җв”Җ нҷҲ мӣҗн„°м№ҳ мһ…л Ҙ: ліөм•Ҫ(мӣҗнғӯ) в”Җв”Җ */
  const QuickMeds = ({ day, meds, onToggle, onAllDone }) => {
    if (!meds || !meds.length) return null;
    const isTaken = (id) => !!(day?.meds && day.meds[id]);
    const takenN = meds.filter(m => isTaken(m.id)).length;
    const allDone = takenN === meds.length;
    return (
      <div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'8px' }}>
          <div style={{ fontSize:'15px', fontWeight:'700', color:'var(--text-sub)' }}>рҹ’Ҡ мҳӨлҠҳ ліөм•Ҫ</div>
          <div style={{ fontSize:'13px', color:'var(--text-sub)' }}>{takenN}/{meds.length}</div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:'8px', marginBottom:'10px' }}>
          {meds.map(m => {
            const on = isTaken(m.id);
            return (
              <button key={m.id} onClick={() => onToggle(m.id)}
                style={{ display:'flex', alignItems:'center', gap:'12px', padding:'14px 16px', borderRadius:'14px',
                         cursor:'pointer', fontFamily:'inherit', textAlign:'left',
                         border: on ? '2px solid var(--cn-ok)' : '1px solid var(--card-border)',
                         background: on ? 'var(--cn-ok-100)' : 'var(--input-bg)' }}>
                <span style={{ width:'30px', height:'30px', borderRadius:'50%', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center',
                               background: on ? 'var(--cn-ok)' : 'var(--card-border)', color:'#fff', fontSize:'17px', fontWeight:'900' }}>{on ? 'вң“' : ''}</span>
                <span style={{ fontSize:'16px', fontWeight:'700', color:'var(--text)' }}>{m.name || 'м•Ҫ'}</span>
              </button>
            );
          })}
        </div>
        <button onClick={() => onAllDone(meds.map(m => m.id))} disabled={allDone}
          style={{ width:'100%', padding:'15px', border:'none', borderRadius:'14px', cursor: allDone ? 'default' : 'pointer',
                   fontFamily:'inherit', fontSize:'17px', fontWeight:'800', color:'#fff',
                   background: allDone ? 'var(--cn-ok)' : 'var(--cn-brand)', opacity: allDone ? 0.75 : 1 }}>
          {allDone ? 'вң“ мҳӨлҠҳ ліөм•Ҫ мҷ„лЈҢ!' : 'мҳӨлҠҳ ліөм•Ҫ лӢӨ н–Ҳм–ҙмҡ”'}
        </button>
      </div>
    );
  };

  /* в”Җв”Җ кёҖмһҗ нҒ¬кё° м„ нғқ (м „м—ӯ zoom) в”Җв”Җ */
  const TextSizeControl = () => {
    const [scale, setScale] = React.useState(() => parseFloat(localStorage.getItem('cn_text_scale') || '1.12'));
    const opts = [ { v:1.0, label:'н‘ңмӨҖ' }, { v:1.12, label:'нҒ¬кІҢ' }, { v:1.28, label:'м•„мЈј нҒ¬кІҢ' } ];
    const pick = (v) => { setScale(v); if (window.cnApplyTextScale) window.cnApplyTextScale(v); };
    const sel = (v) => Math.abs(scale - v) < 0.01;
    return (
      <div style={{ padding:'12px 14px', background:'var(--card-bg)', border:'1px solid var(--card-border)', borderRadius:'12px', marginBottom:'8px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:'12px', marginBottom:'10px' }}>
          <span style={{ fontSize:'20px' }}>рҹ” </span>
          <div>
            <div style={{ fontSize:'15px', fontWeight:'700', color:'var(--text)' }}>кёҖмһҗ нҒ¬кё°</div>
            <div style={{ fontSize:'12px', color:'var(--text-sub)' }}>нҷ”л©ҙ м „мІҙ кёҖмһҗВ·лІ„нҠј нҒ¬кё°</div>
          </div>
        </div>
        <div style={{ display:'flex', gap:'8px' }}>
          {opts.map(o => (
            <button key={o.v} onClick={() => pick(o.v)}
              style={{ flex:1, padding:'11px 6px', borderRadius:'10px', cursor:'pointer', fontFamily:'inherit',
                       fontSize:'14px', fontWeight:'800',
                       border: sel(o.v) ? '2px solid var(--cn-brand)' : '1px solid var(--card-border)',
                       background: sel(o.v) ? 'var(--cn-brand)' : 'var(--input-bg)',
                       color: sel(o.v) ? '#fff' : 'var(--text)' }}>
              {o.label}
            </button>
          ))}
        </div>
      </div>
    );
  };

  const ProfileTab = ({ authUser, userId, onSync, onChangePassword, onDataRecovery, onFeedback, onImport, darkMode, onToggleDark, onGoals, onLibre, onNotif, onFamily, isAdmin, onCoupangAdmin }) => {
    const [showEdit, setShowEdit] = React.useState(false);
    const [avatarUrl, setAvatarUrl] = React.useState('');
    const [profileName, setProfileName] = React.useState('');
    React.useEffect(() => {
      if (!userId) return;
      supa.from('cn_profiles').select('avatar_url,name,grade').eq('id', userId).maybeSingle()
        .then(({ data }) => { if (data) { setAvatarUrl(data.avatar_url||''); setProfileName(data.name||''); } });
    }, [userId]);
    const Row = ({ icon, label, sub, onClick, accent }) => (
      <button onClick={onClick}
        style={{ width:'100%', background:'var(--card-bg)', border:'1px solid var(--card-border)', borderRadius:'10px',
                 padding:'10px 12px', display:'flex', alignItems:'center', gap:'10px', cursor:'pointer',
                 marginBottom:'7px', textAlign:'left', fontFamily:'inherit' }}>
        <div style={{ fontSize:'18px', width:'28px', height:'28px', background: accent || 'var(--cn-brand-100)', color: accent?'#fff':'var(--cn-brand)',
                     borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>{icon}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:'14px', fontWeight:'700', color:'var(--text)' }}>{label}</div>
          {sub && <div style={{ fontSize:'11px', color:'var(--text-sub)', marginTop:'1px' }}>{sub}</div>}
        </div>

                     padding:'14px 16px', marginBottom:'12px', color:'#fff', display:'flex', justifyContent:'space-between', alignItems:'center', gap:'10px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'12px' }}>
            {avatarUrl
              ? <img src={avatarUrl} alt="н”„лЎңн•„" style={{ width:'48px', height:'48px', borderRadius:'50%', objectFit:'cover', border:'2px solid rgba(255,255,255,0.6)', flexShrink:0 }} />
              : <div style={{ width:'48px', height:'48px', borderRadius:'50%', background:'rgba(255,255,255,0.2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'20px', fontWeight:'700', flexShrink:0 }}>
                  {(profileName||authUser?.email||'?')[0].toUpperCase()}
                </div>}
            <div>
              {profileName && <div style={{ fontSize:'15px', fontWeight:'800', marginBottom:'2px' }}>{profileName}</div>}
              <div style={{ fontSize:'12px', opacity:0.85, wordBreak:'break-all' }}>{authUser?.email || 'Guest'}</div>
            </div>
          </div>

            style={{ background:'rgba(255,255,255,0.2)', border:'1px solid rgba(255,255,255,0.35)', color:'#fff', borderRadius:'8px',
              padding:'6px 12px', cursor:'pointer', fontSize:'12px', fontWeight:'700', whiteSpace:'nowrap', fontFamily:'inherit', flexShrink:0 }}>
            вңҸпёҸ мҲҳм •
          </button>
        </div>
        <div style={{ fontSize:'12px', fontWeight:'700', color:'var(--text-sub)', margin:'8px 4px 6px' }}>лӘ©н‘ң В· лҚ°мқҙн„°</div>
        <Row icon="рҹҺҜ" label="лӘ©н‘ң м„Өм •" sub="н•ҳлЈЁ кұёмқҢмҲҳ В· лӘ©н‘ң мІҙмӨ‘" onClick={onGoals} />

        <Row icon="рҹ”‘" label="л№„л°ҖлІҲнҳё ліҖкІҪ" sub="мғҲ л№„л°ҖлІҲнҳёлЎң м—…лҚ°мқҙнҠё" onClick={onChangePassword} />
        <Row icon="рҹ’¬" label="н”јл“ңл°ұ В· лІ„к·ёмӢ кі " sub="лІ„к·ё лҰ¬нҸ¬нҠё лҳҗлҠ” кё°лҠҘ м ңм•Ҳ" onClick={onFeedback} />

        {isAdmin && (

            <div style={{ fontSize:'12px', fontWeight:'700', color:'var(--text-sub)', margin:'10px 4px 6px' }}>кҙҖлҰ¬мһҗ</div>
            <Row icon="рҹӣ’" label="мҝ нҢЎ нҢҢнҠёл„ҲмҠӨ м„Өм •" sub="м¶”мІң мғҒн’Ҳ л§ҒнҒ¬ В· л…ём¶ң кҙҖлҰ¬" onClick={onCoupangAdmin} />
          </>
        )}

        <CoupangProducts />

        <div style={{ textAlign:'center', fontSize:'11px', color:'var(--text-mute)', marginTop:'14px' }}>

          <a href="advertise.html" target="_blank" rel="noopener" style={{ color:'var(--text-sub)', fontWeight:'600', textDecoration:'none' }}>рҹ“Ј кҙ‘кі В·м ңнңҙ л¬ёмқҳ</a>
