<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CARENOTE – 내 몸을 기록하는 노트</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      /* CARENOTE Design Tokens v2.0 */
      --cn-brand:        #2F6BFF;
      --cn-brand-600:    #1F4FD9;
      --cn-brand-100:    #EAF1FF;
      --cn-ink:          #0B1B3B;
      --cn-ok:           #10B981;
      --cn-ok-100:       #E6FAF4;
      --cn-warn:         #F59E0B;
      --cn-warn-100:     #FFF7E0;
      --cn-danger:       #EF4444;
      --cn-danger-100:   #FFECEC;
      --cn-low:          #8B5CF6;
      --cn-low-100:      #F3EDFF;
      --bg:              #F4F6FB;
      --bg-soft:         #ECF0F8;
      --card-bg:         #FFFFFF;
      --card-border:     #E5EAF2;
      --card-shadow:     0 1px 2px rgba(11,27,59,0.04), 0 4px 16px rgba(11,27,59,0.05);
      --text:            #0B1B3B;
      --text-sub:        #5B6B85;
      --text-mute:       #8C98AD;
      --input-bg:        var(--input-bg);
      --input-border:    #E5EAF2;
      --divider:         #EEF1F6;
      --chart-grid:      rgba(11,27,59,0.08);
      --chart-axis:      #8C98AD;
      --modal-scrim:     rgba(11,27,59,0.55);
      --font-num: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    }
    body.dark {
      --cn-brand:        #5B8CFF;
      --cn-brand-600:    #3A6FE8;
      --cn-brand-100:    #12244A;
      --cn-ink:          #E8EEF9;
      --cn-ok:           #34D399;
      --cn-ok-100:       #06281D;
      --cn-warn:         #FBBF24;
      --cn-warn-100:     #2A1F00;
      --cn-danger:       #FB7185;
      --cn-danger-100:   #2A0B10;
      --cn-low:          #A78BFA;
      --cn-low-100:      var(--cn-low-100);
      --bg:              #000000;
      --bg-soft:         #050507;
      --card-bg:         #0A0A0F;
      --card-border:     #1C1F28;
      --card-shadow:     0 1px 2px rgba(0,0,0,0.6), 0 6px 20px rgba(0,0,0,0.5);
      --text:            #F2F5FA;
      --text-sub:        #A0ABC0;
      --text-mute:       #6B7689;
      --input-bg:        #0D0F15;
      --input-border:    #1C1F28;
      --divider:         #161923;
      --chart-grid:      rgba(255,255,255,0.06);
      --chart-axis:      #6B7689;
      --modal-scrim:     rgba(0,0,0,0.82);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      word-break: keep-all;
      transition: background 0.25s, color 0.25s;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
    input, textarea, select { font-family: inherit; font-size: inherit; }
    button { font-family: inherit; }
    .med-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--cn-brand); flex-shrink: 0; }
    .chart-wrap { position: relative; height: 200px; }
    .cn-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      margin-bottom: 18px;
      transition: background 0.25s, border-color 0.25s;
    }
    .cn-divider { border-color: var(--divider); }

    /* ── 다크모드 포괄 오버라이드 ── */
    body.dark input,
    body.dark textarea,
    body.dark select {
      background: var(--input-bg) !important;
      color: var(--text) !important;
      border-color: var(--input-border) !important;
      color-scheme: dark;
    }
    body.dark input::placeholder,
    body.dark textarea::placeholder { color: var(--text-sub) !important; opacity: 1 !important; }

    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr !important; } }

    /* 혈당 입력 스피너 제거 (숫자와 단위 겹침 방지) */
    .bs-num-input::-webkit-inner-spin-button,
    .bs-num-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .bs-num-input { -moz-appearance: textfield; }
  .cn-num, .cn-num * { font-family: var(--font-num) !important; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }

  /* ── Tab Navigation System ── */
  /* 기본: 모바일에서 모든 Card는 숨김. data-current-tab과 매치되는 것만 표시 */
  @media (max-width: 1023px) {
    body[data-current-tab] .cn-card[data-tab]:not([data-tab=""]) { display: none; }
    body[data-current-tab="home"]      .cn-card[data-tab="home"],
    body[data-current-tab="record"]    .cn-card[data-tab="record"],
    body[data-current-tab="report"]    .cn-card[data-tab="report"],
    body[data-current-tab="challenge"] .cn-card[data-tab="challenge"],
    body[data-current-tab="profile"]   .cn-card[data-tab="profile"] { display: block; }
    /* 모바일에서 RIGHT 컬럼이 별도 보이지 않도록 그리드 단일컬럼 */
    .main-grid { grid-template-columns: 1fr !important; gap: 12px !important; }
    /* 날짜 이동은 기록 탭에서만 의미있게 보이게, 다른 탭에선 전역 표시 유지 OK */
  }
  .cn-tab-only-mobile { display: block; }
  @media (min-width: 1024px) { .cn-tab-only-mobile { display: none; } }
  .cn-tabbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card-bg);
    border-top: 1px solid var(--card-border);
    display: grid; grid-template-columns: repeat(5, 1fr);
    z-index: 100; padding: 6px 0 max(6px, env(safe-area-inset-bottom));
    box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  }
  .cn-tab-btn {
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 4px; color: var(--text-mute);
    font-size: 11px; font-weight: 600; font-family: inherit;
    transition: color 0.15s ease;
  }
  .cn-tab-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .cn-tab-btn.active { color: var(--cn-brand); }
  .cn-tab-btn:hover { color: var(--text); }
  .cn-tab-btn.active:hover { color: var(--cn-brand); }
  body.has-tabbar { padding-bottom: 80px; }
  /* 데스크톱에서는 탭바 숨기고 기존 레이아웃 유지 */
  @media (min-width: 1024px) {
    .cn-tabbar { display: none; }
    body.has-tabbar { padding-bottom: 0; }
    .cn-tab-content { display: block !important; }
    .main-grid { display: grid !important; }
  }
  @media (max-width: 1023px) {
    .main-grid { grid-template-columns: 1fr !important; gap: 12px !important; }
  }
  .cn-challenge-card {
    background: linear-gradient(135deg, var(--cn-brand-100), var(--card-bg));
    border: 1px solid var(--cn-brand);
    border-radius: 16px; padding: 20px; margin-bottom: 14px;
  }
  .cn-badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-top: 16px; }
  .cn-badge {
    aspect-ratio: 1; background: var(--input-bg); border: 1.5px solid var(--card-border);
    border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 10px; text-align: center; gap: 4px; transition: all 0.2s ease;
  }
  .cn-badge.earned { background: var(--cn-brand-100); border-color: var(--cn-brand); }
  .cn-badge-icon { font-size: 28px; filter: grayscale(1); opacity: 0.35; }
  .cn-badge.earned .cn-badge-icon { filter: none; opacity: 1; }
  .cn-badge-name { font-size: 11px; font-weight: 700; color: var(--text); }
  .cn-badge-desc { font-size: 10px; color: var(--text-sub); line-height: 1.3; }
  .cn-streak-big { font-family: var(--font-num); font-size: 56px; font-weight: 700; color: var(--cn-brand); line-height: 1; letter-spacing: -0.02em; }

  /* ── 대시보드 홈탭 추가 스타일 ── */
  .dash-score-card { background: linear-gradient(135deg, var(--card-bg) 0%, var(--bg-soft) 100%); border: 1px solid var(--card-border); border-radius: 16px; padding: 18px; margin-bottom: 14px; display: flex; align-items: center; gap: 18px; box-shadow: var(--card-shadow); }
  .dash-score-info { flex: 1; }
  .dash-score-title { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 2px; }
  .dash-score-breakdown { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
  .dash-score-row { display: flex; align-items: center; gap: 6px; }
  .dash-score-bar-bg { flex: 1; height: 5px; background: var(--bg-soft); border-radius: 3px; border: 1px solid var(--card-border); overflow: hidden; }
  .dash-score-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .dash-metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .dash-metric-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 13px 14px; box-shadow: var(--card-shadow); display: flex; flex-direction: column; gap: 4px; }
  .dash-metric-label { font-size: 11px; font-weight: 700; color: var(--text-sub); }
  .dash-metric-val { font-size: 22px; font-weight: 900; line-height: 1.1; letter-spacing: -0.5px; }
  .dash-metric-unit { font-size: 11px; color: var(--text-mute); }
  .dash-trend { display: inline-flex; align-items: center; gap: 2px; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
  .dash-trend-up { background: rgba(239,68,68,0.12); color: var(--cn-danger); }
  .dash-trend-dn { background: rgba(16,185,129,0.12); color: var(--cn-ok); }
  .dash-trend-st { background: var(--cn-brand-100); color: var(--cn-brand); }
  .dash-insight-card { background: linear-gradient(135deg, var(--cn-brand-100), var(--bg-soft)); border: 1px solid var(--cn-brand); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .dash-insight-text { font-size: 13px; line-height: 1.7; color: var(--text); }
  .dash-steps-bars { display: flex; align-items: flex-end; gap: 5px; height: 56px; }
  .dash-step-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .dash-step-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height 0.4s; }
  .dash-step-day { font-size: 9px; color: var(--text-mute); }

  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef, useMemo } = React;

  /* ── 복약 기본 데이터 ─────────────────────────────────── */
  const DEFAULT_MEDS = [
    { slot:'아침 식전',    key:'morn_pre',   color:'var(--cn-brand)', bg:'var(--cn-brand-100)', border:'var(--cn-brand)', icon:'💉',
      items:[{ id:'fiasp_am',      name:'피아스포',           dose:'4단위 주사' }] },
    { slot:'아침 식후 30분', key:'morn_post', color:'var(--cn-ok)', bg:'var(--cn-ok-100)', border:'var(--cn-ok)', icon:'💊',
      items:[{ id:'teneliaam_am', name:'테넬리아앰서방정',   dose:'10/500mg 1정' },
             { id:'thioctacid',   name:'치옥타시드에이취알정', dose:'600mg 1정' }] },
    { slot:'점심 식전',    key:'lunch_pre',  color:'var(--cn-brand)', bg:'var(--cn-brand-100)', border:'var(--cn-brand)', icon:'💉',
      items:[{ id:'fiasp_lunch',   name:'피아스포',           dose:'4단위 주사' }] },
    { slot:'저녁 식전',    key:'din_pre',    color:'var(--cn-brand)', bg:'var(--cn-brand-100)', border:'var(--cn-brand)', icon:'💉',
      items:[{ id:'fiasp_din',     name:'피아스포',           dose:'4단위 주사' }] },
    { slot:'저녁 식후 30분', key:'din_post', color:'var(--cn-ok)', bg:'var(--cn-ok-100)', border:'var(--cn-ok)', icon:'💊',
      items:[{ id:'lipitor',       name:'리피토정',           dose:'10mg 1정' },
             { id:'teneliaam_pm', name:'테넬리아앰서방정',   dose:'10/500mg 1정' },
             { id:'lyrica',        name:'리리카캡슐',         dose:'75mg 1캡슐' }] },
    { slot:'취침 전',      key:'bed',        color:'var(--cn-low)', bg:'var(--cn-low-100)', border:'var(--cn-low)', icon:'💉',
      items:[{ id:'toujeo',        name:'투제오 솔로스타',    dose:'14단위 주사' }] }
  ];
  const genId = () => 'med_' + Math.random().toString(36).slice(2,9);

  const BS_FIELDS = [
    { id:'bs_bf_am', label:'아침 식전',       icon:'🌅', target:'70–130' },
    { id:'bs_af_am', label:'아침 식후 2시간', icon:'☀️',  target:'<180'  },
    { id:'bs_bf_lu', label:'점심 식전',       icon:'🕛', target:'70–130' },
    { id:'bs_af_lu', label:'점심 식후 2시간', icon:'🌤',  target:'<180'  },
    { id:'bs_bf_di', label:'저녁 식전',       icon:'🌆', target:'70–130' },
    { id:'bs_af_di', label:'저녁 식후 2시간', icon:'🌙',  target:'<180'  },
    { id:'bs_bed',   label:'취침 전',         icon:'🌑', target:'100–140'}
  ];

  /* 시간대별 혈당 매핑 윈도우 (애플 건강 연동용) */
  const TIME_WINDOWS = [
    { id:'bs_bf_am', startH:5.5,  endH:8.5  },
    { id:'bs_af_am', startH:9.0,  endH:11.5 },
    { id:'bs_bf_lu', startH:11.0, endH:13.0 },
    { id:'bs_af_lu', startH:13.5, endH:15.5 },
    { id:'bs_bf_di', startH:17.0, endH:19.5 },
    { id:'bs_af_di', startH:20.0, endH:22.0 },
    { id:'bs_bed',   startH:22.0, endH:24.0 }
  ];

  const MEALS = [
    { id:'breakfast', label:'아침 식사', icon:'🌅',
      ph:'예: 현미밥 반공기, 된장국, 두부조림, 나물\n→ 탄수화물 약 45g' },
    { id:'lunch',     label:'점심 식사', icon:'🕛',
      ph:'예: 닭가슴살 샐러드, 삶은 계란 2개, 고구마 반개\n→ 탄수화물 약 40g' },
    { id:'dinner',    label:'저녁 식사', icon:'🌆',
      ph:'예: 잡곡밥 반공기, 생선구이, 시금치나물, 미역국\n→ 탄수화물 약 45g' }
  ];

  /* ── 헬퍼 ─────────────────────────────────────────────── */
  const todayStr = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };
  const fmtDate = (s) => {
    const d = new Date(s + 'T12:00:00');
    const DAY = ['일','월','화','수','목','금','토'];
    return { full:`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAY[d.getDay()]})`, short:`${d.getMonth()+1}/${d.getDate()}` };
  };
  const shiftDate = (s, n) => {
    const d = new Date(s + 'T12:00:00');
    d.setDate(d.getDate() + n);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };
  const bsColor = (v) => { const n=parseInt(v); if(!n) return 'var(--text-mute)'; if(n<70) return 'var(--cn-low)'; if(n<=140) return 'var(--cn-ok)'; if(n<=180) return 'var(--cn-warn)'; return 'var(--cn-danger)'; };
  const bsLabel = (v) => { const n=parseInt(v); if(!n) return ''; if(n<70) return '저혈당'; if(n<=140) return '정상'; if(n<=180) return '주의'; return '높음'; };
  const median  = (arr) => { if(!arr.length) return null; const s=[...arr].sort((a,b)=>a-b); const m=Math.floor(s.length/2); return s.length%2?s[m]:Math.round((s[m-1]+s[m])/2); };
  const emptyDay = () => ({ meds:{}, bs:{}, bp:{sys:'',dia:''}, meals:{}, exercise:{type:'',mins:''}, weight:'', bodyFat:'', note:'' });

  /* ── 공통 UI 컴포넌트 (App 밖에 정의해야 리렌더링 버그 없음) ── */
  /* ── 다크모드 모듈 변수 ─────────────────────────────────── */
  let _dm = localStorage.getItem('cn_dark') === '1';
  if (_dm) document.body.classList.add('dark');

  const Card = ({children, style, tab}) => (
    <div className="cn-card" data-tab={tab} style={style}>
      {children}
    </div>
  );
  const STitle = ({icon, label, right}) => (
    <div style={{ display:'flex', alignItems:'center', gap:'8px', fontSize:'16px', fontWeight:'700', color:'var(--text)', marginBottom:'14px' }}>
      <span>{icon}</span><span>{label}</span>
      {right && <span style={{ marginLeft:'auto', fontSize:'14px', color:'var(--text-sub)', fontWeight:'500' }}>{right}</span>}
    </div>
  );

  /* CARENOTE 펄스 라인 로고 */
  const CareNoteLogo = ({ size = 38, onDark = true }) => {
    const ring = onDark ? 'rgba(255,255,255,0.95)' : 'var(--cn-brand)';
    const pulse = onDark ? '#5B8CFF' : 'var(--cn-brand)';
    const accent = onDark ? '#34D399' : 'var(--cn-ok)';
    return (
      <svg width={size} height={size} viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="19" stroke={ring} strokeWidth="2.5" fill="none"/>
        <path d="M7 24 L14 24 L17 24 L19 17 L22 31 L25 20 L28 27 L31 24 L41 24" stroke={pulse} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
        <circle cx="22" cy="31" r="1.8" fill={accent}/>
      </svg>
    );
  };

  /* ── Gemini 식사 사진 분석 ─────────────────────────────────── */
  const GEMINI_KEY = 'AIzaSyDsRv6gCfI2JrMYORkz8NJuuf9hy7acQYk';

  const fileToBase64 = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
  });

  const analyzeFood = async (imageBase64, mimeType) => {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: mimeType, data: imageBase64 } },
              { text: `이 음식 사진을 분석해 주세요. 인슐린을 맞고 있는 2형 당뇨 환자의 식단 기록입니다.

  const parseAppleHealthXML = async (getChunks, totalBytes, onProgress) => {
    const glucoseByDay = {};
    const weightByDay  = {};
    const bodyFatByDay = {};
    const bpSysByDay   = {}; // 수축기 혈압
    const bpDiaByDay   = {}; // 이완기 혈압

    const TARGET_KEYS = {
      'HKQuantityTypeIdentifierBloodGlucose':           'glucose',
      'HKQuantityTypeIdentifierBodyMass':                'weight',
      'HKQuantityTypeIdentifierBodyFatPercentage':       'fat',
      'HKQuantityTypeIdentifierBloodPressureSystolic':   'bp_sys',
      'HKQuantityTypeIdentifierBloodPressureDiastolic':  'bp_dia',
    };

    const processRecord = (rec) => {
      let type = null;
      for (const [k, t] of Object.entries(TARGET_KEYS)) {
        if (rec.includes(k)) { type = t; break; }
      }
      if (!type) return;
      const val  = parseFloat((rec.match(/\bvalue="([^"]+)"/) || [])[1]);
      const unit = (rec.match(/\bunit="([^"]+)"/) || [])[1] || '';
      const dm   = rec.match(/\bstartDate="(\d{4}-\d{2}-\d{2})\s+(\d{2}):(\d{2})/);
      if (!dm || isNaN(val)) return;
      const dayKey = dm[1];
      const hour   = parseInt(dm[2]) + parseInt(dm[3]) / 60;
      if (type === 'glucose') {
        const mgdl = unit === 'mmol/L' ? Math.round(val * 18.015) : Math.round(val);
        if (!glucoseByDay[dayKey]) glucoseByDay[dayKey] = [];
        glucoseByDay[dayKey].push({ hour, value: mgdl });
      } else if (type === 'weight') {
        const kg = unit === 'lb' ? Math.round(val * 0.453592 * 10) / 10 : Math.round(val * 10) / 10;
        weightByDay[dayKey] = kg;
      } else if (type === 'fat') {
        bodyFatByDay[dayKey] = val <= 1 ? Math.round(val * 100 * 10) / 10 : Math.round(val * 10) / 10;
      } else if (type === 'bp_sys') {
        // 같은 날 여러 번 측정 시 가장 마지막(hour 기준) 값 사용
        if (!bpSysByDay[dayKey] || hour > bpSysByDay[dayKey].hour)
          bpSysByDay[dayKey] = { hour, value: Math.round(val) };
      } else if (type === 'bp_dia') {
        if (!bpDiaByDay[dayKey] || hour > bpDiaByDay[dayKey].hour)
          bpDiaByDay[dayKey] = { hour, value: Math.round(val) };
      }
    };

    let tail = '';           // 이전 청크에서 잘린 불완전한 레코드
    let bytesProcessed = 0;
    let recCount = 0;

    for await (const chunk of getChunks()) {
      const text = tail + chunk;
      let pos = 0;
      let lastEnd = 0;

      while (true) {
        const recStart = text.indexOf('<Record', pos);
        if (recStart === -1) break;
        const recEnd = text.indexOf('/>', recStart);
        if (recEnd === -1) break; // 청크 경계에서 잘린 레코드 → tail로 보관

        const rec = text.substring(recStart, recEnd + 2);
        if (Object.keys(TARGET_KEYS).some(k => rec.includes(k))) processRecord(rec);
        lastEnd = recEnd + 2;
        pos = lastEnd;
        recCount++;
        // 매 50건마다 브라우저에 양보 (UI 반응성 유지)
        if (recCount % 50 === 0) await new Promise(r => setTimeout(r, 0));
      }

      // 마지막 완전한 레코드 이후 텍스트를 다음 청크로 넘김
      tail = text.substring(lastEnd);
      if (tail.length > 30000) tail = tail.slice(-30000); // 안전장치

      bytesProcessed += chunk.length;
      if (onProgress && totalBytes) {
        onProgress(Math.min(99, Math.round(bytesProcessed / totalBytes * 100)));
      }
    }

    // 수축기/이완기 쌍이 모두 있는 날만 혈압으로 저장
    const bpByDay = {};
    Object.keys(bpSysByDay).forEach(d => {
      if (bpDiaByDay[d]) {
        bpByDay[d] = { sys: String(bpSysByDay[d].value), dia: String(bpDiaByDay[d].value) };
      }
    });

    if (onProgress) onProgress(100);
    return { glucoseByDay, weightByDay, bodyFatByDay, bpByDay };
  };

  /* ── LibreView CSV 파싱 ─────────────────────────────────── */
  const parseCSVRow = (line) => {
    const out = []; let inQ = false; let cur = '';
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    out.push(cur.trim());
    return out;
  };

  const parseLVTimestamp = (s) => {
    s = s.replace(/"/g, '').trim();
    // MM-DD-YYYY HH:MM AM/PM (영어/한국어 오전오후)
    let m = s.match(/(\d{1,2})[/-](\d{1,2})[/-](\d{4})\s+(\d{1,2}):(\d{2})\s*(AM|PM|오전|오후)/i);
    if (m) {
      const [,p1,p2,yyyy,hh,min,ap] = m;
      let h = parseInt(hh);
      if (/PM|오후/i.test(ap) && h!==12) h+=12;
      if (/AM|오전/i.test(ap) && h===12) h=0;
      // LibreView는 MM-DD-YYYY 형식
      return { dayKey:`${yyyy}-${String(p1).padStart(2,'0')}-${String(p2).padStart(2,'0')}`, hour:h+parseInt(min)/60 };
    }
    // YYYY-MM-DD HH:MM
    m = s.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{1,2}):(\d{2})/);
    if (m) {
      const [,yyyy,mm,dd,hh,min] = m;
      return { dayKey:`${yyyy}-${mm}-${dd}`, hour:parseInt(hh)+parseInt(min)/60 };
    }
    return null;
  };

  const parseLibreViewCSV = (csvText) => {
    const lines = csvText.split(/\r?\n/);
    let headerIdx = -1;
    for (let i = 0; i < Math.min(lines.length, 20); i++) {
      if (/timestamp|타임스탬프|时间戳|장치.?타임스탬프/i.test(lines[i])) { headerIdx = i; break; }
    }
    if (headerIdx === -1) return null;

    const headers = parseCSVRow(lines[headerIdx]);
    const tsIdx   = headers.findIndex(h => /timestamp|타임스탬프|장치.?타임스탬프/i.test(h));
    const typeIdx = headers.findIndex(h => /record.?type|레코드|기록.?유형/i.test(h));
    const histIdx = headers.findIndex(h => /historic.?glucose|히스토리.*포도당|과거.?혈당/i.test(h));
    const scanIdx = headers.findIndex(h => /scan.?glucose|스캔.*포도당|혈당.?스캔/i.test(h));

    if (tsIdx === -1) return null;

    const glucoseByDay = {};
    for (let i = headerIdx + 1; i < lines.length; i++) {
      const row = parseCSVRow(lines[i]);
      if (row.length <= tsIdx || !row[tsIdx]) continue;
      const recType = (row[typeIdx] || '').replace(/"/g,'').trim();
      if (recType !== '0' && recType !== '1') continue;

      const rawVal = recType === '0'
        ? parseFloat((row[histIdx]||'').replace(/"/g,''))
        : parseFloat((row[scanIdx]||'').replace(/"/g,''));
      if (isNaN(rawVal) || rawVal <= 0) continue;

      const parsed = parseLVTimestamp(row[tsIdx]);
      if (!parsed) continue;
      const { dayKey, hour } = parsed;
      if (!glucoseByDay[dayKey]) glucoseByDay[dayKey] = [];
      glucoseByDay[dayKey].push({ hour, value: Math.round(rawVal) });
    }
    return glucoseByDay;
  };

            throw new Error(`ZIP 안에서 export.xml을 찾을 수 없어요.\n발견된 파일: ${found || '없음'}`);
          }
          setProgress('XML 추출 중...');
          const xmlBlob = await zip.files[xmlFile].async('blob');
          totalBytes = xmlBlob.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = xmlBlob.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else if (file.name.endsWith('.xml')) {
          totalBytes = file.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = file.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else {
          throw new Error('.csv / .zip / .xml 파일만 지원해요.');
        }

        setProgress('혈당·체중·체지방 데이터 추출 중... 0%');
        const parsed = await parseAppleHealthXML(getChunks, totalBytes, (pct) => {
          setProgress(`데이터 분석 중... ${pct}%`);
        });
        const mapped = buildDashboardData(parsed);

        const gDays  = Object.keys(parsed.glucoseByDay).length;
        const wDays  = Object.keys(parsed.weightByDay).length;
        const bfDays = Object.keys(parsed.bodyFatByDay).length;
        const totalReadings = Object.values(parsed.glucoseByDay).reduce((a,b) => a+b.length, 0);

        if (!gDays && !wDays && !bfDays) throw new Error('혈당, 체중, 체지방 데이터를 찾을 수 없어요.\n리브레2가 애플 건강과 연동되어 있는지 확인해 주세요.');

        setPreview({ mapped, gDays, wDays, bfDays, totalReadings });
        setStatus('preview');
      } catch (e) {

        setStatus('error');
      }

          </div>

          <div style={{ borderTop:'1px solid var(--divider)', paddingTop:'16px' }}>
            <div style={{ fontSize:'14px', color:'var(--text-sub)', marginBottom:'6px' }}>다른 기기의 코드 입력 (동기화 코드 변경)</div>
            <div style={{ display:'flex', gap:'8px' }}>
              <input value={input} onChange={e=>setInput(e.target.value)} placeholder="코드를 붙여넣어 주세요"
                style={{ flex:1, border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, borderRadius:'8px', padding:'10px 12px', fontSize:'16px', outline:'none', fontFamily:'monospace' }} />
              <button onClick={apply} style={{ padding:'10px 16px', background:'var(--cn-low)', color:'#fff', border:'none', borderRadius:'8px', cursor:'pointer', fontWeight:'700', fontSize:'16px' }}>적용</button>
            </div>
          </div>
        </div>
      </div>
    );
  };

  /* ── 복약 설정 모달 ──────────────────────────────────── */
  const MedSettingsModal = ({ meds, onSave, onClose, userId }) => {
    const dm = _dm;
    const [cfg, setCfg] = useState(JSON.parse(JSON.stringify(meds)));
    const [editingSlot, setEditingSlot] = useState(null);
    const [editingMed,  setEditingMed]  = useState(null);
    const nameInputRef = useRef(null);
    const [loadingCloud, setLoadingCloud] = useState(false);
    const [loadMsg, setLoadMsg] = useState('');

    // 복약 설정 불러오기 — 4단계 폴백
    // ① 현재 Supabase 계정(authUser.id) → ② localStorage(authUser.id 키)
    // → ③ 예전 기기 UUID(dm_user_id) Supabase → ④ 예전 localStorage 키
    const loadFromCloud = async () => {
      if (!userId) { setLoadMsg('⚠️ 로그인이 필요해요.'); setTimeout(()=>setLoadMsg(''),2500); return; }
      setLoadingCloud(true); setLoadMsg('');
      try {
        // ① 현재 계정 Supabase
        const { data: row } = await supa.from('diabetes_data')
          .select('payload').eq('user_id', userId).eq('date', '_user_settings_').maybeSingle();
        const fromSB = row?.payload?.medsConfig;
        if (fromSB && Array.isArray(fromSB) && fromSB.length > 0) {
          setCfg(JSON.parse(JSON.stringify(fromSB)));
          setLoadMsg('✅ 계정 저장 데이터에서 ' + fromSB.flatMap(s=>s.items).length + '개 약을 불러왔어요!');
          setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),3500); return;
        }

        // ② 현재 계정 localStorage
        const ls1 = localStorage.getItem(`hcd_meds_config_${userId}`);
        const fromLS1 = ls1 ? JSON.parse(ls1) : null;
        if (fromLS1 && Array.isArray(fromLS1) && fromLS1.length > 0) {
          setCfg(JSON.parse(JSON.stringify(fromLS1)));
          setLoadMsg('✅ 이 기기의 로컬 데이터에서 ' + fromLS1.flatMap(s=>s.items).length + '개 약을 불러왔어요!');
          setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),3500); return;
        }

        // ③ 예전 기기 UUID(dm_user_id)로 Supabase 조회
        const legacyId = localStorage.getItem('dm_user_id');
        if (legacyId && legacyId !== userId) {
          const { data: legacyRow } = await supa.from('diabetes_data')
            .select('payload').eq('user_id', legacyId).eq('date', '_user_settings_').maybeSingle();
          const fromLegacySB = legacyRow?.payload?.medsConfig;
          if (fromLegacySB && Array.isArray(fromLegacySB) && fromLegacySB.length > 0) {
            setCfg(JSON.parse(JSON.stringify(fromLegacySB)));
            setLoadMsg('✅ 이전 기기 데이터에서 ' + fromLegacySB.flatMap(s=>s.items).length + '개 약을 불러왔어요! (저장을 눌러 계정에 연결하세요)');
            setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),5000); return;
          }
          // ④ 예전 기기 localStorage 키
          const ls2 = localStorage.getItem(`hcd_meds_config_${legacyId}`);
          const fromLS2 = ls2 ? JSON.parse(ls2) : null;
          if (fromLS2 && Array.isArray(fromLS2) && fromLS2.length > 0) {
            setCfg(JSON.parse(JSON.stringify(fromLS2)));
            setLoadMsg('✅ 이전 기기 로컬 데이터에서 ' + fromLS2.flatMap(s=>s.items).length + '개 약을 불러왔어요! (저장을 눌러 계정에 연결하세요)');
            setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),5000); return;
          }
        }

        setLoadMsg('ℹ️ 저장된 복약 데이터가 없어요. 아래에서 직접 추가해 주세요.');
      } catch(e) {
        setLoadMsg('❌ 불러오기 실패: ' + (e.message||'오류'));
      }
      setLoadingCloud(false);
      setTimeout(()=>setLoadMsg(''), 4000);
    };

    const SLOT_COLORS = [
      { color:'var(--cn-brand)', bg:'var(--cn-brand-100)', border:'var(--cn-brand)' },
      { color:'var(--cn-ok)', bg:'var(--cn-ok-100)', border:'var(--cn-ok)' },
      { color:'var(--cn-low)', bg:'var(--cn-low-100)', border:'var(--cn-low)' },
      { color:'var(--cn-danger)', bg:'var(--cn-danger-100)', border:'var(--cn-danger)' },
      { color:'var(--cn-warn)', bg:'var(--cn-warn-100)', border:'var(--cn-warn)' },
    ];

    // 편집 시작 시 이름 input 자동 포커스 + 전체 선택
    useEffect(() => {
      if (editingMed && nameInputRef.current) {
        setTimeout(() => {
          nameInputRef.current?.focus();
          nameInputRef.current?.select();
        }, 50);
      }
    }, [editingMed]);

    const updSlotName = (key, val) => setCfg(c => c.map(s => s.key===key ? {...s, slot:val} : s));
    const updSlotIcon = (key, val) => setCfg(c => c.map(s => s.key===key ? {...s, icon:val} : s));
    const delSlot = (key) => { if(window.confirm('이 시간대를 삭제할까요?')) setCfg(c => c.filter(s => s.key!==key)); };
    const addSlot = () => {
      const key = 'slot_' + Date.now();
      const col = SLOT_COLORS[cfg.length % SLOT_COLORS.length];
      setCfg(c => [...c, { slot:'새 시간대', key, icon:'💊', items:[], ...col }]);
      setEditingSlot(key);
    };
    const updMedField = (slotKey, medId, field, val) =>
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items: s.items.map(m => m.id===medId ? {...m, [field]:val} : m)} : s));
    const delMed = (slotKey, medId) =>
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items: s.items.filter(m => m.id!==medId)} : s));
    const addMed = (slotKey) => {
      const id = genId();
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items:[...s.items, {id, name:'', dose:'', startDate:'', endDate:''}]} : s));
      setEditingMed({slotKey, medId:id});
    };
    const reset = () => { if(window.confirm('복약 목록을 전부 삭제할까요?')) setCfg([]); };

    const inpSt = { border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, borderRadius:'6px', padding:'6px 10px', fontSize:'16px', width:'100%', outline:'none' };

    return (
      <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.55)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2000,padding:'20px'}}
           onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div style={{background:'var(--card-bg)',borderRadius:'18px',padding:'24px',maxWidth:'520px',width:'100%',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 24px 80px rgba(0,0,0,0.25)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
            <div style={{fontSize:'14px',fontWeight:'800',color:'var(--text)'}}>⚙️ 복약 설정</div>
            <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
              <button onClick={loadFromCloud} disabled={loadingCloud}
                style={{background:loadingCloud?'var(--divider)':'var(--cn-brand-100)',border:'1px solid var(--cn-brand)',
                        borderRadius:'8px',padding:'5px 10px',cursor:loadingCloud?'default':'pointer',
                        fontSize:'12px',fontWeight:'700',color:'var(--cn-brand)',whiteSpace:'nowrap'}}>
                {loadingCloud ? '⏳ 불러오는 중...' : '☁️ 저장된 데이터 불러오기'}
              </button>
              <button onClick={onClose} style={{background:'var(--divider)',border:'none',borderRadius:'8px',width:'32px',height:'32px',cursor:'pointer',fontSize:'14px'}}>✕</button>
            </div>
          </div>
          {loadMsg && (
            <div style={{background: loadMsg.startsWith('✅')?'var(--cn-ok-100)': loadMsg.startsWith('❌')?'var(--cn-danger-100)':'var(--cn-warn-100)',
                         border:`1px solid ${loadMsg.startsWith('✅')?'var(--cn-ok)':loadMsg.startsWith('❌')?'var(--cn-danger)':'var(--cn-warn)'}`,
                         borderRadius:'8px',padding:'8px 12px',marginBottom:'12px',
                         fontSize:'13px',fontWeight:'600',
                         color: loadMsg.startsWith('✅')?'var(--cn-ok)':loadMsg.startsWith('❌')?'var(--cn-danger)':'#92400e'}}>
              {loadMsg}
            </div>
          )}

          {cfg.map(slot => (
            <div key={slot.key} style={{background:slot.bg,border:`1px solid ${slot.border}`,borderRadius:'12px',padding:'12px 14px',marginBottom:'10px'}}>
              {/* 슬롯 헤더 */}
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}}>
                {editingSlot===slot.key ? (
                  <>
                    <input value={slot.icon} onChange={e=>updSlotIcon(slot.key,e.target.value)}
                      style={{width:'44px',border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`,borderRadius:'6px',padding:'4px',fontSize:'14px',textAlign:'center'}}/>
                    <input value={slot.slot} onChange={e=>updSlotName(slot.key,e.target.value)} autoFocus
                      style={{flex:1,border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`,borderRadius:'6px',padding:'6px 10px',fontSize:'16px',fontWeight:'700'}}/>
                    <button onClick={()=>setEditingSlot(null)} style={{background:slot.color,color:'#fff',border:'none',borderRadius:'6px',padding:'5px 10px',cursor:'pointer',fontSize:'14px'}}>완료</button>
                  </>
                ) : (
                  <>
                    <span style={{fontSize:'14px'}}>{slot.icon}</span>
                    <span style={{fontSize:'16px',fontWeight:'700',color:slot.color,flex:1}}>{slot.slot}</span>
                    <button onClick={()=>setEditingSlot(slot.key)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'14px',color:'var(--text-sub)'}}>✏️</button>
                    <button onClick={()=>delSlot(slot.key)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'14px',color:'var(--cn-danger)'}}>🗑️</button>
                  </>
                )}
              </div>

              {/* 약 목록 */}
              {slot.items.map(med => (
                <div key={med.id} style={{background:'var(--card-bg)',borderRadius:'8px',padding:'8px 10px',marginBottom:'6px',border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`}}>
                  {editingMed?.slotKey===slot.key && editingMed?.medId===med.id ? (
                    <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                      <input ref={nameInputRef} value={med.name}
                        onChange={e=>updMedField(slot.key,med.id,'name',e.target.value)}
                        onFocus={e=>e.target.select()}
                        placeholder="약 이름" style={inpSt}/>
                      <input value={med.dose} onChange={e=>updMedField(slot.key,med.id,'dose',e.target.value)}
                        placeholder="용량 (예: 10mg 1정)" style={inpSt}/>
                      {/* 투약 기간 */}
                      <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:'16px',color:'var(--text-sub)',marginBottom:'3px'}}>투약 시작일</div>
                          <input type="date" value={med.startDate||''} onChange={e=>updMedField(slot.key,med.id,'startDate',e.target.value)} style={inpSt}/>
                        </div>
                        <div style={{color:dm?'var(--text-sub)':'var(--text-mute)',marginTop:'16px'}}>~</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:'16px',color:'var(--text-sub)',marginBottom:'3px'}}>투약 종료일</div>
                          <input type="date" value={med.endDate||''} onChange={e=>updMedField(slot.key,med.id,'endDate',e.target.value)} style={inpSt}/>
                        </div>
                      </div>
                      <div style={{fontSize:'16px',color:'var(--text-sub)'}}>💡 날짜 미입력 시 항상 표시</div>
                      <button onClick={()=>setEditingMed(null)} style={{background:slot.color,color:'#fff',border:'none',borderRadius:'6px',padding:'7px',cursor:'pointer',fontSize:'14px',fontWeight:'700'}}>완료</button>
                    </div>
                  ) : (
                    <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:'16px',fontWeight:'600',color:'var(--text)'}}>{med.name||'(이름 없음)'}</div>
                        <div style={{fontSize:'16px',color:'var(--text-sub)'}}>{med.dose}</div>
                        {(med.startDate||med.endDate) && (
                          <div style={{fontSize:'14px',color:'var(--cn-brand)',marginTop:'2px'}}>
                            📅 {med.startDate||'?'} ~ {med.endDate||'계속'}
                          </div>
                        )}
                      </div>
                      <button onClick={()=>setEditingMed({slotKey:slot.key,medId:med.id})} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'16px',color:'var(--text-sub)'}}>✏️</button>
                      <button onClick={()=>delMed(slot.key,med.id)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'16px',color:'var(--cn-danger)'}}>🗑️</button>
                    </div>
                  )}
                </div>
              ))}
              <button onClick={()=>addMed(slot.key)} style={{width:'100%',padding:'7px',background:'transparent',border:`1px dashed ${slot.border}`,color:slot.color,borderRadius:'8px',cursor:'pointer',fontSize:'14px',fontWeight:'700',marginTop:'4px'}}>
                + 약 추가
              </button>
            </div>
          ))}

          <button onClick={addSlot} style={{width:'100%',padding:'10px',background:'var(--input-bg)',border:'1px dashed var(--text-mute)',color:'var(--text-sub)',borderRadius:'10px',cursor:'pointer',fontSize:'16px',fontWeight:'700',marginBottom:'12px'}}>
            + 시간대 추가
          </button>

          <div style={{display:'flex',gap:'8px'}}>
            <button onClick={reset} style={{flex:1,padding:'11px',background:'var(--card-bg)',border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`,color:'var(--cn-danger)',borderRadius:'10px',cursor:'pointer',fontSize:'16px'}}>🗑️ 전체 삭제</button>
            <button onClick={()=>onSave(cfg)} style={{flex:2,padding:'11px',background:'var(--cn-brand)',color:'#fff',border:'none',borderRadius:'10px',cursor:'pointer',fontSize:'14px',fontWeight:'700'}}>저장</button>
          </div>
        </div>
      </div>
    );
  };

  /* ── 배너 슬롯 위치 정의 ─────────────────────────────────── */
  const BANNER_SLOTS = [
    { id:'top',        label:'헤더 바로 아래' },
    { id:'after_meds', label:'복약 체크리스트 아래' },
    { id:'after_bs',   label:'혈당 입력 아래' },
    { id:'sidebar_top',label:'사이드바 상단' },
    { id:'bottom',     label:'페이지 맨 아래' },
  ];

  const loadBanners = () => {
    try { return JSON.parse(localStorage.getItem('cn_banners') || '{}'); } catch { return {}; }
  };
  const saveBanners = (b) => localStorage.setItem('cn_banners', JSON.stringify(b));

  /* ── 배너 렌더 컴포넌트 ──────────────────────────────── */
  const BannerSlot = ({ slotId }) => {
    const banners = loadBanners();
    const b = banners[slotId];
    if (!b || !b.enabled || !b.url) return null;

    const getYoutubeId = (url) => {
      const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    };
    const ytId = getYoutubeId(b.url);

    return (
      <div style={{ margin:'10px 0', borderRadius:'12px', overflow:'hidden', boxShadow:'0 2px 8px rgba(0,0,0,0.08)' }}>
        {ytId ? (
          <iframe
            src={`https://www.youtube.com/embed/${ytId}?rel=0`}
            style={{ width:'100%', height: b.height || '200px', border:'none', display:'block' }}
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowFullScreen
          />
        ) : b.type === 'image' ? (
          <a href={b.link||'#'} target="_blank" rel="noreferrer">
            <img src={b.url} alt={b.label||'배너'} style={{ width:'100%', display:'block', maxHeight:'150px', objectFit:'cover' }} />
          </a>
        ) : (
          <div style={{ background: b.bgColor||'var(--cn-brand-100)', padding:'12px 16px', fontSize:'13px',
                        color: b.textColor||'var(--cn-brand-600)', fontWeight:'600', textAlign:'center',
                        border:`1px solid ${b.borderColor||'#bfdbfe'}`, borderRadius:'12px' }}>
            {b.url}
          </div>
        )}
        {b.caption && <div style={{ fontSize:'11px', color:'var(--text-mute)', textAlign:'right', padding:'2px 6px' }}>{b.caption}</div>}
      </div>
    );
  };

  /* ── 관리자 배너 설정 모달 ───────────────────────────── */
  const ADMIN_EMAIL = 'cnkim74@gmail.com';
  const AdminModal = ({ onClose, userEmail }) => {
    // 관리자 권한 이중 검증 — 이메일이 일치하지 않으면 모달 자체를 렌더링하지 않음
    if (userEmail !== ADMIN_EMAIL) return null;
    const dm = _dm;
    const [banners, setBanners] = useState(loadBanners);
    const [editing, setEditing] = useState(null); // slotId
    const [draft, setDraft] = useState({});

    const startEdit = (slotId) => {
      setEditing(slotId);
      setDraft(banners[slotId] || { enabled:false, type:'youtube', url:'', height:'200px', caption:'', link:'', label:'' });
    };
    const saveDraft = () => {
      const next = { ...banners, [editing]: draft };
      setBanners(next);
      saveBanners(next);
      setEditing(null);
    };
    const toggleEnabled = (slotId) => {
      const cur = banners[slotId] || {};
      const next = { ...banners, [slotId]: { ...cur, enabled: !cur.enabled } };
      setBanners(next);
      saveBanners(next);
    };

    const cardBg = dm ? 'var(--card-bg)' : '#fff';
    const inputSt = { width:'100%', padding:'8px 10px', border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`,
                      borderRadius:'8px', fontSize:'13px', background:dm?'var(--bg)':'#fff',
                      color:dm?'var(--text)':'var(--cn-ink)', outline:'none', boxSizing:'border-box' };

    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', display:'flex', alignItems:'center',
                    justifyContent:'center', zIndex:3000, padding:'20px' }}
           onClick={e => e.target===e.currentTarget && onClose()}>
        <div style={{ background:cardBg, borderRadius:'20px', padding:'26px', maxWidth:'520px', width:'100%',
                      maxHeight:'85vh', overflowY:'auto', boxShadow:'0 24px 80px rgba(0,0,0,0.35)' }}>

          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px' }}>
            <div style={{ fontSize:'17px', fontWeight:'800', color:'var(--text)' }}>🛠️ 관리자 배너 설정</div>
            <button onClick={onClose} style={{ background:'var(--input-bg)', border:'none', borderRadius:'8px',
              width:'32px', height:'32px', cursor:'pointer', fontSize:'16px', color:'var(--text-sub)' }}>✕</button>
          </div>

          {editing ? (
            <div>
              <div style={{ fontSize:'14px', fontWeight:'700', color:'var(--text)', marginBottom:'14px' }}>
                📍 {BANNER_SLOTS.find(s=>s.id===editing)?.label} 설정
              </div>
              {/* 배너 타입 */}
              <div style={{ marginBottom:'12px' }}>
                <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'5px' }}>배너 종류</div>
                <div style={{ display:'flex', gap:'8px' }}>
                  {[['youtube','🎬 유튜브'],['image','🖼️ 이미지'],['text','📝 텍스트']].map(([v,l])=>(
                    <button key={v} onClick={()=>setDraft(d=>({...d,type:v}))}
                      style={{ flex:1, padding:'7px', border:`1.5px solid ${draft.type===v?'var(--cn-brand)':'var(--card-border)'}`,
                               borderRadius:'8px', background: draft.type===v?'var(--cn-brand-100)':'transparent',
                               color: draft.type===v?'#1d4ed8':'var(--text-sub)',
                               cursor:'pointer', fontSize:'12px', fontWeight:'600' }}>{l}</button>
                  ))}
                </div>
              </div>
              {/* URL */}
              <div style={{ marginBottom:'10px' }}>
                <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'5px' }}>
                  {draft.type==='youtube' ? 'YouTube URL' : draft.type==='image' ? '이미지 URL' : '표시할 텍스트'}
                </div>
                <input style={inputSt} value={draft.url||''} onChange={e=>setDraft(d=>({...d,url:e.target.value}))}
                  placeholder={draft.type==='youtube'?'https://youtube.com/watch?v=...' : draft.type==='image'?'https://...' : '공지 내용 입력'} />
              </div>
              {draft.type==='youtube' && (
                <div style={{ marginBottom:'10px' }}>
                  <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'5px' }}>높이 (기본 200px)</div>
                  <input style={{...inputSt, width:'120px'}} value={draft.height||'200px'}
                    onChange={e=>setDraft(d=>({...d,height:e.target.value}))} placeholder="200px" />
                </div>
              )}
              {draft.type==='image' && (
                <div style={{ marginBottom:'10px' }}>

  const ChallengeTab = ({ data, date, userId }) => {
    // 연속 기록 streak 계산
    const streak = React.useMemo(() => {
      let count = 0;
      let d = date;
      for (let i = 0; i < 365; i++) {
        const dd = data[d];
        if (!dd) break;
        const hasBs = Object.values(dd.bs || {}).some(v => parseInt(v) > 0);
        if (!hasBs) break;
        count++;
        d = shiftDate(d, -1);
      }
      return count;
    }, [data, date]);

    const last7 = React.useMemo(() => {
      let inRange = 0, total = 0;
      for (let i = 0; i < 7; i++) {
        const d = shiftDate(date, -i);
        const dd = data[d];
        if (!dd) continue;
        Object.values(dd.bs || {}).forEach(v => {
          const n = parseInt(v);
          if (n > 0) { total++; if (n >= 70 && n <= 140) inRange++; }
        });
      }
      return { inRange, total, pct: total ? Math.round((inRange / total) * 100) : 0 };
    }, [data, date]);

    const medStreak = React.useMemo(() => {
      let count = 0;
      let d = date;
      for (let i = 0; i < 30; i++) {
        const dd = data[d];
        if (!dd || !dd.meds || !Object.values(dd.meds).some(Boolean)) break;
        count++;
        d = shiftDate(d, -1);
      }
      return count;
    }, [data, date]);

    const badges = [
      { id: 'first', icon: '🎯', name: '첫 걸음', desc: '첫 혈당 기록', earned: streak >= 1 },
      { id: 'streak3', icon: '🔥', name: '3일 연속', desc: '3일 연속 기록', earned: streak >= 3 },
      { id: 'streak7', icon: '⭐', name: '일주일', desc: '7일 연속 기록', earned: streak >= 7 },
      { id: 'streak30', icon: '🏆', name: '한 달', desc: '30일 연속 기록', earned: streak >= 30 },
      { id: 'streak100', icon: '💎', name: '100일', desc: '100일 연속', earned: streak >= 100 },
      { id: 'inrange70', icon: '✅', name: '정상 70%', desc: '7일 70%이상 정상', earned: last7.pct >= 70 && last7.total >= 10 },
      { id: 'inrange80', icon: '🌟', name: '정상 80%', desc: '7일 80%이상 정상', earned: last7.pct >= 80 && last7.total >= 10 },
      { id: 'med7', icon: '💊', name: '복약 일주일', desc: '7일 연속 복약 체크', earned: medStreak >= 7 },
      { id: 'med30', icon: '👑', name: '복약 마스터', desc: '30일 연속 복약', earned: medStreak >= 30 },
    ];
    const earned = badges.filter(b => b.earned).length;

    return (
      <div className="cn-card" data-tab="challenge">

  /* ── 비밀번호 변경 모달 ── */
  const ChangePasswordModal = ({ onClose }) => {

  /* ── 프로필 탭 ── */

  /* ── 대시보드: 건강 점수 계산 ── */
  const calcHealthScore = (data) => {
    const dates = Object.keys(data).filter(k => k !== '_user_settings_').sort().slice(-14);
    if (!dates.length) return { total:0, bp:0, glucose:0, meds:0, exercise:0 };
    // 혈압
    const bpVals = dates.map(d => {
      const b = data[d] && data[d].bp;
      if (!b || !b.sys || !b.dia) return null;
      const s = parseFloat(b.sys), di = parseFloat(b.dia);
      if (s < 120 && di < 80) return 100;
      if (s < 130 && di < 80) return 80;
      if (s < 140 && di < 90) return 60;
      if (s < 160 && di < 100) return 40;
      return 20;
    }).filter(v => v !== null);
    const bpScore = bpVals.length ? Math.round(bpVals.reduce((a,b)=>a+b,0)/bpVals.length) : 0;
    // 혈당
    const bsAll = dates.flatMap(d => {
      const bs = (data[d] && data[d].bs) || {};
      return Object.values(bs).map(v => parseInt(v)).filter(v => v > 0);
    });
    let glScore = 0;
    if (bsAll.length) {
      const med = median(bsAll);
      glScore = med < 100 ? 100 : med < 126 ? 85 : med < 154 ? 65 : med < 200 ? 40 : 20;
    }
    // 복약
    const medDays = dates.filter(d => {
      const m = data[d] && data[d].meds;
      return m && Object.values(m).some(Boolean);
    });
    const medsScore = dates.length ? Math.round((medDays.length / dates.length) * 100) : 0;
    // 운동
    const exDays = dates.filter(d => {
      const ex = data[d] && data[d].exercise;
      return ex && (parseInt(ex.mins) > 0 || (ex.type && ex.type.trim()));
    });
    const exScore = dates.length ? Math.round((exDays.length / dates.length) * 100) : 0;
    const total = Math.round(bpScore*0.30 + glScore*0.30 + medsScore*0.25 + exScore*0.15);
    return { total, bp:bpScore, glucose:glScore, meds:medsScore, exercise:exScore };
  };

  /* ── 대시보드: AI 인사이트 생성 ── */
  const genInsights = (data) => {
    const dates = Object.keys(data).filter(k => k !== '_user_settings_').sort().slice(-7);
    if (!dates.length) return ['데이터를 입력하면 AI 인사이트가 생성됩니다.'];
    const insights = [];
    const bpVals = dates.map(d => data[d] && data[d].bp).filter(b => b && b.sys).map(b => parseFloat(b.sys));
    if (bpVals.length >= 2) {
      const avg = Math.round(bpVals.reduce((a,b)=>a+b,0)/bpVals.length);
      if (avg > 140) insights.push('최근 7일 평균 수축기 혈압 '+avg+'mmHg — 고혈압 범위입니다. 저염식과 규칙적 운동을 권장합니다.');
      else if (avg > 130) insights.push('평균 혈압 '+avg+'mmHg — 주의혈압 범위. 식이 관리를 유지해 주세요.');
      else insights.push('평균 혈압 '+avg+'mmHg — 정상 범위로 잘 관리되고 있습니다.');
    }
    const bsAll = dates.flatMap(d => {
      const bs = (data[d] && data[d].bs) || {};
      return Object.values(bs).map(v => parseInt(v)).filter(v => v > 0);
    });
    if (bsAll.length) {
      const avg = Math.round(bsAll.reduce((a,b)=>a+b,0)/bsAll.length);
      if (avg > 180) insights.push('평균 혈당 '+avg+'mg/dL — 목표 범위 초과. 식후 혈당 관리와 인슐린 용량을 점검해 보세요.');
      else if (avg > 140) insights.push('평균 혈당 '+avg+'mg/dL — 주의 범위. 탄수화물 섭취를 줄여보세요.');
      else insights.push('평균 혈당 '+avg+'mg/dL — 목표 범위 내 관리 중입니다.');
    }
    const medDays = dates.filter(d => { const m = data[d] && data[d].meds; return m && Object.values(m).some(Boolean); });
    const medPct2 = dates.length ? Math.round((medDays.length/dates.length)*100) : 0;
    if (medPct2 < 80) insights.push('최근 복약 완료율 '+medPct2+'% — 규칙적인 복약이 혈당 조절에 중요합니다.');
    else if (medPct2 === 100) insights.push('7일 연속 복약 100% 완료 — 훌륭한 복약 습관입니다!');
    if (!insights.length) insights.push('데이터가 더 쌓이면 맞춤 인사이트를 제공합니다.');
    return insights;
  };

  /* ── SVG: 원형 건강 점수 게이지 ── */
  const CircleGauge = ({ value, size=96, stroke=9 }) => {
    const r = (size - stroke) / 2;
    const circ = 2 * Math.PI * r;
    const offset = circ - (value / 100) * circ;
    const color = value >= 80 ? 'var(--cn-ok)' : value >= 60 ? 'var(--cn-brand)' : value >= 40 ? 'var(--cn-warn)' : 'var(--cn-danger)';
    const label = value >= 80 ? '우수' : value >= 60 ? '양호' : value >= 40 ? '보통' : '주의';
    return (
      <svg width={size} height={size} viewBox={'0 0 '+size+' '+size} style={{flexShrink:0}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--card-border)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          transform={'rotate(-90 '+(size/2)+' '+(size/2)+')'}
          style={{transition:'stroke-dashoffset 0.7s ease'}}/>
        <text x={size/2} y={size/2-5} textAnchor="middle" fill="var(--text)" fontSize="20" fontWeight="800">{value}</text>
        <text x={size/2} y={size/2+13} textAnchor="middle" fill="var(--text-sub)" fontSize="10">{label}</text>
      </svg>
    );
  };

  /* ── SVG: 스파크라인 ── */
  const Sparkline = ({ vals, color='var(--cn-brand)', h=30 }) => {
    if (!vals || vals.length < 2) return <div style={{height:h}}/>;
    const ns = vals.map(v => parseFloat(v)||0);
    const mn = Math.min(...ns), mx = Math.max(...ns);
    const range = mx - mn || 1;
    const w = 100;
    const pts = ns.map((v,i) => ((i/(ns.length-1))*w)+','+(h - ((v-mn)/range)*(h-4)-2)).join(' ');
    return (
      <svg viewBox={'0 0 '+w+' '+h} style={{width:'100%',height:h,display:'block'}} preserveAspectRatio="none">
        <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
      </svg>
    );
  };

  /* ── 대시보드: 홈탭 ── */
  const DashboardHome = ({ data, date, medsConfig, allMedIds }) => {
    const score = useMemo(() => calcHealthScore(data), [data]);
    const insights = useMemo(() => genInsights(data), [data]);
    const DAY_KOR = ['일','월','화','수','목','금','토'];

    // 최근 14일
    const recent14 = useMemo(() => Array.from({length:14},(_,i)=>shiftDate(date,i-13)), [date]);
    const bpSysVals = recent14.map(d => data[d] && data[d].bp && data[d].bp.sys).filter(Boolean);
    const bpDiaVals = recent14.map(d => data[d] && data[d].bp && data[d].bp.dia).filter(Boolean);
    const bsVals = recent14.map(d => {
      const bs = (data[d] && data[d].bs) || {};
      const v = bs.bs_bf_am || bs.bs_af_am || bs.bs_bf_lu || bs.bs_af_lu || bs.bs_bf_di || bs.bs_af_di || bs.bs_bed;
      return v || null;
    }).filter(Boolean);
    const weightVals = recent14.map(d => data[d] && data[d].weight).filter(Boolean);

    const todayData = data[date] || emptyDay();
    const lastBP = (todayData.bp && todayData.bp.sys)
      ? todayData.bp.sys+'/'+todayData.bp.dia
      : (bpSysVals.length ? bpSysVals[bpSysVals.length-1]+'/'+bpDiaVals[bpDiaVals.length-1] : '---');
    const lastBS = (() => {
      const bs = (todayData.bs) || {};
      return bs.bs_bf_am || bs.bs_af_am || bs.bs_bf_lu || bs.bs_af_lu || bs.bs_bf_di || bs.bs_af_di || bs.bs_bed
        || (bsVals.length ? bsVals[bsVals.length-1] : null);
    })();
    const lastW = todayData.weight || (weightVals.length ? weightVals[weightVals.length-1] : null);

    // 복약 현황
    const medsToday = allMedIds.filter(id => todayData.meds && todayData.meds[id]).length;
    const medsPct = allMedIds.length ? Math.round((medsToday/allMedIds.length)*100) : 0;

    // 혈압 차트 데이터 (최근 14일 중 데이터 있는 날)
    const bpChartData = recent14.map(d => ({
      d, sys: data[d] && data[d].bp && parseInt(data[d].bp.sys)||null,
      dia: data[d] && data[d].bp && parseInt(data[d].bp.dia)||null
    })).filter(x => x.sys);
    const allBpNums = bpChartData.flatMap(x=>[x.sys,x.dia]).filter(Boolean);
    const bpMin2 = allBpNums.length ? Math.min(...allBpNums)-8 : 60;
    const bpMax2 = allBpNums.length ? Math.max(...allBpNums)+8 : 160;
    const bpRange2 = bpMax2 - bpMin2 || 80;
    const CW = 280, CH = 100;
    const bpY = v => CH - ((v-bpMin2)/bpRange2)*CH;

    // 트렌드 뱃지
    const TrendBadge = ({ vals }) => {
      if (!vals || vals.length < 4) return null;
      const r = vals.slice(-3).map(v=>parseFloat(v)||0);
      const p = vals.slice(-6,-3).map(v=>parseFloat(v)||0);
      if (!r.length || !p.length) return null;
      const rA = r.reduce((a,b)=>a+b,0)/r.length;
      const pA = p.reduce((a,b)=>a+b,0)/p.length;
      const diff = rA - pA;
      if (Math.abs(diff) < 1.5) return <span className="dash-trend dash-trend-st">— 안정</span>;
      if (diff > 0) return <span className="dash-trend dash-trend-up">▲ +{Math.round(diff)}</span>;
      return <span className="dash-trend dash-trend-dn">▼ {Math.round(diff)}</span>;
    };

    // 운동 현황 (최근 7일)
    const exDays7 = Array.from({length:7},(_,i)=>shiftDate(date,i-6)).map(d => {
      const ex = data[d] && data[d].exercise;
      return { d, mins: parseInt((ex && ex.mins)||0), type: (ex && ex.type)||'' };
    });
    const maxEx = Math.max(...exDays7.map(x=>x.mins), 1);

    return (
      <div data-tab="home">
        {/* 건강 점수 */}
        <div className="dash-score-card">
          <CircleGauge value={score.total}/>
          <div className="dash-score-info">
            <div className="dash-score-title">종합 건강 점수 (14일 평균)</div>
            <div className="dash-score-breakdown">
              {[
                { label:'혈압', val:score.bp,       color:'var(--cn-danger)', w:'30%' },
                { label:'혈당', val:score.glucose,  color:'var(--cn-ok)',     w:'30%' },
                { label:'복약', val:score.meds,     color:'var(--cn-brand)',  w:'25%' },
                { label:'운동', val:score.exercise, color:'var(--cn-warn)',   w:'15%' },
              ].map(row => (
                <div key={row.label} className="dash-score-row">
                  <span style={{fontSize:10,color:'var(--text-sub)',width:28,flexShrink:0}}>{row.label}</span>
                  <div className="dash-score-bar-bg">

              <polyline points={bpChartData.map((x,i)=>((i/(bpChartData.length-1))*CW)+','+bpY(x.dia)).join(' ')}

        {/* 주간 운동 현황 */}
        <div className="cn-card" style={{padding:'14px 14px 10px',marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--text-sub)',marginBottom:10}}>🏃 주간 운동</div>
          <div className="dash-steps-bars">
            {exDays7.map((x,i) => {
              const dt = new Date(x.d+'T12:00:00');

          </div>
          {exDays7.every(x=>!x.mins) && <div style={{fontSize:12,color:'var(--text-mute)',textAlign:'center',paddingTop:4}}>운동 기록을 입력하면 추이를 볼 수 있어요</div>}
        </div>

        {/* AI 인사이트 */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--text-sub)',marginBottom:8}}>🤖 AI 인사이트</div>
          {insights.map((text,i)=>(

              <div className="dash-insight-text">{text}</div>

  };

  const App = () => {
    const [authUser,   setAuthUser]  = useState(null);
    const [authReady,  setAuthReady] = useState(false);
    const [date,       setDate]      = useState(todayStr());
    const [data,       setData]      = useState({});
    const [showImport, setShowImport] = useState(false);
    const [showSync,   setShowSync]  = useState(false);
    const [showMedSettings, setShowMedSettings] = useState(false);
    const [showChangePw,    setShowChangePw]    = useState(false);
    const [medsConfig, setMedsConfig] = useState([]);
    const [medsReadyFor, setMedsReadyFor] = useState(''); // 어느 userId의 복약정보가 로드됐는지 추적
    const [lastImport, setLastImport] = useState(null);
    const [loading,    setLoading]   = useState(true);
    const [saveStatus, setSaveStatus] = useState('idle'); // idle | saving | saved | error
    const [analyzing,  setAnalyzing] = useState(null); // 분석 중인 meal id
    const [analysisResult, setAnalysisResult] = useState(null); // { mealId, text }
    const [drugInfoModal, setDrugInfoModal] = useState(null); // 약 이름 or null
    const [showAdmin,    setShowAdmin]    = useState(false);
    const isAdmin = authUser?.email === ADMIN_EMAIL;
    const [refreshKey,  setRefreshKey]  = useState(0); // 수동 새로고침 트리거
    const [syncing,     setSyncing]     = useState(false);
    const [darkMode,    setDarkMode]    = useState(_dm);
    const [currentTab,  setCurrentTab]  = useState(() => { try { return localStorage.getItem('cn-tab') || 'home'; } catch { return 'home'; } });
    useEffect(() => {
      try { localStorage.setItem('cn-tab', currentTab); } catch {}
      document.body.classList.add('has-tabbar');
      document.body.setAttribute('data-current-tab', currentTab);
      return () => { document.body.classList.remove('has-tabbar'); document.body.removeAttribute('data-current-tab'); };
    }, [currentTab]);
    const dm = _dm; // 모듈 레벨 변수 (토글 시 동기적으로 갱신됨)

    // Supabase Auth 초기화
    useEffect(() => {
      supa.auth.getSession().then(({ data: { session } }) => {
        setAuthUser(session?.user ?? null);
        setAuthReady(true);
      });
      const { data: { subscription } } = supa.auth.onAuthStateChange((_event, session) => {
        setAuthUser(session?.user ?? null);
      });
      return () => subscription.unsubscribe();
    }, []);

    const userId = authUser?.id || '';
    const [height, setHeight] = useState('');           // 키 (cm) — localStorage 저장
    const [weightImporting, setWeightImporting] = useState(false);
    const [weightImportMsg, setWeightImportMsg] = useState('');
    const [androidImporting, setAndroidImporting] = useState(false);
    const [androidImportMsg, setAndroidImportMsg] = useState('');
    const chartRef    = useRef(null);
    const chartInst   = useRef(null);
    const saveTimer   = useRef(null);
    const weightFileRef  = useRef(null);
    const androidFileRef = useRef(null);
    const imgRefs     = { breakfast: useRef(null), lunch: useRef(null), dinner: useRef(null) };
    const camRefs     = { breakfast: useRef(null), lunch: useRef(null), dinner: useRef(null) };

    const handlePhotoSelect = async (file, mealId) => {
      if (!file) return;
      setAnalyzing(mealId);
      setAnalysisResult(null);
      try {
        const base64   = await fileToBase64(file);
        const mimeType = file.type || 'image/jpeg';
        const result   = await analyzeFood(base64, mimeType);
        setAnalysisResult({ mealId, text: result });
      } catch(e) {
        alert('사진 분석 중 오류가 발생했어요.\n' + e.message);
      }
      setAnalyzing(null);
    };

    const applyAnalysis = (mealId, text) => {
      updMeal(mealId, (day.meals[mealId] ? day.meals[mealId] + '\n\n' : '') + text);
      setAnalysisResult(null);
    };

    /* ── 건강앱 체중/체지방 가져오기 (2MB 청크 스트리밍, 대용량 파일 지원) ── */
    const handleWeightImport = async (file) => {
      if (!file) return;
      setWeightImporting(true);
      setWeightImportMsg('파일 처리 중...');
      try {
        const CHUNK_SIZE = 2 * 1024 * 1024; // 2MB
        let getChunks, totalBytes;

        if (file.name.endsWith('.zip')) {
          setWeightImportMsg('ZIP 압축 해제 중... (잠시 기다려 주세요)');
          if (typeof JSZip === 'undefined') throw new Error('ZIP 라이브러리 로드 실패');
          const zip = await JSZip.loadAsync(file);
          const allFilesW = Object.keys(zip.files);
          const xmlFileW = allFilesW.find(name =>
            /export\.xml$/i.test(name) && !/cda/i.test(name)
          ) || allFilesW.find(name => /\.xml$/i.test(name) && !/cda/i.test(name));
          if (!xmlFileW) throw new Error('export.xml을 찾을 수 없어요');
          setWeightImportMsg('XML 추출 중... (압축 해제 중, 오래 걸릴 수 있어요)');
          // Blob으로 추출 → JS 힙 외부에 저장되어 메모리 효율적
          const xmlBlob = await zip.files[xmlFileW].async('blob');
          totalBytes = xmlBlob.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = xmlBlob.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else if (file.name.endsWith('.xml')) {
          totalBytes = file.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = file.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else {
          throw new Error('.zip 또는 .xml 파일을 선택해 주세요');
        }

        setWeightImportMsg('데이터 분석 중... 0%');
        const { weightByDay, bodyFatByDay, bpByDay = {} } = await parseAppleHealthXML(getChunks, totalBytes, (pct) => {
          setWeightImportMsg(`데이터 분석 중... ${pct}%`);
        });
        const wDays  = Object.keys(weightByDay).length;
        const bfDays = Object.keys(bodyFatByDay).length;
        const bpDays = Object.keys(bpByDay).length;
        if (!wDays && !bfDays && !bpDays) throw new Error('체중·체지방·혈압 데이터를 찾을 수 없어요.\n건강앱과 연동된 체성분/혈압 앱이 있는지 확인해 주세요.');
        // 가져온 데이터 병합
        const importedData = buildDashboardData({ glucoseByDay:{}, weightByDay, bodyFatByDay, bpByDay });
        await handleImport(importedData);
        const parts = [];
        if (wDays)  parts.push(`체중 ${wDays}일`);
        if (bfDays) parts.push(`체지방 ${bfDays}일`);
        if (bpDays) parts.push(`혈압 ${bpDays}일`);
        setWeightImportMsg(`✅ ${parts.join(' · ')} 가져오기 완료!`);
        setTimeout(() => { setWeightImportMsg(''); setWeightImporting(false); }, 3000);
      } catch(e) {
        setWeightImportMsg('❌ ' + (e.message || '가져오기 실패'));
        setTimeout(() => { setWeightImportMsg(''); setWeightImporting(false); }, 4000);
      }
      if (weightFileRef.current) weightFileRef.current.value = '';
    };

    /* ── 삼성 헬스 체중/체지방 가져오기 ── */
    const handleAndroidImport = async (file) => {
      if (!file) return;
      setAndroidImporting(true);
      setAndroidImportMsg('파일 처리 중...');
      try {
        const { weightByDay, bodyFatByDay, bpByDay = {} } = await parseSamsungHealthZip(file, (msg) => {
          setAndroidImportMsg(msg);
        });
        const wDays  = Object.keys(weightByDay).length;
        const bfDays = Object.keys(bodyFatByDay).length;
        const bpDays = Object.keys(bpByDay).length;
        if (!wDays && !bfDays && !bpDays) throw new Error('체중·체지방·혈압 데이터를 찾을 수 없어요.\n삼성 헬스에 데이터가 있는지 확인해 주세요.');
        const importedData = buildDashboardData({ glucoseByDay:{}, weightByDay, bodyFatByDay, bpByDay });
        await handleImport(importedData);
        const parts2 = [];
        if (wDays)  parts2.push(`체중 ${wDays}일`);
        if (bfDays) parts2.push(`체지방 ${bfDays}일`);
        if (bpDays) parts2.push(`혈압 ${bpDays}일`);
        setAndroidImportMsg(`✅ ${parts2.join(' · ')} 가져오기 완료!`);
        setTimeout(() => { setAndroidImportMsg(''); setAndroidImporting(false); }, 3000);
      } catch(e) {
        setAndroidImportMsg('❌ ' + (e.message || '가져오기 실패'));
        setTimeout(() => { setAndroidImportMsg(''); setAndroidImporting(false); }, 5000);
      }
      if (androidFileRef.current) androidFileRef.current.value = '';
    };

    /* ── Supabase: 초기 데이터 로드 + URL 파라미터 단축어 연동 ── */
    useEffect(() => {
      // URL 파라미터 먼저 읽어두기 (Supabase 로드 전에 저장)
      const params = new URLSearchParams(window.location.search);
      const w  = params.get('w');
      const bf = params.get('bf');
      const d  = params.get('d');  // 측정 날짜 (YYYY-MM-DD)
      const urlPatch = {};
      if (w  && !isNaN(parseFloat(w)))  urlPatch.weight  = String(parseFloat(w));
      if (bf && !isNaN(parseFloat(bf))) urlPatch.bodyFat = String(parseFloat(bf));
      // 날짜 파라미터 검증 (YYYY-MM-DD 형식)
      const targetDate = (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) ? d : todayStr();
      if (Object.keys(urlPatch).length) {
        window.history.replaceState({}, '', window.location.pathname);
        // 날짜가 오늘이 아니면 해당 날짜 페이지로 이동
        if (targetDate !== todayStr()) setDate(targetDate);
      }

      const load = async () => {
        setLoading(true);
        setSyncing(true);
        try {
          // 1차: 현재 Supabase 로그인 계정(authUser.id)으로 조회
          const { data: rows, error } = await supa
            .from('diabetes_data')
            .select('date, payload')
            .eq('user_id', userId);
          if (error) throw error;
          const loaded = {};
          (rows || []).forEach(r => { if (r.date !== '_user_settings_') loaded[r.date] = r.payload; });

          // 2차 폴백: 데이터가 없고, 예전 dm_user_id UUID가 있으면 그걸로도 조회
          if (Object.keys(loaded).length === 0) {
            const legacyId = localStorage.getItem('dm_user_id');
            if (legacyId && legacyId !== userId) {
              const { data: legacyRows } = await supa
                .from('diabetes_data')
                .select('date, payload')
                .eq('user_id', legacyId);
              (legacyRows || []).forEach(r => { if (r.date !== '_user_settings_') loaded[r.date] = r.payload; });
            }
          }

          // ✅ 로컬 캐시와 필드 단위 병합
          // - Supabase에 없는 날짜: 캐시 전체 사용
          // - Supabase에 있는 날짜: weight/bodyFat이 비어있으면 캐시에서 보완
          //   (건강앱 가져오기 후 saveAllToSupabase가 부분 실패해도 데이터 보존)
          try {
            const cached = JSON.parse(localStorage.getItem('dm_dash_v2') || '{}').data || {};
            Object.keys(cached).forEach(d => {
              if (!loaded[d]) {
                loaded[d] = cached[d];                   // 날짜 자체가 없으면 캐시로
              } else {
                const sb = loaded[d], lc = cached[d];
                // weight / bodyFat 이 Supabase에 없는 경우만 캐시에서 보완
                if (!sb.weight  && lc?.weight)  loaded[d] = { ...sb, weight:  lc.weight  };
                if (!sb.bodyFat && lc?.bodyFat) loaded[d] = { ...loaded[d], bodyFat: lc.bodyFat };
              }
            });
          } catch {}

          // ✅ 건강앱 가져오기 전용 캐시도 항상 병합 (Supabase 동기화 실패 후 새로고침 시 복구)
          try {
            const imported = JSON.parse(localStorage.getItem('dm_imported') || '{}');
            Object.keys(imported).forEach(d => {
              if (!loaded[d]) {
                loaded[d] = imported[d];
              } else {
                if (!loaded[d].weight  && imported[d]?.weight)  loaded[d] = { ...loaded[d], weight:  imported[d].weight  };
                if (!loaded[d].bodyFat && imported[d]?.bodyFat) loaded[d] = { ...loaded[d], bodyFat: imported[d].bodyFat };
                // 혈압도 복구
                if (!(loaded[d].bp?.sys && loaded[d].bp?.dia) && imported[d]?.bp?.sys)
                  loaded[d] = { ...loaded[d], bp: imported[d].bp };
              }
            });
          } catch {}

          if (Object.keys(urlPatch).length) {
            loaded[targetDate] = { ...(loaded[targetDate] || emptyDay()), ...urlPatch };
          }
          setData(loaded);
        } catch(e) {
          try {
            const s = localStorage.getItem('dm_dash_v2');
            const loaded = s ? (JSON.parse(s).data || {}) : {};
            if (Object.keys(urlPatch).length) {
              loaded[targetDate] = { ...(loaded[targetDate] || emptyDay()), ...urlPatch };
            }
            setData(loaded);
          } catch(e2) {}
        }
        setLoading(false);
        setSyncing(false);
      };
      if (userId) load();
    }, [userId, refreshKey]);

    /* ── Supabase: 현재 날짜 데이터 저장 (디바운스 1.5초) ── */
    useEffect(() => {
      if (loading || !data[date]) return;
      // localStorage 캐시 업데이트
      localStorage.setItem('dm_dash_v2', JSON.stringify({ data, lastImport }));
      // Supabase 저장
      if (saveTimer.current) clearTimeout(saveTimer.current);
      setSaveStatus('saving');
      saveTimer.current = setTimeout(async () => {
        try {
          const { error } = await supa.from('diabetes_data').upsert(
            { user_id: userId, date, payload: data[date], updated_at: new Date().toISOString() },
            { onConflict: 'user_id,date' }
          );
          if (error) throw error;
          setSaveStatus('saved');
          setTimeout(() => setSaveStatus('idle'), 2000);
        } catch(e) {
          setSaveStatus('error');
          setTimeout(() => setSaveStatus('idle'), 3000);
        }
      }, 1500);
    }, [data, date, loading]);

    /* ── Supabase: 가져오기 후 여러 날 일괄 저장 ── */
    const saveAllToSupabase = async (newData) => {
      if (!userId) return;
      try {
        const rows = Object.entries(newData).map(([d, payload]) => ({
          user_id: userId, date: d, payload, updated_at: new Date().toISOString()
        }));
        if (!rows.length) return;
        // 50개씩 나눠서 upsert (Supabase 대용량 배치 실패 방지)
        const CHUNK = 50;
        for (let i = 0; i < rows.length; i += CHUNK) {
          await supa.from('diabetes_data').upsert(rows.slice(i, i + CHUNK), { onConflict: 'user_id,date' });
        }
      } catch(e) { console.error('일괄 저장 오류:', e); }
    };

    const day = useMemo(() => data[date] || emptyDay(), [data, date]);
    const upDay = (patch) => setData(prev => ({ ...prev, [date]: { ...(prev[date] || emptyDay()), ...patch } }));
    const togMed  = (id) => upDay({ meds: { ...day.meds, [id]: !day.meds[id] } });
    const updBS   = (id, v) => upDay({ bs: { ...day.bs, [id]: v } });
    const updBP   = (k, v) => upDay({ bp: { ...(day.bp||{sys:'',dia:''}), [k]: v } });
    const updMeal = (id, v) => upDay({ meals: { ...day.meals, [id]: v } });
    const updEx   = (k, v) => upDay({ exercise: { ...day.exercise, [k]: v } });

    /* 가져오기: 기존 수동 입력 유지, 빈 슬롯만 채움 */
    const handleImport = async (importedData) => {
      // data 클로저를 직접 사용해 merged를 동기적으로 계산 (setState 콜백 의존 X)
      const next = { ...data };
      const merged = {};
      Object.entries(importedData).forEach(([d, imported]) => {
        if (!next[d]) { next[d] = imported; }
        else {
          const ex = next[d];
          next[d] = {
            ...ex,
            bs: { ...imported.bs, ...ex.bs },
            weight:  ex.weight  || imported.weight  || '',
            bodyFat: ex.bodyFat || imported.bodyFat || '',
            bp: (ex.bp?.sys && ex.bp?.dia) ? ex.bp : (imported.bp || ex.bp || {sys:'',dia:''})
          };
        }
        merged[d] = next[d];
      });
      setData(next);
      // ✅ 즉시 dm_dash_v2 저장 (save effect의 data[date] 조건 우회)
      try {
        localStorage.setItem('dm_dash_v2', JSON.stringify({ data: next, lastImport: new Date().toLocaleString('ko-KR') }));
      } catch {}
      // ✅ 가져온 데이터를 전용 키에 별도 저장 — 새로고침 후에도 복구 가능
      try {
        const existing = JSON.parse(localStorage.getItem('dm_imported') || '{}');
        const updated  = { ...existing };
        Object.entries(importedData).forEach(([d, imp]) => {
          if (!updated[d]) { updated[d] = imp; }
          else {
            updated[d] = {
              ...updated[d],
              weight:  updated[d].weight  || imp.weight  || '',
              bodyFat: updated[d].bodyFat || imp.bodyFat || '',
              bp: (updated[d].bp?.sys && updated[d].bp?.dia) ? updated[d].bp : (imp.bp || updated[d].bp),
            };
          }
        });
        localStorage.setItem('dm_imported', JSON.stringify(updated));
      } catch {}
      setLastImport(new Date().toLocaleString('ko-KR'));
      await saveAllToSupabase(merged);
    };

    /* medsConfig 저장 */
    // 복약 설정: Supabase(_user_settings_ row) → localStorage 순으로 로드
    // Supabase에 저장하므로 기기/브라우저 바뀌어도 복구됨
    useEffect(() => {
      if (!userId) { setMedsReadyFor(''); return; }
      (async () => {
        try {
          const { data: row } = await supa.from('diabetes_data')
            .select('payload').eq('user_id', userId).eq('date', '_user_settings_')
            .maybeSingle();
          const fromSB = row?.payload?.medsConfig;
          if (fromSB && Array.isArray(fromSB)) {
            // Supabase 우선 — localStorage도 동기화
            setMedsConfig(fromSB);
            localStorage.setItem(`hcd_meds_config_${userId}`, JSON.stringify(fromSB));
          } else {
            // localStorage 폴백
            const s = localStorage.getItem(`hcd_meds_config_${userId}`);
            setMedsConfig(s ? JSON.parse(s) : []);
          }
        } catch {
          try {
            const s = localStorage.getItem(`hcd_meds_config_${userId}`);
            setMedsConfig(s ? JSON.parse(s) : []);
          } catch { setMedsConfig([]); }
        }
        setMedsReadyFor(userId);
      })();
    }, [userId]);

    // 복약 설정: localStorage + Supabase 동시 저장
    useEffect(() => {
      if (!userId || medsReadyFor !== userId) return;
      localStorage.setItem(`hcd_meds_config_${userId}`, JSON.stringify(medsConfig));
      // Supabase에도 저장 (_user_settings_ 특수 row)
      (async () => {
        try {
          await supa.from('diabetes_data').upsert(
            { user_id: userId, date: '_user_settings_', payload: { medsConfig }, updated_at: new Date().toISOString() },
            { onConflict: 'user_id,date' }
          );
        } catch(e) { console.error('복약 설정 Supabase 저장 오류:', e); }
      })();
    }, [medsConfig, userId, medsReadyFor]);
    const saveMeds = (cfg) => { setMedsConfig(cfg); setShowMedSettings(false); };

    // 키(신장): 유저별 로드/저장 (두 키 모두 확인 — 이전 저장 실패 시 복구)
    useEffect(() => {
      if (!userId) return;
      const h = localStorage.getItem(`hcd_height_${userId}`) || localStorage.getItem('hcd_height');
      if (h) setHeight(h);
    }, [userId]);
    const saveHeight = (v) => {
      setHeight(v);
      // 유저별 키와 범용 키 모두 저장 (어느 쪽이든 복구 가능하도록)
      localStorage.setItem('hcd_height', v);
      if (userId) localStorage.setItem(`hcd_height_${userId}`, v);
    };

    /* Stats */
