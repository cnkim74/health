  };

  /* в”Җв”Җ лҢҖмӢңліҙл“ң: кұҙк°• м җмҲҳ кі„мӮ° в”Җв”Җ */
  const calcHealthScore = (data) => {
    const dates = Object.keys(data).filter(k => k !== '_user_settings_').sort().slice(-14);
    if (!dates.length) return { total:0, bp:0, glucose:0, meds:0, exercise:0 };
    // нҳҲм••
    const bpVals = dates.map(d => {
      const b = data[d] && data[d].bp;
      if (!b || !b.sys || !b.dia) return null;
      const s = parseFloat(b.sys), di = parseFloat(b.dia);
      if (s < 120 && di < 80) return 100;
      if (s < 130 && di < 80) return 80;
      if (s < 140 && di < 90) return 60;
      if (s < 160 && di < 100) return 40;
      return 20;
    }).filter(v => v !== null);
    const bpScore = bpVals.length ? Math.round(bpVals.reduce((a,b)=>a+b,0)/bpVals.length) : 0;
    // нҳҲлӢ№
    const bsAll = dates.flatMap(d => {
      const bs = (data[d] && data[d].bs) || {};
      return Object.values(bs).map(v => parseInt(v)).filter(v => v > 0);
    });
    let glScore = 0;
    if (bsAll.length) {
      const med = median(bsAll);
      glScore = med < 100 ? 100 : med < 126 ? 85 : med < 154 ? 65 : med < 200 ? 40 : 20;
    }
    // ліөм•Ҫ
    const medDays = dates.filter(d => {
      const m = data[d] && data[d].meds;
      return m && Object.values(m).some(Boolean);
    });
    const medsScore = dates.length ? Math.round((medDays.length / dates.length) * 100) : 0;
    // мҡҙлҸҷ
    const exDays = dates.filter(d => {
      const ex = data[d] && data[d].exercise;
      const steps = data[d] && data[d].steps;
      const hasLog = ex && ((ex.logs||[]).some(l => l.type || parseInt(l.mins)>0) || parseInt(ex.mins)>0 || (ex.type&&ex.type.trim()));
      const hasSteps = steps && parseInt(steps) >= 3000;
      return hasLog || hasSteps;
    });
    const exScore = dates.length ? Math.round((exDays.length / dates.length) * 100) : 0;
    const total = Math.round(bpScore*0.30 + glScore*0.30 + medsScore*0.25 + exScore*0.15);
    return { total, bp:bpScore, glucose:glScore, meds:medsScore, exercise:exScore };
  };

  /* в”Җв”Җ лҢҖмӢңліҙл“ң: AI мқёмӮ¬мқҙнҠё мғқм„ұ в”Җв”Җ */
  const genInsights = (data) => {
    const dates = Object.keys(data).filter(k => k !== '_user_settings_').sort().slice(-7);
    if (!dates.length) return ['лҚ°мқҙн„°лҘј мһ…л Ҙн•ҳл©ҙ AI мқёмӮ¬мқҙнҠёк°Җ мғқм„ұлҗ©лӢҲлӢӨ.'];
    const insights = [];
    const bpVals = dates.map(d => data[d] && data[d].bp).filter(b => b && b.sys).map(b => parseFloat(b.sys));
    if (bpVals.length >= 2) {
      const avg = Math.round(bpVals.reduce((a,b)=>a+b,0)/bpVals.length);
      if (avg > 140) insights.push('мөңк·ј 7мқј нҸүк·  мҲҳм¶•кё° нҳҲм•• '+avg+'mmHg вҖ” кі нҳҲм•• лІ”мң„мһ…лӢҲлӢӨ. м Җм—јмӢқкіј к·ңм№ҷм Ғ мҡҙлҸҷмқ„ к¶ҢмһҘн•©лӢҲлӢӨ.');
      else if (avg > 130) insights.push('нҸүк·  нҳҲм•• '+avg+'mmHg вҖ” мЈјмқҳнҳҲм•• лІ”мң„. мӢқмқҙ кҙҖлҰ¬лҘј мң м§Җн•ҙ мЈјм„ёмҡ”.');
      else insights.push('нҸүк·  нҳҲм•• '+avg+'mmHg вҖ” м •мғҒ лІ”мң„лЎң мһҳ кҙҖлҰ¬лҗҳкі  мһҲмҠөлӢҲлӢӨ.');
    }
    const bsAll = dates.flatMap(d => {
      const bs = (data[d] && data[d].bs) || {};
      return Object.values(bs).map(v => parseInt(v)).filter(v => v > 0);
    });
    if (bsAll.length) {
      const avg = Math.round(bsAll.reduce((a,b)=>a+b,0)/bsAll.length);
      if (avg > 180) insights.push('нҸүк·  нҳҲлӢ№ '+avg+'mg/dL вҖ” лӘ©н‘ң лІ”мң„ мҙҲкіј. мӢқнӣ„ нҳҲлӢ№ кҙҖлҰ¬мҷҖ мқёмҠҗлҰ° мҡ©лҹүмқ„ м җкІҖн•ҙ ліҙм„ёмҡ”.');
      else if (avg > 140) insights.push('нҸүк·  нҳҲлӢ№ '+avg+'mg/dL вҖ” мЈјмқҳ лІ”мң„. нғ„мҲҳнҷ”л¬ј м„ӯм·ЁлҘј мӨ„м—¬ліҙм„ёмҡ”.');
      else insights.push('нҸүк·  нҳҲлӢ№ '+avg+'mg/dL вҖ” лӘ©н‘ң лІ”мң„ лӮҙ кҙҖлҰ¬ мӨ‘мһ…лӢҲлӢӨ.');
    }
    const medDays = dates.filter(d => { const m = data[d] && data[d].meds; return m && Object.values(m).some(Boolean); });
    const medPct2 = dates.length ? Math.round((medDays.length/dates.length)*100) : 0;
    if (medPct2 < 80) insights.push('мөңк·ј ліөм•Ҫ мҷ„лЈҢмңЁ '+medPct2+'% вҖ” к·ңм№ҷм Ғмқё ліөм•Ҫмқҙ нҳҲлӢ№ мЎ°м Ҳм—җ мӨ‘мҡ”н•©лӢҲлӢӨ.');
    else if (medPct2 === 100) insights.push('7мқј м—°мҶҚ ліөм•Ҫ 100% мҷ„лЈҢ вҖ” нӣҢлҘӯн•ң ліөм•Ҫ мҠөкҙҖмһ…лӢҲлӢӨ!');
    if (!insights.length) insights.push('лҚ°мқҙн„°к°Җ лҚ” мҢ“мқҙл©ҙ л§һм¶Ө мқёмӮ¬мқҙнҠёлҘј м ңкіөн•©лӢҲлӢӨ.');
    return insights;
  };

  /* в”Җв”Җ SVG: мӣҗнҳ• кұҙк°• м җмҲҳ кІҢмқҙм§Җ в”Җв”Җ */
  const CircleGauge = ({ value, size=96, stroke=9 }) => {
    const r = (size - stroke) / 2;
    const circ = 2 * Math.PI * r;
    const offset = circ - (value / 100) * circ;
    const color = value >= 80 ? 'var(--cn-ok)' : value >= 60 ? 'var(--cn-brand)' : value >= 40 ? 'var(--cn-warn)' : 'var(--cn-danger)';
    const label = value >= 80 ? 'мҡ°мҲҳ' : value >= 60 ? 'м–‘нҳё' : value >= 40 ? 'ліҙнҶө' : 'мЈјмқҳ';
    return (
      <svg width={size} height={size} viewBox={'0 0 '+size+' '+size} style={{flexShrink:0}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--card-border)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          transform={'rotate(-90 '+(size/2)+' '+(size/2)+')'}
          style={{transition:'stroke-dashoffset 0.7s ease'}}/>
        <text x={size/2} y={size/2-5} textAnchor="middle" fill="var(--text)" fontSize="20" fontWeight="800">{value}</text>
        <text x={size/2} y={size/2+13} textAnchor="middle" fill="var(--text-sub)" fontSize="10">{label}</text>
      </svg>
    );
  };

  /* в”Җв”Җ SVG: мҠӨнҢҢнҒ¬лқјмқё в”Җв”Җ */
  const Sparkline = ({ vals, color='var(--cn-brand)', h=30 }) => {
    if (!vals || vals.length < 2) return <div style={{height:h}}/>;
    const ns = vals.map(v => parseFloat(v)||0);
    const mn = Math.min(...ns), mx = Math.max(...ns);
    const range = mx - mn || 1;
    const w = 100;
    const pts = ns.map((v,i) => ((i/(ns.length-1))*w)+','+(h - ((v-mn)/range)*(h-4)-2)).join(' ');
    return (
      <svg viewBox={'0 0 '+w+' '+h} style={{width:'100%',height:h,display:'block'}} preserveAspectRatio="none">
        <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
      </svg>
    );
  };

  /* в”Җв”Җ ліөм•Ҫ мЈјкё° н—¬нҚј вҖ” н•ҙлӢ№ лӮ м§ңм—җ ліөмҡ©н•ҙм•ј н•ҳлҠ”м§Җ нҢҗлӢЁ в”Җв”Җ */
  const isMedActive = (med, dateStr) => {
    if (med.startDate && dateStr < med.startDate) return false;
    if (med.endDate   && dateStr > med.endDate)   return false;
    const freq = med.freq;
    if (!freq || freq.type === 'daily') return true;
    const d = new Date(dateStr + 'T00:00:00');
    if (freq.type === 'weekly') {
      const days = freq.weekDays || [];
      if (!days.length) return true; // мҡ”мқј лҜём„Өм • мӢң л§Өмқј н‘ңмӢң (м•Ҳм „ нҸҙл°ұ)
      return days.includes(d.getDay());
    }
    if (freq.type === 'monthly') {
      const mdays = freq.monthDays || [];
      if (!mdays.length) return true; // лӮ м§ң лҜём„Өм • мӢң л§Өмқј н‘ңмӢң (м•Ҳм „ нҸҙл°ұ)
      return mdays.includes(d.getDate());
    }
    if (freq.type === 'interval') {
      const ref = new Date(((freq.refDate || med.startDate || dateStr)) + 'T00:00:00');
      const diff = Math.round((d - ref) / 86400000);
      return diff >= 0 && diff % (Math.max(1, freq.intervalDays || 1)) === 0;
    }
    return true;
  };

  const freqLabel = (med) => {
    const f = med.freq;
    if (!f || f.type === 'daily') return null;
    const DAY_KO = ['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];
    if (f.type === 'weekly')   return 'л§ӨмЈј ' + (f.weekDays||[]).map(d=>DAY_KO[d]).join('В·');
    if (f.type === 'monthly')  return 'л§Өмӣ” ' + (f.monthDays||[]).join('В·') + 'мқј';
    if (f.type === 'interval') return `${f.intervalDays||1}мқјл§ҲлӢӨ`;
    return null;
  };

  /* в”Җв”Җ лҰ¬нҸ¬нҠё лҜёлӢҲ мҡ”м•Ҫ (мӮ¬мқҙл“ңл°” м ‘нһҳ мғҒнғң) в”Җв”Җ */
  const ReportMiniSummary = ({ data, allMedIds }) => {
    const summary = useMemo(() => {
      const allDates = Object.keys(data).filter(k => k !== '_user_settings_').sort();
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
      const last30 = allDates.filter(d => new Date(d) >= cutoff);
      if (!last30.length) return null;
      const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
      // нҳҲм••
      const bpVals = last30.map(d=>data[d]?.bp).filter(b=>b?.sys&&b?.dia).map(b=>({sys:parseFloat(b.sys),dia:parseFloat(b.dia)}));
      const avgSys = avg(bpVals.map(b=>b.sys)); const avgDia = avg(bpVals.map(b=>b.dia));
      const bpRate = bpVals.length ? Math.round(bpVals.filter(b=>b.sys<130&&b.dia<85).length/bpVals.length*100) : null;
      // нҳҲлӢ№
      const bsAll = last30.flatMap(d=>Object.values(data[d]?.bs||{}).map(v=>parseFloat(v)).filter(v=>!isNaN(v)&&v>0));
      const avgBs = avg(bsAll);
      const bsRate = bsAll.length ? Math.round(bsAll.filter(v=>v>=70&&v<=140).length/bsAll.length*100) : null;
      // мІҙмӨ‘
      const wVals = last30.map(d=>parseFloat(data[d]?.weight)).filter(v=>!isNaN(v)&&v>0);
      const lastW = wVals[wVals.length-1];
      // ліөм•Ҫ
      const medDays = last30.filter(d=>(allMedIds||[]).some(id=>data[d]?.meds?.[id]===true)).length;
      const medRate = (last30.length && (allMedIds||[]).length) ? Math.round(medDays/last30.length*100) : null;
      // кё°лЎқлҘ 
      const recDays = last30.filter(d=>{ const dy=data[d]; return dy&&(dy.bp?.sys||dy.weight||Object.values(dy.bs||{}).some(v=>v)); }).length;
      const recRate = last30.length ? Math.round(recDays/last30.length*100) : null;
      // мў…н•© м җмҲҳ
      let sc=0, n=0;
      if (bpRate!=null){sc+=bpRate;n++;} if (bsRate!=null){sc+=bsRate;n++;}
      if (medRate!=null){sc+=medRate;n++;} if (recRate!=null){sc+=recRate;n++;}
      const totalScore = n ? Math.round(sc/n) : null;
      const grade = totalScore==null ? null
        : totalScore>=90 ? {label:'л§Өмҡ° мўӢмқҢ',color:'var(--cn-ok)',emoji:'рҹҸҶ'}
        : totalScore>=75 ? {label:'мўӢмқҢ',color:'#3b82f6',emoji:'рҹ‘Қ'}
        : totalScore>=60 ? {label:'ліҙнҶө',color:'#f59e0b',emoji:'рҹ“Ҡ'}
        :                  {label:'мЈјмқҳ н•„мҡ”',color:'var(--cn-danger)',emoji:'вҡ пёҸ'};
      return { avgSys, avgDia, avgBs, lastW, medRate, totalScore, grade };
    }, [data, allMedIds]);

    if (!summary) return <div style={{padding:'8px 16px 14px',fontSize:'12px',color:'var(--text-mute)'}}>кё°лЎқ м—ҶмқҢ</div>;
    const s = summary;
    return (
      <div style={{ padding:'0 16px 16px' }}>
        {/* мў…н•© м җмҲҳ */}
        {s.grade && (
          <div style={{ display:'flex', alignItems:'center', gap:'14px', padding:'10px 14px', borderRadius:'12px',
            background:`linear-gradient(135deg,${s.grade.color}18,${s.grade.color}08)`,
            border:`1px solid ${s.grade.color}33`, marginBottom:'10px' }}>
            <div style={{ fontSize:'28px', lineHeight:1 }}>{s.grade.emoji}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:'11px', color:'var(--text-sub)', fontWeight:'600' }}>мў…н•© кұҙк°• м§ҖмҲҳ В· 30мқј</div>
              <div style={{ fontSize:'26px', fontWeight:'900', color:s.grade.color, lineHeight:1.1 }}>
                {s.totalScore}<span style={{fontSize:'13px',fontWeight:'700'}}>м җ</span>
              </div>
            </div>
            <div style={{ fontSize:'13px', fontWeight:'700', color:s.grade.color, background:`${s.grade.color}20`,
              borderRadius:'8px', padding:'3px 10px' }}>{s.grade.label}</div>
          </div>
        )}
        {/* н•өмӢ¬ м§Җн‘ң нғңк·ё */}
        <div style={{ display:'flex', flexWrap:'wrap', gap:'6px' }}>
          {s.avgSys && <span style={{fontSize:'12px',background:'var(--cn-danger-100)',color:'var(--cn-danger)',borderRadius:'8px',padding:'4px 9px',fontWeight:'700'}}>рҹ’“ {Math.round(s.avgSys)}/{Math.round(s.avgDia)}</span>}
          {s.avgBs  && <span style={{fontSize:'12px',background:'var(--cn-ok-100)',color:'var(--cn-ok)',borderRadius:'8px',padding:'4px 9px',fontWeight:'700'}}>рҹ©ё {Math.round(s.avgBs)}</span>}
          {s.lastW  && <span style={{fontSize:'12px',background:'var(--cn-low-100)',color:'var(--cn-low)',borderRadius:'8px',padding:'4px 9px',fontWeight:'700'}}>вҡ–пёҸ {parseFloat(s.lastW).toFixed(1)}kg</span>}
          {s.medRate!=null && <span style={{fontSize:'12px',background:'var(--cn-brand-100)',color:'var(--cn-brand)',borderRadius:'8px',padding:'4px 9px',fontWeight:'700'}}>рҹ’Ҡ {s.medRate}%</span>}
        </div>
      </div>
    );
  };

  /* в”Җв”Җ мў…н•© кұҙк°• лҰ¬нҸ¬нҠё м»ҙнҸ¬л„ҢнҠё в”Җв”Җ */
  const HealthReportSection = ({ data, medsConfig, allMedIds }) => {
    const report = useMemo(() => {
      const KEY_SKIP = '_user_settings_';
      const allDates = Object.keys(data).filter(k => k !== KEY_SKIP).sort();
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
      const last30 = allDates.filter(d => new Date(d) >= cutoff);
      const prev30start = new Date(); prev30start.setDate(prev30start.getDate() - 60);
      const prev30 = allDates.filter(d => new Date(d) >= prev30start && new Date(d) < cutoff);

      const avg = (arr) => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;

      /* нҳҲм•• */
      const bpVals = last30.map(d => data[d]?.bp).filter(b => b?.sys && b?.dia)
        .map(b => ({ sys: parseFloat(b.sys), dia: parseFloat(b.dia) }));
      const prevBpVals = prev30.map(d => data[d]?.bp).filter(b => b?.sys && b?.dia)
        .map(b => ({ sys: parseFloat(b.sys), dia: parseFloat(b.dia) }));
      const avgSys = avg(bpVals.map(b=>b.sys));
      const avgDia = avg(bpVals.map(b=>b.dia));
      const prevAvgSys = avg(prevBpVals.map(b=>b.sys));
      const bpNormal = bpVals.filter(b => b.sys < 130 && b.dia < 85).length;
      const bpRate = bpVals.length ? Math.round(bpNormal/bpVals.length*100) : null;

      /* нҳҲлӢ№ */
      const bsAll = last30.flatMap(d => {
        const bs = data[d]?.bs || {};
        return Object.values(bs).map(v => parseFloat(v)).filter(v => !isNaN(v) && v > 0);
      });
      const prevBsAll = prev30.flatMap(d => {
        const bs = data[d]?.bs || {};
        return Object.values(bs).map(v => parseFloat(v)).filter(v => !isNaN(v) && v > 0);
      });
      const avgBs = avg(bsAll);
      const prevAvgBs = avg(prevBsAll);
      const bsNormal = bsAll.filter(v => v >= 70 && v <= 140).length;
      const bsRate = bsAll.length ? Math.round(bsNormal/bsAll.length*100) : null;

      /* мІҙмӨ‘ */
      const wVals = last30.map(d => parseFloat(data[d]?.weight)).filter(v => !isNaN(v) && v > 0);
      const firstW = wVals[0], lastW = wVals[wVals.length-1];
      const wChange = (firstW && lastW) ? (lastW - firstW) : null;

      /* мІҙм§Җл°© */
      const bfVals = last30.map(d => parseFloat(data[d]?.bodyFat)).filter(v => !isNaN(v) && v > 0);
      const firstBf = bfVals[0], lastBf = bfVals[bfVals.length-1];
      const bfChange = (firstBf && lastBf) ? (lastBf - firstBf) : null;

      /* мҡҙлҸҷ (кұёмқҢмҲҳ) */
      const stepsVals = last30.map(d => parseFloat(data[d]?.steps)).filter(v => !isNaN(v) && v > 0);
      const avgSteps = avg(stepsVals);
      const prevStepsVals = prev30.map(d => parseFloat(data[d]?.steps)).filter(v => !isNaN(v) && v > 0);
      const prevAvgSteps = avg(prevStepsVals);
      const activeDays = last30.filter(d => {
        const s = parseFloat(data[d]?.steps); const c = parseFloat(data[d]?.cal);
        const logs = data[d]?.exercise?.logs || [];
        return (s > 3000) || (c > 200) || logs.length > 0;
      }).length;

      /* ліөм•Ҫ мҲңмқ‘лҸ„ */
      const medDays = last30.filter(d => {
        const meds = data[d]?.meds || {};
        const allIds = allMedIds || [];
        if (!allIds.length) return false;
        return allIds.some(id => meds[id] === true);
      }).length;
      const medRate = last30.length ? Math.round(medDays/last30.length*100) : null;

      /* кё°лЎқ м¶©мӢӨлҸ„ */
      const recordedDays = last30.filter(d => {
        const dy = data[d]; if (!dy) return false;
        return (dy.bp?.sys) || (dy.weight) || Object.values(dy.bs||{}).some(v=>v);
      }).length;
      const recordRate = last30.length ? Math.round(recordedDays/last30.length*100) : null;

      /* м№јлЎңлҰ¬ м„ӯм·Ё м¶”м • (лӮҙмһҘ DB кё°л°ҳ) */
      const estimateCalFromText = (text) => {
        if (!text?.trim()) return 0;
        const items = text.split(/[\n]+/).map(s => s.trim()).filter(Boolean)
          .filter(s => !/kcal|м№јлЎңлҰ¬|нғ„мҲҳнҷ”л¬ј|лӢЁл°ұм§Ҳ|м§Җл°©|нҳҲлӢ№|м Ғн•©|к°ңм„ |мҙқ\s*мҳҒм–‘|мқҢмӢқ\s*лӘ©лЎқ|Powered/i.test(s))
          .filter(s => !/^[-вҖўрҹҚҪрҹ“Ҡрҹ©ёвң…рҹ’Ўвҡ пёҸвҖ»]/.test(s))
          .flatMap(s => s.split(',').map(x => x.trim()).filter(Boolean));
        let total = 0;
        items.forEach(item => {
          const qMatch = item.match(/(\d+(?:\.\d+)?)\s*(кіөкё°|к°ң|к·ёлҰҮ|лҙү|м ‘мӢң|мһ”|м»ө|мЎ°к°Ғ|мқёл¶„|к°ңл¶„)/);
          const qty = qMatch ? parseFloat(qMatch[1]) : 1;
          let matched = null, matchedLen = 0;
          for (const [name, cal] of Object.entries(FOOD_DB)) {
            if (item.includes(name) && name.length > matchedLen) { matched = cal; matchedLen = name.length; }
          }
          if (matched) total += Math.round(matched * qty);
        });
        return total;
      };
      const dailyCals = last30.map(d => {
        const dy = data[d]; if (!dy) return null;
        let dayCal = 0;
        ['breakfast','lunch','dinner'].forEach(id => { dayCal += estimateCalFromText(dy.meals?.[id]); });
        (dy.extraMeals||[]).forEach(em => { dayCal += estimateCalFromText(em.text); });
        return dayCal > 0 ? dayCal : null;
      }).filter(v => v !== null);
      const avgDailyCal = avg(dailyCals);
      const maxDailyCal = dailyCals.length ? Math.max(...dailyCals) : null;
      const minDailyCal = dailyCals.length ? Math.min(...dailyCals) : null;
      // лӘ©н‘ң м№јлЎңлҰ¬: лӢ№лҮЁ кё°мӨҖ 1,600~2,000 kcal
      const calGoal = 1800;
      const calStatus = avgDailyCal == null ? null
        : avgDailyCal < 1200 ? { label:'м„ӯм·Ё л¶ҖмЎұ', color:'#3b82f6' }
        : avgDailyCal <= 2000 ? { label:'м Ғм • лІ”мң„', color:'var(--cn-ok)' }
        : avgDailyCal <= 2400 ? { label:'м•Ҫк°„ кіјлӢӨ', color:'#f59e0b' }
        : { label:'кіјлӢӨ м„ӯм·Ё', color:'var(--cn-danger)' };

      /* нҠёл Ңл“ң нҷ”мӮҙн‘ң */
      const trend = (now, prev, lowerBetter=false) => {
        if (now == null || prev == null) return null;
        const diff = now - prev;
        if (Math.abs(diff) < 1) return { icon:'вҶ’', color:'var(--text-sub)', label:'мң м§Җ' };
        const improving = lowerBetter ? diff < 0 : diff > 0;
        return improving
          ? { icon:'вҶ‘', color:'var(--cn-ok)', label:`${lowerBetter?'к°җмҶҢ':'мҰқк°Җ'}` }
          : { icon:'вҶ“', color:'var(--cn-danger)', label:`${lowerBetter?'мҰқк°Җ':'к°җмҶҢ'}` };
      };
      const bpTrend = trend(avgSys, prevAvgSys, true);
      const bsTrend = trend(avgBs, prevAvgBs, true);
      const stepsTrend = trend(avgSteps, prevAvgSteps, false);

      /* мў…н•© м җмҲҳ */
      let score = 0, scoreItems = 0;
      if (bpRate != null)   { score += bpRate;    scoreItems++; }
      if (bsRate != null)   { score += bsRate;    scoreItems++; }
      if (medRate != null && allMedIds?.length)  { score += medRate;   scoreItems++; }
      if (recordRate != null){ score += recordRate; scoreItems++; }
      const totalScore = scoreItems ? Math.round(score/scoreItems) : null;
      const scoreGrade = totalScore == null ? null
        : totalScore >= 90 ? { label:'л§Өмҡ° мўӢмқҢ', color:'var(--cn-ok)', emoji:'рҹҸҶ' }
        : totalScore >= 75 ? { label:'мўӢмқҢ',      color:'#3b82f6',     emoji:'рҹ‘Қ' }
        : totalScore >= 60 ? { label:'ліҙнҶө',       color:'#f59e0b',     emoji:'рҹ“Ҡ' }
        :                    { label:'мЈјмқҳ н•„мҡ”',  color:'var(--cn-danger)', emoji:'вҡ пёҸ' };

      return { last30Len: last30.length, avgSys, avgDia, bpRate, bpTrend,
               avgBs, bsAll, bsRate, bsTrend,
               lastW, wChange, lastBf, bfChange,
               avgSteps, activeDays, stepsTrend,
               medRate, recordRate, totalScore, scoreGrade,
               avgDailyCal, maxDailyCal, minDailyCal, dailyCalsLen: dailyCals.length, calStatus, calGoal };
    }, [data, allMedIds]);

    const r = report;
    if (r.last30Len === 0) return (
      <div style={{ textAlign:'center', padding:'32px 0', color:'var(--text-sub)', fontSize:'14px' }}>
        кё°лЎқмқҙ м—Ҷм–ҙмҡ”. кұҙк°• лҚ°мқҙн„°лҘј мһ…л Ҙн•ҳл©ҙ лҰ¬нҸ¬нҠёк°Җ мғқм„ұлҸјмҡ”.
      </div>
    );

    const StatRow = ({ icon, label, value, sub, trend, note }) => (
      <div style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px 0', borderBottom:'1px solid var(--card-border)' }}>
        <div style={{ fontSize:'22px', width:'32px', textAlign:'center', flexShrink:0 }}>{icon}</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:'13px', color:'var(--text-sub)', fontWeight:'600' }}>{label}</div>
          {note && <div style={{ fontSize:'11px', color:'var(--text-mute)', marginTop:'1px' }}>{note}</div>}
        </div>
        <div style={{ textAlign:'right' }}>
          <div style={{ fontSize:'18px', fontWeight:'800', color:'var(--text)' }}>{value ?? 'вҖ“'}</div>
          {sub && <div style={{ fontSize:'11px', color:'var(--text-sub)', marginTop:'1px' }}>{sub}</div>}
        </div>
        {trend && (
          <div style={{ fontSize:'18px', fontWeight:'800', color:trend.color, width:'24px', textAlign:'center' }}>{trend.icon}</div>
        )}
      </div>
    );

    const RateBar = ({ rate, color }) => rate == null ? null : (
      <div style={{ height:'6px', background:'var(--card-border)', borderRadius:'3px', margin:'4px 0 0', overflow:'hidden' }}>
        <div style={{ height:'100%', width:`${rate}%`, background:color || 'var(--cn-brand)', borderRadius:'3px', transition:'width 0.6s ease' }} />
      </div>
    );

    return (
      <div>
        {/* мў…н•© м җмҲҳ */}
        {r.scoreGrade && (
          <div style={{ background:`linear-gradient(135deg, ${r.scoreGrade.color}22, ${r.scoreGrade.color}11)`,
            border:`1.5px solid ${r.scoreGrade.color}44`, borderRadius:'18px', padding:'26px 16px 22px', marginBottom:'16px', textAlign:'center' }}>
            <img src="icons/trophy.png" alt="" style={{ width:'110px', height:'110px', objectFit:'contain', marginBottom:'6px', filter:'drop-shadow(0 6px 12px rgba(11,27,59,0.15))' }} />
            <div style={{ fontFamily:'var(--font-title)', fontSize:'15px', color:'var(--text-sub)', fontWeight:'700' }}>мў…н•© кұҙк°• м§ҖмҲҳ</div>
            <div style={{ fontFamily:'var(--font-title)', fontSize:'64px', fontWeight:'700', color:r.scoreGrade.color, lineHeight:1.05, letterSpacing:'-1px' }}>{r.totalScore}<span style={{fontSize:'24px', fontWeight:'700'}}>м җ</span></div>
            <div style={{ display:'inline-block', fontSize:'16px', fontWeight:'800', color:'#fff', background:r.scoreGrade.color, borderRadius:'20px', padding:'5px 18px', marginTop:'6px' }}>{r.scoreGrade.label}</div>
            <div style={{ fontSize:'12px', color:'var(--text-mute)', marginTop:'10px' }}>мөңк·ј 30мқј {r.last30Len}мқј кё°мӨҖ</div>
          </div>
        )}

        {/* нҳҲм•• */}
        <div style={{ marginBottom:'12px' }}>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>рҹ’“ нҳҲм••</div>
          <StatRow icon="рҹ©ә" label="нҸүк·  нҳҲм••" value={r.avgSys ? `${Math.round(r.avgSys)}/${Math.round(r.avgDia)}` : null} sub="mmHg" trend={r.bpTrend} note="м „мӣ” лҢҖл№„" />
          {r.bpRate != null && <>
            <div style={{ fontSize:'12px', color:'var(--text-sub)', marginTop:'6px' }}>м •мғҒ лІ”мң„ лӢ¬м„ұлҘ  <strong>{r.bpRate}%</strong> ({r.bpVals?.length ?? 'вҖ“'}нҡҢ мёЎм •)</div>
            <RateBar rate={r.bpRate} color={r.bpRate >= 70 ? 'var(--cn-ok)' : r.bpRate >= 50 ? '#f59e0b' : 'var(--cn-danger)'} />
          </>}
        </div>

        {/* нҳҲлӢ№ */}
        <div style={{ marginBottom:'12px' }}>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>рҹ©ё нҳҲлӢ№</div>
          <StatRow icon="рҹ“ү" label="нҸүк·  нҳҲлӢ№" value={r.avgBs ? `${Math.round(r.avgBs)}` : null} sub="mg/dL" trend={r.bsTrend} note="м „мӣ” лҢҖл№„" />
          {r.bsRate != null && <>
            <div style={{ fontSize:'12px', color:'var(--text-sub)', marginTop:'6px' }}>м •мғҒ лІ”мң„(70~140) лӢ¬м„ұлҘ  <strong>{r.bsRate}%</strong> ({r.bsAll?.length ?? 'вҖ“'}нҡҢ мёЎм •)</div>
            <RateBar rate={r.bsRate} color={r.bsRate >= 70 ? 'var(--cn-ok)' : r.bsRate >= 50 ? '#f59e0b' : 'var(--cn-danger)'} />
          </>}
        </div>

        {/* мІҙмӨ‘ */}
        <div style={{ marginBottom:'12px' }}>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>вҡ–пёҸ мІҙмӨ‘ В· мІҙм§Җл°©</div>
          <StatRow icon="вҡ–пёҸ" label="нҳ„мһ¬ мІҙмӨ‘" value={r.lastW ? `${parseFloat(r.lastW).toFixed(1)}` : null} sub="kg"
            trend={r.wChange != null ? { icon: r.wChange > 0 ? 'вҶ‘' : r.wChange < 0 ? 'вҶ“' : 'вҶ’',
              color: r.wChange < 0 ? 'var(--cn-ok)' : r.wChange > 0 ? 'var(--cn-danger)' : 'var(--text-sub)',
              label: '' } : null}
            note={r.wChange != null ? `30мқјк°„ ${r.wChange > 0 ? '+' : ''}${r.wChange.toFixed(1)}kg` : null} />
          {r.lastBf && <StatRow icon="рҹ’§" label="мІҙм§Җл°©мңЁ" value={`${parseFloat(r.lastBf).toFixed(1)}%`}
            trend={r.bfChange != null ? { icon: r.bfChange > 0 ? 'вҶ‘' : r.bfChange < 0 ? 'вҶ“' : 'вҶ’',
              color: r.bfChange < 0 ? 'var(--cn-ok)' : r.bfChange > 0 ? 'var(--cn-danger)' : 'var(--text-sub)',
              label: '' } : null}
            note={r.bfChange != null ? `30мқјк°„ ${r.bfChange > 0 ? '+' : ''}${r.bfChange.toFixed(1)}%` : null} />}
        </div>

        {/* мҡҙлҸҷ */}
        <div style={{ marginBottom:'12px' }}>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>рҹҸғ нҷңлҸҷ</div>
          <StatRow icon="рҹ‘ҹ" label="мқјнҸүк·  кұёмқҢмҲҳ" value={r.avgSteps ? Math.round(r.avgSteps).toLocaleString() : null} sub="кұёмқҢ" trend={r.stepsTrend} note="м „мӣ” лҢҖл№„" />
          <StatRow icon="рҹ—“пёҸ" label="нҷңлҸҷ лӢ¬м„ұмқј" value={r.activeDays != null ? `${r.activeDays}мқј` : null} sub={`/ ${r.last30Len}мқј`}
            note="кұёмқҢ 3000+ лҳҗлҠ” мҡҙлҸҷ кё°лЎқ мһҲлҠ” лӮ " />
          {r.activeDays != null && r.last30Len && <>
            <RateBar rate={Math.round(r.activeDays/r.last30Len*100)} color={r.activeDays/r.last30Len >= 0.5 ? 'var(--cn-ok)' : '#f59e0b'} />
          </>}
        </div>

        {/* ліөм•Ҫ */}
        {r.medRate != null && (
          <div style={{ marginBottom:'12px' }}>
            <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>рҹ’Ҡ ліөм•Ҫ</div>
            <StatRow icon="рҹ’Ҡ" label="ліөм•Ҫ мҲңмқ‘лҸ„" value={`${r.medRate}%`} sub={`${r.last30Len}мқј мӨ‘`} />
            <RateBar rate={r.medRate} color={r.medRate >= 80 ? 'var(--cn-ok)' : r.medRate >= 60 ? '#f59e0b' : 'var(--cn-danger)'} />
          </div>
        )}

        {/* м№јлЎңлҰ¬ м„ӯм·Ё */}
        {r.avgDailyCal != null && (
          <div style={{ marginBottom:'12px' }}>
            <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>рҹҚҪпёҸ м№јлЎңлҰ¬ м„ӯм·Ё</div>
            <StatRow icon="рҹ”Ҙ" label="мқјнҸүк·  м№јлЎңлҰ¬" value={`${Math.round(r.avgDailyCal).toLocaleString()}`} sub="kcal / мқј"
              note={r.calStatus ? r.calStatus.label : null}
              trend={r.calStatus ? { icon: r.avgDailyCal <= r.calGoal ? 'вң“' : '!', color: r.calStatus.color, label:'' } : null} />
            <div style={{ display:'flex', gap:'12px', marginTop:'6px', fontSize:'12px', color:'var(--text-sub)' }}>
              {r.minDailyCal != null && <span>мөңмҶҢ <strong>{Math.round(r.minDailyCal).toLocaleString()}</strong> kcal</span>}
              {r.maxDailyCal != null && <span>мөңлҢҖ <strong>{Math.round(r.maxDailyCal).toLocaleString()}</strong> kcal</span>}
              <span style={{color:'var(--text-mute)'}}>{r.dailyCalsLen}мқј кё°лЎқ кё°мӨҖ</span>
            </div>
            {/* лӘ©н‘ң лҢҖл№„ л°” (лӘ©н‘ң 1,800 kcal кё°мӨҖ) */}
            <div style={{ marginTop:'6px', position:'relative', height:'6px', background:'var(--card-border)', borderRadius:'3px', overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${Math.min(r.avgDailyCal/2400*100,100)}%`, background: r.calStatus?.color || 'var(--cn-brand)', borderRadius:'3px', transition:'width 0.6s ease' }} />
              {/* лӘ©н‘ңм„  л§Ҳм»Ө */}
              <div style={{ position:'absolute', top:0, left:`${r.calGoal/2400*100}%`, width:'2px', height:'100%', background:'var(--text-sub)', opacity:0.5 }} />
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:'10px', color:'var(--text-mute)', marginTop:'2px' }}>
              <span>0</span><span style={{color:'var(--text-sub)'}}>лӘ©н‘ң {r.calGoal.toLocaleString()}kcal</span><span>2,400+</span>
            </div>
            <div style={{ fontSize:'11px', color:'var(--text-mute)', marginTop:'4px' }}>
              вҖ» мһ…л Ҙлҗң мӢқмӮ¬ н…ҚмҠӨнҠё кё°л°ҳ м¶”м •к°’ (лӮҙмһҘ DB)мқҙм—җмҡ”. лҜёкё°лЎқ мӢқмӮ¬лҠ” нҸ¬н•Ёлҗҳм§Җ м•Ҡм•„мҡ”.
            </div>
          </div>
        )}

        {/* кё°лЎқ м¶©мӢӨлҸ„ */}
        <div>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>рҹ“қ кё°лЎқ</div>
          <StatRow icon="рҹ“Ӣ" label="кё°лЎқ м¶©мӢӨлҸ„" value={r.recordRate != null ? `${r.recordRate}%` : null} sub={`${r.last30Len}мқј мӨ‘ ${Math.round((r.recordRate||0)*r.last30Len/100)}мқј кё°лЎқ`} />
          <RateBar rate={r.recordRate} color={r.recordRate >= 80 ? 'var(--cn-ok)' : r.recordRate >= 50 ? '#f59e0b' : 'var(--cn-danger)'} />
        </div>
      </div>
    );
  };

  /* в”Җв”Җ лҢҖмӢңліҙл“ң: нҷҲнғӯ в”Җв”Җ */
  const DashboardHome = ({ data, date, medsConfig, allMedIds, goals, height }) => {
    const stepGoal = Math.max(1000, parseInt(goals?.steps) || 10000);
    const score = useMemo(() => calcHealthScore(data), [data]);
    const insights = useMemo(() => genInsights(data), [data]);
    const DAY_KOR = ['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];

    // мөңк·ј 14мқј
    const recent14 = useMemo(() => Array.from({length:14},(_,i)=>shiftDate(date,i-13)), [date]);
    const bpSysVals = recent14.map(d => data[d] && data[d].bp && data[d].bp.sys).filter(Boolean);
    const bpDiaVals = recent14.map(d => data[d] && data[d].bp && data[d].bp.dia).filter(Boolean);
    const bsVals = recent14.map(d => {
      const bs = (data[d] && data[d].bs) || {};
      const v = bs.bs_bf_am || bs.bs_af_am || bs.bs_bf_lu || bs.bs_af_lu || bs.bs_bf_di || bs.bs_af_di || bs.bs_bed;
      return v || null;
    }).filter(Boolean);
    const weightVals = recent14.map(d => data[d] && data[d].weight).filter(Boolean);

    const todayData = normalizeDay(data[date]);
    const lastBP = (todayData.bp && todayData.bp.sys)
      ? todayData.bp.sys+'/'+todayData.bp.dia
      : (bpSysVals.length ? bpSysVals[bpSysVals.length-1]+'/'+bpDiaVals[bpDiaVals.length-1] : '---');
    const lastBS = (() => {
      const bs = (todayData.bs) || {};
      return bs.bs_bf_am || bs.bs_af_am || bs.bs_bf_lu || bs.bs_af_lu || bs.bs_bf_di || bs.bs_af_di || bs.bs_bed
        || (bsVals.length ? bsVals[bsVals.length-1] : null);
    })();
    const lastW = todayData.weight || (weightVals.length ? weightVals[weightVals.length-1] : null);

    // BMI (мІҙм§Ҳлҹүм§ҖмҲҳ) вҖ” нӮӨ(cm) + мөңк·ј мІҙмӨ‘(kg)
    const bmi = (() => {
      const h = parseFloat(height), w = parseFloat(lastW);
      if (!h || !w || h < 50 || h > 250) return null;
      return w / ((h/100) ** 2);
    })();
    const bmiCat = bmi == null ? null
      : bmi < 18.5 ? { label:'м ҖмІҙмӨ‘', color:'#3b82f6', pos: bmi/40*100 }
      : bmi < 23   ? { label:'м •мғҒ',   color:'var(--cn-ok)', pos: bmi/40*100 }
      : bmi < 25   ? { label:'кіјмІҙмӨ‘', color:'var(--cn-warn)', pos: bmi/40*100 }
      : { label:'л№„л§Ң', color:'var(--cn-danger)', pos: Math.min(bmi,40)/40*100 };

    // ліөм•Ҫ нҳ„нҷ©
    const medsToday = allMedIds.filter(id => todayData.meds && todayData.meds[id]).length;
    const medsPct = allMedIds.length ? Math.round((medsToday/allMedIds.length)*100) : 0;

    // нҳҲм•• м°ЁнҠё лҚ°мқҙн„° (мөңк·ј 14мқј мӨ‘ лҚ°мқҙн„° мһҲлҠ” лӮ )
    const bpChartData = recent14.map(d => ({
      d, sys: data[d] && data[d].bp && parseInt(data[d].bp.sys)||null,
      dia: data[d] && data[d].bp && parseInt(data[d].bp.dia)||null
    })).filter(x => x.sys);
    const allBpNums = bpChartData.flatMap(x=>[x.sys,x.dia]).filter(Boolean);
    const bpMin2 = allBpNums.length ? Math.min(...allBpNums)-8 : 60;
    const bpMax2 = allBpNums.length ? Math.max(...allBpNums)+8 : 160;
    const bpRange2 = bpMax2 - bpMin2 || 80;
    const CW = 280, CH = 100;
    const bpY = v => CH - ((v-bpMin2)/bpRange2)*CH;

    // нҠёл Ңл“ң лұғм§Җ
    const TrendBadge = ({ vals }) => {
      if (!vals || vals.length < 4) return null;
      const r = vals.slice(-3).map(v=>parseFloat(v)||0);
      const p = vals.slice(-6,-3).map(v=>parseFloat(v)||0);
      if (!r.length || !p.length) return null;
      const rA = r.reduce((a,b)=>a+b,0)/r.length;
      const pA = p.reduce((a,b)=>a+b,0)/p.length;
      const diff = rA - pA;
      if (Math.abs(diff) < 1.5) return <span className="dash-trend dash-trend-st">вҖ” м•Ҳм •</span>;
      if (diff > 0) return <span className="dash-trend dash-trend-up">в–І +{Math.round(diff)}</span>;
      return <span className="dash-trend dash-trend-dn">в–ј {Math.round(diff)}</span>;
    };

    // мҡҙлҸҷ нҳ„нҷ© (мөңк·ј 7мқј)
    const exDays7 = Array.from({length:7},(_,i)=>shiftDate(date,i-6)).map(d => {
      const ex = data[d] && data[d].exercise;
      return { d, mins: parseInt((ex && ex.mins)||0), type: (ex && ex.type)||'' };
    });
    const maxEx = Math.max(...exDays7.map(x=>x.mins), 1);

    return (
      <div className="cn-card" data-tab="home" style={{ background:'transparent', border:'none', borderRadius:0, padding:0, boxShadow:'none', margin:0 }}>
        {/* кұҙк°• м җмҲҳ */}
        <div className="dash-score-card">
          <CircleGauge value={score.total}/>
          <div className="dash-score-info">
            <div className="dash-score-title">мў…н•© кұҙк°• м җмҲҳ (14мқј нҸүк· )</div>
            <div className="dash-score-breakdown">
              {[
                { label:'нҳҲм••', val:score.bp,       color:'var(--cn-danger)', w:'30%' },
                { label:'нҳҲлӢ№', val:score.glucose,  color:'var(--cn-ok)',     w:'30%' },
                { label:'ліөм•Ҫ', val:score.meds,     color:'var(--cn-brand)',  w:'25%' },
                { label:'мҡҙлҸҷ', val:score.exercise, color:'var(--cn-warn)',   w:'15%' },
              ].map(row => (
                <div key={row.label} className="dash-score-row">
                  <span style={{fontSize:10,color:'var(--text-sub)',width:28,flexShrink:0}}>{row.label}</span>
                  <div className="dash-score-bar-bg">
                    <div className="dash-score-bar" style={{width:row.val+'%',background:row.color}}/>
                  </div>
                  <span style={{fontSize:10,color:'var(--text-sub)',width:22,textAlign:'right',flexShrink:0}}>{row.val}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* 4 л©”нҠёлҰӯ м№ҙл“ң */}
        <div className="dash-metric-grid">
          <div className="dash-metric-card">
            <div className="dash-metric-head"><IcChip src="icons/blood.png"/><span className="dash-metric-label">нҳҲм••</span></div>
            <div style={{display:'flex',alignItems:'baseline',gap:4}}>
              <span className="dash-metric-val cn-num" style={{color:bpSysVals.length?'var(--text)':'var(--text-mute)'}}>{lastBP}</span>
              <span className="dash-metric-unit">mmHg</span>
            </div>
            <TrendBadge vals={bpSysVals}/>
            <Sparkline vals={bpSysVals.slice(-10)} color="var(--cn-danger)" h={28}/>
          </div>
          <div className="dash-metric-card">
            <div className="dash-metric-head"><IcChip src="icons/case.png"/><span className="dash-metric-label">нҳҲлӢ№ (мөңк·ј)</span></div>
            <div style={{display:'flex',alignItems:'baseline',gap:4}}>
              <span className="dash-metric-val cn-num" style={{color:lastBS?bsColor(lastBS):'var(--text-mute)'}}>{lastBS||'---'}</span>
              <span className="dash-metric-unit">mg/dL</span>
            </div>
            {lastBS && <span style={{fontSize:13,color:bsColor(lastBS),fontWeight:800}}>{bsLabel(lastBS)}</span>}
            <Sparkline vals={bsVals.slice(-10)} color="var(--cn-ok)" h={28}/>
          </div>
          <div className="dash-metric-card">
            <div className="dash-metric-head"><IcChip src="icons/weight.png"/><span className="dash-metric-label">мІҙмӨ‘</span></div>
            <div style={{display:'flex',alignItems:'baseline',gap:4}}>
              <span className="dash-metric-val cn-num">{lastW ? (isNaN(parseFloat(lastW)) ? lastW : String(Math.round(parseFloat(lastW)*100)/100)) : '---'}</span>
              <span className="dash-metric-unit">kg</span>
            </div>
            {goals?.weight && lastW && !isNaN(parseFloat(lastW)) && (() => {
              const diff = Math.round((parseFloat(lastW) - parseFloat(goals.weight)) * 10) / 10;
              return (
                <div style={{ fontSize:'12px', fontWeight:'800', color: diff <= 0 ? 'var(--cn-ok)' : 'var(--text-mute)', marginTop:'2px' }}>
                  рҹҺҜ лӘ©н‘ң {parseFloat(goals.weight)}kg {diff <= 0 ? 'лӢ¬м„ұ!' : `(лӮЁмқҖ ${diff}kg)`}
                </div>
              );
            })()}
            <TrendBadge vals={weightVals}/>
            <Sparkline vals={weightVals.slice(-10)} color="var(--cn-low)" h={28}/>
          </div>
          <div className="dash-metric-card">
            <div className="dash-metric-head"><IcChip src="icons/drug3.png"/><span className="dash-metric-label">мҳӨлҠҳ ліөм•Ҫ</span></div>
            <div style={{display:'flex',alignItems:'baseline',gap:4}}>
              <span className="dash-metric-val cn-num" style={{color:medsPct===100?'var(--cn-ok)':medsPct>0?'var(--cn-brand)':'var(--text-mute)'}}>{medsToday}</span>
              <span className="dash-metric-unit">/ {allMedIds.length}к°ң</span>
            </div>
            <div style={{marginTop:6,background:'var(--card-border)',borderRadius:5,height:7,overflow:'hidden'}}>
              <div style={{width:medsPct+'%',height:'100%',background:medsPct===100?'var(--cn-ok)':'var(--cn-brand)',borderRadius:5,transition:'width 0.5s'}}/>
            </div>
            <span style={{fontSize:13,color:medsPct===100?'var(--cn-ok)':'var(--text-sub)',fontWeight:700,marginTop:2}}>{medsPct===100?'вң“ мҷ„лЈҢ':medsPct+'% мҷ„лЈҢ'}</span>
          </div>
        </div>

        {/* BMI кұҙк°•м§ҖмҲҳ м№ҙл“ң */}
        <div className="cn-card" style={{ marginBottom:14 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: bmi!=null ? 14 : 0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:11 }}>
              <span className="dash-ic-chip"><img src="icons/weight.png" alt=""/></span>
              <div>
                <div style={{ fontFamily:'var(--font-title)', fontSize:'17px', fontWeight:'700', color:'var(--text)' }}>мІҙм§Ҳлҹүм§ҖмҲҳ (BMI)</div>
                <div style={{ fontSize:'12px', color:'var(--text-mute)' }}>{bmi!=null ? `нӮӨ ${parseFloat(height)}cm В· мІҙмӨ‘ ${parseFloat(lastW)}kg` : 'нӮӨВ·мІҙмӨ‘ мһ…л Ҙ мӢң н‘ңмӢң'}</div>
              </div>
            </div>
            {bmi!=null && (
              <div style={{ textAlign:'right' }}>
                <div style={{ fontFamily:'var(--font-title)', fontSize:'34px', fontWeight:'700', color:bmiCat.color, lineHeight:1 }}>{bmi.toFixed(1)}</div>
                <div style={{ display:'inline-block', fontSize:'12px', fontWeight:'800', color:'#fff', background:bmiCat.color, borderRadius:'20px', padding:'2px 12px', marginTop:'3px' }}>{bmiCat.label}</div>
              </div>
            )}
          </div>
          {bmi!=null && (() => {
            // кІҢмқҙм§Җ: м ҖмІҙмӨ‘(<18.5)В·м •мғҒ(18.5-23)В·кіјмІҙмӨ‘(23-25)В·л№„л§Ң(25+) вҶ’ 40 мҠӨмјҖмқј
            const seg = [[0,18.5,'#3b82f6'],[18.5,23,'var(--cn-ok)'],[23,25,'var(--cn-warn)'],[25,40,'var(--cn-danger)']];
            return (
              <div>
                <div style={{ display:'flex', height:'10px', borderRadius:'6px', overflow:'hidden' }}>
                  {seg.map(([a,b,c],i) => <div key={i} style={{ flex: b-a, background:c }}/>)}
                </div>
                <div style={{ position:'relative', height:'0' }}>
                  <div style={{ position:'absolute', left:`${Math.min(Math.max(bmi/40*100,1),99)}%`, top:'-15px', transform:'translateX(-50%)', width:'3px', height:'16px', background:'var(--text)', borderRadius:'2px', boxShadow:'0 0 0 2px var(--card-bg)' }}/>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:'10px', color:'var(--text-mute)', marginTop:'8px', fontWeight:'600' }}>
                  <span>м ҖмІҙмӨ‘</span><span>м •мғҒ</span><span>кіјмІҙмӨ‘</span><span>л№„л§Ң</span>
                </div>
              </div>
            );
          })()}
        </div>

        {/* нҳҲм•• м¶”мқҙ м°ЁнҠё */}
        {bpChartData.length >= 2 && (
          <div className="cn-card" style={{padding:'14px 12px 10px',marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--text-sub)',marginBottom:8}}>рҹ’“ нҳҲм•• м¶”мқҙ (14мқј)</div>
            <svg viewBox={'0 0 '+CW+' '+CH} style={{width:'100%',height:CH}} preserveAspectRatio="none">
              {[80,120,140,160].map(v=>(
                <line key={v} x1={0} y1={bpY(v)} x2={CW} y2={bpY(v)} stroke="var(--chart-grid)" strokeWidth={0.7} strokeDasharray="4,3"/>
              ))}
              <rect x={0} y={bpY(130)} width={CW} height={bpY(80)-bpY(130)} fill="rgba(16,185,129,0.06)"/>
              <polyline points={bpChartData.map((x,i)=>((i/(bpChartData.length-1))*CW)+','+bpY(x.sys)).join(' ')}
                fill="none" stroke="var(--cn-danger)" strokeWidth={2} strokeLinejoin="round"/>
              <polyline points={bpChartData.map((x,i)=>((i/(bpChartData.length-1))*CW)+','+bpY(x.dia)).join(' ')}
                fill="none" stroke="var(--cn-brand)" strokeWidth={1.5} strokeLinejoin="round" strokeOpacity={0.6}/>
              {bpChartData.map((x,i)=>(
                <circle key={i} cx={(i/(bpChartData.length-1))*CW} cy={bpY(x.sys)} r={3} fill="var(--cn-danger)"/>
              ))}
            </svg>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
              {[bpChartData[0],bpChartData[Math.floor((bpChartData.length-1)/2)],bpChartData[bpChartData.length-1]].filter(Boolean).map((x,i)=>(
                <span key={i} style={{fontSize:10,color:'var(--chart-axis)'}}>{fmtDate(x.d).short}</span>
              ))}
            </div>
            <div style={{display:'flex',gap:10,marginTop:4,fontSize:10,color:'var(--text-sub)'}}>
              <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:10,height:2,background:'var(--cn-danger)',display:'inline-block',borderRadius:1}}/> мҲҳм¶•кё°</span>
              <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:10,height:2,background:'var(--cn-brand)',display:'inline-block',borderRadius:1,opacity:0.6}}/> мқҙмҷ„кё°</span>
            </div>
          </div>
        )}

        {/* мЈјк°„ мҡҙлҸҷ нҳ„нҷ© */}
        <div className="cn-card" style={{padding:'14px 14px 10px',marginBottom:14}}>
          <CardHd src="icons/health1.png" label="мЈјк°„ мҡҙлҸҷ" />
          <div className="dash-steps-bars">
            {exDays7.map((x,i) => {
              const dt = new Date(x.d+'T12:00:00');
              const ratio = x.mins / maxEx;
              const isGood = x.mins >= 30;
              return (
                <div key={i} className="dash-step-col">
                  {x.mins > 0 && <div style={{fontSize:9,color:'var(--text-sub)',marginBottom:2}}>{x.mins}л¶„</div>}
                  <div className="dash-step-bar" style={{height:Math.max(ratio*44,3)+'px',background:isGood?'var(--cn-ok)':'var(--cn-brand)',opacity:x.mins?1:0.18}}/>
                  <div className="dash-step-day">{DAY_KOR[dt.getDay()]}</div>
                </div>
              );
            })}
          </div>
          {exDays7.every(x=>!x.mins) && <div style={{fontSize:12,color:'var(--text-mute)',textAlign:'center',paddingTop:4}}>мҡҙлҸҷ кё°лЎқмқ„ мһ…л Ҙн•ҳл©ҙ м¶”мқҙлҘј ліј мҲҳ мһҲм–ҙмҡ”</div>}
        </div>

        {/* мҳӨлҠҳ кұёмқҢмҲҳ */}
        {(() => {
          const hasVal = (v) => v !== '' && v !== null && v !== undefined && !isNaN(Number(v));
          const stepsNum = hasVal(todayData.steps) ? Number(todayData.steps) : null;
          const hasSteps = stepsNum !== null;
          const pct = hasSteps ? Math.min(100, Math.round(stepsNum / stepGoal * 100)) : 0;
          return (
            <div className="cn-card" style={{padding:'14px 14px 12px', marginBottom:14}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: hasSteps ? 8 : 0}}>
                <CardHd src="icons/shoes.png" label="мҳӨлҠҳ кұёмқҢмҲҳ" />
                {hasSteps && stepsNum >= stepGoal && <span style={{fontSize:11, color:'var(--cn-ok)', fontWeight:700}}>рҹҺү лӘ©н‘ң лӢ¬м„ұ!</span>}
              </div>
              {hasSteps ? (
                <>
                  <div style={{display:'flex', alignItems:'baseline', gap:6, marginBottom:8}}>
                    <span style={{fontSize:32, fontWeight:900, color:'var(--cn-brand)', letterSpacing:'-1px', lineHeight:1}}>
                      {stepsNum.toLocaleString()}
                    </span>
                    <span style={{fontSize:13, color:'var(--text-sub)', fontWeight:500}}>кұёмқҢ</span>
                    <span style={{fontSize:11, color:'var(--text-mute)', marginLeft:'auto'}}>лӘ©н‘ң {stepGoal.toLocaleString()}</span>
                  </div>
                  <div style={{background:'var(--card-border)', borderRadius:6, height:8, overflow:'hidden'}}>
                    <div style={{
                      width: pct + '%',
                      height:'100%',
                      background: stepsNum >= stepGoal ? 'var(--cn-ok)' : 'var(--cn-brand)',
                      borderRadius:6,
                      transition:'width 0.5s'
                    }}/>
                  </div>
                  <div style={{fontSize:11, color:'var(--text-sub)', marginTop:4, textAlign:'right'}}>
                    {pct}%
                  </div>
                </>
              ) : (
                <div style={{fontSize:12, color:'var(--text-mute)', textAlign:'center', padding:'6px 0'}}>
                  рҹ“І кұҙк°•м•ұ лӢЁм¶•м–ҙлЎң кұёмқҢмҲҳлҘј мһҗлҸҷ к°Җм ёмҳ¬ мҲҳ мһҲм–ҙмҡ”
                </div>
              )}
            </div>
          );
        })()}

        {/* AI мқёмӮ¬мқҙнҠё */}
        <div style={{marginBottom:14}}>
          <CardHd emoji="рҹӨ–" label="AI мқёмӮ¬мқҙнҠё" />
          {insights.map((text,i)=>(
            <div key={i} className="dash-insight-card">
              <div className="dash-insight-text">{text}</div>
            </div>
          ))}
        </div>
      </div>
    );
  };

  /* в”Җв”Җ лӢЁм¶•м–ҙ м—°лҸҷ к°Җмқҙл“ң м»ҙнҸ¬л„ҢнҠё (hooksлҘј IIFE м•Ҳм—җ л„Јмңјл©ҙ React #310 м—җлҹ¬ л°ңмғқ) в”Җв”Җ */
  const ShortcutGuide = () => {
    const [open, setOpen]         = React.useState(false);
    const [syncKey, setSyncKey]   = React.useState(null);
    const [copied, setCopied]     = React.useState('');
    const [step1Done, setStep1Done] = React.useState(() => !!localStorage.getItem('cn_sc_sql_done_v2'));

    // SQL: кҙҖлҰ¬мһҗ 1нҡҢ мӢӨн–үмҡ© (sync_key м»¬лҹј м¶”к°Җ + v2 н•ЁмҲҳ л“ұлЎқ)

                рҹ’Ў <strong>кё°мҙҲ м—җл„Ҳм§Җ(bcal)</strong>: Apple Watch н•„мҲҳ. iPhone лӢЁлҸ…мқҙл©ҙ 0мңјлЎң мҳ¬лқјк°Җкұ°лӮҳ л№„м–ҙмһҲмқ„ мҲҳ мһҲм–ҙмҡ” (мғқлһө к°ҖлҠҘ).<br/>

                рҹ’Ў <strong>мҙқ мҶҢлӘЁ = нҷңлҸҷ(cal) + кё°мҙҲ(bcal)</strong>: лҢҖмӢңліҙл“ң "мҙқ мҶҢлӘЁ" м№ҙл“ңм—җ н•©міҗ н‘ңмӢңлҗ©лӢҲлӢӨ.

  /* в”Җв”Җ лҹ¬лӢқ/кұ·кё° GPS нҠёлһҳм»Ө (V1) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
  const haversine = (a, b) => {
    const R = 6371000, toR = d => d * Math.PI / 180;
    const dLat = toR(b.lat - a.lat), dLng = toR(b.lng - a.lng);
    const s = Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
    return 2 * R * Math.asin(Math.sqrt(s)); // meters
  };
  const fmtDur = (s) => {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
    return (h>0 ? `${h}:${String(m).padStart(2,'0')}` : `${m}`) + `:${String(sec).padStart(2,'0')}`;
  };
  const paceStr = (secPerKm) => {
    if (!isFinite(secPerKm) || secPerKm <= 0) return "--'--\"";
    const m = Math.floor(secPerKm/60), s = Math.round(secPerKm%60);
    return `${m}'${String(s).padStart(2,'0')}"`;
  };
  const speak = (text) => {
    try {
      if (!window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR'; u.rate = 1.0;
      window.speechSynthesis.speak(u);
    } catch {}
  };

  const RunTracker = ({ mode, onClose, onSave }) => {
    // mode: 'run' | 'walk'
    const [state, setState] = React.useState('idle'); // idle | running | paused | done
    const [dist, setDist]   = React.useState(0);   // meters
    const [elapsed, setElapsed] = React.useState(0); // seconds
    const [gpsOk, setGpsOk] = React.useState(null);
    const [msg, setMsg]     = React.useState('');
    const pointsRef = React.useRef([]);        // {lat,lng,ts}
    const distRef   = React.useRef(0);
    const lastKmRef = React.useRef(0);
    const runStartRef = React.useRef(0);
    const pausedAccumRef = React.useRef(0);   // лҲ„м Ғ мқјмӢңм •м§Җ мӢңк°„
    const pauseStartRef = React.useRef(0);
    const mapRef = React.useRef(null);
    const lineRef = React.useRef(null);
    const markerRef = React.useRef(null);
    const listenerRef = React.useRef(null);
    const timerRef = React.useRef(null);
    const stateRef = React.useRef('idle');
    stateRef.current = state;

    const RT = (window.Capacitor?.isNativePlatform?.()) ? window.Capacitor.Plugins?.RunTracker : null;

    // м§ҖлҸ„ мҙҲкё°нҷ”
    React.useEffect(() => {
      if (!window.L) return;
      const m = window.L.map('run-map', { zoomControl:false, attributionControl:false }).setView([37.5665,126.9780], 16);
      window.L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(m);
      lineRef.current = window.L.polyline([], { color:'#2F6BFF', weight:5, lineJoin:'round' }).addTo(m);
      mapRef.current = m;
      setTimeout(() => m.invalidateSize(), 200);
      return () => { try { m.remove(); } catch {} };
    }, []);

    const onLocation = (pos) => {
      if (!pos || pos.accuracy > 35) return; // м •нҷ•лҸ„ лӮ®мңјл©ҙ л¬ҙмӢң
      const p = { lat: pos.lat, lng: pos.lng, ts: pos.ts || Date.now() };
      const pts = pointsRef.current;
      if (pts.length) {
        const d = haversine(pts[pts.length-1], p);
        if (d < 1.5) return;             // л…ёмқҙмҰҲ(м •м§Җ мӨ‘ лҜём„ёмқҙлҸҷ) л¬ҙмӢң
        distRef.current += d;
        setDist(distRef.current);
      }
      pts.push(p);
      // м§ҖлҸ„ к°ұмӢ 
      if (lineRef.current) lineRef.current.addLatLng([p.lat, p.lng]);
      if (mapRef.current) {
        mapRef.current.setView([p.lat, p.lng], mapRef.current.getZoom(), { animate:true });
        if (!markerRef.current) {

      }

    const attachListener = async () => {
      if (RT) {
        listenerRef.current = await RT.addListener('location', onLocation);
      } else if (navigator.geolocation) {
        const id = navigator.geolocation.watchPosition(
          (p) => onLocation({ lat:p.coords.latitude, lng:p.coords.longitude, accuracy:p.coords.accuracy, ts:p.timestamp }),
          () => {}, { enableHighAccuracy:true, maximumAge:1000, timeout:10000 });
        listenerRef.current = { remove: () => navigator.geolocation.clearWatch(id) };
      }
    };
    const detachListener = () => { try { listenerRef.current?.remove?.(); } catch {} listenerRef.current = null; };

    const start = async () => {
      setMsg('рҹ“Қ GPS мӢ нҳё мһЎлҠ” мӨ‘...');

        if (RT) { await RT.requestPerm(); await RT.start(); }

    const pause = () => { pauseStartRef.current = Date.now(); setState('paused'); };
    const resume = () => { pausedAccumRef.current += Date.now() - pauseStartRef.current; setState('running'); };
    const finish = async () => {

      try { if (RT) await RT.stop(); } catch {}
      setState('done');
      speak('мҡҙлҸҷмқ„ мў…лЈҢн•©лӢҲлӢӨ. мҲҳкі н•ҳм…Ём–ҙмҡ”.');

    React.useEffect(() => () => { // м–ёл§ҲмҡҙнҠё м •лҰ¬

      try { if (RT) RT.stop(); } catch {}
    }, []);

    const km = dist/1000;

    const doSave = () => {

    return (

        {/* н•ҳлӢЁ нҢЁл„җ */}

  const App = () => {
    const [authUser,   setAuthUser]  = useState(null);
    const [authReady,  setAuthReady] = useState(false);
    // л№„лЎңк·ёмқё мӮ¬мҡ©мһҗм—җкІҢ лһңл”© нҺҳмқҙм§Җ лЁјм Җ ліҙм—¬мЈјкі , "мӢңмһ‘н•ҳкё°" лҲ„лҘҙл©ҙ лЎңк·ёмқё нҷ”л©ҙмңјлЎң
    const [showAuth,   setShowAuth]  = useState(false);
    const [date,       setDate]      = useState(todayStr());
    const [data,       setData]      = useState(() => { try { return normalizeData(JSON.parse(localStorage.getItem('dm_dash_v2')||'{}').data||{}); } catch { return {}; } });
    const [showImport, setShowImport] = useState(false);

    const [showSync,   setShowSync]  = useState(false);

    const [medsConfig, setMedsConfig] = useState([]);
    /* в”Җв”Җ лӘ©н‘ң м„Өм • (кұёмқҢмҲҳВ·мІҙмӨ‘) в”Җв”Җ */

    useEffect(() => { goalsRef.current = goals; }, [goals]);
    const medsConfigRef = useRef([]);
    useEffect(() => { medsConfigRef.current = medsConfig; }, [medsConfig]);
    /* в”Җв”Җ LibreLinkUp (лҰ¬лёҢл Ҳ CGM мһҗлҸҷ мҲҳм§‘) в”Җв”Җ */

    const [bleMsg, setBleMsg]   = useState('');

    const [drugInfoModal, setDrugInfoModal] = useState(null); // м•Ҫ мқҙлҰ„ or null
    const [showAdmin,    setShowAdmin]    = useState(false);

    const isAdmin = authUser?.email === ADMIN_EMAIL;
    const [refreshKey,  setRefreshKey]  = useState(0); // мҲҳлҸҷ мғҲлЎңкі м№Ё нҠёлҰ¬кұ°
    const [syncing,     setSyncing]     = useState(false);
    const [darkMode,    setDarkMode]    = useState(_dm);
    const [currentTab,  setCurrentTab]  = useState(() => { try { return localStorage.getItem('cn-tab') || 'home'; } catch { return 'home'; } });
    useEffect(() => {
      try { localStorage.setItem('cn-tab', currentTab); } catch {}

    }, [currentTab]);
    const dm = _dm; // лӘЁл“Ҳ л ҲлІЁ ліҖмҲҳ (нҶ кёҖ мӢң лҸҷкё°м ҒмңјлЎң к°ұмӢ лҗЁ)

    // Supabase Auth мҙҲкё°нҷ”
    useEffect(() => {
      let settled = false;
      const finish = (session) => {
        if (settled) return;
        settled = true;
        setAuthUser(session?.user ?? null);
        setAuthReady(true);
      };
      supa.auth.getSession()
        .then(({ data: { session } }) => finish(session))
        .catch(() => finish(null));
      // м„ём…ҳ нҷ•мқёмқҙ м§Җм—°/мӢӨнҢЁн•ҙлҸ„(мӣ№л·° мһ кёҲВ·мҠӨнҶ лҰ¬м§Җ мқҙмҠҲ) лЎңл”© нҷ”л©ҙм—җ к°ҮнһҲм§Җ м•ҠлҸ„лЎқ мөңлҢҖ 4мҙҲ нӣ„ м§„н–ү
      const t = setTimeout(() => finish(null), 4000);
      const { data: { subscription } } = supa.auth.onAuthStateChange((_event, session) => {
        setAuthUser(session?.user ?? null);
        setAuthReady(true);
      });
      return () => { clearTimeout(t); subscription.unsubscribe(); };
    }, []);

    const userId = authUser?.id || '';

    // в”Җв”Җ лҸҢлҙ„ м•ҢлҰј(P3): м•ұ м—ҙ л•Ң н”јліҙнҳёмһҗ ліөм•Ҫ лҜёмҷ„лЈҢВ·мң„н—ҳнҳҲлӢ№мқҙл©ҙ лЎңм»¬ м•ҢлҰј (н•ҳлЈЁ 1нҡҢ) в”Җв”Җ
    useEffect(() => {
      if (!userId) return;
      const LN = (window.Capacitor?.isNativePlatform?.()) ? window.Capacitor.Plugins?.LocalNotifications : null;
      (async () => {
        try {
          const { data: gl } = await supa.rpc('cn_guardian_list');
          const wards = ((gl && gl.asGuardian) || []).filter(w => w.status === 'active');
          if (!wards.length) return;
          const t = new Date();
          const dayKey = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
          let idx = 0;
          for (const w of wards) {
            const { data: rows } = await supa.from('diabetes_data').select('date,payload').eq('user_id', w.personId);
            if (!rows) { idx++; continue; }
            const s = summarizeWard(rows);
            const alerts = [];
            if (s.medMissed) alerts.push(`мҳӨлҠҳ ліөм•Ҫ ${s.medDone}/${s.medTotal} лҜёмҷ„лЈҢ`);
            if (s.low) alerts.push('м ҖнҳҲлӢ№ мЈјмқҳ');
            if (s.high) alerts.push('кі нҳҲлӢ№ мЈјмқҳ');
            if (!alerts.length) { idx++; continue; }
            const dkey = `cn_care_notified_${w.personId}_${dayKey}`;
            if (localStorage.getItem(dkey)) { idx++; continue; }
            localStorage.setItem(dkey, '1');
            const title = `рҹ’ҷ ${w.name || 'к°ҖмЎұ'} лҸҢлҙ„ м•ҢлҰј`;
            const body  = alerts.join(' В· ');
            if (LN) {
              try { await LN.requestPermissions();
                await LN.schedule({ notifications: [{ id: 4300 + (idx % 90), title, body, schedule: { at: new Date(Date.now() + 1500) }, sound: 'default' }] });
              } catch(e) {}
            } else if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
              try { new Notification(title, { body }); } catch(e) {}
            }
            idx++;
          }
        } catch(e) {}
      })();
    }, [userId]);

    // н—ӨлҚ” м•„л°”нғҖ лЎңл“ң (userId м„ м–ё нӣ„ мң„м№ҳ вҖ” dep л°°м—ҙ м •мғҒ м°ёмЎ°)
    useEffect(() => {
      if (!userId) return;

        .then(({ data }) => { if (data?.avatar_url) setHdrAvatar(data.avatar_url); });

    // в”Җв”Җ ліөм•Ҫ м•ҢлһҢ мҠӨмјҖмӨ„лҹ¬ в”Җв”Җ
    // л„ӨмқҙнӢ°лёҢ м•ұ: LocalNotificationsлЎң л§Өмқј л°ҳліө мҳҲм•Ҫ (м•ұмқҙ кәјм ё мһҲм–ҙлҸ„ мҡёлҰј)
    // мӣ№: лёҢлқјмҡ°м Җ Notification + л§Ө л¶„ мІҙнҒ¬ (м•ұ мјңм ё мһҲмқ„ л•Ңл§Ң)
    useEffect(() => {
      const LN = (window.Capacitor?.isNativePlatform?.()) ? window.Capacitor.Plugins?.LocalNotifications : null;

      if (LN) {
        (async () => {
          try {
            if (localStorage.getItem('cn_notif_off') === '1') { // мӮ¬мҡ©мһҗк°Җ м•ҢлҰј лҒ”
              const p = await LN.getPending();
              const ids = (p.notifications||[]).filter(n => n.id>=4000 && n.id<4100).map(n => ({id:n.id}));
              if (ids.length) await LN.cancel({ notifications: ids });
              return;
            }
            await LN.requestPermissions();
            // кё°мЎҙ ліөм•Ҫ м•ҢлҰј(4000~4099) м·ЁмҶҢ нӣ„ мһ¬мҳҲм•Ҫ
            const p = await LN.getPending();
            const old = (p.notifications||[]).filter(n => n.id>=4000 && n.id<4100).map(n => ({id:n.id}));
            if (old.length) await LN.cancel({ notifications: old });
            const notifs = [];
            medsConfig.forEach((slot, i) => {
              if (!slot.notifTime) return;
              const [h, m] = slot.notifTime.split(':').map(Number);
              if (isNaN(h) || isNaN(m)) return;
              const items = (slot.items||[]).filter(x => x.name && x.name.trim());
              if (!items.length) return;
              notifs.push({
                id: 4000 + i,
                title: `${slot.icon||'рҹ’Ҡ'} ${slot.slot} ліөм•Ҫ мӢңк°„мқҙм—җмҡ”`,
                body: items.map(x => `${x.name}${x.dose ? ' '+x.dose : ''}`).join(', '),
                schedule: { on: { hour: h, minute: m }, repeats: true },
                sound: 'default'
              });
            });
            if (notifs.length) await LN.schedule({ notifications: notifs });
          } catch (e) { console.log('ліөм•Ҫ м•ҢлҰј мҳҲм•Ҫ skip:', e?.message || e); }
        })();
        return;
      }

      // в”Җв”Җ мӣ№ нҸҙл°ұ: л§Ө л¶„ мІҙнҒ¬ в”Җв”Җ
      if (!medsConfig.length) return;
      const firedKey = new Set();
      const check = () => {
        if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
        if (localStorage.getItem('cn_notif_off') === '1') return;
        const now = new Date();
        const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        const key  = `${hhmm}_${now.toDateString()}`;
        medsConfig.forEach(slot => {
          if (!slot.notifTime || slot.notifTime !== hhmm) return;
          if (firedKey.has(key + slot.key)) return;
          firedKey.add(key + slot.key);
          const activeItems = (slot.items||[]).filter(m => isMedActive(m, now.toISOString().slice(0,10)));

    // в”Җв”Җ мқјм–ҙм„ңкё°В·л¬јл§ҲмӢңкё° лҰ¬л§ҲмқёлҚ” (л„ӨмқҙнӢ°лёҢ, лӮ® мӢңк°„лҢҖ л§ӨмӢңк°„ л°ҳліө) в”Җв”Җ
    useEffect(() => {

          const startH = 9, endH = 21; // лӮ® мӢңк°„лҢҖ

    /* в”Җв”Җ кұҙк°•м•ұ мІҙмӨ‘/мІҙм§Җл°© к°Җм ёмҳӨкё° (2MB мІӯнҒ¬ мҠӨнҠёлҰ¬л°Қ, лҢҖмҡ©лҹү нҢҢмқј м§Җмӣҗ) в”Җв”Җ */
    const handleWeightImport = async (file) => {
      if (!file) return;
      setWeightImporting(true);
      setWeightImportMsg('нҢҢмқј мІҳлҰ¬ мӨ‘...');
      try {
        const CHUNK_SIZE = 2 * 1024 * 1024; // 2MB
        let getChunks, totalBytes;

        if (file.name.endsWith('.zip')) {
          setWeightImportMsg('ZIP м••м¶• н•ҙм ң мӨ‘... (мһ мӢң кё°лӢӨл Ө мЈјм„ёмҡ”)');
          if (typeof JSZip === 'undefined') throw new Error('ZIP лқјмқҙлёҢлҹ¬лҰ¬ лЎңл“ң мӢӨнҢЁ');
          const zip = await JSZip.loadAsync(file);
          const allFilesW = Object.keys(zip.files);
          const xmlFileW = allFilesW.find(name =>
            /export\.xml$/i.test(name) && !/cda/i.test(name)
          ) || allFilesW.find(name => /\.xml$/i.test(name) && !/cda/i.test(name));
          if (!xmlFileW) throw new Error('export.xmlмқ„ м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”');
          setWeightImportMsg('XML м¶”м¶ң мӨ‘... (м••м¶• н•ҙм ң мӨ‘, мҳӨлһҳ кұёлҰҙ мҲҳ мһҲм–ҙмҡ”)');
          // BlobмңјлЎң м¶”м¶ң вҶ’ JS нһҷ мҷёл¶Җм—җ м ҖмһҘлҗҳм–ҙ л©”лӘЁлҰ¬ нҡЁмңЁм Ғ
          const xmlBlob = await zip.files[xmlFileW].async('blob');
          totalBytes = xmlBlob.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = xmlBlob.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else if (file.name.endsWith('.xml')) {
          totalBytes = file.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = file.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else {
          throw new Error('.zip лҳҗлҠ” .xml нҢҢмқјмқ„ м„ нғқн•ҙ мЈјм„ёмҡ”');
        }

        setWeightImportMsg('лҚ°мқҙн„° л¶„м„қ мӨ‘... 0%');
        const { weightByDay, bodyFatByDay, bpByDay = {} } = await parseAppleHealthXML(getChunks, totalBytes, (pct) => {
          setWeightImportMsg(`лҚ°мқҙн„° л¶„м„қ мӨ‘... ${pct}%`);
        });
        const wDays  = Object.keys(weightByDay).length;
        const bfDays = Object.keys(bodyFatByDay).length;
        const bpDays = Object.keys(bpByDay).length;
        if (!wDays && !bfDays && !bpDays) throw new Error('мІҙмӨ‘В·мІҙм§Җл°©В·нҳҲм•• лҚ°мқҙн„°лҘј м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”.\nкұҙк°•м•ұкіј м—°лҸҷлҗң мІҙм„ұл¶„/нҳҲм•• м•ұмқҙ мһҲлҠ”м§Җ нҷ•мқён•ҙ мЈјм„ёмҡ”.');
        // к°Җм ёмҳЁ лҚ°мқҙн„° лі‘н•©
        const importedData = buildDashboardData({ glucoseByDay:{}, weightByDay, bodyFatByDay, bpByDay });
        await handleImport(importedData);
        const parts = [];
        if (wDays)  parts.push(`мІҙмӨ‘ ${wDays}мқј`);
        if (bfDays) parts.push(`мІҙм§Җл°© ${bfDays}мқј`);
        if (bpDays) parts.push(`нҳҲм•• ${bpDays}мқј`);
        setWeightImportMsg(`вң… ${parts.join(' В· ')} к°Җм ёмҳӨкё° мҷ„лЈҢ!`);
        setTimeout(() => { setWeightImportMsg(''); setWeightImporting(false); }, 3000);
      } catch(e) {
        setWeightImportMsg('вқҢ ' + (e.message || 'к°Җм ёмҳӨкё° мӢӨнҢЁ'));
        setTimeout(() => { setWeightImportMsg(''); setWeightImporting(false); }, 4000);
      }
      if (weightFileRef.current) weightFileRef.current.value = '';
    };

    /* в”Җв”Җ мӮјм„ұ н—¬мҠӨ мІҙмӨ‘/мІҙм§Җл°© к°Җм ёмҳӨкё° в”Җв”Җ */
