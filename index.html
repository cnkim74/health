    /* в”Җв”Җ Supabase: мҙҲкё° лҚ°мқҙн„° лЎңл“ң + URL нҢҢлқјлҜён„° лӢЁм¶•м–ҙ м—°лҸҷ в”Җв”Җ */
    useEffect(() => {
      // URL нҢҢлқјлҜён„° мқҪкё° вҖ” userIdк°Җ л№„лҸҷкё°лЎң м„Өм •лҗҳлҜҖлЎң sessionStorageм—җ ліҙмЎҙ
      const params = new URLSearchParams(window.location.search);
      const w      = params.get('w');
      const bf     = params.get('bf');
      const bp     = params.get('bp');     // нҳҲм•• (мҳҲ: 120/80)
      const steps  = params.get('steps'); // кұёмқҢмҲҳ
      const cal    = params.get('cal');   // нҷңлҸҷ м№јлЎңлҰ¬ (kcal)
      const bcal   = params.get('bcal');  // кё°мҙҲлҢҖмӮ¬лҹү (kcal) вҖ” Apple Watch "Basal Energy Burned"
      const dist   = params.get('dist'); // кұ°лҰ¬ (km)
      const d  = params.get('d');  // мёЎм • лӮ м§ң (YYYY-MM-DD)
      const freshPatch = {};
      if (w  && !isNaN(parseFloat(w)))  freshPatch.weight  = String(parseFloat(w));
      if (bf && !isNaN(parseFloat(bf))) freshPatch.bodyFat = String(parseFloat(bf));
      if (steps && !isNaN(parseInt(steps)))   freshPatch.steps = String(Math.round(parseFloat(steps)));
      if (cal   && !isNaN(parseFloat(cal)))   freshPatch.cal   = String(Math.round(parseFloat(cal)));
      if (bcal  && !isNaN(parseFloat(bcal)))  freshPatch.bcal  = String(Math.round(parseFloat(bcal)));
      if (dist  && !isNaN(parseFloat(dist)))  freshPatch.dist  = String(Math.round(parseFloat(dist)*100)/100);
      if (bp) {
        const bpMatch = bp.match(/^(\d{1,3}(?:\.\d+)?)[\/\s](\d{1,3}(?:\.\d+)?)$/);
        if (bpMatch) freshPatch.bp = { sys: String(Math.round(parseFloat(bpMatch[1]))), dia: String(Math.round(parseFloat(bpMatch[2]))) };
      }
      const freshTarget = (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) ? d : todayStr();
      if (Object.keys(freshPatch).length) {
        // в‘  sessionStorage: нҳ„мһ¬ м„ём…ҳмҡ© ліҙмЎҙ (userId лЎңл“ң м „м—җ URL мӮ¬лқјм ёлҸ„ мң м§Җ)
        sessionStorage.setItem('cn_url_patch', JSON.stringify({ patch: freshPatch, targetDate: freshTarget }));
        // в‘Ў localStorage: PWA/Safari м»Ён…ҚмҠӨнҠё л¶„лҰ¬ лҢҖмқ‘ вҖ” auth м—Ҷм–ҙлҸ„ мҰүмӢң лЎңм»¬ л°ҳмҳҒ
        try {
          const lc = JSON.parse(localStorage.getItem('dm_dash_v2') || '{}');
          const lcData = lc.data || {};
          const existing = lcData[freshTarget] || {};
          // bpлҠ” лі‘н•©, лӮҳлЁём§ҖлҠ” лҚ®м–ҙм“°кё°
          const merged = { ...existing, ...freshPatch };
          if (freshPatch.bp && existing.bp) merged.bp = { ...existing.bp, ...freshPatch.bp };
          lcData[freshTarget] = merged;
          lc.data = lcData;
          localStorage.setItem('dm_dash_v2', JSON.stringify(lc));
          // лі„лҸ„ "pending" нӮӨм—җлҸ„ м ҖмһҘ вҖ” лӮҳмӨ‘м—җ Supabase лҸҷкё°нҷ” лҢҖкё°мҡ©
          localStorage.setItem('cn_pending_patch', JSON.stringify({ patch: freshPatch, targetDate: freshTarget, ts: Date.now() }));
        } catch {}
        window.history.replaceState({}, '', window.location.pathname);
        if (freshTarget !== todayStr()) setDate(freshTarget);
      }
      // sessionStorageм—җм„ң ліҙмЎҙлҗң нҢЁм№ҳ кәјлӮҙкё° (мһ¬мӢӨн–ү мӢңм—җлҸ„ мң нҡЁ)
      let urlPatch = {}, targetDate = todayStr();
      try {
        const saved = sessionStorage.getItem('cn_url_patch');
        if (saved) { const p = JSON.parse(saved); urlPatch = p.patch; targetDate = p.targetDate; }
      } catch {}


      const load = async () => {
        setSyncing(true);
        try {
          // 1м°Ё: нҳ„мһ¬ Supabase лЎңк·ёмқё кі„м •(authUser.id)мңјлЎң мЎ°нҡҢ
          const { data: rows, error } = await supa
            .from('diabetes_data')
            .select('date, payload')
            .eq('user_id', userId);
          if (error) throw error;
          const loaded = {};
          (rows || []).forEach(r => { if (r.date !== '_user_settings_') loaded[r.date] = r.payload; });

          // 2м°Ё нҸҙл°ұ: лҚ°мқҙн„°к°Җ м—Ҷкі , мҳҲм „ UUIDк°Җ мһҲмңјл©ҙ к·ёкұёлЎңлҸ„ мЎ°нҡҢ
          // (dm_user_id localStorage нӮӨ лҳҗлҠ” cn_legacy_uid м ҖмһҘ нӮӨ лӘЁл‘җ мӢңлҸ„)
          if (Object.keys(loaded).length === 0) {
            const legacyId = localStorage.getItem('dm_user_id') || localStorage.getItem('cn_legacy_uid');
            if (legacyId && legacyId !== userId) {
              const { data: legacyRows } = await supa
                .from('diabetes_data')
                .select('date, payload')
                .eq('user_id', legacyId);
              (legacyRows || []).forEach(r => { if (r.date !== '_user_settings_') loaded[r.date] = r.payload; });
            }
          }

          // вң… лЎңм»¬ мәҗмӢңмҷҖ н•„л“ң лӢЁмң„ лі‘н•©
          // - Supabaseм—җ м—ҶлҠ” лӮ м§ң: мәҗмӢң м „мІҙ мӮ¬мҡ©
          // - Supabaseм—җ мһҲлҠ” лӮ м§ң: weight/bodyFatмқҙ л№„м–ҙмһҲмңјл©ҙ мәҗмӢңм—җм„ң ліҙмҷ„
          //   (кұҙк°•м•ұ к°Җм ёмҳӨкё° нӣ„ saveAllToSupabaseк°Җ л¶Җл¶„ мӢӨнҢЁн•ҙлҸ„ лҚ°мқҙн„° ліҙмЎҙ)
          try {
            const cached = JSON.parse(localStorage.getItem('dm_dash_v2') || '{}').data || {};
            Object.keys(cached).forEach(d => {
              if (!loaded[d]) {
                loaded[d] = cached[d];                   // лӮ м§ң мһҗмІҙк°Җ м—Ҷмңјл©ҙ мәҗмӢңлЎң
              } else {
                const sb = loaded[d], lc = cached[d];
                // Supabaseм—җ м—ҶлҠ” н•„л“ңл§Ң мәҗмӢңм—җм„ң ліҙмҷ„ (weight/bodyFat/steps/cal/dist)
                if (!sb.weight  && lc?.weight)  loaded[d] = { ...sb, weight:  lc.weight  };
                if (!sb.bodyFat && lc?.bodyFat) loaded[d] = { ...loaded[d], bodyFat: lc.bodyFat };
                if (!sb.steps   && lc?.steps)   loaded[d] = { ...loaded[d], steps:   lc.steps   };
                if (!sb.cal     && lc?.cal)     loaded[d] = { ...loaded[d], cal:     lc.cal     };
                if (!sb.bcal    && lc?.bcal)    loaded[d] = { ...loaded[d], bcal:    lc.bcal    };
                if (!sb.dist    && lc?.dist)    loaded[d] = { ...loaded[d], dist:    lc.dist    };
              }
            });
          } catch {}

          // вң… кұҙк°•м•ұ к°Җм ёмҳӨкё° м „мҡ© мәҗмӢңлҸ„ н•ӯмғҒ лі‘н•© (Supabase лҸҷкё°нҷ” мӢӨнҢЁ нӣ„ мғҲлЎңкі м№Ё мӢң ліөкө¬)
          try {
            const imported = JSON.parse(localStorage.getItem('dm_imported') || '{}');
            Object.keys(imported).forEach(d => {
              if (!loaded[d]) {
                loaded[d] = imported[d];
              } else {
                if (!loaded[d].weight  && imported[d]?.weight)  loaded[d] = { ...loaded[d], weight:  imported[d].weight  };
                if (!loaded[d].bodyFat && imported[d]?.bodyFat) loaded[d] = { ...loaded[d], bodyFat: imported[d].bodyFat };
                if (!loaded[d].steps   && imported[d]?.steps)   loaded[d] = { ...loaded[d], steps:   imported[d].steps   };
                if (!loaded[d].cal     && imported[d]?.cal)     loaded[d] = { ...loaded[d], cal:     imported[d].cal     };
                if (!loaded[d].bcal    && imported[d]?.bcal)    loaded[d] = { ...loaded[d], bcal:    imported[d].bcal    };
                if (!loaded[d].dist    && imported[d]?.dist)    loaded[d] = { ...loaded[d], dist:    imported[d].dist    };
                // нҳҲм••лҸ„ ліөкө¬
                if (!(loaded[d].bp?.sys && loaded[d].bp?.dia) && imported[d]?.bp?.sys)
                  loaded[d] = { ...loaded[d], bp: imported[d].bp };
              }
            });
          } catch {}

          // в”Җв”Җ pending patch (localStorage кІҪмң  вҖ” SafariвҶ’PWA нҒ¬лЎңмҠӨ м»Ён…ҚмҠӨнҠё) мІҳлҰ¬
          try {
            const pending = JSON.parse(localStorage.getItem('cn_pending_patch') || 'null');
            // 24мӢңк°„ мқҙлӮҙ нҢЁм№ҳл§Ң м Ғмҡ©
            if (pending && pending.patch && (Date.now() - (pending.ts||0)) < 86400000) {
              const pd = pending.targetDate || todayStr();
              loaded[pd] = { ...(loaded[pd] || emptyDay()), ...pending.patch };
              // в‘  лЎңм»¬ мәҗмӢңлҘј лЁјм Җ м ҖмһҘ вҖ” Supabase мӢӨнҢЁн•ҙлҸ„ лӢӨмқҢ лЎңл“ң л•Ң ліөкө¬
              localStorage.setItem('dm_dash_v2', JSON.stringify({ data: loaded }));
              // в‘Ў Supabaseм—җлҸ„ м ҖмһҘ (мӢӨнҢЁн•ҙлҸ„ л¬ҙмӢң вҖ” мқҙлҜё лЎңм»¬м—җ мһҲмқҢ)
              let sbOk = false;
              try {
                const { error: puErr } = await supa.from('diabetes_data').upsert(
                  { user_id: userId, date: pd, payload: loaded[pd], updated_at: new Date().toISOString() },
                  { onConflict: 'user_id,date' }
                );
                sbOk = !puErr;
              } catch {}
              // Supabaseм—җ м„ұкіө м ҖмһҘлҗң кІҪмҡ°м—җл§Ң pending нҢЁм№ҳ м ңкұ°
              if (sbOk) localStorage.removeItem('cn_pending_patch');
            }
          } catch {}

          if (Object.keys(urlPatch).length) {
            loaded[targetDate] = { ...(loaded[targetDate] || emptyDay()), ...urlPatch };
            sessionStorage.removeItem('cn_url_patch'); // м Ғмҡ© мҷ„лЈҢ нӣ„ м ңкұ°
            // в‘  лЎңм»¬ мәҗмӢңлҘј лЁјм Җ м ҖмһҘ вҖ” Supabase мӢӨнҢЁн•ҙлҸ„ лӢӨмқҢ лЎңл“ң л•Ң ліөкө¬
            localStorage.setItem('dm_dash_v2', JSON.stringify({ data: loaded }));
            // в‘Ў Supabaseм—җлҸ„ мҰүмӢң м ҖмһҘ (iOS л°ұк·ёлқјмҡҙл“ң м „нҷҳ м „м—җ мҷ„лЈҢ)
            setSaveStatus('saving');
            try {
              await supa.from('diabetes_data').upsert(
                { user_id: userId, date: targetDate, payload: loaded[targetDate], updated_at: new Date().toISOString() },
                { onConflict: 'user_id,date' }
              );
              setSaveStatus('saved'); setTimeout(() => setSaveStatus('idle'), 3000);
            } catch(saveErr) {
              // мӢӨнҢЁн•ҙлҸ„ лЎңм»¬мәҗмӢңм—җлҠ” мқҙлҜё м ҖмһҘлҗЁ
              setSaveStatus('idle');
            }
          }
          setData(normalizeData(loaded));
        } catch(e) {
          try {
            const s = localStorage.getItem('dm_dash_v2');
            const loaded = s ? (JSON.parse(s).data || {}) : {};
            if (Object.keys(urlPatch).length) {
              loaded[targetDate] = { ...(loaded[targetDate] || emptyDay()), ...urlPatch };
              sessionStorage.removeItem('cn_url_patch');
            }
            setData(normalizeData(loaded));
          } catch(e2) {}
        }
        setSyncing(false);
      };
      if (userId) load();
    }, [userId, refreshKey]);

    /* в”Җв”Җ Supabase: нҳ„мһ¬ лӮ м§ң лҚ°мқҙн„° м ҖмһҘ (л””л°”мҡҙмҠӨ 1.5мҙҲ) в”Җв”Җ */
    // лӮ м§ңк°Җ л°”лҖҢл©ҙ мқҙм „ лӮ м§ңлҘј мҰүмӢң Supabaseм—җ flush (нғҖмқҙлЁё м·ЁмҶҢ л°©м§Җ)
    useEffect(() => {
      if (syncing || !userId) return;
      const prevDate = prevDateRef.current;
      if (prevDate && prevDate !== date && data[prevDate]) {
        // лӮ м§ң м „нҷҳ вҶ’ мқҙм „ лӮ м§ң мҰүмӢң м ҖмһҘ
        (async () => {
          try {
            await supa.from('diabetes_data').upsert(
              { user_id: userId, date: prevDate, payload: data[prevDate], updated_at: new Date().toISOString() },
              { onConflict: 'user_id,date' }
            );
          } catch (e) { console.error('[flush] мқҙм „лӮ м§ң м ҖмһҘ мҳӨлҘҳ:', e); }
        })();
      }
      prevDateRef.current = date;
    }, [date]);

    useEffect(() => {
      if (syncing || !data[date] || !userId) return;
      // localStorage мәҗмӢң м—…лҚ°мқҙнҠё
      localStorage.setItem('dm_dash_v2', JSON.stringify({ data, lastImport }));
      // Supabase м ҖмһҘ (л””л°”мҡҙмҠӨ: к°ҷмқҖ лӮ м§ңм—җм„ң м—°мҶҚ мһ…л Ҙ мӢң л§Ҳм§Җл§ү 1кұҙл§Ң)
      if (saveTimer.current) clearTimeout(saveTimer.current);
      setSaveStatus('saving');
      saveTimer.current = setTimeout(async () => {
        try {
          const { error } = await supa.from('diabetes_data').upsert(
            { user_id: userId, date, payload: data[date], updated_at: new Date().toISOString() },
            { onConflict: 'user_id,date' }
          );
          if (error) throw error;
          setSaveStatus('saved');
          setTimeout(() => setSaveStatus('idle'), 2000);
        } catch(e) {
          setSaveStatus('error');
          setTimeout(() => setSaveStatus('idle'), 3000);
        }
      }, 1500);
    }, [data, date, loading]);

    /* в”Җв”Җ м•ұ мў…лЈҢ/мғҲлЎңкі м№Ё мӢң лҜём ҖмһҘ лҚ°мқҙн„° flush в”Җв”Җ */
    useEffect(() => {
      const handleUnload = () => {
        if (!userId || !date || !data[date]) return;
        // sendBeacon: нғӯ лӢ«нһҗ л•ҢлҸ„ м „мҶЎ ліҙмһҘ (fetchліҙлӢӨ мӢ лў°м„ұ лҶ’мқҢ)
        const payload = JSON.stringify({
          user_id: userId, date, payload: data[date],
          updated_at: new Date().toISOString()
        });
        // localStorageлҠ” л°ҳл“ңмӢң мөңмӢ мңјлЎң мң м§Җ
        try { localStorage.setItem('dm_dash_v2', JSON.stringify({ data, lastImport })); } catch {}
      };
      window.addEventListener('beforeunload', handleUnload);
      window.addEventListener('pagehide', handleUnload); // iOS Safariмҡ©
      return () => {
        window.removeEventListener('beforeunload', handleUnload);
        window.removeEventListener('pagehide', handleUnload);
      };
    }, [userId, date, data, lastImport]);

    /* в”Җв”Җ Supabase: к°Җм ёмҳӨкё° нӣ„ м—¬лҹ¬ лӮ  мқјкҙ„ м ҖмһҘ в”Җв”Җ */
    const saveAllToSupabase = async (newData) => {
      if (!userId) return;
      try {
        const rows = Object.entries(newData).map(([d, payload]) => ({
          user_id: userId, date: d, payload, updated_at: new Date().toISOString()
        }));
        if (!rows.length) return;
        // 50к°ңм”© лӮҳлҲ м„ң upsert (Supabase лҢҖмҡ©лҹү л°°м№ҳ мӢӨнҢЁ л°©м§Җ)
        const CHUNK = 50;
        for (let i = 0; i < rows.length; i += CHUNK) {
          await supa.from('diabetes_data').upsert(rows.slice(i, i + CHUNK), { onConflict: 'user_id,date' });
        }
      } catch(e) { console.error('мқјкҙ„ м ҖмһҘ мҳӨлҘҳ:', e); }
    };

    /* в”Җв”Җ HealthKit мһҗлҸҷ лҸҷкё°нҷ” (iOS л„ӨмқҙнӢ°лёҢ м•ұ м „мҡ©) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
       м•ұ мӢӨн–үВ·нҸ¬к·ёлқјмҡҙл“ң ліөк·Җ мӢң мҳӨлҠҳмқҳ кұёмқҢмҲҳ/нҷңлҸҷВ·кё°мҙҲ м№јлЎңлҰ¬/кұ°лҰ¬лҘј HealthKitм—җм„ң
       мқҪм–ҙ мһҗлҸҷ л°ҳмҳҒ. Apple Watch лҚ°мқҙн„°лҸ„ HealthKitм—җ н•©мӮ°лҗҳм–ҙ н•Ёк»ҳ л“Өм–ҙмҳҙ.
       лҲ„м Ғк°’мқҙлҜҖлЎң кё°мЎҙк°’ліҙлӢӨ нҒҙ л•Ңл§Ң к°ұмӢ  (MAX лі‘н•© вҖ” к°җмҶҢ л°©м§Җ). в”Җв”Җ */
    useEffect(() => {
      const HK = (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform())
        ? window.Capacitor.Plugins?.HealthActivity : null;
      if (!HK || !userId) return;
      let cancelled = false;

      const syncHK = async () => {
        try {
          // к¶Ңн•ң лІ„м „: readTypesк°Җ л°”лҖҢл©ҙ(мҳҲ: нҳҲм•• м¶”к°Җ) лІ„м „мқ„ мҳ¬л Ө мһ¬мҡ”мІӯ вҶ’ мғҲ н•ӯлӘ© к¶Ңн•ң л…ём¶ң
          if (localStorage.getItem('cn_hk_perm') !== 'v2') {
            await HK.requestAuth();
            localStorage.setItem('cn_hk_perm', 'v2');
          }
          const hk = await HK.getTodayActivity();
          if (cancelled || !hk) return;
          const t = todayStr();
          const num = v => (v !== '' && v != null && !isNaN(Number(v))) ? Number(v) : 0;
          setData(prev => {
            const cur = { ...emptyDay(), ...(prev[t] || {}) };
            const patch = {};
            if (Number(hk.steps || 0) > num(cur.steps)) patch.steps = String(Math.round(hk.steps));
            if (Number(hk.cal   || 0) > num(cur.cal))   patch.cal   = String(Math.round(hk.cal));
            if (Number(hk.bcal  || 0) > num(cur.bcal))  patch.bcal  = String(Math.round(hk.bcal));
            if (Number(hk.dist  || 0) > num(cur.dist))  patch.dist  = String(Math.round(hk.dist * 100) / 100);
            if (!Object.keys(patch).length) return prev;
            const merged = { ...cur, ...patch };
            // м„ нғқ лӮ м§ңмҷҖ л¬ҙкҙҖн•ҳкІҢ мҳӨлҠҳ лҚ°мқҙн„°лҘј Supabaseм—җ л°”лЎң м ҖмһҘ
            try {
              supa.from('diabetes_data').upsert(
                { user_id: userId, date: t, payload: merged, updated_at: new Date().toISOString() },
                { onConflict: 'user_id,date' }
              ).then(() => {});
            } catch {}
            return { ...prev, [t]: merged };
          });

          // в”Җв”Җ нҳҲлӢ№(лҰ¬лёҢл Ҳ л“ұ CGMмқҙ м• н”Ң кұҙк°•м—җ кё°лЎқн•ң к°’) мһҗлҸҷ л°ҳмҳҒ в”Җв”Җ
          try {
            const gRes = await HK.getRecentGlucose({ days: 3 });
            if (cancelled || !gRes?.readings?.length) return;
            const byDay = {};
            gRes.readings.forEach(r => {
              const d = new Date(r.ts);
              if (isNaN(d.getTime()) || !(r.mgdl > 0)) return;
              const day = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
              (byDay[day] = byDay[day] || []).push({ hour: d.getHours() + d.getMinutes()/60, value: Math.round(r.mgdl) });
            });
            if (Object.keys(byDay).length && handleImportRef.current) {
              const mapped = buildDashboardData({ glucoseByDay: byDay });
              await handleImportRef.current(mapped);
            }
          } catch (ge) { console.log('HealthKit glucose skip:', ge?.message || ge); }

          // в”Җв”Җ л°”мқҙнғҲ(мІҙмӨ‘В·мІҙм§Җл°©В·мӢ¬л°•В·HRVВ·мҲҳл©ҙВ·л¬ј) + мӢ¬м „лҸ„ в”Җв”Җ
          try {
            const v = await HK.getVitals();
            if (!cancelled && v) {
              setVitals(prev => ({ ...prev, ...v, at: Date.now() }));
              // мІҙмӨ‘В·мІҙм§Җл°© мҳӨлҠҳ к°’мқҙ л№„м–ҙмһҲмңјл©ҙ HealthKit к°’мңјлЎң мұ„мӣҖ
              const t = todayStr();
              setData(prev => {
                const cur = { ...emptyDay(), ...(prev[t] || {}) };
                const patch = {};
                if (v.weight && !cur.weight)  patch.weight  = String(v.weight);
                if (v.bodyFat && !cur.bodyFat) patch.bodyFat = String(v.bodyFat);
                if (v.waterMl != null) patch.water_ml = String(Math.round(v.waterMl)); // HealthKit л¬јм„ӯм·Ё л°ҳмҳҒ
                // нҳҲм••(мҳӨлҜҖлЎ  л“ұ вҶ’ м• н”Ң кұҙк°•): мҳӨлҠҳ нҳҲм••мқҙ л№„м–ҙмһҲмңјл©ҙ мһҗлҸҷ мұ„мӣҖ
                if (v.bpSys && v.bpDia && !(cur.bp && cur.bp.sys)) patch.bp = { sys: String(Math.round(v.bpSys)), dia: String(Math.round(v.bpDia)) };
                if (!Object.keys(patch).length) return prev;
                const merged = { ...cur, ...patch };
                try { supa.from('diabetes_data').upsert({ user_id: userId, date: t, payload: merged, updated_at: new Date().toISOString() }, { onConflict:'user_id,date' }).then(()=>{}); } catch {}
                return { ...prev, [t]: merged };
              });
            }
          } catch (ve) { console.log('HealthKit vitals skip:', ve?.message || ve); }
          try {
            const e2 = await HK.getECG();
            if (!cancelled && e2?.available) setEcg({ ...e2, at: Date.now() });
          } catch {}
        } catch (e) { console.log('HealthKit sync skip:', e?.message || e); }
      };

      syncHK();
      const onVis = () => { if (document.visibilityState === 'visible') syncHK(); };
      document.addEventListener('visibilitychange', onVis);
      return () => { cancelled = true; document.removeEventListener('visibilitychange', onVis); };
    }, [userId]);

    const day = useMemo(() => normalizeDay(data[date]), [data, date]);
    const upDay = (patch) => setData(prev => ({ ...prev, [date]: { ...(prev[date] || emptyDay()), ...patch } }));
    const togMed  = (id) => upDay({ meds: { ...day.meds, [id]: !day.meds[id] } });
    const updBS   = (id, v) => upDay({ bs: { ...day.bs, [id]: v } });
    const updBP   = (k, v) => upDay({ bp: { ...(day.bp||{sys:'',dia:''}), [k]: v } });
    const updMeal = (id, v) => upDay({ meals: { ...day.meals, [id]: v } });
    const updEx       = (k, v) => upDay({ exercise: { ...(day.exercise||{}), [k]: v } });
    const addExLog    = (type='') => { const logs = [...(day.exercise?.logs||[]), {type, mins:''}]; upDay({ exercise: {...(day.exercise||{}), logs} }); };
    const updateExLog = (i,k,v)  => { const logs = (day.exercise?.logs||[]).map((l,idx)=>idx===i?{...l,[k]:v}:l); upDay({ exercise: {...(day.exercise||{}), logs} }); };
    const removeExLog = (i)      => { const logs = (day.exercise?.logs||[]).filter((_,idx)=>idx!==i); upDay({ exercise: {...(day.exercise||{}), logs} }); };
    // GPS лҹ¬лӢқ/кұ·кё° м ҖмһҘ вҖ” мҡҙлҸҷ мқјм§Җ(logs)м—җ л¶„ кё°лЎқ + мғҒм„ё(runs) лі„лҸ„ ліҙкҙҖ
    const saveRun = (r) => {
      const mins = Math.max(1, Math.round(r.duration_s/60));
      const label = r.mode === 'run' ? 'лӢ¬лҰ¬кё°(GPS)' : 'кұ·кё°(GPS)';
      const ex = day.exercise || {};
      const logs = [...(ex.logs||[]), { type: label, mins: String(mins) }];
      const runs = [...(ex.runs||[]), r];
      upDay({ exercise: { ...ex, logs, runs } });
    };

    /* к°Җм ёмҳӨкё°: кё°мЎҙ мҲҳлҸҷ мһ…л Ҙ мң м§Җ, л№Ҳ мҠ¬лЎҜл§Ң мұ„мӣҖ */
    const handleImport = async (importedData) => {
      // data нҒҙлЎңм ҖлҘј м§Ғм ‘ мӮ¬мҡ©н•ҙ mergedлҘј лҸҷкё°м ҒмңјлЎң кі„мӮ° (setState мҪңл°ұ мқҳмЎҙ X)
      const next = { ...data };
      const merged = {};
      Object.entries(importedData).forEach(([d, imported]) => {
        if (!next[d]) { next[d] = imported; }
        else {
          const ex = next[d];
          next[d] = {
            ...ex,
            bs: { ...imported.bs, ...ex.bs },
            weight:  ex.weight  || imported.weight  || '',
            bodyFat: ex.bodyFat || imported.bodyFat || '',
            bp:      (ex.bp?.sys && ex.bp?.dia) ? ex.bp : (imported.bp || ex.bp || {sys:'',dia:''}),
            // кұёмқҢмҲҳ/м№јлЎңлҰ¬/кұ°лҰ¬/кё°мҙҲлҢҖмӮ¬лҹү: кұҙк°•м•ұ к°’мқҙ лҚ” м •нҷ•н•ҳлҜҖлЎң мһҲмңјл©ҙ лҚ®м–ҙм”Җ
            steps: imported.steps || ex.steps || '',
            cal:   imported.cal   || ex.cal   || '',
            bcal:  imported.bcal  || ex.bcal  || '',
            dist:  imported.dist  || ex.dist  || '',
          };
        }
        merged[d] = next[d];
      });
      setData(next);
      // вң… мҰүмӢң dm_dash_v2 м ҖмһҘ (save effectмқҳ data[date] мЎ°кұҙ мҡ°нҡҢ)
      try {
        localStorage.setItem('dm_dash_v2', JSON.stringify({ data: next, lastImport: new Date().toLocaleString('ko-KR') }));
      } catch {}
      // вң… к°Җм ёмҳЁ лҚ°мқҙн„°лҘј м „мҡ© нӮӨм—җ лі„лҸ„ м ҖмһҘ вҖ” мғҲлЎңкі м№Ё нӣ„м—җлҸ„ ліөкө¬ к°ҖлҠҘ
      try {
        const existing = JSON.parse(localStorage.getItem('dm_imported') || '{}');
        const updated  = { ...existing };
        Object.entries(importedData).forEach(([d, imp]) => {
          if (!updated[d]) { updated[d] = imp; }
          else {
            updated[d] = {
              ...updated[d],
              weight:  updated[d].weight  || imp.weight  || '',
              bodyFat: updated[d].bodyFat || imp.bodyFat || '',
              bp:      (updated[d].bp?.sys && updated[d].bp?.dia) ? updated[d].bp : (imp.bp || updated[d].bp),
              steps:   imp.steps || updated[d].steps || '',
              cal:     imp.cal   || updated[d].cal   || '',
              dist:    imp.dist  || updated[d].dist  || '',
            };
          }
        });
        localStorage.setItem('dm_imported', JSON.stringify(updated));
      } catch {}
      setLastImport(new Date().toLocaleString('ko-KR'));
      await saveAllToSupabase(merged);
    };

    /* в”Җв”Җ LibreLinkUp лҸҷкё°нҷ” в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
       Edge Function(libre-sync) кІҪмң лЎң лҰ¬лёҢл Ҳ CGM мөңк·ј ~12мӢңк°„ нҳҲлӢ№мқ„ мҲҳм§‘,
       кё°мЎҙ к°Җм ёмҳӨкё° нҢҢмқҙн”„лқјмқё(buildDashboardDataвҶ’handleImport)мңјлЎң лі‘н•©.
       мҲҳлҸҷ мһ…л Ҙк°’мқҖ ліҙмЎҙлҗЁ (handleImportмқҳ bs лі‘н•© к·ңм№ҷ). в”Җв”Җ */
    const handleImportRef = useRef(null);
    handleImportRef.current = handleImport; // л§Ө л ҢлҚ”л§ҲлӢӨ мөңмӢ  нҒҙлЎңм Җ мң м§Җ (stale data л°©м§Җ)
    const lluBusyRef = useRef(false);

    const syncLibre = async (opts = {}) => {
      if (lluBusyRef.current) return null;
      const credS = localStorage.getItem('cn_llu_cred');
      if (!credS) return null;
      lluBusyRef.current = true;
      try {
        const cred = JSON.parse(credS);
        const body = { email: cred.email, password: cred.password };
        try {
          const cache = JSON.parse(localStorage.getItem('cn_llu_auth') || 'null');
          if (cache?.token && cache?.accountId && (cache.expires || 0) * 1000 > Date.now() + 60000) {
            Object.assign(body, cache);
          }
        } catch {}
        const res = await fetch(`${SUPA_URL}/functions/v1/libre-sync`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` },
          body: JSON.stringify(body)
        });
        const j = await res.json();
        if (!j.ok) {
          localStorage.removeItem('cn_llu_auth'); // нҶ нҒ° л¬ём ңмқј мҲҳ мһҲмңјлӢҲ мәҗмӢң нҸҗкё°
          throw new Error(j.error || 'лҸҷкё°нҷ” мӢӨнҢЁ');
        }
        if (j.auth) localStorage.setItem('cn_llu_auth', JSON.stringify(j.auth));
        // readings вҶ’ мқјмһҗлі„ {hour, value} лӘ©лЎқ
        const byDay = {};
        (j.readings || []).forEach(r => {
          const d = new Date(r.ts);
          if (isNaN(d.getTime())) return;
          const day = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          (byDay[day] = byDay[day] || []).push({ hour: d.getHours() + d.getMinutes()/60, value: Math.round(r.mgdl) });
        });
        if (Object.keys(byDay).length && handleImportRef.current) {
          const mapped = buildDashboardData({ glucoseByDay: byDay });
          await handleImportRef.current(mapped);
        }
        if (j.latest) setLluLatest({ ...j.latest, at: Date.now() });
        return j;
      } catch (e) {
        if (!opts.silent) throw e;
        console.log('LibreLinkUp sync skip:', e?.message || e);
        return null;
      } finally { lluBusyRef.current = false; }
    };
    const syncLibreRef = useRef(null);
    syncLibreRef.current = syncLibre;

    /* в”Җв”Җ лё”лЈЁнҲ¬мҠӨ нҳҲлӢ№кё°(м•„нҒҗмІө к°Җмқҙл“ң л“ұ н‘ңмӨҖ GATT) мқҪкё° в”Җв”Җ */
    const readBleGlucose = async () => {
      const BLE = (window.Capacitor?.isNativePlatform?.())
        ? window.Capacitor.Plugins?.GlucoseBle : null;
      if (!BLE) { setBleMsg('лё”лЈЁнҲ¬мҠӨ нҳҲлӢ№кё° м—°кІ°мқҖ м•ұм—җм„ңл§Ң м§Җмӣҗлҗ©лӢҲлӢӨ.'); return; }
      if (bleBusy) return;
      setBleBusy(true);
      setBleMsg('рҹ”Қ нҳҲлӢ№кё°лҘј м°ҫлҠ” мӨ‘... нҳҲлӢ№кё°мқҳ лё”лЈЁнҲ¬мҠӨ(лҸҷкё°нҷ”)лҘј мјң мЈјм„ёмҡ”');
      try {
        await BLE.requestPerm();
        const res = await BLE.scanAndRead({ timeout: 25 });
        const rs = res?.readings || [];
        if (!rs.length) { setBleMsg('м—°кІ°лҗҗм§Җл§Ң мғҲ кё°лЎқмқҙ м—Ҷм–ҙмҡ”.'); setBleBusy(false); return; }
        const byDay = {};
        rs.forEach(r => {
          const d = new Date(r.ts);
          if (isNaN(d.getTime()) || !(r.mgdl > 0)) return;
          const day = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          (byDay[day] = byDay[day] || []).push({ hour: d.getHours() + d.getMinutes()/60, value: Math.round(r.mgdl) });
        });
        if (Object.keys(byDay).length && handleImportRef.current) {
          const mapped = buildDashboardData({ glucoseByDay: byDay });
          await handleImportRef.current(mapped);
        }
        setBleMsg(`вң… ${res.device || 'нҳҲлӢ№кё°'}м—җм„ң ${rs.length}кұҙмқ„ к°Җм ёмҷ”м–ҙмҡ”!`);
        setTimeout(() => setBleMsg(''), 4000);
      } catch (e) {
        setBleMsg('вқҢ ' + (e?.message || 'нҳҲлӢ№кё° м—°кІ° мӢӨнҢЁ'));
      }
      setBleBusy(false);
    };

    // мһҗлҸҷ лҸҷкё°нҷ”: лЎңк·ёмқё нӣ„ мҰүмӢң + нҷ”л©ҙ мјңм ё мһҲмңјл©ҙ 90мҙҲл§ҲлӢӨ(мӢӨмӢңк°„) + л°ұк·ёлқјмҡҙл“ңлҠ” нҸҙл§Ғ мӨ‘лӢЁ
    // лҰ¬лёҢл Ҳ CGMмқҖ 1л¶„л§ҲлӢӨ к°ұмӢ лҗҳлҜҖлЎң нҸ¬к·ёлқјмҡҙл“ңм—җм„ң мҙҳмҙҳнһҲ, л°ұк·ёлқјмҡҙл“ңм—җм„  л°°н„°лҰ¬ м Ҳм•Ҫ
    useEffect(() => {
      if (!userId) return;
      if (!localStorage.getItem('cn_llu_cred')) return; // м—°лҸҷ м•Ҳ н–Ҳмңјл©ҙ нҸҙл§Ғ м•Ҳ н•Ё
      let timer = null;
      const tick = () => { if (document.visibilityState === 'visible') syncLibreRef.current?.({ silent: true }); };
      const start = () => { if (timer) return; tick(); timer = setInterval(tick, 90 * 1000); };
      const stop  = () => { if (timer) { clearInterval(timer); timer = null; } };
      const onVis = () => { document.visibilityState === 'visible' ? start() : stop(); };
      if (document.visibilityState === 'visible') start();
      document.addEventListener('visibilitychange', onVis);
      return () => { stop(); document.removeEventListener('visibilitychange', onVis); };
    }, [userId]);

    /* в”Җв”Җ ліөм•Ҫ м„Өм • лЎңл“ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
       мӣҗм№ҷ:
         1. Supabase вҶ’ localStorage мҲңмңјлЎң мӢңлҸ„
         2. мӢӨм ң м•Ҫ н•ӯлӘ©(items)мқҙ 1к°ң мқҙмғҒ мһҲм–ҙм•ј мң нҡЁ лҚ°мқҙн„°лЎң мқём •
            (л№Ҳ л°°м—ҙ / л№Ҳ мҠ¬лЎҜл§Ң мһҲлҠ” кІҪмҡ°лҠ” л¬ҙмӢң вҶ’ лІ„к·ё лҚ°мқҙн„° л°©м–ҙ)
         3. localStorageм—җл§Ң мһҲмңјл©ҙ Supabaseм—җ лҸҷкё°нҷ”
         4. saveMeds к°Җ мқҙлҜё м ҖмһҘ мӨ‘мқҙл©ҙ лҚ®м–ҙм“°м§Җ м•ҠмқҢ
    в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    useEffect(() => {
      if (!userId) {
        medsUserSavedRef.current = false;
        return;
      }
      medsUserSavedRef.current = false;
      (async () => {
        const normMeds = (arr) => Array.isArray(arr)
          ? arr.map(s => ({ ...s, items: Array.isArray(s.items) ? s.items : [] }))
          : [];
        // мӢӨм ң м•Ҫмқҙ 1к°ң мқҙмғҒ мһҲлҠ”м§Җ нҷ•мқё
        const hasMeds = (arr) => Array.isArray(arr) && arr.some(s => (s.items||[]).length > 0);

        try {
          const { data: row } = await supa.from('diabetes_data')
            .select('payload').eq('user_id', userId).eq('date', '_user_settings_')
            .maybeSingle();
          if (medsUserSavedRef.current) return; // saveMeds нҳём¶ң мӨ‘мқҙл©ҙ мӨ‘лӢЁ

          const fromSB = row?.payload?.medsConfig;

          if (hasMeds(fromSB)) {
            // в‘  Supabaseм—җ мң нҡЁ лҚ°мқҙн„° вҶ’ мӮ¬мҡ©
            setMedsConfig(normMeds(fromSB));
            localStorage.setItem(`hcd_meds_config_${userId}`, JSON.stringify(fromSB));
            return;
          }

          // в‘Ў Supabase м—ҶмқҢ/л№Ҳк°’ вҶ’ localStorage мӢңлҸ„
          try {
            const s = localStorage.getItem(`hcd_meds_config_${userId}`);
            const fromLS = s ? JSON.parse(s) : null;
            // мӮ¬мҡ©мһҗк°Җ м ҖмһҘ мӨ‘мқҙл©ҙ лҚ®м–ҙм“°м§Җ м•ҠмқҢ (м—°мһҘ л“ұ нҺём§‘ м§Ғнӣ„ л ҲмқҙмҠӨ л°©м§Җ)
            if (medsUserSavedRef.current) return;
            if (hasMeds(fromLS)) {
              setMedsConfig(normMeds(fromLS));
              // localStorage лҚ°мқҙн„°лҘј Supabaseм—җ лҸҷкё°нҷ” (кё°мЎҙ goals ліҙмЎҙ)
              try {
                await supa.from('diabetes_data').upsert(
                  { user_id: userId, date: '_user_settings_', payload: { medsConfig: fromLS, goals: (row?.payload?.goals) || goalsRef.current }, updated_at: new Date().toISOString() },
                  { onConflict: 'user_id,date' }
                );
              } catch {}
            } else {
              setMedsConfig([]); // в‘ў м•„л¬ҙкІғлҸ„ м—ҶмқҢ
            }
          } catch {
            if (medsUserSavedRef.current) return;
            setMedsConfig([]);
          }

        } catch {
          if (medsUserSavedRef.current) return;
          try {
            const s = localStorage.getItem(`hcd_meds_config_${userId}`);
            const fromLS = s ? JSON.parse(s) : null;
            const hasMeds2 = (arr) => Array.isArray(arr) && arr.some(s2 => (s2.items||[]).length > 0);
            if (medsUserSavedRef.current) return;
            setMedsConfig(hasMeds2(fromLS) ? normMeds(fromLS) : []);
          } catch {
            if (medsUserSavedRef.current) return;
            setMedsConfig([]);
          }
        }
      })();
    }, [userId]);

    /* в”Җв”Җ лӘ©н‘ң лЎңл“ң (Supabase вҶ’ localStorage нҸҙл°ұ) в”Җв”Җ */
    useEffect(() => {
      if (!userId) return;
      (async () => {
        try {
          const { data: row } = await supa.from('diabetes_data')
            .select('payload').eq('user_id', userId).eq('date', '_user_settings_').maybeSingle();
          const g = row?.payload?.goals;
          if (g && typeof g === 'object') {
            setGoals(prev => ({ ...prev, ...g }));
            localStorage.setItem(`hcd_goals_${userId}`, JSON.stringify(g));
            return;
          }
        } catch {}
        try {
          const s = localStorage.getItem(`hcd_goals_${userId}`);
          if (s) setGoals(prev => ({ ...prev, ...JSON.parse(s) }));
        } catch {}
      })();
    }, [userId]);

    // saveGoals: лӘ©н‘ң м ҖмһҘ вҖ” medsConfigмҷҖ к°ҷмқҖ _user_settings_ rowм—җ лі‘кё°
    const saveGoals = (g) => {
      const cleaned = {
        steps: Math.max(1000, parseInt(g.steps) || 10000),
        weight: g.weight !== '' && !isNaN(parseFloat(g.weight)) ? String(parseFloat(g.weight)) : '',
        condition: g.condition || 'general'
      };
      setGoals(cleaned);
      if (userId) {
        localStorage.setItem(`hcd_goals_${userId}`, JSON.stringify(cleaned));
        (async () => {
          try {
            await supa.from('diabetes_data').upsert(
              { user_id: userId, date: '_user_settings_', payload: { medsConfig: medsConfigRef.current, goals: cleaned }, updated_at: new Date().toISOString() },
              { onConflict: 'user_id,date' }
            );
          } catch (e) { console.error('лӘ©н‘ң м ҖмһҘ мҳӨлҘҳ:', e); }
        })();
      }
      setShowGoals(false);
    };

    // saveMeds: лӘ…мӢңм Ғ м ҖмһҘ вҖ” localStorage + Supabase мҰүмӢң м ҖмһҘ
    // (мһҗлҸҷ save effect м ңкұ°: нғҖмқҙл°Қ лІ„к·ё л°©м§Җ)
    const saveMeds = (cfg) => {
      // лЎңл“ң effectк°Җ лҚ®м–ҙм“°м§Җ м•ҠлҸ„лЎқ вҖ” м ҖмһҘ мҷ„лЈҢ мқҙнӣ„м—җлҸ„ м„ём…ҳ лӮҙлӮҙ мң м§Җ
      medsUserSavedRef.current = true;
      // кё°к°„ м—°мһҘ(endDate ліҖкІҪ) л“ұ нҺём§‘ кІ°кіјк°Җ мҰүмӢң лҢҖмӢңліҙл“ңм—җ л°ҳмҳҒлҗҳлҸ„лЎқ м •к·ңнҷ”
      const normalized = Array.isArray(cfg)
        ? cfg.map(s => ({ ...s, items: Array.isArray(s.items) ? s.items.map(m => ({ ...m })) : [] }))
        : [];
      setMedsConfig(normalized);
      if (userId) {
        localStorage.setItem(`hcd_meds_config_${userId}`, JSON.stringify(normalized));
        (async () => {
          try {
            await supa.from('diabetes_data').upsert(
              { user_id: userId, date: '_user_settings_', payload: { medsConfig: normalized, goals: goalsRef.current }, updated_at: new Date().toISOString() },
              { onConflict: 'user_id,date' }
            );
          } catch (e) {
            console.error('ліөм•Ҫ м„Өм • м ҖмһҘ мҳӨлҘҳ:', e);
            // Supabase м ҖмһҘ мӢӨнҢЁ мӢңм—җлҸ„ localStorageм—җлҠ” лӮЁм•„мһҲм–ҙ лӢӨмқҢ лЎңл“ң л•Ң ліөкө¬лҗЁ
          }
        })();
      }
      setShowMedSettings(false);
    };

    // нӮӨ(мӢ мһҘ): Supabase cn_profiles мҡ°м„ , м—Ҷмңјл©ҙ localStorage нҸҙл°ұ
    useEffect(() => {
      if (!userId) return;
      (async () => {
        // 1) Supabaseм—җм„ң нӮӨ лЎңл“ң мӢңлҸ„
        const { data: prof } = await supa.from('cn_profiles').select('height').eq('id', userId).maybeSingle();
        if (prof?.height) {
          const hStr = String(prof.height);
          setHeight(hStr);
          // localStorageлҸ„ мөңмӢ нҷ”
          localStorage.setItem('hcd_height', hStr);
          localStorage.setItem(`hcd_height_${userId}`, hStr);
          return;
        }
        // 2) localStorage нҸҙл°ұ
        const h = localStorage.getItem(`hcd_height_${userId}`) || localStorage.getItem('hcd_height');
        if (h) setHeight(h);
      })();
    }, [userId]);
    const saveHeight = (v) => {
      setHeight(v);
      localStorage.setItem('hcd_height', v);
      if (userId) localStorage.setItem(`hcd_height_${userId}`, v);
      // Supabaseм—җлҸ„ лҸҷкё°нҷ”
      if (userId) supa.from('cn_profiles').update({ height: parseFloat(v) || null }).eq('id', userId);
    };

    /* Stats */
    const allMedIds = useMemo(() => medsConfig.flatMap(s => (s.items||[]).filter(m => isMedActive(m, date)).map(m => m.id||'')), [medsConfig, date]);

    // в”Җв”Җ м• н”ҢмӣҢм№ҳ лёҢлҰ¬м§Җ: мӣҢм№ҳм—җм„ң мҳЁ мһ…л Ҙ(л¬јВ·ліөм•Ҫ) мІҳлҰ¬ в”Җв”Җ
    const allMedIdsRef = useRef(allMedIds); allMedIdsRef.current = allMedIds;
    useEffect(() => {
      const WB = window.Capacitor?.Plugins?.WatchBridge;
      if (!WB || !WB.addListener) return;
      let handle;
      const today = () => { const t = new Date(); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; };
      const p = WB.addListener('watchAction', (info) => {
        try {
          const action = info && info.action;
          const d0 = today();
          if (action === 'water') {
            const ml = parseInt(info.ml) || 0; if (!ml) return;
            setData(prev => { const d = prev[d0] || emptyDay(); return { ...prev, [d0]: { ...d, water_ml: (parseInt(d.water_ml)||0) + ml } }; });
          } else if (action === 'meds_all_done') {
            setData(prev => { const d = prev[d0] || emptyDay(); const done = Object.fromEntries((allMedIdsRef.current||[]).map(id => [id, true])); return { ...prev, [d0]: { ...d, meds: { ...(d.meds||{}), ...done } } }; });
          } else if (action === 'med_taken') {
            const id = info.id; if (!id) return;
            setData(prev => { const d = prev[d0] || emptyDay(); return { ...prev, [d0]: { ...d, meds: { ...(d.meds||{}), [id]: true } } }; });
          } else if (action === 'workout_end') {
            const label = info.type === 'run' ? 'лӢ¬лҰ¬кё°' : 'кұ·кё°';
            const mins = Math.max(1, Math.round((parseInt(info.seconds)||0) / 60));
            setData(prev => {
              const d = prev[d0] || emptyDay();
              const ex = d.exercise || { type:'', mins:'', logs:[] };
              const logs = [ ...(ex.logs||[]), { type: label, mins: String(mins) } ];
              return { ...prev, [d0]: { ...d, exercise: { ...ex, type: ex.type || label, mins: String((parseInt(ex.mins)||0) + mins), logs } } };
            });
          }
        } catch(e) {}
      });
      Promise.resolve(p).then(h => { handle = h; }).catch(()=>{});
      return () => { try { handle && handle.remove(); } catch(e) {} };
    }, []);

    // мӣҢм№ҳлЎң мҳӨлҠҳ ліөм•Ҫ лӘ©лЎқ м „мҶЎ(н•ҳлӮҳм”© мІҙнҒ¬мҡ©)
    useEffect(() => {
      const WB = window.Capacitor?.Plugins?.WatchBridge;
      if (!WB || !WB.updateContext) return;
      const meds = (medsConfig||[]).flatMap(s => (s.items||[])
        .filter(m => m.name && isMedActive(m, date))
        .map(m => ({ id: String(m.id), name: String(m.name), taken: (day.meds && day.meds[m.id]) ? '1' : '' })));
      try { WB.updateContext({ context: { meds } }); } catch(e) {}
    }, [medsConfig, day, date]);

    const medDone = allMedIds.filter(id => day.meds[id]).length;
    const medPct  = allMedIds.length ? Math.round((medDone / allMedIds.length) * 100) : 0;
    const bsVals  = Object.values(day.bs).filter(v => parseInt(v) > 0);
    const bsAvg   = bsVals.length ? Math.round(bsVals.reduce((a,b) => a+parseInt(b), 0) / bsVals.length) : null;

    /* Weekly chart */
    const weekData = useMemo(() => Array.from({length:7}, (_,i) => {
      const d = shiftDate(date, i-6);
      const dd = normalizeDay(data[d]);
      const vals = Object.values(dd.bs).filter(v => parseInt(v) > 0);
      return { label: fmtDate(d).short, avg: vals.length ? Math.round(vals.reduce((a,b)=>a+parseInt(b),0)/vals.length) : null };
    }), [data, date]);

    useEffect(() => {
      if (!chartRef.current) return;
      if (chartInst.current) { chartInst.current.destroy(); chartInst.current = null; }
      chartInst.current = new Chart(chartRef.current, {
        type: 'line',
        data: {
          labels: weekData.map(d => d.label),
          datasets: [{
            label: 'нҸүк·  нҳҲлӢ№', data: weekData.map(d => d.avg),
            borderColor: 'var(--cn-brand)', backgroundColor: 'rgba(37,99,235,0.08)',
            borderWidth: 2.5, pointBackgroundColor: weekData.map(d => bsColor(d.avg)),
            pointRadius: 5, fill: true, tension: 0.35, spanGaps: true
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend:{display:false}, tooltip:{ callbacks:{ label: c => c.raw ? `${c.raw} mg/dL` : 'кё°лЎқ м—ҶмқҢ' } } },
          scales: {
            y: { min:50, max:320, grid:{color:'var(--divider)'}, ticks:{font:{size:11}} },
            x: { grid:{display:false}, ticks:{font:{size:11}} }
          }
        }
      });
      return () => { if(chartInst.current){chartInst.current.destroy(); chartInst.current=null;} };
    }, [weekData]);

    const isToday = date === todayStr();

    // мІҙмӨ‘ нҠёл Ңл“ң (IIFE м—Ҷмқҙ лҜёлҰ¬ кі„мӮ°)
    const _prevDayWt  = normalizeDay(data[shiftDate(date, -1)]);
    const _prevW      = parseFloat(_prevDayWt.weight)  || null;
    const _prevBf     = parseFloat(_prevDayWt.bodyFat) || null;
    const _curW       = parseFloat(day.weight)  || null;
    const _curBf      = parseFloat(day.bodyFat) || null;
    const _wDiff      = (_prevW && _curW)  ? _curW  - _prevW  : null;
    const _bfDiff     = (_prevBf && _curBf) ? _curBf - _prevBf : null;
    const _wArrow     = _wDiff  === null ? null : _wDiff  > 0.04 ? 'вҶ‘' : _wDiff  < -0.04 ? 'вҶ“' : 'вҶ’';
    const _bfArrow    = _bfDiff === null ? null : _bfDiff > 0.04 ? 'вҶ‘' : _bfDiff < -0.04 ? 'вҶ“' : 'вҶ’';
    const _wArrowClr  = _wDiff  === null ? 'var(--text-mute)' : _wDiff  > 0.04 ? '#ef4444' : _wDiff  < -0.04 ? 'var(--cn-brand)' : 'var(--text-mute)';
    const _bfArrowClr = _bfDiff === null ? 'var(--text-mute)' : _bfDiff > 0.04 ? '#ef4444' : _bfDiff < -0.04 ? 'var(--cn-brand)' : 'var(--text-mute)';

    // мқёмҰқ лЎңл”© мӨ‘
    if (!authReady) return (
      <div style={{ minHeight:'100vh', background:'var(--bg)', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ textAlign:'center', color:'var(--text-sub)' }}>
          <CareNoteLogo size={56} />
          <div style={{ fontSize:'19px', fontWeight:'700', color:'var(--text)', marginTop:'14px' }}>CARENOTE</div>
          <div style={{ fontSize:'14px', marginTop:'6px' }}>лЎңл”© мӨ‘...</div>
          <div style={{ fontSize:'11px', marginTop:'10px', color:'var(--text-mute)' }}>{APP_BUILD}</div>
        </div>
      </div>
    );

    // лҜёмқёмҰқ вҶ’ лһңл”© нҺҳмқҙм§Җ (мӢңмһ‘н•ҳкё° лҲ„лҘҙл©ҙ лЎңк·ёмқё нҷ”л©ҙ)

  /* в”Җв”Җ м—җлҹ¬ кІҪкі„ (Error Boundary) в”Җв”Җ */
  class ErrorBoundary extends React.Component {
    constructor(props) { super(props); this.state = { error: null }; }
    static getDerivedStateFromError(err) { return { error: err }; }
    componentDidCatch(err, info) {
      console.error('[CARENOTE CRASH]', err, info);
    }
    render() {
      if (this.state.error) {
        return (
          <div style={{
            position:'fixed', inset:0, background:'#0f172a', color:'#f8fafc',
            display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',

              maxHeight:'60vh', overflowY:'auto'
            }}>
              <div style={{color:'#f87171', fontWeight:'700', marginBottom:'8px'}}>

              </div>

                {this.state.error.stack}

              рҹ”„ мғҲлЎңкі м№Ё
            </button>
          </div>
        );
      }
      return this.props.children;
    }
  }

  ReactDOM.createRoot(document.getElementById('root')).render(

  <script>
    // м„ңл№„мҠӨ мӣҢм»Ө: мәҗмӢң л№„мҡ°кё° + мһ¬л“ұлЎқ
    if ('serviceWorker' in navigator) {
      // мғҲ SWк°Җ control нҡҚл“қ мӢң мҰүмӢң лҰ¬лЎңл“ң (к°ҖмһҘ мӨ‘мҡ”)
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });

      navigator.serviceWorker.register('/sw.js').then(reg => {
        // лҢҖкё° мӨ‘мқё мғҲ SWк°Җ мһҲмңјл©ҙ мҰүмӢң нҷңм„ұнҷ” мҡ”мІӯ
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed') {
              if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      }).catch(() => {});

      // нҳ№мӢң мқҙм „ мәҗмӢңк°Җ лӮЁм•„мһҲмңјл©ҙ мҰүмӢң м „л¶Җ мӮӯм ң
      if (caches && caches.keys) {
        caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      }
    }
  </script>
