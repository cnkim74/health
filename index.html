      const id = genId();
      const freqToSave = newFreq.type === 'daily' ? undefined : newFreq;
      setCfg(c => c.map(s => s.key === newSlotKey
        ? { ...s, items: [...(s.items||[]), { id, name: newName.trim(), dose: newDose, startDate: newStart, endDate: newEnd, ...(freqToSave ? {freq: freqToSave} : {}) }] }
        : s));
      const added = newName.trim();
      setNewName(''); setNewDose(''); setNewStart(''); setNewEnd(''); setNewFreq({type:'daily'}); setSuggestions([]);
      setAddMsg('✅ ' + added + ' 추가됐어요!');
      setTimeout(() => setAddMsg(''), 3000);
    };

    // 복약 설정 불러오기 — 4단계 폴백
    // ① 현재 Supabase 계정(authUser.id) → ② localStorage(authUser.id 키)
    // → ③ 예전 기기 UUID(dm_user_id) Supabase → ④ 예전 localStorage 키
    const loadFromCloud = async () => {
      if (!userId) { setLoadMsg('⚠️ 로그인이 필요해요.'); setTimeout(()=>setLoadMsg(''),2500); return; }
      setLoadingCloud(true); setLoadMsg('');
      try {
        // ① 현재 계정 Supabase
        const { data: row } = await supa.from('diabetes_data')
          .select('payload').eq('user_id', userId).eq('date', '_user_settings_').maybeSingle();
        const fromSB = row?.payload?.medsConfig;
        if (fromSB && Array.isArray(fromSB) && fromSB.length > 0) {
          setCfg(JSON.parse(JSON.stringify(fromSB)));
          setLoadMsg('✅ 계정 저장 데이터에서 ' + fromSB.flatMap(s=>(s.items||[])).length + '개 약을 불러왔어요!');
          setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),3500); return;
        }

        // ② 현재 계정 localStorage
        const ls1 = localStorage.getItem(`hcd_meds_config_${userId}`);
        const fromLS1 = ls1 ? JSON.parse(ls1) : null;
        if (fromLS1 && Array.isArray(fromLS1) && fromLS1.length > 0) {
          setCfg(JSON.parse(JSON.stringify(fromLS1)));
          setLoadMsg('✅ 이 기기의 로컬 데이터에서 ' + fromLS1.flatMap(s=>(s.items||[])).length + '개 약을 불러왔어요!');
          setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),3500); return;
        }

        // ③ 예전 UUID 조회 (localStorage dm_user_id + 직접 입력값 모두 시도)
        const legacyId = localStorage.getItem('dm_user_id');
        const candidates = [...new Set([legacyId, legacyInput.trim()].filter(x => x && x !== userId))];
        for (const lid of candidates) {
          const { data: legacyRow } = await supa.from('diabetes_data')
            .select('payload').eq('user_id', lid).eq('date', '_user_settings_').maybeSingle();
          const fromLegacySB = legacyRow?.payload?.medsConfig;
          if (fromLegacySB && Array.isArray(fromLegacySB) && fromLegacySB.length > 0) {
            setCfg(JSON.parse(JSON.stringify(fromLegacySB)));
            // 이 UUID를 기억해 다음번엔 자동으로 찾게 함
            localStorage.setItem('dm_user_id', lid);
            localStorage.setItem('cn_legacy_uid', lid);
            setLoadMsg('✅ 이전 계정 데이터에서 ' + fromLegacySB.flatMap(s=>(s.items||[])).length + '개 약을 불러왔어요! 저장을 눌러 현재 계정에 연결하세요.');
            setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),6000); return;
          }
          // ④ 예전 기기 localStorage 키
          const ls2 = localStorage.getItem(`hcd_meds_config_${lid}`);
          const fromLS2 = ls2 ? JSON.parse(ls2) : null;
          if (fromLS2 && Array.isArray(fromLS2) && fromLS2.length > 0) {
            setCfg(JSON.parse(JSON.stringify(fromLS2)));
            setLoadMsg('✅ 이전 로컬 데이터에서 ' + fromLS2.flatMap(s=>(s.items||[])).length + '개 약을 불러왔어요! 저장을 눌러 현재 계정에 연결하세요.');
            setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),6000); return;
          }
        }

        // ⑤ 최후 수단: Supabase 일별 기록에서 복약 ID 스캔해 복구
        try {
          const { data: allRows } = await supa.from('diabetes_data')
            .select('payload').eq('user_id', userId);
          const medIdSet = new Set();
          (allRows || []).forEach(r => {
            if (r.payload?.meds) Object.keys(r.payload.meds).forEach(id => medIdSet.add(id));
          });
          if (medIdSet.size > 0) {
              const recovered = [{
              slot: '복구된 복약 목록', key: 'recovered_' + Date.now(), icon: '💊',
              ...SLOT_COLORS_DEF[0],
              items: Array.from(medIdSet).map(id => ({ id, name: '약 이름 입력 필요', dose: '', startDate: '', endDate: '' }))
            }];
            setCfg(recovered);
            setLoadMsg('🔍 기록에서 ' + medIdSet.size + '개 복약 항목을 발견했어요! 약 이름을 ✏️로 수정 후 저장하세요.');
            setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),6000); return;
          }
        } catch {}

        setLoadMsg('ℹ️ 저장된 복약 데이터가 없어요. 아래에서 직접 추가해 주세요.');
      } catch(e) {
        setLoadMsg('❌ 불러오기 실패: ' + (e.message||'오류'));
      }
      setLoadingCloud(false);
      setTimeout(()=>setLoadMsg(''), 4000);
    };

    // 편집 시작 시 이름 input 자동 포커스 + 전체 선택
    useEffect(() => {
      if (editingMed && nameInputRef.current) {
        setTimeout(() => {
          nameInputRef.current?.focus();
          nameInputRef.current?.select();
        }, 50);
      }
    }, [editingMed]);

    const updSlotName = (key, val) => setCfg(c => c.map(s => s.key===key ? {...s, slot:val} : s));
    const updSlotIcon = (key, val) => setCfg(c => c.map(s => s.key===key ? {...s, icon:val} : s));
    const updSlotTime = (key, val) => setCfg(c => c.map(s => s.key===key ? {...s, notifTime:val} : s));

    const requestNotifPermission = async () => {
      if (!('Notification' in window)) { alert('이 브라우저는 알림을 지원하지 않아요.'); return; }
      const perm = await Notification.requestPermission();
      if (perm === 'granted') alert('✅ 알림이 허용됐어요! 복약 시간에 알림이 울려요.');
      else alert('알림을 허용해야 복약 알람을 받을 수 있어요.');
    };
    const delSlot = (key) => { if(window.confirm('이 시간대를 삭제할까요?')) setCfg(c => c.filter(s => s.key!==key)); };
    const moveSlot = (key, dir) => setCfg(c => {
      const idx = c.findIndex(s => s.key===key);
      const next = idx + dir;
      if (next < 0 || next >= c.length) return c;
      const arr = [...c];
      [arr[idx], arr[next]] = [arr[next], arr[idx]];
      return arr;
    });
    const addSlot = () => {
      const key = 'slot_' + Date.now();
      const col = SLOT_COLORS_DEF[cfg.length % SLOT_COLORS_DEF.length];
      setCfg(c => [...c, { slot:'새 시간대', key, icon:'💊', items:[], ...col }]);
      setEditingSlot(key);
      setTimeout(() => slotListEndRef.current?.scrollIntoView({ behavior:'smooth', block:'center' }), 150);
    };
    const updMedField = (slotKey, medId, field, val) =>
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items: (s.items||[]).map(m => m.id===medId ? {...m, [field]:val} : m)} : s));
    const delMed = (slotKey, medId) =>
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items: (s.items||[]).filter(m => m.id!==medId)} : s));
    const addMed = (slotKey) => {
      const id = genId();
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items:[...(s.items||[]), {id, name:'', dose:'', startDate:'', endDate:''}]} : s));
      setEditingMed({slotKey, medId:id});
    };
    const reset = () => { if(window.confirm('복약 목록을 전부 삭제할까요?')) setCfg([]); };

    const inpSt = { border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, borderRadius:'6px', padding:'6px 10px', fontSize:'16px', width:'100%', outline:'none' };

    return (
      <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.55)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2000,padding:'16px'}}
           onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div style={{background:'var(--card-bg)',borderRadius:'18px',padding:'20px',maxWidth:'520px',width:'100%',maxHeight:'92vh',overflowY:'auto',boxShadow:'0 24px 80px rgba(0,0,0,0.25)'}}>

          {/* ── 헤더 ── */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
            <div style={{fontSize:'15px',fontWeight:'800',color:'var(--text)'}}>💊 복약 설정</div>
            <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
              <button onClick={loadFromCloud} disabled={loadingCloud}
                style={{background:loadingCloud?'var(--divider)':'var(--cn-brand-100)',border:'1px solid var(--cn-brand)',
                        borderRadius:'8px',padding:'5px 10px',cursor:loadingCloud?'default':'pointer',
                        fontSize:'11px',fontWeight:'700',color:'var(--cn-brand)',whiteSpace:'nowrap'}}>
                {loadingCloud ? '⏳' : '☁️ 불러오기'}
              </button>
              <button onClick={onClose} style={{background:'var(--divider)',border:'none',borderRadius:'8px',width:'32px',height:'32px',cursor:'pointer',fontSize:'14px'}}>✕</button>
            </div>
          </div>

          {/* ── 클라우드 로드 메시지 ── */}
          {loadMsg && (
            <div style={{background: loadMsg.startsWith('✅')||loadMsg.startsWith('🔍')?'var(--cn-ok-100)':loadMsg.startsWith('❌')?'var(--cn-danger-100)':'var(--cn-warn-100)',
                         border:`1px solid ${loadMsg.startsWith('✅')||loadMsg.startsWith('🔍')?'var(--cn-ok)':loadMsg.startsWith('❌')?'var(--cn-danger)':'var(--cn-warn)'}`,
                         borderRadius:'8px',padding:'8px 12px',marginBottom:'10px',fontSize:'13px',fontWeight:'600',
                         color:loadMsg.startsWith('✅')||loadMsg.startsWith('🔍')?'var(--cn-ok)':loadMsg.startsWith('❌')?'var(--cn-danger)':'#92400e'}}>
              {loadMsg}
            </div>
          )}

          {/* ════════════════════════════════════════
              ➕  새 약 추가 패널 (PRIMARY ACTION)
          ════════════════════════════════════════ */}
          <div style={{background:'var(--cn-brand-100)',border:'2px solid var(--cn-brand)',borderRadius:'14px',padding:'16px',marginBottom:'16px'}}>
            <div style={{fontSize:'14px',fontWeight:'800',color:'var(--cn-brand)',marginBottom:'12px'}}>➕ 새 약 추가</div>

            {/* 약 이름 + 자동완성 */}
            <div style={{marginBottom:'8px',position:'relative'}}>
              <div style={{fontSize:'12px',color:'var(--text-sub)',fontWeight:'600',marginBottom:'5px'}}>
                💊 약 이름 <span style={{fontWeight:'400',color:'var(--text-mute)'}}>입력하면 자동 검색</span>
                {isSearching && <span style={{marginLeft:'6px',color:'var(--cn-brand)'}}>🔍</span>}
              </div>
              <input
                value={newName}
                onChange={e => handleNameInput(e.target.value)}
                onKeyDown={e => e.key==='Enter' && addDrugToSlot()}
                placeholder="예: 아스피린, 메트포르민, 리피토…"
                style={{width:'100%',border:'1px solid var(--cn-brand)',borderRadius:'8px',
                        padding:'10px 12px',fontSize:'14px',outline:'none',
                        background:'var(--card-bg)',color:'var(--text)',boxSizing:'border-box'}}/>
              {/* 자동완성 드롭다운 */}
              {suggestions.length > 0 && (
                <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:100,
                             background:'var(--card-bg)',border:'1px solid var(--card-border)',
                             borderRadius:'10px',boxShadow:'0 8px 24px rgba(0,0,0,0.15)',
                             maxHeight:'220px',overflowY:'auto',marginTop:'4px'}}>
                  {suggestions.map((drug, idx) => (
                    <button key={idx}
                      onClick={() => selectSuggestion(drug)}
                      style={{width:'100%',display:'block',padding:'10px 14px',background:'transparent',
                              border:'none',borderBottom: idx < suggestions.length-1 ? '1px solid var(--divider)':'none',
                              cursor:'pointer',textAlign:'left'}}>
                      <div style={{fontSize:'13px',fontWeight:'700',color:'var(--text)'}}>{drug.itemName}</div>
                      {drug.efcyQesitm && (
                        <div style={{fontSize:'11px',color:'var(--text-mute)',marginTop:'2px',
                                     overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          {drug.efcyQesitm.slice(0,60)}
                        </div>
                      )}
                    </button>
                  ))}
                  <div style={{padding:'6px 14px',fontSize:'11px',color:'var(--text-mute)',borderTop:'1px solid var(--divider)'}}>
                    목록에 없으면 직접 입력 후 추가하기 누르세요
                  </div>
                </div>
              )}
              {/* 검색 에러/결과없음 메시지 */}
              {searchErr && suggestions.length === 0 && (
                <div style={{fontSize:'12px',color:'var(--text-mute)',marginTop:'4px',padding:'4px 2px'}}>
                  {searchErr}
                </div>
              )}
            </div>

            {/* 용량 */}
            <div style={{marginBottom:'8px'}}>
              <div style={{fontSize:'12px',color:'var(--text-sub)',fontWeight:'600',marginBottom:'5px'}}>📦 용량</div>
              <input value={newDose} onChange={e=>setNewDose(e.target.value)}
                placeholder="예: 100mg 1정, 500mg 2정"
                style={{width:'100%',border:'1px solid var(--card-border)',borderRadius:'8px',padding:'9px 12px',
                        fontSize:'14px',outline:'none',background:'var(--card-bg)',color:'var(--text)',boxSizing:'border-box'}}/>
            </div>

            {/* 복약 시기 */}
            <div style={{marginBottom:'10px'}}>
              <div style={{fontSize:'12px',color:'var(--text-sub)',fontWeight:'600',marginBottom:'5px'}}>
                📅 복약 시기 <span style={{fontWeight:'400',color:'var(--text-mute)'}}>(미입력 시 항상 표시)</span>
              </div>
              <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                <input type="date" value={newStart} onChange={e=>setNewStart(e.target.value)}
                  style={{flex:1,border:'1px solid var(--card-border)',borderRadius:'8px',padding:'8px',
                          fontSize:'13px',outline:'none',background:'var(--card-bg)',color:'var(--text)'}}/>
                <span style={{color:'var(--text-mute)',fontSize:'13px',flexShrink:0}}>~</span>
                <input type="date" value={newEnd} onChange={e=>setNewEnd(e.target.value)}
                  style={{flex:1,border:'1px solid var(--card-border)',borderRadius:'8px',padding:'8px',
                          fontSize:'13px',outline:'none',background:'var(--card-bg)',color:'var(--text)'}}/>
              </div>
            </div>

            {/* 투여 주기 */}
            {(() => {
              const DAY_KO = ['일','월','화','수','목','금','토'];
              const tabBtn = (type, label) => (
                <button key={type} onClick={() => setNewFreq(f => ({...f, type}))}
                  style={{flex:1, padding:'7px 4px', borderRadius:'8px', fontSize:'12px', fontWeight:'700', cursor:'pointer',
                    border: newFreq.type===type ? 'none' : '1px solid var(--card-border)',
                    background: newFreq.type===type ? 'var(--cn-brand)' : 'var(--card-bg)',
                    color: newFreq.type===type ? '#fff' : 'var(--text-mute)'}}>
                  {label}
                </button>
              );
              return (
                <div style={{marginBottom:'12px'}}>
                  <div style={{fontSize:'12px',color:'var(--text-sub)',fontWeight:'600',marginBottom:'6px'}}>🔁 투여 주기</div>
                  <div style={{display:'flex',gap:'4px',marginBottom:'8px'}}>
                    {tabBtn('daily','매일')} {tabBtn('weekly','매주')} {tabBtn('monthly','매월')} {tabBtn('interval','주기별')}
                  </div>
                  {newFreq.type==='weekly' && (
                    <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
                      {DAY_KO.map((d,i)=>{
                        const on=(newFreq.weekDays||[]).includes(i);
                        return <button key={i} onClick={()=>{
                          const wd=newFreq.weekDays||[];
                          setNewFreq(f=>({...f,weekDays:on?wd.filter(x=>x!==i):[...wd,i].sort()}));
                        }} style={{width:'36px',height:'36px',borderRadius:'50%',border:'none',cursor:'pointer',fontSize:'13px',fontWeight:'700',
                          background:on?'var(--cn-brand)':'var(--card-bg)',
                          border:'1px solid '+(on?'var(--cn-brand)':'var(--card-border)'),
                          color:on?'#fff':'var(--text-mute)'}}>{d}</button>;
                      })}
                    </div>
                  )}
                  {newFreq.type==='monthly' && (
                    <div>
                      <div style={{fontSize:'11px',color:'var(--text-mute)',marginBottom:'5px'}}>날짜 선택 (여러 개 가능)</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                        {Array.from({length:31},(_,i)=>i+1).map(n=>{
                          const on=(newFreq.monthDays||[]).includes(n);
                          return <button key={n} onClick={()=>{
                            const md=newFreq.monthDays||[];
                            setNewFreq(f=>({...f,monthDays:on?md.filter(x=>x!==n):[...md,n].sort((a,b)=>a-b)}));
                          }} style={{width:'32px',height:'32px',borderRadius:'7px',cursor:'pointer',fontSize:'11px',fontWeight:'700',
                            border:'1px solid '+(on?'var(--cn-brand)':'var(--card-border)'),
                            background:on?'var(--cn-brand)':'var(--card-bg)',
                            color:on?'#fff':'var(--text-mute)'}}>{n}</button>;
                        })}
                      </div>
                    </div>
                  )}
                  {newFreq.type==='interval' && (
                    <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                      <span style={{fontSize:'13px',color:'var(--text-sub)'}}>매</span>
                      <input type="number" min="1" max="365"
                        value={newFreq.intervalDays||1}
                        onChange={e=>setNewFreq(f=>({...f,intervalDays:Math.max(1,parseInt(e.target.value)||1),
                          refDate:f.refDate||newStart||new Date().toISOString().slice(0,10)}))}
                        style={{width:'60px',border:'1px solid var(--card-border)',borderRadius:'8px',padding:'6px 8px',
                          fontSize:'14px',textAlign:'center',background:'var(--card-bg)',color:'var(--text)',outline:'none'}}/>
                      <span style={{fontSize:'13px',color:'var(--text-sub)'}}>일마다</span>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* 복약 시간대 */}
            <div style={{marginBottom:'12px'}}>
              <div style={{fontSize:'12px',color:'var(--text-sub)',fontWeight:'600',marginBottom:'6px'}}>⏰ 복약 시간대</div>
              <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                {cfg.map(slot => (
                  <button key={slot.key} onClick={()=>setNewSlotKey(slot.key)}
                    style={{padding:'7px 14px',borderRadius:'20px',fontSize:'13px',fontWeight:'700',cursor:'pointer',
                            border:`2px solid ${newSlotKey===slot.key?slot.color:'var(--card-border)'}`,
                            background:newSlotKey===slot.key?slot.bg:'var(--card-bg)',
                            color:newSlotKey===slot.key?slot.color:'var(--text-sub)'}}>
                    {slot.icon} {slot.slot}
                  </button>
                ))}
              </div>
            </div>

            {/* 피드백 */}
            {addMsg && (
              <div style={{fontSize:'12px',fontWeight:'700',
                           color:addMsg.startsWith('✅')?'var(--cn-ok)':'var(--cn-warn)',
                           marginBottom:'8px',padding:'6px 10px',
                           background:addMsg.startsWith('✅')?'var(--cn-ok-100)':'var(--cn-warn-100)',
                           borderRadius:'8px'}}>
                {addMsg}
              </div>
            )}

            <button onClick={addDrugToSlot}
              style={{width:'100%',padding:'12px',background:'var(--cn-brand)',color:'#fff',border:'none',
                      borderRadius:'10px',cursor:'pointer',fontSize:'15px',fontWeight:'800'}}>
              💊 추가하기
            </button>
          </div>

          {/* ── 현재 복약 목록 ── */}
          <div style={{fontSize:'13px',fontWeight:'700',color:'var(--text-sub)',marginBottom:'8px'}}>📋 현재 복약 목록</div>

          {cfg.map(slot => (
            <div key={slot.key} style={{background:slot.bg,border:`1px solid ${slot.border}`,borderRadius:'12px',padding:'12px 14px',marginBottom:'10px'}}>
              {/* 슬롯 헤더 */}
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}}>
                {editingSlot===slot.key ? (
                  <>
                    <input value={slot.icon} onChange={e=>updSlotIcon(slot.key,e.target.value)}
                      style={{width:'44px',border:'1px solid var(--card-border)',borderRadius:'6px',padding:'4px',fontSize:'14px',textAlign:'center'}}/>
                    <input value={slot.slot} onChange={e=>updSlotName(slot.key,e.target.value)} autoFocus
                      style={{flex:1,border:'1px solid var(--card-border)',borderRadius:'6px',padding:'6px 10px',fontSize:'16px',fontWeight:'700'}}/>
                    <button onClick={()=>setEditingSlot(null)} style={{background:slot.color,color:'#fff',border:'none',borderRadius:'6px',padding:'5px 10px',cursor:'pointer',fontSize:'14px'}}>완료</button>
                  </>
                ) : (
                  <>
                    <span style={{fontSize:'14px'}}>{slot.icon}</span>
                    <span style={{fontSize:'16px',fontWeight:'700',color:slot.color,flex:1}}>{slot.slot}</span>
                    {/* 알람 시간 */}
                    <input type="time" value={slot.notifTime||''} onChange={e=>updSlotTime(slot.key,e.target.value)}
                      title="알람 시간"
                      style={{border:'1px solid var(--card-border)',borderRadius:'6px',padding:'3px 6px',fontSize:'13px',color:'var(--text)',background:'var(--card-bg)',cursor:'pointer',width:'90px'}}/>
                    <button onClick={()=>moveSlot(slot.key,-1)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'13px',color:'var(--text-mute)',padding:'0 2px'}} title="위로">▲</button>
                    <button onClick={()=>moveSlot(slot.key,+1)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'13px',color:'var(--text-mute)',padding:'0 2px'}} title="아래로">▼</button>
                    <button onClick={()=>setEditingSlot(slot.key)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'14px',color:'var(--text-sub)'}}>✏️</button>
                    <button onClick={()=>delSlot(slot.key)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'14px',color:'var(--cn-danger)'}}>🗑️</button>
                  </>
                )}
              </div>

              {(slot.items||[]).length === 0 && (
                <div style={{fontSize:'12px',color:'var(--text-mute)',padding:'4px 0 4px 2px',fontStyle:'italic'}}>등록된 약 없음</div>
              )}

              {/* 약 목록 */}
              {(slot.items||[]).map(med => (
                <div key={med.id} style={{background:'var(--card-bg)',borderRadius:'8px',padding:'8px 10px',marginBottom:'6px',border:'1px solid var(--card-border)'}}>
                  {editingMed?.slotKey===slot.key && editingMed?.medId===med.id ? (
                    <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                      <input ref={nameInputRef} value={med.name}
                        onChange={e=>updMedField(slot.key,med.id,'name',e.target.value)}
                        onFocus={e=>e.target.select()}
                        placeholder="약 이름" style={inpSt}/>
                      <input value={med.dose} onChange={e=>updMedField(slot.key,med.id,'dose',e.target.value)}
                        placeholder="용량 (예: 10mg 1정)" style={inpSt}/>
                      {/* 투약 기간 */}
                      <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:'12px',color:'var(--text-sub)',marginBottom:'3px'}}>투약 시작일</div>
                          <input type="date" value={med.startDate||''} onChange={e=>updMedField(slot.key,med.id,'startDate',e.target.value)} style={inpSt}/>
                        </div>
                        <div style={{color:'var(--text-mute)',marginTop:'14px'}}>~</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:'12px',color:'var(--text-sub)',marginBottom:'3px'}}>투약 종료일</div>
                          <input type="date" value={med.endDate||''} onChange={e=>updMedField(slot.key,med.id,'endDate',e.target.value)} style={inpSt}/>
                        </div>
                      </div>

                      {/* 투여 주기 */}
                      {(() => {
                        const freq = med.freq || { type:'daily' };
                        const setFreq = (patch) => updMedField(slot.key, med.id, 'freq', { ...freq, ...patch });
                        const DAY_KO = ['일','월','화','수','목','금','토'];
                        const tabBtn = (type, label) => (
                          <button key={type} onClick={() => setFreq({ type })}
                            style={{ flex:1, padding:'5px 2px', borderRadius:'6px', fontSize:'11px', fontWeight:'700', cursor:'pointer',
                              border: freq.type===type ? 'none' : '1px solid var(--card-border)',
                              background: freq.type===type ? slot.color : 'var(--input-bg)',
                              color: freq.type===type ? '#fff' : 'var(--text-mute)' }}>
                            {label}
                          </button>
                        );
                        return (
                          <div>
                            <div style={{fontSize:'12px',color:'var(--text-sub)',marginBottom:'5px',fontWeight:'600'}}>투여 주기</div>
                            <div style={{display:'flex',gap:'4px',marginBottom:'8px'}}>
                              {tabBtn('daily','매일')}
                              {tabBtn('weekly','매주')}
                              {tabBtn('monthly','매월')}
                              {tabBtn('interval','주기별')}
                            </div>
                            {freq.type==='weekly' && (
                              <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
                                {DAY_KO.map((d,i)=>{
                                  const on = (freq.weekDays||[]).includes(i);
                                  return <button key={i} onClick={()=>{
                                    const wd = freq.weekDays||[];
                                    setFreq({weekDays: on ? wd.filter(x=>x!==i) : [...wd,i].sort()});
                                  }} style={{width:'34px',height:'34px',borderRadius:'50%',border:'none',cursor:'pointer',fontSize:'12px',fontWeight:'700',
                                    background: on ? slot.color : 'var(--input-bg)',
                                    color: on ? '#fff' : 'var(--text-mute)'}}>{d}</button>;
                                })}
                              </div>
                            )}
                            {freq.type==='monthly' && (
                              <div>
                                <div style={{fontSize:'11px',color:'var(--text-mute)',marginBottom:'4px'}}>투약 날짜 선택 (여러 개 가능)</div>
                                <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                                  {Array.from({length:31},(_,i)=>i+1).map(n=>{
                                    const on=(freq.monthDays||[]).includes(n);
                                    return <button key={n} onClick={()=>{
                                      const md=freq.monthDays||[];
                                      setFreq({monthDays: on ? md.filter(x=>x!==n) : [...md,n].sort((a,b)=>a-b)});
                                    }} style={{width:'30px',height:'30px',borderRadius:'6px',border:'none',cursor:'pointer',fontSize:'11px',fontWeight:'700',
                                      background: on ? slot.color : 'var(--input-bg)',
                                      color: on ? '#fff' : 'var(--text-mute)'}}>{n}</button>;
                                  })}
                                </div>
                              </div>
                            )}
                            {freq.type==='interval' && (
                              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                                <span style={{fontSize:'12px',color:'var(--text-sub)'}}>매</span>
                                <input type="number" min="1" max="365"
                                  value={freq.intervalDays||1}
                                  onChange={e=>setFreq({intervalDays:Math.max(1,parseInt(e.target.value)||1),
                                    refDate: freq.refDate || med.startDate || new Date().toISOString().slice(0,10)})}
                                  style={{...inpSt, width:'60px', textAlign:'center'}}/>
                                <span style={{fontSize:'12px',color:'var(--text-sub)'}}>일마다</span>
                                <span style={{fontSize:'10px',color:'var(--text-mute)'}}>(기준: {freq.refDate||med.startDate||'오늘'})</span>
                              </div>
                            )}
                          </div>
                        );
                      })()}

                      <div style={{fontSize:'11px',color:'var(--text-sub)'}}>💡 날짜 미입력 시 제한 없이 반복</div>
                      <button onClick={()=>setEditingMed(null)} style={{background:slot.color,color:'#fff',border:'none',borderRadius:'6px',padding:'7px',cursor:'pointer',fontSize:'14px',fontWeight:'700'}}>완료</button>
                    </div>
                  ) : (
                    <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:'14px',fontWeight:'600',color:'var(--text)'}}>{med.name||'(이름 없음)'}</div>
                        {med.dose && <div style={{fontSize:'12px',color:'var(--text-sub)'}}>{med.dose}</div>}
                        {(med.startDate||med.endDate) && (
                          <div style={{fontSize:'11px',color:'var(--cn-brand)',marginTop:'2px'}}>
                            📅 {med.startDate||'?'} ~ {med.endDate||'계속'}
                          </div>
                        )}
                        {freqLabel(med) && (
                          <div style={{fontSize:'11px',color:'var(--text-mute)',marginTop:'1px'}}>
                            🔁 {freqLabel(med)}
                          </div>
                        )}
                      </div>
                      <button onClick={()=>setEditingMed({slotKey:slot.key,medId:med.id})} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'16px'}}>✏️</button>
                      <button onClick={()=>delMed(slot.key,med.id)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'16px',color:'var(--cn-danger)'}}>🗑️</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          ))}

          <div ref={slotListEndRef}/>
          {/* ── 시간대 추가 — 슬롯 목록 바로 아래 ── */}
          <button onClick={addSlot}
            style={{width:'100%',padding:'10px',background:'var(--input-bg)',border:'1px dashed var(--card-border)',
                    color:'var(--text-sub)',borderRadius:'10px',cursor:'pointer',fontSize:'13px',fontWeight:'700',marginBottom:'14px'}}>
            ＋ 시간대 추가 <span style={{fontSize:'11px',fontWeight:'400',color:'var(--text-mute)'}}>(아침·점심·저녁·취침전 외 추가)</span>
          </button>

          {/* ── 알림 허용 버튼 ── */}
          <button onClick={requestNotifPermission}
            style={{width:'100%',padding:'10px',marginBottom:'8px',background:'var(--cn-warn-100)',border:'1px solid var(--cn-warn)',color:'var(--cn-warn)',borderRadius:'10px',cursor:'pointer',fontSize:'13px',fontWeight:'700'}}>
            🔔 복약 알람 허용하기 (각 슬롯 시간 설정 후 클릭)
          </button>

          {/* ── 저장 / 전체삭제 ── */}
          <div style={{display:'flex',gap:'8px',marginBottom:'12px'}}>
            <button onClick={reset} style={{flex:1,padding:'11px',background:'var(--card-bg)',border:'1px solid var(--card-border)',color:'var(--cn-danger)',borderRadius:'10px',cursor:'pointer',fontSize:'13px'}}>🗑️ 전체 삭제</button>
            <button onClick={() => {
              // 폼에 약 이름이 입력된 채로 저장 누를 경우 자동 추가
              let finalCfg = cfg;
              if (newName.trim() && newSlotKey) {
                if (newFreq.type === 'weekly' && !(newFreq.weekDays||[]).length) {
                  setAddMsg('⚠️ 매주 복용 요일을 1개 이상 선택해 주세요.'); setTimeout(()=>setAddMsg(''),3000); return;
                }
                if (newFreq.type === 'monthly' && !(newFreq.monthDays||[]).length) {
                  setAddMsg('⚠️ 매월 복용 날짜를 1개 이상 선택해 주세요.'); setTimeout(()=>setAddMsg(''),3000); return;
                }
                const id = genId();
                const freqToSave = newFreq.type === 'daily' ? undefined : newFreq;
                finalCfg = cfg.map(s => s.key === newSlotKey
                  ? { ...s, items: [...(s.items||[]), { id, name: newName.trim(), dose: newDose, startDate: newStart, endDate: newEnd, ...(freqToSave ? {freq: freqToSave} : {}) }] }
                  : s);
              }
              onSave(finalCfg);
            }} style={{flex:2,padding:'11px',background:'var(--cn-brand)',color:'#fff',border:'none',borderRadius:'10px',cursor:'pointer',fontSize:'14px',fontWeight:'800'}}>저장</button>
          </div>

          {/* ── 레거시 UUID (맨 아래, 거의 안 쓰는 기능) ── */}
          <div>
            <button onClick={()=>setShowLegacy(v=>!v)}
              style={{background:'none',border:'none',cursor:'pointer',fontSize:'11px',color:'var(--text-mute)',padding:'0',textDecoration:'underline'}}>
              {showLegacy ? '▲ 이전 동기화 코드 숨기기' : '▼ 이전 동기화 코드(UUID)가 있으신가요?'}
            </button>
            {showLegacy && (
              <div style={{marginTop:'8px',display:'flex',gap:'6px',alignItems:'center'}}>
                <input value={legacyInput} onChange={e=>setLegacyInput(e.target.value)}
                  placeholder="예: 104360e3-1dc8-4c4d-bb36-0b9c07dba2cf"
                  style={{flex:1,border:'1px solid var(--card-border)',borderRadius:'8px',padding:'7px 10px',
                          fontSize:'12px',fontFamily:'var(--font-num)',outline:'none',background:'var(--input-bg)',color:'var(--text)'}}/>
                <button onClick={loadFromCloud} disabled={loadingCloud}
                  style={{background:'var(--cn-brand)',color:'#fff',border:'none',borderRadius:'8px',
                          padding:'7px 12px',cursor:'pointer',fontSize:'12px',fontWeight:'700',whiteSpace:'nowrap'}}>
                  조회
                </button>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  /* ── 배너 슬롯 위치 정의 ─────────────────────────────────── */
  const BANNER_SLOTS = [
    { id:'top',        label:'헤더 바로 아래' },
    { id:'after_meds', label:'복약 체크리스트 아래' },
    { id:'after_bs',   label:'혈당 입력 아래' },
    { id:'sidebar_top',label:'사이드바 상단' },
    { id:'bottom',     label:'페이지 맨 아래' },
  ];

  const loadBanners = () => {
    try { return JSON.parse(localStorage.getItem('cn_banners') || '{}'); } catch { return {}; }
  };
  const saveBanners = (b) => localStorage.setItem('cn_banners', JSON.stringify(b));

  /* ── 배너 렌더 컴포넌트 ──────────────────────────────── */
  const BannerSlot = ({ slotId }) => {
    const banners = loadBanners();
    const b = banners[slotId];
    if (!b || !b.enabled || !b.url) return null;

    const getYoutubeId = (url) => {
      const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    };
    const ytId = getYoutubeId(b.url);

    return (
      <div style={{ margin:'10px 0', borderRadius:'12px', overflow:'hidden', boxShadow:'0 2px 8px rgba(0,0,0,0.08)' }}>
        {ytId ? (
          <iframe
            src={`https://www.youtube.com/embed/${ytId}?rel=0`}
            style={{ width:'100%', height: b.height || '200px', border:'none', display:'block' }}
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowFullScreen
          />
        ) : b.type === 'image' ? (
          <a href={b.link||'#'} target="_blank" rel="noreferrer">
            <img src={b.url} alt={b.label||'배너'} style={{ width:'100%', display:'block', maxHeight:'150px', objectFit:'cover' }} />
          </a>
        ) : (
          <div style={{ background: b.bgColor||'var(--cn-brand-100)', padding:'12px 16px', fontSize:'13px',
                        color: b.textColor||'var(--cn-brand-600)', fontWeight:'600', textAlign:'center',
                        border:`1px solid ${b.borderColor||'#bfdbfe'}`, borderRadius:'12px' }}>
            {b.url}
          </div>
        )}
        {b.caption && <div style={{ fontSize:'11px', color:'var(--text-mute)', textAlign:'right', padding:'2px 6px' }}>{b.caption}</div>}
      </div>
    );
  };

  /* ── 관리자 배너 설정 모달 ───────────────────────────── */
  const ADMIN_EMAIL = 'cnkim74@gmail.com';
  const AdminModal = ({ onClose, userEmail }) => {
    if (userEmail !== ADMIN_EMAIL) return null;
    const dm = _dm;
    const [activeTab, setActiveTab] = useState('banners'); // 'banners' | 'feedback'
    const [banners, setBanners] = useState(loadBanners);
    const [editing, setEditing] = useState(null);
    const [draft, setDraft] = useState({});

    // 피드백 상태
    const [feedbacks, setFeedbacks] = useState([]);
    const [fbLoading, setFbLoading] = useState(false);
    const [fbError, setFbError] = useState('');

    const loadFeedbacks = async () => {
      setFbLoading(true); setFbError('');
      try {
        const { data, error } = await supa.from('cn_feedback').select('*').order('created_at', { ascending: false }).limit(50);
        if (error) throw error;
        setFeedbacks(data || []);
      } catch(e) {
        setFbError('피드백 불러오기 실패: ' + e.message);
      }
      setFbLoading(false);
    };

    const deleteFeedback = async (id) => {
      await supa.from('cn_feedback').delete().eq('id', id);
      setFeedbacks(f => f.filter(x => x.id !== id));
    };

    useEffect(() => { if (activeTab === 'feedback') loadFeedbacks(); }, [activeTab]);

    const startEdit = (slotId) => {
      setEditing(slotId);
      setDraft(banners[slotId] || { enabled:false, type:'youtube', url:'', height:'200px', caption:'', link:'', label:'' });
    };
    const saveDraft = () => {
      const next = { ...banners, [editing]: draft };
      setBanners(next);
      saveBanners(next);
      setEditing(null);
    };
    const toggleEnabled = (slotId) => {
      const cur = banners[slotId] || {};
      const next = { ...banners, [slotId]: { ...cur, enabled: !cur.enabled } };
      setBanners(next);
      saveBanners(next);
    };

    const cardBg = dm ? 'var(--card-bg)' : '#fff';
    const inputSt = { width:'100%', padding:'8px 10px', border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`,
                      borderRadius:'8px', fontSize:'13px', background:dm?'var(--bg)':'#fff',
                      color:dm?'var(--text)':'var(--cn-ink)', outline:'none', boxSizing:'border-box' };

    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', display:'flex', alignItems:'center',
                    justifyContent:'center', zIndex:3000, padding:'20px' }}
           onClick={e => e.target===e.currentTarget && onClose()}>
        <div style={{ background:cardBg, borderRadius:'20px', padding:'26px', maxWidth:'520px', width:'100%',
                      maxHeight:'85vh', overflowY:'auto', boxShadow:'0 24px 80px rgba(0,0,0,0.35)' }}>

          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'14px' }}>
            <div style={{ fontSize:'17px', fontWeight:'800', color:'var(--text)' }}>🛠️ 관리자</div>
            <button onClick={onClose} style={{ background:'var(--input-bg)', border:'none', borderRadius:'8px',
              width:'32px', height:'32px', cursor:'pointer', fontSize:'16px', color:'var(--text-sub)' }}>✕</button>
          </div>

          {/* 탭 전환 */}
          <div style={{ display:'flex', gap:'6px', marginBottom:'18px' }}>
            {[['banners','🖼️ 배너 설정'],['feedback','💬 피드백']].map(([id,label]) => (
              <button key={id} onClick={() => setActiveTab(id)}
                style={{ flex:1, padding:'8px', border:`2px solid ${activeTab===id?'var(--cn-brand)':'var(--card-border)'}`, borderRadius:'8px', background: activeTab===id?'var(--cn-brand-100)':'var(--card-bg)', color: activeTab===id?'var(--cn-brand)':'var(--text-sub)', cursor:'pointer', fontSize:'13px', fontWeight:'700', fontFamily:'inherit' }}>
                {label}
              </button>
            ))}
          </div>

          {activeTab === 'feedback' ? (
            <div>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'12px' }}>
                <div style={{ fontSize:'13px', color:'var(--text-sub)' }}>최근 50건</div>
                <button onClick={loadFeedbacks} style={{ background:'var(--cn-brand-100)', border:'1px solid var(--cn-brand)', borderRadius:'6px', padding:'4px 10px', cursor:'pointer', fontSize:'12px', color:'var(--cn-brand)', fontWeight:'700', fontFamily:'inherit' }}>새로고침</button>
              </div>
              {fbLoading && <div style={{ textAlign:'center', padding:'24px', color:'var(--text-mute)' }}>⏳ 불러오는 중…</div>}
              {fbError && <div style={{ color:'var(--cn-danger)', fontSize:'13px', padding:'12px', background:'var(--cn-danger-100)', borderRadius:'8px', marginBottom:'10px' }}>{fbError}</div>}
              {!fbLoading && !fbError && feedbacks.length === 0 && (
                <div style={{ textAlign:'center', padding:'32px', color:'var(--text-mute)', fontSize:'13px' }}>피드백이 없습니다</div>
              )}
              {feedbacks.map(fb => (
                <div key={fb.id} style={{ background:'var(--input-bg)', border:'1px solid var(--card-border)', borderRadius:'10px', padding:'12px 14px', marginBottom:'8px' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:'8px', marginBottom:'6px' }}>
                    <div style={{ display:'flex', gap:'6px', alignItems:'center', flexWrap:'wrap' }}>
                      <span style={{ fontSize:'11px', fontWeight:'700', padding:'2px 8px', borderRadius:'20px',
                        background: fb.type==='버그신고'?'var(--cn-danger-100)': fb.type==='기능제안'?'var(--cn-brand-100)':'var(--bg-soft)',
                        color: fb.type==='버그신고'?'var(--cn-danger)': fb.type==='기능제안'?'var(--cn-brand)':'var(--text-sub)' }}>
                        {fb.type}
                      </span>
                      <span style={{ fontSize:'11px', color:'var(--text-mute)' }}>{fb.user_email}</span>
                    </div>
                    <button onClick={() => deleteFeedback(fb.id)}
                      style={{ background:'none', border:'none', cursor:'pointer', fontSize:'14px', color:'var(--text-mute)', padding:'0 2px', flexShrink:0 }} title="삭제">🗑</button>
                  </div>
                  <div style={{ fontSize:'13px', color:'var(--text)', lineHeight:'1.6', whiteSpace:'pre-wrap', wordBreak:'break-all' }}>{fb.content}</div>
                  <div style={{ fontSize:'10px', color:'var(--text-mute)', marginTop:'6px' }}>
                    {fb.created_at ? new Date(fb.created_at).toLocaleString('ko-KR') : ''}
                  </div>
                </div>
              ))}
            </div>
          ) : editing ? (
            <div>
              <div style={{ fontSize:'14px', fontWeight:'700', color:'var(--text)', marginBottom:'14px' }}>
                📍 {BANNER_SLOTS.find(s=>s.id===editing)?.label} 설정
              </div>
              {/* 배너 타입 */}
              <div style={{ marginBottom:'12px' }}>
                <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'5px' }}>배너 종류</div>
                <div style={{ display:'flex', gap:'8px' }}>
                  {[['youtube','🎬 유튜브'],['image','🖼️ 이미지'],['text','📝 텍스트']].map(([v,l])=>(
                    <button key={v} onClick={()=>setDraft(d=>({...d,type:v}))}
                      style={{ flex:1, padding:'7px', border:`1.5px solid ${draft.type===v?'var(--cn-brand)':'var(--card-border)'}`,
                               borderRadius:'8px', background: draft.type===v?'var(--cn-brand-100)':'transparent',
                               color: draft.type===v?'#1d4ed8':'var(--text-sub)',
                               cursor:'pointer', fontSize:'12px', fontWeight:'600' }}>{l}</button>
                  ))}
                </div>
