              <div style={{ fontSize:'15px', fontWeight:900, color:'#fff', marginBottom:'6px' }}>CARENOTE</div>
              <div style={{ fontSize:'12px', color:'rgba(255,255,255,0.6)', lineHeight:1.7 }}>
                내 몸을 기록하는 노트<br/>
                © 2026 CARENOTE. All rights reserved.
              </div>
            </div>
            <div style={{ fontSize:'12px', color:'rgba(255,255,255,0.7)', lineHeight:1.8 }}>
              <div><strong style={{ color:'#fff' }}>제작자</strong> &nbsp; Channyeon Kim</div>
              <div><strong style={{ color:'#fff' }}>문의</strong> &nbsp;
                <a href="mailto:cnkim74@me.com" style={{ color:'#A7C5FF', textDecoration:'none' }}>cnkim74@me.com</a>
              </div>
            </div>
          </div>
        </footer>
      </div>
    );
  };

  /* ── 로그인 / 회원가입 화면 ───────────────────────────── */
  const LoginScreen = ({ onBack, initialMode }) => {
    const dm = _dm;
    const [mode,         setMode]         = useState(initialMode || 'login');
    const [email,        setEmail]        = useState('');
    const [emailChecked, setEmailChecked] = useState(null); // null | 'ok' | 'dup'
    const [emailChecking,setEmailChecking]= useState(false);
    const [password,     setPassword]     = useState('');
    const [password2,    setPassword2]    = useState('');
    const [name,         setName]         = useState('');
    const [phone,        setPhone]        = useState('');
    const [signupHeight, setSignupHeight] = useState('');
    const [busy,         setBusy]         = useState(false);
    const [error,        setError]        = useState('');
    const [message,      setMessage]      = useState('');

    // 비밀번호 강도 체크
    const pwChecks = {
      len:     password.length >= 8,
      letter:  /[a-zA-Z]/.test(password),
      number:  /[0-9]/.test(password),
      special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(password),
    };
    const pwStrong = Object.values(pwChecks).every(Boolean);
    const pwMatch  = password === password2 && password2.length > 0;

    // 이메일 중복 확인
    const checkEmail = async () => {
      if (!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
        setError('올바른 이메일 형식을 입력해 주세요.'); return;
      }
      setEmailChecking(true); setEmailChecked(null); setError('');
      // RLS 적용 후: 프로필 직접 조회는 막히므로 SECURITY DEFINER 함수로 존재 여부만 확인
      const { data: exists } = await supa.rpc('email_exists', { p_email: email });
      setEmailChecking(false);
      if (exists) { setEmailChecked('dup'); setError('이미 가입된 이메일이에요. 로그인해 주세요.'); }
      else        { setEmailChecked('ok'); }
    };

    const handleSubmit = async (e) => {
      e.preventDefault();
      setBusy(true); setError(''); setMessage('');
      try {
        if (mode === 'login') {
          const { error } = await supa.auth.signInWithPassword({ email, password });
          if (error) throw error;
        } else {
          if (!name.trim())   throw new Error('이름을 입력해 주세요.');
          if (!phone.trim())  throw new Error('전화번호를 입력해 주세요.');
          if (emailChecked !== 'ok') throw new Error('이메일 중복 확인을 해 주세요.');
          if (!pwStrong)      throw new Error('비밀번호 조건을 확인해 주세요.');
          if (!pwMatch)       throw new Error('비밀번호가 일치하지 않아요.');
          const { error } = await supa.auth.signUp({
            email, password,
            options: { data: { name: name.trim(), phone: phone.trim(), height: signupHeight || null } }
          });
          if (error) throw error;
          setMessage('✅ 가입 확인 이메일을 보냈어요. 이메일을 확인하고 링크를 클릭해 주세요.');
        }
      } catch(e) {
        const msg = e.message || '오류가 발생했어요.';
        setError(
          msg.includes('Invalid login')      ? '이메일 또는 비밀번호가 올바르지 않아요.' :
          msg.includes('already registered') ? '이미 가입된 이메일이에요. 로그인해 주세요.' :
          msg.includes('Password should')    ? '비밀번호 조건을 확인해 주세요.' : msg
        );
      }
      setBusy(false);
    };

    const handleGoogle = async () => {
      setBusy(true); setError('');
      // 웹: 기존 리디렉션 방식
      if (!_isNativeApp) {
        const { error } = await supa.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + window.location.pathname }
        });
        if (error) { setError(error.message); setBusy(false); }
        return;
      }
      // 네이티브 앱(iOS): 사파리로 이탈하지 않고 앱 안(인앱 브라우저)에서 처리
      try {
        const Cap     = window.Capacitor;
        const Browser = Cap.Plugins.Browser;   // @capacitor/browser (SFSafariViewController)
        const CapApp  = Cap.Plugins.App;        // @capacitor/app (딥링크 수신)
        const redirectTo = 'info.cnbiz.health://login-callback';
        const { data, error } = await supa.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo, skipBrowserRedirect: true }
        });
        if (error) throw error;

        // 구글 로그인 완료 후 딥링크(info.cnbiz.health://login-callback)로 돌아옴 → 여기서 세션 교환
        let done = false;
        const sub = await CapApp.addListener('appUrlOpen', async ({ url }) => {
          if (done || !url || url.indexOf(redirectTo) !== 0) return;
          done = true;
          try { if (Browser) await Browser.close(); } catch (_) {}
          try {
            const qs = url.split('?')[1] || '';
            const params = new URLSearchParams(qs);
            const code = params.get('code');
            if (code) {
              const { error: exErr } = await supa.auth.exchangeCodeForSession(code);
              if (exErr) throw exErr;
            } else {
              // 암시적(implicit) 흐름 대비: #access_token=...
              const hp = new URLSearchParams(url.split('#')[1] || '');
              const at = hp.get('access_token'), rt = hp.get('refresh_token');
              if (at && rt) {
                const { error: setErr } = await supa.auth.setSession({ access_token: at, refresh_token: rt });
                if (setErr) throw setErr;
              } else {
                throw new Error(params.get('error_description') || '인증 정보를 받지 못했어요.');
              }
            }
          } catch (e) {
            setError('구글 로그인 처리 중 오류: ' + (e.message || e));
          } finally {
            try { sub.remove(); } catch (_) {}
            setBusy(false);
          }
        });

        if (Browser) await Browser.open({ url: data.url, presentationStyle: 'popover' });
        else window.location.href = data.url; // 브라우저 플러그인 미설치 시 폴백
      } catch (e) {
        setError(e.message || '구글 로그인 오류');
        setBusy(false);
      }
    };

    const borderCol = dm ? 'var(--card-border)' : 'var(--card-border)';
    const inp = {
      width:'100%', padding:'12px 16px',
      border: `1.5px solid ${borderCol}`,
      borderRadius:'10px', fontSize:'15px', outline:'none',
      fontFamily:'inherit', boxSizing:'border-box',
      background: dm ? 'var(--bg)' : '#fff',
      color: dm ? 'var(--text)' : 'var(--cn-ink)',
      transition:'border-color 0.2s',
    };

    return (
      <div style={{ minHeight:'100vh', position:'relative', overflow:'hidden',
                    background:'linear-gradient(160deg,#060d1a 0%,#0f2244 50%,#0d3068 100%)',
                    display:'flex', alignItems:'stretch', justifyContent:'center', padding:'20px' }}>

        {/* 배경 장식 원형들 */}
        <div style={{ position:'absolute', top:'-80px', right:'-80px', width:'360px', height:'360px',
                      borderRadius:'50%', background:'rgba(37,99,235,0.12)', pointerEvents:'none' }}/>
        <div style={{ position:'absolute', bottom:'-60px', left:'-60px', width:'280px', height:'280px',
                      borderRadius:'50%', background:'rgba(74,222,128,0.07)', pointerEvents:'none' }}/>
        <div style={{ position:'absolute', top:'40%', left:'5%', width:'120px', height:'120px',
                      borderRadius:'50%', background:'rgba(99,102,241,0.08)', pointerEvents:'none' }}/>

        {/* 카드 */}
        <div style={{ position:'relative', zIndex:1, background: dm ? 'rgba(22,27,34,0.95)' : 'rgba(255,255,255,0.97)',
                      backdropFilter:'blur(20px)', borderRadius:'28px', padding:'40px 36px',
                      maxWidth:'440px', width:'100%',
                      display:'flex', flexDirection:'column', justifyContent:'center',
                      boxShadow: dm ? '0 32px 80px rgba(0,0,0,0.6)' : '0 32px 80px rgba(0,0,0,0.25)',
                      border: dm ? '1px solid rgba(255,255,255,0.07)' : '1px solid rgba(255,255,255,0.8)' }}>

          {/* 홈으로 돌아가기 (랜딩으로) */}
          {onBack && (
            <button onClick={onBack} style={{
              background:'transparent', border:'none', color:'var(--text-sub)',
              fontSize:'13px', cursor:'pointer', padding:'4px 0', marginBottom:'12px',
              display:'inline-flex', alignItems:'center', gap:'4px'
            }}>← 홈으로</button>
          )}

          {/* 로고 영역 */}
          <div style={{ textAlign:'center', marginBottom:'28px' }}>
            {/* 마스코트 캐릭터 */}
            <div style={{ display:'inline-flex', alignItems:'center', justifyContent:'center',
                          width:'150px', height:'150px', borderRadius:'50%',
                          background:'radial-gradient(circle at 50% 40%, #ffffff 0%, #eef3fb 75%, #e2e9f5 100%)',
                          marginBottom:'14px', boxShadow:'0 10px 30px rgba(15,23,42,0.35)', overflow:'hidden' }}>
              <img src="mascot.png" alt="케어노트 캐릭터" style={{ width:'338px', height:'338px', objectFit:'cover', objectPosition:'center 20%' }}/>
            </div>
            <div style={{ fontSize:'28px', fontWeight:'900', letterSpacing:'2px',
                          background:'linear-gradient(90deg,var(--cn-brand),var(--cn-ok))',
                          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
                          marginBottom:'6px' }}>CARENOTE</div>
            <div style={{ fontSize:'14px', color: dm ? 'rgba(148,163,184,0.9)' : 'var(--text-sub)',
                          fontWeight:'600', letterSpacing:'0.3px' }}>내 몸을 기록하는 노트</div>
          </div>

          {/* 단축어 데이터 수신 알림 */}
          {(() => {
            try {
              const pending = JSON.parse(localStorage.getItem('cn_pending_patch') || 'null');
              if (pending && pending.patch && (Date.now() - (pending.ts||0)) < 86400000) {
                const p = pending.patch;
                const items = [];
                const has = (v) => v !== '' && v !== null && v !== undefined && !isNaN(Number(v));
                if (has(p.steps)) items.push(`👟 걸음수 ${Number(p.steps).toLocaleString()}걸음`);
                if (has(p.cal))   items.push(`🔥 활동 ${Number(p.cal).toLocaleString()}kcal`);
                if (has(p.bcal))  items.push(`💤 기초 ${Number(p.bcal).toLocaleString()}kcal`);
                if (has(p.dist))  items.push(`📍 거리 ${p.dist}km`);
                if (p.weight) items.push(`⚖️ 체중 ${p.weight}kg`);
                if (p.bp?.sys) items.push(`💓 혈압 ${p.bp.sys}/${p.bp.dia}`);
                if (!items.length) return null;
                return (
                  <div style={{ background: dm?'rgba(16,185,129,0.15)':'#ecfdf5', border:'1px solid var(--cn-ok)',
                                borderRadius:'12px', padding:'12px 14px', marginBottom:'20px', textAlign:'center' }}>
                    <div style={{ fontSize:'13px', fontWeight:'700', color:'var(--cn-ok)', marginBottom:'4px' }}>
                      📲 건강 데이터를 받았어요
                    </div>
                    <div style={{ fontSize:'12px', color: dm?'var(--text-sub)':'#065f46' }}>
                      {items.join(' · ')}
                    </div>
                    <div style={{ fontSize:'11px', color:'var(--text-mute)', marginTop:'4px' }}>
                      로그인하면 자동으로 저장됩니다
                    </div>
                  </div>
                );
              }
            } catch {}
            return null;
          })()}

          {/* 탭 */}
          <div style={{ display:'flex', background: dm ? 'rgba(255,255,255,0.06)' : 'var(--divider)',
                        borderRadius:'14px', padding:'4px', marginBottom:'22px' }}>
            {['login','signup'].map(m => (
              <button key={m} onClick={() => { setMode(m); setError(''); setMessage(''); }}
                style={{ flex:1, padding:'10px', border:'none', borderRadius:'11px', cursor:'pointer',
                         fontSize:'14px', fontWeight:'700', transition:'all 0.2s',
                         background: mode===m ? (dm ? '#1e3a5f' : '#fff') : 'transparent',
                         color: mode===m ? (dm ? 'var(--cn-brand)' : '#1d4ed8') : (dm ? 'var(--text-sub)' : 'var(--text-mute)'),
                         boxShadow: mode===m ? (dm ? '0 2px 8px rgba(0,0,0,0.4)' : '0 1px 4px rgba(0,0,0,0.1)') : 'none' }}>
                {m === 'login' ? '🔐 로그인' : '✏️ 회원가입'}
              </button>
            ))}
          </div>

          {/* 에러 / 성공 메시지 */}
          {error   && <div style={{ background:dm?'rgba(127,29,29,0.4)':'var(--cn-danger-100)', border:'1px solid var(--cn-danger)',
                                    color: dm?'var(--cn-danger)':'var(--cn-danger)', borderRadius:'10px',
                                    padding:'10px 14px', fontSize:'14px', marginBottom:'16px' }}>{error}</div>}
          {message && <div style={{ background:dm?'rgba(20,83,45,0.4)':'var(--cn-ok-100)', border:'1px solid var(--cn-ok)',
                                    color: dm?'var(--cn-ok)':'#166534', borderRadius:'10px',
                                    padding:'10px 14px', fontSize:'14px', marginBottom:'16px' }}>{message}</div>}

          {/* 폼 */}
          <form onSubmit={handleSubmit} style={{ display:'flex', flexDirection:'column', gap:'12px' }}>

            {/* 이메일 + 중복확인 */}
            <div style={{ display:'flex', gap:'6px' }}>
              <input type="email" value={email}
                onChange={e=>{ setEmail(e.target.value); setEmailChecked(null); }}
                placeholder="이메일 주소" required
                style={{ ...inp, flex:1,
                  borderColor: emailChecked==='ok' ? 'var(--cn-ok)' : emailChecked==='dup' ? 'var(--cn-danger)' : borderCol }}
                onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                onBlur={e=>e.target.style.borderColor=
                  emailChecked==='ok'?'var(--cn-ok)':emailChecked==='dup'?'var(--cn-danger)':borderCol} />
              {mode==='signup' && (
                <button type="button" onClick={checkEmail} disabled={emailChecking||!email}
                  style={{ padding:'0 14px', border:`1.5px solid ${emailChecked==='ok'?'var(--cn-ok)':emailChecked==='dup'?'var(--cn-danger)':'var(--cn-brand)'}`,
                    borderRadius:'10px', background: emailChecked==='ok'?'var(--cn-ok)':emailChecked==='dup'?'var(--cn-danger)':'var(--cn-brand)',
                    color:'#fff', fontSize:'12px', fontWeight:'700', cursor:'pointer', whiteSpace:'nowrap', fontFamily:'inherit', flexShrink:0 }}>
                  {emailChecking?'확인중…':emailChecked==='ok'?'✓ 사용가능':emailChecked==='dup'?'✗ 중복':'중복확인'}
                </button>
              )}
            </div>

            {/* 비밀번호 */}
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
              placeholder={mode==='signup'?'비밀번호 (8자 이상, 영문+숫자+기호)':'비밀번호'} required style={inp}
              onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
              onBlur={e=>e.target.style.borderColor=borderCol} />

            {/* 비밀번호 강도 표시 (회원가입만) */}
            {mode==='signup' && password.length > 0 && (
              <div style={{ background: dm?'rgba(255,255,255,0.04)':'var(--bg)', border:'1px solid var(--card-border)',
                borderRadius:'10px', padding:'10px 14px', fontSize:'12px', lineHeight:'1.8' }}>
                {[
                  [pwChecks.len,    '8자 이상'],
                  [pwChecks.letter, '영문 포함'],
                  [pwChecks.number, '숫자 포함'],
                  [pwChecks.special,'기호 포함 (!@#$%^&* 등)'],
                ].map(([ok, label]) => (
                  <div key={label} style={{ color: ok?'var(--cn-ok)':'var(--cn-danger)', display:'flex', alignItems:'center', gap:'6px' }}>
                    <span style={{ fontWeight:'700' }}>{ok?'✓':'✗'}</span> {label}
                  </div>
                ))}
              </div>
            )}

            {/* 비밀번호 확인 (회원가입만) */}
            {mode==='signup' && (
              <div>
                <input type="password" value={password2} onChange={e=>setPassword2(e.target.value)}
                  placeholder="비밀번호 확인" required
                  style={{ ...inp, borderColor: password2.length>0?(pwMatch?'var(--cn-ok)':'var(--cn-danger)'):borderCol }}
                  onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                  onBlur={e=>e.target.style.borderColor=password2.length>0?(pwMatch?'var(--cn-ok)':'var(--cn-danger)'):borderCol} />
                {password2.length>0 && (
                  <div style={{ fontSize:'12px', marginTop:'4px', color: pwMatch?'var(--cn-ok)':'var(--cn-danger)', fontWeight:'600' }}>
                    {pwMatch ? '✓ 비밀번호가 일치해요' : '✗ 비밀번호가 일치하지 않아요'}
                  </div>
                )}
              </div>
            )}

            {/* 회원가입 추가 필드 */}
            {mode === 'signup' && (<>
              <input type="text" value={name} onChange={e=>setName(e.target.value)}
                placeholder="이름 (필수)" required style={inp}
                onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                onBlur={e=>e.target.style.borderColor=borderCol} />
              <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)}
                placeholder="전화번호 (필수, 예: 010-1234-5678)" required style={inp}
                onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                onBlur={e=>e.target.style.borderColor=borderCol} />
              <div style={{ position:'relative' }}>
                <input type="number" value={signupHeight} onChange={e=>setSignupHeight(e.target.value)}
                  placeholder="키 (cm) — 선택, BMI 자동계산에 활용" style={{...inp, paddingRight:'46px'}}
                  onFocus={e=>e.target.style.borderColor='var(--cn-brand)'}
                  onBlur={e=>e.target.style.borderColor=borderCol} />
                <span style={{ position:'absolute', right:'14px', top:'50%', transform:'translateY(-50%)',
                  fontSize:'12px', color:'var(--text-mute)', pointerEvents:'none' }}>cm</span>
              </div>
            </>)}

            <button type="submit" disabled={busy}
              style={{ padding:'13px', border:'none', borderRadius:'12px',
                       fontSize:'15px', fontWeight:'700', cursor: busy?'default':'pointer',
                       background: busy ? 'var(--text-sub)' : 'linear-gradient(135deg,var(--cn-brand-600),var(--cn-brand))',
                       color:'#fff', boxShadow: busy ? 'none' : '0 4px 16px rgba(37,99,235,0.4)',
                       transition:'all 0.2s', marginTop:'4px' }}>
              {busy ? '처리 중...' : mode === 'login' ? '로그인하기' : '가입하기'}
            </button>
          </form>

          {/* 구분선 */}
          <div style={{ display:'flex', alignItems:'center', gap:'12px', margin:'20px 0' }}>
            <div style={{ flex:1, height:'1px', background: dm ? 'rgba(255,255,255,0.1)' : 'var(--card-border)' }}/>
            <span style={{ fontSize:'12px', color: dm ? 'var(--text-sub)' : 'var(--text-mute)', fontWeight:'500' }}>또는</span>
            <div style={{ flex:1, height:'1px', background: dm ? 'rgba(255,255,255,0.1)' : 'var(--card-border)' }}/>
          </div>

          {/* 구글 로그인 */}
          <button onClick={handleGoogle} disabled={busy}
            style={{ width:'100%', padding:'12px 16px',
                     background: dm ? 'rgba(255,255,255,0.05)' : '#fff',
                     border: `1.5px solid ${dm ? 'rgba(255,255,255,0.12)' : 'var(--card-border)'}`,
                     borderRadius:'12px', fontSize:'14px', fontWeight:'600',
                     cursor: busy?'default':'pointer',
                     display:'flex', alignItems:'center', justifyContent:'center', gap:'10px',
                     color: dm ? 'var(--text)' : '#374151', transition:'all 0.2s' }}
            onMouseOver={e=>{ e.currentTarget.style.borderColor='var(--cn-brand)'; e.currentTarget.style.background=dm?'rgba(59,130,246,0.1)':'#f0f7ff'; }}
            onMouseOut={e=>{ e.currentTarget.style.borderColor=dm?'rgba(255,255,255,0.12)':'var(--card-border)'; e.currentTarget.style.background=dm?'rgba(255,255,255,0.05)':'#fff'; }}>
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google 계정으로 계속하기
          </button>

          <div style={{ textAlign:'center', marginTop:'20px', fontSize:'12px', color: dm ? '#334155' : 'var(--text-mute)' }}>
            로그인 시 서비스 이용약관에 동의한 것으로 간주됩니다
          </div>
        </div>
      </div>
    );
  };

  /* ── App ──────────────────────────────────────────────── */

  /* ── 커뮤니티 탭 (챌린지 통합) ── */
  const ChallengeTab = ({ data, date, userId, userEmail, darkMode: dm }) => {
    const _dm = dm;

    // ── 챌린지 stats ──
    const streak = React.useMemo(() => {
      let count = 0, d = date;
      for (let i = 0; i < 365; i++) {
        const dd = data[d];
        if (!dd) break;
        if (!Object.values(dd.bs || {}).some(v => parseInt(v) > 0)) break;
        count++; d = shiftDate(d, -1);
      }
      return count;
    }, [data, date]);

    const last7 = React.useMemo(() => {
      let inRange = 0, total = 0;
      for (let i = 0; i < 7; i++) {
        const d = shiftDate(date, -i);
        const dd = data[d]; if (!dd) continue;
        Object.values(dd.bs || {}).forEach(v => { const n = parseInt(v); if (n > 0) { total++; if (n >= 70 && n <= 140) inRange++; } });
      }
      return { inRange, total, pct: total ? Math.round((inRange / total) * 100) : 0 };
    }, [data, date]);

    const medStreak = React.useMemo(() => {
      let count = 0, d = date;
      for (let i = 0; i < 30; i++) {
        const dd = data[d];
        if (!dd || !dd.meds || !Object.values(dd.meds).some(Boolean)) break;
        count++; d = shiftDate(d, -1);
      }
      return count;
    }, [data, date]);

    // ── 커뮤니티 state ──
    const COMM_CATS = [
      { id:'notice',  label:'📢 공지사항', adminOnly: true  },
      { id:'health',  label:'💊 건강정보', adminOnly: false },
      { id:'question',label:'❓ 질문',     adminOnly: false },
      { id:'review',  label:'⭐ 후기',     adminOnly: false },
    ];
    const [commCat,    setCommCat]    = React.useState('notice');
    const [posts,      setPosts]      = React.useState([]);
    const [postsLoading, setPostsLoading] = React.useState(false);
    const [showWrite,  setShowWrite]  = React.useState(false);
    const [writeTitle, setWriteTitle] = React.useState('');
    const [writeBody,  setWriteBody]  = React.useState('');
    const [writeBusy,  setWriteBusy]  = React.useState(false);
    const [writeErr,   setWriteErr]   = React.useState('');
    const [detailPost, setDetailPost] = React.useState(null);
    const [comments,   setComments]   = React.useState([]);
    const [commentText,setCommentText]= React.useState('');
    const [commentBusy,setCommentBusy]= React.useState(false);

    const ADMIN_EMAIL_COMM = 'cnkim74@gmail.com';
    const isAdmin = userEmail === ADMIN_EMAIL_COMM;
    const currentCat = COMM_CATS.find(c => c.id === commCat);

    const loadPosts = React.useCallback(async (cat) => {
      setPostsLoading(true); setPosts([]);
      try {
        const { data: rows, error } = await supa
          .from('cn_community')
          .select('id,title,content,author_email,category,is_approved,created_at,view_count')
          .eq('category', cat)
          .eq('is_approved', true)
          .order('created_at', { ascending: false })
          .limit(50);
        if (!error) setPosts(rows || []);
      } catch(e) {}
      setPostsLoading(false);
    }, []);

    React.useEffect(() => { loadPosts(commCat); }, [commCat]);

    const loadComments = async (postId) => {
      const { data: rows } = await supa
        .from('cn_comments')
        .select('id,content,author_email,created_at')
        .eq('post_id', postId)
        .order('created_at', { ascending: true });
      setComments(rows || []);
    };

    const openDetail = async (post) => {
      setDetailPost(post); setCommentText(''); setComments([]);
      supa.rpc('bump_view_count', { p_post_id: String(post.id) }); // RLS: 남의 글 조회수도 올리도록 서버 함수 사용
      loadComments(post.id);
    };

    const submitComment = async () => {
      if (!commentText.trim() || !userId) return;
      setCommentBusy(true);
      await supa.from('cn_comments').insert({
        post_id: detailPost.id, content: commentText.trim(),
        author_email: userEmail, user_id: userId
      });
      setCommentText('');
      loadComments(detailPost.id);
      setCommentBusy(false);
    };

    const submitPost = async () => {
      if (!writeTitle.trim()) { setWriteErr('제목을 입력해 주세요.'); return; }
      if (!writeBody.trim())  { setWriteErr('내용을 입력해 주세요.'); return; }
      setWriteBusy(true); setWriteErr('');
      const { error } = await supa.from('cn_community').insert({
        title: writeTitle.trim(), content: writeBody.trim(),
        author_email: userEmail, user_id: userId,
        category: commCat,
        is_approved: isAdmin, // 관리자 글은 바로 승인
      });
      setWriteBusy(false);
      if (error) { setWriteErr('저장 실패: ' + error.message); return; }
      setWriteTitle(''); setWriteBody(''); setShowWrite(false);
      loadPosts(commCat);
    };

    const fmtAgo = (d) => {
      if (!d) return '';
      const diff = Math.floor((Date.now() - new Date(d)) / 1000);
      if (diff < 60)   return '방금 전';
      if (diff < 3600) return Math.floor(diff/60) + '분 전';
      if (diff < 86400)return Math.floor(diff/3600) + '시간 전';
      return new Date(d).toLocaleDateString('ko-KR', { month:'short', day:'numeric' });
    };

    // ── 상세 보기 ──
    if (detailPost) return (
      <div className="cn-card" data-tab="challenge">
        <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'14px' }}>
          <button onClick={() => setDetailPost(null)}
            style={{ background:'var(--bg-soft)', border:'none', borderRadius:'8px', padding:'6px 12px', cursor:'pointer', fontSize:'13px', fontWeight:'700', color:'var(--text-sub)' }}>
            ← 목록
          </button>
          <span style={{ fontSize:'11px', color:'var(--text-mute)' }}>{COMM_CATS.find(c=>c.id===detailPost.category)?.label}</span>
        </div>
        <div style={{ fontSize:'17px', fontWeight:'800', color:'var(--text)', marginBottom:'6px', lineHeight:1.4 }}>{detailPost.title}</div>
        <div style={{ display:'flex', gap:'10px', fontSize:'12px', color:'var(--text-mute)', marginBottom:'14px', flexWrap:'wrap' }}>
          <span>✍️ {detailPost.author_email?.split('@')[0]}</span>
          <span>🕐 {fmtAgo(detailPost.created_at)}</span>
          <span>👁 {detailPost.view_count || 0}</span>
        </div>
        <div style={{ fontSize:'14px', lineHeight:1.8, color:'var(--text)', whiteSpace:'pre-wrap', paddingBottom:'16px', borderBottom:'1px solid var(--divider)', marginBottom:'16px' }}>
          {detailPost.content}
        </div>

        {/* 댓글 */}
        <div style={{ fontSize:'13px', fontWeight:'700', color:'var(--text-sub)', marginBottom:'10px' }}>
          💬 댓글 {comments.length}
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:'8px', marginBottom:'14px' }}>
          {comments.length === 0 && <div style={{ fontSize:'13px', color:'var(--text-mute)', textAlign:'center', padding:'12px 0' }}>첫 댓글을 남겨보세요!</div>}
          {comments.map(c => (
            <div key={c.id} style={{ background:'var(--bg-soft)', borderRadius:'10px', padding:'10px 12px' }}>
              <div style={{ fontSize:'11px', color:'var(--text-mute)', marginBottom:'4px', display:'flex', gap:'8px' }}>
                <span style={{ fontWeight:'700', color:'var(--text-sub)' }}>{c.author_email?.split('@')[0]}</span>
                <span>{fmtAgo(c.created_at)}</span>
              </div>
              <div style={{ fontSize:'13px', color:'var(--text)', lineHeight:1.6 }}>{c.content}</div>
            </div>
          ))}
        </div>
        {userId ? (
          <div style={{ display:'flex', gap:'8px' }}>
            <input value={commentText} onChange={e=>setCommentText(e.target.value)}
              onKeyDown={e => e.key==='Enter' && !e.shiftKey && submitComment()}
              placeholder="댓글 입력..."
              style={{ flex:1, border:'1px solid var(--input-border)', borderRadius:'8px', padding:'9px 12px', fontSize:'13px', outline:'none', background:'var(--input-bg)', color:'var(--text)', fontFamily:'inherit', minWidth:0 }} />
            <button onClick={submitComment} disabled={commentBusy || !commentText.trim()}
              style={{ background:'var(--cn-brand)', color:'#fff', border:'none', borderRadius:'8px', padding:'9px 14px', cursor:'pointer', fontSize:'13px', fontWeight:'700', flexShrink:0, opacity: commentBusy||!commentText.trim()?0.5:1 }}>
              등록
            </button>
          </div>
        ) : (
          <div style={{ fontSize:'13px', color:'var(--text-mute)', textAlign:'center', padding:'8px' }}>로그인 후 댓글을 남길 수 있어요</div>
        )}
      </div>
    );

    // ── 글쓰기 ──
    if (showWrite) return (
      <div className="cn-card" data-tab="challenge">
        <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'16px' }}>
          <button onClick={() => { setShowWrite(false); setWriteErr(''); }}
            style={{ background:'var(--bg-soft)', border:'none', borderRadius:'8px', padding:'6px 12px', cursor:'pointer', fontSize:'13px', fontWeight:'700', color:'var(--text-sub)' }}>
            ← 취소
          </button>
          <span style={{ fontSize:'15px', fontWeight:'800' }}>✏️ 글쓰기 · {currentCat?.label}</span>
        </div>
        {writeErr && <div style={{ background:'var(--cn-danger-100)', border:'1px solid var(--cn-danger)', borderRadius:'8px', padding:'10px 12px', fontSize:'13px', color:'var(--cn-danger)', marginBottom:'12px' }}>{writeErr}</div>}
        <input value={writeTitle} onChange={e=>{setWriteTitle(e.target.value);setWriteErr('');}}
          placeholder="제목을 입력하세요"
          style={{ width:'100%', border:'1px solid var(--input-border)', borderRadius:'10px', padding:'11px 14px', fontSize:'15px', fontWeight:'700', outline:'none', background:'var(--input-bg)', color:'var(--text)', fontFamily:'inherit', marginBottom:'10px', boxSizing:'border-box' }} />
        <textarea value={writeBody} onChange={e=>{setWriteBody(e.target.value);setWriteErr('');}}
          placeholder="내용을 입력하세요..."
          rows={8}
          style={{ width:'100%', border:'1px solid var(--input-border)', borderRadius:'10px', padding:'11px 14px', fontSize:'14px', outline:'none', background:'var(--input-bg)', color:'var(--text)', fontFamily:'inherit', resize:'vertical', lineHeight:1.7, marginBottom:'12px', boxSizing:'border-box' }} />
        {!isAdmin && <div style={{ fontSize:'12px', color:'var(--text-mute)', marginBottom:'12px' }}>✍️ 작성 후 관리자 승인 이후 게시됩니다.</div>}
        <button onClick={submitPost} disabled={writeBusy}
          style={{ width:'100%', background: writeBusy?'var(--divider)':'var(--cn-brand)', color: writeBusy?'var(--text-mute)':'#fff', border:'none', borderRadius:'10px', padding:'13px', fontSize:'15px', fontWeight:'800', cursor: writeBusy?'default':'pointer' }}>
          {writeBusy ? '게시 중...' : '게시하기'}
        </button>
      </div>
    );

    // ── 메인 ──
    return (
      <>
        {/* 챌린지 요약 (컴팩트) */}
        <div className="cn-card" data-tab="challenge" style={{ marginBottom:'8px' }}>
          <div style={{ display:'flex', gap:'8px', alignItems:'center' }}>
            <div style={{ flex:1, textAlign:'center', background:'var(--cn-brand-100)', borderRadius:'10px', padding:'10px 8px' }}>
              <div style={{ fontSize:'10px', color:'var(--cn-brand)', fontWeight:'700', marginBottom:'2px' }}>🔥 혈당 연속</div>
              <div style={{ fontFamily:'var(--font-num)', fontSize:'22px', fontWeight:'900', color:'var(--cn-brand)' }}>{streak}<span style={{ fontSize:'11px', marginLeft:'2px' }}>일</span></div>
            </div>
            <div style={{ flex:1, textAlign:'center', background:'var(--cn-ok-100,#e6faf4)', borderRadius:'10px', padding:'10px 8px' }}>
              <div style={{ fontSize:'10px', color:'var(--cn-ok)', fontWeight:'700', marginBottom:'2px' }}>✅ 정상범위</div>
              <div style={{ fontFamily:'var(--font-num)', fontSize:'22px', fontWeight:'900', color:'var(--cn-ok)' }}>{last7.pct}<span style={{ fontSize:'11px', marginLeft:'2px' }}>%</span></div>
            </div>
            <div style={{ flex:1, textAlign:'center', background:'var(--cn-low-100,#f3edff)', borderRadius:'10px', padding:'10px 8px' }}>
              <div style={{ fontSize:'10px', color:'var(--cn-low)', fontWeight:'700', marginBottom:'2px' }}>💊 복약 연속</div>
              <div style={{ fontFamily:'var(--font-num)', fontSize:'22px', fontWeight:'900', color:'var(--cn-low)' }}>{medStreak}<span style={{ fontSize:'11px', marginLeft:'2px' }}>일</span></div>
            </div>
          </div>
        </div>

        {/* 커뮤니티 게시판 */}
        <div className="cn-card" data-tab="challenge">
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'12px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
              <div style={{ display:'flex', alignItems:'center', gap:'9px' }}>
                <span className="mini-ic-chip"><img src="icons/community.png" alt=""/></span>
                <span style={{ fontFamily:'var(--font-title)', fontSize:'17px', fontWeight:'700' }}>커뮤니티</span>
              </div>
              <a href="board.html" target="_blank" rel="noopener noreferrer"
                style={{ fontSize:'11px', fontWeight:'700', color:'var(--cn-brand)', background:'var(--cn-brand-100)',
                  padding:'3px 10px', borderRadius:'20px', textDecoration:'none', letterSpacing:'.3px', whiteSpace:'nowrap' }}>
                전체보기 →
              </a>
            </div>
            {userId && !currentCat?.adminOnly && (
              <button onClick={() => { setShowWrite(true); setWriteErr(''); setWriteTitle(''); setWriteBody(''); }}
                style={{ background:'var(--cn-brand)', color:'#fff', border:'none', borderRadius:'8px', padding:'6px 14px', cursor:'pointer', fontSize:'13px', fontWeight:'700' }}>
                ✏️ 글쓰기
              </button>
            )}
            {userId && currentCat?.adminOnly && isAdmin && (
              <button onClick={() => { setShowWrite(true); setWriteErr(''); setWriteTitle(''); setWriteBody(''); }}
                style={{ background:'var(--cn-brand)', color:'#fff', border:'none', borderRadius:'8px', padding:'6px 14px', cursor:'pointer', fontSize:'13px', fontWeight:'700' }}>
                ✏️ 공지 작성
              </button>
            )}
          </div>

          {/* 카테고리 탭 */}
          <div style={{ display:'flex', gap:'6px', marginBottom:'14px', overflowX:'auto', paddingBottom:'2px' }}>
            {COMM_CATS.map(c => (
              <button key={c.id} onClick={() => setCommCat(c.id)}
                style={{ padding:'6px 12px', borderRadius:'20px', border:`1.5px solid ${commCat===c.id?'var(--cn-brand)':'var(--card-border)'}`,
                  background: commCat===c.id?'var(--cn-brand-100)':'var(--card-bg)',
                  color: commCat===c.id?'var(--cn-brand)':'var(--text-sub)',
                  fontSize:'12px', fontWeight:'700', cursor:'pointer', whiteSpace:'nowrap', flexShrink:0 }}>
                {c.label}
              </button>
            ))}
          </div>

          {/* 게시글 목록 */}
          {postsLoading ? (
            <div style={{ textAlign:'center', padding:'24px 0', color:'var(--text-mute)', fontSize:'13px' }}>불러오는 중...</div>
          ) : posts.length === 0 ? (
            <div style={{ textAlign:'center', padding:'32px 0' }}>
              <div style={{ fontSize:'32px', marginBottom:'8px' }}>📭</div>
              <div style={{ fontSize:'13px', color:'var(--text-mute)' }}>아직 게시글이 없어요</div>
              {userId && !currentCat?.adminOnly && (
                <button onClick={() => { setShowWrite(true); setWriteErr(''); setWriteTitle(''); setWriteBody(''); }}
                  style={{ marginTop:'12px', background:'var(--cn-brand)', color:'#fff', border:'none', borderRadius:'8px', padding:'8px 18px', cursor:'pointer', fontSize:'13px', fontWeight:'700' }}>
                  첫 글 작성하기
                </button>
              )}
            </div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:'0' }}>
              {posts.map((post, idx) => (
                <div key={post.id} onClick={() => openDetail(post)}
                  style={{ padding:'12px 0', borderBottom: idx < posts.length-1 ? '1px solid var(--divider)' : 'none',
                    cursor:'pointer', transition:'background 0.15s' }}
                  onMouseEnter={e => e.currentTarget.style.background='var(--bg-soft)'}
                  onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                  <div style={{ fontSize:'14px', fontWeight:'700', color:'var(--text)', marginBottom:'4px', lineHeight:1.4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    {post.title}
                  </div>
                  <div style={{ fontSize:'12px', color:'var(--text-mute)', display:'flex', gap:'10px', alignItems:'center', flexWrap:'wrap' }}>
                    <span>✍️ {post.author_email?.split('@')[0]}</span>
                    <span>🕐 {fmtAgo(post.created_at)}</span>
                    <span>👁 {post.view_count || 0}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </>
    );
  };

  /* ── 목표 설정 모달 ── */
  /* ── 관리 질환별 미션 (개인화) ── */
  const CONDITIONS = [
    { key:'diabetes_insulin', label:'당뇨 · 인슐린' },

  const ChangePasswordModal = ({ onClose }) => {

    const [pw,    setPw]   = useState('');
    const [pw2,   setPw2]  = useState('');
    const [busy,  setBusy] = useState(false);
    const [msg,   setMsg]  = useState('');
    const [err,   setErr]  = useState('');
    const inp = { width:'100%', padding:'12px 14px', border:`1.5px solid ${dm?'var(--card-border)':'#e5eaf2'}`, borderRadius:'10px',

                  color:dm?'var(--text)':'var(--cn-ink)', boxSizing:'border-box' };
    const handle = async () => {
      if (!pw || pw.length < 6) { setErr('비밀번호는 6자 이상이어야 해요.'); return; }

      setBusy(true); setErr('');
      try {
        const { error } = await supa.auth.updateUser({ password: pw });
        if (error) throw error;
        setMsg('✅ 비밀번호가 변경됐어요!');
        setTimeout(onClose, 2200);
      } catch(e) {
        setErr(e.message || '비밀번호 변경에 실패했어요.');

  const DataRecoveryModal = ({ userId, onImportData, onImportMeds, onClose }) => {
    const dm = _dm;
    const [inputId, setInputId] = useState('104360e3-1dc8-4c4d-bb36-0b9c07dba2cf');
    const [busy,    setBusy]    = useState(false);
    const [result,  setResult]  = useState(null); // { rows, settings, medNames }
    const [msg,     setMsg]     = useState('');
    const [importing, setImporting] = useState(false);

    const search = async () => {
      const lid = inputId.trim();
      if (!lid) return;
      setBusy(true); setResult(null); setMsg('');
      try {
        const { data: rows, error } = await supa.from('diabetes_data')
          .select('date, payload').eq('user_id', lid);
        if (error) throw error;
        if (!rows || rows.length === 0) {
          setMsg('해당 코드로 저장된 데이터가 없어요.');
          setBusy(false); return;
        }
        const dataRows    = rows.filter(r => r.date !== '_user_settings_');
        const settingsRow = rows.find(r => r.date === '_user_settings_');
        const medsConfig  = settingsRow?.payload?.medsConfig || [];
        const medNames    = medsConfig.flatMap(s => (s.items||[]).map(m => m.name)).filter(Boolean);
        // 모든 날짜에서 고유 med ID 추출
        const allMedIds   = new Set();
        dataRows.forEach(r => { if (r.payload?.meds) Object.keys(r.payload.meds).forEach(id => allMedIds.add(id)); });
        setResult({ lid, dataRows, settingsRow, medsConfig, medNames, allMedIds: [...allMedIds] });
      } catch(e) {
        setMsg('❌ 조회 실패: ' + (e.message || '오류'));
      }
      setBusy(false);
    };

    const doImport = async () => {
      if (!result) return;
      setImporting(true); setMsg('');
      try {
        // 건강 데이터 가져오기
        if (result.dataRows.length > 0) {
          const patch = {};
          result.dataRows.forEach(r => { patch[r.date] = r.payload; });
          onImportData(patch);
        }
        // 복약 설정 가져오기
        if (result.medsConfig.length > 0) {
          onImportMeds(result.medsConfig);
        }
        // 이 UUID 기억
        localStorage.setItem('cn_legacy_uid', result.lid);
        localStorage.setItem('dm_user_id',    result.lid);
        setMsg('✅ 데이터를 현재 계정으로 가져왔어요! 저장 중...');
        setTimeout(onClose, 2500);
      } catch(e) {
        setMsg('❌ 가져오기 실패: ' + (e.message || '오류'));
      }
      setImporting(false);
    };

    const inp = { width:'100%', padding:'10px 12px', border:'1px solid var(--card-border)', borderRadius:'10px',
                  fontSize:'13px', fontFamily:'var(--font-num)', outline:'none',
                  background:'var(--input-bg)', color:'var(--text)', boxSizing:'border-box' };

    return (
      <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.6)',display:'flex',alignItems:'center',
                   justifyContent:'center',zIndex:2500,padding:'20px'}}
           onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div style={{background:'var(--card-bg)',borderRadius:'20px',padding:'26px 22px',maxWidth:'480px',
                     width:'100%',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 24px 80px rgba(0,0,0,0.3)'}}>

          {/* 헤더 */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'}}>
            <div style={{fontSize:'16px',fontWeight:'800',color:'var(--text)'}}>🔍 데이터 복구</div>
            <button onClick={onClose} style={{background:'var(--divider)',border:'none',borderRadius:'8px',
                                              width:'32px',height:'32px',cursor:'pointer',fontSize:'16px'}}>✕</button>
          </div>

          <div style={{fontSize:'13px',color:'var(--text-sub)',marginBottom:'14px',lineHeight:1.6}}>
            이전에 사용하던 동기화 코드(UUID)를 입력하면 해당 코드로 저장된 데이터를 조회하고 현재 계정으로 가져올 수 있어요.
          </div>

          {/* UUID 입력 */}
          <div style={{display:'flex',gap:'8px',marginBottom:'14px'}}>
            <input value={inputId} onChange={e=>setInputId(e.target.value)}
              placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" style={inp}/>
            <button onClick={search} disabled={busy||!inputId.trim()}
              style={{background:'var(--cn-brand)',color:'#fff',border:'none',borderRadius:'10px',
                      padding:'10px 16px',cursor:busy?'default':'pointer',fontSize:'13px',fontWeight:'700',
                      whiteSpace:'nowrap',opacity:busy?0.6:1}}>
              {busy ? '조회 중...' : '조회'}
            </button>
          </div>

          {/* 결과 */}
          {result && (
            <div style={{background:'var(--cn-ok-100)',border:'1px solid var(--cn-ok)',borderRadius:'12px',
                         padding:'14px',marginBottom:'14px'}}>
              <div style={{fontSize:'13px',fontWeight:'800',color:'var(--cn-ok)',marginBottom:'10px'}}>
                ✅ 데이터를 찾았어요!
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'6px',fontSize:'13px',color:'var(--text)'}}>
                <div>📅 건강 기록: <strong>{result.dataRows.length}일치</strong></div>
                {result.dataRows.length > 0 && (() => {
                  const dates = result.dataRows.map(r=>r.date).sort();
                  return <div style={{fontSize:'12px',color:'var(--text-sub)'}}>
                    {dates[0]} ~ {dates[dates.length-1]}
                  </div>;
                })()}
                <div>💊 복약 설정: <strong>{result.medsConfig.length}개 시간대, {result.medNames.length}개 약</strong></div>
                {result.medNames.length > 0 && (
                  <div style={{background:'var(--card-bg)',borderRadius:'8px',padding:'8px 10px',
                               fontSize:'12px',color:'var(--text-sub)',lineHeight:1.8}}>
                    {result.medNames.join(' · ')}
                  </div>
                )}
                {result.medsConfig.length === 0 && result.allMedIds.length > 0 && (
                  <div style={{fontSize:'12px',color:'var(--text-sub)'}}>
                    (복약 설정 없음 — 기록에서 {result.allMedIds.length}개 ID 발견)
                  </div>
                )}
              </div>
              <button onClick={doImport} disabled={importing}
                style={{width:'100%',marginTop:'12px',padding:'12px',background:importing?'var(--divider)':'var(--cn-brand)',
                        color:importing?'var(--text-mute)':'#fff',border:'none',borderRadius:'10px',
                        cursor:importing?'default':'pointer',fontSize:'14px',fontWeight:'800'}}>
                {importing ? '가져오는 중...' : '현재 계정으로 가져오기 →'}
              </button>
            </div>
          )}

          {msg && (
            <div style={{background:msg.startsWith('✅')?'var(--cn-ok-100)':'var(--cn-danger-100)',
                         border:`1px solid ${msg.startsWith('✅')?'var(--cn-ok)':'var(--cn-danger)'}`,
                         borderRadius:'10px',padding:'10px 14px',fontSize:'13px',fontWeight:'600',
                         color:msg.startsWith('✅')?'var(--cn-ok)':'var(--cn-danger)'}}>
              {msg}
            </div>
          )}
        </div>
      </div>
    );
  };

    const [sending, setSending] = React.useState(false);

    const send = async () => {
      if (!content.trim()) return;
      setSending(true);
      try {
        await supa.from('cn_feedback').insert({ user_email: authUser?.email || 'unknown', type, content: content.trim() });
      } catch(e) { /* table may not exist yet */ }
      setSending(false);
      setDone(true);
    };

    const overlay = { position:'fixed', inset:0, background:'var(--modal-scrim)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:'20px' };

  /* ── 프로필 탭 ── */

  const ProfileEditModal = ({ authUser, userId, onClose, onAvatarUpdate }) => {
    const [profile, setProfile] = React.useState({ name:'', phone:'', height:'', avatar_url:'' });
    const [loading, setLoading] = React.useState(true);
    const [saving, setSaving] = React.useState(false);
    const [uploading, setUploading] = React.useState(false);
    const [msg, setMsg] = React.useState('');
    const avatarRef = React.useRef(null);

    React.useEffect(() => {
      if (!userId) { setLoading(false); return; }
      supa.from('cn_profiles').select('name,phone,height,grade,avatar_url').eq('id', userId).single()
        .then(({ data }) => {
          if (data) setProfile({ name: data.name||'', phone: data.phone||'', height: data.height||'', avatar_url: data.avatar_url||'' });
          setLoading(false);
        });
    }, [userId]);

    const handleAvatarChange = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) { setMsg('❌ 사진은 2MB 이하만 가능해요.'); return; }
      setUploading(true); setMsg('');
      const ext = file.name.split('.').pop();
      const path = `${userId}/avatar.${ext}`;
      const { error: upErr } = await supa.storage.from('avatar').upload(path, file, { upsert: true, contentType: file.type });
      if (upErr) { setMsg('❌ 업로드 실패: ' + upErr.message); setUploading(false); return; }
      const { data: { publicUrl } } = supa.storage.from('avatar').getPublicUrl(path);
      const url = publicUrl + '?t=' + Date.now();
      await supa.from('cn_profiles').update({ avatar_url: url }).eq('id', userId);
      setProfile(p => ({ ...p, avatar_url: url }));
      if (onAvatarUpdate) onAvatarUpdate(url);
      setUploading(false);
      setMsg('✅ 사진이 업데이트됐어요!');
    };

    const save = async () => {
      setSaving(true); setMsg('');
      const h = profile.height ? parseFloat(profile.height) : null;
      const payload = { id: userId, email: authUser?.email, name: profile.name, phone: profile.phone, height: h };
      const { error } = await supa.from('cn_profiles').upsert(payload, { onConflict: 'id' });
      setSaving(false);
      if (error) { setMsg('❌ 저장 실패: ' + error.message); }
      else {
        if (h) {
          localStorage.setItem('hcd_height', String(h));
          if (userId) localStorage.setItem(`hcd_height_${userId}`, String(h));
        }
        setMsg('✅ 저장됐습니다!');
        setTimeout(onClose, 1200);
      }
    };

    const inp = { width:'100%', padding:'10px 12px', border:'1.5px solid var(--card-border)', borderRadius:'10px',
      background:'var(--bg)', color:'var(--text)', fontSize:'14px', fontFamily:'inherit', outline:'none', boxSizing:'border-box' };

    return (
      <div style={{ position:'fixed', inset:0, background:'var(--modal-scrim)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', padding:'16px' }}

        <div style={{ background:'var(--card-bg)', borderRadius:'18px', padding:'24px', width:'100%', maxWidth:'420px', boxShadow:'0 8px 40px rgba(0,0,0,0.25)', maxHeight:'90vh', overflowY:'auto' }}>

          {/* 프로필 사진 */}

            <div style={{ position:'relative', cursor:'pointer' }} onClick={() => avatarRef.current?.click()}>

                : <div style={{ width:'80px', height:'80px', borderRadius:'50%', background:'linear-gradient(135deg,var(--cn-brand),var(--cn-brand-600))', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'28px', color:'#fff', fontWeight:'700', border:'3px solid var(--cn-brand)' }}>

            </div>

            <button onClick={() => avatarRef.current?.click()} disabled={uploading}

            </div>
            {msg && <div style={{ fontSize:'13px', textAlign:'center', marginBottom:'12px', color: msg.startsWith('✅') ? 'var(--cn-ok)' : 'var(--cn-danger)' }}>{msg}</div>}

  };

  /* ── 쿠팡 파트너스 필수 고지문 ── */
  const COUPANG_DISCLOSURE = '이 화면에는 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받는 링크가 포함될 수 있습니다.';

  /* ── 피보호자 데이터 요약(복약/위험혈당) — 배지·알림 공용 ── */
  const summarizeWard = (rows) => {
    const settings = ((rows || []).find(r => r.date === '_user_settings_') || {}).payload || {};
    const meds = (settings.medsConfig || []).flatMap(s => (s.items || []).map(m => ({ id:m.id, name:m.name })));
    const byDate = {}; (rows || []).forEach(r => { if (r.date !== '_user_settings_') byDate[r.date] = r.payload || {}; });
    const t = new Date();
    const todayKey = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const today = byDate[todayKey] || {};
    const medDone = meds.length ? meds.filter(m => today.meds && today.meds[m.id]).length
                                : Object.values(today.meds || {}).filter(Boolean).length;
    const medTotal = meds.length || Object.keys(today.meds || {}).length;
    const bsVals = Object.values(today.bs || {}).map(v => parseInt(v)).filter(v => v > 0);
    const low = bsVals.some(v => v < 70), high = bsVals.some(v => v > 250);
    return { medDone, medTotal, medMissed: medTotal > 0 && medDone < medTotal,
             bsRisk: low || high, low, high, hasToday: !!byDate[todayKey] };
  };

  /* ── 관리자용: 피보호자 현황 대시보드(읽기 전용) ── */
  const WardDashboard = ({ wardId, wardName, onClose }) => {
    const [rows, setRows] = React.useState(null);
    const [err, setErr]   = React.useState('');
    React.useEffect(() => {
      (async () => {
        const { data, error } = await supa.from('diabetes_data').select('date,payload').eq('user_id', wardId);
        if (error) { setErr(error.message || '불러오기 실패'); setRows([]); return; }
        setRows(data || []);
      })();
    }, [wardId]);
    const info = React.useMemo(() => {
      if (!rows) return null;
      const settings = (rows.find(r => r.date === '_user_settings_') || {}).payload || {};
      const meds = (settings.medsConfig || []).flatMap(s => (s.items || []).map(m => ({ id:m.id, name:m.name })));
      const byDate = {}; rows.forEach(r => { if (r.date !== '_user_settings_') byDate[r.date] = r.payload || {}; });
      const dates = Object.keys(byDate).sort();
      const t = new Date();
      const todayKey = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
      const today = byDate[todayKey] || {};
      const lastDate = dates[dates.length-1];
      const last = lastDate ? byDate[lastDate] : {};
      const bsFrom = (d) => { const b=(d&&d.bs)||{}; let v=null; ['bs_bf_am','bs_af_am','bs_bf_lu','bs_af_lu','bs_bf_di','bs_af_di','bs_bed'].forEach(k=>{ if(b[k]) v=b[k]; }); return v; };
      const medState = meds.map(m => ({ ...m, taken: !!(today.meds && today.meds[m.id]) }));
      const medTaken = medState.filter(m => m.taken).length;
      const medTotal = meds.length || Object.keys(today.meds || {}).length;
      const medTakenFallback = medState.length ? medTaken : Object.values(today.meds || {}).filter(Boolean).length;
      return {
        meds: medState, medTaken: medTakenFallback, medTotal,
        lastBs: bsFrom(today) || bsFrom(last),
        steps: today.steps || last.steps || 0,
        weight: today.weight || last.weight || '',
        bp: (today.bp && today.bp.sys) ? today.bp : ((last.bp && last.bp.sys) ? last.bp : null),
        hasToday: !!byDate[todayKey], lastDate,
      };
    }, [rows]);
    const card = { background:'var(--input-bg)', border:'1px solid var(--card-border)', borderRadius:'14px', padding:'16px 18px', marginBottom:'12px' };
    const lbl  = { fontSize:'14px', color:'var(--text-sub)', fontWeight:'700', marginBottom:'6px' };
    return (
      <div style={{ position:'fixed', inset:0, background:'var(--modal-scrim)', zIndex:5200,
                    display:'flex', alignItems:'center', justifyContent:'center', padding:'20px' }} onClick={onClose}>
        <div style={{ background:'var(--card-bg)', borderRadius:'18px', padding:'24px', width:'100%', maxWidth:'440px', maxHeight:'88vh', overflowY:'auto' }}
             onClick={e => e.stopPropagation()}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px' }}>
            <div style={{ fontSize:'21px', fontWeight:'800', color:'var(--text)' }}>💙 {wardName || '피보호자'} 현황</div>
            <button onClick={onClose} style={{ background:'var(--divider)', border:'none', borderRadius:'10px', width:'40px', height:'40px', cursor:'pointer', fontSize:'18px', color:'var(--text-sub)' }}>✕</button>
          </div>
          {!info && !err && <div style={{ padding:'30px 0', textAlign:'center', color:'var(--text-sub)' }}>불러오는 중…</div>}
          {err && <div style={{ padding:'16px', color:'var(--cn-danger)', fontSize:'14px' }}>오류: {err}</div>}
          {info && (
            <div>
              <div style={{ fontSize:'13px', color:'var(--text-mute)', marginBottom:'14px' }}>
                {info.hasToday ? '오늘 기록 기준' : (info.lastDate ? `최근 기록: ${info.lastDate}` : '아직 기록이 없어요')}
              </div>

              <div style={card}>
                <div style={lbl}>💊 오늘 복약</div>
                {info.meds.length > 0 ? (
                  <>
                    <div style={{ fontSize:'26px', fontWeight:'900', color: info.medTaken===info.medTotal ? 'var(--cn-ok)' : 'var(--cn-warn)' }}>
                      {info.medTaken} / {info.medTotal} 완료
                    </div>
                    <div style={{ display:'flex', flexWrap:'wrap', gap:'6px', marginTop:'10px' }}>
                      {info.meds.map(m => (
                        <span key={m.id} style={{ fontSize:'13px', fontWeight:'700', padding:'6px 10px', borderRadius:'999px',
                          background: m.taken ? 'var(--cn-ok-100)' : 'var(--input-bg)', color: m.taken ? 'var(--cn-ok)' : 'var(--text-sub)',
                          border: `1px solid ${m.taken ? 'var(--cn-ok)' : 'var(--card-border)'}` }}>
                          {m.taken ? '✓ ' : '○ '}{m.name || '약'}
                        </span>
                      ))}
                    </div>
                  </>
                ) : <div style={{ fontSize:'22px', fontWeight:'900', color:'var(--text)' }}>{info.medTaken}건 복용</div>}
              </div>

              <div style={card}>
                <div style={lbl}>🩸 최근 혈당</div>
                {info.lastBs ? (
                  <div style={{ fontSize:'30px', fontWeight:'900', color: bsColor(String(info.lastBs)) }}>
                    {info.lastBs} <span style={{ fontSize:'14px', color:'var(--text-sub)', fontWeight:'700' }}>mg/dL · {bsLabel(String(info.lastBs))}</span>
                  </div>
                ) : <div style={{ color:'var(--text-mute)' }}>기록 없음</div>}
              </div>

              <div style={{ display:'flex', gap:'12px' }}>
                <div style={{ ...card, flex:1, marginBottom:0 }}>
                  <div style={lbl}>👟 걸음수</div>
                  <div style={{ fontSize:'22px', fontWeight:'900', color:'var(--text)' }}>{Number(info.steps||0).toLocaleString()}</div>
                </div>
                <div style={{ ...card, flex:1, marginBottom:0 }}>
                  <div style={lbl}>🩺 혈압</div>
                  <div style={{ fontSize:'22px', fontWeight:'900', color:'var(--text)' }}>{info.bp ? `${info.bp.sys}/${info.bp.dia}` : '—'}</div>
                </div>
              </div>

              <div style={{ fontSize:'12px', color:'var(--text-mute)', marginTop:'16px', lineHeight:1.6 }}>
                ℹ️ 읽기 전용입니다. 값은 피보호자가 기록·자동수집한 데이터예요.
              </div>
            </div>
          )}
        </div>
      </div>
    );
  };

  /* ── 가족 연결(보호 관계) 모달 ── */
  const FamilyModal = ({ onClose }) => {
    const [list, setList] = React.useState({ asGuardian:[], asWard:[] });
    const [email, setEmail] = React.useState('');
    const [busy, setBusy] = React.useState(false);
    const [msg, setMsg] = React.useState('');
    const [viewing, setViewing] = React.useState(null);
    const [summaries, setSummaries] = React.useState({});
    const load = async () => {
      try { const { data } = await supa.rpc('cn_guardian_list');
        const ag = (data && data.asGuardian) || [], aw = (data && data.asWard) || [];
        setList({ asGuardian: ag, asWard: aw });
        const sums = {};
        await Promise.all(ag.filter(w => w.status === 'active').map(async w => {
          const { data: rows } = await supa.from('diabetes_data').select('date,payload').eq('user_id', w.personId);
          if (rows) sums[w.personId] = summarizeWard(rows);
        }));
        setSummaries(sums);
      } catch(e) {}
    };
    React.useEffect(() => { load(); }, []);
    const invite = async () => {
      if (!email.trim()) { setMsg('상대의 CARENOTE 가입 이메일을 입력하세요'); return; }
      setBusy(true); setMsg('');
      const { data, error } = await supa.rpc('cn_guardian_invite', { p_ward_email: email.trim() });
      setBusy(false);
      if (error) { setMsg('오류: ' + error.message); return; }
      if (!data?.ok) { setMsg('❌ ' + (data?.error || '초대 실패')); return; }
      setMsg('✅ 초대를 보냈어요. 상대가 수락하면 연결됩니다.'); setEmail(''); load();
    };
    const respond = async (id, ok) => { await supa.rpc('cn_guardian_respond', { p_id:id, p_accept:ok }); load(); };
    const revoke  = async (id) => { await supa.rpc('cn_guardian_revoke', { p_id:id }); load(); };
    const STLABEL = { pending:'대기 중', active:'연결됨', rejected:'거절됨' };
    const STCOLOR = { pending:'var(--cn-warn)', active:'var(--cn-ok)', rejected:'var(--text-mute)' };
    const inp = { width:'100%', padding:'14px 16px', border:'1.5px solid var(--card-border)', borderRadius:'12px',
                  fontSize:'16px', outline:'none', fontFamily:'inherit', boxSizing:'border-box',
                  background:'var(--input-bg)', color:'var(--text)' };
    const personRow = (item, mode) => (
      <div key={item.id} style={{ display:'flex', alignItems:'center', gap:'12px', padding:'14px 16px',
             background:'var(--input-bg)', border:'1px solid var(--card-border)', borderRadius:'14px', marginBottom:'8px' }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:'16px', fontWeight:'800', color:'var(--text)' }}>{item.name || item.email || '사용자'}</div>
          <div style={{ fontSize:'13px', color:'var(--text-sub)', wordBreak:'break-all' }}>{item.email || ''}</div>
          {mode === 'guardian' && item.status === 'active' && summaries[item.personId] && (() => {
            const s = summaries[item.personId];
            const bad = s.medMissed || s.bsRisk;
            const parts = [];
            parts.push(s.medTotal > 0 ? `복약 ${s.medDone}/${s.medTotal}` : '복약 기록 없음');
            if (s.low) parts.push('저혈당⚠️'); else if (s.high) parts.push('고혈당⚠️');
            else if (s.medTotal > 0 && !s.medMissed) parts.push('정상');
            else if (s.medMissed) parts.push('미완료');
            return <div style={{ fontSize:'12px', fontWeight:'800', marginTop:'4px', color: bad ? 'var(--cn-warn)' : 'var(--cn-ok)' }}>{parts.join(' · ')}</div>;
          })()}
        </div>
        <span style={{ fontSize:'13px', fontWeight:'800', color:STCOLOR[item.status] }}>{STLABEL[item.status] || item.status}</span>
        {mode === 'ward' && item.status === 'pending' ? (
          <div style={{ display:'flex', gap:'6px' }}>
            <button onClick={() => respond(item.id, true)} style={{ padding:'9px 12px', border:'none', borderRadius:'10px', background:'var(--cn-ok)', color:'#fff', fontWeight:'800', fontSize:'14px', cursor:'pointer', fontFamily:'inherit' }}>수락</button>
            <button onClick={() => respond(item.id, false)} style={{ padding:'9px 12px', border:'1px solid var(--card-border)', borderRadius:'10px', background:'none', color:'var(--text-sub)', fontWeight:'700', fontSize:'14px', cursor:'pointer', fontFamily:'inherit' }}>거절</button>
          </div>
        ) : (
          <div style={{ display:'flex', gap:'6px' }}>
            {mode === 'guardian' && item.status === 'active' && (
              <button onClick={() => setViewing({ id:item.personId, name:item.name || item.email })}
                style={{ padding:'9px 14px', border:'none', borderRadius:'10px', background:'var(--cn-brand)', color:'#fff', fontWeight:'800', fontSize:'14px', cursor:'pointer', fontFamily:'inherit' }}>현황</button>
            )}
            <button onClick={() => revoke(item.id)} style={{ padding:'9px 12px', border:'1px solid var(--card-border)', borderRadius:'10px', background:'none', color:'var(--cn-danger)', fontWeight:'700', fontSize:'13px', cursor:'pointer', fontFamily:'inherit' }}>해제</button>
          </div>
        )}
      </div>
    );
    return (
      <div style={{ position:'fixed', inset:0, background:'var(--modal-scrim)', zIndex:5000,
                    display:'flex', alignItems:'center', justifyContent:'center', padding:'20px' }} onClick={onClose}>
        <div style={{ background:'var(--card-bg)', borderRadius:'18px', padding:'24px', width:'100%', maxWidth:'440px', maxHeight:'88vh', overflowY:'auto' }}
             onClick={e => e.stopPropagation()}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'14px' }}>
            <div style={{ fontSize:'21px', fontWeight:'800', color:'var(--text)' }}>👨‍👩‍👧 가족 연결</div>
            <button onClick={onClose} style={{ background:'var(--divider)', border:'none', borderRadius:'10px', width:'40px', height:'40px', cursor:'pointer', fontSize:'18px', color:'var(--text-sub)' }}>✕</button>
          </div>
          <div style={{ fontSize:'15px', color:'var(--text-sub)', lineHeight:1.6, marginBottom:'18px' }}>
            가족의 <strong>복약·혈당</strong>을 원격으로 확인할 수 있어요. 상대가 <strong>수락</strong>해야 연결됩니다.
          </div>

          {/* 나를 돌보는 가족 (수락 대상) */}
          {list.asWard.length > 0 && (
            <div style={{ marginBottom:'20px' }}>
              <div style={{ fontSize:'15px', fontWeight:'800', color:'var(--text)', marginBottom:'10px' }}>나를 돌보는 가족</div>
              {list.asWard.map(it => personRow(it, 'ward'))}
            </div>
          )}

          {/* 내가 돌보는 가족 (초대) */}
          <div style={{ fontSize:'15px', fontWeight:'800', color:'var(--text)', marginBottom:'10px' }}>내가 돌보는 가족</div>
          <div style={{ display:'flex', gap:'8px', marginBottom:'10px' }}>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="가족의 CARENOTE 이메일" style={inp} autoComplete="off" />
            <button onClick={invite} disabled={busy}
              style={{ flex:'0 0 auto', padding:'0 20px', border:'none', borderRadius:'12px', background:'var(--cn-brand)', color:'#fff', fontWeight:'800', fontSize:'16px', cursor:'pointer', fontFamily:'inherit', opacity: busy?0.6:1 }}>
              초대
            </button>
          </div>
          {msg && <div style={{ fontSize:'14px', color:'var(--text)', lineHeight:1.5, background:'var(--input-bg)', borderRadius:'10px', padding:'10px 12px', marginBottom:'10px' }}>{msg}</div>}
          {list.asGuardian.map(it => personRow(it, 'guardian'))}
          {list.asGuardian.length === 0 && <div style={{ fontSize:'13px', color:'var(--text-mute)', padding:'6px 2px' }}>아직 돌보는 가족이 없어요. 위에서 이메일로 초대하세요.</div>}

          <div style={{ fontSize:'12px', color:'var(--text-mute)', marginTop:'16px', lineHeight:1.6 }}>
            ℹ️ 상대의 건강 정보를 열람하려면 상대의 동의(수락)가 필요합니다. 보호자는 <strong>읽기 전용</strong>입니다.
          </div>
          {viewing && <WardDashboard wardId={viewing.id} wardName={viewing.name} onClose={() => setViewing(null)} />}
        </div>
      </div>
    );
  };

  /* ── 홈 원터치 입력: 혈당(큰 스테퍼) ── */
  const QuickGlucose = ({ day, onSave }) => {
    const pickDefault = () => {
      const now = new Date(); const h = now.getHours() + now.getMinutes() / 60;
      const w = TIME_WINDOWS.find(t => h >= t.startH && h < t.endH);
      return w ? w.id : 'bs_bf_am';
    };
    const [slot, setSlot] = React.useState(pickDefault);
    const [val,  setVal]  = React.useState(() => { const c = day?.bs?.[slot]; return c ? parseInt(c) : 110; });
    const [justSaved, setJustSaved] = React.useState(false);
    React.useEffect(() => { const c = day?.bs?.[slot]; setVal(c ? parseInt(c) : 110); setJustSaved(false); }, [slot]);
    const field = BS_FIELDS.find(f => f.id === slot);
    const c = bsColor(String(val));
    const bump = (d) => { setVal(v => Math.max(20, Math.min(600, v + d))); setJustSaved(false); };
    const save = () => { onSave(slot, String(val)); setJustSaved(true); };
    const rnd = { border:'none', borderRadius:'14px', cursor:'pointer', fontFamily:'inherit', fontWeight:'900', color:'#fff' };
    return (
      <div style={{ marginBottom:'20px' }}>
        <div style={{ fontSize:'15px', fontWeight:'700', color:'var(--text-sub)', marginBottom:'8px' }}>🩸 혈당 빠른 기록</div>
        <div style={{ display:'flex', gap:'6px', overflowX:'auto', paddingBottom:'6px', marginBottom:'10px' }}>
          {BS_FIELDS.map(f => {
            const on = f.id === slot;
            return (
              <button key={f.id} onClick={() => setSlot(f.id)}
                style={{ flex:'0 0 auto', padding:'8px 12px', borderRadius:'20px', cursor:'pointer', fontFamily:'inherit',
                         fontSize:'13px', fontWeight:'700', whiteSpace:'nowrap',
                         border: on ? '2px solid var(--cn-brand)' : '1px solid var(--card-border)',
                         background: on ? 'var(--cn-brand)' : 'var(--input-bg)', color: on ? '#fff' : 'var(--text-sub)' }}>
                {f.icon} {f.label}
              </button>
            );
          })}
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:'10px' }}>
          <button onClick={() => bump(-1)} style={{ ...rnd, width:'56px', height:'56px', fontSize:'28px', background:'var(--cn-brand)' }}>－</button>
          <div style={{ flex:1, textAlign:'center' }}>
            <div style={{ fontSize:'52px', fontWeight:'900', color:c, lineHeight:1, fontVariantNumeric:'tabular-nums' }}>{val}</div>
            <div style={{ fontSize:'13px', color:'var(--text-sub)', marginTop:'2px' }}>mg/dL · {bsLabel(String(val))}</div>
          </div>
          <button onClick={() => bump(1)} style={{ ...rnd, width:'56px', height:'56px', fontSize:'28px', background:'var(--cn-brand)' }}>＋</button>
        </div>
        <div style={{ display:'flex', gap:'8px', marginTop:'10px' }}>
          <button onClick={() => bump(-10)} style={{ ...rnd, flex:'0 0 auto', padding:'12px 14px', fontSize:'15px', background:'var(--text-mute)' }}>－10</button>
          <button onClick={save} style={{ ...rnd, flex:1, padding:'14px', fontSize:'17px', background: justSaved ? 'var(--cn-ok)' : 'var(--cn-brand)' }}>
            {justSaved ? '✓ 저장됨' : `${field ? field.label : ''} 저장`}
          </button>
          <button onClick={() => bump(10)} style={{ ...rnd, flex:'0 0 auto', padding:'12px 14px', fontSize:'15px', background:'var(--text-mute)' }}>＋10</button>
        </div>
      </div>
    );
  };

  /* ── 홈 원터치 입력: 복약(원탭) ── */
  const QuickMeds = ({ day, meds, onToggle, onAllDone }) => {
    if (!meds || !meds.length) return null;
    const isTaken = (id) => !!(day?.meds && day.meds[id]);
    const takenN = meds.filter(m => isTaken(m.id)).length;
    const allDone = takenN === meds.length;
    return (
      <div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'8px' }}>
          <div style={{ fontSize:'15px', fontWeight:'700', color:'var(--text-sub)' }}>💊 오늘 복약</div>
          <div style={{ fontSize:'13px', color:'var(--text-sub)' }}>{takenN}/{meds.length}</div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:'8px', marginBottom:'10px' }}>
          {meds.map(m => {
            const on = isTaken(m.id);
            return (
              <button key={m.id} onClick={() => onToggle(m.id)}
                style={{ display:'flex', alignItems:'center', gap:'12px', padding:'14px 16px', borderRadius:'14px',
                         cursor:'pointer', fontFamily:'inherit', textAlign:'left',
                         border: on ? '2px solid var(--cn-ok)' : '1px solid var(--card-border)',
                         background: on ? 'var(--cn-ok-100)' : 'var(--input-bg)' }}>
                <span style={{ width:'30px', height:'30px', borderRadius:'50%', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center',
                               background: on ? 'var(--cn-ok)' : 'var(--card-border)', color:'#fff', fontSize:'17px', fontWeight:'900' }}>{on ? '✓' : ''}</span>
                <span style={{ fontSize:'16px', fontWeight:'700', color:'var(--text)' }}>{m.name || '약'}</span>
              </button>
            );
          })}
        </div>
        <button onClick={() => onAllDone(meds.map(m => m.id))} disabled={allDone}
          style={{ width:'100%', padding:'15px', border:'none', borderRadius:'14px', cursor: allDone ? 'default' : 'pointer',
                   fontFamily:'inherit', fontSize:'17px', fontWeight:'800', color:'#fff',
                   background: allDone ? 'var(--cn-ok)' : 'var(--cn-brand)', opacity: allDone ? 0.75 : 1 }}>
          {allDone ? '✓ 오늘 복약 완료!' : '오늘 복약 다 했어요'}
        </button>
      </div>
    );
  };

  /* ── 글자 크기 선택 (전역 zoom) ── */
  const TextSizeControl = () => {
    const [scale, setScale] = React.useState(() => parseFloat(localStorage.getItem('cn_text_scale') || '1.12'));
    const opts = [ { v:1.0, label:'표준' }, { v:1.12, label:'크게' }, { v:1.28, label:'아주 크게' } ];
    const pick = (v) => { setScale(v); if (window.cnApplyTextScale) window.cnApplyTextScale(v); };
    const sel = (v) => Math.abs(scale - v) < 0.01;
    return (
      <div style={{ padding:'12px 14px', background:'var(--card-bg)', border:'1px solid var(--card-border)', borderRadius:'12px', marginBottom:'8px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:'12px', marginBottom:'10px' }}>
          <span style={{ fontSize:'20px' }}>🔠</span>
          <div>
            <div style={{ fontSize:'15px', fontWeight:'700', color:'var(--text)' }}>글자 크기</div>
            <div style={{ fontSize:'12px', color:'var(--text-sub)' }}>화면 전체 글자·버튼 크기</div>
          </div>
        </div>
        <div style={{ display:'flex', gap:'8px' }}>
          {opts.map(o => (
            <button key={o.v} onClick={() => pick(o.v)}
              style={{ flex:1, padding:'11px 6px', borderRadius:'10px', cursor:'pointer', fontFamily:'inherit',
                       fontSize:'14px', fontWeight:'800',
                       border: sel(o.v) ? '2px solid var(--cn-brand)' : '1px solid var(--card-border)',
                       background: sel(o.v) ? 'var(--cn-brand)' : 'var(--input-bg)',
                       color: sel(o.v) ? '#fff' : 'var(--text)' }}>
              {o.label}
            </button>
          ))}
        </div>
      </div>
    );
  };

  const ProfileTab = ({ authUser, userId, onSync, onChangePassword, onDataRecovery, onFeedback, onImport, darkMode, onToggleDark, onGoals, onLibre, onNotif, onFamily, isAdmin, onCoupangAdmin }) => {
    const [showEdit, setShowEdit] = React.useState(false);
    const [avatarUrl, setAvatarUrl] = React.useState('');
    const [profileName, setProfileName] = React.useState('');
    React.useEffect(() => {
      if (!userId) return;
      supa.from('cn_profiles').select('avatar_url,name,grade').eq('id', userId).maybeSingle()
        .then(({ data }) => { if (data) { setAvatarUrl(data.avatar_url||''); setProfileName(data.name||''); } });
    }, [userId]);
    const Row = ({ icon, label, sub, onClick, accent }) => (
      <button onClick={onClick}
        style={{ width:'100%', background:'var(--card-bg)', border:'1px solid var(--card-border)', borderRadius:'10px',
                 padding:'10px 12px', display:'flex', alignItems:'center', gap:'10px', cursor:'pointer',
                 marginBottom:'7px', textAlign:'left', fontFamily:'inherit' }}>

            {avatarUrl

        <Row icon="🩸" label="리브레 혈당 연동" sub="CARENOTE 클리닉 연결 · 리브레뷰 CSV 가져오기" onClick={onLibre} />
        <Row icon="📥" label="과거 데이터 가져오기" sub="애플 건강 ZIP · 리브레뷰 CSV" onClick={onImport} />

        {isAdmin && (
