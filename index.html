          </>
        )}

        <CoupangProducts />

        <div style={{ textAlign:'center', fontSize:'11px', color:'var(--text-mute)', marginTop:'14px' }}>
          CARENOTE v2.0 · © 2025 · <a href="mailto:cnkim74@me.com" style={{ color:'var(--text-mute)' }}>cnkim74@me.com</a><br/>
          <a href="advertise.html" target="_blank" rel="noopener" style={{ color:'var(--text-sub)', fontWeight:'600', textDecoration:'none' }}>📣 광고·제휴 문의</a>
        </div>
      </div>
    );
  };

  /* ── 대시보드: 건강 점수 계산 ── */
  const calcHealthScore = (data) => {
    const dates = Object.keys(data).filter(k => k !== '_user_settings_').sort().slice(-14);
    if (!dates.length) return { total:0, bp:0, glucose:0, meds:0, exercise:0 };
    // 혈압
    const bpVals = dates.map(d => {
      const b = data[d] && data[d].bp;
      if (!b || !b.sys || !b.dia) return null;
      const s = parseFloat(b.sys), di = parseFloat(b.dia);
      if (s < 120 && di < 80) return 100;
      if (s < 130 && di < 80) return 80;
      if (s < 140 && di < 90) return 60;
      if (s < 160 && di < 100) return 40;
      return 20;
    }).filter(v => v !== null);
    const bpScore = bpVals.length ? Math.round(bpVals.reduce((a,b)=>a+b,0)/bpVals.length) : 0;
    // 혈당
    const bsAll = dates.flatMap(d => {
      const bs = (data[d] && data[d].bs) || {};
      return Object.values(bs).map(v => parseInt(v)).filter(v => v > 0);
    });
    let glScore = 0;
    if (bsAll.length) {
      const med = median(bsAll);
      glScore = med < 100 ? 100 : med < 126 ? 85 : med < 154 ? 65 : med < 200 ? 40 : 20;
    }
    // 복약
    const medDays = dates.filter(d => {
      const m = data[d] && data[d].meds;
      return m && Object.values(m).some(Boolean);
    });
    const medsScore = dates.length ? Math.round((medDays.length / dates.length) * 100) : 0;
    // 운동
    const exDays = dates.filter(d => {
      const ex = data[d] && data[d].exercise;
      const steps = data[d] && data[d].steps;
      const hasLog = ex && ((ex.logs||[]).some(l => l.type || parseInt(l.mins)>0) || parseInt(ex.mins)>0 || (ex.type&&ex.type.trim()));
      const hasSteps = steps && parseInt(steps) >= 3000;
      return hasLog || hasSteps;
    });
    const exScore = dates.length ? Math.round((exDays.length / dates.length) * 100) : 0;
    const total = Math.round(bpScore*0.30 + glScore*0.30 + medsScore*0.25 + exScore*0.15);
    return { total, bp:bpScore, glucose:glScore, meds:medsScore, exercise:exScore };
  };

  /* ── 대시보드: AI 인사이트 생성 ── */
  const genInsights = (data) => {
    const dates = Object.keys(data).filter(k => k !== '_user_settings_').sort().slice(-7);
    if (!dates.length) return ['데이터를 입력하면 AI 인사이트가 생성됩니다.'];
    const insights = [];
    const bpVals = dates.map(d => data[d] && data[d].bp).filter(b => b && b.sys).map(b => parseFloat(b.sys));
    if (bpVals.length >= 2) {
      const avg = Math.round(bpVals.reduce((a,b)=>a+b,0)/bpVals.length);
      if (avg > 140) insights.push('최근 7일 평균 수축기 혈압 '+avg+'mmHg — 고혈압 범위입니다. 저염식과 규칙적 운동을 권장합니다.');
      else if (avg > 130) insights.push('평균 혈압 '+avg+'mmHg — 주의혈압 범위. 식이 관리를 유지해 주세요.');
      else insights.push('평균 혈압 '+avg+'mmHg — 정상 범위로 잘 관리되고 있습니다.');
    }
    const bsAll = dates.flatMap(d => {
      const bs = (data[d] && data[d].bs) || {};
      return Object.values(bs).map(v => parseInt(v)).filter(v => v > 0);
    });
    if (bsAll.length) {
      const avg = Math.round(bsAll.reduce((a,b)=>a+b,0)/bsAll.length);
      if (avg > 180) insights.push('평균 혈당 '+avg+'mg/dL — 목표 범위 초과. 식후 혈당 관리와 인슐린 용량을 점검해 보세요.');
      else if (avg > 140) insights.push('평균 혈당 '+avg+'mg/dL — 주의 범위. 탄수화물 섭취를 줄여보세요.');
      else insights.push('평균 혈당 '+avg+'mg/dL — 목표 범위 내 관리 중입니다.');
    }
    const medDays = dates.filter(d => { const m = data[d] && data[d].meds; return m && Object.values(m).some(Boolean); });
    const medPct2 = dates.length ? Math.round((medDays.length/dates.length)*100) : 0;
    if (medPct2 < 80) insights.push('최근 복약 완료율 '+medPct2+'% — 규칙적인 복약이 혈당 조절에 중요합니다.');
    else if (medPct2 === 100) insights.push('7일 연속 복약 100% 완료 — 훌륭한 복약 습관입니다!');
    if (!insights.length) insights.push('데이터가 더 쌓이면 맞춤 인사이트를 제공합니다.');
    return insights;
  };

  /* ── SVG: 원형 건강 점수 게이지 ── */
  const CircleGauge = ({ value, size=96, stroke=9 }) => {
    const r = (size - stroke) / 2;
    const circ = 2 * Math.PI * r;
    const offset = circ - (value / 100) * circ;
    const color = value >= 80 ? 'var(--cn-ok)' : value >= 60 ? 'var(--cn-brand)' : value >= 40 ? 'var(--cn-warn)' : 'var(--cn-danger)';
    const label = value >= 80 ? '우수' : value >= 60 ? '양호' : value >= 40 ? '보통' : '주의';
    return (
      <svg width={size} height={size} viewBox={'0 0 '+size+' '+size} style={{flexShrink:0}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--card-border)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          transform={'rotate(-90 '+(size/2)+' '+(size/2)+')'}
          style={{transition:'stroke-dashoffset 0.7s ease'}}/>
        <text x={size/2} y={size/2-5} textAnchor="middle" fill="var(--text)" fontSize="20" fontWeight="800">{value}</text>
        <text x={size/2} y={size/2+13} textAnchor="middle" fill="var(--text-sub)" fontSize="10">{label}</text>
      </svg>
    );
  };

  /* ── SVG: 스파크라인 ── */
  const Sparkline = ({ vals, color='var(--cn-brand)', h=30 }) => {
    if (!vals || vals.length < 2) return <div style={{height:h}}/>;
    const ns = vals.map(v => parseFloat(v)||0);
    const mn = Math.min(...ns), mx = Math.max(...ns);
    const range = mx - mn || 1;
    const w = 100;
    const pts = ns.map((v,i) => ((i/(ns.length-1))*w)+','+(h - ((v-mn)/range)*(h-4)-2)).join(' ');
    return (
      <svg viewBox={'0 0 '+w+' '+h} style={{width:'100%',height:h,display:'block'}} preserveAspectRatio="none">
        <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
      </svg>
    );
  };

  /* ── 복약 주기 헬퍼 — 해당 날짜에 복용해야 하는지 판단 ── */
  const isMedActive = (med, dateStr) => {
    if (med.startDate && dateStr < med.startDate) return false;
    if (med.endDate   && dateStr > med.endDate)   return false;
    const freq = med.freq;
    if (!freq || freq.type === 'daily') return true;
    const d = new Date(dateStr + 'T00:00:00');
    if (freq.type === 'weekly') {
      const days = freq.weekDays || [];
      if (!days.length) return true; // 요일 미설정 시 매일 표시 (안전 폴백)
      return days.includes(d.getDay());
    }
    if (freq.type === 'monthly') {
      const mdays = freq.monthDays || [];
      if (!mdays.length) return true; // 날짜 미설정 시 매일 표시 (안전 폴백)
      return mdays.includes(d.getDate());
    }
    if (freq.type === 'interval') {
      const ref = new Date(((freq.refDate || med.startDate || dateStr)) + 'T00:00:00');
      const diff = Math.round((d - ref) / 86400000);
      return diff >= 0 && diff % (Math.max(1, freq.intervalDays || 1)) === 0;
    }
    return true;
  };

  const freqLabel = (med) => {
    const f = med.freq;
    if (!f || f.type === 'daily') return null;
    const DAY_KO = ['일','월','화','수','목','금','토'];
    if (f.type === 'weekly')   return '매주 ' + (f.weekDays||[]).map(d=>DAY_KO[d]).join('·');
    if (f.type === 'monthly')  return '매월 ' + (f.monthDays||[]).join('·') + '일';
    if (f.type === 'interval') return `${f.intervalDays||1}일마다`;
    return null;
  };

  /* ── 리포트 미니 요약 (사이드바 접힘 상태) ── */
  const ReportMiniSummary = ({ data, allMedIds }) => {
    const summary = useMemo(() => {
      const allDates = Object.keys(data).filter(k => k !== '_user_settings_').sort();
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
      const last30 = allDates.filter(d => new Date(d) >= cutoff);
      if (!last30.length) return null;
      const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
      // 혈압
      const bpVals = last30.map(d=>data[d]?.bp).filter(b=>b?.sys&&b?.dia).map(b=>({sys:parseFloat(b.sys),dia:parseFloat(b.dia)}));
      const avgSys = avg(bpVals.map(b=>b.sys)); const avgDia = avg(bpVals.map(b=>b.dia));
      const bpRate = bpVals.length ? Math.round(bpVals.filter(b=>b.sys<130&&b.dia<85).length/bpVals.length*100) : null;
      // 혈당
      const bsAll = last30.flatMap(d=>Object.values(data[d]?.bs||{}).map(v=>parseFloat(v)).filter(v=>!isNaN(v)&&v>0));
      const avgBs = avg(bsAll);
      const bsRate = bsAll.length ? Math.round(bsAll.filter(v=>v>=70&&v<=140).length/bsAll.length*100) : null;
      // 체중
      const wVals = last30.map(d=>parseFloat(data[d]?.weight)).filter(v=>!isNaN(v)&&v>0);
      const lastW = wVals[wVals.length-1];
      // 복약
      const medDays = last30.filter(d=>(allMedIds||[]).some(id=>data[d]?.meds?.[id]===true)).length;
      const medRate = (last30.length && (allMedIds||[]).length) ? Math.round(medDays/last30.length*100) : null;
      // 기록률
      const recDays = last30.filter(d=>{ const dy=data[d]; return dy&&(dy.bp?.sys||dy.weight||Object.values(dy.bs||{}).some(v=>v)); }).length;
      const recRate = last30.length ? Math.round(recDays/last30.length*100) : null;
      // 종합 점수
      let sc=0, n=0;
      if (bpRate!=null){sc+=bpRate;n++;} if (bsRate!=null){sc+=bsRate;n++;}
      if (medRate!=null){sc+=medRate;n++;} if (recRate!=null){sc+=recRate;n++;}
      const totalScore = n ? Math.round(sc/n) : null;
      const grade = totalScore==null ? null
        : totalScore>=90 ? {label:'매우 좋음',color:'var(--cn-ok)',emoji:'🏆'}
        : totalScore>=75 ? {label:'좋음',color:'#3b82f6',emoji:'👍'}
        : totalScore>=60 ? {label:'보통',color:'#f59e0b',emoji:'📊'}
        :                  {label:'주의 필요',color:'var(--cn-danger)',emoji:'⚠️'};
      return { avgSys, avgDia, avgBs, lastW, medRate, totalScore, grade };
    }, [data, allMedIds]);

    if (!summary) return <div style={{padding:'8px 16px 14px',fontSize:'12px',color:'var(--text-mute)'}}>기록 없음</div>;
    const s = summary;
    return (
      <div style={{ padding:'0 16px 16px' }}>
        {/* 종합 점수 */}
        {s.grade && (
          <div style={{ display:'flex', alignItems:'center', gap:'14px', padding:'10px 14px', borderRadius:'12px',
            background:`linear-gradient(135deg,${s.grade.color}18,${s.grade.color}08)`,
            border:`1px solid ${s.grade.color}33`, marginBottom:'10px' }}>
            <div style={{ fontSize:'28px', lineHeight:1 }}>{s.grade.emoji}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:'11px', color:'var(--text-sub)', fontWeight:'600' }}>종합 건강 지수 · 30일</div>
              <div style={{ fontSize:'26px', fontWeight:'900', color:s.grade.color, lineHeight:1.1 }}>
                {s.totalScore}<span style={{fontSize:'13px',fontWeight:'700'}}>점</span>
              </div>
            </div>
            <div style={{ fontSize:'13px', fontWeight:'700', color:s.grade.color, background:`${s.grade.color}20`,
              borderRadius:'8px', padding:'3px 10px' }}>{s.grade.label}</div>
          </div>
        )}
        {/* 핵심 지표 태그 */}
        <div style={{ display:'flex', flexWrap:'wrap', gap:'6px' }}>
          {s.avgSys && <span style={{fontSize:'12px',background:'var(--cn-danger-100)',color:'var(--cn-danger)',borderRadius:'8px',padding:'4px 9px',fontWeight:'700'}}>💓 {Math.round(s.avgSys)}/{Math.round(s.avgDia)}</span>}
          {s.avgBs  && <span style={{fontSize:'12px',background:'var(--cn-ok-100)',color:'var(--cn-ok)',borderRadius:'8px',padding:'4px 9px',fontWeight:'700'}}>🩸 {Math.round(s.avgBs)}</span>}
          {s.lastW  && <span style={{fontSize:'12px',background:'var(--cn-low-100)',color:'var(--cn-low)',borderRadius:'8px',padding:'4px 9px',fontWeight:'700'}}>⚖️ {parseFloat(s.lastW).toFixed(1)}kg</span>}
          {s.medRate!=null && <span style={{fontSize:'12px',background:'var(--cn-brand-100)',color:'var(--cn-brand)',borderRadius:'8px',padding:'4px 9px',fontWeight:'700'}}>💊 {s.medRate}%</span>}
        </div>
      </div>
    );
  };

  /* ── 종합 건강 리포트 컴포넌트 ── */
  const HealthReportSection = ({ data, medsConfig, allMedIds }) => {
    const report = useMemo(() => {
      const KEY_SKIP = '_user_settings_';
      const allDates = Object.keys(data).filter(k => k !== KEY_SKIP).sort();
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
      const last30 = allDates.filter(d => new Date(d) >= cutoff);
      const prev30start = new Date(); prev30start.setDate(prev30start.getDate() - 60);
      const prev30 = allDates.filter(d => new Date(d) >= prev30start && new Date(d) < cutoff);

      const avg = (arr) => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;

      /* 혈압 */
      const bpVals = last30.map(d => data[d]?.bp).filter(b => b?.sys && b?.dia)
        .map(b => ({ sys: parseFloat(b.sys), dia: parseFloat(b.dia) }));
      const prevBpVals = prev30.map(d => data[d]?.bp).filter(b => b?.sys && b?.dia)
        .map(b => ({ sys: parseFloat(b.sys), dia: parseFloat(b.dia) }));
      const avgSys = avg(bpVals.map(b=>b.sys));
      const avgDia = avg(bpVals.map(b=>b.dia));
      const prevAvgSys = avg(prevBpVals.map(b=>b.sys));
      const bpNormal = bpVals.filter(b => b.sys < 130 && b.dia < 85).length;
      const bpRate = bpVals.length ? Math.round(bpNormal/bpVals.length*100) : null;

      /* 혈당 */
      const bsAll = last30.flatMap(d => {
        const bs = data[d]?.bs || {};
        return Object.values(bs).map(v => parseFloat(v)).filter(v => !isNaN(v) && v > 0);
      });
      const prevBsAll = prev30.flatMap(d => {
        const bs = data[d]?.bs || {};
        return Object.values(bs).map(v => parseFloat(v)).filter(v => !isNaN(v) && v > 0);
      });
      const avgBs = avg(bsAll);
      const prevAvgBs = avg(prevBsAll);
      const bsNormal = bsAll.filter(v => v >= 70 && v <= 140).length;
      const bsRate = bsAll.length ? Math.round(bsNormal/bsAll.length*100) : null;

      /* 체중 */
      const wVals = last30.map(d => parseFloat(data[d]?.weight)).filter(v => !isNaN(v) && v > 0);
      const firstW = wVals[0], lastW = wVals[wVals.length-1];
      const wChange = (firstW && lastW) ? (lastW - firstW) : null;

      /* 체지방 */
      const bfVals = last30.map(d => parseFloat(data[d]?.bodyFat)).filter(v => !isNaN(v) && v > 0);
      const firstBf = bfVals[0], lastBf = bfVals[bfVals.length-1];
      const bfChange = (firstBf && lastBf) ? (lastBf - firstBf) : null;

      /* 운동 (걸음수) */
      const stepsVals = last30.map(d => parseFloat(data[d]?.steps)).filter(v => !isNaN(v) && v > 0);
      const avgSteps = avg(stepsVals);
      const prevStepsVals = prev30.map(d => parseFloat(data[d]?.steps)).filter(v => !isNaN(v) && v > 0);
      const prevAvgSteps = avg(prevStepsVals);
      const activeDays = last30.filter(d => {
        const s = parseFloat(data[d]?.steps); const c = parseFloat(data[d]?.cal);
        const logs = data[d]?.exercise?.logs || [];
        return (s > 3000) || (c > 200) || logs.length > 0;
      }).length;

      /* 복약 순응도 */
      const medDays = last30.filter(d => {
        const meds = data[d]?.meds || {};
        const allIds = allMedIds || [];
        if (!allIds.length) return false;
        return allIds.some(id => meds[id] === true);
      }).length;
      const medRate = last30.length ? Math.round(medDays/last30.length*100) : null;

      /* 기록 충실도 */
      const recordedDays = last30.filter(d => {
        const dy = data[d]; if (!dy) return false;
        return (dy.bp?.sys) || (dy.weight) || Object.values(dy.bs||{}).some(v=>v);
      }).length;
      const recordRate = last30.length ? Math.round(recordedDays/last30.length*100) : null;

      /* 칼로리 섭취 추정 (내장 DB 기반) */
      const estimateCalFromText = (text) => {
        if (!text?.trim()) return 0;
        const items = text.split(/[\n]+/).map(s => s.trim()).filter(Boolean)
          .filter(s => !/kcal|칼로리|탄수화물|단백질|지방|혈당|적합|개선|총\s*영양|음식\s*목록|Powered/i.test(s))
          .filter(s => !/^[-•🍽📊🩸✅💡⚠️※]/.test(s))
          .flatMap(s => s.split(',').map(x => x.trim()).filter(Boolean));
        let total = 0;
        items.forEach(item => {
          const qMatch = item.match(/(\d+(?:\.\d+)?)\s*(공기|개|그릇|봉|접시|잔|컵|조각|인분|개분)/);
          const qty = qMatch ? parseFloat(qMatch[1]) : 1;
          let matched = null, matchedLen = 0;
          for (const [name, cal] of Object.entries(FOOD_DB)) {
            if (item.includes(name) && name.length > matchedLen) { matched = cal; matchedLen = name.length; }
          }
          if (matched) total += Math.round(matched * qty);
        });
        return total;
      };
      const dailyCals = last30.map(d => {
        const dy = data[d]; if (!dy) return null;
        let dayCal = 0;
        ['breakfast','lunch','dinner'].forEach(id => { dayCal += estimateCalFromText(dy.meals?.[id]); });
        (dy.extraMeals||[]).forEach(em => { dayCal += estimateCalFromText(em.text); });
        return dayCal > 0 ? dayCal : null;
      }).filter(v => v !== null);
      const avgDailyCal = avg(dailyCals);
      const maxDailyCal = dailyCals.length ? Math.max(...dailyCals) : null;
      const minDailyCal = dailyCals.length ? Math.min(...dailyCals) : null;
      // 목표 칼로리: 당뇨 기준 1,600~2,000 kcal
      const calGoal = 1800;
      const calStatus = avgDailyCal == null ? null
        : avgDailyCal < 1200 ? { label:'섭취 부족', color:'#3b82f6' }
        : avgDailyCal <= 2000 ? { label:'적정 범위', color:'var(--cn-ok)' }
        : avgDailyCal <= 2400 ? { label:'약간 과다', color:'#f59e0b' }
        : { label:'과다 섭취', color:'var(--cn-danger)' };

      /* 트렌드 화살표 */
      const trend = (now, prev, lowerBetter=false) => {
        if (now == null || prev == null) return null;
        const diff = now - prev;
        if (Math.abs(diff) < 1) return { icon:'→', color:'var(--text-sub)', label:'유지' };
        const improving = lowerBetter ? diff < 0 : diff > 0;
        return improving
          ? { icon:'↑', color:'var(--cn-ok)', label:`${lowerBetter?'감소':'증가'}` }
          : { icon:'↓', color:'var(--cn-danger)', label:`${lowerBetter?'증가':'감소'}` };
      };
      const bpTrend = trend(avgSys, prevAvgSys, true);
      const bsTrend = trend(avgBs, prevAvgBs, true);
      const stepsTrend = trend(avgSteps, prevAvgSteps, false);

      /* 종합 점수 */
      let score = 0, scoreItems = 0;
      if (bpRate != null)   { score += bpRate;    scoreItems++; }
      if (bsRate != null)   { score += bsRate;    scoreItems++; }
      if (medRate != null && allMedIds?.length)  { score += medRate;   scoreItems++; }
      if (recordRate != null){ score += recordRate; scoreItems++; }
      const totalScore = scoreItems ? Math.round(score/scoreItems) : null;
      const scoreGrade = totalScore == null ? null
        : totalScore >= 90 ? { label:'매우 좋음', color:'var(--cn-ok)', emoji:'🏆' }
        : totalScore >= 75 ? { label:'좋음',      color:'#3b82f6',     emoji:'👍' }
        : totalScore >= 60 ? { label:'보통',       color:'#f59e0b',     emoji:'📊' }
        :                    { label:'주의 필요',  color:'var(--cn-danger)', emoji:'⚠️' };

      return { last30Len: last30.length, avgSys, avgDia, bpRate, bpTrend,
               avgBs, bsAll, bsRate, bsTrend,
               lastW, wChange, lastBf, bfChange,
               avgSteps, activeDays, stepsTrend,
               medRate, recordRate, totalScore, scoreGrade,
               avgDailyCal, maxDailyCal, minDailyCal, dailyCalsLen: dailyCals.length, calStatus, calGoal };
    }, [data, allMedIds]);

    const r = report;
    if (r.last30Len === 0) return (
      <div style={{ textAlign:'center', padding:'32px 0', color:'var(--text-sub)', fontSize:'14px' }}>
        기록이 없어요. 건강 데이터를 입력하면 리포트가 생성돼요.
      </div>
    );

    const StatRow = ({ icon, label, value, sub, trend, note }) => (
      <div style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px 0', borderBottom:'1px solid var(--card-border)' }}>
        <div style={{ fontSize:'22px', width:'32px', textAlign:'center', flexShrink:0 }}>{icon}</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:'13px', color:'var(--text-sub)', fontWeight:'600' }}>{label}</div>
          {note && <div style={{ fontSize:'11px', color:'var(--text-mute)', marginTop:'1px' }}>{note}</div>}
        </div>
        <div style={{ textAlign:'right' }}>
          <div style={{ fontSize:'18px', fontWeight:'800', color:'var(--text)' }}>{value ?? '–'}</div>
          {sub && <div style={{ fontSize:'11px', color:'var(--text-sub)', marginTop:'1px' }}>{sub}</div>}
        </div>
        {trend && (
          <div style={{ fontSize:'18px', fontWeight:'800', color:trend.color, width:'24px', textAlign:'center' }}>{trend.icon}</div>
        )}
      </div>
    );

    const RateBar = ({ rate, color }) => rate == null ? null : (
      <div style={{ height:'6px', background:'var(--card-border)', borderRadius:'3px', margin:'4px 0 0', overflow:'hidden' }}>
        <div style={{ height:'100%', width:`${rate}%`, background:color || 'var(--cn-brand)', borderRadius:'3px', transition:'width 0.6s ease' }} />
      </div>
    );

    return (
      <div>
        {/* 종합 점수 */}
        {r.scoreGrade && (
          <div style={{ background:`linear-gradient(135deg, ${r.scoreGrade.color}22, ${r.scoreGrade.color}11)`,
            border:`1.5px solid ${r.scoreGrade.color}44`, borderRadius:'18px', padding:'26px 16px 22px', marginBottom:'16px', textAlign:'center' }}>
            <img src="icons/trophy.png" alt="" style={{ width:'110px', height:'110px', objectFit:'contain', marginBottom:'6px', filter:'drop-shadow(0 6px 12px rgba(11,27,59,0.15))' }} />
            <div style={{ fontFamily:'var(--font-title)', fontSize:'15px', color:'var(--text-sub)', fontWeight:'700' }}>종합 건강 지수</div>
            <div style={{ fontFamily:'var(--font-title)', fontSize:'64px', fontWeight:'700', color:r.scoreGrade.color, lineHeight:1.05, letterSpacing:'-1px' }}>{r.totalScore}<span style={{fontSize:'24px', fontWeight:'700'}}>점</span></div>
            <div style={{ display:'inline-block', fontSize:'16px', fontWeight:'800', color:'#fff', background:r.scoreGrade.color, borderRadius:'20px', padding:'5px 18px', marginTop:'6px' }}>{r.scoreGrade.label}</div>
            <div style={{ fontSize:'12px', color:'var(--text-mute)', marginTop:'10px' }}>최근 30일 {r.last30Len}일 기준</div>
          </div>
        )}

        {/* 혈압 */}
        <div style={{ marginBottom:'12px' }}>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>💓 혈압</div>
          <StatRow icon="🩺" label="평균 혈압" value={r.avgSys ? `${Math.round(r.avgSys)}/${Math.round(r.avgDia)}` : null} sub="mmHg" trend={r.bpTrend} note="전월 대비" />
          {r.bpRate != null && <>
            <div style={{ fontSize:'12px', color:'var(--text-sub)', marginTop:'6px' }}>정상 범위 달성률 <strong>{r.bpRate}%</strong> ({r.bpVals?.length ?? '–'}회 측정)</div>
            <RateBar rate={r.bpRate} color={r.bpRate >= 70 ? 'var(--cn-ok)' : r.bpRate >= 50 ? '#f59e0b' : 'var(--cn-danger)'} />
          </>}
        </div>

        {/* 혈당 */}
        <div style={{ marginBottom:'12px' }}>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>🩸 혈당</div>
          <StatRow icon="📉" label="평균 혈당" value={r.avgBs ? `${Math.round(r.avgBs)}` : null} sub="mg/dL" trend={r.bsTrend} note="전월 대비" />
          {r.bsRate != null && <>
            <div style={{ fontSize:'12px', color:'var(--text-sub)', marginTop:'6px' }}>정상 범위(70~140) 달성률 <strong>{r.bsRate}%</strong> ({r.bsAll?.length ?? '–'}회 측정)</div>
            <RateBar rate={r.bsRate} color={r.bsRate >= 70 ? 'var(--cn-ok)' : r.bsRate >= 50 ? '#f59e0b' : 'var(--cn-danger)'} />
          </>}
        </div>

        {/* 체중 */}
        <div style={{ marginBottom:'12px' }}>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>⚖️ 체중 · 체지방</div>
          <StatRow icon="⚖️" label="현재 체중" value={r.lastW ? `${parseFloat(r.lastW).toFixed(1)}` : null} sub="kg"
            trend={r.wChange != null ? { icon: r.wChange > 0 ? '↑' : r.wChange < 0 ? '↓' : '→',
              color: r.wChange < 0 ? 'var(--cn-ok)' : r.wChange > 0 ? 'var(--cn-danger)' : 'var(--text-sub)',
              label: '' } : null}
            note={r.wChange != null ? `30일간 ${r.wChange > 0 ? '+' : ''}${r.wChange.toFixed(1)}kg` : null} />
          {r.lastBf && <StatRow icon="💧" label="체지방율" value={`${parseFloat(r.lastBf).toFixed(1)}%`}
            trend={r.bfChange != null ? { icon: r.bfChange > 0 ? '↑' : r.bfChange < 0 ? '↓' : '→',
              color: r.bfChange < 0 ? 'var(--cn-ok)' : r.bfChange > 0 ? 'var(--cn-danger)' : 'var(--text-sub)',
              label: '' } : null}
            note={r.bfChange != null ? `30일간 ${r.bfChange > 0 ? '+' : ''}${r.bfChange.toFixed(1)}%` : null} />}
        </div>

        {/* 운동 */}
        <div style={{ marginBottom:'12px' }}>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>🏃 활동</div>
          <StatRow icon="👟" label="일평균 걸음수" value={r.avgSteps ? Math.round(r.avgSteps).toLocaleString() : null} sub="걸음" trend={r.stepsTrend} note="전월 대비" />
          <StatRow icon="🗓️" label="활동 달성일" value={r.activeDays != null ? `${r.activeDays}일` : null} sub={`/ ${r.last30Len}일`}
            note="걸음 3000+ 또는 운동 기록 있는 날" />
          {r.activeDays != null && r.last30Len && <>
            <RateBar rate={Math.round(r.activeDays/r.last30Len*100)} color={r.activeDays/r.last30Len >= 0.5 ? 'var(--cn-ok)' : '#f59e0b'} />
          </>}
        </div>

        {/* 복약 */}
        {r.medRate != null && (
          <div style={{ marginBottom:'12px' }}>
            <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>💊 복약</div>
            <StatRow icon="💊" label="복약 순응도" value={`${r.medRate}%`} sub={`${r.last30Len}일 중`} />
            <RateBar rate={r.medRate} color={r.medRate >= 80 ? 'var(--cn-ok)' : r.medRate >= 60 ? '#f59e0b' : 'var(--cn-danger)'} />
          </div>
        )}

        {/* 칼로리 섭취 */}
        {r.avgDailyCal != null && (
          <div style={{ marginBottom:'12px' }}>
            <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>🍽️ 칼로리 섭취</div>
            <StatRow icon="🔥" label="일평균 칼로리" value={`${Math.round(r.avgDailyCal).toLocaleString()}`} sub="kcal / 일"
              note={r.calStatus ? r.calStatus.label : null}
              trend={r.calStatus ? { icon: r.avgDailyCal <= r.calGoal ? '✓' : '!', color: r.calStatus.color, label:'' } : null} />
            <div style={{ display:'flex', gap:'12px', marginTop:'6px', fontSize:'12px', color:'var(--text-sub)' }}>
              {r.minDailyCal != null && <span>최소 <strong>{Math.round(r.minDailyCal).toLocaleString()}</strong> kcal</span>}
              {r.maxDailyCal != null && <span>최대 <strong>{Math.round(r.maxDailyCal).toLocaleString()}</strong> kcal</span>}
              <span style={{color:'var(--text-mute)'}}>{r.dailyCalsLen}일 기록 기준</span>
            </div>
            {/* 목표 대비 바 (목표 1,800 kcal 기준) */}
            <div style={{ marginTop:'6px', position:'relative', height:'6px', background:'var(--card-border)', borderRadius:'3px', overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${Math.min(r.avgDailyCal/2400*100,100)}%`, background: r.calStatus?.color || 'var(--cn-brand)', borderRadius:'3px', transition:'width 0.6s ease' }} />
              {/* 목표선 마커 */}
              <div style={{ position:'absolute', top:0, left:`${r.calGoal/2400*100}%`, width:'2px', height:'100%', background:'var(--text-sub)', opacity:0.5 }} />
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:'10px', color:'var(--text-mute)', marginTop:'2px' }}>
              <span>0</span><span style={{color:'var(--text-sub)'}}>목표 {r.calGoal.toLocaleString()}kcal</span><span>2,400+</span>
            </div>
            <div style={{ fontSize:'11px', color:'var(--text-mute)', marginTop:'4px' }}>
              ※ 입력된 식사 텍스트 기반 추정값 (내장 DB)이에요. 미기록 식사는 포함되지 않아요.
            </div>
          </div>
        )}

        {/* 기록 충실도 */}
        <div>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>📝 기록</div>
          <StatRow icon="📋" label="기록 충실도" value={r.recordRate != null ? `${r.recordRate}%` : null} sub={`${r.last30Len}일 중 ${Math.round((r.recordRate||0)*r.last30Len/100)}일 기록`} />
          <RateBar rate={r.recordRate} color={r.recordRate >= 80 ? 'var(--cn-ok)' : r.recordRate >= 50 ? '#f59e0b' : 'var(--cn-danger)'} />
        </div>
      </div>
    );
  };

  /* ── 대시보드: 홈탭 ── */
  const DashboardHome = ({ data, date, medsConfig, allMedIds, goals, height }) => {
    const stepGoal = Math.max(1000, parseInt(goals?.steps) || 10000);
    const score = useMemo(() => calcHealthScore(data), [data]);
    const insights = useMemo(() => genInsights(data), [data]);
    const DAY_KOR = ['일','월','화','수','목','금','토'];

    // 최근 14일
    const recent14 = useMemo(() => Array.from({length:14},(_,i)=>shiftDate(date,i-13)), [date]);
    const bpSysVals = recent14.map(d => data[d] && data[d].bp && data[d].bp.sys).filter(Boolean);
    const bpDiaVals = recent14.map(d => data[d] && data[d].bp && data[d].bp.dia).filter(Boolean);
    const bsVals = recent14.map(d => {
      const bs = (data[d] && data[d].bs) || {};
      const v = bs.bs_bf_am || bs.bs_af_am || bs.bs_bf_lu || bs.bs_af_lu || bs.bs_bf_di || bs.bs_af_di || bs.bs_bed;
      return v || null;
    }).filter(Boolean);
    const weightVals = recent14.map(d => data[d] && data[d].weight).filter(Boolean);

    const todayData = normalizeDay(data[date]);
    const lastBP = (todayData.bp && todayData.bp.sys)
      ? todayData.bp.sys+'/'+todayData.bp.dia
      : (bpSysVals.length ? bpSysVals[bpSysVals.length-1]+'/'+bpDiaVals[bpDiaVals.length-1] : '---');
    const lastBS = (() => {
      const bs = (todayData.bs) || {};
      return bs.bs_bf_am || bs.bs_af_am || bs.bs_bf_lu || bs.bs_af_lu || bs.bs_bf_di || bs.bs_af_di || bs.bs_bed
        || (bsVals.length ? bsVals[bsVals.length-1] : null);
    })();
    const lastW = todayData.weight || (weightVals.length ? weightVals[weightVals.length-1] : null);

    // BMI (체질량지수) — 키(cm) + 최근 체중(kg)
    const bmi = (() => {
      const h = parseFloat(height), w = parseFloat(lastW);
      if (!h || !w || h < 50 || h > 250) return null;
      return w / ((h/100) ** 2);
    })();
    const bmiCat = bmi == null ? null
      : bmi < 18.5 ? { label:'저체중', color:'#3b82f6', pos: bmi/40*100 }
      : bmi < 23   ? { label:'정상',   color:'var(--cn-ok)', pos: bmi/40*100 }
      : bmi < 25   ? { label:'과체중', color:'var(--cn-warn)', pos: bmi/40*100 }
      : { label:'비만', color:'var(--cn-danger)', pos: Math.min(bmi,40)/40*100 };

    // 복약 현황
    const medsToday = allMedIds.filter(id => todayData.meds && todayData.meds[id]).length;
    const medsPct = allMedIds.length ? Math.round((medsToday/allMedIds.length)*100) : 0;

    // 혈압 차트 데이터 (최근 14일 중 데이터 있는 날)
    const bpChartData = recent14.map(d => ({
      d, sys: data[d] && data[d].bp && parseInt(data[d].bp.sys)||null,
      dia: data[d] && data[d].bp && parseInt(data[d].bp.dia)||null
    })).filter(x => x.sys);
    const allBpNums = bpChartData.flatMap(x=>[x.sys,x.dia]).filter(Boolean);
    const bpMin2 = allBpNums.length ? Math.min(...allBpNums)-8 : 60;
    const bpMax2 = allBpNums.length ? Math.max(...allBpNums)+8 : 160;
    const bpRange2 = bpMax2 - bpMin2 || 80;
    const CW = 280, CH = 100;
    const bpY = v => CH - ((v-bpMin2)/bpRange2)*CH;

    // 트렌드 뱃지
    const TrendBadge = ({ vals }) => {
      if (!vals || vals.length < 4) return null;
      const r = vals.slice(-3).map(v=>parseFloat(v)||0);
      const p = vals.slice(-6,-3).map(v=>parseFloat(v)||0);
      if (!r.length || !p.length) return null;
      const rA = r.reduce((a,b)=>a+b,0)/r.length;
      const pA = p.reduce((a,b)=>a+b,0)/p.length;
      const diff = rA - pA;
      if (Math.abs(diff) < 1.5) return <span className="dash-trend dash-trend-st">— 안정</span>;
      if (diff > 0) return <span className="dash-trend dash-trend-up">▲ +{Math.round(diff)}</span>;
      return <span className="dash-trend dash-trend-dn">▼ {Math.round(diff)}</span>;
    };

    // 운동 현황 (최근 7일)
    const exDays7 = Array.from({length:7},(_,i)=>shiftDate(date,i-6)).map(d => {
      const ex = data[d] && data[d].exercise;
      return { d, mins: parseInt((ex && ex.mins)||0), type: (ex && ex.type)||'' };
    });
    const maxEx = Math.max(...exDays7.map(x=>x.mins), 1);

    return (
      <div className="cn-card" data-tab="home" style={{ background:'transparent', border:'none', borderRadius:0, padding:0, boxShadow:'none', margin:0 }}>
        {/* 건강 점수 */}
        <div className="dash-score-card">
          <CircleGauge value={score.total}/>
          <div className="dash-score-info">
            <div className="dash-score-title">종합 건강 점수 (14일 평균)</div>
            <div className="dash-score-breakdown">
              {[
                { label:'혈압', val:score.bp,       color:'var(--cn-danger)', w:'30%' },
                { label:'혈당', val:score.glucose,  color:'var(--cn-ok)',     w:'30%' },
                { label:'복약', val:score.meds,     color:'var(--cn-brand)',  w:'25%' },
                { label:'운동', val:score.exercise, color:'var(--cn-warn)',   w:'15%' },
              ].map(row => (
                <div key={row.label} className="dash-score-row">

  /* ── 단축어 연동 가이드 컴포넌트 (hooks를 IIFE 안에 넣으면 React #310 에러 발생) ── */
  const ShortcutGuide = () => {
    const [open, setOpen]         = React.useState(false);
    const [syncKey, setSyncKey]   = React.useState(null);
    const [copied, setCopied]     = React.useState('');
    const [step1Done, setStep1Done] = React.useState(() => !!localStorage.getItem('cn_sc_sql_done_v2'));

    // SQL: 관리자 1회 실행용 (sync_key 컬럼 추가 + v2 함수 등록)
    const SQL_TEXT = `-- 1. cn_profiles에 연동 키 컬럼 추가 (최초 1회)\nalter table cn_profiles\n  add column if not exists sync_key uuid default gen_random_uuid();\nupdate cn_profiles set sync_key = gen_random_uuid() where sync_key is null;\n\n-- 2. 새 연동 함수 등록 (v4: 누적값 MAX 병합 — 걸음수/활동칼로리/기초대사량/거리 감소 방지)\ncreate or replace function upsert_health_patch_v2(\n  p_sync_key uuid,\n  p_date     text,\n  p_patch    jsonb\n) returns json\nlanguage plpgsql security definer as $$\ndeclare\n  v_uid uuid;\n  v_existing jsonb;\n  v_patch jsonb := p_patch;\n  v_cur_num numeric;\n  v_new_num numeric;\n  k text;\nbegin\n  select id into v_uid from cn_profiles\n    where sync_key = p_sync_key limit 1;\n  if v_uid is null then\n    return json_build_object('ok',false,'error','invalid_key');\n  end if;\n\n  -- 같은 날짜 기존 페이로드 조회\n  select payload into v_existing\n    from diabetes_data where user_id = v_uid and date = p_date::date;\n\n  -- 누적값(steps/cal/bcal/dist)은 하루 안에서 감소하지 않도록 MAX 유지\n  if v_existing is not null then\n    foreach k in array array['steps','cal','bcal','dist'] loop\n      if (v_patch ? k) and (v_existing ? k) then\n        begin\n          v_cur_num := (v_existing->>k)::numeric;\n          v_new_num := (v_patch->>k)::numeric;\n          if v_cur_num > v_new_num then\n            v_patch := v_patch - k; -- 기존값이 더 크면 패치에서 제거\n          end if;\n        exception when others then\n          null; -- 숫자 변환 실패 시 그냥 새 값 적용\n        end;\n      end if;\n    end loop;\n  end if;\n\n  insert into diabetes_data (user_id, date, payload, updated_at)\n  values (v_uid, p_date::date, v_patch, now())\n  on conflict (user_id, date) do update set\n    payload = diabetes_data.payload || v_patch,\n    updated_at = now();\n  return json_build_object('ok', true);\nend;\n$$;`;

    React.useEffect(() => {
      supa.auth.getSession().then(({ data: { session } }) => {
        if (!session) return;
        supa.from('cn_profiles').select('sync_key').eq('id', session.user.id).maybeSingle()
          .then(({ data }) => { if (data?.sync_key) setSyncKey(data.sync_key); });
      }).catch(() => {});
    }, []);

    const cp = (text, label) => {
      navigator.clipboard?.writeText(text).then(() => {
        setCopied(label); setTimeout(() => setCopied(''), 2200);
      });
    };
    const btnStyle = (lbl) => ({
      padding:'5px 10px', borderRadius:'7px', fontSize:'11px', fontWeight:'700',
      border:'1px solid var(--cn-brand)', cursor:'pointer',

    );

      <div style={{ borderTop:'1px solid var(--divider)', padding:'12px 16px 0', maxWidth:'1140px', margin:'0 auto' }}>
        {/* 접기/펴기 헤더 */}
        <button onClick={() => setOpen(o => !o)}
          style={{ width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between',

          <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
            <span style={{ fontSize:'16px' }}>📲</span>

            <span style={{ fontSize:'11px', color:'var(--text-mute)', fontWeight:'400' }}>아이폰 건강앱 → 자동 저장</span>
          </div>
          <span style={{ fontSize:'18px', color:'var(--text-mute)', transform: open ? 'rotate(180deg)' : 'rotate(0deg)', transition:'transform 0.2s' }}>⌄</span>
        </button>

        {open && <div className="cn-card" style={{ padding:'16px', marginBottom:14 }}>
          <div style={{ fontSize:'11px', color:'var(--text-mute)', marginBottom:'16px', lineHeight:1.7,
            background:'var(--input-bg)', borderRadius:'8px', padding:'8px 10px', border:'1px solid var(--card-border)' }}>
            📱 아이폰 건강앱 데이터를 매일 자동으로 기록합니다.<br/>
            <span style={{ color:'var(--cn-brand)', fontWeight:700 }}>연동 키 하나</span>만 단축어에 넣으면 끝 — 토큰 갱신 불필요.
          </div>

          {/* STEP 1 — 관리자 전용 SQL */}
          <div style={{ marginBottom:'16px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'6px', marginBottom:'8px' }}>
              {stepNum('1', step1Done)}
              <span style={{ fontSize:'12px', fontWeight:'700', color:'var(--text)' }}>
                관리자 SQL 등록
                <span style={{ fontWeight:400, color:'var(--text-mute)', marginLeft:'4px' }}>(최초 1회, 관리자만)</span>
              </span>
            </div>
            <div style={{ fontSize:'11px', color:'var(--text-mute)', marginBottom:'8px', lineHeight:1.6 }}>
              <a href="https://supabase.com/dashboard/project/uvtrnkkzkxzujbvhhchl/sql/new" target="_blank" rel="noopener noreferrer"
                style={{ color:'var(--cn-brand)', fontWeight:700, textDecoration:'none' }}>Supabase SQL Editor ↗</a>에서 아래 SQL을 실행하세요. 사용자들은 건너뛰세요.
            </div>
            <div style={{ ...codeBox, maxHeight:'100px', overflow:'auto', whiteSpace:'pre', fontSize:'10px', lineHeight:1.7, marginBottom:'8px' }}>{SQL_TEXT}</div>
            <div style={{ display:'flex', gap:'6px' }}>
              <button onClick={() => cp(SQL_TEXT, 'sql')} style={{ ...btnStyle('sql'), flex:1 }}>
                {copied==='sql' ? '✓ 복사됨!' : '📋 SQL 복사'}
              </button>

                  color: step1Done ? 'var(--cn-ok)' : 'var(--text-mute)' }}>
                {step1Done ? '✓ 완료됨' : '실행 완료 표시'}
              </button>
            </div>
          </div>

          {/* STEP 2 — 연동 키 복사 (1개만) */}
          <div style={{ marginBottom:'16px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'6px', marginBottom:'8px' }}>
              {stepNum('2', false)}
              <span style={{ fontSize:'12px', fontWeight:'700', color:'var(--text)' }}>내 연동 키 복사</span>
            </div>
            {syncKey ? (
              <div>
                <div style={{ fontSize:'11px', color:'var(--text-mute)', marginBottom:'6px', lineHeight:1.5 }}>
                  이 키를 단축어 ⑤번 본문에 붙여넣으세요. <span style={{ color:'var(--cn-ok)', fontWeight:700 }}>만료 없음 — 재로그인해도 그대로 사용.</span>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                  <div style={{ ...codeBox, fontSize:'11px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                    height:'32px', lineHeight:'32px', padding:'0 10px', letterSpacing:'0.3px' }}>{syncKey}</div>
                  <button onClick={() => cp(syncKey, 'skey')} style={{ ...btnStyle('skey'), padding:'7px 14px' }}>
                    {copied==='skey' ? '✓ 복사!' : '복사'}

              </div>
            ) : (
              <div style={{ fontSize:'11px', color:'var(--text-mute)', padding:'10px', textAlign:'center',
                background:'var(--input-bg)', borderRadius:'8px' }}>
                ⏳ 관리자가 Step 1 SQL을 실행한 후 나타납니다.
              </div>

          </div>

          {/* STEP 3 — 단축어 설정 */}
          <div>
            <div style={{ display:'flex', alignItems:'center', gap:'6px', marginBottom:'8px' }}>
              {stepNum('3', false)}
              <span style={{ fontSize:'12px', fontWeight:'700', color:'var(--text)' }}>단축어 앱 설정</span>
            </div>
            <div style={{ fontSize:'11px', color:'var(--text-sub)', lineHeight:'1.85', background:'var(--bg)',

                  { n:'⑥', t:'URL의 내용 가져오기', d:'POST → ' + SUPA_URL + '/rest/v1/rpc/upsert_health_patch_v2\n헤더: apikey=' + SUPA_KEY + ', Content-Type=application/json\nJSON 본문: {"p_sync_key":"' + (syncKey||'[위에서 복사한 연동 키]') + '","p_date":"[today]","p_patch":{"steps":[steps],"cal":[cal],"bcal":[bcal],"dist":[dist]}}' },
                  { n:'⑦', t:'알림 표시', d:'"✅ 건강 데이터 저장됨"' },

                💡 <strong>기초 에너지(bcal)</strong>: Apple Watch 필수. iPhone 단독이면 0으로 올라가거나 비어있을 수 있어요 (생략 가능).<br/>
                💡 <strong>거리 단위</strong>: iPhone 건강앱 설정이 <strong>km</strong>인지 확인하세요 (설정 → 건강 → 단위).<br/>
                💡 <strong>총 소모 = 활동(cal) + 기초(bcal)</strong>: 대시보드 "총 소모" 카드에 합쳐 표시됩니다.

  /* ── 러닝/걷기 GPS 트래커 (V1) ───────────────────────────────────────────── */
  const haversine = (a, b) => {
    const R = 6371000, toR = d => d * Math.PI / 180;
    const dLat = toR(b.lat - a.lat), dLng = toR(b.lng - a.lng);
    const s = Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
    return 2 * R * Math.asin(Math.sqrt(s)); // meters
  };
  const fmtDur = (s) => {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
    return (h>0 ? `${h}:${String(m).padStart(2,'0')}` : `${m}`) + `:${String(sec).padStart(2,'0')}`;
  };
  const paceStr = (secPerKm) => {
    if (!isFinite(secPerKm) || secPerKm <= 0) return "--'--\"";
    const m = Math.floor(secPerKm/60), s = Math.round(secPerKm%60);
    return `${m}'${String(s).padStart(2,'0')}"`;
  };
  const speak = (text) => {
    try {
      if (!window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR'; u.rate = 1.0;
      window.speechSynthesis.speak(u);
    } catch {}
  };

  const RunTracker = ({ mode, onClose, onSave }) => {
    // mode: 'run' | 'walk'
    const [state, setState] = React.useState('idle'); // idle | running | paused | done
    const [dist, setDist]   = React.useState(0);   // meters
    const [elapsed, setElapsed] = React.useState(0); // seconds
    const [gpsOk, setGpsOk] = React.useState(null);
    const [msg, setMsg]     = React.useState('');
    const pointsRef = React.useRef([]);        // {lat,lng,ts}
    const distRef   = React.useRef(0);
    const lastKmRef = React.useRef(0);
    const runStartRef = React.useRef(0);
    const pausedAccumRef = React.useRef(0);   // 누적 일시정지 시간
    const pauseStartRef = React.useRef(0);
    const mapRef = React.useRef(null);
    const lineRef = React.useRef(null);
    const markerRef = React.useRef(null);
    const listenerRef = React.useRef(null);
    const timerRef = React.useRef(null);
    const stateRef = React.useRef('idle');
    stateRef.current = state;

    const RT = (window.Capacitor?.isNativePlatform?.()) ? window.Capacitor.Plugins?.RunTracker : null;

    // 지도 초기화
    React.useEffect(() => {
      if (!window.L) return;
      const m = window.L.map('run-map', { zoomControl:false, attributionControl:false }).setView([37.5665,126.9780], 16);
      window.L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(m);
      lineRef.current = window.L.polyline([], { color:'#2F6BFF', weight:5, lineJoin:'round' }).addTo(m);
      mapRef.current = m;
      setTimeout(() => m.invalidateSize(), 200);
      return () => { try { m.remove(); } catch {} };
    }, []);

    const onLocation = (pos) => {
      if (!pos || pos.accuracy > 35) return; // 정확도 낮으면 무시
      const p = { lat: pos.lat, lng: pos.lng, ts: pos.ts || Date.now() };
      const pts = pointsRef.current;
      if (pts.length) {
        const d = haversine(pts[pts.length-1], p);
        if (d < 1.5) return;             // 노이즈(정지 중 미세이동) 무시
        distRef.current += d;
        setDist(distRef.current);
      }
      pts.push(p);
      // 지도 갱신
      if (lineRef.current) lineRef.current.addLatLng([p.lat, p.lng]);
      if (mapRef.current) {
        mapRef.current.setView([p.lat, p.lng], mapRef.current.getZoom(), { animate:true });
        if (!markerRef.current) {
          markerRef.current = window.L.circleMarker([p.lat,p.lng], { radius:8, color:'#fff', weight:3, fillColor:'#2F6BFF', fillOpacity:1 }).addTo(mapRef.current);
        } else markerRef.current.setLatLng([p.lat,p.lng]);
      }
      setGpsOk(true);
      // km 음성 안내
      const km = Math.floor(distRef.current / 1000);
      if (km > lastKmRef.current) {
        lastKmRef.current = km;
        const secs = (Date.now() - runStartRef.current - pausedAccumRef.current) / 1000;
        const pace = secs / (distRef.current/1000);
        speak(`${km}킬로미터 통과. 평균 페이스 ${Math.floor(pace/60)}분 ${Math.round(pace%60)}초.`);
      }
    };

    const attachListener = async () => {
      if (RT) {
        listenerRef.current = await RT.addListener('location', onLocation);
      } else if (navigator.geolocation) {
        const id = navigator.geolocation.watchPosition(
          (p) => onLocation({ lat:p.coords.latitude, lng:p.coords.longitude, accuracy:p.coords.accuracy, ts:p.timestamp }),
          () => {}, { enableHighAccuracy:true, maximumAge:1000, timeout:10000 });
        listenerRef.current = { remove: () => navigator.geolocation.clearWatch(id) };
      }
    };
    const detachListener = () => { try { listenerRef.current?.remove?.(); } catch {} listenerRef.current = null; };

    const start = async () => {
      setMsg('📍 GPS 신호 잡는 중...');
      try {
        if (RT) { await RT.requestPerm(); await RT.start(); }
        await attachListener();
        runStartRef.current = Date.now();
        pausedAccumRef.current = 0;
        setState('running'); setMsg('');
        speak(mode === 'run' ? '달리기를 시작합니다.' : '걷기를 시작합니다.');
        timerRef.current = setInterval(() => {
          if (stateRef.current === 'running') {
            setElapsed((Date.now() - runStartRef.current - pausedAccumRef.current) / 1000);
          }
        }, 1000);
      } catch (e) { setMsg('❌ ' + (e?.message || 'GPS 시작 실패')); }
    };
    const pause = () => { pauseStartRef.current = Date.now(); setState('paused'); };
    const resume = () => { pausedAccumRef.current += Date.now() - pauseStartRef.current; setState('running'); };
    const finish = async () => {
      if (timerRef.current) clearInterval(timerRef.current);
      detachListener();
      try { if (RT) await RT.stop(); } catch {}
      setState('done');
      speak('운동을 종료합니다. 수고하셨어요.');
    };

    React.useEffect(() => () => { // 언마운트 정리
      if (timerRef.current) clearInterval(timerRef.current);
      detachListener();
      try { if (RT) RT.stop(); } catch {}
    }, []);

    const km = dist/1000;
    const pace = km > 0 ? elapsed / km : 0; // 초/km
    const speed = elapsed > 0 ? (km / (elapsed/3600)) : 0; // km/h

    const doSave = () => {
      onSave({
        mode, distance_km: Math.round(km*100)/100,
        duration_s: Math.round(elapsed),
        pace_sec_per_km: Math.round(pace),
        route: pointsRef.current.map(p => [Math.round(p.lat*1e5)/1e5, Math.round(p.lng*1e5)/1e5]),
        ts: Date.now()
      });
      onClose();
    };

    const bigStat = (val, label, unit) => (
      <div style={{ textAlign:'center', flex:1 }}>
        <div style={{ fontFamily:'var(--font-title)', fontSize:'34px', fontWeight:'700', color:'#fff', lineHeight:1.05 }}>{val}<span style={{fontSize:'15px', fontWeight:'600', opacity:0.8}}> {unit}</span></div>
        <div style={{ fontSize:'12px', color:'rgba(255,255,255,0.7)', fontWeight:'600', marginTop:'2px' }}>{label}</div>
      </div>
    );

    return (
      <div style={{ position:'fixed', inset:0, zIndex:6000, background:'#0B1B3B', display:'flex', flexDirection:'column' }}>
        {/* 지도 */}
        <div style={{ position:'relative', flex:1, minHeight:0 }}>
          <div id="run-map" style={{ position:'absolute', inset:0 }}></div>
          <button onClick={state==='running'||state==='paused' ? null : onClose} disabled={state==='running'||state==='paused'}
            style={{ position:'absolute', top:'calc(12px + env(safe-area-inset-top,0px))', left:'14px', zIndex:10,
              background:'rgba(11,27,59,0.85)', color:'#fff', border:'none', borderRadius:'50%', width:'40px', height:'40px',
              fontSize:'18px', cursor: state==='idle'||state==='done'?'pointer':'default', opacity: state==='running'||state==='paused'?0.4:1 }}>✕</button>
          {msg && <div style={{ position:'absolute', top:'calc(14px + env(safe-area-inset-top,0px))', left:'50%', transform:'translateX(-50%)', zIndex:10, background:'rgba(11,27,59,0.9)', color:'#fff', padding:'8px 16px', borderRadius:'20px', fontSize:'13px', fontWeight:'600' }}>{msg}</div>}
        </div>

        {/* 하단 패널 */}
        <div style={{ background:'linear-gradient(180deg,#0f2244,#0B1B3B)', padding:'20px 18px calc(24px + env(safe-area-inset-bottom,0px))', boxShadow:'0 -6px 24px rgba(0,0,0,0.4)' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:'8px', marginBottom:'16px' }}>
            <img src={mode==='run'?'icons/shoes.png':'icons/ic-steps.png'} style={{ width:'26px', height:'26px', objectFit:'contain' }} />
            <span style={{ fontFamily:'var(--font-title)', fontSize:'17px', fontWeight:'700', color:'#fff' }}>{mode==='run'?'달리기':'걷기'}</span>
          </div>
          <div style={{ display:'flex', marginBottom:'18px' }}>
            {bigStat(km.toFixed(2), '거리', 'km')}
            {bigStat(fmtDur(elapsed), '시간', '')}
            {bigStat(paceStr(pace), '평균 페이스', '/km')}
          </div>

          {state==='idle' && (
            <button onClick={start} style={{ width:'100%', padding:'16px', background:'var(--cn-brand)', color:'#fff', border:'none', borderRadius:'16px', fontSize:'17px', fontWeight:'800', cursor:'pointer' }}>
              ▶ 시작
            </button>
          )}
          {state==='running' && (
            <button onClick={pause} style={{ width:'100%', padding:'16px', background:'var(--cn-warn)', color:'#fff', border:'none', borderRadius:'16px', fontSize:'17px', fontWeight:'800', cursor:'pointer' }}>
              ⏸ 일시정지
            </button>
          )}
          {state==='paused' && (
            <div style={{ display:'flex', gap:'10px' }}>
              <button onClick={resume} style={{ flex:1, padding:'16px', background:'var(--cn-ok)', color:'#fff', border:'none', borderRadius:'16px', fontSize:'16px', fontWeight:'800', cursor:'pointer' }}>▶ 계속</button>
              <button onClick={finish} style={{ flex:1, padding:'16px', background:'var(--cn-danger)', color:'#fff', border:'none', borderRadius:'16px', fontSize:'16px', fontWeight:'800', cursor:'pointer' }}>■ 종료</button>
            </div>
          )}
          {state==='done' && (
            <div>
              <div style={{ textAlign:'center', color:'#fff', fontSize:'15px', marginBottom:'12px' }}>
                🎉 {km.toFixed(2)}km · {fmtDur(elapsed)} · 평균 {speed.toFixed(1)}km/h
              </div>
              <div style={{ display:'flex', gap:'10px' }}>
                <button onClick={onClose} style={{ flex:1, padding:'14px', background:'rgba(255,255,255,0.15)', color:'#fff', border:'none', borderRadius:'14px', fontSize:'15px', fontWeight:'700', cursor:'pointer' }}>취소</button>
                <button onClick={doSave} style={{ flex:2, padding:'14px', background:'var(--cn-brand)', color:'#fff', border:'none', borderRadius:'14px', fontSize:'15px', fontWeight:'800', cursor:'pointer' }}>운동 기록 저장</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  };

  const App = () => {

    // 비로그인 사용자에게 랜딩 페이지 먼저 보여주고, "시작하기" 누르면 로그인 화면으로
    const [showAuth,   setShowAuth]  = useState(false);
    const [date,       setDate]      = useState(todayStr());
    const [data,       setData]      = useState(() => { try { return normalizeData(JSON.parse(localStorage.getItem('dm_dash_v2')||'{}').data||{}); } catch { return {}; } });
    const [showImport, setShowImport] = useState(false);
    const [importTab,  setImportTab]  = useState('apple'); // 가져오기 모달 초기 탭

    const [medsConfig, setMedsConfig] = useState([]);
    /* ── 목표 설정 (걸음수·체중) ── */

    const [showGoals, setShowGoals] = useState(false);
    const goalsRef = useRef({ steps: 10000, weight: '' });
    useEffect(() => { goalsRef.current = goals; }, [goals]);
    const medsConfigRef = useRef([]);
    useEffect(() => { medsConfigRef.current = medsConfig; }, [medsConfig]);
    /* ── LibreLinkUp (리브레 CGM 자동 수집) ── */

    const [vitals, setVitals] = useState({}); // {weight,bodyFat,restingHR,hr,hrv,waterMl,sleepHours}

    // ── 돌봄 알림(P3): 앱 열 때 피보호자 복약 미완료·위험혈당이면 로컬 알림 (하루 1회) ──
    useEffect(() => {

            const title = `💙 ${w.name || '가족'} 돌봄 알림`;

    // 웹: 브라우저 Notification + 매 분 체크 (앱 켜져 있을 때만)
    useEffect(() => {
      const LN = (window.Capacitor?.isNativePlatform?.()) ? window.Capacitor.Plugins?.LocalNotifications : null;

      if (LN) {
        (async () => {
          try {
            if (localStorage.getItem('cn_notif_off') === '1') { // 사용자가 알림 끔
              const p = await LN.getPending();
              const ids = (p.notifications||[]).filter(n => n.id>=4000 && n.id<4100).map(n => ({id:n.id}));
              if (ids.length) await LN.cancel({ notifications: ids });
              return;
            }
            await LN.requestPermissions();
            // 기존 복약 알림(4000~4099) 취소 후 재예약
            const p = await LN.getPending();
            const old = (p.notifications||[]).filter(n => n.id>=4000 && n.id<4100).map(n => ({id:n.id}));
            if (old.length) await LN.cancel({ notifications: old });
            const notifs = [];
            medsConfig.forEach((slot, i) => {
              if (!slot.notifTime) return;
              const [h, m] = slot.notifTime.split(':').map(Number);
              if (isNaN(h) || isNaN(m)) return;
              const items = (slot.items||[]).filter(x => x.name && x.name.trim());
              if (!items.length) return;
              notifs.push({
                id: 4000 + i,
                title: `${slot.icon||'💊'} ${slot.slot} 복약 시간이에요`,
                body: items.map(x => `${x.name}${x.dose ? ' '+x.dose : ''}`).join(', '),
                schedule: { on: { hour: h, minute: m }, repeats: true },
                sound: 'default'
              });
            });
            if (notifs.length) await LN.schedule({ notifications: notifs });
          } catch (e) { console.log('복약 알림 예약 skip:', e?.message || e); }
        })();
        return;
      }

      // ── 웹 폴백: 매 분 체크 ──
      if (!medsConfig.length) return;
      const firedKey = new Set();
      const check = () => {
        if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
        if (localStorage.getItem('cn_notif_off') === '1') return;
        const now = new Date();
        const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        const key  = `${hhmm}_${now.toDateString()}`;
        medsConfig.forEach(slot => {
          if (!slot.notifTime || slot.notifTime !== hhmm) return;
          if (firedKey.has(key + slot.key)) return;
          firedKey.add(key + slot.key);
          const activeItems = (slot.items||[]).filter(m => isMedActive(m, now.toISOString().slice(0,10)));
          if (!activeItems.length) return;
          new Notification(`${slot.icon} ${slot.slot} 복약 시간이에요`, {
            body: activeItems.map(m => `💊 ${m.name} ${m.dose}`).join('\n'),
            icon: '/favicon-192.png', badge: '/favicon-192.png', tag: slot.key,
          });
        });
      };
      check();
      const timer = setInterval(check, 60000);
      return () => clearInterval(timer);
    }, [medsConfig]);

    // ── 일어서기·물마시기 리마인더 (네이티브, 낮 시간대 매시간 반복) ──

    /* ── 건강앱 체중/체지방 가져오기 (2MB 청크 스트리밍, 대용량 파일 지원) ── */
    const handleWeightImport = async (file) => {
      if (!file) return;
      setWeightImporting(true);
      setWeightImportMsg('파일 처리 중...');
      try {
        const CHUNK_SIZE = 2 * 1024 * 1024; // 2MB
        let getChunks, totalBytes;

        if (file.name.endsWith('.zip')) {
          setWeightImportMsg('ZIP 압축 해제 중... (잠시 기다려 주세요)');
          if (typeof JSZip === 'undefined') throw new Error('ZIP 라이브러리 로드 실패');
          const zip = await JSZip.loadAsync(file);
          const allFilesW = Object.keys(zip.files);
          const xmlFileW = allFilesW.find(name =>
            /export\.xml$/i.test(name) && !/cda/i.test(name)
          ) || allFilesW.find(name => /\.xml$/i.test(name) && !/cda/i.test(name));
          if (!xmlFileW) throw new Error('export.xml을 찾을 수 없어요');
          setWeightImportMsg('XML 추출 중... (압축 해제 중, 오래 걸릴 수 있어요)');
          // Blob으로 추출 → JS 힙 외부에 저장되어 메모리 효율적
          const xmlBlob = await zip.files[xmlFileW].async('blob');
          totalBytes = xmlBlob.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = xmlBlob.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else if (file.name.endsWith('.xml')) {
          totalBytes = file.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = file.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else {
          throw new Error('.zip 또는 .xml 파일을 선택해 주세요');
        }

        setWeightImportMsg('데이터 분석 중... 0%');
        const { weightByDay, bodyFatByDay, bpByDay = {} } = await parseAppleHealthXML(getChunks, totalBytes, (pct) => {
          setWeightImportMsg(`데이터 분석 중... ${pct}%`);
        });
        const wDays  = Object.keys(weightByDay).length;
        const bfDays = Object.keys(bodyFatByDay).length;
        const bpDays = Object.keys(bpByDay).length;
        if (!wDays && !bfDays && !bpDays) throw new Error('체중·체지방·혈압 데이터를 찾을 수 없어요.\n건강앱과 연동된 체성분/혈압 앱이 있는지 확인해 주세요.');
        // 가져온 데이터 병합
        const importedData = buildDashboardData({ glucoseByDay:{}, weightByDay, bodyFatByDay, bpByDay });
        await handleImport(importedData);
        const parts = [];
        if (wDays)  parts.push(`체중 ${wDays}일`);
        if (bfDays) parts.push(`체지방 ${bfDays}일`);
        if (bpDays) parts.push(`혈압 ${bpDays}일`);
        setWeightImportMsg(`✅ ${parts.join(' · ')} 가져오기 완료!`);
        setTimeout(() => { setWeightImportMsg(''); setWeightImporting(false); }, 3000);
      } catch(e) {
        setWeightImportMsg('❌ ' + (e.message || '가져오기 실패'));
        setTimeout(() => { setWeightImportMsg(''); setWeightImporting(false); }, 4000);
      }
      if (weightFileRef.current) weightFileRef.current.value = '';

    /* ── Supabase: 초기 데이터 로드 + URL 파라미터 단축어 연동 ── */
    useEffect(() => {
      // URL 파라미터 읽기 — userId가 비동기로 설정되므로 sessionStorage에 보존
      const params = new URLSearchParams(window.location.search);
      const w      = params.get('w');
      const bf     = params.get('bf');
      const bp     = params.get('bp');     // 혈압 (예: 120/80)
      const steps  = params.get('steps'); // 걸음수
      const cal    = params.get('cal');   // 활동 칼로리 (kcal)
      const bcal   = params.get('bcal');  // 기초대사량 (kcal) — Apple Watch "Basal Energy Burned"
      const dist   = params.get('dist'); // 거리 (km)
      const d  = params.get('d');  // 측정 날짜 (YYYY-MM-DD)
      const freshPatch = {};
      if (w  && !isNaN(parseFloat(w)))  freshPatch.weight  = String(parseFloat(w));
      if (bf && !isNaN(parseFloat(bf))) freshPatch.bodyFat = String(parseFloat(bf));
      if (steps && !isNaN(parseInt(steps)))   freshPatch.steps = String(Math.round(parseFloat(steps)));
      if (cal   && !isNaN(parseFloat(cal)))   freshPatch.cal   = String(Math.round(parseFloat(cal)));
      if (bcal  && !isNaN(parseFloat(bcal)))  freshPatch.bcal  = String(Math.round(parseFloat(bcal)));
      if (dist  && !isNaN(parseFloat(dist)))  freshPatch.dist  = String(Math.round(parseFloat(dist)*100)/100);
      if (bp) {
        const bpMatch = bp.match(/^(\d{1,3}(?:\.\d+)?)[\/\s](\d{1,3}(?:\.\d+)?)$/);
        if (bpMatch) freshPatch.bp = { sys: String(Math.round(parseFloat(bpMatch[1]))), dia: String(Math.round(parseFloat(bpMatch[2]))) };
      }
      const freshTarget = (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) ? d : todayStr();
      if (Object.keys(freshPatch).length) {
        // ① sessionStorage: 현재 세션용 보존 (userId 로드 전에 URL 사라져도 유지)
        sessionStorage.setItem('cn_url_patch', JSON.stringify({ patch: freshPatch, targetDate: freshTarget }));
        // ② localStorage: PWA/Safari 컨텍스트 분리 대응 — auth 없어도 즉시 로컬 반영
        try {
          const lc = JSON.parse(localStorage.getItem('dm_dash_v2') || '{}');
          const lcData = lc.data || {};
          const existing = lcData[freshTarget] || {};
          // bp는 병합, 나머지는 덮어쓰기
          const merged = { ...existing, ...freshPatch };
          if (freshPatch.bp && existing.bp) merged.bp = { ...existing.bp, ...freshPatch.bp };
          lcData[freshTarget] = merged;
          lc.data = lcData;
          localStorage.setItem('dm_dash_v2', JSON.stringify(lc));
          // 별도 "pending" 키에도 저장 — 나중에 Supabase 동기화 대기용
          localStorage.setItem('cn_pending_patch', JSON.stringify({ patch: freshPatch, targetDate: freshTarget, ts: Date.now() }));
        } catch {}
        window.history.replaceState({}, '', window.location.pathname);
        if (freshTarget !== todayStr()) setDate(freshTarget);
      }
      // sessionStorage에서 보존된 패치 꺼내기 (재실행 시에도 유효)
      let urlPatch = {}, targetDate = todayStr();
      try {
        const saved = sessionStorage.getItem('cn_url_patch');
        if (saved) { const p = JSON.parse(saved); urlPatch = p.patch; targetDate = p.targetDate; }
      } catch {}


      const load = async () => {
        setSyncing(true);
        try {
          // 1차: 현재 Supabase 로그인 계정(authUser.id)으로 조회
          const { data: rows, error } = await supa
            .from('diabetes_data')
            .select('date, payload')
            .eq('user_id', userId);
          if (error) throw error;
          const loaded = {};
          (rows || []).forEach(r => { if (r.date !== '_user_settings_') loaded[r.date] = r.payload; });

          // 2차 폴백: 데이터가 없고, 예전 UUID가 있으면 그걸로도 조회
          // (dm_user_id localStorage 키 또는 cn_legacy_uid 저장 키 모두 시도)
          if (Object.keys(loaded).length === 0) {
            const legacyId = localStorage.getItem('dm_user_id') || localStorage.getItem('cn_legacy_uid');
            if (legacyId && legacyId !== userId) {
              const { data: legacyRows } = await supa
                .from('diabetes_data')
                .select('date, payload')
                .eq('user_id', legacyId);
              (legacyRows || []).forEach(r => { if (r.date !== '_user_settings_') loaded[r.date] = r.payload; });
            }
          }

          // ✅ 로컬 캐시와 필드 단위 병합
          // - Supabase에 없는 날짜: 캐시 전체 사용
          // - Supabase에 있는 날짜: weight/bodyFat이 비어있으면 캐시에서 보완
          //   (건강앱 가져오기 후 saveAllToSupabase가 부분 실패해도 데이터 보존)
          try {
            const cached = JSON.parse(localStorage.getItem('dm_dash_v2') || '{}').data || {};
            Object.keys(cached).forEach(d => {
              if (!loaded[d]) {
                loaded[d] = cached[d];                   // 날짜 자체가 없으면 캐시로
              } else {
                const sb = loaded[d], lc = cached[d];
                // Supabase에 없는 필드만 캐시에서 보완 (weight/bodyFat/steps/cal/dist)
                if (!sb.weight  && lc?.weight)  loaded[d] = { ...sb, weight:  lc.weight  };
                if (!sb.bodyFat && lc?.bodyFat) loaded[d] = { ...loaded[d], bodyFat: lc.bodyFat };
                if (!sb.steps   && lc?.steps)   loaded[d] = { ...loaded[d], steps:   lc.steps   };
                if (!sb.cal     && lc?.cal)     loaded[d] = { ...loaded[d], cal:     lc.cal     };
                if (!sb.bcal    && lc?.bcal)    loaded[d] = { ...loaded[d], bcal:    lc.bcal    };
                if (!sb.dist    && lc?.dist)    loaded[d] = { ...loaded[d], dist:    lc.dist    };
              }
            });
          } catch {}

          // ✅ 건강앱 가져오기 전용 캐시도 항상 병합 (Supabase 동기화 실패 후 새로고침 시 복구)
          try {
            const imported = JSON.parse(localStorage.getItem('dm_imported') || '{}');
            Object.keys(imported).forEach(d => {
              if (!loaded[d]) {
                loaded[d] = imported[d];
              } else {
                if (!loaded[d].weight  && imported[d]?.weight)  loaded[d] = { ...loaded[d], weight:  imported[d].weight  };
                if (!loaded[d].bodyFat && imported[d]?.bodyFat) loaded[d] = { ...loaded[d], bodyFat: imported[d].bodyFat };
                if (!loaded[d].steps   && imported[d]?.steps)   loaded[d] = { ...loaded[d], steps:   imported[d].steps   };
                if (!loaded[d].cal     && imported[d]?.cal)     loaded[d] = { ...loaded[d], cal:     imported[d].cal     };
                if (!loaded[d].bcal    && imported[d]?.bcal)    loaded[d] = { ...loaded[d], bcal:    imported[d].bcal    };
                if (!loaded[d].dist    && imported[d]?.dist)    loaded[d] = { ...loaded[d], dist:    imported[d].dist    };
                // 혈압도 복구
                if (!(loaded[d].bp?.sys && loaded[d].bp?.dia) && imported[d]?.bp?.sys)
                  loaded[d] = { ...loaded[d], bp: imported[d].bp };
              }
            });
          } catch {}

          // ── pending patch (localStorage 경유 — Safari→PWA 크로스 컨텍스트) 처리
          try {
            const pending = JSON.parse(localStorage.getItem('cn_pending_patch') || 'null');
            // 24시간 이내 패치만 적용
            if (pending && pending.patch && (Date.now() - (pending.ts||0)) < 86400000) {
              const pd = pending.targetDate || todayStr();
              loaded[pd] = { ...(loaded[pd] || emptyDay()), ...pending.patch };
              // ① 로컬 캐시를 먼저 저장 — Supabase 실패해도 다음 로드 때 복구
              localStorage.setItem('dm_dash_v2', JSON.stringify({ data: loaded }));
              // ② Supabase에도 저장 (실패해도 무시 — 이미 로컬에 있음)
              let sbOk = false;
              try {
                const { error: puErr } = await supa.from('diabetes_data').upsert(
                  { user_id: userId, date: pd, payload: loaded[pd], updated_at: new Date().toISOString() },
                  { onConflict: 'user_id,date' }
                );
                sbOk = !puErr;
              } catch {}
              // Supabase에 성공 저장된 경우에만 pending 패치 제거
              if (sbOk) localStorage.removeItem('cn_pending_patch');
            }
          } catch {}

          if (Object.keys(urlPatch).length) {
            loaded[targetDate] = { ...(loaded[targetDate] || emptyDay()), ...urlPatch };
            sessionStorage.removeItem('cn_url_patch'); // 적용 완료 후 제거
            // ① 로컬 캐시를 먼저 저장 — Supabase 실패해도 다음 로드 때 복구
            localStorage.setItem('dm_dash_v2', JSON.stringify({ data: loaded }));
            // ② Supabase에도 즉시 저장 (iOS 백그라운드 전환 전에 완료)
            setSaveStatus('saving');
            try {
              await supa.from('diabetes_data').upsert(
                { user_id: userId, date: targetDate, payload: loaded[targetDate], updated_at: new Date().toISOString() },
                { onConflict: 'user_id,date' }
              );
              setSaveStatus('saved'); setTimeout(() => setSaveStatus('idle'), 3000);
            } catch(saveErr) {
              // 실패해도 로컬캐시에는 이미 저장됨
              setSaveStatus('idle');
            }
          }
          setData(normalizeData(loaded));
        } catch(e) {
          try {
            const s = localStorage.getItem('dm_dash_v2');
            const loaded = s ? (JSON.parse(s).data || {}) : {};
            if (Object.keys(urlPatch).length) {
              loaded[targetDate] = { ...(loaded[targetDate] || emptyDay()), ...urlPatch };
              sessionStorage.removeItem('cn_url_patch');
            }
            setData(normalizeData(loaded));
          } catch(e2) {}
        }
        setSyncing(false);
      };
      if (userId) load();
    }, [userId, refreshKey]);

    /* ── Supabase: 현재 날짜 데이터 저장 (디바운스 1.5초) ── */
    // 날짜가 바뀌면 이전 날짜를 즉시 Supabase에 flush (타이머 취소 방지)
    useEffect(() => {
      if (syncing || !userId) return;
      const prevDate = prevDateRef.current;
      if (prevDate && prevDate !== date && data[prevDate]) {
        // 날짜 전환 → 이전 날짜 즉시 저장
        (async () => {
          try {
            await supa.from('diabetes_data').upsert(
              { user_id: userId, date: prevDate, payload: data[prevDate], updated_at: new Date().toISOString() },
              { onConflict: 'user_id,date' }
            );
          } catch (e) { console.error('[flush] 이전날짜 저장 오류:', e); }
        })();
      }
      prevDateRef.current = date;
    }, [date]);

    useEffect(() => {
      if (syncing || !data[date] || !userId) return;
      // localStorage 캐시 업데이트
      localStorage.setItem('dm_dash_v2', JSON.stringify({ data, lastImport }));
      // Supabase 저장 (디바운스: 같은 날짜에서 연속 입력 시 마지막 1건만)
      if (saveTimer.current) clearTimeout(saveTimer.current);
      setSaveStatus('saving');
      saveTimer.current = setTimeout(async () => {
        try {
          const { error } = await supa.from('diabetes_data').upsert(
            { user_id: userId, date, payload: data[date], updated_at: new Date().toISOString() },
            { onConflict: 'user_id,date' }
          );
          if (error) throw error;
          setSaveStatus('saved');
          setTimeout(() => setSaveStatus('idle'), 2000);
        } catch(e) {
          setSaveStatus('error');
          setTimeout(() => setSaveStatus('idle'), 3000);
        }
      }, 1500);
    }, [data, date, loading]);

    /* ── 앱 종료/새로고침 시 미저장 데이터 flush ── */
    useEffect(() => {
      const handleUnload = () => {
        if (!userId || !date || !data[date]) return;
        // sendBeacon: 탭 닫힐 때도 전송 보장 (fetch보다 신뢰성 높음)
        const payload = JSON.stringify({
          user_id: userId, date, payload: data[date],
          updated_at: new Date().toISOString()
        });
        // localStorage는 반드시 최신으로 유지
        try { localStorage.setItem('dm_dash_v2', JSON.stringify({ data, lastImport })); } catch {}
      };
      window.addEventListener('beforeunload', handleUnload);
      window.addEventListener('pagehide', handleUnload); // iOS Safari용
      return () => {
        window.removeEventListener('beforeunload', handleUnload);
        window.removeEventListener('pagehide', handleUnload);
      };
    }, [userId, date, data, lastImport]);

    /* ── Supabase: 가져오기 후 여러 날 일괄 저장 ── */
    const saveAllToSupabase = async (newData) => {
      if (!userId) return;
      try {
        const rows = Object.entries(newData).map(([d, payload]) => ({
          user_id: userId, date: d, payload, updated_at: new Date().toISOString()
        }));
        if (!rows.length) return;
        // 50개씩 나눠서 upsert (Supabase 대용량 배치 실패 방지)
        const CHUNK = 50;
        for (let i = 0; i < rows.length; i += CHUNK) {
          await supa.from('diabetes_data').upsert(rows.slice(i, i + CHUNK), { onConflict: 'user_id,date' });
        }
      } catch(e) { console.error('일괄 저장 오류:', e); }
    };

    /* ── HealthKit 자동 동기화 (iOS 네이티브 앱 전용) ─────────────────────────
       앱 실행·포그라운드 복귀 시 오늘의 걸음수/활동·기초 칼로리/거리를 HealthKit에서
       읽어 자동 반영. Apple Watch 데이터도 HealthKit에 합산되어 함께 들어옴.
       누적값이므로 기존값보다 클 때만 갱신 (MAX 병합 — 감소 방지). ── */
    useEffect(() => {
      const HK = (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform())
        ? window.Capacitor.Plugins?.HealthActivity : null;
      if (!HK || !userId) return;
      let cancelled = false;

      const syncHK = async () => {
        try {
          // 권한 버전: readTypes가 바뀌면(예: 혈압 추가) 버전을 올려 재요청 → 새 항목 권한 노출
          if (localStorage.getItem('cn_hk_perm') !== 'v2') {
            await HK.requestAuth();
            localStorage.setItem('cn_hk_perm', 'v2');
          }
          const hk = await HK.getTodayActivity();
          if (cancelled || !hk) return;
          const t = todayStr();
          const num = v => (v !== '' && v != null && !isNaN(Number(v))) ? Number(v) : 0;
          setData(prev => {
            const cur = { ...emptyDay(), ...(prev[t] || {}) };
            const patch = {};
            if (Number(hk.steps || 0) > num(cur.steps)) patch.steps = String(Math.round(hk.steps));
            if (Number(hk.cal   || 0) > num(cur.cal))   patch.cal   = String(Math.round(hk.cal));
            if (Number(hk.bcal  || 0) > num(cur.bcal))  patch.bcal  = String(Math.round(hk.bcal));
            if (Number(hk.dist  || 0) > num(cur.dist))  patch.dist  = String(Math.round(hk.dist * 100) / 100);
            if (!Object.keys(patch).length) return prev;
            const merged = { ...cur, ...patch };
            // 선택 날짜와 무관하게 오늘 데이터를 Supabase에 바로 저장
            try {
              supa.from('diabetes_data').upsert(
                { user_id: userId, date: t, payload: merged, updated_at: new Date().toISOString() },
                { onConflict: 'user_id,date' }
              ).then(() => {});
            } catch {}
            return { ...prev, [t]: merged };
          });

          // ── 혈당(리브레 등 CGM이 애플 건강에 기록한 값) 자동 반영 ──
          try {
            const gRes = await HK.getRecentGlucose({ days: 3 });
            if (cancelled || !gRes?.readings?.length) return;
            const byDay = {};
            gRes.readings.forEach(r => {
              const d = new Date(r.ts);
              if (isNaN(d.getTime()) || !(r.mgdl > 0)) return;
              const day = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
              (byDay[day] = byDay[day] || []).push({ hour: d.getHours() + d.getMinutes()/60, value: Math.round(r.mgdl) });
            });
            if (Object.keys(byDay).length && handleImportRef.current) {
              const mapped = buildDashboardData({ glucoseByDay: byDay });
              await handleImportRef.current(mapped);
            }
          } catch (ge) { console.log('HealthKit glucose skip:', ge?.message || ge); }

          // ── 바이탈(체중·체지방·심박·HRV·수면·물) + 심전도 ──
          try {
            const v = await HK.getVitals();
            if (!cancelled && v) {
              setVitals(prev => ({ ...prev, ...v, at: Date.now() }));
              // 체중·체지방 오늘 값이 비어있으면 HealthKit 값으로 채움
              const t = todayStr();
              setData(prev => {
                const cur = { ...emptyDay(), ...(prev[t] || {}) };
                const patch = {};
                if (v.weight && !cur.weight)  patch.weight  = String(v.weight);
                if (v.bodyFat && !cur.bodyFat) patch.bodyFat = String(v.bodyFat);
                if (v.waterMl != null) patch.water_ml = String(Math.round(v.waterMl)); // HealthKit 물섭취 반영
                // 혈압(오므론 등 → 애플 건강): 오늘 혈압이 비어있으면 자동 채움
                if (v.bpSys && v.bpDia && !(cur.bp && cur.bp.sys)) patch.bp = { sys: String(Math.round(v.bpSys)), dia: String(Math.round(v.bpDia)) };
                if (!Object.keys(patch).length) return prev;
                const merged = { ...cur, ...patch };
                try { supa.from('diabetes_data').upsert({ user_id: userId, date: t, payload: merged, updated_at: new Date().toISOString() }, { onConflict:'user_id,date' }).then(()=>{}); } catch {}
                return { ...prev, [t]: merged };
              });
            }
          } catch (ve) { console.log('HealthKit vitals skip:', ve?.message || ve); }
          try {
            const e2 = await HK.getECG();
            if (!cancelled && e2?.available) setEcg({ ...e2, at: Date.now() });
          } catch {}
        } catch (e) { console.log('HealthKit sync skip:', e?.message || e); }
      };

      syncHK();
      const onVis = () => { if (document.visibilityState === 'visible') syncHK(); };
      document.addEventListener('visibilitychange', onVis);
      return () => { cancelled = true; document.removeEventListener('visibilitychange', onVis); };
    }, [userId]);

    const day = useMemo(() => normalizeDay(data[date]), [data, date]);
    const upDay = (patch) => setData(prev => ({ ...prev, [date]: { ...(prev[date] || emptyDay()), ...patch } }));
    const togMed  = (id) => upDay({ meds: { ...day.meds, [id]: !day.meds[id] } });
    const updBS   = (id, v) => upDay({ bs: { ...day.bs, [id]: v } });
    const updBP   = (k, v) => upDay({ bp: { ...(day.bp||{sys:'',dia:''}), [k]: v } });
    const updMeal = (id, v) => upDay({ meals: { ...day.meals, [id]: v } });
    const updEx       = (k, v) => upDay({ exercise: { ...(day.exercise||{}), [k]: v } });
    const addExLog    = (type='') => { const logs = [...(day.exercise?.logs||[]), {type, mins:''}]; upDay({ exercise: {...(day.exercise||{}), logs} }); };
    const updateExLog = (i,k,v)  => { const logs = (day.exercise?.logs||[]).map((l,idx)=>idx===i?{...l,[k]:v}:l); upDay({ exercise: {...(day.exercise||{}), logs} }); };
    const removeExLog = (i)      => { const logs = (day.exercise?.logs||[]).filter((_,idx)=>idx!==i); upDay({ exercise: {...(day.exercise||{}), logs} }); };
    // GPS 러닝/걷기 저장 — 운동 일지(logs)에 분 기록 + 상세(runs) 별도 보관
    const saveRun = (r) => {
      const mins = Math.max(1, Math.round(r.duration_s/60));
      const label = r.mode === 'run' ? '달리기(GPS)' : '걷기(GPS)';
      const ex = day.exercise || {};
      const logs = [...(ex.logs||[]), { type: label, mins: String(mins) }];
      const runs = [...(ex.runs||[]), r];
      upDay({ exercise: { ...ex, logs, runs } });
    };

    /* 가져오기: 기존 수동 입력 유지, 빈 슬롯만 채움 */
    const handleImport = async (importedData) => {
      // data 클로저를 직접 사용해 merged를 동기적으로 계산 (setState 콜백 의존 X)
      const next = { ...data };
      const merged = {};
      Object.entries(importedData).forEach(([d, imported]) => {
        if (!next[d]) { next[d] = imported; }
        else {
          const ex = next[d];
          next[d] = {
            ...ex,
            bs: { ...imported.bs, ...ex.bs },
            weight:  ex.weight  || imported.weight  || '',
            bodyFat: ex.bodyFat || imported.bodyFat || '',
            bp:      (ex.bp?.sys && ex.bp?.dia) ? ex.bp : (imported.bp || ex.bp || {sys:'',dia:''}),
            // 걸음수/칼로리/거리/기초대사량: 건강앱 값이 더 정확하므로 있으면 덮어씀
            steps: imported.steps || ex.steps || '',
            cal:   imported.cal   || ex.cal   || '',
