    };

    /* ── 건강앱 체중/체지방 가져오기 (2MB 청크 스트리밍, 대용량 파일 지원) ── */
    const handleWeightImport = async (file) => {
      if (!file) return;
      setWeightImporting(true);
      setWeightImportMsg('파일 처리 중...');
      try {
        const CHUNK_SIZE = 2 * 1024 * 1024; // 2MB
        let getChunks, totalBytes;

        if (file.name.endsWith('.zip')) {
          setWeightImportMsg('ZIP 압축 해제 중... (잠시 기다려 주세요)');
          if (typeof JSZip === 'undefined') throw new Error('ZIP 라이브러리 로드 실패');
          const zip = await JSZip.loadAsync(file);
          const allFilesW = Object.keys(zip.files);
          const xmlFileW = allFilesW.find(name =>
            /export\.xml$/i.test(name) && !/cda/i.test(name)
          ) || allFilesW.find(name => /\.xml$/i.test(name) && !/cda/i.test(name));
          if (!xmlFileW) throw new Error('export.xml을 찾을 수 없어요');
          setWeightImportMsg('XML 추출 중... (압축 해제 중, 오래 걸릴 수 있어요)');
          // Blob으로 추출 → JS 힙 외부에 저장되어 메모리 효율적
          const xmlBlob = await zip.files[xmlFileW].async('blob');
          totalBytes = xmlBlob.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = xmlBlob.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else if (file.name.endsWith('.xml')) {
          totalBytes = file.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = file.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else {
          throw new Error('.zip 또는 .xml 파일을 선택해 주세요');
        }

        setWeightImportMsg('데이터 분석 중... 0%');
        const { weightByDay, bodyFatByDay } = await parseAppleHealthXML(getChunks, totalBytes, (pct) => {
          setWeightImportMsg(`데이터 분석 중... ${pct}%`);
        });
        const wDays = Object.keys(weightByDay).length;
        const bfDays = Object.keys(bodyFatByDay).length;
        if (!wDays && !bfDays) throw new Error('체중·체지방 데이터를 찾을 수 없어요.\n체성분 앱이 건강앱과 연동되어 있는지 확인해 주세요.');
        // 가져온 데이터 병합
        const importedData = buildDashboardData({ glucoseByDay:{}, weightByDay, bodyFatByDay });
        await handleImport(importedData);
        setWeightImportMsg(`✅ 체중 ${wDays}일 · 체지방 ${bfDays}일 가져오기 완료!`);
        setTimeout(() => { setWeightImportMsg(''); setWeightImporting(false); }, 3000);
      } catch(e) {
        setWeightImportMsg('❌ ' + (e.message || '가져오기 실패'));
        setTimeout(() => { setWeightImportMsg(''); setWeightImporting(false); }, 4000);
      }
      if (weightFileRef.current) weightFileRef.current.value = '';
    };

    /* ── Supabase: 초기 데이터 로드 + URL 파라미터 단축어 연동 ── */
    useEffect(() => {
      // URL 파라미터 먼저 읽어두기 (Supabase 로드 전에 저장)
      const params = new URLSearchParams(window.location.search);
      const w  = params.get('w');
      const bf = params.get('bf');
      const d  = params.get('d');  // 측정 날짜 (YYYY-MM-DD)
      const urlPatch = {};
      if (w  && !isNaN(parseFloat(w)))  urlPatch.weight  = String(parseFloat(w));
      if (bf && !isNaN(parseFloat(bf))) urlPatch.bodyFat = String(parseFloat(bf));
      // 날짜 파라미터 검증 (YYYY-MM-DD 형식)
      const targetDate = (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) ? d : todayStr();
      if (Object.keys(urlPatch).length) {
        window.history.replaceState({}, '', window.location.pathname);
        // 날짜가 오늘이 아니면 해당 날짜 페이지로 이동
        if (targetDate !== todayStr()) setDate(targetDate);
      }

      const load = async () => {
        setLoading(true);
        setSyncing(true);
        try {
          const { data: rows, error } = await supa
            .from('diabetes_data')
            .select('date, payload')
            .eq('user_id', userId);
          if (error) throw error;
          const loaded = {};
          (rows || []).forEach(r => { loaded[r.date] = r.payload; });
          if (Object.keys(urlPatch).length) {
            loaded[targetDate] = { ...(loaded[targetDate] || emptyDay()), ...urlPatch };
          }
          setData(loaded);
        } catch(e) {
          try {
            const s = localStorage.getItem('dm_dash_v2');
            const loaded = s ? (JSON.parse(s).data || {}) : {};
            if (Object.keys(urlPatch).length) {
              loaded[targetDate] = { ...(loaded[targetDate] || emptyDay()), ...urlPatch };
            }
            setData(loaded);
          } catch(e2) {}
        }
        setLoading(false);
        setSyncing(false);
      };
      if (userId) load();
    }, [userId, refreshKey]);

    /* ── Supabase: 현재 날짜 데이터 저장 (디바운스 1.5초) ── */
    useEffect(() => {
      if (loading || !data[date]) return;
      // localStorage 캐시 업데이트
      localStorage.setItem('dm_dash_v2', JSON.stringify({ data, lastImport }));
      // Supabase 저장
      if (saveTimer.current) clearTimeout(saveTimer.current);
      setSaveStatus('saving');
      saveTimer.current = setTimeout(async () => {
        try {
          const { error } = await supa.from('diabetes_data').upsert(
            { user_id: userId, date, payload: data[date], updated_at: new Date().toISOString() },
            { onConflict: 'user_id,date' }
          );
          if (error) throw error;
          setSaveStatus('saved');
          setTimeout(() => setSaveStatus('idle'), 2000);
        } catch(e) {
          setSaveStatus('error');
          setTimeout(() => setSaveStatus('idle'), 3000);
        }
      }, 1500);
    }, [data, date, loading]);

    /* ── Supabase: 가져오기 후 여러 날 일괄 저장 ── */
    const saveAllToSupabase = async (newData) => {
      try {
        const rows = Object.entries(newData).map(([d, payload]) => ({
          user_id: userId, date: d, payload, updated_at: new Date().toISOString()
        }));
        if (rows.length) await supa.from('diabetes_data').upsert(rows, { onConflict: 'user_id,date' });
      } catch(e) { console.error('일괄 저장 오류:', e); }
    };

    const day = useMemo(() => data[date] || emptyDay(), [data, date]);
    const upDay = (patch) => setData(prev => ({ ...prev, [date]: { ...(prev[date] || emptyDay()), ...patch } }));
    const togMed  = (id) => upDay({ meds: { ...day.meds, [id]: !day.meds[id] } });
    const updBS   = (id, v) => upDay({ bs: { ...day.bs, [id]: v } });
    const updMeal = (id, v) => upDay({ meals: { ...day.meals, [id]: v } });
    const updEx   = (k, v) => upDay({ exercise: { ...day.exercise, [k]: v } });

    /* 가져오기: 기존 수동 입력 유지, 빈 슬롯만 채움 */
    const handleImport = async (importedData) => {
      const merged = {};
      setData(prev => {
        const next = { ...prev };
        Object.entries(importedData).forEach(([d, imported]) => {
          if (!next[d]) { next[d] = imported; }
          else {
            const ex = next[d];
            next[d] = {
              ...ex,
              bs: { ...imported.bs, ...ex.bs },
              weight:  ex.weight  || imported.weight  || '',
              bodyFat: ex.bodyFat || imported.bodyFat || ''
            };
          }
          merged[d] = next[d];
        });
        return next;
      });
      setLastImport(new Date().toLocaleString('ko-KR'));
      await saveAllToSupabase(merged);
    };

    /* medsConfig 저장 */
    // 복약 설정: 유저별 로드 (userId 확정 후)
    // ⚠️ localStorage에 저장된 값이 없으면 빈 배열로 시작 (신규 가입자는 직접 입력)
    useEffect(() => {
      if (!userId) return;
      try {
        const s = localStorage.getItem(`hcd_meds_config_${userId}`);
        setMedsConfig(s ? JSON.parse(s) : []);
      } catch { setMedsConfig([]); }
    }, [userId]);

    // 복약 설정: 유저별 저장
    useEffect(() => {
      if (!userId) return;
      localStorage.setItem(`hcd_meds_config_${userId}`, JSON.stringify(medsConfig));
    }, [medsConfig, userId]);
    const saveMeds = (cfg) => { setMedsConfig(cfg); setShowMedSettings(false); };

    /* Stats */
    const allMedIds = useMemo(() => medsConfig.flatMap(s => s.items.map(m => m.id)), [medsConfig]);
    const medDone = allMedIds.filter(id => day.meds[id]).length;
    const medPct  = allMedIds.length ? Math.round((medDone / allMedIds.length) * 100) : 0;
    const bsVals  = Object.values(day.bs).filter(v => parseInt(v) > 0);
    const bsAvg   = bsVals.length ? Math.round(bsVals.reduce((a,b) => a+parseInt(b), 0) / bsVals.length) : null;

    /* Weekly chart */
    const weekData = useMemo(() => Array.from({length:7}, (_,i) => {
      const d = shiftDate(date, i-6);
      const dd = data[d] || emptyDay();
      const vals = Object.values(dd.bs).filter(v => parseInt(v) > 0);
      return { label: fmtDate(d).short, avg: vals.length ? Math.round(vals.reduce((a,b)=>a+parseInt(b),0)/vals.length) : null };
    }), [data, date]);

    useEffect(() => {
      if (!chartRef.current) return;
      if (chartInst.current) { chartInst.current.destroy(); chartInst.current = null; }
      chartInst.current = new Chart(chartRef.current, {
        type: 'line',
        data: {
          labels: weekData.map(d => d.label),
          datasets: [{
            label: '평균 혈당', data: weekData.map(d => d.avg),
            borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.08)',
            borderWidth: 2.5, pointBackgroundColor: weekData.map(d => bsColor(d.avg)),
            pointRadius: 5, fill: true, tension: 0.35, spanGaps: true
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend:{display:false}, tooltip:{ callbacks:{ label: c => c.raw ? `${c.raw} mg/dL` : '기록 없음' } } },
          scales: {
            y: { min:50, max:320, grid:{color:'#f1f5f9'}, ticks:{font:{size:11}} },
            x: { grid:{display:false}, ticks:{font:{size:11}} }
          }
        }
      });
      return () => { if(chartInst.current){chartInst.current.destroy(); chartInst.current=null;} };
    }, [weekData]);

    const isToday = date === todayStr();

    // 인증 로딩 중
    if (!authReady) return (
      <div style={{ minHeight:'100vh', background:'var(--bg)', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ textAlign:'center', color:'var(--text-sub)' }}>
          <CareNoteLogo size={56} />
          <div style={{ fontSize:'19px', fontWeight:'700', color:'var(--text)', marginTop:'14px' }}>CARENOTE</div>
          <div style={{ fontSize:'14px', marginTop:'6px' }}>로딩 중...</div>
        </div>
      </div>
    );

    // 미인증 → 로그인 화면
    if (!authUser) return <LoginScreen />;

    return (
      <div style={{ minHeight:'100vh', background:'var(--bg)', paddingBottom:'48px' }}>

        {/* ── CARENOTE Header ── */}
        <div style={{ background: darkMode ? 'linear-gradient(135deg,#020617 0%,#0f172a 100%)' : 'linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)', padding:'10px 20px', boxShadow:'0 2px 14px rgba(0,0,0,0.45)', position:'sticky', top:0, zIndex:100 }}>

          {/* ─ 1행: 로고+브랜드 · 날짜 · 유저 ─ */}
          <div style={{ maxWidth:'1140px', margin:'0 auto', display:'flex', alignItems:'center', justifyContent:'space-between', gap:'10px' }}>

            {/* 로고 + 사이트명 + 슬로건 */}
            <div style={{ display:'flex', alignItems:'center', gap:'10px', flexShrink:0 }}>
              <CareNoteLogo size={40} />
              <div>
                <div style={{ fontSize:'19px', fontWeight:'800', color:'#fff', letterSpacing:'0.5px', lineHeight:'1.15' }}>CARENOTE</div>
                <div style={{ fontSize:'11px', color:'rgba(147,197,253,0.8)', fontWeight:'500', letterSpacing:'0.2px', marginTop:'1px' }}>내 몸을 기록하는 노트</div>
              </div>
              <div style={{ marginLeft:'6px', display:'flex', gap:'5px', alignItems:'center' }}>
                {saveStatus==='saving' && <span style={{ fontSize:'12px', color:'rgba(255,255,255,0.6)' }}>저장 중...</span>}
                {saveStatus==='saved'  && <span style={{ fontSize:'12px', color:'#86efac' }}>✓ 저장됨</span>}
                {saveStatus==='error'  && <span style={{ fontSize:'12px', color:'#fca5a5' }}>⚠ 저장 실패</span>}
              </div>
            </div>

            {/* 날짜 네비 */}
            <div style={{ display:'flex', alignItems:'center', gap:'8px', flexShrink:0 }}>
              <button onClick={() => setDate(shiftDate(date,-1))} style={navBtnSt}>‹</button>
              <div style={{ textAlign:'center', minWidth:'164px' }}>
                <div style={{ color:'#fff', fontWeight:'700', fontSize:'14px', whiteSpace:'nowrap' }}>{fmtDate(date).full}</div>
                {!isToday && <button onClick={() => setDate(todayStr())} style={{ background:'rgba(255,255,255,0.2)', border:'1px solid rgba(255,255,255,0.35)', color:'#fff', borderRadius:'6px', padding:'2px 8px', fontSize:'12px', cursor:'pointer', marginTop:'2px' }}>오늘로 이동</button>}
              </div>
              <button onClick={() => setDate(shiftDate(date,1))} style={navBtnSt}>›</button>
            </div>

            {/* 다크모드 토글 + 이메일 + 로그아웃 */}
            <div style={{ display:'flex', alignItems:'center', gap:'8px', flexShrink:0 }}>
              {/* 다크모드 토글 */}
              <button onClick={() => { _dm=!_dm; document.body.classList.toggle('dark',_dm); localStorage.setItem('cn_dark',_dm?'1':'0'); setDarkMode(_dm); }}
                title={darkMode ? '라이트 모드로 전환' : '다크 모드로 전환'}
                style={{ background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)', color:'#fff', borderRadius:'20px', padding:'4px 12px', cursor:'pointer', fontSize:'13px', fontWeight:'600', whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:'5px' }}>
                {darkMode ? '☀️ 라이트' : '🌙 다크'}
              </button>
              <div style={{ display:'flex', alignItems:'center', gap:'6px', background:'rgba(0,0,0,0.2)', borderRadius:'8px', padding:'4px 10px' }}>
                <span style={{ fontSize:'12px', color:'rgba(255,255,255,0.8)', maxWidth:'140px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                  {authUser.email}
                </span>
                <button onClick={() => supa.auth.signOut()} style={{ background:'rgba(255,255,255,0.18)', border:'none', color:'#fff', borderRadius:'6px', padding:'3px 8px', cursor:'pointer', fontSize:'12px', fontWeight:'700', whiteSpace:'nowrap' }}>
                  로그아웃
                </button>
              </div>
            </div>
          </div>

          {/* ─ 2행: 복약·혈당 현황 + 기능 버튼 ─ */}
          <div style={{ maxWidth:'1140px', margin:'7px auto 0', display:'flex', alignItems:'center', gap:'8px', flexWrap:'nowrap', borderTop:'1px solid rgba(255,255,255,0.08)', paddingTop:'7px' }}>
            <span style={{ background: medPct===100?'rgba(22,163,74,0.85)':'rgba(255,255,255,0.15)', color:'#fff', borderRadius:'20px', padding:'3px 12px', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap', flexShrink:0 }}>
              💊 {medDone}/{allMedIds.length} 완료
            </span>
            {bsAvg && <span style={{ background: bsColor(bsAvg), color:'#fff', borderRadius:'20px', padding:'3px 12px', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap', flexShrink:0 }}>🩸 {bsAvg} mg/dL · {bsLabel(bsAvg)}</span>}
            <div style={{ flex:1 }} />
            <button onClick={() => setShowMedSettings(true)} style={{ background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)', color:'#fff', borderRadius:'7px', padding:'4px 12px', cursor:'pointer', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap', flexShrink:0 }}>
              ⚙️ 복약설정
            </button>
            <button onClick={() => setShowImport(true)} style={{ background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)', color:'#fff', borderRadius:'7px', padding:'4px 12px', cursor:'pointer', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap', flexShrink:0 }}>
              📱 가져오기
            </button>
            <button onClick={() => setRefreshKey(k => k + 1)} disabled={syncing}
              style={{ background: syncing ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)', color: syncing ? 'rgba(255,255,255,0.45)' : '#fff', borderRadius:'7px', padding:'4px 12px', cursor: syncing ? 'default' : 'pointer', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap', flexShrink:0 }}>
              {syncing ? '⏳ 로딩중...' : '🔄 새로고침'}
            </button>
            {isAdmin && (
              <button onClick={() => setShowAdmin(true)}
                style={{ background:'rgba(255,165,0,0.2)', border:'1px solid rgba(255,165,0,0.4)', color:'#fbbf24', borderRadius:'7px', padding:'4px 12px', cursor:'pointer', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap', flexShrink:0 }}>
                🛠️ 관리자
              </button>
            )}
            {lastImport && <span style={{ fontSize:'12px', color:'rgba(255,255,255,0.45)', whiteSpace:'nowrap', flexShrink:0 }}>마지막: {lastImport}</span>}
          </div>
        </div>

        {/* Banner: 헤더 바로 아래 */}
        <BannerSlot slotId="top" />

        {/* Main */}
        <div style={{ maxWidth:'1140px', margin:'0 auto', padding:'22px 16px' }}>
          <div className="main-grid" style={{ display:'grid', gridTemplateColumns:'1fr 330px', gap:'18px' }}>

            {/* ── LEFT ── */}
            <div>
              {/* 복약 */}
              <Card>
                <STitle icon="💊" label="오늘의 복약 체크리스트" right={`${medDone}/${allMedIds.length} 완료`} />
                <div style={{ background:'#e2e8f0', borderRadius:'6px', height:'6px', marginBottom:'16px', overflow:'hidden' }}>
                  <div style={{ width:`${medPct}%`, height:'100%', borderRadius:'6px', background:medPct===100?'#16a34a':'#2563eb', transition:'width 0.5s ease' }}/>
                </div>
                {medsConfig.length === 0 && (
                  <div style={{ textAlign:'center', padding:'28px 16px', background:'var(--input-bg)', borderRadius:'12px', border:'1.5px dashed var(--card-border)' }}>
                    <div style={{ fontSize:'32px', marginBottom:'10px' }}>💊</div>
                    <div style={{ fontSize:'15px', fontWeight:'700', color:'var(--text)', marginBottom:'6px' }}>복약 정보가 없어요</div>
                    <div style={{ fontSize:'13px', color:'var(--text-sub)', marginBottom:'14px' }}>복용 중인 약을 등록하면 매일 체크할 수 있어요</div>
                    <button onClick={() => setShowMedSettings(true)}
                      style={{ background:'#2563eb', color:'#fff', border:'none', borderRadius:'8px', padding:'8px 20px', cursor:'pointer', fontSize:'13px', fontWeight:'700' }}>
                      ⚙️ 복약 설정하기
                    </button>
                  </div>
                )}
                {medsConfig.map(slot => {
                  const activeItems = slot.items.filter(med => {
                    if (med.startDate && date < med.startDate) return false;
                    if (med.endDate   && date > med.endDate)   return false;
                    return true;
                  });
                  if (!activeItems.length) return null;
                  return (
                  <div key={slot.key} style={{ background:slot.bg, border:`1px solid ${slot.border}`, borderRadius:'10px', padding:'12px 14px', marginBottom:'10px' }}>
                    <div style={{ fontSize:'16px', fontWeight:'800', color:slot.color, marginBottom:'8px', display:'flex', gap:'6px', alignItems:'center' }}>
                      {slot.icon} {slot.slot}
                    </div>
                    {activeItems.map(med => (
                      <div key={med.id} style={{ display:'flex', alignItems:'center', gap:'10px', padding:'5px 0', borderTop:'1px solid rgba(0,0,0,0.05)' }}>
                        <input type="checkbox" className="med-checkbox" checked={!!day.meds[med.id]} onChange={() => togMed(med.id)} />
                        <label onClick={() => togMed(med.id)} style={{ flex:1, cursor:'pointer' }}>
                          <div style={{ fontSize:'14px', fontWeight:'600', color:day.meds[med.id]?'#94a3b8':'#1e293b', textDecoration:day.meds[med.id]?'line-through':'none', transition:'all 0.2s' }}>{med.name}</div>
                          <div style={{ fontSize:'14px', color:'var(--text-sub)' }}>{med.dose}</div>
                        </label>
                        <button onClick={e => { e.stopPropagation(); setDrugInfoModal(med.name); }} title="약 정보 보기"
                          style={{ background:dm?'#0c1a2e':'#eff6ff', border:'1px solid #bfdbfe', borderRadius:'6px', cursor:'pointer', fontSize:'14px', color:'#2563eb', padding:'3px 8px', flexShrink:0, fontWeight:'600' }}>약정보</button>
                        {day.meds[med.id] && <span style={{ color:'#16a34a', fontSize:'14px' }}>✓</span>}
                      </div>
                    ))}
                  </div>
                  );
                })}
              </Card>

              {/* Banner: 복약 체크리스트 아래 */}
              <BannerSlot slotId="after_meds" />

              {/* 혈당 */}
              <Card>
                <STitle icon="🩸" label="혈당 기록" right="단위: mg/dL" />
                <div style={{ display:'flex', gap:'10px', marginBottom:'14px', flexWrap:'wrap', fontSize:'16px' }}>
                  {[{c:'#7c3aed',t:'저혈당 (<70)'},{c:'#16a34a',t:'정상 (70–140)'},{c:'#d97706',t:'주의 (140–180)'},{c:'#dc2626',t:'높음 (>180)'}].map(l => (
                    <div key={l.t} style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                      <div style={{ width:'9px', height:'9px', borderRadius:'50%', background:l.c }}/>
                      <span style={{ color:'var(--text-sub)' }}>{l.t}</span>
                    </div>
                  ))}
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:'10px' }}>
                  {BS_FIELDS.map(f => {
                    const v = day.bs[f.id] || ''; const c = bsColor(v);
                    return (
                      <div key={f.id} style={{ background:'var(--input-bg)', borderRadius:'10px', padding:'12px', border:v?`2px solid ${c}`:'1px solid #e2e8f0', transition:'border-color 0.2s' }}>
                        <div style={{ fontSize:'16px', color:'var(--text-sub)', marginBottom:'6px' }}>{f.icon} {f.label}</div>
                        <div style={{ display:'flex', alignItems:'flex-end', gap:'6px' }}>
                          <input type="number" min="30" max="600" value={v} onChange={e=>updBS(f.id,e.target.value)} placeholder="---"
                            style={{ width:'72px', border:'none', background:'transparent', fontSize:'14px', fontWeight:'800', color:v?c:'#cbd5e1', outline:'none', padding:0 }} />
                          {v && <div style={{ paddingBottom:'3px' }}><div style={{ fontSize:'14px', color:'var(--text-sub)' }}>mg/dL</div><div style={{ fontSize:'16px', color:c, fontWeight:'700' }}>{bsLabel(v)}</div></div>}
                        </div>
                        <div style={{ fontSize:'14px', color:dm?'#475569':'#cbd5e1', marginTop:'4px' }}>목표: {f.target}</div>
                      </div>
                    );
                  })}
                </div>
              </Card>

              {/* Banner: 혈당 입력 아래 */}
              <BannerSlot slotId="after_bs" />

              {/* 식사 */}
              <Card>
                <STitle icon="🍽️" label="식사 기록" />
                <div style={{ background:dm?'#0a1f12':'#f0fdf4', border:'1px solid #86efac', borderRadius:'10px', padding:'12px 14px', marginBottom:'12px', fontSize:'14px' }}>
                  <div style={{ fontWeight:'700', color:'#16a34a', marginBottom:'8px' }}>💡 당뇨 식단 가이드</div>
                  <div style={{ display:'flex', gap:'20px', flexWrap:'wrap' }}>
                    <div><div style={{ color:'#16a34a', fontWeight:'700', marginBottom:'3px' }}>✅ 권장</div><div style={{ color:'var(--text)', lineHeight:'1.8' }}>현미·잡곡밥 · 닭가슴살 · 두부 · 생선<br/>채소류 · 달걀 · 콩류 · 견과류(소량)</div></div>
                    <div><div style={{ color:'#dc2626', fontWeight:'700', marginBottom:'3px' }}>❌ 제한</div><div style={{ color:'var(--text)', lineHeight:'1.8' }}>흰쌀밥 · 흰빵 · 라면 · 과자<br/>사탕·주스 · 탄산음료 · 술</div></div>
                  </div>
                </div>
                <div style={{ background:dm?'#1f1a00':'#fffbeb', border:dm?'1px solid #92400e':'1px solid #fcd34d', borderRadius:'10px', padding:'12px 14px', marginBottom:'14px', fontSize:'14px' }}>
                  <div style={{ fontWeight:'700', color:dm?'#fcd34d':'#92400e', marginBottom:'5px' }}>📝 식단 기입 방법</div>
                  <div style={{ color:dm?'#fde68a':'#78350f', lineHeight:'1.8' }}>
                    <strong>형식:</strong> 음식명 + 양 + 탄수화물(g)<br/>
                    <strong>예:</strong> 현미밥 반공기(30g), 닭가슴살 100g, 브로콜리 1컵<br/>
                    <strong>한 끼 탄수화물 목표:</strong> 45–60g (하루 130–180g)
                  </div>
                </div>
                {MEALS.map(m => (
                  <div key={m.id} style={{ marginBottom:'16px' }}>
                    {/* 라벨 + 사진 버튼 */}
                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'6px', flexWrap:'wrap', gap:'6px' }}>
                      <div style={{ fontSize:'16px', fontWeight:'700', color:'var(--text)' }}>{m.icon} {m.label}</div>
                      {analyzing===m.id ? (
                        <span style={{ fontSize:'14px', color:'#7c3aed', fontWeight:'700' }}>⏳ 분석 중...</span>
                      ) : (
                        <div style={{ display:'flex', gap:'6px' }}>
                          {/* 카메라 촬영 */}
                          <button onClick={() => camRefs[m.id].current?.click()} disabled={!!analyzing}
                            style={{ background:dm?'#1a1030':'#faf5ff', border:dm?'1px solid #4c1d95':'1px solid #c4b5fd', color:'#7c3aed', borderRadius:'8px', padding:'5px 11px', cursor:'pointer', fontSize:'14px', fontWeight:'700' }}>
                            📸 촬영
                          </button>
                          {/* 앨범 선택 */}
                          <button onClick={() => imgRefs[m.id].current?.click()} disabled={!!analyzing}
                            style={{ background:dm?'#0c1a2e':'#eff6ff', border:'1px solid #93c5fd', color:'#2563eb', borderRadius:'8px', padding:'5px 11px', cursor:'pointer', fontSize:'14px', fontWeight:'700' }}>
                            🖼️ 앨범
                          </button>
                        </div>
                      )}
                      {/* 카메라용 input */}
                      <input ref={camRefs[m.id]} type="file" accept="image/*" capture="environment"
                        onChange={e => e.target.files[0] && handlePhotoSelect(e.target.files[0], m.id)}
                        style={{ display:'none' }} />
                      {/* 앨범용 input */}
                      <input ref={imgRefs[m.id]} type="file" accept="image/*"
                        onChange={e => e.target.files[0] && handlePhotoSelect(e.target.files[0], m.id)}
                        style={{ display:'none' }} />
                    </div>

                    {/* 분석 결과 카드 */}
                    {analysisResult?.mealId === m.id && (
                      <div style={{ border:dm?'1px solid #4c1d95':'1px solid #c4b5fd', borderRadius:'12px', marginBottom:'10px', overflow:'hidden' }}>
                        {/* 헤더 */}
                        <div style={{ background:'linear-gradient(135deg,#7c3aed,#a855f7)', padding:'10px 14px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                          <span style={{ color:'#fff', fontWeight:'700', fontSize:'16px' }}>🤖 AI 식단 분석 결과</span>
                          <span style={{ color:'rgba(255,255,255,0.7)', fontSize:'16px' }}>Powered by Gemini</span>
                        </div>
                        {/* 내용 */}
                        <div style={{ background:dm?'#1a1030':'#faf5ff', padding:'14px', fontSize:'16px', color:'var(--text)', whiteSpace:'pre-line', lineHeight:'1.9', maxHeight:'400px', overflowY:'auto' }}>
                          {analysisResult.text}
                        </div>
                        {/* 버튼 */}
                        <div style={{ background:'#f5f3ff', padding:'10px 14px', display:'flex', gap:'8px', borderTop:'1px solid #e9d5ff' }}>
                          <button onClick={() => applyAnalysis(m.id, analysisResult.text)}
                            style={{ flex:2, padding:'9px', background:'#7c3aed', color:'#fff', border:'none', borderRadius:'8px', cursor:'pointer', fontWeight:'700', fontSize:'16px' }}>
                            ✅ 식사 기록에 추가
                          </button>
                          <button onClick={() => setAnalysisResult(null)}
                            style={{ flex:1, padding:'9px', background:'var(--card-bg)', color:'var(--text-sub)', border:`1px solid ${dm?'#30363d':'#e2e8f0'}`, borderRadius:'8px', cursor:'pointer', fontSize:'16px' }}>
                            닫기
                          </button>
                        </div>
                      </div>
                    )}

                    <textarea value={day.meals[m.id]||''} onChange={e=>updMeal(m.id,e.target.value)} placeholder={m.ph} rows={3}
                      style={{ width:'100%', border:`1px solid ${dm?'#30363d':'#e2e8f0'}`, borderRadius:'8px', padding:'10px 12px', fontSize:'16px', color:'var(--text)', resize:'vertical', outline:'none', lineHeight:'1.6', background:'#fafafa', transition:'border-color 0.2s' }}
                      onFocus={e=>e.target.style.borderColor='#2563eb'} onBlur={e=>e.target.style.borderColor='#e2e8f0'} />
                  </div>
                ))}
              </Card>

              {/* 주간 차트 */}
              <Card>
                <STitle icon="📈" label="최근 7일 평균 혈당" />
                <div className="chart-wrap"><canvas ref={chartRef}/></div>
                <div style={{ display:'flex', gap:'14px', marginTop:'10px', justifyContent:'center', fontSize:'14px', color:'var(--text-sub)' }}>
                  <span>🟣 저혈당</span><span>🟢 정상</span><span>🟡 주의</span><span>🔴 높음</span>
                </div>
                <div style={{ fontSize:'16px', color:'var(--text-sub)', textAlign:'center', marginTop:'6px' }}>
                  혈당 기록이 쌓이면 의사 선생님과 인슐린 용량 조정 상담에 활용하세요
                </div>
              </Card>
            </div>

            {/* ── RIGHT ── */}
            <div>
              {/* Banner: 사이드바 상단 */}
              <BannerSlot slotId="sidebar_top" />

              {/* 요약 */}
              <Card style={{ background:medPct===100?'#f0fdf4':'#fff' }}>
                <STitle icon="📊" label="오늘 요약" />
                <div style={{ marginBottom:'16px' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', fontSize:'16px', marginBottom:'5px' }}>
                    <span style={{ fontWeight:'600' }}>복약 완료율</span>
                    <span style={{ fontWeight:'800', color:medPct===100?'#16a34a':'#2563eb' }}>{medPct}%</span>
                  </div>
                  <div style={{ background:'#e2e8f0', borderRadius:'4px', height:'8px', overflow:'hidden' }}>
                    <div style={{ width:`${medPct}%`, height:'100%', borderRadius:'4px', background:medPct===100?'#16a34a':'#2563eb', transition:'width 0.5s' }}/>
                  </div>
                </div>
                <div style={{ background:'var(--input-bg)', borderRadius:'10px', padding:'14px', marginBottom:'14px' }}>
                  <div style={{ fontSize:'16px', color:'var(--text-sub)', marginBottom:'4px' }}>오늘 평균 혈당</div>
                  <div style={{ fontSize:'31px', fontWeight:'900', color:bsAvg?bsColor(bsAvg):'#cbd5e1' }}>
                    {bsAvg||'---'}{bsAvg&&<span style={{ fontSize:'14px', fontWeight:'400', color:'var(--text-sub)' }}> mg/dL</span>}
                  </div>
                  {bsAvg&&<div style={{ fontSize:'14px', fontWeight:'700', color:bsColor(bsAvg), marginTop:'2px' }}>{bsLabel(bsAvg)}</div>}
                  <div style={{ fontSize:'16px', color:'var(--text-sub)', marginTop:'4px' }}>{bsVals.length}회 측정됨</div>
                </div>
                <div style={{ display:'flex', gap:'6px' }}>
                  {MEALS.map(m => {
                    const filled = !!(day.meals[m.id]?.trim());
                    return <div key={m.id} style={{ flex:1, textAlign:'center', borderRadius:'8px', padding:'8px 4px', background:filled?'#f0fdf4':'#f8fafc', border:`1px solid ${filled?'#86efac':'#e2e8f0'}` }}>
                      <div style={{ fontSize:'14px' }}>{m.icon}</div>
                      <div style={{ fontSize:'14px', color:filled?'#16a34a':'#94a3b8', fontWeight:'600', marginTop:'3px' }}>{filled?'완료':'미기록'}</div>
                    </div>;
                  })}
                </div>
              </Card>

              {/* 체중 / 체지방 */}
              <Card>
                <STitle icon="⚖️" label="체중 · 체지방 기록" />

                {/* 입력 행 */}
                <div style={{ display:'flex', gap:'10px', marginBottom:'12px', flexWrap:'wrap' }}>
                  <div style={{ flex:1, minWidth:'100px' }}>
                    <div style={{ fontSize:'16px', color:'var(--text-sub)', marginBottom:'4px' }}>체중</div>
                    <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                      <input type="number" step="0.1" min="30" max="200" value={day.weight||''} onChange={e=>upDay({weight:e.target.value})} placeholder="00.0"
                        style={{ width:'90px', border:`1px solid ${dm?'#30363d':'#e2e8f0'}`, borderRadius:'8px', padding:'8px 10px', fontSize:'22px', fontWeight:'800', color:'var(--text)', outline:'none', textAlign:'center' }} />
                      <span style={{ color:'var(--text-sub)', fontWeight:'600', fontSize:'18px' }}>kg</span>
                    </div>
                  </div>
                  <div style={{ flex:1, minWidth:'100px' }}>
                    <div style={{ fontSize:'16px', color:'var(--text-sub)', marginBottom:'4px' }}>체지방율</div>
                    <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                      <input type="number" step="0.1" min="1" max="60" value={day.bodyFat||''} onChange={e=>upDay({bodyFat:e.target.value})} placeholder="00.0"
                        style={{ width:'90px', border:`1px solid ${dm?'#30363d':'#e2e8f0'}`, borderRadius:'8px', padding:'8px 10px', fontSize:'22px', fontWeight:'800', color:'#7c3aed', outline:'none', textAlign:'center' }} />
                      <span style={{ color:'var(--text-sub)', fontWeight:'600', fontSize:'18px' }}>%</span>
                    </div>
                  </div>
                </div>

                {/* 7일 체중 추이 */}
                {(() => {
                  const wk = Array.from({length:7}, (_,i) => {
                    const d = shiftDate(date, i-6);
                    const dd = data[d] || emptyDay();
                    return { label: fmtDate(d).short, w: parseFloat(dd.weight)||null, bf: parseFloat(dd.bodyFat)||null };
                  });
                  const hasW  = wk.some(x => x.w);
                  const hasBf = wk.some(x => x.bf);
                  if (!hasW && !hasBf) return null;
                  const minW = hasW ? Math.min(...wk.filter(x=>x.w).map(x=>x.w)) - 1 : 0;
                  const maxW = hasW ? Math.max(...wk.filter(x=>x.w).map(x=>x.w)) + 1 : 1;
                  const minBf = hasBf ? Math.min(...wk.filter(x=>x.bf).map(x=>x.bf)) - 1 : 0;
                  const maxBf = hasBf ? Math.max(...wk.filter(x=>x.bf).map(x=>x.bf)) + 1 : 1;
                  return (
                    <div style={{ background:'var(--input-bg)', borderRadius:'10px', padding:'10px', marginBottom:'10px' }}>
                      <div style={{ fontSize:'16px', color:'var(--text-sub)', marginBottom:'6px' }}>최근 7일 추이</div>

                      {/* 체중 차트 */}
                      {hasW && <>
                        <div style={{ fontSize:'14px', color:'#2563eb', fontWeight:'600', marginBottom:'4px' }}>⚖️ 체중 (kg)</div>
                        <div style={{ display:'flex', gap:'4px', alignItems:'flex-end', height:'48px' }}>
                          {wk.map((d,i) => {
                            const h = d.w ? Math.round(((d.w - minW)/(maxW - minW || 1)) * 38 + 6) : 4;
                            return (
                              <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:'2px' }}>
                                <div style={{ width:'100%', height:`${h}px`, background: d.w ? '#2563eb' : '#e2e8f0', borderRadius:'3px 3px 0 0', transition:'height 0.3s' }}/>
                                <div style={{ fontSize:'9px', color:'var(--text-sub)', whiteSpace:'nowrap' }}>{d.label}</div>
                              </div>
                            );
                          })}
                        </div>
                        <div style={{ display:'flex', marginTop:'4px' }}>
                          {wk.map((d,i) => (
                            <div key={i} style={{ flex:1, textAlign:'center', fontSize:'9px', color: d.w ? '#2563eb' : '#e2e8f0', fontWeight:'700' }}>
                              {d.w ? d.w.toFixed(2) : ''}
                            </div>
                          ))}
                        </div>
                      </>}

                      {/* 체지방 차트 */}
                      {hasBf && <div style={{ marginTop: hasW ? '10px' : '0' }}>
                        <div style={{ fontSize:'14px', color:'#7c3aed', fontWeight:'600', marginBottom:'4px' }}>💪 체지방률 (%)</div>
                        <div style={{ display:'flex', gap:'4px', alignItems:'flex-end', height:'48px' }}>
                          {wk.map((d,i) => {
                            const h = d.bf ? Math.round(((d.bf - minBf)/(maxBf - minBf || 1)) * 38 + 6) : 4;
                            return (
                              <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:'2px' }}>
                                <div style={{ width:'100%', height:`${h}px`, background: d.bf ? '#7c3aed' : '#e2e8f0', borderRadius:'3px 3px 0 0', transition:'height 0.3s' }}/>
                                <div style={{ fontSize:'9px', color:'var(--text-sub)', whiteSpace:'nowrap' }}>{d.label}</div>
                              </div>
                            );
                          })}
                        </div>
                        <div style={{ display:'flex', marginTop:'4px' }}>
                          {wk.map((d,i) => (
                            <div key={i} style={{ flex:1, textAlign:'center', fontSize:'9px', color: d.bf ? '#7c3aed' : '#e2e8f0', fontWeight:'700' }}>
                              {d.bf ? `${d.bf.toFixed(2)}` : ''}
                            </div>
                          ))}
                        </div>
                      </div>}
                    </div>
                  );
                })()}

                {/* 건강앱 가져오기 버튼 */}
                <input ref={weightFileRef} type="file" accept=".zip,.xml" onChange={e => e.target.files[0] && handleWeightImport(e.target.files[0])} style={{ display:'none' }} />
                <button onClick={() => weightFileRef.current?.click()} disabled={weightImporting}
                  style={{ width:'100%', padding:'7px', background: weightImporting?'#f1f5f9':'#f0fdf4', border:'1px solid #86efac', color: weightImporting?'#94a3b8':'#16a34a', borderRadius:'8px', cursor: weightImporting?'not-allowed':'pointer', fontWeight:'700', fontSize:'12px', marginBottom:'4px' }}>
                  🍎 건강앱에서 가져오기 (ZIP / XML)
                </button>
                {weightImportMsg && (
                  <div style={{ fontSize:'14px', color: weightImportMsg.startsWith('✅')?'#16a34a': weightImportMsg.startsWith('❌')?'#dc2626':'#64748b', textAlign:'center', padding:'4px 0', fontWeight:'600' }}>
                    {weightImportMsg}
                  </div>
                )}
                <div style={{ fontSize:'11px', color:'var(--text-sub)', lineHeight:'1.6', marginTop:'3px' }}>
                  iPhone 건강앱 → 우상단 프로필 → 건강 데이터 내보내기 → export.zip
                </div>
                <div style={{ fontSize:'11px', color:'#16a34a', fontWeight:'500', marginTop:'4px' }}>💡 5% 체중 감량만으로 혈당이 크게 개선될 수 있어요</div>
              </Card>

              {/* 운동 */}
              <Card>
                <STitle icon="🏃" label="운동 기록" />
                <div style={{ marginBottom:'10px' }}>
                  <div style={{ fontSize:'14px', color:'var(--text-sub)', marginBottom:'4px' }}>운동 종류</div>
                  <input type="text" value={day.exercise?.type||''} onChange={e=>updEx('type',e.target.value)} placeholder="예: 걷기, 수영, 자전거…" style={inpSt} />
                </div>
                <div style={{ marginBottom:'10px' }}>
                  <div style={{ fontSize:'14px', color:'var(--text-sub)', marginBottom:'4px' }}>운동 시간 (분)</div>
                  <input type="number" min="0" value={day.exercise?.mins||''} onChange={e=>updEx('mins',e.target.value)} placeholder="30" style={inpSt} />
                </div>
                <div style={{ fontSize:'11px', color:'#16a34a', fontWeight:'500', lineHeight:'1.7' }}>
                  💪 식후 30분 걷기 30분이 혈당 조절에 가장 효과적<br/>🎯 하루 최소 30분, 주 5일 목표
                </div>
              </Card>

              {/* 메모 */}
              <Card>
                <STitle icon="📝" label="오늘의 메모" />
                <textarea value={day.note||''} onChange={e=>upDay({note:e.target.value})} placeholder="특이사항, 컨디션, 저혈당 증상, 의사 선생님께 전달할 내용 등…" rows={4}
                  style={{ ...inpSt, resize:'vertical', lineHeight:'1.6', fontFamily:'inherit' }} />
              </Card>

              {/* 목표 카드 */}
              <Card style={{ background:'linear-gradient(135deg,#eff6ff,#f0fdf4)', border:'1px solid #bfdbfe' }}>
                <div style={{ fontSize:'14px', fontWeight:'700', color:dm?'#93c5fd':'#1e40af', marginBottom:'10px' }}>🎯 인슐린 졸업을 향해!</div>
                <div style={{ fontSize:'14px', color:'var(--text)', lineHeight:'2' }}>
                  ✅ 혈당 꾸준히 기록 (리브레2 연동)<br/>
                  ✅ 탄수화물 조절 (한 끼 45–60g)<br/>
                  ✅ 식후 걷기 30분<br/>
                  ✅ 체중 점진적 감량<br/>
                  ✅ 주치의와 정기 상담<br/><br/>
                  <span style={{ color:'#dc2626', fontWeight:'600', fontSize:'11px' }}>⚠️ 인슐린은 반드시 의사 지시에 따라 조정하세요.</span>
                </div>
              </Card>
            </div>
          </div>

          {/* Banner: 페이지 맨 아래 */}
          <BannerSlot slotId="bottom" />
        </div>

        {/* 로딩 오버레이 */}
        {loading && (
          <div style={{ position:'fixed', inset:0, background:'rgba(255,255,255,0.85)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:3000 }}>
            <div style={{ fontSize:'32px', marginBottom:'16px' }}>⏳</div>
            <div style={{ fontSize:'14px', fontWeight:'700', color:'var(--text)' }}>데이터 불러오는 중...</div>
            <div style={{ fontSize:'16px', color:'var(--text-sub)', marginTop:'6px' }}>Supabase에서 동기화하고 있어요</div>
          </div>
        )}

        {/* Drug Info Modal */}
        {drugInfoModal && <DrugInfoModal medName={drugInfoModal} onClose={() => setDrugInfoModal(null)} />}

        {/* Import Modal */}
        {showImport && <ImportModal onClose={() => setShowImport(false)} onImport={handleImport} />}

        {/* Sync Modal */}
        {showSync && <SyncModal userId={userId} onClose={() => { setShowSync(false); setRefreshKey(k => k + 1); }} onChangeId={() => { setRefreshKey(k => k + 1); }} />}

        {/* Med Settings Modal */}
        {showMedSettings && <MedSettingsModal meds={medsConfig} onSave={saveMeds} onClose={() => setShowMedSettings(false)} />}

        {/* Admin Modal */}
        {showAdmin && <AdminModal onClose={() => setShowAdmin(false)} userEmail={authUser?.email} />}
      </div>
    );
  };

  /* ── 공통 스타일 상수 ─────────────────────────────────── */
  const navBtnSt = { background:'rgba(255,255,255,0.2)', border:'none', color:'#fff', borderRadius:'8px', padding:'8px 16px', cursor:'pointer', fontSize:'14px', fontWeight:'700', lineHeight:1 };
  /* inpSt는 App 안에서 dm 없이 쓰이므로 CSS 오버라이드로 처리됨 */
  const inpSt    = { width:'100%', border:'1px solid var(--input-border)', borderRadius:'8px', padding:'8px 12px', fontSize:'14px', outline:'none', background:'var(--input-bg)', color:'var(--text)' };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
