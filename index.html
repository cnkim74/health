            bcal:  imported.bcal  || ex.bcal  || '',
            dist:  imported.dist  || ex.dist  || '',
          };
        }
        merged[d] = next[d];
      });
      setData(next);
      // ✅ 즉시 dm_dash_v2 저장 (save effect의 data[date] 조건 우회)
      try {
        localStorage.setItem('dm_dash_v2', JSON.stringify({ data: next, lastImport: new Date().toLocaleString('ko-KR') }));
      } catch {}
      // ✅ 가져온 데이터를 전용 키에 별도 저장 — 새로고침 후에도 복구 가능
      try {
        const existing = JSON.parse(localStorage.getItem('dm_imported') || '{}');
        const updated  = { ...existing };
        Object.entries(importedData).forEach(([d, imp]) => {
          if (!updated[d]) { updated[d] = imp; }
          else {
            updated[d] = {
              ...updated[d],
              weight:  updated[d].weight  || imp.weight  || '',
              bodyFat: updated[d].bodyFat || imp.bodyFat || '',
              bp:      (updated[d].bp?.sys && updated[d].bp?.dia) ? updated[d].bp : (imp.bp || updated[d].bp),
              steps:   imp.steps || updated[d].steps || '',
              cal:     imp.cal   || updated[d].cal   || '',
              dist:    imp.dist  || updated[d].dist  || '',
            };
          }
        });
        localStorage.setItem('dm_imported', JSON.stringify(updated));
      } catch {}
      setLastImport(new Date().toLocaleString('ko-KR'));
      await saveAllToSupabase(merged);
    };

    /* ── LibreLinkUp 동기화 ──────────────────────────────────────────────
       Edge Function(libre-sync) 경유로 리브레 CGM 최근 ~12시간 혈당을 수집,
       기존 가져오기 파이프라인(buildDashboardData→handleImport)으로 병합.
       수동 입력값은 보존됨 (handleImport의 bs 병합 규칙). ── */
    const handleImportRef = useRef(null);
    handleImportRef.current = handleImport; // 매 렌더마다 최신 클로저 유지 (stale data 방지)
    const lluBusyRef = useRef(false);

    const syncLibre = async (opts = {}) => {
      if (lluBusyRef.current) return null;
      const credS = localStorage.getItem('cn_llu_cred');
      if (!credS) return null;
      lluBusyRef.current = true;
      try {
        const cred = JSON.parse(credS);
        const body = { email: cred.email, password: cred.password };
        try {
          const cache = JSON.parse(localStorage.getItem('cn_llu_auth') || 'null');
          if (cache?.token && cache?.accountId && (cache.expires || 0) * 1000 > Date.now() + 60000) {
            Object.assign(body, cache);
          }
        } catch {}
        const res = await fetch(`${SUPA_URL}/functions/v1/libre-sync`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` },
          body: JSON.stringify(body)
        });
        const j = await res.json();
        if (!j.ok) {
          localStorage.removeItem('cn_llu_auth'); // 토큰 문제일 수 있으니 캐시 폐기
          throw new Error(j.error || '동기화 실패');
        }
        if (j.auth) localStorage.setItem('cn_llu_auth', JSON.stringify(j.auth));
        // readings → 일자별 {hour, value} 목록
        const byDay = {};
        (j.readings || []).forEach(r => {
          const d = new Date(r.ts);
          if (isNaN(d.getTime())) return;
          const day = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          (byDay[day] = byDay[day] || []).push({ hour: d.getHours() + d.getMinutes()/60, value: Math.round(r.mgdl) });
        });
        if (Object.keys(byDay).length && handleImportRef.current) {
          const mapped = buildDashboardData({ glucoseByDay: byDay });
          await handleImportRef.current(mapped);
        }
        if (j.latest) setLluLatest({ ...j.latest, at: Date.now() });
        return j;
      } catch (e) {
        if (!opts.silent) throw e;
        console.log('LibreLinkUp sync skip:', e?.message || e);
        return null;
      } finally { lluBusyRef.current = false; }
    };
    const syncLibreRef = useRef(null);
    syncLibreRef.current = syncLibre;

    /* ── 블루투스 혈당기(아큐첵 가이드 등 표준 GATT) 읽기 ── */
    const readBleGlucose = async () => {
      const BLE = (window.Capacitor?.isNativePlatform?.())
        ? window.Capacitor.Plugins?.GlucoseBle : null;
      if (!BLE) { setBleMsg('블루투스 혈당기 연결은 앱에서만 지원됩니다.'); return; }
      if (bleBusy) return;
      setBleBusy(true);
      setBleMsg('🔍 혈당기를 찾는 중... 혈당기의 블루투스(동기화)를 켜 주세요');
      try {
        await BLE.requestPerm();
        const res = await BLE.scanAndRead({ timeout: 25 });
        const rs = res?.readings || [];
        if (!rs.length) { setBleMsg('연결됐지만 새 기록이 없어요.'); setBleBusy(false); return; }
        const byDay = {};
        rs.forEach(r => {
          const d = new Date(r.ts);
          if (isNaN(d.getTime()) || !(r.mgdl > 0)) return;
          const day = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          (byDay[day] = byDay[day] || []).push({ hour: d.getHours() + d.getMinutes()/60, value: Math.round(r.mgdl) });
        });
        if (Object.keys(byDay).length && handleImportRef.current) {
          const mapped = buildDashboardData({ glucoseByDay: byDay });
          await handleImportRef.current(mapped);
        }
        setBleMsg(`✅ ${res.device || '혈당기'}에서 ${rs.length}건을 가져왔어요!`);
        setTimeout(() => setBleMsg(''), 4000);
      } catch (e) {
        setBleMsg('❌ ' + (e?.message || '혈당기 연결 실패'));
      }
      setBleBusy(false);
    };

    // 자동 동기화: 로그인 후 즉시 + 화면 켜져 있으면 90초마다(실시간) + 백그라운드는 폴링 중단
    // 리브레 CGM은 1분마다 갱신되므로 포그라운드에서 촘촘히, 백그라운드에선 배터리 절약
    useEffect(() => {
      if (!userId) return;
      if (!localStorage.getItem('cn_llu_cred')) return; // 연동 안 했으면 폴링 안 함
      let timer = null;
      const tick = () => { if (document.visibilityState === 'visible') syncLibreRef.current?.({ silent: true }); };
      const start = () => { if (timer) return; tick(); timer = setInterval(tick, 90 * 1000); };
      const stop  = () => { if (timer) { clearInterval(timer); timer = null; } };
      const onVis = () => { document.visibilityState === 'visible' ? start() : stop(); };
      if (document.visibilityState === 'visible') start();
      document.addEventListener('visibilitychange', onVis);
      return () => { stop(); document.removeEventListener('visibilitychange', onVis); };
    }, [userId]);

    /* ── 복약 설정 로드 ──────────────────────────────────────────────────────
       원칙:
         1. Supabase → localStorage 순으로 시도
         2. 실제 약 항목(items)이 1개 이상 있어야 유효 데이터로 인정
            (빈 배열 / 빈 슬롯만 있는 경우는 무시 → 버그 데이터 방어)
         3. localStorage에만 있으면 Supabase에 동기화
         4. saveMeds 가 이미 저장 중이면 덮어쓰지 않음
    ───────────────────────────────────────────────────────────────────────── */
    useEffect(() => {
      if (!userId) {
        medsUserSavedRef.current = false;
        return;
      }
      medsUserSavedRef.current = false;
      (async () => {
        const normMeds = (arr) => Array.isArray(arr)
          ? arr.map(s => ({ ...s, items: Array.isArray(s.items) ? s.items : [] }))
          : [];
        // 실제 약이 1개 이상 있는지 확인
        const hasMeds = (arr) => Array.isArray(arr) && arr.some(s => (s.items||[]).length > 0);

        try {
          const { data: row } = await supa.from('diabetes_data')
            .select('payload').eq('user_id', userId).eq('date', '_user_settings_')
            .maybeSingle();
          if (medsUserSavedRef.current) return; // saveMeds 호출 중이면 중단

          const fromSB = row?.payload?.medsConfig;

          if (hasMeds(fromSB)) {
            // ① Supabase에 유효 데이터 → 사용
            setMedsConfig(normMeds(fromSB));
            localStorage.setItem(`hcd_meds_config_${userId}`, JSON.stringify(fromSB));
            return;
          }

          // ② Supabase 없음/빈값 → localStorage 시도
          try {
            const s = localStorage.getItem(`hcd_meds_config_${userId}`);
            const fromLS = s ? JSON.parse(s) : null;
            // 사용자가 저장 중이면 덮어쓰지 않음 (연장 등 편집 직후 레이스 방지)
            if (medsUserSavedRef.current) return;
            if (hasMeds(fromLS)) {
              setMedsConfig(normMeds(fromLS));
              // localStorage 데이터를 Supabase에 동기화 (기존 goals 보존)
              try {
                await supa.from('diabetes_data').upsert(
                  { user_id: userId, date: '_user_settings_', payload: { medsConfig: fromLS, goals: (row?.payload?.goals) || goalsRef.current }, updated_at: new Date().toISOString() },
                  { onConflict: 'user_id,date' }
                );
              } catch {}
            } else {
              setMedsConfig([]); // ③ 아무것도 없음
            }
          } catch {
            if (medsUserSavedRef.current) return;
            setMedsConfig([]);
          }

        } catch {
          if (medsUserSavedRef.current) return;
          try {
            const s = localStorage.getItem(`hcd_meds_config_${userId}`);
            const fromLS = s ? JSON.parse(s) : null;
            const hasMeds2 = (arr) => Array.isArray(arr) && arr.some(s2 => (s2.items||[]).length > 0);
            if (medsUserSavedRef.current) return;
            setMedsConfig(hasMeds2(fromLS) ? normMeds(fromLS) : []);
          } catch {
            if (medsUserSavedRef.current) return;
            setMedsConfig([]);
          }
        }
      })();
    }, [userId]);

    /* ── 목표 로드 (Supabase → localStorage 폴백) ── */
    useEffect(() => {
      if (!userId) return;
      (async () => {
        try {
          const { data: row } = await supa.from('diabetes_data')
            .select('payload').eq('user_id', userId).eq('date', '_user_settings_').maybeSingle();
          const g = row?.payload?.goals;
          if (g && typeof g === 'object') {
            setGoals(prev => ({ ...prev, ...g }));
            localStorage.setItem(`hcd_goals_${userId}`, JSON.stringify(g));
            return;
          }
        } catch {}
        try {
          const s = localStorage.getItem(`hcd_goals_${userId}`);
          if (s) setGoals(prev => ({ ...prev, ...JSON.parse(s) }));
        } catch {}
      })();
    }, [userId]);

    // saveGoals: 목표 저장 — medsConfig와 같은 _user_settings_ row에 병기
    const saveGoals = (g) => {
      const cleaned = {
        steps: Math.max(1000, parseInt(g.steps) || 10000),
        weight: g.weight !== '' && !isNaN(parseFloat(g.weight)) ? String(parseFloat(g.weight)) : '',
        condition: g.condition || 'general'
      };
      setGoals(cleaned);
      if (userId) {
        localStorage.setItem(`hcd_goals_${userId}`, JSON.stringify(cleaned));
        (async () => {
          try {
            await supa.from('diabetes_data').upsert(
              { user_id: userId, date: '_user_settings_', payload: { medsConfig: medsConfigRef.current, goals: cleaned }, updated_at: new Date().toISOString() },
              { onConflict: 'user_id,date' }
            );
          } catch (e) { console.error('목표 저장 오류:', e); }
        })();
      }
      setShowGoals(false);
    };

    // saveMeds: 명시적 저장 — localStorage + Supabase 즉시 저장
    // (자동 save effect 제거: 타이밍 버그 방지)
    const saveMeds = (cfg) => {
      // 로드 effect가 덮어쓰지 않도록 — 저장 완료 이후에도 세션 내내 유지
      medsUserSavedRef.current = true;
      // 기간 연장(endDate 변경) 등 편집 결과가 즉시 대시보드에 반영되도록 정규화
      const normalized = Array.isArray(cfg)
        ? cfg.map(s => ({ ...s, items: Array.isArray(s.items) ? s.items.map(m => ({ ...m })) : [] }))
        : [];
      setMedsConfig(normalized);
      if (userId) {
        localStorage.setItem(`hcd_meds_config_${userId}`, JSON.stringify(normalized));
        (async () => {
          try {
            await supa.from('diabetes_data').upsert(
              { user_id: userId, date: '_user_settings_', payload: { medsConfig: normalized, goals: goalsRef.current }, updated_at: new Date().toISOString() },
              { onConflict: 'user_id,date' }
            );
          } catch (e) {
            console.error('복약 설정 저장 오류:', e);
            // Supabase 저장 실패 시에도 localStorage에는 남아있어 다음 로드 때 복구됨
          }
        })();
      }
      setShowMedSettings(false);
    };

    // 키(신장): Supabase cn_profiles 우선, 없으면 localStorage 폴백
    useEffect(() => {
      if (!userId) return;
      (async () => {
        // 1) Supabase에서 키 로드 시도
        const { data: prof } = await supa.from('cn_profiles').select('height').eq('id', userId).maybeSingle();
        if (prof?.height) {
          const hStr = String(prof.height);
          setHeight(hStr);
          // localStorage도 최신화
          localStorage.setItem('hcd_height', hStr);
          localStorage.setItem(`hcd_height_${userId}`, hStr);
          return;
        }
        // 2) localStorage 폴백
        const h = localStorage.getItem(`hcd_height_${userId}`) || localStorage.getItem('hcd_height');
        if (h) setHeight(h);
      })();
    }, [userId]);
    const saveHeight = (v) => {
      setHeight(v);
      localStorage.setItem('hcd_height', v);
      if (userId) localStorage.setItem(`hcd_height_${userId}`, v);
      // Supabase에도 동기화
      if (userId) supa.from('cn_profiles').update({ height: parseFloat(v) || null }).eq('id', userId);
    };

    /* Stats */
    const allMedIds = useMemo(() => medsConfig.flatMap(s => (s.items||[]).filter(m => isMedActive(m, date)).map(m => m.id||'')), [medsConfig, date]);

    // ── 애플워치 브리지: 워치에서 온 입력(물·복약) 처리 ──
    const allMedIdsRef = useRef(allMedIds); allMedIdsRef.current = allMedIds;
    useEffect(() => {
      const WB = window.Capacitor?.Plugins?.WatchBridge;
      if (!WB || !WB.addListener) return;
      let handle;
      const today = () => { const t = new Date(); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; };
      const p = WB.addListener('watchAction', (info) => {
        try {
          const action = info && info.action;
          const d0 = today();
          if (action === 'water') {
            const ml = parseInt(info.ml) || 0; if (!ml) return;
            setData(prev => { const d = prev[d0] || emptyDay(); return { ...prev, [d0]: { ...d, water_ml: (parseInt(d.water_ml)||0) + ml } }; });
          } else if (action === 'meds_all_done') {
            setData(prev => { const d = prev[d0] || emptyDay(); const done = Object.fromEntries((allMedIdsRef.current||[]).map(id => [id, true])); return { ...prev, [d0]: { ...d, meds: { ...(d.meds||{}), ...done } } }; });
          } else if (action === 'med_taken') {
            const id = info.id; if (!id) return;
            setData(prev => { const d = prev[d0] || emptyDay(); return { ...prev, [d0]: { ...d, meds: { ...(d.meds||{}), [id]: true } } }; });
          } else if (action === 'workout_end') {
            const label = info.type === 'run' ? '달리기' : '걷기';
            const mins = Math.max(1, Math.round((parseInt(info.seconds)||0) / 60));
            setData(prev => {
              const d = prev[d0] || emptyDay();
              const ex = d.exercise || { type:'', mins:'', logs:[] };
              const logs = [ ...(ex.logs||[]), { type: label, mins: String(mins) } ];
              return { ...prev, [d0]: { ...d, exercise: { ...ex, type: ex.type || label, mins: String((parseInt(ex.mins)||0) + mins), logs } } };
            });
          }
        } catch(e) {}
      });
      Promise.resolve(p).then(h => { handle = h; }).catch(()=>{});
      return () => { try { handle && handle.remove(); } catch(e) {} };
    }, []);

    // 워치로 오늘 복약 목록 전송(하나씩 체크용)
    useEffect(() => {
      const WB = window.Capacitor?.Plugins?.WatchBridge;
      if (!WB || !WB.updateContext) return;
      const meds = (medsConfig||[]).flatMap(s => (s.items||[])
        .filter(m => m.name && isMedActive(m, date))
        .map(m => ({ id: String(m.id), name: String(m.name), taken: (day.meds && day.meds[m.id]) ? '1' : '' })));
      try { WB.updateContext({ context: { meds } }); } catch(e) {}
    }, [medsConfig, day, date]);

    const medDone = allMedIds.filter(id => day.meds[id]).length;
    const medPct  = allMedIds.length ? Math.round((medDone / allMedIds.length) * 100) : 0;
    const bsVals  = Object.values(day.bs).filter(v => parseInt(v) > 0);
    const bsAvg   = bsVals.length ? Math.round(bsVals.reduce((a,b) => a+parseInt(b), 0) / bsVals.length) : null;

    /* Weekly chart */
    const weekData = useMemo(() => Array.from({length:7}, (_,i) => {
      const d = shiftDate(date, i-6);
      const dd = normalizeDay(data[d]);
      const vals = Object.values(dd.bs).filter(v => parseInt(v) > 0);
      return { label: fmtDate(d).short, avg: vals.length ? Math.round(vals.reduce((a,b)=>a+parseInt(b),0)/vals.length) : null };
    }), [data, date]);

    useEffect(() => {
      if (!chartRef.current) return;
      if (chartInst.current) { chartInst.current.destroy(); chartInst.current = null; }
      chartInst.current = new Chart(chartRef.current, {
        type: 'line',
        data: {
          labels: weekData.map(d => d.label),
          datasets: [{
            label: '평균 혈당', data: weekData.map(d => d.avg),
            borderColor: 'var(--cn-brand)', backgroundColor: 'rgba(37,99,235,0.08)',
            borderWidth: 2.5, pointBackgroundColor: weekData.map(d => bsColor(d.avg)),
            pointRadius: 5, fill: true, tension: 0.35, spanGaps: true
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend:{display:false}, tooltip:{ callbacks:{ label: c => c.raw ? `${c.raw} mg/dL` : '기록 없음' } } },
          scales: {
            y: { min:50, max:320, grid:{color:'var(--divider)'}, ticks:{font:{size:11}} },
            x: { grid:{display:false}, ticks:{font:{size:11}} }
          }
        }
      });
      return () => { if(chartInst.current){chartInst.current.destroy(); chartInst.current=null;} };
    }, [weekData]);

    const isToday = date === todayStr();

    // 체중 트렌드 (IIFE 없이 미리 계산)
    const _prevDayWt  = normalizeDay(data[shiftDate(date, -1)]);
    const _prevW      = parseFloat(_prevDayWt.weight)  || null;
    const _prevBf     = parseFloat(_prevDayWt.bodyFat) || null;
    const _curW       = parseFloat(day.weight)  || null;
    const _curBf      = parseFloat(day.bodyFat) || null;
    const _wDiff      = (_prevW && _curW)  ? _curW  - _prevW  : null;
    const _bfDiff     = (_prevBf && _curBf) ? _curBf - _prevBf : null;
    const _wArrow     = _wDiff  === null ? null : _wDiff  > 0.04 ? '↑' : _wDiff  < -0.04 ? '↓' : '→';
    const _bfArrow    = _bfDiff === null ? null : _bfDiff > 0.04 ? '↑' : _bfDiff < -0.04 ? '↓' : '→';
    const _wArrowClr  = _wDiff  === null ? 'var(--text-mute)' : _wDiff  > 0.04 ? '#ef4444' : _wDiff  < -0.04 ? 'var(--cn-brand)' : 'var(--text-mute)';
    const _bfArrowClr = _bfDiff === null ? 'var(--text-mute)' : _bfDiff > 0.04 ? '#ef4444' : _bfDiff < -0.04 ? 'var(--cn-brand)' : 'var(--text-mute)';

    // 인증 로딩 중
    if (!authReady) return (
      <div style={{ minHeight:'100vh', background:'var(--bg)', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ textAlign:'center', color:'var(--text-sub)' }}>
          <CareNoteLogo size={56} />
          <div style={{ fontSize:'19px', fontWeight:'700', color:'var(--text)', marginTop:'14px' }}>CARENOTE</div>
          <div style={{ fontSize:'14px', marginTop:'6px' }}>로딩 중...</div>
        </div>
      </div>
    );

    // 미인증 → 랜딩 페이지 (시작하기 누르면 로그인 화면)
    if (!authUser) return showAuth ? <LoginScreen initialMode={showAuth === 'signup' ? 'signup' : 'login'} onBack={() => setShowAuth(false)} /> : <LandingPage onStart={(mode) => setShowAuth(mode || 'login')} />;

    return (
      <div style={{ minHeight:'100vh', background:'var(--bg)', paddingBottom:'48px' }}>

        {/* ── CARENOTE Header ── */}
        <div style={{ background: darkMode ? 'linear-gradient(135deg,#020617 0%,#0f172a 100%)' : 'linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)', padding:'10px 3vw', paddingTop:'calc(10px + env(safe-area-inset-top, 0px))', boxShadow:'0 2px 14px rgba(0,0,0,0.45)', position:'sticky', top:0, zIndex:100 }}>

          {/* ─ 1행: 로고+브랜드 · 날짜 · 유저 ─ */}
          <div style={{ maxWidth:'1140px', margin:'0 auto', display:'flex', alignItems:'center', justifyContent:'space-between', gap:'8px' }}>

            {/* 로고 + 사이트명 */}
            <div style={{ display:'flex', alignItems:'center', gap:'8px', flexShrink:0 }}>
              <div className="cn-hdr-logo"><CareNoteLogo size={40} /></div>
              <div>
                <div className="cn-hdr-title" style={{ fontFamily:'var(--font-title)', fontSize:'22px', fontWeight:'700', color:'#fff', letterSpacing:'0.5px', lineHeight:'1.15' }}>CARENOTE</div>
                <div className="cn-hdr-sub" style={{ fontSize:'11px', color:'rgba(147,197,253,0.8)', fontWeight:'500' }}>내 몸을 기록하는 노트</div>
              </div>
              <a href="board.html" target="_blank" rel="noopener noreferrer"
                className="cn-hdr-actions"
                style={{ marginLeft:'6px', background:'rgba(47,107,255,0.4)', border:'1px solid rgba(47,107,255,0.65)', color:'#fff',
                  borderRadius:'8px', padding:'4px 10px', fontSize:'12px', fontWeight:'700', textDecoration:'none',
                  display:'inline-flex', alignItems:'center', gap:'4px', whiteSpace:'nowrap', flexShrink:0 }}>
                👥 커뮤니티
              </a>
            </div>

            {/* 날짜 네비 — 날짜 클릭 시 date picker 오픈 */}
            <div style={{ display:'flex', alignItems:'center', gap:'6px', flex:1, justifyContent:'center' }}>
              <button onClick={() => setDate(shiftDate(date,-1))} style={navBtnSt}>‹</button>
              <div style={{ position:'relative' }}>
                <button
                  onClick={() => {
                    const inp = document.getElementById('cn-date-picker');
                    if (!inp) return;
                    try { inp.showPicker(); } catch { inp.click(); }
                  }}
                  style={{ background:'rgba(255,255,255,0.15)', border:'1px solid rgba(255,255,255,0.3)',
                           color:'#fff', fontWeight:'700', fontSize:'13px', whiteSpace:'nowrap',
                           borderRadius:'8px', padding:'4px 10px', cursor:'pointer',
                           display:'flex', alignItems:'center', gap:'5px' }}>
                  <span className="cn-hdr-date-full">{fmtDate(date).full}</span>
                  <span className="cn-hdr-date-md">{fmtDate(date).md}</span>
                  <span style={{fontSize:'10px',opacity:0.7}}>▼</span>
                </button>
                <input id="cn-date-picker" type="date" value={date}
                  onChange={e => { if (e.target.value) setDate(e.target.value); }}
                  max={todayStr()}
                  style={{ position:'absolute', opacity:0, pointerEvents:'none', width:'1px', height:'1px', top:0, left:0 }} />
              </div>
              <button onClick={() => setDate(shiftDate(date,1))} style={navBtnSt}>›</button>
            </div>

            {/* 다크모드 + 이메일 + 로그아웃 (데스크탑만) */}
            <div style={{ display:'flex', alignItems:'center', gap:'8px', flexShrink:0 }}>
              <button className="cn-hdr-dark"
                onClick={() => { _dm=!_dm; document.body.classList.toggle('dark',_dm); localStorage.setItem('cn_dark',_dm?'1':'0'); setDarkMode(_dm); }}
                style={{ background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)', color:'#fff', borderRadius:'20px', padding:'4px 12px', cursor:'pointer', fontSize:'13px', fontWeight:'600', whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:'5px' }}>
                {darkMode ? '☀️ 라이트' : '🌙 다크'}
              </button>
              <div className="cn-hdr-user" style={{ display:'flex', alignItems:'center', gap:'6px', background:'rgba(0,0,0,0.2)', borderRadius:'8px', padding:'4px 10px' }}>
                <button onClick={() => setShowProfileEdit(true)}
                  style={{ background:'none', border:'none', cursor:'pointer', padding:0, display:'flex', alignItems:'center', gap:'6px' }}>
                  {hdrAvatar
                    ? <img src={hdrAvatar} style={{ width:'24px', height:'24px', borderRadius:'50%', objectFit:'cover', border:'1.5px solid rgba(255,255,255,0.5)' }} />
                    : <div style={{ width:'24px', height:'24px', borderRadius:'50%', background:'rgba(255,255,255,0.2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'11px', fontWeight:'700', color:'#fff' }}>
                        {(authUser.email||'?')[0].toUpperCase()}
                      </div>}
                  <span style={{ fontSize:'12px', color:'rgba(255,255,255,0.8)', maxWidth:'120px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    {authUser.email}
                  </span>
                </button>
                <button onClick={() => setShowProfileEdit(true)}
                  style={{ background:'rgba(255,255,255,0.18)', border:'none', color:'#fff', borderRadius:'6px', padding:'3px 8px', cursor:'pointer', fontSize:'11px', fontWeight:'700', whiteSpace:'nowrap' }}>
                  ✏️ 내정보
                </button>
                <button onClick={() => supa.auth.signOut()} style={{ background:'rgba(255,255,255,0.18)', border:'none', color:'#fff', borderRadius:'6px', padding:'3px 8px', cursor:'pointer', fontSize:'12px', fontWeight:'700', whiteSpace:'nowrap' }}>
                  로그아웃
                </button>
              </div>
            </div>
          </div>

          {/* ─ 2행: 저장상태·오늘로(모바일) · 데스크탑 액션 (복약·혈당 배지는 본문 카드로 이동) ─ */}
          <div style={{ maxWidth:'1140px', margin:'6px auto 0', display:'flex', alignItems:'center', gap:'8px', flexWrap:'wrap', borderTop:'1px solid rgba(255,255,255,0.08)', paddingTop:'6px' }}>
            {/* 오른쪽: 저장상태 + 오늘로(모바일 포함) + 데스크탑 액션 */}
            <div style={{ display:'flex', gap:'8px', alignItems:'center', marginLeft:'auto', flexShrink:0 }}>
              {saveStatus==='saving' && <span style={{ fontSize:'11px', color:'rgba(255,255,255,0.6)', whiteSpace:'nowrap' }}>저장 중...</span>}
              {saveStatus==='saved'  && <span style={{ fontSize:'11px', color:'var(--cn-ok)', whiteSpace:'nowrap' }}>✓ 저장됨</span>}
              {saveStatus==='error'  && <span style={{ fontSize:'11px', color:'var(--cn-danger)', whiteSpace:'nowrap' }}>⚠ 오류</span>}
              {saveStatus==='idle' && !isToday && (
                <button onClick={() => setDate(todayStr())} style={{ background:'rgba(255,255,255,0.2)', border:'1px solid rgba(255,255,255,0.35)', color:'#fff', borderRadius:'6px', padding:'3px 10px', fontSize:'12px', fontWeight:'600', cursor:'pointer', whiteSpace:'nowrap' }}>
                  오늘로
                </button>
              )}
              {/* 데스크탑 전용 */}
              <a href="board.html" target="_blank" rel="noopener noreferrer" className="cn-hdr-actions"
                style={{ background:'rgba(47,107,255,0.35)', border:'1px solid rgba(47,107,255,0.6)', color:'#fff', borderRadius:'7px', padding:'4px 12px', fontSize:'12px', fontWeight:'700', whiteSpace:'nowrap', textDecoration:'none', display:'inline-flex', alignItems:'center', gap:'4px' }}>
                👥 커뮤니티
              </a>
              <button className="cn-hdr-actions" onClick={() => setShowMedSettings(true)} style={{ background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)', color:'#fff', borderRadius:'7px', padding:'4px 12px', cursor:'pointer', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap' }}>
                ⚙️ 복약설정
              </button>
              <button className="cn-hdr-actions" onClick={() => setShowImport(true)} style={{ background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)', color:'#fff', borderRadius:'7px', padding:'4px 12px', cursor:'pointer', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap' }}>
                📱 가져오기
              </button>
              <button className="cn-hdr-actions" onClick={() => setRefreshKey(k => k + 1)} disabled={syncing}
                style={{ background: syncing?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)', color: syncing?'rgba(255,255,255,0.45)':'#fff', borderRadius:'7px', padding:'4px 12px', cursor: syncing?'default':'pointer', fontSize:'12px', fontWeight:'600', whiteSpace:'nowrap' }}>
                {syncing ? '⏳' : '🔄 새로고침'}
              </button>
              {lastImport && <span className="cn-hdr-actions" style={{ fontSize:'12px', color:'rgba(255,255,255,0.45)', whiteSpace:'nowrap' }}>마지막: {lastImport}</span>}
            </div>
          </div>
        </div>

        {/* Banner: 헤더 바로 아래 */}
        <BannerSlot slotId="top" />

        {/* Main */}
        <div className="cn-main-pad" style={{ maxWidth:'1140px', margin:'0 auto', padding:'22px 16px' }}>
          <div className="main-grid" style={{ display:'grid', gridTemplateColumns:'1fr 330px', gap:'18px', minWidth:0 }}>

            {/* ── LEFT ── */}
            <div style={{ minWidth:0 }}>

              {/* 상단 요약 카드 2개 (복약·혈당) — 아래 카드와 동일 패딩(18px 4vw) */}
              {(() => {
                const sc = { background:'var(--card-bg)', border:'1px solid var(--card-border)', borderRadius:'16px',
                             boxShadow:'var(--card-shadow)', padding:'18px 4vw', display:'flex', alignItems:'center', gap:'12px', boxSizing:'border-box', minWidth:0 };
                return (
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'14px', marginBottom:'14px' }}>
                    <div style={sc}>
                      <span className="dash-ic-chip"><img src="icons/drug3.png" alt=""/></span>
                      <div style={{ minWidth:0 }}>
                        <div style={{ fontSize:'13px', color:'var(--text-sub)', fontWeight:'700' }}>오늘 복약</div>
                        <div style={{ fontFamily:'var(--font-title)', fontSize:'22px', fontWeight:'700', color: medPct===100?'var(--cn-ok)':'var(--text)', lineHeight:1.1 }}>
                          {medDone}<span style={{ fontSize:'14px', color:'var(--text-mute)' }}>/{allMedIds.length}</span>
                        </div>
                      </div>
                    </div>
                    <div style={sc}>
                      <span className="dash-ic-chip"><img src="icons/case.png" alt=""/></span>
                      <div style={{ minWidth:0 }}>
                        <div style={{ fontSize:'13px', color:'var(--text-sub)', fontWeight:'700' }}>평균 혈당</div>
                        <div style={{ fontFamily:'var(--font-title)', fontSize:'22px', fontWeight:'700', color: bsAvg?bsColor(bsAvg):'var(--text-mute)', lineHeight:1.1 }}>
                          {bsAvg || '---'}<span style={{ fontSize:'13px', color:'var(--text-mute)', fontWeight:'600' }}> mg/dL</span>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* 건강 신호 (HealthKit 바이탈: 심박·HRV·수면·심전도) */}
              {(vitals.hr || vitals.restingHR || vitals.hrv || vitals.sleepHours || ecg) && (() => {
                const sleepScore = vitals.sleepHours ? Math.max(0, Math.min(100, Math.round(100 - Math.abs(vitals.sleepHours - 8) * 15))) : null;
                // 위험지수: 안정시심박 높을수록·HRV 낮을수록 위험 (0~100, 낮을수록 좋음)
                let risk = null;
                if (vitals.restingHR || vitals.hrv) {
                  let r = 0, n = 0;
                  if (vitals.restingHR) { r += Math.max(0, Math.min(100, (vitals.restingHR - 55) * 2.5)); n++; }
                  if (vitals.hrv)       { r += Math.max(0, Math.min(100, (60 - vitals.hrv) * 1.6)); n++; }
                  risk = n ? Math.round(r/n) : null;
                }
                const riskLabel = risk==null ? '' : risk < 30 ? '양호' : risk < 60 ? '주의' : '위험';
                const riskColor = risk==null ? 'var(--text-mute)' : risk < 30 ? 'var(--cn-ok)' : risk < 60 ? 'var(--cn-warn)' : 'var(--cn-danger)';
                const cell = (icon, label, val, unit, color) => (
                  <div style={{ background:'var(--input-bg)', borderRadius:'14px', padding:'14px 10px', textAlign:'center', border:'1px solid var(--card-border)' }}>
                    <div style={{ fontSize:'20px', marginBottom:'3px' }}>{icon}</div>
                    <div style={{ fontSize:'11px', color:'var(--text-sub)', fontWeight:'700', marginBottom:'2px' }}>{label}</div>
                    <div style={{ fontFamily:'var(--font-title)', fontSize:'22px', fontWeight:'700', color: color||'var(--text)', lineHeight:1.1 }}>{val ?? '--'}<span style={{ fontSize:'11px', color:'var(--text-mute)', fontWeight:'600' }}>{unit}</span></div>
                  </div>
                );
                return (
                  <Card tab="record">
                    <STitle icon="icons/blood.png" label="건강 신호" right={vitals.at ? <span style={{fontSize:'11px',color:'var(--text-mute)'}}>애플 건강 연동</span> : null} />
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'10px' }}>
                      {cell('❤️','심박수', vitals.hr ?? vitals.restingHR, ' bpm')}
                      {cell('💗','안정시 심박', vitals.restingHR, ' bpm')}
                      {cell('📈','HRV', vitals.hrv, ' ms')}
                      {cell('😴','수면점수', sleepScore, sleepScore!=null?'점':'', sleepScore!=null ? (sleepScore>=80?'var(--cn-ok)':sleepScore>=60?'var(--cn-warn)':'var(--cn-danger)') : null)}
                    </div>
                    {vitals.sleepHours!=null && <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'6px' }}>어젯밤 수면 <strong>{vitals.sleepHours}시간</strong></div>}
                    {risk!=null && (
                      <div style={{ marginTop:'6px' }}>
                        <div style={{ display:'flex', justifyContent:'space-between', fontSize:'12px', marginBottom:'4px' }}>
                          <span style={{ color:'var(--text-sub)', fontWeight:'700' }}>심혈관 위험지수</span>
                          <span style={{ color:riskColor, fontWeight:'800' }}>{riskLabel} ({risk})</span>
                        </div>
                        <div style={{ background:'var(--card-border)', borderRadius:'5px', height:'8px', overflow:'hidden' }}>
                          <div style={{ width:`${risk}%`, height:'100%', background:riskColor, borderRadius:'5px', transition:'width 0.5s' }}/>
                        </div>
                      </div>
                    )}
                    {ecg && (
                      <div style={{ display:'flex', alignItems:'center', gap:'8px', marginTop:'12px', padding:'10px 12px', background:'var(--input-bg)', borderRadius:'12px', border:'1px solid var(--card-border)' }}>
                        <span style={{ fontSize:'22px' }}>🫀</span>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:'12px', color:'var(--text-sub)', fontWeight:'700' }}>최근 심전도(ECG)</div>
                          <div style={{ fontSize:'15px', fontWeight:'800', color: ecg.classification?.includes('정상')?'var(--cn-ok)':ecg.classification?.includes('세동')?'var(--cn-danger)':'var(--text)' }}>{ecg.classification}{ecg.avgHR?` · 평균 ${ecg.avgHR}bpm`:''}</div>
                        </div>
                      </div>
                    )}
                    <div style={{ fontSize:'10px', color:'var(--text-mute)', marginTop:'10px', lineHeight:1.5 }}>⚠️ 참고용 지표이며 의료 진단이 아닙니다. 이상 시 의료진과 상담하세요.</div>
                  </Card>
                );
              })()}

              {/* 물 섭취 (2L 목표) */}
              {(() => {
                const goalMl = 2000;
                const cur = Number(day.water_ml) || 0;
                const pct = Math.min(100, Math.round(cur/goalMl*100));
                const addWater = (ml) => upDay({ water_ml: String(Math.max(0, cur + ml)) });
                return (
                  <Card tab="record">
                    <STitle icon="icons/ic-water.png" label="물 섭취" right={<span style={{fontSize:'12px',color:'var(--text-sub)',fontWeight:'700'}}>목표 2L</span>} />
                    <div style={{ display:'flex', alignItems:'baseline', gap:'6px', marginBottom:'10px' }}>
                      <span style={{ fontFamily:'var(--font-title)', fontSize:'34px', fontWeight:'700', color: pct>=100?'var(--cn-ok)':'var(--cn-brand)', lineHeight:1 }}>{(cur/1000).toFixed(2)}</span>
                      <span style={{ fontSize:'15px', color:'var(--text-sub)', fontWeight:'600' }}>/ 2 L</span>
                      <span style={{ fontSize:'13px', color:'var(--text-mute)', marginLeft:'auto', fontWeight:'700' }}>{pct}%</span>
                    </div>
                    <div style={{ background:'var(--card-border)', borderRadius:'6px', height:'10px', overflow:'hidden', marginBottom:'14px' }}>
                      <div style={{ width:`${pct}%`, height:'100%', background: pct>=100?'var(--cn-ok)':'var(--cn-brand)', borderRadius:'6px', transition:'width 0.4s' }}/>
                    </div>
                    <div style={{ display:'flex', gap:'8px' }}>
                      {[{l:'+ 한 컵',v:250},{l:'+ 큰 컵',v:350},{l:'+ 병',v:500}].map(b => (
                        <button key={b.v} onClick={() => addWater(b.v)}
                          style={{ flex:1, padding:'12px 4px', background:'var(--cn-brand-100)', border:'1px solid var(--cn-brand)', color:'var(--cn-brand)', borderRadius:'12px', cursor:'pointer', fontSize:'14px', fontWeight:'800' }}>
                          💧 {b.l}<br/><span style={{fontSize:'11px',fontWeight:'600'}}>{b.v}ml</span>
                        </button>
                      ))}
                    </div>
                    {cur > 0 && <button onClick={() => upDay({ water_ml: '0' })} style={{ width:'100%', marginTop:'8px', padding:'8px', background:'none', border:'1px solid var(--card-border)', color:'var(--text-mute)', borderRadius:'10px', cursor:'pointer', fontSize:'12px', fontWeight:'700' }}>초기화</button>}
                  </Card>
                );
              })()}

              {/* 오늘 활동 요약 4카드 */}
              <Card tab="record">
                <STitle icon="icons/watch1.png" label="오늘 활동" />
                {(() => {
                  // 활동 데이터 유효성 검사 — 0도 유효한 값으로 처리 (단축어·건강앱 연동 시 0 기록 가능)
                  const hasVal = (v) => v !== '' && v !== null && v !== undefined && !isNaN(Number(v));
                  const stepsNum = hasVal(day.steps) ? Number(day.steps) : null;
                  const calNum   = hasVal(day.cal)   ? Number(day.cal)   : null;
                  const bcalNum  = hasVal(day.bcal)  ? Number(day.bcal)  : null;
                  const distNum  = hasVal(day.dist)  ? Number(day.dist)  : null;
                  const stepGoal = Math.max(1000, parseInt(goals?.steps) || 10000);
                  const stepsPct = stepsNum !== null && stepsNum > 0 ? Math.min(100, Math.round(stepsNum / stepGoal * 100)) : null;
                  // 총 소모 칼로리 = 활동(cal) + 기초대사량(bcal)
                  const totalCalNum = (calNum !== null || bcalNum !== null)
                    ? (calNum || 0) + (bcalNum || 0) : null;
                  const calSub = (calNum !== null && bcalNum !== null)
                    ? `활동 ${Math.round(calNum)} + 기초 ${Math.round(bcalNum)}`
                    : (bcalNum !== null ? `기초 ${Math.round(bcalNum)}` : (calNum !== null ? `활동 ${Math.round(calNum)}` : null));
                  // 식사 섭취 칼로리 추정
                  const estCal = (text) => {
                    if (!text?.trim()) return 0;
                    const items = text.split(/[\n]+/).map(s=>s.trim()).filter(Boolean)
                      // AI 분석 결과 줄 제외: kcal/cal 포함, 이모지 헤더, 대시 목록
                      .filter(s => !/kcal|칼로리|탄수화물|단백질|지방|혈당|적합|개선|총\s*영양|음식\s*목록|Powered/i.test(s))
                      .filter(s => !/^[-•🍽📊🩸✅💡⚠️※]/.test(s))
                      // 쉼표·슬래시 재분리
                      .flatMap(s => s.split(/[,\/]+/).map(x=>x.trim()).filter(Boolean));
                    let tot = 0;
                    items.forEach(item => {
                      const q = item.match(/(\d+(?:\.\d+)?)\s*(공기|개|그릇|봉|접시|잔|컵|조각|인분)/);
                      const qty = q ? parseFloat(q[1]) : 1;
                      let best=null, bestLen=0;
                      for (const [name,cal] of Object.entries(FOOD_DB)) {
                        if (item.includes(name) && name.length>bestLen) { best=cal; bestLen=name.length; }
                      }
                      if (best) tot += Math.round(best*qty);
                    });
                    return tot;
                  };
                  let intakeCal = 0;
                  ['breakfast','lunch','dinner'].forEach(id => { intakeCal += estCal(day.meals?.[id]); });
                  (day.extraMeals||[]).forEach(em => { intakeCal += estCal(em.text); });

                  const cards = [
                    { icon:'👟', label:'걸음수',     val: stepsNum !== null ? stepsNum.toLocaleString()                  : '---', unit:'걸음',  color:'var(--cn-brand)',  hasData: stepsNum !== null, pct: stepsPct },
                    { icon:'🔥', label:'총 소모',     val: totalCalNum !== null ? Math.round(totalCalNum).toLocaleString() : '---', unit:'kcal', color:'var(--cn-danger)', hasData: totalCalNum !== null, pct: null, sub: calSub || '활동+기초 합산' },
                    { icon:'📍', label:'거리',        val: distNum  !== null ? distNum.toFixed(1)                        : '---', unit:'km',   color:'var(--cn-ok)',    hasData: distNum !== null,  pct: null },
                    { icon:'🍽️', label:'섭취(추정)',  val: intakeCal>0  ? intakeCal.toLocaleString()                    : '---', unit:'kcal', color:'#a855f7',         hasData: intakeCal>0,  pct: null, sub: intakeCal>0 ? '식사 기록 기반' : '식사 입력 후 표시' },
                  ];
                  return (
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', width:'100%', minWidth:0, boxSizing:'border-box' }}>
                      {cards.map(item => (
                        <div key={item.label} style={{ background:'var(--input-bg)', borderRadius:'14px', padding:'14px 10px', textAlign:'center', border:'1px solid var(--card-border)', minWidth:0, overflow:'hidden', boxSizing:'border-box', wordBreak:'break-all' }}>
                          <div style={{ fontSize:'22px', marginBottom:'4px' }}>{item.icon}</div>
                          <div style={{ fontSize:'11px', color:'var(--text-sub)', fontWeight:'600', marginBottom:'2px' }}>{item.label}</div>
                          <div style={{ fontSize:'20px', fontWeight:'900', color: item.hasData ? item.color : 'var(--text-mute)', letterSpacing:'-0.5px', lineHeight:1.1 }}>{item.val}</div>
                          <div style={{ fontSize:'11px', color:'var(--text-sub)', marginTop:'3px' }}>{item.unit}</div>
                          {item.sub && <div style={{ fontSize:'10px', color:'var(--text-mute)', marginTop:'2px' }}>{item.sub}</div>}
                          {item.pct !== null && (
                            <div style={{ marginTop:'6px' }}>
                              <div style={{ background:'var(--card-border)', borderRadius:'3px', height:'4px', overflow:'hidden' }}>
                                <div style={{ width:`${item.pct}%`, background: item.pct>=100?'var(--cn-ok)':item.color, height:'100%', borderRadius:'3px', transition:'width 0.5s' }}/>
                              </div>
                              <div style={{ fontSize:'10px', color: item.pct>=100?'var(--cn-ok)':'var(--text-mute)', marginTop:'2px', fontWeight:'700' }}>{item.pct>=100?'🎉 목표달성!':'목표 '+item.pct+'%'}</div>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  );
                })()}
                {(() => {
                  const has = (v) => v !== '' && v !== null && v !== undefined && !isNaN(Number(v));
                  if (has(day.steps) || has(day.cal) || has(day.bcal) || has(day.dist)) return null;
                  return (
                    <div style={{ fontSize:'11px', color:'var(--text-mute)', textAlign:'center', marginTop:'10px' }}>
                      📲 건강앱 단축어로 자동 기록할 수 있어요
                    </div>
                  );
                })()}
              </Card>

              {/* 복약 */}
              <Card tab="record">
                {/* 헤더 — 탭하면 접기/펴기 + 설정 버튼 */}
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', userSelect:'none' }}>
                  <div onClick={() => setMedOpen(o => !o)} style={{ display:'flex', alignItems:'center', cursor:'pointer', flex:1, minWidth:0 }}>
                    <STitle icon="icons/drug3.png" label="오늘의 복약 체크리스트" right={`${medDone}/${allMedIds.length} 완료`} />
                    <span style={{ fontSize:'18px', color:'var(--text-mute)', marginLeft:'8px', transition:'transform 0.2s', transform: medOpen ? 'rotate(0deg)' : 'rotate(-90deg)', flexShrink:0 }}>▾</span>
                  </div>
                  <button onClick={(e) => { e.stopPropagation(); setShowMedSettings(true); }}
                    style={{ marginLeft:'8px', marginBottom:'18px', background:'var(--cn-brand-100)', border:'1px solid var(--cn-brand)', color:'var(--cn-brand)', borderRadius:'9px', padding:'7px 12px', cursor:'pointer', fontSize:'13px', fontWeight:'700', whiteSpace:'nowrap', flexShrink:0 }}>
                    ⚙️ 설정
                  </button>
                </div>

                {/* 접기/펴기 영역 */}
                {medOpen && (<>
                <div style={{ background:'var(--card-border)', borderRadius:'6px', height:'6px', marginBottom:'16px', overflow:'hidden' }}>
                  <div style={{ width:`${medPct}%`, height:'100%', borderRadius:'6px', background:medPct===100?'var(--cn-ok)':'var(--cn-brand)', transition:'width 0.5s ease' }}/>
                </div>
                {medsConfig.length === 0 && (
                  <div style={{ textAlign:'center', padding:'28px 16px', background:'var(--input-bg)', borderRadius:'12px', border:'1.5px dashed var(--card-border)' }}>
                    <div style={{ display:'inline-flex', width:'104px', height:'104px', borderRadius:'50%', overflow:'hidden', marginBottom:'8px',
                                  background:'radial-gradient(circle at 50% 40%, #ffffff 0%, #eef3fb 80%)', alignItems:'center', justifyContent:'center' }}>
                      <img src="mascot.png" alt="" style={{ width:'96px', height:'96px', objectFit:'cover', objectPosition:'center top' }}/>
                    </div>
                    <div style={{ fontSize:'16px', fontWeight:'800', color:'var(--text)', marginBottom:'6px' }}>복약 정보가 없어요</div>
                    <div style={{ fontSize:'13px', color:'var(--text-sub)', marginBottom:'14px' }}>복용 중인 약을 등록하면 매일 체크할 수 있어요</div>
                    <button onClick={() => (() => {
                // 모달 열기 전 — medsConfig가 비어있고 localStorage에 데이터 있으면 먼저 복구
                setShowMedSettings(true);
              })()}
                      style={{ background:'var(--cn-brand)', color:'#fff', border:'none', borderRadius:'8px', padding:'8px 20px', cursor:'pointer', fontSize:'13px', fontWeight:'700' }}>
                      ⚙️ 복약 설정하기
                    </button>
                  </div>
                )}
                {(() => {
                  const totalMeds = medsConfig.reduce((acc, slot) => acc + (slot.items||[]).length, 0);
                  const hasAnyActive = medsConfig.some(slot =>
                    (slot.items||[]).some(med => isMedActive(med, date))
                  );
                  // 약은 등록됐지만 오늘 해당 없는 경우 안내
                  if (medsConfig.length > 0 && totalMeds > 0 && !hasAnyActive) {
                    return (
                      <div style={{ textAlign:'center', padding:'18px 16px', background:'var(--input-bg)', borderRadius:'12px', border:'1.5px dashed var(--card-border)' }}>
                        <div style={{ fontSize:'22px', marginBottom:'6px' }}>📅</div>
                        <div style={{ fontSize:'14px', fontWeight:'700', color:'var(--text)', marginBottom:'4px' }}>오늘은 복약 없는 날이에요</div>
                        <div style={{ fontSize:'13px', color:'var(--text-sub)' }}>등록된 약 {totalMeds}개 중 오늘({fmtDate(date).short}) 해당 없음</div>
                      </div>
                    );
                  }
                  return medsConfig.map(slot => {
                    const activeItems = (slot.items||[]).filter(med => isMedActive(med, date));
                    if (!activeItems.length) return null;
                    return (
                    <div key={slot.key} style={{ background:slot.bg, border:`1px solid ${slot.border}`, borderRadius:'10px', padding:'12px 14px', marginBottom:'10px' }}>
                      <div style={{ fontSize:'16px', fontWeight:'800', color:slot.color, marginBottom:'8px', display:'flex', gap:'6px', alignItems:'center' }}>
                        {slot.icon} {slot.slot}
                      </div>
                      {activeItems.map(med => (
                        <div key={med.id} style={{ display:'flex', alignItems:'center', gap:'8px', padding:'6px 0', borderTop:'1px solid rgba(0,0,0,0.05)', minWidth:0 }}>
                          <input type="checkbox" className="med-checkbox" checked={!!day.meds[med.id]} onChange={() => togMed(med.id)} style={{ flexShrink:0 }} />
                          <label onClick={() => togMed(med.id)} style={{ flex:1, cursor:'pointer', minWidth:0, overflow:'hidden' }}>
                            <div style={{ fontSize:'14px', fontWeight:'600', color:day.meds[med.id]?'var(--text-mute)':'var(--cn-ink)', textDecoration:day.meds[med.id]?'line-through':'none', transition:'all 0.2s', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{med.name}</div>
                            <div style={{ fontSize:'13px', color:'var(--text-sub)' }}>{med.dose}</div>
                          </label>
                          <button onClick={e => { e.stopPropagation(); setDrugInfoModal(med.name); }} title="약 정보 보기"
                            style={{ background:dm?'var(--cn-brand-100)':'var(--cn-brand-100)', border:'1px solid #bfdbfe', borderRadius:'6px', cursor:'pointer', fontSize:'12px', color:'var(--cn-brand)', padding:'3px 7px', flexShrink:0, fontWeight:'600', whiteSpace:'nowrap' }}>약정보</button>
                          {day.meds[med.id] && <span style={{ color:'var(--cn-ok)', fontSize:'14px', flexShrink:0 }}>✓</span>}
                        </div>
                      ))}
                    </div>
                    );
                  });
                })()}
                </>)}
              </Card>

              {/* Banner: 복약 체크리스트 아래 */}
              <BannerSlot slotId="after_meds" />

              {/* 혈당 */}
              <Card tab="record">
                <STitle icon="icons/case.png" label="혈당 기록" right={(() => {
                  if (!lluLatest) return "단위: mg/dL";
                  const arrows = {1:'↓',2:'↘',3:'→',4:'↗',5:'↑'};
                  const mins = Math.max(0, Math.round((Date.now() - new Date(lluLatest.ts).getTime()) / 60000));
                  return `📡 ${lluLatest.mgdl} ${arrows[lluLatest.trend]||''} mg/dL · ${isNaN(mins) ? '' : mins + '분 전'}`;
                })()} />
                <div style={{ display:'flex', gap:'10px', marginBottom:'14px', flexWrap:'wrap', fontSize:'16px' }}>
                  {[{c:'var(--cn-low)',t:'저혈당 (<70)'},{c:'var(--cn-ok)',t:'정상 (70–140)'},{c:'var(--cn-warn)',t:'주의 (140–180)'},{c:'var(--cn-danger)',t:'높음 (>180)'}].map(l => (
                    <div key={l.t} style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                      <div style={{ width:'9px', height:'9px', borderRadius:'50%', background:l.c }}/>
                      <span style={{ color:'var(--text-sub)' }}>{l.t}</span>
                    </div>
                  ))}
                </div>
                {/* 블루투스 혈당기 가져오기 (앱 전용) */}
                {_isNativeApp && (
                  <div style={{ marginBottom:'14px' }}>
                    <button onClick={readBleGlucose} disabled={bleBusy}
                      style={{ width:'100%', padding:'11px', background: bleBusy ? 'var(--card-border)' : 'var(--cn-brand-100)',
                        border:'1px solid var(--cn-brand)', color:'var(--cn-brand)', borderRadius:'10px',
                        cursor: bleBusy ? 'default' : 'pointer', fontSize:'14px', fontWeight:'700',
                        display:'flex', alignItems:'center', justifyContent:'center', gap:'6px' }}>
                      {bleBusy ? '🔄 연결 중...' : '📲 혈당기에서 가져오기 (아큐첵 등 블루투스)'}
                    </button>
                    {bleMsg && <div style={{ fontSize:'11px', color:'var(--text-sub)', marginTop:'6px', lineHeight:1.5, textAlign:'center' }}>{bleMsg}</div>}
                  </div>
                )}
                <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:'10px' }}>
                  {BS_FIELDS.map(f => {
                    const v = day.bs[f.id] || ''; const c = bsColor(v);
                    return (
                      <div key={f.id} style={{ background:'var(--input-bg)', borderRadius:'12px', padding:'12px 10px', border:'1px solid var(--card-border)', outline:v?`2px solid ${c}`:'none', outlineOffset:'-1px', transition:'outline-color 0.2s', minWidth:0, overflow:'hidden' }}>
                        <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'4px' }}>{f.icon} {f.label}</div>
                        {/* 숫자 + 단위 + 배지 — 한 줄 */}
                        <div style={{ display:'flex', alignItems:'center', gap:'4px', flexWrap:'wrap' }}>
                          {/* 3자리 기준 고정폭 컨테이너 */}
                          <div className="bs-input-wrap" style={{ width:'96px', flexShrink:0 }}>
                            <input
                              type="text" inputMode="numeric" pattern="[0-9]*"
                              value={v} onChange={e => { const n = e.target.value.replace(/[^0-9]/g,''); updBS(f.id, n); }}
                              placeholder="---"
                              className="bs-num-input"
                              style={{ width:'100%', border:'none', background:'transparent', fontSize:'40px', fontWeight:'900',
                                color:v?c:'var(--text-mute)', outline:'none', padding:0, lineHeight:1.1, letterSpacing:'-1px',
                                fontVariantNumeric:'tabular-nums' }}
                            />
                          </div>
                          {/* 단위 + 상태 배지 — 오른쪽으로 여백 추가 */}
                          <div style={{ display:'flex', alignItems:'center', gap:'5px', marginLeft:'8px' }}>
                            <span style={{ fontSize:'11px', color:'var(--text-sub)', fontWeight:'600', flexShrink:0 }}>mg/dL</span>
                            {v
                              ? <span style={{ background:c, color:'#fff', borderRadius:'20px', padding:'2px 7px', fontSize:'11px', fontWeight:'700', whiteSpace:'nowrap' }}>{bsLabel(v)}</span>
                              : <span style={{ fontSize:'10px', color:dm?'var(--text-sub)':'#d1d5db', whiteSpace:'nowrap' }}>목표:{f.target}</span>
                            }
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </Card>

              {/* Banner: 혈당 입력 아래 */}
              <BannerSlot slotId="after_bs" />

              {/* 혈압 */}
              {(() => {
                const bp  = day.bp || {sys:'',dia:''};
                const sys = parseInt(bp.sys) || 0;
                const dia = parseInt(bp.dia) || 0;
                const hasBP = sys > 0 && dia > 0;

                // 혈압 분류 (대한고혈압학회 기준)
                const bpInfo = (() => {
                  if (!hasBP) return null;
                  if (sys < 120 && dia < 80)  return { label:'정상',       color:'var(--cn-ok)', bg:'var(--cn-ok-100)', border:'var(--cn-ok)' };
                  if (sys < 130 && dia < 80)  return { label:'주의혈압',    color:'#65a30d', bg:'#f7fee7', border:'#bef264' };
                  if (sys < 140 || dia < 90)  return { label:'고혈압 전단계', color:'var(--cn-warn)', bg:'var(--cn-warn-100)', border:'var(--cn-warn)' };
                  if (sys < 160 || dia < 100) return { label:'고혈압 1기',   color:'#ea580c', bg:'#fff7ed', border:'#fdba74' };
                  return                              { label:'고혈압 2기',   color:'var(--cn-danger)', bg:'var(--cn-danger-100)', border:'var(--cn-danger)' };
                })();

                // 최근 7일 혈압 추이
                const bpWeek = Array.from({length:7}, (_,i) => {
                  const d  = shiftDate(date, i-6);
                  const dd = normalizeDay(data[d]);
                  return { label: fmtDate(d).short, sys: parseInt(dd.bp?.sys)||null, dia: parseInt(dd.bp?.dia)||null };
                });
                const hasBPWeek = bpWeek.some(x => x.sys);

                return (
                  <Card tab="record">
                    <STitle icon="icons/blood.png" label="혈압 기록" />

                    {/* 분류 기준 범례 */}
                    <div className="bp-legend" style={{ display:'flex', gap:'8px', marginBottom:'14px', flexWrap:'wrap', fontSize:'12px' }}>
                      {[
                        { c:'var(--cn-ok)', t:'정상 (<120/80)' },
                        { c:'#65a30d', t:'주의 (120–129/~80)' },
                        { c:'var(--cn-warn)', t:'전단계 (130–139/80–89)' },
                        { c:'#ea580c', t:'1기 (140–159/90–99)' },
                        { c:'var(--cn-danger)', t:'2기 (≥160/≥100)' },
                      ].map(l => (
                        <div key={l.t} style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                          <div style={{ width:'8px', height:'8px', borderRadius:'50%', background:l.c }}/>
                          <span style={{ color:'var(--text-sub)' }}>{l.t}</span>
                        </div>
                      ))}
                    </div>

                    {/* 입력 영역 */}
                    <div style={{ background:hasBP&&bpInfo ? bpInfo.bg : 'var(--input-bg)', borderRadius:'14px', padding:'16px 18px', border: hasBP&&bpInfo ? `2px solid ${bpInfo.border}` : '1px solid var(--card-border)', transition:'all 0.2s', marginBottom:'14px' }}>
                      <div style={{ display:'flex', alignItems:'center', gap:'12px', flexWrap:'wrap' }}>

                        {/* 수축기 */}
                        <div style={{ display:'flex', flexDirection:'column', alignItems:'center' }}>
                          <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'4px', fontWeight:'600' }}>수축기 (최고)</div>
                          <div style={{ display:'flex', alignItems:'baseline', gap:'4px' }}>
                            <input
                              type="text" inputMode="numeric" pattern="[0-9]*"
                              value={bp.sys}
                              onChange={e => {
                                const raw = e.target.value;
                                // "120/80" 또는 "120 80" 형식 붙여넣기 처리
                                const combined = raw.match(/^(\d{1,3})[\/\s](\d{1,3})$/);
                                if (combined) {
                                  upDay({ bp: { sys: combined[1], dia: combined[2] } });
                                  setTimeout(() => bpDiaRef.current?.focus(), 0);
                                  return;
                                }
                                updBP('sys', raw.replace(/[^0-9]/g,''));
                              }}
                              onKeyDown={e => {
                                // "/" 키 → 이완기로 포커스 이동
                                if (e.key === '/') {
                                  e.preventDefault();
                                  bpDiaRef.current?.focus();
                                }
                              }}
                              placeholder="---"
                              className="bp-num-input"
                              size={bp.sys ? Math.max(2, bp.sys.length) : 3}
                              style={{ width:'auto', border:'none', background:'inherit', fontSize:'44px', fontWeight:'900',
                                color: hasBP&&bpInfo ? bpInfo.color : 'var(--text-mute)', outline:'none', padding:0, lineHeight:1.1, letterSpacing:'-1px' }}
                            />
                            <span style={{ fontSize:'13px', color:'var(--text-sub)', fontWeight:'500' }}>mmHg</span>
                          </div>
                        </div>

                        {/* 구분 슬래시 */}
                        <div style={{ fontSize:'40px', color:'var(--card-border)', fontWeight:'300', lineHeight:1, alignSelf:'center', marginTop:'16px' }}>/</div>

                        {/* 이완기 */}
                        <div style={{ display:'flex', flexDirection:'column', alignItems:'center' }}>
                          <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'4px', fontWeight:'600' }}>이완기 (최저)</div>
                          <div style={{ display:'flex', alignItems:'baseline', gap:'4px' }}>
                            <input
                              ref={bpDiaRef}
                              type="text" inputMode="numeric" pattern="[0-9]*"
                              value={bp.dia} onChange={e => updBP('dia', e.target.value.replace(/[^0-9]/g,''))}
                              placeholder="---"
                              className="bp-num-input"
                              size={bp.dia ? Math.max(2, bp.dia.length) : 3}
                              style={{ width:'auto', border:'none', background:'inherit', fontSize:'44px', fontWeight:'900',
                                color: hasBP&&bpInfo ? bpInfo.color : 'var(--text-mute)', outline:'none', padding:0, lineHeight:1.1, letterSpacing:'-1px' }}
                            />
                            <span style={{ fontSize:'13px', color:'var(--text-sub)', fontWeight:'500' }}>mmHg</span>
                          </div>
                        </div>

                        {/* 상태 배지 */}
                        {hasBP && bpInfo && (
                          <div style={{ marginLeft:'auto', display:'flex', flexDirection:'column', alignItems:'center', gap:'4px' }}>
                            <span style={{ background:bpInfo.color, color:'#fff', borderRadius:'20px', padding:'4px 14px', fontSize:'13px', fontWeight:'800', whiteSpace:'nowrap' }}>{bpInfo.label}</span>
                            <span style={{ fontSize:'11px', color:'var(--text-sub)', whiteSpace:'nowrap' }}>{sys}/{dia} mmHg</span>
                          </div>
                        )}
                      </div>
                    </div>

                    {/* 7일 추이 */}
                    {hasBPWeek && (() => {
                      const sysVals = bpWeek.filter(x => x.sys).map(x => x.sys);
                      const diaVals = bpWeek.filter(x => x.dia).map(x => x.dia);
                      const minV = Math.min(...diaVals, 60) - 5;
                      const maxV = Math.max(...sysVals, 140) + 5;
                      return (
                        <div style={{ background:'var(--input-bg)', borderRadius:'10px', padding:'12px', marginBottom:'8px' }}>
                          <div style={{ fontSize:'13px', color:'var(--text-sub)', marginBottom:'8px', fontWeight:'600' }}>📈 최근 7일 혈압 추이</div>
                          <div style={{ display:'flex', gap:'4px', alignItems:'flex-end', height:'60px', marginBottom:'4px' }}>
                            {bpWeek.map((d, i) => {
                              if (!d.sys) return (
                                <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end', height:'60px' }}>
                                  <div style={{ width:'100%', height:'4px', background: dm?'var(--divider)':'var(--card-border)', borderRadius:'2px' }}/>
                                  <div style={{ fontSize:'9px', color:'var(--text-sub)', marginTop:'3px', whiteSpace:'nowrap' }}>{d.label}</div>
                                </div>
                              );
                              const sysH = Math.round(((d.sys - minV) / (maxV - minV)) * 50);
                              const diaH = Math.round(((d.dia - minV) / (maxV - minV)) * 50);
                              const bpI2 = (() => {
                                if (d.sys < 120 && d.dia < 80)  return 'var(--cn-ok)';
                                if (d.sys < 130 && d.dia < 80)  return '#65a30d';
                                if (d.sys < 140 || d.dia < 90)  return 'var(--cn-warn)';
                                if (d.sys < 160 || d.dia < 100) return '#ea580c';
                                return 'var(--cn-danger)';
                              })();
                              return (
                                <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end', height:'60px', position:'relative' }}>
                                  {/* 수축기 바 */}
                                  <div style={{ width:'55%', height:`${sysH}px`, background:bpI2, borderRadius:'3px 3px 0 0', minHeight:'4px', position:'absolute', bottom:'14px', left:'22.5%' }}/>
                                  {/* 이완기 바 */}
                                  <div style={{ width:'55%', height:`${diaH}px`, background:bpI2, opacity:0.45, borderRadius:'3px 3px 0 0', minHeight:'4px', position:'absolute', bottom:'14px', left:'22.5%' }}/>
                                  <div style={{ fontSize:'9px', color:'var(--text-sub)', position:'absolute', bottom:0, whiteSpace:'nowrap' }}>{d.label}</div>
                                </div>
                              );
                            })}
                          </div>
                          {/* 값 표시 행 */}
                          <div style={{ display:'flex' }}>
                            {bpWeek.map((d, i) => (
                              <div key={i} style={{ flex:1, textAlign:'center', fontSize:'9px', lineHeight:'1.4' }}>
                                {d.sys ? <><span style={{ color:'var(--cn-danger)', fontWeight:'700', display:'block' }}>{d.sys}</span><span style={{ color:'var(--cn-brand)', fontWeight:'700', display:'block' }}>{d.dia}</span></> : ''}
                              </div>
                            ))}
                          </div>
                          <div style={{ display:'flex', gap:'8px', marginTop:'6px', fontSize:'10px', color:'var(--text-sub)' }}>
                            <span style={{ display:'flex', alignItems:'center', gap:'3px' }}><span style={{ width:'8px', height:'8px', background:'var(--cn-danger)', borderRadius:'2px', display:'inline-block' }}/> 수축기</span>
                            <span style={{ display:'flex', alignItems:'center', gap:'3px' }}><span style={{ width:'8px', height:'8px', background:'var(--cn-brand)', borderRadius:'2px', display:'inline-block', opacity:0.6 }}/> 이완기</span>
                          </div>
                        </div>
                      );
                    })()}
                  </Card>
                );
              })()}

              {/* 식사 */}
              <Card tab="record">
                <STitle icon="icons/salad.png" label="식사 기록" />
                <div style={{ background:dm?'var(--cn-ok-100)':'var(--cn-ok-100)', border:'1px solid var(--cn-ok)', borderRadius:'10px', padding:'12px 14px', marginBottom:'12px', fontSize:'14px' }}>
                  <div style={{ fontWeight:'700', color:'var(--cn-ok)', marginBottom:'8px' }}>💡 당뇨 식단 가이드</div>
                  <div style={{ display:'flex', gap:'20px', flexWrap:'wrap' }}>
                    <div><div style={{ color:'var(--cn-ok)', fontWeight:'700', marginBottom:'3px' }}>✅ 권장</div><div style={{ color:'var(--text)', lineHeight:'1.8' }}>현미·잡곡밥 · 닭가슴살 · 두부 · 생선<br/>채소류 · 달걀 · 콩류 · 견과류(소량)</div></div>
                    <div><div style={{ color:'var(--cn-danger)', fontWeight:'700', marginBottom:'3px' }}>❌ 제한</div><div style={{ color:'var(--text)', lineHeight:'1.8' }}>흰쌀밥 · 흰빵 · 라면 · 과자<br/>사탕·주스 · 탄산음료 · 술</div></div>
                  </div>
                </div>
                <div style={{ background:dm?'var(--cn-warn-100)':'var(--cn-warn-100)', border:dm?'1px solid var(--cn-warn)':'1px solid var(--cn-warn)', borderRadius:'10px', padding:'12px 14px', marginBottom:'14px', fontSize:'14px' }}>
                  <div style={{ fontWeight:'700', color:dm?'var(--cn-warn)':'var(--cn-warn)', marginBottom:'5px' }}>📝 식단 기입 방법</div>
                  <div style={{ color:dm?'var(--cn-warn)':'var(--cn-warn)', lineHeight:'1.8' }}>
                    <strong>형식:</strong> 음식명 + 양 + 탄수화물(g)<br/>
                    <strong>예:</strong> 현미밥 반공기(30g), 닭가슴살 100g, 브로콜리 1컵<br/>
                    <strong>한 끼 탄수화물 목표:</strong> 45–60g (하루 130–180g)
                  </div>
                </div>
                {MEALS.map(m => (
                  <div key={m.id} style={{ marginBottom:'16px' }}>
                    {/* 라벨 + 버튼 행 */}
                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'6px', flexWrap:'wrap', gap:'6px' }}>
                      <div style={{ fontSize:'16px', fontWeight:'700', color:'var(--text)' }}>{m.icon} {m.label}</div>
                      {analyzing===m.id ? (
                        <span style={{ fontSize:'14px', color:'var(--cn-low)', fontWeight:'700' }}>⏳ 분석 중...</span>
                      ) : (
                        <div style={{ display:'flex', gap:'6px', flexWrap:'wrap' }}>
                          {/* 칼로리 추정 (텍스트 기반) */}
                          <button
                            onClick={async () => {
                              const txt = day.meals[m.id];
                              if (!txt || !txt.trim()) { alert('식사 내용을 먼저 입력해 주세요.'); return; }
                              setAnalyzing(m.id);
                              try {
                                const text = await analyzeFoodText(txt.trim());
                                setAnalysisResult({ mealId: m.id, text });
                              } catch(e) { alert('칼로리 추정 실패: ' + e.message); }
                              finally { setAnalyzing(null); }
                            }}
                            disabled={!!analyzing}
                            style={{ background:dm?'var(--cn-warn-100)':'var(--cn-warn-100)', border:'1px solid var(--cn-warn)', color:'var(--cn-warn)', borderRadius:'8px', padding:'5px 11px', cursor:'pointer', fontSize:'14px', fontWeight:'700' }}>
                            🔢 칼로리
                          </button>
                          {/* 카메라 촬영 */}
                          <button onClick={() => camRefs[m.id].current?.click()} disabled={!!analyzing}
                            style={{ background:dm?'var(--cn-low-100)':'var(--cn-low-100)', border:dm?'1px solid var(--cn-low)':'1px solid var(--cn-low)', color:'var(--cn-low)', borderRadius:'8px', padding:'5px 11px', cursor:'pointer', fontSize:'14px', fontWeight:'700' }}>
                            📸 촬영
                          </button>
                          {/* 앨범 선택 */}
                          <button onClick={() => imgRefs[m.id].current?.click()} disabled={!!analyzing}
                            style={{ background:dm?'var(--cn-brand-100)':'var(--cn-brand-100)', border:'1px solid var(--cn-brand)', color:'var(--cn-brand)', borderRadius:'8px', padding:'5px 11px', cursor:'pointer', fontSize:'14px', fontWeight:'700' }}>
                            🖼️ 앨범
                          </button>
                        </div>
                      )}
                      {/* 카메라용 input */}
                      <input ref={camRefs[m.id]} type="file" accept="image/*" capture="environment"
                        onChange={e => e.target.files[0] && handlePhotoSelect(e.target.files[0], m.id)}
                        style={{ display:'none' }} />
                      {/* 앨범용 input */}
                      <input ref={imgRefs[m.id]} type="file" accept="image/*"
                        onChange={e => e.target.files[0] && handlePhotoSelect(e.target.files[0], m.id)}
                        style={{ display:'none' }} />
                    </div>

                    {/* 분석 결과 카드 */}
                    {analysisResult?.mealId === m.id && (
                      <div style={{ border:dm?'1px solid var(--cn-low)':'1px solid var(--cn-low)', borderRadius:'12px', marginBottom:'10px', overflow:'hidden' }}>
                        {/* 헤더 */}
                        <div style={{ background:'linear-gradient(135deg,var(--cn-low),#a855f7)', padding:'10px 14px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                          <span style={{ color:'#fff', fontWeight:'700', fontSize:'16px' }}>🤖 AI 식단 분석 결과</span>
                          <span style={{ color:'rgba(255,255,255,0.7)', fontSize:'16px' }}>Powered by Gemini</span>
                        </div>
                        {/* 내용 */}
                        <div style={{ background:dm?'var(--cn-low-100)':'var(--cn-low-100)', padding:'14px', fontSize:'16px', color:'var(--text)', whiteSpace:'pre-line', lineHeight:'1.9', maxHeight:'400px', overflowY:'auto' }}>
                          {analysisResult.text}
                        </div>
                        {/* 버튼 */}
                        <div style={{ background:'#f5f3ff', padding:'10px 14px', display:'flex', gap:'8px', borderTop:'1px solid #e9d5ff' }}>
                          <button onClick={() => applyAnalysis(m.id, analysisResult.text)}
                            style={{ flex:2, padding:'9px', background:'var(--cn-low)', color:'#fff', border:'none', borderRadius:'8px', cursor:'pointer', fontWeight:'700', fontSize:'16px' }}>
                            ✅ 식사 기록에 추가
                          </button>
                          <button onClick={() => setAnalysisResult(null)}
                            style={{ flex:1, padding:'9px', background:'var(--card-bg)', color:'var(--text-sub)', border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, borderRadius:'8px', cursor:'pointer', fontSize:'16px' }}>
                            닫기
                          </button>
                        </div>
                      </div>
                    )}

                    <textarea value={day.meals[m.id]||''} onChange={e=>updMeal(m.id,e.target.value)} placeholder={m.ph} rows={3}
                      style={{ width:'100%', border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, borderRadius:'8px', padding:'10px 12px', fontSize:'16px', color:'var(--text)', resize:'vertical', outline:'none', lineHeight:'1.6', background:'#fafafa', transition:'border-color 0.2s' }}
                      onFocus={e=>e.target.style.borderColor='var(--cn-brand)'} onBlur={e=>e.target.style.borderColor='var(--card-border)'} />
                  </div>
                ))}

                {/* 추가 식사 슬롯 (간식/야식 등) */}
                {(day.extraMeals||[]).map((em, i) => (
                  <div key={em.id} style={{ marginBottom:'16px', border:'1px solid var(--card-border)', borderRadius:'12px', padding:'12px 14px', background:'var(--input-bg)' }}>
                    {/* 라벨 편집 + 삭제 */}
                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'8px', gap:'8px' }}>
                      <input
                        type="text" value={em.label}
                        onChange={e => { const next = (day.extraMeals||[]).map((x,j)=>j===i?{...x,label:e.target.value}:x); upDay({extraMeals:next}); }}
                        style={{ fontSize:'15px', fontWeight:'700', color:'var(--text)', border:'none', background:'transparent', outline:'none', flex:1 }}
                      />
                      {analyzing===em.id ? (
                        <span style={{ fontSize:'13px', color:'var(--cn-low)', fontWeight:'700' }}>⏳ 분석 중...</span>
                      ) : (
                        <div style={{ display:'flex', gap:'5px' }}>
                          <button
                            onClick={async () => {
                              if (!em.text?.trim()) { alert('식사 내용을 먼저 입력해 주세요.'); return; }
                              setAnalyzing(em.id);
                              try { const text = await analyzeFoodText(em.text.trim()); setAnalysisResult({ mealId: em.id, text }); }
                              catch(e) { alert('칼로리 추정 실패: ' + e.message); }
                              finally { setAnalyzing(null); }
                            }}
                            disabled={!!analyzing}
                            style={{ background:'var(--cn-warn-100)', border:'1px solid var(--cn-warn)', color:'var(--cn-warn)', borderRadius:'7px', padding:'4px 9px', cursor:'pointer', fontSize:'13px', fontWeight:'700' }}>
                            🔢 칼로리
                          </button>
                          <button onClick={() => { const next=(day.extraMeals||[]).filter((_,j)=>j!==i); upDay({extraMeals:next}); }}

                  ];
                  const cur = ranges.find(r => bmiRounded < r.max) || ranges[ranges.length-1];

                  const pct = Math.min(100, Math.max(0, (bmiRounded - 13) / (35 - 13) * 100));

                            { w:'12%', color:'var(--cn-warn)' },
                            { w:'27%', color:'#fb923c' },

                  const minBf = hasBf ? Math.min(...wk.filter(x=>x.bf).map(x=>x.bf)) - 1 : 0;

                              </div>
                            );

                        <div style={{ display:'flex', marginTop:'4px' }}>
                          {wk.map((d,i) => {
                            const prev = i > 0 ? wk[i-1].bf : null;

                            const arr  = diff === null ? '' : diff > 0.04 ? ' ↑' : diff < -0.04 ? ' ↓' : ' →';
                            const clr  = diff === null ? 'var(--cn-low)' : diff > 0.04 ? '#ef4444' : diff < -0.04 ? 'var(--cn-brand)' : 'var(--text-mute)';
                            return (
                              <div key={i} style={{ flex:1, textAlign:'center', fontSize:'9px', color: d.bf ? clr : 'var(--card-border)', fontWeight:'700' }}>

                {/* 건강앱 가져오기 — iOS / Android */}

                      <div key={i} style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px 12px', background:'var(--input-bg)', borderRadius:'12px', marginBottom:'6px', border:'1px solid var(--card-border)' }}>

                    </div>

                </div>

                {/* 걸음수 목표 진행 바 */}

                      </div>

        <div style={{ borderTop:'1px solid var(--divider)', marginTop:'8px', padding:'22px 16px 28px', background:'var(--card-bg)' }}>

              <CareNoteLogo size={20} />

              </a>

                { label:'💬 피드백·버그신고', action:() => setShowFeedback(true) },
                { label:'🔑 비밀번호변경', action:() => setShowChangePw(true) },

                  {label}

              <a href="admin.html" target="_blank" rel="noopener noreferrer"

              </a>
            )}

        <nav className="cn-tabbar">

            { id:'home',      label:'홈',    icon:<><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/></>    },
            { id:'report',    label:'리포트', icon:<><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-5"/></>       },
            { id:'record',    label:'기록', center:true, icon:<><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></> },
            { id:'challenge', label:'커뮤니티', icon:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></> },
