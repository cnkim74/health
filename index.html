                  <div style={{ fontSize:'11px', color:'var(--text-mute)', textAlign:'center', marginBottom:'14px', padding:'6px', background:'var(--input-bg)', borderRadius:'8px', border:'1px dashed var(--card-border)' }}>
                    📲 건강앱 단축어로 걸음수를 자동 가져올 수 있어요
                  </div>
                )}

                {/* 구분선 */}
                <div style={{ borderTop:'1px solid var(--card-border)', marginBottom:'12px' }}/>

                {/* 특별 운동 기록 */}
                <div style={{ fontSize:'13px', fontWeight:'700', color:'var(--text-sub)', marginBottom:'8px' }}>💪 특별 운동 기록</div>

                {/* 프리셋 버튼 — 4+4 그리드 */}
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:'6px', marginBottom:'10px' }}>
                  {[['🚶','걷기'],['🏃','달리기'],['🏊','수영'],['🚴','자전거'],['💪','근력'],['🧘','요가'],['⛳','골프'],['🏋️','헬스']].map(([ic,nm]) => (
                    <button key={nm} onClick={() => addExLog(nm)}
                      style={{ padding:'7px 4px', borderRadius:'10px', border:'1px solid var(--card-border)', background:'var(--input-bg)', fontSize:'12px', fontWeight:'600', color:'var(--text)', cursor:'pointer', textAlign:'center' }}>
                      {ic} {nm}
                    </button>
                  ))}
                </div>

                {/* 운동 목록 */}
                {(day.exercise?.logs||[]).map((log, i) => (
                  <div key={i} style={{ display:'flex', gap:'6px', alignItems:'center', marginBottom:'8px' }}>
                    <input type="text" value={log.type} onChange={e=>updateExLog(i,'type',e.target.value)}
                      placeholder="운동 종류"
                      style={{ ...inpSt, flex:1, marginBottom:0 }} />
                    <input type="number" min="0" value={log.mins} onChange={e=>updateExLog(i,'mins',e.target.value)}
                      placeholder="분"
                      style={{ ...inpSt, width:'64px', marginBottom:0, textAlign:'center' }} />
                    <button onClick={() => removeExLog(i)}
                      style={{ flexShrink:0, width:'30px', height:'30px', borderRadius:'50%', border:'1px solid var(--card-border)', background:'var(--input-bg)', color:'var(--text-mute)', cursor:'pointer', fontSize:'14px', display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                  </div>
                ))}

                {/* + 직접 추가 버튼 */}
                <button onClick={() => addExLog('')}
                  style={{ width:'100%', padding:'8px', borderRadius:'10px', border:'1px dashed var(--card-border)', background:'transparent', color:'var(--text-sub)', fontSize:'13px', fontWeight:'600', cursor:'pointer', marginBottom:'10px' }}>
                  + 직접 추가
                </button>

                <div style={{ fontSize:'11px', color:'var(--cn-ok)', fontWeight:'500', lineHeight:'1.7' }}>
                  💪 식후 30분 걷기가 혈당 조절에 가장 효과적<br/>🎯 하루 최소 30분, 주 5일 목표
                </div>
              </Card>

              {/* 메모 */}
              <Card tab="home">
                <STitle icon="📝" label="오늘의 메모" />
                <textarea value={day.note||''} onChange={e=>upDay({note:e.target.value})} placeholder="특이사항, 컨디션, 저혈당 증상, 의사 선생님께 전달할 내용 등…" rows={4}
                  style={{ ...inpSt, resize:'vertical', lineHeight:'1.6', fontFamily:'inherit' }} />
              </Card>

              {/* 목표 카드 */}
              <Card tab="home" style={{ background:'linear-gradient(135deg,var(--cn-brand-100),var(--cn-ok-100))', border:'1px solid #bfdbfe' }}>
                <div style={{ fontSize:'14px', fontWeight:'700', color:dm?'var(--cn-brand)':'var(--cn-brand-600)', marginBottom:'10px' }}>🎯 인슐린 졸업을 향해!</div>
                <div style={{ fontSize:'14px', color:'var(--text)', lineHeight:'2' }}>
                  ✅ 혈당 꾸준히 기록 (리브레2 연동)<br/>
                  ✅ 탄수화물 조절 (한 끼 45–60g)<br/>
                  ✅ 식후 걷기 30분<br/>
                  ✅ 체중 점진적 감량<br/>
                  ✅ 주치의와 정기 상담<br/><br/>
                  <span style={{ color:'var(--cn-danger)', fontWeight:'600', fontSize:'11px' }}>⚠️ 인슐린은 반드시 의사 지시에 따라 조정하세요.</span>
                </div>
              </Card>
            </div>
          </div>

          {/* Banner: 페이지 맨 아래 */}
          <BannerSlot slotId="bottom" />
        </div>

        {/* ── 모바일 전용: 챌린지 + 프로필 탭 ── */}
        <div className="cn-tab-only-mobile">
          <div style={{ maxWidth:'1140px', margin:'0 auto', padding:'0 16px' }}>
            <ChallengeTab data={data} date={date} userId={userId} userEmail={authUser?.email} darkMode={darkMode} />
            <ProfileTab
              authUser={authUser} userId={userId}
              onSync={() => setShowSync(true)}
              onChangePassword={() => setShowChangePw(true)}
              onDataRecovery={() => setShowDataRecovery(true)}
              onFeedback={() => setShowFeedback(true)}
              onImport={() => setShowImport(true)}
              darkMode={darkMode}
              onToggleDark={() => { _dm=!_dm; document.body.classList.toggle('dark',_dm); localStorage.setItem('cn_dark',_dm?'1':'0'); setDarkMode(_dm); }}
            />
          </div>
        </div>

        {/* ── 단축어 직접 연동 설정 ── */}
        <ShortcutGuide />

        {/* ── 푸터 ── */}
        <div style={{ borderTop:'1px solid var(--divider)', marginTop:'8px', padding:'22px 16px 28px', background:'var(--card-bg)' }}>
          <div style={{ maxWidth:'1140px', margin:'0 auto', display:'flex', flexDirection:'column', alignItems:'center', gap:'14px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
              <CareNoteLogo size={20} />
              <span style={{ fontWeight:'800', fontSize:'14px', color:'var(--text)', letterSpacing:'0.3px' }}>CARENOTE</span>
              <span style={{ color:'var(--text-mute)', fontSize:'12px' }}>내 몸을 기록하는 노트</span>
            </div>
            <div style={{ display:'flex', gap:'6px', flexWrap:'wrap', justifyContent:'center' }}>
              <a href="board.html" target="_blank" rel="noopener noreferrer"
                style={{ background:'var(--cn-brand-100)', border:'1px solid var(--cn-brand)', borderRadius:'20px', padding:'5px 12px',
                  fontSize:'12px', color:'var(--cn-brand)', fontWeight:'700', whiteSpace:'nowrap', textDecoration:'none', display:'inline-block' }}>
                👥 커뮤니티 게시판
              </a>
              {[
                { label:'💬 피드백·버그신고', action:() => setShowFeedback(true) },
                { label:'🔄 기기동기화', action:() => setShowSync(true) },
                { label:'🔑 비밀번호변경', action:() => setShowChangePw(true) },
                { label: darkMode ? '☀️ 라이트모드' : '🌙 다크모드', action:() => { _dm=!_dm; document.body.classList.toggle('dark',_dm); localStorage.setItem('cn_dark',_dm?'1':'0'); setDarkMode(_dm); } },
                { label:'🚪 로그아웃', action:() => supa.auth.signOut() },
              ].map(({ label, action }) => (
                <button key={label} onClick={action}
                  style={{ background:'none', border:'1px solid var(--card-border)', borderRadius:'20px', padding:'5px 12px', cursor:'pointer', fontSize:'12px', color:'var(--text-sub)', fontFamily:'inherit', fontWeight:'600', whiteSpace:'nowrap' }}>
                  {label}
                </button>
              ))}
            </div>
            {isAdmin && (
              <a href="admin.html" target="_blank" rel="noopener noreferrer"
                style={{ background:'none', border:'1px solid var(--card-border)', borderRadius:'20px', padding:'5px 14px', cursor:'pointer', fontSize:'12px', color:'var(--text-sub)', fontFamily:'inherit', fontWeight:'600', whiteSpace:'nowrap', textDecoration:'none', display:'inline-block' }}>
                🛠️ 관리자 설정
              </a>
            )}
            <div style={{ fontSize:'11px', color:'var(--text-mute)' }}>CARENOTE v2.0 · © 2025</div>
          </div>
        </div>

        {/* ── 하단 탭바 (모바일 전용) ── */}
        <nav className="cn-tabbar">
          {[
            { id:'home',      label:'홈',    icon:<><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/></>    },
            { id:'record',    label:'기록',   icon:<><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></> },
            { id:'report',    label:'리포트', icon:<><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-5"/></>       },
            { id:'challenge', label:'커뮤니티', icon:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></> },
            { id:'profile',   label:'프로필', icon:<><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></> },
          ].map(t => (
            <button key={t.id} className={'cn-tab-btn' + (currentTab===t.id?' active':'')}
              onClick={() => setCurrentTab(t.id)}>
              <svg viewBox="0 0 24 24">{t.icon}</svg>
              <span>{t.label}</span>
            </button>
          ))}
        </nav>

        {/* 동기화 배너 (비차단) */}
        {syncing && (
          <div style={{ position:'fixed', bottom:'64px', left:'50%', transform:'translateX(-50%)', background:'rgba(15,23,42,0.88)', color:'#fff', borderRadius:'20px', padding:'6px 16px', fontSize:'12px', fontWeight:'600', zIndex:3000, display:'flex', alignItems:'center', gap:'6px', backdropFilter:'blur(8px)', pointerEvents:'none' }}>
            <span style={{ display:'inline-block', animation:'spin 1s linear infinite', fontSize:'14px' }}>⏳</span> 동기화 중...
          </div>
        )}

        {/* Drug Info Modal */}
        {drugInfoModal && <DrugInfoModal medName={drugInfoModal} onClose={() => setDrugInfoModal(null)} />}

        {/* Import Modal */}
        {showImport && <ImportModal onClose={() => setShowImport(false)} onImport={handleImport} />}

        {/* Sync Modal */}
        {showSync && <SyncModal userId={userId} onClose={() => { setShowSync(false); setRefreshKey(k => k + 1); }} onChangeId={() => { setRefreshKey(k => k + 1); }} />}

        {/* Med Settings Modal */}
        {showMedSettings && <MedSettingsModal meds={medsConfig} onSave={saveMeds} onClose={() => setShowMedSettings(false)} userId={userId} />}

        {/* Change Password Modal */}
        {showChangePw && <ChangePasswordModal onClose={() => setShowChangePw(false)} />}

        {/* Data Recovery Modal */}
        {showDataRecovery && (
          <DataRecoveryModal
            userId={userId}
            onImportData={(patch) => setData(prev => ({ ...prev, ...patch }))}
            onImportMeds={(cfg) => saveMeds(cfg)}
            onClose={() => { setShowDataRecovery(false); setRefreshKey(k=>k+1); }}
          />
        )}

        {/* Admin Modal */}
        {showAdmin && <AdminModal onClose={() => setShowAdmin(false)} userEmail={authUser?.email} />}

        {/* Feedback Modal */}
        {showFeedback && <FeedbackModal authUser={authUser} onClose={() => setShowFeedback(false)} />}

        {/* 내 정보 수정 Modal (데스크탑 헤더에서 접근) */}
        {showProfileEdit && (
          <ProfileEditModal
            authUser={authUser} userId={userId}
            onClose={() => setShowProfileEdit(false)}
            onAvatarUpdate={url => setHdrAvatar(url)}
          />
        )}
      </div>
    );
  };

  /* ── 공통 스타일 상수 ─────────────────────────────────── */
  const navBtnSt = { background:'rgba(255,255,255,0.2)', border:'none', color:'#fff', borderRadius:'8px', padding:'8px 16px', cursor:'pointer', fontSize:'14px', fontWeight:'700', lineHeight:1 };
  /* inpSt는 App 안에서 dm 없이 쓰이므로 CSS 오버라이드로 처리됨 */
  const inpSt    = { width:'100%', border:'1px solid var(--input-border)', borderRadius:'8px', padding:'8px 12px', fontSize:'14px', outline:'none', background:'var(--input-bg)', color:'var(--text)' };

  /* ── 에러 경계 (Error Boundary) ── */
  class ErrorBoundary extends React.Component {
    constructor(props) { super(props); this.state = { error: null }; }
    static getDerivedStateFromError(err) { return { error: err }; }
    componentDidCatch(err, info) {
      console.error('[CARENOTE CRASH]', err, info);
    }
    render() {
      if (this.state.error) {
        return (
          <div style={{
            position:'fixed', inset:0, background:'#0f172a', color:'#f8fafc',
            display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
            padding:'24px', zIndex:99999, fontFamily:'monospace'
          }}>
            <div style={{fontSize:'32px', marginBottom:'12px'}}>🚨</div>
            <div style={{fontSize:'18px', fontWeight:'800', marginBottom:'12px', color:'#f87171'}}>앱 오류 발생</div>
            <div style={{
              background:'#1e293b', borderRadius:'12px', padding:'16px', maxWidth:'90vw',
              fontSize:'13px', lineHeight:1.6, color:'#fbbf24', wordBreak:'break-all',
              maxHeight:'60vh', overflowY:'auto'
            }}>
              <div style={{color:'#f87171', fontWeight:'700', marginBottom:'8px'}}>
                {this.state.error.name}: {this.state.error.message}
              </div>
              <pre style={{margin:0, whiteSpace:'pre-wrap', color:'#94a3b8', fontSize:'11px'}}>
                {this.state.error.stack}
              </pre>
            </div>
            <button onClick={() => window.location.reload()}
              style={{marginTop:'20px', background:'#2563eb', color:'#fff', border:'none',
                borderRadius:'8px', padding:'10px 24px', fontSize:'14px', fontWeight:'700', cursor:'pointer'}}>
              🔄 새로고침
            </button>
          </div>
        );
      }
      return this.props.children;
    }
  }

  ReactDOM.createRoot(document.getElementById('root')).render(
    <ErrorBoundary><App /></ErrorBoundary>
  );
</script>
  <script>
    // 서비스 워커: 캐시 비우기 + 재등록
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        // 대기 중인 새 SW가 있으면 즉시 활성화 요청
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            // 새 SW가 설치되고 이전 SW가 있으면 페이지 새로고침
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              window.location.reload();
            }
          });
        });
      }).catch(() => {});

      // 혹시 이전 캐시가 남아있으면 즉시 전부 삭제
      if (caches && caches.keys) {
        caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      }
    }
  </script>
</body>
</html>
