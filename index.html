  /* ── 애플 건강 파싱 (2MB 청크 스트리밍 - 대용량 파일 지원) ── */
  const parseAppleHealthXML = async (getChunks, totalBytes, onProgress) => {
    const glucoseByDay = {};
    const weightByDay  = {};
    const bodyFatByDay = {};

    const TARGET_KEYS = {
      'HKQuantityTypeIdentifierBloodGlucose':     'glucose',
      'HKQuantityTypeIdentifierBodyMass':          'weight',
      'HKQuantityTypeIdentifierBodyFatPercentage': 'fat'
    };

    const processRecord = (rec) => {
      let type = null;
      for (const [k, t] of Object.entries(TARGET_KEYS)) {
        if (rec.includes(k)) { type = t; break; }
      }
      if (!type) return;
      const val  = parseFloat((rec.match(/\bvalue="([^"]+)"/) || [])[1]);
      const unit = (rec.match(/\bunit="([^"]+)"/) || [])[1] || '';
      const dm   = rec.match(/\bstartDate="(\d{4}-\d{2}-\d{2})\s+(\d{2}):(\d{2})/);
      if (!dm || isNaN(val)) return;
      const dayKey = dm[1];
      const hour   = parseInt(dm[2]) + parseInt(dm[3]) / 60;
      if (type === 'glucose') {
        const mgdl = unit === 'mmol/L' ? Math.round(val * 18.015) : Math.round(val);
        if (!glucoseByDay[dayKey]) glucoseByDay[dayKey] = [];
        glucoseByDay[dayKey].push({ hour, value: mgdl });
      } else if (type === 'weight') {
        const kg = unit === 'lb' ? Math.round(val * 0.453592 * 10) / 10 : Math.round(val * 10) / 10;
        weightByDay[dayKey] = kg;
      } else if (type === 'fat') {
        bodyFatByDay[dayKey] = val <= 1 ? Math.round(val * 100 * 10) / 10 : Math.round(val * 10) / 10;
      }
    };

    let tail = '';           // 이전 청크에서 잘린 불완전한 레코드
    let bytesProcessed = 0;
    let recCount = 0;

    for await (const chunk of getChunks()) {
      const text = tail + chunk;
      let pos = 0;
      let lastEnd = 0;

      while (true) {
        const recStart = text.indexOf('<Record', pos);
        if (recStart === -1) break;
        const recEnd = text.indexOf('/>', recStart);
        if (recEnd === -1) break; // 청크 경계에서 잘린 레코드 → tail로 보관

        const rec = text.substring(recStart, recEnd + 2);
        if (Object.keys(TARGET_KEYS).some(k => rec.includes(k))) processRecord(rec);
        lastEnd = recEnd + 2;
        pos = lastEnd;
        recCount++;
        // 매 50건마다 브라우저에 양보 (UI 반응성 유지)
        if (recCount % 50 === 0) await new Promise(r => setTimeout(r, 0));
      }

      // 마지막 완전한 레코드 이후 텍스트를 다음 청크로 넘김
      tail = text.substring(lastEnd);
      if (tail.length > 30000) tail = tail.slice(-30000); // 안전장치

      bytesProcessed += chunk.length;
      if (onProgress && totalBytes) {
        onProgress(Math.min(99, Math.round(bytesProcessed / totalBytes * 100)));
      }
    }

    if (onProgress) onProgress(100);
    return { glucoseByDay, weightByDay, bodyFatByDay };
  };

  const buildDashboardData = ({ glucoseByDay, weightByDay, bodyFatByDay = {} }) => {
    const result = {};
    Object.entries(glucoseByDay).forEach(([day, readings]) => {
      const bs = {};
      TIME_WINDOWS.forEach(w => {
        const inWin = readings.filter(r => r.hour >= w.startH && r.hour < w.endH).map(r => r.value);
        const med = median(inWin);
        if (med) bs[w.id] = String(med);
      });
      if (Object.keys(bs).length) { result[day] = result[day] || emptyDay(); result[day].bs = bs; }
    });
    Object.entries(weightByDay).forEach(([day, weight]) => {
      result[day] = result[day] || emptyDay();
      result[day].weight = String(weight);
    });
    Object.entries(bodyFatByDay).forEach(([day, bodyFat]) => {
      result[day] = result[day] || emptyDay();
      result[day].bodyFat = String(bodyFat);
    });
    return result;

  /* ── LibreView CSV 파싱 ─────────────────────────────────── */
  const parseCSVRow = (line) => {
    const out = []; let inQ = false; let cur = '';
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    out.push(cur.trim());
    return out;
  };

  const parseLVTimestamp = (s) => {
    s = s.replace(/"/g, '').trim();
    // MM-DD-YYYY HH:MM AM/PM (영어/한국어 오전오후)
    let m = s.match(/(\d{1,2})[/-](\d{1,2})[/-](\d{4})\s+(\d{1,2}):(\d{2})\s*(AM|PM|오전|오후)/i);
    if (m) {
      const [,p1,p2,yyyy,hh,min,ap] = m;
      let h = parseInt(hh);
      if (/PM|오후/i.test(ap) && h!==12) h+=12;
      if (/AM|오전/i.test(ap) && h===12) h=0;
      // LibreView는 MM-DD-YYYY 형식
      return { dayKey:`${yyyy}-${String(p1).padStart(2,'0')}-${String(p2).padStart(2,'0')}`, hour:h+parseInt(min)/60 };
    }
    // YYYY-MM-DD HH:MM
    m = s.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{1,2}):(\d{2})/);
    if (m) {
      const [,yyyy,mm,dd,hh,min] = m;
      return { dayKey:`${yyyy}-${mm}-${dd}`, hour:parseInt(hh)+parseInt(min)/60 };
    }
    return null;
  };

  const parseLibreViewCSV = (csvText) => {
    const lines = csvText.split(/\r?\n/);
    let headerIdx = -1;
    for (let i = 0; i < Math.min(lines.length, 20); i++) {
      if (/timestamp|타임스탬프|时间戳|장치.?타임스탬프/i.test(lines[i])) { headerIdx = i; break; }
    }
    if (headerIdx === -1) return null;

    const headers = parseCSVRow(lines[headerIdx]);
    const tsIdx   = headers.findIndex(h => /timestamp|타임스탬프|장치.?타임스탬프/i.test(h));
    const typeIdx = headers.findIndex(h => /record.?type|레코드|기록.?유형/i.test(h));
    const histIdx = headers.findIndex(h => /historic.?glucose|히스토리.*포도당|과거.?혈당/i.test(h));
    const scanIdx = headers.findIndex(h => /scan.?glucose|스캔.*포도당|혈당.?스캔/i.test(h));

    if (tsIdx === -1) return null;

    const glucoseByDay = {};
    for (let i = headerIdx + 1; i < lines.length; i++) {
      const row = parseCSVRow(lines[i]);
      if (row.length <= tsIdx || !row[tsIdx]) continue;
      const recType = (row[typeIdx] || '').replace(/"/g,'').trim();
      if (recType !== '0' && recType !== '1') continue;

      const rawVal = recType === '0'
        ? parseFloat((row[histIdx]||'').replace(/"/g,''))
        : parseFloat((row[scanIdx]||'').replace(/"/g,''));
      if (isNaN(rawVal) || rawVal <= 0) continue;

      const parsed = parseLVTimestamp(row[tsIdx]);
      if (!parsed) continue;
      const { dayKey, hour } = parsed;
      if (!glucoseByDay[dayKey]) glucoseByDay[dayKey] = [];
      glucoseByDay[dayKey].push({ hour, value: Math.round(rawVal) });
    }
    return glucoseByDay;
  };

  /* ── 가져오기 모달 ─────────────────────────────────────── */
  const ImportModal = ({ onClose, onImport }) => {
    const [tab,     setTab]     = useState('libreview'); // 'apple' | 'libreview'
    const [status,  setStatus]  = useState('idle');
    const [preview, setPreview] = useState(null);
    const [errMsg,  setErrMsg]  = useState('');
    const [progress, setProgress] = useState('');
    const fileRef = useRef(null);

    const reset = () => { setStatus('idle'); setErrMsg(''); setPreview(null); };
    const onTabChange = (t) => { setTab(t); reset(); };

    const processFile = async (file) => {
      setStatus('loading'); setErrMsg('');
      try {
        /* ── LibreView CSV ── */
        if (file.name.endsWith('.csv')) {
          setProgress('CSV 파일 분석 중...');
          await new Promise(r => setTimeout(r, 30));
          const csvText = await file.text();
          const glucoseByDay = parseLibreViewCSV(csvText);
          if (!glucoseByDay) throw new Error('LibreView CSV 형식을 인식할 수 없어요.\nlibreview.com에서 내보낸 파일인지 확인해 주세요.');
          const totalDays = Object.keys(glucoseByDay).length;
          const totalReadings = Object.values(glucoseByDay).reduce((a,b)=>a+b.length,0);
          if (!totalDays) throw new Error('혈당 데이터를 찾을 수 없어요. 파일을 다시 확인해 주세요.');
          const mapped = buildDashboardData({ glucoseByDay, weightByDay:{} });
          setPreview({ mapped, gDays:totalDays, wDays:0, totalReadings, source:'libreview' });
          setStatus('preview');
          return;
        }

        /* ── 애플 건강 ZIP / XML (청크 스트리밍) ── */
        const CHUNK_SIZE = 2 * 1024 * 1024;
        let getChunks, totalBytes;

        if (file.name.endsWith('.zip')) {
          setProgress('ZIP 압축 해제 중... (잠시 기다려 주세요)');
          if (typeof JSZip === 'undefined') throw new Error('ZIP 라이브러리 로드 실패. 인터넷 연결을 확인하거나 직접 압축 해제 후 export.xml을 선택해 주세요.');
          const zip = await JSZip.loadAsync(file);
          const allFiles = Object.keys(zip.files);
          const xmlFile = allFiles.find(name =>
            /export\.xml$/i.test(name) && !/cda/i.test(name)
          ) || allFiles.find(name => /\.xml$/i.test(name) && !/cda/i.test(name));
          if (!xmlFile) {
            const found = allFiles.filter(n => !zip.files[n].dir).slice(0,10).join(', ');
            throw new Error(`ZIP 안에서 export.xml을 찾을 수 없어요.\n발견된 파일: ${found || '없음'}`);
          }
          setProgress('XML 추출 중...');
          const xmlBlob = await zip.files[xmlFile].async('blob');
          totalBytes = xmlBlob.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = xmlBlob.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else if (file.name.endsWith('.xml')) {
          totalBytes = file.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = file.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else {
          throw new Error('.csv / .zip / .xml 파일만 지원해요.');
        }

        setProgress('혈당·체중·체지방 데이터 추출 중... 0%');
        const parsed = await parseAppleHealthXML(getChunks, totalBytes, (pct) => {
          setProgress(`데이터 분석 중... ${pct}%`);
        });
        const mapped = buildDashboardData(parsed);

        const gDays  = Object.keys(parsed.glucoseByDay).length;
        const wDays  = Object.keys(parsed.weightByDay).length;
        const bfDays = Object.keys(parsed.bodyFatByDay).length;
        const totalReadings = Object.values(parsed.glucoseByDay).reduce((a,b) => a+b.length, 0);

        if (!gDays && !wDays && !bfDays) throw new Error('혈당, 체중, 체지방 데이터를 찾을 수 없어요.\n리브레2가 애플 건강과 연동되어 있는지 확인해 주세요.');

        setPreview({ mapped, gDays, wDays, bfDays, totalReadings });
        setStatus('preview');

  /* ── 로그인 / 회원가입 화면 ───────────────────────────── */

              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>

  /* ── App ──────────────────────────────────────────────── */
  const App = () => {
    const [authUser,   setAuthUser]  = useState(null);
    const [authReady,  setAuthReady] = useState(false);
    const [date,       setDate]      = useState(todayStr());
    const [data,       setData]      = useState({});
    const [showImport, setShowImport] = useState(false);
    const [showSync,   setShowSync]  = useState(false);
    const [showMedSettings, setShowMedSettings] = useState(false);
    const [medsConfig, setMedsConfig] = useState(() => {
      try { const s = localStorage.getItem('hcd_meds_config'); return s ? JSON.parse(s) : DEFAULT_MEDS; }
      catch { return DEFAULT_MEDS; }
    });
    const [lastImport, setLastImport] = useState(null);
    const [loading,    setLoading]   = useState(true);
    const [saveStatus, setSaveStatus] = useState('idle'); // idle | saving | saved | error
    const [analyzing,  setAnalyzing] = useState(null); // 분석 중인 meal id
    const [analysisResult, setAnalysisResult] = useState(null); // { mealId, text }

    // Supabase Auth 초기화
    useEffect(() => {
      supa.auth.getSession().then(({ data: { session } }) => {
        setAuthUser(session?.user ?? null);
        setAuthReady(true);
      });
      const { data: { subscription } } = supa.auth.onAuthStateChange((_event, session) => {
        setAuthUser(session?.user ?? null);
      });
      return () => subscription.unsubscribe();
    }, []);

    const userId = authUser?.id || '';
    const [weightImporting, setWeightImporting] = useState(false);
    const [weightImportMsg, setWeightImportMsg] = useState('');
    const chartRef    = useRef(null);
    const chartInst   = useRef(null);
    const saveTimer   = useRef(null);
    const weightFileRef = useRef(null);
    const imgRefs     = { breakfast: useRef(null), lunch: useRef(null), dinner: useRef(null) };
    const camRefs     = { breakfast: useRef(null), lunch: useRef(null), dinner: useRef(null) };

    const handlePhotoSelect = async (file, mealId) => {
      if (!file) return;
      setAnalyzing(mealId);
      setAnalysisResult(null);
      try {
        const base64   = await fileToBase64(file);
        const mimeType = file.type || 'image/jpeg';
        const result   = await analyzeFood(base64, mimeType);
        setAnalysisResult({ mealId, text: result });
      } catch(e) {
        alert('사진 분석 중 오류가 발생했어요.\n' + e.message);
      }
      setAnalyzing(null);
    };

    const applyAnalysis = (mealId, text) => {
      updMeal(mealId, (day.meals[mealId] ? day.meals[mealId] + '\n\n' : '') + text);
      setAnalysisResult(null);
    };

    /* ── 건강앱 체중/체지방 가져오기 (2MB 청크 스트리밍, 대용량 파일 지원) ── */
    const handleWeightImport = async (file) => {
      if (!file) return;
      setWeightImporting(true);
      setWeightImportMsg('파일 처리 중...');
      try {
        const CHUNK_SIZE = 2 * 1024 * 1024; // 2MB
        let getChunks, totalBytes;

        if (file.name.endsWith('.zip')) {
          setWeightImportMsg('ZIP 압축 해제 중... (잠시 기다려 주세요)');
          if (typeof JSZip === 'undefined') throw new Error('ZIP 라이브러리 로드 실패');
          const zip = await JSZip.loadAsync(file);
          const allFilesW = Object.keys(zip.files);
          const xmlFileW = allFilesW.find(name =>
            /export\.xml$/i.test(name) && !/cda/i.test(name)
          ) || allFilesW.find(name => /\.xml$/i.test(name) && !/cda/i.test(name));
          if (!xmlFileW) throw new Error('export.xml을 찾을 수 없어요');
          setWeightImportMsg('XML 추출 중... (압축 해제 중, 오래 걸릴 수 있어요)');
          // Blob으로 추출 → JS 힙 외부에 저장되어 메모리 효율적
          const xmlBlob = await zip.files[xmlFileW].async('blob');
          totalBytes = xmlBlob.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = xmlBlob.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else if (file.name.endsWith('.xml')) {
          totalBytes = file.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = file.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else {
          throw new Error('.zip 또는 .xml 파일을 선택해 주세요');
        }

        setWeightImportMsg('데이터 분석 중... 0%');
        const { weightByDay, bodyFatByDay } = await parseAppleHealthXML(getChunks, totalBytes, (pct) => {
          setWeightImportMsg(`데이터 분석 중... ${pct}%`);
        });
        const wDays = Object.keys(weightByDay).length;
        const bfDays = Object.keys(bodyFatByDay).length;
        if (!wDays && !bfDays) throw new Error('체중·체지방 데이터를 찾을 수 없어요.\n체성분 앱이 건강앱과 연동되어 있는지 확인해 주세요.');
        // 가져온 데이터 병합
        const importedData = buildDashboardData({ glucoseByDay:{}, weightByDay, bodyFatByDay });
        await handleImport(importedData);
        setWeightImportMsg(`✅ 체중 ${wDays}일 · 체지방 ${bfDays}일 가져오기 완료!`);
        setTimeout(() => { setWeightImportMsg(''); setWeightImporting(false); }, 3000);
      } catch(e) {
        setWeightImportMsg('❌ ' + (e.message || '가져오기 실패'));
        setTimeout(() => { setWeightImportMsg(''); setWeightImporting(false); }, 4000);
      }
      if (weightFileRef.current) weightFileRef.current.value = '';
    };

    /* ── Supabase: 초기 데이터 로드 + URL 파라미터 단축어 연동 ── */
    useEffect(() => {
      // URL 파라미터 먼저 읽어두기 (Supabase 로드 전에 저장)
      const params = new URLSearchParams(window.location.search);
      const w  = params.get('w');
      const bf = params.get('bf');
      const d  = params.get('d');  // 측정 날짜 (YYYY-MM-DD)
      const urlPatch = {};
      if (w  && !isNaN(parseFloat(w)))  urlPatch.weight  = String(parseFloat(w));
      if (bf && !isNaN(parseFloat(bf))) urlPatch.bodyFat = String(parseFloat(bf));
      // 날짜 파라미터 검증 (YYYY-MM-DD 형식)
      const targetDate = (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) ? d : todayStr();
      if (Object.keys(urlPatch).length) {
        window.history.replaceState({}, '', window.location.pathname);
        // 날짜가 오늘이 아니면 해당 날짜 페이지로 이동
        if (targetDate !== todayStr()) setDate(targetDate);
      }

      const load = async () => {
        setLoading(true);
        try {
          const { data: rows, error } = await supa
            .from('diabetes_data')
            .select('date, payload')
            .eq('user_id', userId);
          if (error) throw error;
          const loaded = {};
          (rows || []).forEach(r => { loaded[r.date] = r.payload; });
          // Supabase 로드 후 URL 파라미터 값 병합 (측정 날짜 기준)
          if (Object.keys(urlPatch).length) {
            loaded[targetDate] = { ...(loaded[targetDate] || emptyDay()), ...urlPatch };
          }
          setData(loaded);
        } catch(e) {
          // Supabase 실패 시 localStorage 캐시 사용
          try {
            const s = localStorage.getItem('dm_dash_v2');
            const loaded = s ? (JSON.parse(s).data || {}) : {};
            if (Object.keys(urlPatch).length) {
              loaded[targetDate] = { ...(loaded[targetDate] || emptyDay()), ...urlPatch };
            }
            setData(loaded);
          } catch(e2) {}
        }
        setLoading(false);
      };
      load();
    }, [userId]);

    /* ── Supabase: 현재 날짜 데이터 저장 (디바운스 1.5초) ── */
    useEffect(() => {
      if (loading || !data[date]) return;
      // localStorage 캐시 업데이트
      localStorage.setItem('dm_dash_v2', JSON.stringify({ data, lastImport }));
      // Supabase 저장
      if (saveTimer.current) clearTimeout(saveTimer.current);
      setSaveStatus('saving');
      saveTimer.current = setTimeout(async () => {
        try {
          const { error } = await supa.from('diabetes_data').upsert(
            { user_id: userId, date, payload: data[date], updated_at: new Date().toISOString() },
            { onConflict: 'user_id,date' }
          );
          if (error) throw error;
          setSaveStatus('saved');
          setTimeout(() => setSaveStatus('idle'), 2000);
        } catch(e) {
          setSaveStatus('error');
          setTimeout(() => setSaveStatus('idle'), 3000);
        }
      }, 1500);
    }, [data, date, loading]);

    /* ── Supabase: 가져오기 후 여러 날 일괄 저장 ── */
    const saveAllToSupabase = async (newData) => {
      try {
        const rows = Object.entries(newData).map(([d, payload]) => ({
          user_id: userId, date: d, payload, updated_at: new Date().toISOString()
        }));
        if (rows.length) await supa.from('diabetes_data').upsert(rows, { onConflict: 'user_id,date' });
      } catch(e) { console.error('일괄 저장 오류:', e); }
    };

    const day = useMemo(() => data[date] || emptyDay(), [data, date]);
    const upDay = (patch) => setData(prev => ({ ...prev, [date]: { ...(prev[date] || emptyDay()), ...patch } }));
    const togMed  = (id) => upDay({ meds: { ...day.meds, [id]: !day.meds[id] } });
    const updBS   = (id, v) => upDay({ bs: { ...day.bs, [id]: v } });
    const updMeal = (id, v) => upDay({ meals: { ...day.meals, [id]: v } });
    const updEx   = (k, v) => upDay({ exercise: { ...day.exercise, [k]: v } });

    /* 가져오기: 기존 수동 입력 유지, 빈 슬롯만 채움 */
    const handleImport = async (importedData) => {
      const merged = {};
      setData(prev => {
        const next = { ...prev };
        Object.entries(importedData).forEach(([d, imported]) => {
          if (!next[d]) { next[d] = imported; }
          else {
            const ex = next[d];
            next[d] = {
              ...ex,
              bs: { ...imported.bs, ...ex.bs },
              weight:  ex.weight  || imported.weight  || '',
              bodyFat: ex.bodyFat || imported.bodyFat || ''
            };
          }
          merged[d] = next[d];
        });
        return next;
      });
      setLastImport(new Date().toLocaleString('ko-KR'));
      await saveAllToSupabase(merged);
    };

    /* medsConfig 저장 */
    useEffect(() => { localStorage.setItem('hcd_meds_config', JSON.stringify(medsConfig)); }, [medsConfig]);
    const saveMeds = (cfg) => { setMedsConfig(cfg); setShowMedSettings(false); };

    /* Stats */
    const allMedIds = useMemo(() => medsConfig.flatMap(s => s.items.map(m => m.id)), [medsConfig]);
    const medDone = allMedIds.filter(id => day.meds[id]).length;
    const medPct  = allMedIds.length ? Math.round((medDone / allMedIds.length) * 100) : 0;
    const bsVals  = Object.values(day.bs).filter(v => parseInt(v) > 0);
    const bsAvg   = bsVals.length ? Math.round(bsVals.reduce((a,b) => a+parseInt(b), 0) / bsVals.length) : null;

    /* Weekly chart */
    const weekData = useMemo(() => Array.from({length:7}, (_,i) => {
      const d = shiftDate(date, i-6);
      const dd = data[d] || emptyDay();
      const vals = Object.values(dd.bs).filter(v => parseInt(v) > 0);
      return { label: fmtDate(d).short, avg: vals.length ? Math.round(vals.reduce((a,b)=>a+parseInt(b),0)/vals.length) : null };
    }), [data, date]);

    useEffect(() => {
      if (!chartRef.current) return;
      if (chartInst.current) { chartInst.current.destroy(); chartInst.current = null; }
      chartInst.current = new Chart(chartRef.current, {
        type: 'line',
        data: {
          labels: weekData.map(d => d.label),
          datasets: [{
            label: '평균 혈당', data: weekData.map(d => d.avg),
            borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.08)',
            borderWidth: 2.5, pointBackgroundColor: weekData.map(d => bsColor(d.avg)),
            pointRadius: 5, fill: true, tension: 0.35, spanGaps: true
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend:{display:false}, tooltip:{ callbacks:{ label: c => c.raw ? `${c.raw} mg/dL` : '기록 없음' } } },
          scales: {
            y: { min:50, max:320, grid:{color:'#f1f5f9'}, ticks:{font:{size:11}} },
            x: { grid:{display:false}, ticks:{font:{size:11}} }
          }
        }
      });
      return () => { if(chartInst.current){chartInst.current.destroy(); chartInst.current=null;} };
    }, [weekData]);

    const isToday = date === todayStr();

    // 인증 로딩 중
    if (!authReady) return (
      <div style={{ minHeight:'100vh', background:'#f0f4f8', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ textAlign:'center', color:'#64748b' }}>
          <div style={{ fontSize:'32px', marginBottom:'12px' }}>🏥</div>
          <div style={{ fontSize:'14px' }}>로딩 중...</div>
        </div>
      </div>
    );

    // 미인증 → 로그인 화면
    if (!authUser) return <LoginScreen />;

    return (
      <div style={{ minHeight:'100vh', background:'#f0f4f8', paddingBottom:'48px' }}>

        {/* Header */}
        <div style={{ background:'linear-gradient(135deg,#1d4ed8 0%,#2563eb 100%)', padding:'14px 20px', boxShadow:'0 2px 10px rgba(37,99,235,0.35)', position:'sticky', top:0, zIndex:100 }}>
          <div style={{ maxWidth:'1140px', margin:'0 auto', display:'flex', flexWrap:'wrap', alignItems:'center', gap:'12px', justifyContent:'space-between' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
              <span style={{ fontSize:'18px', fontWeight:'800', color:'#fff', letterSpacing:'-0.3px' }}>🏥 Health Care Dashboard</span>
              {saveStatus==='saving' && <span style={{ fontSize:'11px', color:'rgba(255,255,255,0.7)' }}>저장 중...</span>}
              {saveStatus==='saved'  && <span style={{ fontSize:'11px', color:'#86efac' }}>✓ 저장됨</span>}
              {saveStatus==='error'  && <span style={{ fontSize:'11px', color:'#fca5a5' }}>⚠ 저장 실패</span>}
            </div>

            {/* Date nav */}
            <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
              <button onClick={() => setDate(shiftDate(date,-1))} style={navBtnSt}>‹</button>
              <div style={{ textAlign:'center', minWidth:'170px' }}>
                <div style={{ color:'#fff', fontWeight:'700', fontSize:'14px' }}>{fmtDate(date).full}</div>
                {!isToday && <button onClick={() => setDate(todayStr())} style={{ background:'rgba(255,255,255,0.25)', border:'1px solid rgba(255,255,255,0.4)', color:'#fff', borderRadius:'6px', padding:'2px 10px', fontSize:'12px', cursor:'pointer', marginTop:'3px' }}>오늘로 이동</button>}
              </div>
              <button onClick={() => setDate(shiftDate(date,1))} style={navBtnSt}>›</button>
            </div>

            {/* Right chips */}
            <div style={{ display:'flex', gap:'8px', alignItems:'center', flexWrap:'wrap' }}>
              <span style={{ background: medPct===100?'#16a34a':'rgba(255,255,255,0.2)', color:'#fff', borderRadius:'20px', padding:'4px 12px', fontSize:'12px', fontWeight:'600' }}>
                💊 {medDone}/{allMedIds.length}
              </span>
              {bsAvg && <span style={{ background: bsColor(bsAvg), color:'#fff', borderRadius:'20px', padding:'4px 12px', fontSize:'12px', fontWeight:'600' }}>🩸 {bsAvg} mg/dL · {bsLabel(bsAvg)}</span>}
              <button onClick={() => setShowMedSettings(true)} style={{ background:'rgba(255,255,255,0.15)', border:'1px solid rgba(255,255,255,0.4)', color:'#fff', borderRadius:'8px', padding:'6px 14px', cursor:'pointer', fontSize:'13px', fontWeight:'700' }}>
                ⚙️ 복약 설정
              </button>
              <button onClick={() => setShowImport(true)} style={{ background:'rgba(255,255,255,0.15)', border:'1px solid rgba(255,255,255,0.4)', color:'#fff', borderRadius:'8px', padding:'6px 14px', cursor:'pointer', fontSize:'13px', fontWeight:'700' }}>
                📱 가져오기
              </button>
              <button onClick={() => setShowSync(true)} style={{ background:'rgba(255,255,255,0.15)', border:'1px solid rgba(255,255,255,0.4)', color:'#fff', borderRadius:'8px', padding:'6px 14px', cursor:'pointer', fontSize:'13px', fontWeight:'700' }}>
                🔗 동기화
              </button>
              <div style={{ display:'flex', alignItems:'center', gap:'6px', background:'rgba(0,0,0,0.15)', borderRadius:'8px', padding:'5px 10px' }}>
                <span style={{ fontSize:'11px', color:'rgba(255,255,255,0.8)', maxWidth:'120px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                  {authUser.email}
                </span>
                <button onClick={() => supa.auth.signOut()} style={{ background:'rgba(255,255,255,0.2)', border:'none', color:'#fff', borderRadius:'6px', padding:'3px 8px', cursor:'pointer', fontSize:'11px', fontWeight:'700', whiteSpace:'nowrap' }}>
                  로그아웃
                </button>
              </div>
            </div>
          </div>
          {lastImport && (
            <div style={{ maxWidth:'1140px', margin:'6px auto 0', fontSize:'11px', color:'rgba(255,255,255,0.6)', textAlign:'right' }}>
              마지막 가져오기: {lastImport}
            </div>
          )}
        </div>

        {/* Main */}
        <div style={{ maxWidth:'1140px', margin:'0 auto', padding:'22px 16px' }}>
          <div className="main-grid" style={{ display:'grid', gridTemplateColumns:'1fr 330px', gap:'18px' }}>

            {/* ── LEFT ── */}
            <div>
              {/* 복약 */}
              <Card>
                <STitle icon="💊" label="오늘의 복약 체크리스트" right={`${medDone}/${allMedIds.length} 완료`} />
                <div style={{ background:'#e2e8f0', borderRadius:'6px', height:'6px', marginBottom:'16px', overflow:'hidden' }}>
                  <div style={{ width:`${medPct}%`, height:'100%', borderRadius:'6px', background:medPct===100?'#16a34a':'#2563eb', transition:'width 0.5s ease' }}/>
                </div>
                {medsConfig.map(slot => {
                  const activeItems = slot.items.filter(med => {
                    if (med.startDate && date < med.startDate) return false;
                    if (med.endDate   && date > med.endDate)   return false;
                    return true;
                  });
                  if (!activeItems.length) return null;
                  return (
                  <div key={slot.key} style={{ background:slot.bg, border:`1px solid ${slot.border}`, borderRadius:'10px', padding:'12px 14px', marginBottom:'10px' }}>
                    <div style={{ fontSize:'12px', fontWeight:'700', color:slot.color, marginBottom:'8px', display:'flex', gap:'6px', alignItems:'center' }}>
                      {slot.icon} {slot.slot}
                    </div>
                    {activeItems.map(med => (
                      <label key={med.id} style={{ display:'flex', alignItems:'center', gap:'10px', cursor:'pointer', padding:'5px 0', borderTop:'1px solid rgba(0,0,0,0.05)' }}>
                        <input type="checkbox" className="med-checkbox" checked={!!day.meds[med.id]} onChange={() => togMed(med.id)} />
                        <div>
                          <div style={{ fontSize:'14px', fontWeight:'600', color:day.meds[med.id]?'#94a3b8':'#1e293b', textDecoration:day.meds[med.id]?'line-through':'none', transition:'all 0.2s' }}>{med.name}</div>
                          <div style={{ fontSize:'12px', color:'#94a3b8' }}>{med.dose}</div>
                        </div>
                        {day.meds[med.id] && <span style={{ marginLeft:'auto', color:'#16a34a', fontSize:'16px' }}>✓</span>}
                      </label>
                    ))}
                  </div>
                  );
                })}
              </Card>

              {/* 혈당 */}
              <Card>
                <STitle icon="🩸" label="혈당 기록" right="단위: mg/dL" />
                <div style={{ display:'flex', gap:'10px', marginBottom:'14px', flexWrap:'wrap', fontSize:'11px' }}>
                  {[{c:'#7c3aed',t:'저혈당 (<70)'},{c:'#16a34a',t:'정상 (70–140)'},{c:'#d97706',t:'주의 (140–180)'},{c:'#dc2626',t:'높음 (>180)'}].map(l => (
                    <div key={l.t} style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                      <div style={{ width:'9px', height:'9px', borderRadius:'50%', background:l.c }}/>
                      <span style={{ color:'#64748b' }}>{l.t}</span>
                    </div>
                  ))}
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:'10px' }}>
                  {BS_FIELDS.map(f => {
                    const v = day.bs[f.id] || ''; const c = bsColor(v);
                    return (
                      <div key={f.id} style={{ background:'#f8fafc', borderRadius:'10px', padding:'12px', border:v?`2px solid ${c}`:'1px solid #e2e8f0', transition:'border-color 0.2s' }}>
                        <div style={{ fontSize:'11px', color:'#64748b', marginBottom:'6px' }}>{f.icon} {f.label}</div>
                        <div style={{ display:'flex', alignItems:'flex-end', gap:'6px' }}>
                          <input type="number" min="30" max="600" value={v} onChange={e=>updBS(f.id,e.target.value)} placeholder="---"
                            style={{ width:'72px', border:'none', background:'transparent', fontSize:'22px', fontWeight:'800', color:v?c:'#cbd5e1', outline:'none', padding:0 }} />
                          {v && <div style={{ paddingBottom:'3px' }}><div style={{ fontSize:'10px', color:'#94a3b8' }}>mg/dL</div><div style={{ fontSize:'11px', color:c, fontWeight:'700' }}>{bsLabel(v)}</div></div>}
                        </div>
                        <div style={{ fontSize:'10px', color:'#cbd5e1', marginTop:'4px' }}>목표: {f.target}</div>
                      </div>
                    );
                  })}
                </div>
              </Card>

              {/* 식사 */}
              <Card>
                <STitle icon="🍽️" label="식사 기록" />
                <div style={{ background:'#f0fdf4', border:'1px solid #86efac', borderRadius:'10px', padding:'12px 14px', marginBottom:'12px', fontSize:'12px' }}>
                  <div style={{ fontWeight:'700', color:'#16a34a', marginBottom:'8px' }}>💡 당뇨 식단 가이드</div>
                  <div style={{ display:'flex', gap:'20px', flexWrap:'wrap' }}>
                    <div><div style={{ color:'#16a34a', fontWeight:'700', marginBottom:'3px' }}>✅ 권장</div><div style={{ color:'#374151', lineHeight:'1.8' }}>현미·잡곡밥 · 닭가슴살 · 두부 · 생선<br/>채소류 · 달걀 · 콩류 · 견과류(소량)</div></div>
                    <div><div style={{ color:'#dc2626', fontWeight:'700', marginBottom:'3px' }}>❌ 제한</div><div style={{ color:'#374151', lineHeight:'1.8' }}>흰쌀밥 · 흰빵 · 라면 · 과자<br/>사탕·주스 · 탄산음료 · 술</div></div>
                  </div>
                </div>
                <div style={{ background:'#fffbeb', border:'1px solid #fcd34d', borderRadius:'10px', padding:'12px 14px', marginBottom:'14px', fontSize:'12px' }}>
                  <div style={{ fontWeight:'700', color:'#92400e', marginBottom:'5px' }}>📝 식단 기입 방법</div>
                  <div style={{ color:'#78350f', lineHeight:'1.8' }}>
                    <strong>형식:</strong> 음식명 + 양 + 탄수화물(g)<br/>
                    <strong>예:</strong> 현미밥 반공기(30g), 닭가슴살 100g, 브로콜리 1컵<br/>
                    <strong>한 끼 탄수화물 목표:</strong> 45–60g (하루 130–180g)
                  </div>
                </div>
                {MEALS.map(m => (
                  <div key={m.id} style={{ marginBottom:'16px' }}>
                    {/* 라벨 + 사진 버튼 */}
                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'6px', flexWrap:'wrap', gap:'6px' }}>
                      <div style={{ fontSize:'13px', fontWeight:'700', color:'#374151' }}>{m.icon} {m.label}</div>
                      {analyzing===m.id ? (
                        <span style={{ fontSize:'12px', color:'#7c3aed', fontWeight:'700' }}>⏳ 분석 중...</span>
                      ) : (
                        <div style={{ display:'flex', gap:'6px' }}>
                          {/* 카메라 촬영 */}
                          <button onClick={() => camRefs[m.id].current?.click()} disabled={!!analyzing}
                            style={{ background:'#faf5ff', border:'1px solid #c4b5fd', color:'#7c3aed', borderRadius:'8px', padding:'5px 11px', cursor:'pointer', fontSize:'12px', fontWeight:'700' }}>
                            📸 촬영
                          </button>
                          {/* 앨범 선택 */}
                          <button onClick={() => imgRefs[m.id].current?.click()} disabled={!!analyzing}
                            style={{ background:'#eff6ff', border:'1px solid #93c5fd', color:'#2563eb', borderRadius:'8px', padding:'5px 11px', cursor:'pointer', fontSize:'12px', fontWeight:'700' }}>
                            🖼️ 앨범
                          </button>
                        </div>
                      )}
                      {/* 카메라용 input */}
                      <input ref={camRefs[m.id]} type="file" accept="image/*" capture="environment"
                        onChange={e => e.target.files[0] && handlePhotoSelect(e.target.files[0], m.id)}
                        style={{ display:'none' }} />
                      {/* 앨범용 input */}
                      <input ref={imgRefs[m.id]} type="file" accept="image/*"
                        onChange={e => e.target.files[0] && handlePhotoSelect(e.target.files[0], m.id)}
                        style={{ display:'none' }} />
                    </div>

                    {/* 분석 결과 카드 */}
                    {analysisResult?.mealId === m.id && (
                      <div style={{ border:'1px solid #c4b5fd', borderRadius:'12px', marginBottom:'10px', overflow:'hidden' }}>
                        {/* 헤더 */}
                        <div style={{ background:'linear-gradient(135deg,#7c3aed,#a855f7)', padding:'10px 14px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                          <span style={{ color:'#fff', fontWeight:'700', fontSize:'13px' }}>🤖 AI 식단 분석 결과</span>
                          <span style={{ color:'rgba(255,255,255,0.7)', fontSize:'11px' }}>Powered by Gemini</span>
                        </div>
                        {/* 내용 */}
                        <div style={{ background:'#faf5ff', padding:'14px', fontSize:'13px', color:'#1e293b', whiteSpace:'pre-line', lineHeight:'1.9', maxHeight:'400px', overflowY:'auto' }}>
                          {analysisResult.text}
                        </div>
                        {/* 버튼 */}
                        <div style={{ background:'#f5f3ff', padding:'10px 14px', display:'flex', gap:'8px', borderTop:'1px solid #e9d5ff' }}>
                          <button onClick={() => applyAnalysis(m.id, analysisResult.text)}
                            style={{ flex:2, padding:'9px', background:'#7c3aed', color:'#fff', border:'none', borderRadius:'8px', cursor:'pointer', fontWeight:'700', fontSize:'13px' }}>
                            ✅ 식사 기록에 추가
                          </button>
                          <button onClick={() => setAnalysisResult(null)}
                            style={{ flex:1, padding:'9px', background:'#fff', color:'#64748b', border:'1px solid #e2e8f0', borderRadius:'8px', cursor:'pointer', fontSize:'13px' }}>
                            닫기
                          </button>
                        </div>
                      </div>
                    )}

                    <textarea value={day.meals[m.id]||''} onChange={e=>updMeal(m.id,e.target.value)} placeholder={m.ph} rows={3}
                      style={{ width:'100%', border:'1px solid #e2e8f0', borderRadius:'8px', padding:'10px 12px', fontSize:'13px', color:'#374151', resize:'vertical', outline:'none', lineHeight:'1.6', background:'#fafafa', transition:'border-color 0.2s' }}
                      onFocus={e=>e.target.style.borderColor='#2563eb'} onBlur={e=>e.target.style.borderColor='#e2e8f0'} />
                  </div>
                ))}
              </Card>

              {/* 주간 차트 */}
              <Card>
                <STitle icon="📈" label="최근 7일 평균 혈당" />
                <div className="chart-wrap"><canvas ref={chartRef}/></div>
                <div style={{ display:'flex', gap:'14px', marginTop:'10px', justifyContent:'center', fontSize:'12px', color:'#64748b' }}>
                  <span>🟣 저혈당</span><span>🟢 정상</span><span>🟡 주의</span><span>🔴 높음</span>
                </div>
                <div style={{ fontSize:'11px', color:'#94a3b8', textAlign:'center', marginTop:'6px' }}>
                  혈당 기록이 쌓이면 의사 선생님과 인슐린 용량 조정 상담에 활용하세요
                </div>
              </Card>
            </div>

            {/* ── RIGHT ── */}
            <div>
              {/* 요약 */}
              <Card style={{ background:medPct===100?'#f0fdf4':'#fff' }}>
                <STitle icon="📊" label="오늘 요약" />
                <div style={{ marginBottom:'16px' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', fontSize:'13px', marginBottom:'5px' }}>
                    <span style={{ fontWeight:'600' }}>복약 완료율</span>
                    <span style={{ fontWeight:'800', color:medPct===100?'#16a34a':'#2563eb' }}>{medPct}%</span>
                  </div>
                  <div style={{ background:'#e2e8f0', borderRadius:'4px', height:'8px', overflow:'hidden' }}>
                    <div style={{ width:`${medPct}%`, height:'100%', borderRadius:'4px', background:medPct===100?'#16a34a':'#2563eb', transition:'width 0.5s' }}/>
                  </div>
                </div>
                <div style={{ background:'#f8fafc', borderRadius:'10px', padding:'14px', marginBottom:'14px' }}>
                  <div style={{ fontSize:'11px', color:'#64748b', marginBottom:'4px' }}>오늘 평균 혈당</div>
                  <div style={{ fontSize:'32px', fontWeight:'900', color:bsAvg?bsColor(bsAvg):'#cbd5e1' }}>
                    {bsAvg||'---'}{bsAvg&&<span style={{ fontSize:'14px', fontWeight:'400', color:'#94a3b8' }}> mg/dL</span>}
                  </div>
                  {bsAvg&&<div style={{ fontSize:'12px', fontWeight:'700', color:bsColor(bsAvg), marginTop:'2px' }}>{bsLabel(bsAvg)}</div>}
                  <div style={{ fontSize:'11px', color:'#94a3b8', marginTop:'4px' }}>{bsVals.length}회 측정됨</div>
                </div>
                <div style={{ display:'flex', gap:'6px' }}>
                  {MEALS.map(m => {
                    const filled = !!(day.meals[m.id]?.trim());
                    return <div key={m.id} style={{ flex:1, textAlign:'center', borderRadius:'8px', padding:'8px 4px', background:filled?'#f0fdf4':'#f8fafc', border:`1px solid ${filled?'#86efac':'#e2e8f0'}` }}>
                      <div style={{ fontSize:'16px' }}>{m.icon}</div>
                      <div style={{ fontSize:'10px', color:filled?'#16a34a':'#94a3b8', fontWeight:'600', marginTop:'3px' }}>{filled?'완료':'미기록'}</div>
                    </div>;
                  })}
                </div>
              </Card>

              {/* 체중 / 체지방 */}
              <Card>
                <STitle icon="⚖️" label="체중 · 체지방 기록" />

                {/* 입력 행 */}
                <div style={{ display:'flex', gap:'10px', marginBottom:'12px', flexWrap:'wrap' }}>
                  <div style={{ flex:1, minWidth:'100px' }}>
                    <div style={{ fontSize:'11px', color:'#64748b', marginBottom:'4px' }}>체중</div>
                    <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                      <input type="number" step="0.1" min="30" max="200" value={day.weight||''} onChange={e=>upDay({weight:e.target.value})} placeholder="00.0"
                        style={{ width:'90px', border:'1px solid #e2e8f0', borderRadius:'8px', padding:'8px 10px', fontSize:'22px', fontWeight:'800', color:'#1e293b', outline:'none', textAlign:'center' }} />
                      <span style={{ color:'#64748b', fontWeight:'600', fontSize:'13px' }}>kg</span>
                    </div>
                  </div>
                  <div style={{ flex:1, minWidth:'100px' }}>
                    <div style={{ fontSize:'11px', color:'#64748b', marginBottom:'4px' }}>체지방율</div>
                    <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                      <input type="number" step="0.1" min="1" max="60" value={day.bodyFat||''} onChange={e=>upDay({bodyFat:e.target.value})} placeholder="00.0"
                        style={{ width:'90px', border:'1px solid #e2e8f0', borderRadius:'8px', padding:'8px 10px', fontSize:'22px', fontWeight:'800', color:'#7c3aed', outline:'none', textAlign:'center' }} />
                      <span style={{ color:'#64748b', fontWeight:'600', fontSize:'13px' }}>%</span>
                    </div>
                  </div>
                </div>

                {/* 7일 체중 추이 */}
                {(() => {
                  const wk = Array.from({length:7}, (_,i) => {
                    const d = shiftDate(date, i-6);
                    const dd = data[d] || emptyDay();
                    return { label: fmtDate(d).short, w: parseFloat(dd.weight)||null, bf: parseFloat(dd.bodyFat)||null };
                  });
                  const hasW  = wk.some(x => x.w);
                  const hasBf = wk.some(x => x.bf);
                  if (!hasW && !hasBf) return null;
                  const minW = hasW ? Math.min(...wk.filter(x=>x.w).map(x=>x.w)) - 1 : 0;
                  const maxW = hasW ? Math.max(...wk.filter(x=>x.w).map(x=>x.w)) + 1 : 1;
                  const minBf = hasBf ? Math.min(...wk.filter(x=>x.bf).map(x=>x.bf)) - 1 : 0;
                  const maxBf = hasBf ? Math.max(...wk.filter(x=>x.bf).map(x=>x.bf)) + 1 : 1;
                  return (
                    <div style={{ background:'#f8fafc', borderRadius:'10px', padding:'10px', marginBottom:'10px' }}>
                      <div style={{ fontSize:'11px', color:'#94a3b8', marginBottom:'6px' }}>최근 7일 추이</div>

                      {/* 체중 차트 */}
                      {hasW && <>
                        <div style={{ fontSize:'10px', color:'#2563eb', fontWeight:'600', marginBottom:'4px' }}>⚖️ 체중 (kg)</div>
                        <div style={{ display:'flex', gap:'4px', alignItems:'flex-end', height:'48px' }}>
                          {wk.map((d,i) => {
                            const h = d.w ? Math.round(((d.w - minW)/(maxW - minW || 1)) * 38 + 6) : 4;
                            return (
                              <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:'2px' }}>
                                <div style={{ width:'100%', height:`${h}px`, background: d.w ? '#2563eb' : '#e2e8f0', borderRadius:'3px 3px 0 0', transition:'height 0.3s' }}/>
                                <div style={{ fontSize:'9px', color:'#94a3b8', whiteSpace:'nowrap' }}>{d.label}</div>
                              </div>
                            );
                          })}
                        </div>
                        <div style={{ display:'flex', marginTop:'4px' }}>
                          {wk.map((d,i) => (
                            <div key={i} style={{ flex:1, textAlign:'center', fontSize:'9px', color: d.w ? '#2563eb' : '#e2e8f0', fontWeight:'700' }}>
                              {d.w ? `${d.w}` : ''}
                            </div>
                          ))}
                        </div>
                      </>}

                      {/* 체지방 차트 */}
                      {hasBf && <div style={{ marginTop: hasW ? '10px' : '0' }}>
                        <div style={{ fontSize:'10px', color:'#7c3aed', fontWeight:'600', marginBottom:'4px' }}>💪 체지방률 (%)</div>
                        <div style={{ display:'flex', gap:'4px', alignItems:'flex-end', height:'48px' }}>
                          {wk.map((d,i) => {
                            const h = d.bf ? Math.round(((d.bf - minBf)/(maxBf - minBf || 1)) * 38 + 6) : 4;
                            return (
                              <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:'2px' }}>
                                <div style={{ width:'100%', height:`${h}px`, background: d.bf ? '#7c3aed' : '#e2e8f0', borderRadius:'3px 3px 0 0', transition:'height 0.3s' }}/>
                                <div style={{ fontSize:'9px', color:'#94a3b8', whiteSpace:'nowrap' }}>{d.label}</div>
                              </div>
                            );
                          })}
                        </div>
                        <div style={{ display:'flex', marginTop:'4px' }}>
                          {wk.map((d,i) => (
                            <div key={i} style={{ flex:1, textAlign:'center', fontSize:'9px', color: d.bf ? '#7c3aed' : '#e2e8f0', fontWeight:'700' }}>
                              {d.bf ? `${d.bf.toFixed(2)}` : ''}
                            </div>
                          ))}
                        </div>
                      </div>}
                    </div>
                  );
                })()}

                {/* 건강앱 가져오기 버튼 */}
                <input ref={weightFileRef} type="file" accept=".zip,.xml" onChange={e => e.target.files[0] && handleWeightImport(e.target.files[0])} style={{ display:'none' }} />
                <button onClick={() => weightFileRef.current?.click()} disabled={weightImporting}
                  style={{ width:'100%', padding:'9px', background: weightImporting?'#f1f5f9':'#f0fdf4', border:'1px solid #86efac', color: weightImporting?'#94a3b8':'#16a34a', borderRadius:'8px', cursor: weightImporting?'not-allowed':'pointer', fontWeight:'700', fontSize:'13px', marginBottom:'6px' }}>
                  🍎 건강앱에서 가져오기 (ZIP / XML)
                </button>
                {weightImportMsg && (
                  <div style={{ fontSize:'12px', color: weightImportMsg.startsWith('✅')?'#16a34a': weightImportMsg.startsWith('❌')?'#dc2626':'#64748b', textAlign:'center', padding:'4px 0', fontWeight:'600' }}>
                    {weightImportMsg}
                  </div>
                )}
                <div style={{ fontSize:'11px', color:'#94a3b8', lineHeight:'1.6', marginTop:'4px' }}>
                  iPhone 건강앱 → 우상단 프로필 → 건강 데이터 내보내기 → export.zip
                </div>
                <div style={{ fontSize:'11px', color:'#16a34a', fontWeight:'500', marginTop:'6px' }}>💡 5% 체중 감량만으로 혈당이 크게 개선될 수 있어요</div>
              </Card>

              {/* 운동 */}
              <Card>
                <STitle icon="🏃" label="운동 기록" />
                <div style={{ marginBottom:'10px' }}>
                  <div style={{ fontSize:'12px', color:'#64748b', marginBottom:'4px' }}>운동 종류</div>
                  <input type="text" value={day.exercise?.type||''} onChange={e=>updEx('type',e.target.value)} placeholder="예: 걷기, 수영, 자전거…" style={inpSt} />
                </div>
                <div style={{ marginBottom:'10px' }}>
                  <div style={{ fontSize:'12px', color:'#64748b', marginBottom:'4px' }}>운동 시간 (분)</div>
                  <input type="number" min="0" value={day.exercise?.mins||''} onChange={e=>updEx('mins',e.target.value)} placeholder="30" style={inpSt} />
                </div>
                <div style={{ fontSize:'11px', color:'#16a34a', fontWeight:'500', lineHeight:'1.7' }}>
                  💪 식후 30분 걷기 30분이 혈당 조절에 가장 효과적<br/>🎯 하루 최소 30분, 주 5일 목표
                </div>
              </Card>

              {/* 메모 */}
              <Card>
                <STitle icon="📝" label="오늘의 메모" />
                <textarea value={day.note||''} onChange={e=>upDay({note:e.target.value})} placeholder="특이사항, 컨디션, 저혈당 증상, 의사 선생님께 전달할 내용 등…" rows={4}
                  style={{ ...inpSt, resize:'vertical', lineHeight:'1.6', fontFamily:'inherit' }} />
              </Card>

              {/* 목표 카드 */}
              <Card style={{ background:'linear-gradient(135deg,#eff6ff,#f0fdf4)', border:'1px solid #bfdbfe' }}>
                <div style={{ fontSize:'14px', fontWeight:'700', color:'#1e40af', marginBottom:'10px' }}>🎯 인슐린 졸업을 향해!</div>
                <div style={{ fontSize:'12px', color:'#374151', lineHeight:'2' }}>
                  ✅ 혈당 꾸준히 기록 (리브레2 연동)<br/>
                  ✅ 탄수화물 조절 (한 끼 45–60g)<br/>
                  ✅ 식후 걷기 30분<br/>
                  ✅ 체중 점진적 감량<br/>
                  ✅ 주치의와 정기 상담<br/><br/>
                  <span style={{ color:'#dc2626', fontWeight:'600', fontSize:'11px' }}>⚠️ 인슐린은 반드시 의사 지시에 따라 조정하세요.</span>
                </div>
              </Card>
            </div>
          </div>
        </div>

        {/* 로딩 오버레이 */}
        {loading && (
          <div style={{ position:'fixed', inset:0, background:'rgba(255,255,255,0.85)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:3000 }}>
            <div style={{ fontSize:'48px', marginBottom:'16px' }}>⏳</div>
            <div style={{ fontSize:'16px', fontWeight:'700', color:'#1e293b' }}>데이터 불러오는 중...</div>
            <div style={{ fontSize:'13px', color:'#94a3b8', marginTop:'6px' }}>Supabase에서 동기화하고 있어요</div>
          </div>
        )}

        {/* Import Modal */}
        {showImport && <ImportModal onClose={() => setShowImport(false)} onImport={handleImport} />}

        {/* Sync Modal */}
        {showSync && <SyncModal userId={userId} onClose={() => setShowSync(false)} onChangeId={(id) => { setUserId(id); setData({}); }} />}

        {/* Med Settings Modal */}
        {showMedSettings && <MedSettingsModal meds={medsConfig} onSave={saveMeds} onClose={() => setShowMedSettings(false)} />}
      </div>
    );
  };

  /* ── 공통 스타일 상수 ─────────────────────────────────── */
  const navBtnSt = { background:'rgba(255,255,255,0.2)', border:'none', color:'#fff', borderRadius:'8px', padding:'8px 16px', cursor:'pointer', fontSize:'18px', fontWeight:'700', lineHeight:1 };
  const inpSt    = { width:'100%', border:'1px solid #e2e8f0', borderRadius:'8px', padding:'8px 12px', fontSize:'14px', outline:'none', background:'#fafafa' };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
