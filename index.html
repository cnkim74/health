              <div style={{ fontSize:'10px', color:'var(--cn-low)', fontWeight:'700', marginBottom:'2px' }}>💊 복약 연속</div>
              <div style={{ fontFamily:'var(--font-num)', fontSize:'22px', fontWeight:'900', color:'var(--cn-low)' }}>{medStreak}<span style={{ fontSize:'11px', marginLeft:'2px' }}>일</span></div>

  /* ── 비밀번호 변경 모달 ── */

    const [pw2,   setPw2]  = useState('');

                  color:dm?'var(--text)':'var(--cn-ink)', boxSizing:'border-box' };
    const handle = async () => {

      if (pw !== pw2)           { setErr('비밀번호가 일치하지 않아요.'); return; }
      setBusy(true); setErr('');
      try {
        const { error } = await supa.auth.updateUser({ password: pw });
        if (error) throw error;
        setMsg('✅ 비밀번호가 변경됐어요!');

        setErr(e.message || '비밀번호 변경에 실패했어요.');

      }

      <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.58)',display:'flex',alignItems:'center',

  /* ── 데이터 복구 모달 ── */
  const DataRecoveryModal = ({ userId, onImportData, onImportMeds, onClose }) => {
    const dm = _dm;
    const [inputId, setInputId] = useState('104360e3-1dc8-4c4d-bb36-0b9c07dba2cf');
    const [busy,    setBusy]    = useState(false);
    const [result,  setResult]  = useState(null); // { rows, settings, medNames }
    const [msg,     setMsg]     = useState('');
    const [importing, setImporting] = useState(false);

    const search = async () => {
      const lid = inputId.trim();
      if (!lid) return;
      setBusy(true); setResult(null); setMsg('');
      try {
        const { data: rows, error } = await supa.from('diabetes_data')
          .select('date, payload').eq('user_id', lid);
        if (error) throw error;
        if (!rows || rows.length === 0) {
          setMsg('해당 코드로 저장된 데이터가 없어요.');
          setBusy(false); return;
        }
        const dataRows    = rows.filter(r => r.date !== '_user_settings_');
        const settingsRow = rows.find(r => r.date === '_user_settings_');
        const medsConfig  = settingsRow?.payload?.medsConfig || [];
        const medNames    = medsConfig.flatMap(s => (s.items||[]).map(m => m.name)).filter(Boolean);
        // 모든 날짜에서 고유 med ID 추출
        const allMedIds   = new Set();
        dataRows.forEach(r => { if (r.payload?.meds) Object.keys(r.payload.meds).forEach(id => allMedIds.add(id)); });
        setResult({ lid, dataRows, settingsRow, medsConfig, medNames, allMedIds: [...allMedIds] });
      } catch(e) {
        setMsg('❌ 조회 실패: ' + (e.message || '오류'));
      }
      setBusy(false);
    };

    const doImport = async () => {
      if (!result) return;
      setImporting(true); setMsg('');
      try {
        // 건강 데이터 가져오기
        if (result.dataRows.length > 0) {
          const patch = {};
          result.dataRows.forEach(r => { patch[r.date] = r.payload; });
          onImportData(patch);
        }
        // 복약 설정 가져오기
        if (result.medsConfig.length > 0) {
          onImportMeds(result.medsConfig);
        }
        // 이 UUID 기억
        localStorage.setItem('cn_legacy_uid', result.lid);
        localStorage.setItem('dm_user_id',    result.lid);
        setMsg('✅ 데이터를 현재 계정으로 가져왔어요! 저장 중...');
        setTimeout(onClose, 2500);
      } catch(e) {
        setMsg('❌ 가져오기 실패: ' + (e.message || '오류'));
      }
      setImporting(false);
    };

    const inp = { width:'100%', padding:'10px 12px', border:'1px solid var(--card-border)', borderRadius:'10px',
                  fontSize:'13px', fontFamily:'var(--font-num)', outline:'none',
                  background:'var(--input-bg)', color:'var(--text)', boxSizing:'border-box' };

    return (
      <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.6)',display:'flex',alignItems:'center',
                   justifyContent:'center',zIndex:2500,padding:'20px'}}
           onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div style={{background:'var(--card-bg)',borderRadius:'20px',padding:'26px 22px',maxWidth:'480px',
                     width:'100%',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 24px 80px rgba(0,0,0,0.3)'}}>

          {/* 헤더 */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'}}>
            <div style={{fontSize:'16px',fontWeight:'800',color:'var(--text)'}}>🔍 데이터 복구</div>
            <button onClick={onClose} style={{background:'var(--divider)',border:'none',borderRadius:'8px',
                                              width:'32px',height:'32px',cursor:'pointer',fontSize:'16px'}}>✕</button>
          </div>

          <div style={{fontSize:'13px',color:'var(--text-sub)',marginBottom:'14px',lineHeight:1.6}}>
            이전에 사용하던 동기화 코드(UUID)를 입력하면 해당 코드로 저장된 데이터를 조회하고 현재 계정으로 가져올 수 있어요.
          </div>

          {/* UUID 입력 */}
          <div style={{display:'flex',gap:'8px',marginBottom:'14px'}}>
            <input value={inputId} onChange={e=>setInputId(e.target.value)}
              placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" style={inp}/>
            <button onClick={search} disabled={busy||!inputId.trim()}
              style={{background:'var(--cn-brand)',color:'#fff',border:'none',borderRadius:'10px',
                      padding:'10px 16px',cursor:busy?'default':'pointer',fontSize:'13px',fontWeight:'700',
                      whiteSpace:'nowrap',opacity:busy?0.6:1}}>
              {busy ? '조회 중...' : '조회'}
            </button>
          </div>

          {/* 결과 */}
          {result && (
            <div style={{background:'var(--cn-ok-100)',border:'1px solid var(--cn-ok)',borderRadius:'12px',
                         padding:'14px',marginBottom:'14px'}}>
              <div style={{fontSize:'13px',fontWeight:'800',color:'var(--cn-ok)',marginBottom:'10px'}}>
                ✅ 데이터를 찾았어요!
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'6px',fontSize:'13px',color:'var(--text)'}}>
                <div>📅 건강 기록: <strong>{result.dataRows.length}일치</strong></div>
                {result.dataRows.length > 0 && (() => {
                  const dates = result.dataRows.map(r=>r.date).sort();
                  return <div style={{fontSize:'12px',color:'var(--text-sub)'}}>
                    {dates[0]} ~ {dates[dates.length-1]}
                  </div>;
                })()}
                <div>💊 복약 설정: <strong>{result.medsConfig.length}개 시간대, {result.medNames.length}개 약</strong></div>
                {result.medNames.length > 0 && (
                  <div style={{background:'var(--card-bg)',borderRadius:'8px',padding:'8px 10px',
                               fontSize:'12px',color:'var(--text-sub)',lineHeight:1.8}}>
                    {result.medNames.join(' · ')}
                  </div>
                )}
                {result.medsConfig.length === 0 && result.allMedIds.length > 0 && (
                  <div style={{fontSize:'12px',color:'var(--text-sub)'}}>
                    (복약 설정 없음 — 기록에서 {result.allMedIds.length}개 ID 발견)
                  </div>
                )}
              </div>
              <button onClick={doImport} disabled={importing}
                style={{width:'100%',marginTop:'12px',padding:'12px',background:importing?'var(--divider)':'var(--cn-brand)',
                        color:importing?'var(--text-mute)':'#fff',border:'none',borderRadius:'10px',
                        cursor:importing?'default':'pointer',fontSize:'14px',fontWeight:'800'}}>
                {importing ? '가져오는 중...' : '현재 계정으로 가져오기 →'}
              </button>
            </div>
          )}

          {msg && (
            <div style={{background:msg.startsWith('✅')?'var(--cn-ok-100)':'var(--cn-danger-100)',
                         border:`1px solid ${msg.startsWith('✅')?'var(--cn-ok)':'var(--cn-danger)'}`,
                         borderRadius:'10px',padding:'10px 14px',fontSize:'13px',fontWeight:'600',
                         color:msg.startsWith('✅')?'var(--cn-ok)':'var(--cn-danger)'}}>
              {msg}
            </div>
          )}
        </div>
      </div>
    );
  };

  /* ── 피드백/버그신고 모달 ── */
  /* Supabase 테이블 생성 필요: CREATE TABLE cn_feedback (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, user_email TEXT, type TEXT, content TEXT, created_at TIMESTAMPTZ DEFAULT now()); */
  const FeedbackModal = ({ authUser, onClose }) => {
    const [type, setType] = React.useState('버그신고');
    const [content, setContent] = React.useState('');
    const [sending, setSending] = React.useState(false);
    const [done, setDone] = React.useState(false);

    const send = async () => {
      if (!content.trim()) return;
      setSending(true);
      try {
        await supa.from('cn_feedback').insert({ user_email: authUser?.email || 'unknown', type, content: content.trim() });
      } catch(e) { /* table may not exist yet */ }
      setSending(false);
      setDone(true);
    };

    const overlay = { position:'fixed', inset:0, background:'var(--modal-scrim)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:'20px' };
    const box = { background:'var(--card-bg)', borderRadius:'16px', padding:'24px', width:'100%', maxWidth:'420px', boxShadow:'0 8px 40px rgba(0,0,0,0.3)' };

    return (
      <div style={overlay} onClick={e => e.target===e.currentTarget && onClose()}>
        <div style={box}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'18px' }}>
            <div style={{ fontSize:'17px', fontWeight:'800', color:'var(--text)' }}>💬 피드백 · 버그신고</div>
            <button onClick={onClose} style={{ background:'none', border:'none', fontSize:'22px', cursor:'pointer', color:'var(--text-mute)', lineHeight:1, padding:'0 4px' }}>×</button>
          </div>
          {done ? (
            <div style={{ textAlign:'center', padding:'24px 0' }}>
              <div style={{ fontSize:'38px', marginBottom:'12px' }}>✅</div>
              <div style={{ fontSize:'16px', fontWeight:'700', color:'var(--cn-ok)', marginBottom:'6px' }}>전달됐어요! 감사합니다.</div>
              <div style={{ fontSize:'13px', color:'var(--text-sub)' }}>소중한 피드백을 검토 후 반영하겠습니다.</div>
              <button onClick={onClose} style={{ marginTop:'20px', background:'var(--cn-brand)', color:'#fff', border:'none', borderRadius:'10px', padding:'10px 32px', cursor:'pointer', fontSize:'14px', fontWeight:'700', fontFamily:'inherit' }}>확인</button>
            </div>
          ) : (<>
            <div style={{ marginBottom:'14px' }}>
              <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'6px', fontWeight:'700' }}>유형</div>
              <div style={{ display:'flex', gap:'8px' }}>
                {['버그신고','기능제안','기타'].map(t => (
                  <button key={t} onClick={() => setType(t)}
                    style={{ flex:1, padding:'8px 4px', border:`2px solid ${type===t?'var(--cn-brand)':'var(--card-border)'}`, borderRadius:'8px', background: type===t?'var(--cn-brand-100)':'var(--card-bg)', color: type===t?'var(--cn-brand)':'var(--text-sub)', cursor:'pointer', fontSize:'13px', fontWeight:'700', fontFamily:'inherit' }}>
                    {t}
                  </button>
                ))}
              </div>
            </div>
            <div style={{ marginBottom:'18px' }}>
              <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'6px', fontWeight:'700' }}>내용</div>
              <textarea value={content} onChange={e => setContent(e.target.value)}
                placeholder="내용을 자세히 적어주세요…"
                rows={5} style={{ width:'100%', border:'1px solid var(--input-border)', borderRadius:'8px', padding:'10px 12px', fontSize:'14px', outline:'none', background:'var(--input-bg)', color:'var(--text)', resize:'vertical', fontFamily:'inherit', lineHeight:'1.6', boxSizing:'border-box' }} />
            </div>
            <div style={{ display:'flex', gap:'10px' }}>
              <button onClick={onClose} style={{ flex:1, padding:'11px', border:'1px solid var(--card-border)', borderRadius:'10px', background:'var(--card-bg)', color:'var(--text-sub)', cursor:'pointer', fontSize:'14px', fontWeight:'700', fontFamily:'inherit' }}>취소</button>
              <button onClick={send} disabled={!content.trim() || sending}
                style={{ flex:2, padding:'11px', border:'none', borderRadius:'10px', background:(!content.trim()||sending)?'var(--cn-brand-100)':'var(--cn-brand)', color:(!content.trim()||sending)?'var(--cn-brand)':'#fff', cursor:(!content.trim()||sending)?'default':'pointer', fontSize:'14px', fontWeight:'700', fontFamily:'inherit' }}>
                {sending ? '전송 중…' : '전송하기'}
              </button>
            </div>
          </>)}
        </div>
      </div>
    );
  };

  /* ── 프로필 탭 ── */
  /* ── 내 정보 수정 모달 ── */
  const ProfileEditModal = ({ authUser, userId, onClose, onAvatarUpdate }) => {
    const [profile, setProfile] = React.useState({ name:'', phone:'', height:'', avatar_url:'' });
    const [loading, setLoading] = React.useState(true);
    const [saving, setSaving] = React.useState(false);
    const [uploading, setUploading] = React.useState(false);
    const [msg, setMsg] = React.useState('');
    const avatarRef = React.useRef(null);

    React.useEffect(() => {
      if (!userId) { setLoading(false); return; }
      supa.from('cn_profiles').select('name,phone,height,grade,avatar_url').eq('id', userId).single()
        .then(({ data }) => {
          if (data) setProfile({ name: data.name||'', phone: data.phone||'', height: data.height||'', avatar_url: data.avatar_url||'' });
          setLoading(false);
        });
    }, [userId]);

    const handleAvatarChange = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) { setMsg('❌ 사진은 2MB 이하만 가능해요.'); return; }
      setUploading(true); setMsg('');
      const ext = file.name.split('.').pop();
      const path = `${userId}/avatar.${ext}`;
      const { error: upErr } = await supa.storage.from('avatar').upload(path, file, { upsert: true, contentType: file.type });
      if (upErr) { setMsg('❌ 업로드 실패: ' + upErr.message); setUploading(false); return; }
      const { data: { publicUrl } } = supa.storage.from('avatar').getPublicUrl(path);
      const url = publicUrl + '?t=' + Date.now();
      await supa.from('cn_profiles').update({ avatar_url: url }).eq('id', userId);
      setProfile(p => ({ ...p, avatar_url: url }));
      if (onAvatarUpdate) onAvatarUpdate(url);
      setUploading(false);
      setMsg('✅ 사진이 업데이트됐어요!');
    };

    const save = async () => {
      setSaving(true); setMsg('');
      const h = profile.height ? parseFloat(profile.height) : null;
      const payload = { id: userId, email: authUser?.email, name: profile.name, phone: profile.phone, height: h };
      const { error } = await supa.from('cn_profiles').upsert(payload, { onConflict: 'id' });
      setSaving(false);
      if (error) { setMsg('❌ 저장 실패: ' + error.message); }
      else {
        if (h) {
          localStorage.setItem('hcd_height', String(h));
          if (userId) localStorage.setItem(`hcd_height_${userId}`, String(h));
        }
        setMsg('✅ 저장됐습니다!');
        setTimeout(onClose, 1200);
      }
    };

    const inp = { width:'100%', padding:'10px 12px', border:'1.5px solid var(--card-border)', borderRadius:'10px',
      background:'var(--bg)', color:'var(--text)', fontSize:'14px', fontFamily:'inherit', outline:'none', boxSizing:'border-box' };

    return (
      <div style={{ position:'fixed', inset:0, background:'var(--modal-scrim)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', padding:'16px' }}
           onClick={e => e.target===e.currentTarget && onClose()}>
        <div style={{ background:'var(--card-bg)', borderRadius:'18px', padding:'24px', width:'100%', maxWidth:'420px', boxShadow:'0 8px 40px rgba(0,0,0,0.25)', maxHeight:'90vh', overflowY:'auto' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px' }}>
            <div style={{ fontSize:'16px', fontWeight:'800' }}>👤 내 정보 수정</div>
            <button onClick={onClose} style={{ background:'none', border:'none', fontSize:'20px', cursor:'pointer', color:'var(--text-mute)', lineHeight:1 }}>✕</button>
          </div>

          {/* 프로필 사진 */}
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginBottom:'20px' }}>
            <div style={{ position:'relative', cursor:'pointer' }} onClick={() => avatarRef.current?.click()}>
              {profile.avatar_url
                ? <img src={profile.avatar_url} alt="프로필" style={{ width:'80px', height:'80px', borderRadius:'50%', objectFit:'cover', border:'3px solid var(--cn-brand)' }} />
                : <div style={{ width:'80px', height:'80px', borderRadius:'50%', background:'linear-gradient(135deg,var(--cn-brand),var(--cn-brand-600))', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'28px', color:'#fff', fontWeight:'700', border:'3px solid var(--cn-brand)' }}>
                    {(profile.name||authUser?.email||'?')[0].toUpperCase()}
                  </div>}
              <div style={{ position:'absolute', bottom:0, right:0, background:'var(--cn-brand)', borderRadius:'50%', width:'24px', height:'24px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'12px', border:'2px solid var(--card-bg)' }}>📷</div>
            </div>
            <input ref={avatarRef} type="file" accept="image/*" style={{ display:'none' }} onChange={handleAvatarChange} />
            <button onClick={() => avatarRef.current?.click()} disabled={uploading}
              style={{ marginTop:'8px', background:'none', border:'1px solid var(--card-border)', borderRadius:'8px', padding:'4px 12px', fontSize:'12px', color:'var(--text-sub)', cursor:'pointer', fontFamily:'inherit' }}>
              {uploading ? '업로드 중...' : '📷 사진 변경'}
            </button>
            <div style={{ fontSize:'11px', color:'var(--text-mute)', marginTop:'3px' }}>JPG·PNG·WEBP, 2MB 이하</div>
          </div>

          <div style={{ background:'var(--cn-brand-100)', borderRadius:'10px', padding:'10px 14px', marginBottom:'16px' }}>
            <div style={{ fontSize:'11px', color:'var(--text-sub)' }}>로그인 계정 (변경 불가)</div>
            <div style={{ fontSize:'13px', fontWeight:'700', color:'var(--cn-brand)', marginTop:'2px', wordBreak:'break-all' }}>{authUser?.email}</div>
          </div>
          {loading ? <div style={{ textAlign:'center', padding:'20px', color:'var(--text-sub)' }}>불러오는 중...</div> : (<>
            <div style={{ marginBottom:'12px' }}>
              <label style={{ fontSize:'12px', fontWeight:'700', color:'var(--text-sub)', display:'block', marginBottom:'5px' }}>이름</label>
              <input style={inp} type="text" placeholder="홍길동" value={profile.name} onChange={e=>setProfile(p=>({...p,name:e.target.value}))} />
            </div>
            <div style={{ marginBottom:'12px' }}>
              <label style={{ fontSize:'12px', fontWeight:'700', color:'var(--text-sub)', display:'block', marginBottom:'5px' }}>전화번호</label>
              <input style={inp} type="tel" placeholder="010-0000-0000" value={profile.phone} onChange={e=>setProfile(p=>({...p,phone:e.target.value}))} />
            </div>
            <div style={{ marginBottom:'20px' }}>
              <label style={{ fontSize:'12px', fontWeight:'700', color:'var(--text-sub)', display:'block', marginBottom:'5px' }}>
                키 (cm) <span style={{ fontWeight:'400', color:'var(--text-mute)' }}>— BMI 계산용, 선택 사항</span>
              </label>
              <input style={inp} type="number" placeholder="170" value={profile.height} onChange={e=>setProfile(p=>({...p,height:e.target.value}))} />
            </div>
            {msg && <div style={{ fontSize:'13px', textAlign:'center', marginBottom:'12px', color: msg.startsWith('✅') ? 'var(--cn-ok)' : 'var(--cn-danger)' }}>{msg}</div>}
            <button onClick={save} disabled={saving}
              style={{ width:'100%', padding:'12px', background:'var(--cn-brand)', color:'#fff', border:'none', borderRadius:'10px',
                fontWeight:'700', fontSize:'15px', cursor:'pointer', opacity: saving?0.7:1, fontFamily:'inherit' }}>
              {saving ? '저장 중...' : '저장하기'}
            </button>
          </>)}
        </div>
      </div>
    );
  };

  const ProfileTab = ({ authUser, userId, onSync, onChangePassword, onDataRecovery, onFeedback, onImport, darkMode, onToggleDark }) => {
    const [showEdit, setShowEdit] = React.useState(false);
    const [avatarUrl, setAvatarUrl] = React.useState('');
    const [profileName, setProfileName] = React.useState('');
    React.useEffect(() => {
      if (!userId) return;
      supa.from('cn_profiles').select('avatar_url,name,grade').eq('id', userId).maybeSingle()
        .then(({ data }) => { if (data) { setAvatarUrl(data.avatar_url||''); setProfileName(data.name||''); } });
    }, [userId]);
    const Row = ({ icon, label, sub, onClick, accent }) => (
      <button onClick={onClick}
        style={{ width:'100%', background:'var(--card-bg)', border:'1px solid var(--card-border)', borderRadius:'10px',
                 padding:'10px 12px', display:'flex', alignItems:'center', gap:'10px', cursor:'pointer',
                 marginBottom:'7px', textAlign:'left', fontFamily:'inherit' }}>
        <div style={{ fontSize:'18px', width:'28px', height:'28px', background: accent || 'var(--cn-brand-100)', color: accent?'#fff':'var(--cn-brand)',
                     borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>{icon}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:'14px', fontWeight:'700', color:'var(--text)' }}>{label}</div>
          {sub && <div style={{ fontSize:'11px', color:'var(--text-sub)', marginTop:'1px' }}>{sub}</div>}
        </div>
        <div style={{ color:'var(--text-mute)', fontSize:'16px' }}>›</div>
      </button>
    );
    return (
      <div className="cn-card" data-tab="profile">
        {showEdit && <ProfileEditModal authUser={authUser} userId={userId}
          onClose={() => setShowEdit(false)}
          onAvatarUpdate={url => setAvatarUrl(url)} />}
        <div style={{ background:'linear-gradient(135deg,var(--cn-brand),var(--cn-brand-600))', borderRadius:'12px',
                     padding:'14px 16px', marginBottom:'12px', color:'#fff', display:'flex', justifyContent:'space-between', alignItems:'center', gap:'10px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'12px' }}>
            {avatarUrl
              ? <img src={avatarUrl} alt="프로필" style={{ width:'48px', height:'48px', borderRadius:'50%', objectFit:'cover', border:'2px solid rgba(255,255,255,0.6)', flexShrink:0 }} />
              : <div style={{ width:'48px', height:'48px', borderRadius:'50%', background:'rgba(255,255,255,0.2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'20px', fontWeight:'700', flexShrink:0 }}>
                  {(profileName||authUser?.email||'?')[0].toUpperCase()}
                </div>}
            <div>
              {profileName && <div style={{ fontSize:'15px', fontWeight:'800', marginBottom:'2px' }}>{profileName}</div>}
              <div style={{ fontSize:'12px', opacity:0.85, wordBreak:'break-all' }}>{authUser?.email || 'Guest'}</div>
              <div style={{ fontSize:'10px', opacity:0.6, marginTop:'2px', fontFamily:'var(--font-num)' }}>ID: {(userId||'').slice(0,12)}...</div>
            </div>
          </div>
          <button onClick={() => setShowEdit(true)}
            style={{ background:'rgba(255,255,255,0.2)', border:'1px solid rgba(255,255,255,0.35)', color:'#fff', borderRadius:'8px',
              padding:'6px 12px', cursor:'pointer', fontSize:'12px', fontWeight:'700', whiteSpace:'nowrap', fontFamily:'inherit', flexShrink:0 }}>
            ✏️ 수정
          </button>
        </div>
        <div style={{ fontSize:'12px', fontWeight:'700', color:'var(--text-sub)', margin:'8px 4px 6px' }}>데이터</div>
        <Row icon="📥" label="가져오기" sub="리브레뷰 CSV · 애플 건강 · 삼성 헬스" onClick={onImport} />
        <Row icon="🔄" label="기기 동기화" sub="다른 기기와 사용자 ID 공유" onClick={onSync} />
        <Row icon="🛟" label="데이터 복구" sub="이전 동기화 코드로 데이터 찾기" onClick={onDataRecovery} accent="var(--cn-warn)" />
        <div style={{ fontSize:'12px', fontWeight:'700', color:'var(--text-sub)', margin:'10px 4px 6px' }}>화면 · 기타</div>
        <Row icon={darkMode?'☀️':'🌙'} label={darkMode?'라이트 모드':'다크 모드'} sub="OLED 최적화 블랙 테마" onClick={onToggleDark} />
        <Row icon="🔑" label="비밀번호 변경" sub="새 비밀번호로 업데이트" onClick={onChangePassword} />
        <Row icon="💬" label="피드백 · 버그신고" sub="버그 리포트 또는 기능 제안" onClick={onFeedback} />
        <Row icon="👥" label="커뮤니티 게시판" sub="건강 정보 공유 · 질문 · 후기" onClick={() => window.open('board.html','_blank')} />
        <Row icon="🚪" label="로그아웃" onClick={() => supa.auth.signOut()} accent="var(--cn-danger)" />
      </div>
    );
  };

  /* ── 대시보드: 건강 점수 계산 ── */
  const calcHealthScore = (data) => {
    const dates = Object.keys(data).filter(k => k !== '_user_settings_').sort().slice(-14);
    if (!dates.length) return { total:0, bp:0, glucose:0, meds:0, exercise:0 };
    // 혈압
    const bpVals = dates.map(d => {
      const b = data[d] && data[d].bp;
      if (!b || !b.sys || !b.dia) return null;
      const s = parseFloat(b.sys), di = parseFloat(b.dia);
      if (s < 120 && di < 80) return 100;
      if (s < 130 && di < 80) return 80;
      if (s < 140 && di < 90) return 60;
      if (s < 160 && di < 100) return 40;
      return 20;
    }).filter(v => v !== null);
    const bpScore = bpVals.length ? Math.round(bpVals.reduce((a,b)=>a+b,0)/bpVals.length) : 0;
    // 혈당
    const bsAll = dates.flatMap(d => {
      const bs = (data[d] && data[d].bs) || {};
      return Object.values(bs).map(v => parseInt(v)).filter(v => v > 0);
    });
    let glScore = 0;
    if (bsAll.length) {
      const med = median(bsAll);
      glScore = med < 100 ? 100 : med < 126 ? 85 : med < 154 ? 65 : med < 200 ? 40 : 20;
    }
    // 복약
    const medDays = dates.filter(d => {
      const m = data[d] && data[d].meds;
      return m && Object.values(m).some(Boolean);
    });
    const medsScore = dates.length ? Math.round((medDays.length / dates.length) * 100) : 0;
    // 운동
    const exDays = dates.filter(d => {
      const ex = data[d] && data[d].exercise;
      const steps = data[d] && data[d].steps;
      const hasLog = ex && ((ex.logs||[]).some(l => l.type || parseInt(l.mins)>0) || parseInt(ex.mins)>0 || (ex.type&&ex.type.trim()));
      const hasSteps = steps && parseInt(steps) >= 3000;
      return hasLog || hasSteps;
    });
    const exScore = dates.length ? Math.round((exDays.length / dates.length) * 100) : 0;
    const total = Math.round(bpScore*0.30 + glScore*0.30 + medsScore*0.25 + exScore*0.15);
    return { total, bp:bpScore, glucose:glScore, meds:medsScore, exercise:exScore };
  };

  /* ── 대시보드: AI 인사이트 생성 ── */
  const genInsights = (data) => {
    const dates = Object.keys(data).filter(k => k !== '_user_settings_').sort().slice(-7);
    if (!dates.length) return ['데이터를 입력하면 AI 인사이트가 생성됩니다.'];
    const insights = [];
    const bpVals = dates.map(d => data[d] && data[d].bp).filter(b => b && b.sys).map(b => parseFloat(b.sys));
    if (bpVals.length >= 2) {
      const avg = Math.round(bpVals.reduce((a,b)=>a+b,0)/bpVals.length);
      if (avg > 140) insights.push('최근 7일 평균 수축기 혈압 '+avg+'mmHg — 고혈압 범위입니다. 저염식과 규칙적 운동을 권장합니다.');
      else if (avg > 130) insights.push('평균 혈압 '+avg+'mmHg — 주의혈압 범위. 식이 관리를 유지해 주세요.');
      else insights.push('평균 혈압 '+avg+'mmHg — 정상 범위로 잘 관리되고 있습니다.');
    }
    const bsAll = dates.flatMap(d => {
      const bs = (data[d] && data[d].bs) || {};
      return Object.values(bs).map(v => parseInt(v)).filter(v => v > 0);
    });
    if (bsAll.length) {
      const avg = Math.round(bsAll.reduce((a,b)=>a+b,0)/bsAll.length);
      if (avg > 180) insights.push('평균 혈당 '+avg+'mg/dL — 목표 범위 초과. 식후 혈당 관리와 인슐린 용량을 점검해 보세요.');
      else if (avg > 140) insights.push('평균 혈당 '+avg+'mg/dL — 주의 범위. 탄수화물 섭취를 줄여보세요.');
      else insights.push('평균 혈당 '+avg+'mg/dL — 목표 범위 내 관리 중입니다.');
    }
    const medDays = dates.filter(d => { const m = data[d] && data[d].meds; return m && Object.values(m).some(Boolean); });
    const medPct2 = dates.length ? Math.round((medDays.length/dates.length)*100) : 0;
    if (medPct2 < 80) insights.push('최근 복약 완료율 '+medPct2+'% — 규칙적인 복약이 혈당 조절에 중요합니다.');
    else if (medPct2 === 100) insights.push('7일 연속 복약 100% 완료 — 훌륭한 복약 습관입니다!');
    if (!insights.length) insights.push('데이터가 더 쌓이면 맞춤 인사이트를 제공합니다.');
    return insights;
  };

  /* ── SVG: 원형 건강 점수 게이지 ── */
  const CircleGauge = ({ value, size=96, stroke=9 }) => {
    const r = (size - stroke) / 2;
    const circ = 2 * Math.PI * r;
    const offset = circ - (value / 100) * circ;
    const color = value >= 80 ? 'var(--cn-ok)' : value >= 60 ? 'var(--cn-brand)' : value >= 40 ? 'var(--cn-warn)' : 'var(--cn-danger)';
    const label = value >= 80 ? '우수' : value >= 60 ? '양호' : value >= 40 ? '보통' : '주의';
    return (
      <svg width={size} height={size} viewBox={'0 0 '+size+' '+size} style={{flexShrink:0}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--card-border)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          transform={'rotate(-90 '+(size/2)+' '+(size/2)+')'}
          style={{transition:'stroke-dashoffset 0.7s ease'}}/>
        <text x={size/2} y={size/2-5} textAnchor="middle" fill="var(--text)" fontSize="20" fontWeight="800">{value}</text>
        <text x={size/2} y={size/2+13} textAnchor="middle" fill="var(--text-sub)" fontSize="10">{label}</text>
      </svg>
    );
  };

  /* ── SVG: 스파크라인 ── */
  const Sparkline = ({ vals, color='var(--cn-brand)', h=30 }) => {
    if (!vals || vals.length < 2) return <div style={{height:h}}/>;
    const ns = vals.map(v => parseFloat(v)||0);
    const mn = Math.min(...ns), mx = Math.max(...ns);
    const range = mx - mn || 1;
    const w = 100;
    const pts = ns.map((v,i) => ((i/(ns.length-1))*w)+','+(h - ((v-mn)/range)*(h-4)-2)).join(' ');
    return (
      <svg viewBox={'0 0 '+w+' '+h} style={{width:'100%',height:h,display:'block'}} preserveAspectRatio="none">
        <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
      </svg>
    );
  };

  /* ── 리포트 미니 요약 (사이드바 접힘 상태) ── */
  const ReportMiniSummary = ({ data, allMedIds }) => {
    const summary = useMemo(() => {
      const allDates = Object.keys(data).filter(k => k !== '_user_settings_').sort();
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
      const last30 = allDates.filter(d => new Date(d) >= cutoff);
      if (!last30.length) return null;
      const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
      // 혈압
      const bpVals = last30.map(d=>data[d]?.bp).filter(b=>b?.sys&&b?.dia).map(b=>({sys:parseFloat(b.sys),dia:parseFloat(b.dia)}));
      const avgSys = avg(bpVals.map(b=>b.sys)); const avgDia = avg(bpVals.map(b=>b.dia));
      const bpRate = bpVals.length ? Math.round(bpVals.filter(b=>b.sys<130&&b.dia<85).length/bpVals.length*100) : null;
      // 혈당
      const bsAll = last30.flatMap(d=>Object.values(data[d]?.bs||{}).map(v=>parseFloat(v)).filter(v=>!isNaN(v)&&v>0));
      const avgBs = avg(bsAll);
      const bsRate = bsAll.length ? Math.round(bsAll.filter(v=>v>=70&&v<=140).length/bsAll.length*100) : null;
      // 체중
      const wVals = last30.map(d=>parseFloat(data[d]?.weight)).filter(v=>!isNaN(v)&&v>0);
      const lastW = wVals[wVals.length-1];
      // 복약
      const medDays = last30.filter(d=>(allMedIds||[]).some(id=>data[d]?.meds?.[id]===true)).length;
      const medRate = (last30.length && (allMedIds||[]).length) ? Math.round(medDays/last30.length*100) : null;
      // 기록률
      const recDays = last30.filter(d=>{ const dy=data[d]; return dy&&(dy.bp?.sys||dy.weight||Object.values(dy.bs||{}).some(v=>v)); }).length;
      const recRate = last30.length ? Math.round(recDays/last30.length*100) : null;
      // 종합 점수
      let sc=0, n=0;
      if (bpRate!=null){sc+=bpRate;n++;} if (bsRate!=null){sc+=bsRate;n++;}
      if (medRate!=null){sc+=medRate;n++;} if (recRate!=null){sc+=recRate;n++;}
      const totalScore = n ? Math.round(sc/n) : null;
      const grade = totalScore==null ? null
        : totalScore>=90 ? {label:'매우 좋음',color:'var(--cn-ok)',emoji:'🏆'}
        : totalScore>=75 ? {label:'좋음',color:'#3b82f6',emoji:'👍'}
        : totalScore>=60 ? {label:'보통',color:'#f59e0b',emoji:'📊'}
        :                  {label:'주의 필요',color:'var(--cn-danger)',emoji:'⚠️'};
      return { avgSys, avgDia, avgBs, lastW, medRate, totalScore, grade };
    }, [data, allMedIds]);

    if (!summary) return <div style={{padding:'8px 16px 14px',fontSize:'12px',color:'var(--text-mute)'}}>기록 없음</div>;
    const s = summary;
    return (
      <div style={{ padding:'0 16px 16px' }}>
        {/* 종합 점수 */}
        {s.grade && (
          <div style={{ display:'flex', alignItems:'center', gap:'14px', padding:'10px 14px', borderRadius:'12px',
            background:`linear-gradient(135deg,${s.grade.color}18,${s.grade.color}08)`,
            border:`1px solid ${s.grade.color}33`, marginBottom:'10px' }}>
            <div style={{ fontSize:'28px', lineHeight:1 }}>{s.grade.emoji}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:'11px', color:'var(--text-sub)', fontWeight:'600' }}>종합 건강 지수 · 30일</div>
              <div style={{ fontSize:'26px', fontWeight:'900', color:s.grade.color, lineHeight:1.1 }}>
                {s.totalScore}<span style={{fontSize:'13px',fontWeight:'700'}}>점</span>
              </div>
            </div>
            <div style={{ fontSize:'13px', fontWeight:'700', color:s.grade.color, background:`${s.grade.color}20`,
              borderRadius:'8px', padding:'3px 10px' }}>{s.grade.label}</div>
          </div>
        )}
        {/* 핵심 지표 태그 */}
        <div style={{ display:'flex', flexWrap:'wrap', gap:'6px' }}>
          {s.avgSys && <span style={{fontSize:'12px',background:'var(--cn-danger-100)',color:'var(--cn-danger)',borderRadius:'8px',padding:'4px 9px',fontWeight:'700'}}>💓 {Math.round(s.avgSys)}/{Math.round(s.avgDia)}</span>}
          {s.avgBs  && <span style={{fontSize:'12px',background:'var(--cn-ok-100)',color:'var(--cn-ok)',borderRadius:'8px',padding:'4px 9px',fontWeight:'700'}}>🩸 {Math.round(s.avgBs)}</span>}
          {s.lastW  && <span style={{fontSize:'12px',background:'var(--cn-low-100)',color:'var(--cn-low)',borderRadius:'8px',padding:'4px 9px',fontWeight:'700'}}>⚖️ {parseFloat(s.lastW).toFixed(1)}kg</span>}
          {s.medRate!=null && <span style={{fontSize:'12px',background:'var(--cn-brand-100)',color:'var(--cn-brand)',borderRadius:'8px',padding:'4px 9px',fontWeight:'700'}}>💊 {s.medRate}%</span>}
        </div>
      </div>
    );
  };

  /* ── 종합 건강 리포트 컴포넌트 ── */
  const HealthReportSection = ({ data, medsConfig, allMedIds }) => {
    const report = useMemo(() => {
      const KEY_SKIP = '_user_settings_';
      const allDates = Object.keys(data).filter(k => k !== KEY_SKIP).sort();
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
      const last30 = allDates.filter(d => new Date(d) >= cutoff);
      const prev30start = new Date(); prev30start.setDate(prev30start.getDate() - 60);
      const prev30 = allDates.filter(d => new Date(d) >= prev30start && new Date(d) < cutoff);

      const avg = (arr) => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;

      /* 혈압 */
      const bpVals = last30.map(d => data[d]?.bp).filter(b => b?.sys && b?.dia)
        .map(b => ({ sys: parseFloat(b.sys), dia: parseFloat(b.dia) }));
      const prevBpVals = prev30.map(d => data[d]?.bp).filter(b => b?.sys && b?.dia)
        .map(b => ({ sys: parseFloat(b.sys), dia: parseFloat(b.dia) }));
      const avgSys = avg(bpVals.map(b=>b.sys));
      const avgDia = avg(bpVals.map(b=>b.dia));
      const prevAvgSys = avg(prevBpVals.map(b=>b.sys));
      const bpNormal = bpVals.filter(b => b.sys < 130 && b.dia < 85).length;
      const bpRate = bpVals.length ? Math.round(bpNormal/bpVals.length*100) : null;

      /* 혈당 */
      const bsAll = last30.flatMap(d => {
        const bs = data[d]?.bs || {};
        return Object.values(bs).map(v => parseFloat(v)).filter(v => !isNaN(v) && v > 0);
      });
      const prevBsAll = prev30.flatMap(d => {
        const bs = data[d]?.bs || {};
        return Object.values(bs).map(v => parseFloat(v)).filter(v => !isNaN(v) && v > 0);
      });
      const avgBs = avg(bsAll);
      const prevAvgBs = avg(prevBsAll);
      const bsNormal = bsAll.filter(v => v >= 70 && v <= 140).length;
      const bsRate = bsAll.length ? Math.round(bsNormal/bsAll.length*100) : null;

      /* 체중 */
      const wVals = last30.map(d => parseFloat(data[d]?.weight)).filter(v => !isNaN(v) && v > 0);
      const firstW = wVals[0], lastW = wVals[wVals.length-1];
      const wChange = (firstW && lastW) ? (lastW - firstW) : null;

      /* 체지방 */
      const bfVals = last30.map(d => parseFloat(data[d]?.bodyFat)).filter(v => !isNaN(v) && v > 0);
      const firstBf = bfVals[0], lastBf = bfVals[bfVals.length-1];
      const bfChange = (firstBf && lastBf) ? (lastBf - firstBf) : null;

      /* 운동 (걸음수) */
      const stepsVals = last30.map(d => parseFloat(data[d]?.steps)).filter(v => !isNaN(v) && v > 0);
      const avgSteps = avg(stepsVals);
      const prevStepsVals = prev30.map(d => parseFloat(data[d]?.steps)).filter(v => !isNaN(v) && v > 0);
      const prevAvgSteps = avg(prevStepsVals);
      const activeDays = last30.filter(d => {
        const s = parseFloat(data[d]?.steps); const c = parseFloat(data[d]?.cal);
        const logs = data[d]?.exercise?.logs || [];
        return (s > 3000) || (c > 200) || logs.length > 0;
      }).length;

      /* 복약 순응도 */
      const medDays = last30.filter(d => {
        const meds = data[d]?.meds || {};
        const allIds = allMedIds || [];
        if (!allIds.length) return false;
        return allIds.some(id => meds[id] === true);
      }).length;
      const medRate = last30.length ? Math.round(medDays/last30.length*100) : null;

      /* 기록 충실도 */
      const recordedDays = last30.filter(d => {
        const dy = data[d]; if (!dy) return false;
        return (dy.bp?.sys) || (dy.weight) || Object.values(dy.bs||{}).some(v=>v);
      }).length;
      const recordRate = last30.length ? Math.round(recordedDays/last30.length*100) : null;

      /* 칼로리 섭취 추정 (내장 DB 기반) */
      const estimateCalFromText = (text) => {
        if (!text?.trim()) return 0;
        const items = text.split(/[\n]+/).map(s => s.trim()).filter(Boolean)
          .filter(s => !/kcal|칼로리|탄수화물|단백질|지방|혈당|적합|개선|총\s*영양|음식\s*목록|Powered/i.test(s))
          .filter(s => !/^[-•🍽📊🩸✅💡⚠️※]/.test(s))
          .flatMap(s => s.split(',').map(x => x.trim()).filter(Boolean));
        let total = 0;
        items.forEach(item => {
          const qMatch = item.match(/(\d+(?:\.\d+)?)\s*(공기|개|그릇|봉|접시|잔|컵|조각|인분|개분)/);
          const qty = qMatch ? parseFloat(qMatch[1]) : 1;
          let matched = null, matchedLen = 0;
          for (const [name, cal] of Object.entries(FOOD_DB)) {
            if (item.includes(name) && name.length > matchedLen) { matched = cal; matchedLen = name.length; }
          }
          if (matched) total += Math.round(matched * qty);
        });
        return total;
      };
      const dailyCals = last30.map(d => {
        const dy = data[d]; if (!dy) return null;
        let dayCal = 0;
        ['breakfast','lunch','dinner'].forEach(id => { dayCal += estimateCalFromText(dy.meals?.[id]); });
        (dy.extraMeals||[]).forEach(em => { dayCal += estimateCalFromText(em.text); });
        return dayCal > 0 ? dayCal : null;
      }).filter(v => v !== null);
      const avgDailyCal = avg(dailyCals);
      const maxDailyCal = dailyCals.length ? Math.max(...dailyCals) : null;
      const minDailyCal = dailyCals.length ? Math.min(...dailyCals) : null;
      // 목표 칼로리: 당뇨 기준 1,600~2,000 kcal
      const calGoal = 1800;
      const calStatus = avgDailyCal == null ? null
        : avgDailyCal < 1200 ? { label:'섭취 부족', color:'#3b82f6' }
        : avgDailyCal <= 2000 ? { label:'적정 범위', color:'var(--cn-ok)' }
        : avgDailyCal <= 2400 ? { label:'약간 과다', color:'#f59e0b' }
        : { label:'과다 섭취', color:'var(--cn-danger)' };

      /* 트렌드 화살표 */
      const trend = (now, prev, lowerBetter=false) => {
        if (now == null || prev == null) return null;
        const diff = now - prev;
        if (Math.abs(diff) < 1) return { icon:'→', color:'var(--text-sub)', label:'유지' };
        const improving = lowerBetter ? diff < 0 : diff > 0;
        return improving
          ? { icon:'↑', color:'var(--cn-ok)', label:`${lowerBetter?'감소':'증가'}` }
          : { icon:'↓', color:'var(--cn-danger)', label:`${lowerBetter?'증가':'감소'}` };
      };
      const bpTrend = trend(avgSys, prevAvgSys, true);
      const bsTrend = trend(avgBs, prevAvgBs, true);
      const stepsTrend = trend(avgSteps, prevAvgSteps, false);

      /* 종합 점수 */
      let score = 0, scoreItems = 0;
      if (bpRate != null)   { score += bpRate;    scoreItems++; }
      if (bsRate != null)   { score += bsRate;    scoreItems++; }
      if (medRate != null && allMedIds?.length)  { score += medRate;   scoreItems++; }
      if (recordRate != null){ score += recordRate; scoreItems++; }
      const totalScore = scoreItems ? Math.round(score/scoreItems) : null;
      const scoreGrade = totalScore == null ? null
        : totalScore >= 90 ? { label:'매우 좋음', color:'var(--cn-ok)', emoji:'🏆' }
        : totalScore >= 75 ? { label:'좋음',      color:'#3b82f6',     emoji:'👍' }
        : totalScore >= 60 ? { label:'보통',       color:'#f59e0b',     emoji:'📊' }
        :                    { label:'주의 필요',  color:'var(--cn-danger)', emoji:'⚠️' };

      return { last30Len: last30.length, avgSys, avgDia, bpRate, bpTrend,
               avgBs, bsAll, bsRate, bsTrend,
               lastW, wChange, lastBf, bfChange,
               avgSteps, activeDays, stepsTrend,
               medRate, recordRate, totalScore, scoreGrade,
               avgDailyCal, maxDailyCal, minDailyCal, dailyCalsLen: dailyCals.length, calStatus, calGoal };
    }, [data, allMedIds]);

    const r = report;
    if (r.last30Len === 0) return (
      <div style={{ textAlign:'center', padding:'32px 0', color:'var(--text-sub)', fontSize:'14px' }}>
        기록이 없어요. 건강 데이터를 입력하면 리포트가 생성돼요.
      </div>
    );

    const StatRow = ({ icon, label, value, sub, trend, note }) => (
      <div style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px 0', borderBottom:'1px solid var(--card-border)' }}>
        <div style={{ fontSize:'22px', width:'32px', textAlign:'center', flexShrink:0 }}>{icon}</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:'13px', color:'var(--text-sub)', fontWeight:'600' }}>{label}</div>
          {note && <div style={{ fontSize:'11px', color:'var(--text-mute)', marginTop:'1px' }}>{note}</div>}
        </div>
        <div style={{ textAlign:'right' }}>
          <div style={{ fontSize:'18px', fontWeight:'800', color:'var(--text)' }}>{value ?? '–'}</div>
          {sub && <div style={{ fontSize:'11px', color:'var(--text-sub)', marginTop:'1px' }}>{sub}</div>}
        </div>
        {trend && (
          <div style={{ fontSize:'18px', fontWeight:'800', color:trend.color, width:'24px', textAlign:'center' }}>{trend.icon}</div>
        )}
      </div>
    );

    const RateBar = ({ rate, color }) => rate == null ? null : (
      <div style={{ height:'6px', background:'var(--card-border)', borderRadius:'3px', margin:'4px 0 0', overflow:'hidden' }}>
        <div style={{ height:'100%', width:`${rate}%`, background:color || 'var(--cn-brand)', borderRadius:'3px', transition:'width 0.6s ease' }} />
      </div>
    );

    return (
      <div>
        {/* 종합 점수 */}
        {r.scoreGrade && (
          <div style={{ background:`linear-gradient(135deg, ${r.scoreGrade.color}22, ${r.scoreGrade.color}11)`,
            border:`1.5px solid ${r.scoreGrade.color}44`, borderRadius:'14px', padding:'16px', marginBottom:'16px', textAlign:'center' }}>
            <div style={{ fontSize:'36px', marginBottom:'4px' }}>{r.scoreGrade.emoji}</div>
            <div style={{ fontSize:'13px', color:'var(--text-sub)', fontWeight:'600' }}>종합 건강 지수</div>
            <div style={{ fontSize:'42px', fontWeight:'900', color:r.scoreGrade.color, lineHeight:1.1 }}>{r.totalScore}<span style={{fontSize:'18px'}}>점</span></div>
            <div style={{ fontSize:'14px', fontWeight:'700', color:r.scoreGrade.color, marginTop:'4px' }}>{r.scoreGrade.label}</div>
            <div style={{ fontSize:'12px', color:'var(--text-mute)', marginTop:'6px' }}>최근 30일 {r.last30Len}일 기준</div>
          </div>
        )}

        {/* 혈압 */}
        <div style={{ marginBottom:'12px' }}>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>💓 혈압</div>
          <StatRow icon="🩺" label="평균 혈압" value={r.avgSys ? `${Math.round(r.avgSys)}/${Math.round(r.avgDia)}` : null} sub="mmHg" trend={r.bpTrend} note="전월 대비" />
          {r.bpRate != null && <>
            <div style={{ fontSize:'12px', color:'var(--text-sub)', marginTop:'6px' }}>정상 범위 달성률 <strong>{r.bpRate}%</strong> ({r.bpVals?.length ?? '–'}회 측정)</div>
            <RateBar rate={r.bpRate} color={r.bpRate >= 70 ? 'var(--cn-ok)' : r.bpRate >= 50 ? '#f59e0b' : 'var(--cn-danger)'} />
          </>}
        </div>

        {/* 혈당 */}
        <div style={{ marginBottom:'12px' }}>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>🩸 혈당</div>
          <StatRow icon="📉" label="평균 혈당" value={r.avgBs ? `${Math.round(r.avgBs)}` : null} sub="mg/dL" trend={r.bsTrend} note="전월 대비" />
          {r.bsRate != null && <>
            <div style={{ fontSize:'12px', color:'var(--text-sub)', marginTop:'6px' }}>정상 범위(70~140) 달성률 <strong>{r.bsRate}%</strong> ({r.bsAll?.length ?? '–'}회 측정)</div>
            <RateBar rate={r.bsRate} color={r.bsRate >= 70 ? 'var(--cn-ok)' : r.bsRate >= 50 ? '#f59e0b' : 'var(--cn-danger)'} />
          </>}
        </div>

        {/* 체중 */}
        <div style={{ marginBottom:'12px' }}>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>⚖️ 체중 · 체지방</div>
          <StatRow icon="⚖️" label="현재 체중" value={r.lastW ? `${parseFloat(r.lastW).toFixed(1)}` : null} sub="kg"
            trend={r.wChange != null ? { icon: r.wChange > 0 ? '↑' : r.wChange < 0 ? '↓' : '→',
              color: r.wChange < 0 ? 'var(--cn-ok)' : r.wChange > 0 ? 'var(--cn-danger)' : 'var(--text-sub)',
              label: '' } : null}
            note={r.wChange != null ? `30일간 ${r.wChange > 0 ? '+' : ''}${r.wChange.toFixed(1)}kg` : null} />
          {r.lastBf && <StatRow icon="💧" label="체지방율" value={`${parseFloat(r.lastBf).toFixed(1)}%`}
            trend={r.bfChange != null ? { icon: r.bfChange > 0 ? '↑' : r.bfChange < 0 ? '↓' : '→',
              color: r.bfChange < 0 ? 'var(--cn-ok)' : r.bfChange > 0 ? 'var(--cn-danger)' : 'var(--text-sub)',
              label: '' } : null}
            note={r.bfChange != null ? `30일간 ${r.bfChange > 0 ? '+' : ''}${r.bfChange.toFixed(1)}%` : null} />}
        </div>

        {/* 운동 */}
        <div style={{ marginBottom:'12px' }}>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>🏃 활동</div>
          <StatRow icon="👟" label="일평균 걸음수" value={r.avgSteps ? Math.round(r.avgSteps).toLocaleString() : null} sub="걸음" trend={r.stepsTrend} note="전월 대비" />
          <StatRow icon="🗓️" label="활동 달성일" value={r.activeDays != null ? `${r.activeDays}일` : null} sub={`/ ${r.last30Len}일`}
            note="걸음 3000+ 또는 운동 기록 있는 날" />
          {r.activeDays != null && r.last30Len && <>
            <RateBar rate={Math.round(r.activeDays/r.last30Len*100)} color={r.activeDays/r.last30Len >= 0.5 ? 'var(--cn-ok)' : '#f59e0b'} />
          </>}
        </div>

        {/* 복약 */}
        {r.medRate != null && (
          <div style={{ marginBottom:'12px' }}>
            <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>💊 복약</div>
            <StatRow icon="💊" label="복약 순응도" value={`${r.medRate}%`} sub={`${r.last30Len}일 중`} />
            <RateBar rate={r.medRate} color={r.medRate >= 80 ? 'var(--cn-ok)' : r.medRate >= 60 ? '#f59e0b' : 'var(--cn-danger)'} />
          </div>
        )}

        {/* 칼로리 섭취 */}
        {r.avgDailyCal != null && (
          <div style={{ marginBottom:'12px' }}>
            <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>🍽️ 칼로리 섭취</div>
            <StatRow icon="🔥" label="일평균 칼로리" value={`${Math.round(r.avgDailyCal).toLocaleString()}`} sub="kcal / 일"
              note={r.calStatus ? r.calStatus.label : null}
              trend={r.calStatus ? { icon: r.avgDailyCal <= r.calGoal ? '✓' : '!', color: r.calStatus.color, label:'' } : null} />
            <div style={{ display:'flex', gap:'12px', marginTop:'6px', fontSize:'12px', color:'var(--text-sub)' }}>
              {r.minDailyCal != null && <span>최소 <strong>{Math.round(r.minDailyCal).toLocaleString()}</strong> kcal</span>}
              {r.maxDailyCal != null && <span>최대 <strong>{Math.round(r.maxDailyCal).toLocaleString()}</strong> kcal</span>}
              <span style={{color:'var(--text-mute)'}}>{r.dailyCalsLen}일 기록 기준</span>
            </div>
            {/* 목표 대비 바 (목표 1,800 kcal 기준) */}
            <div style={{ marginTop:'6px', position:'relative', height:'6px', background:'var(--card-border)', borderRadius:'3px', overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${Math.min(r.avgDailyCal/2400*100,100)}%`, background: r.calStatus?.color || 'var(--cn-brand)', borderRadius:'3px', transition:'width 0.6s ease' }} />
              {/* 목표선 마커 */}
              <div style={{ position:'absolute', top:0, left:`${r.calGoal/2400*100}%`, width:'2px', height:'100%', background:'var(--text-sub)', opacity:0.5 }} />
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:'10px', color:'var(--text-mute)', marginTop:'2px' }}>
              <span>0</span><span style={{color:'var(--text-sub)'}}>목표 {r.calGoal.toLocaleString()}kcal</span><span>2,400+</span>
            </div>
            <div style={{ fontSize:'11px', color:'var(--text-mute)', marginTop:'4px' }}>
              ※ 입력된 식사 텍스트 기반 추정값 (내장 DB)이에요. 미기록 식사는 포함되지 않아요.
            </div>
          </div>
        )}

        {/* 기록 충실도 */}
        <div>
          <div style={{ fontSize:'13px', fontWeight:'800', color:'var(--text-sub)', marginBottom:'4px', letterSpacing:'0.5px' }}>📝 기록</div>
          <StatRow icon="📋" label="기록 충실도" value={r.recordRate != null ? `${r.recordRate}%` : null} sub={`${r.last30Len}일 중 ${Math.round((r.recordRate||0)*r.last30Len/100)}일 기록`} />
          <RateBar rate={r.recordRate} color={r.recordRate >= 80 ? 'var(--cn-ok)' : r.recordRate >= 50 ? '#f59e0b' : 'var(--cn-danger)'} />
        </div>
      </div>
    );
  };

  /* ── 대시보드: 홈탭 ── */
  const DashboardHome = ({ data, date, medsConfig, allMedIds }) => {
    const score = useMemo(() => calcHealthScore(data), [data]);
    const insights = useMemo(() => genInsights(data), [data]);
    const DAY_KOR = ['일','월','화','수','목','금','토'];

    // 최근 14일
    const recent14 = useMemo(() => Array.from({length:14},(_,i)=>shiftDate(date,i-13)), [date]);
    const bpSysVals = recent14.map(d => data[d] && data[d].bp && data[d].bp.sys).filter(Boolean);
    const bpDiaVals = recent14.map(d => data[d] && data[d].bp && data[d].bp.dia).filter(Boolean);
    const bsVals = recent14.map(d => {
      const bs = (data[d] && data[d].bs) || {};
      const v = bs.bs_bf_am || bs.bs_af_am || bs.bs_bf_lu || bs.bs_af_lu || bs.bs_bf_di || bs.bs_af_di || bs.bs_bed;
      return v || null;
    }).filter(Boolean);
    const weightVals = recent14.map(d => data[d] && data[d].weight).filter(Boolean);

    const todayData = normalizeDay(data[date]);
    const lastBP = (todayData.bp && todayData.bp.sys)
      ? todayData.bp.sys+'/'+todayData.bp.dia
      : (bpSysVals.length ? bpSysVals[bpSysVals.length-1]+'/'+bpDiaVals[bpDiaVals.length-1] : '---');
    const lastBS = (() => {
      const bs = (todayData.bs) || {};
      return bs.bs_bf_am || bs.bs_af_am || bs.bs_bf_lu || bs.bs_af_lu || bs.bs_bf_di || bs.bs_af_di || bs.bs_bed
        || (bsVals.length ? bsVals[bsVals.length-1] : null);
    })();
    const lastW = todayData.weight || (weightVals.length ? weightVals[weightVals.length-1] : null);

    // 복약 현황
    const medsToday = allMedIds.filter(id => todayData.meds && todayData.meds[id]).length;
    const medsPct = allMedIds.length ? Math.round((medsToday/allMedIds.length)*100) : 0;

    // 혈압 차트 데이터 (최근 14일 중 데이터 있는 날)
    const bpChartData = recent14.map(d => ({
      d, sys: data[d] && data[d].bp && parseInt(data[d].bp.sys)||null,
      dia: data[d] && data[d].bp && parseInt(data[d].bp.dia)||null
    })).filter(x => x.sys);
    const allBpNums = bpChartData.flatMap(x=>[x.sys,x.dia]).filter(Boolean);
    const bpMin2 = allBpNums.length ? Math.min(...allBpNums)-8 : 60;
    const bpMax2 = allBpNums.length ? Math.max(...allBpNums)+8 : 160;
    const bpRange2 = bpMax2 - bpMin2 || 80;
    const CW = 280, CH = 100;
    const bpY = v => CH - ((v-bpMin2)/bpRange2)*CH;

    // 트렌드 뱃지
    const TrendBadge = ({ vals }) => {
      if (!vals || vals.length < 4) return null;
      const r = vals.slice(-3).map(v=>parseFloat(v)||0);
      const p = vals.slice(-6,-3).map(v=>parseFloat(v)||0);
      if (!r.length || !p.length) return null;
      const rA = r.reduce((a,b)=>a+b,0)/r.length;
      const pA = p.reduce((a,b)=>a+b,0)/p.length;
      const diff = rA - pA;
      if (Math.abs(diff) < 1.5) return <span className="dash-trend dash-trend-st">— 안정</span>;
      if (diff > 0) return <span className="dash-trend dash-trend-up">▲ +{Math.round(diff)}</span>;
      return <span className="dash-trend dash-trend-dn">▼ {Math.round(diff)}</span>;
    };

    // 운동 현황 (최근 7일)
    const exDays7 = Array.from({length:7},(_,i)=>shiftDate(date,i-6)).map(d => {
      const ex = data[d] && data[d].exercise;
      return { d, mins: parseInt((ex && ex.mins)||0), type: (ex && ex.type)||'' };
    });
    const maxEx = Math.max(...exDays7.map(x=>x.mins), 1);

    return (
      <div className="cn-card" data-tab="home" style={{ background:'transparent', border:'none', borderRadius:0, padding:0, boxShadow:'none', margin:0 }}>
        {/* 건강 점수 */}
        <div className="dash-score-card">
          <CircleGauge value={score.total}/>
          <div className="dash-score-info">
            <div className="dash-score-title">종합 건강 점수 (14일 평균)</div>
            <div className="dash-score-breakdown">
              {[
                { label:'혈압', val:score.bp,       color:'var(--cn-danger)', w:'30%' },
                { label:'혈당', val:score.glucose,  color:'var(--cn-ok)',     w:'30%' },
                { label:'복약', val:score.meds,     color:'var(--cn-brand)',  w:'25%' },
                { label:'운동', val:score.exercise, color:'var(--cn-warn)',   w:'15%' },
              ].map(row => (
                <div key={row.label} className="dash-score-row">
                  <span style={{fontSize:10,color:'var(--text-sub)',width:28,flexShrink:0}}>{row.label}</span>
                  <div className="dash-score-bar-bg">
                    <div className="dash-score-bar" style={{width:row.val+'%',background:row.color}}/>
                  </div>
                  <span style={{fontSize:10,color:'var(--text-sub)',width:22,textAlign:'right',flexShrink:0}}>{row.val}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* 4 메트릭 카드 */}
        <div className="dash-metric-grid">
          <div className="dash-metric-card">
            <div className="dash-metric-label">혈압</div>
            <div style={{display:'flex',alignItems:'baseline',gap:4}}>
              <span className="dash-metric-val cn-num" style={{fontSize:18,color:bpSysVals.length?bsColor(null):'var(--text-mute)'}}>{lastBP}</span>
              <span className="dash-metric-unit">mmHg</span>
            </div>
            <TrendBadge vals={bpSysVals}/>
            <Sparkline vals={bpSysVals.slice(-10)} color="var(--cn-danger)" h={28}/>
          </div>
          <div className="dash-metric-card">
            <div className="dash-metric-label">혈당 (최근)</div>
            <div style={{display:'flex',alignItems:'baseline',gap:4}}>
              <span className="dash-metric-val cn-num" style={{color:lastBS?bsColor(lastBS):'var(--text-mute)'}}>{lastBS||'---'}</span>
              <span className="dash-metric-unit">mg/dL</span>
            </div>
            {lastBS && <span style={{fontSize:11,color:bsColor(lastBS),fontWeight:700}}>{bsLabel(lastBS)}</span>}
            <Sparkline vals={bsVals.slice(-10)} color="var(--cn-ok)" h={28}/>
          </div>
          <div className="dash-metric-card">
            <div className="dash-metric-label">체중</div>
            <div style={{display:'flex',alignItems:'baseline',gap:4}}>
              <span className="dash-metric-val cn-num">{lastW ? (isNaN(parseFloat(lastW)) ? lastW : String(Math.round(parseFloat(lastW)*100)/100)) : '---'}</span>
              <span className="dash-metric-unit">kg</span>
            </div>
            <TrendBadge vals={weightVals}/>
            <Sparkline vals={weightVals.slice(-10)} color="var(--cn-low)" h={28}/>
          </div>
          <div className="dash-metric-card">
            <div className="dash-metric-label">오늘 복약</div>
            <div style={{display:'flex',alignItems:'baseline',gap:4}}>
              <span className="dash-metric-val cn-num" style={{color:medsPct===100?'var(--cn-ok)':medsPct>0?'var(--cn-brand)':'var(--text-mute)'}}>{medsToday}</span>
              <span className="dash-metric-unit">/ {allMedIds.length}개</span>
            </div>
            <div style={{marginTop:4,background:'var(--card-border)',borderRadius:4,height:5,overflow:'hidden'}}>
              <div style={{width:medsPct+'%',height:'100%',background:medsPct===100?'var(--cn-ok)':'var(--cn-brand)',borderRadius:4,transition:'width 0.5s'}}/>
            </div>
            <span style={{fontSize:11,color:medsPct===100?'var(--cn-ok)':'var(--text-sub)',fontWeight:600,marginTop:2}}>{medsPct===100?'✓ 완료':medsPct+'% 완료'}</span>
          </div>
        </div>

        {/* 혈압 추이 차트 */}
        {bpChartData.length >= 2 && (
          <div className="cn-card" style={{padding:'14px 12px 10px',marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--text-sub)',marginBottom:8}}>💓 혈압 추이 (14일)</div>
            <svg viewBox={'0 0 '+CW+' '+CH} style={{width:'100%',height:CH}} preserveAspectRatio="none">
              {[80,120,140,160].map(v=>(
                <line key={v} x1={0} y1={bpY(v)} x2={CW} y2={bpY(v)} stroke="var(--chart-grid)" strokeWidth={0.7} strokeDasharray="4,3"/>
              ))}
              <rect x={0} y={bpY(130)} width={CW} height={bpY(80)-bpY(130)} fill="rgba(16,185,129,0.06)"/>
              <polyline points={bpChartData.map((x,i)=>((i/(bpChartData.length-1))*CW)+','+bpY(x.sys)).join(' ')}
                fill="none" stroke="var(--cn-danger)" strokeWidth={2} strokeLinejoin="round"/>
              <polyline points={bpChartData.map((x,i)=>((i/(bpChartData.length-1))*CW)+','+bpY(x.dia)).join(' ')}
                fill="none" stroke="var(--cn-brand)" strokeWidth={1.5} strokeLinejoin="round" strokeOpacity={0.6}/>
              {bpChartData.map((x,i)=>(
                <circle key={i} cx={(i/(bpChartData.length-1))*CW} cy={bpY(x.sys)} r={3} fill="var(--cn-danger)"/>
              ))}
            </svg>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
              {[bpChartData[0],bpChartData[Math.floor((bpChartData.length-1)/2)],bpChartData[bpChartData.length-1]].filter(Boolean).map((x,i)=>(
                <span key={i} style={{fontSize:10,color:'var(--chart-axis)'}}>{fmtDate(x.d).short}</span>
              ))}
            </div>
            <div style={{display:'flex',gap:10,marginTop:4,fontSize:10,color:'var(--text-sub)'}}>
              <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:10,height:2,background:'var(--cn-danger)',display:'inline-block',borderRadius:1}}/> 수축기</span>
              <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:10,height:2,background:'var(--cn-brand)',display:'inline-block',borderRadius:1,opacity:0.6}}/> 이완기</span>
            </div>
          </div>
        )}

        {/* 주간 운동 현황 */}
        <div className="cn-card" style={{padding:'14px 14px 10px',marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--text-sub)',marginBottom:10}}>🏃 주간 운동</div>
          <div className="dash-steps-bars">
            {exDays7.map((x,i) => {
              const dt = new Date(x.d+'T12:00:00');
              const ratio = x.mins / maxEx;
              const isGood = x.mins >= 30;
              return (
                <div key={i} className="dash-step-col">
                  {x.mins > 0 && <div style={{fontSize:9,color:'var(--text-sub)',marginBottom:2}}>{x.mins}분</div>}
                  <div className="dash-step-bar" style={{height:Math.max(ratio*44,3)+'px',background:isGood?'var(--cn-ok)':'var(--cn-brand)',opacity:x.mins?1:0.18}}/>
                  <div className="dash-step-day">{DAY_KOR[dt.getDay()]}</div>
                </div>
              );
            })}
          </div>
          {exDays7.every(x=>!x.mins) && <div style={{fontSize:12,color:'var(--text-mute)',textAlign:'center',paddingTop:4}}>운동 기록을 입력하면 추이를 볼 수 있어요</div>}
        </div>

        {/* 오늘 걸음수 */}
        <div className="cn-card" style={{padding:'14px 14px 12px', marginBottom:14}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: todayData.steps ? 8 : 0}}>
            <div style={{fontSize:13, fontWeight:700, color:'var(--text-sub)'}}>👟 오늘 걸음수</div>
            {todayData.steps && Number(todayData.steps) >= 10000 && <span style={{fontSize:11, color:'var(--cn-ok)', fontWeight:700}}>🎉 목표 달성!</span>}
          </div>
          {todayData.steps ? (
            <>
              <div style={{display:'flex', alignItems:'baseline', gap:6, marginBottom:8}}>
                <span style={{fontSize:32, fontWeight:900, color:'var(--cn-brand)', letterSpacing:'-1px', lineHeight:1}}>
                  {Number(todayData.steps).toLocaleString()}
                </span>
                <span style={{fontSize:13, color:'var(--text-sub)', fontWeight:500}}>걸음</span>
                <span style={{fontSize:11, color:'var(--text-mute)', marginLeft:'auto'}}>목표 10,000</span>
              </div>
              <div style={{background:'var(--card-border)', borderRadius:6, height:8, overflow:'hidden'}}>
                <div style={{

        const CHUNK_SIZE = 2 * 1024 * 1024; // 2MB

          setWeightImportMsg('ZIP 압축 해제 중... (잠시 기다려 주세요)');
          if (typeof JSZip === 'undefined') throw new Error('ZIP 라이브러리 로드 실패');
          const zip = await JSZip.loadAsync(file);
          const allFilesW = Object.keys(zip.files);
          const xmlFileW = allFilesW.find(name =>
            /export\.xml$/i.test(name) && !/cda/i.test(name)
          ) || allFilesW.find(name => /\.xml$/i.test(name) && !/cda/i.test(name));

          const xmlBlob = await zip.files[xmlFileW].async('blob');
          totalBytes = xmlBlob.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = xmlBlob.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else if (file.name.endsWith('.xml')) {
          totalBytes = file.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = file.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else {
          throw new Error('.zip 또는 .xml 파일을 선택해 주세요');

      setAndroidImportMsg('파일 처리 중...');
      try {
        const { weightByDay, bodyFatByDay, bpByDay = {} } = await parseSamsungHealthZip(file, (msg) => {
          setAndroidImportMsg(msg);
        });
        const wDays  = Object.keys(weightByDay).length;
        const bfDays = Object.keys(bodyFatByDay).length;
        const bpDays = Object.keys(bpByDay).length;
        if (!wDays && !bfDays && !bpDays) throw new Error('체중·체지방·혈압 데이터를 찾을 수 없어요.\n삼성 헬스에 데이터가 있는지 확인해 주세요.');
        const importedData = buildDashboardData({ glucoseByDay:{}, weightByDay, bodyFatByDay, bpByDay });
        await handleImport(importedData);
        const parts2 = [];
        if (wDays)  parts2.push(`체중 ${wDays}일`);
        if (bfDays) parts2.push(`체지방 ${bfDays}일`);
        if (bpDays) parts2.push(`혈압 ${bpDays}일`);
        setAndroidImportMsg(`✅ ${parts2.join(' · ')} 가져오기 완료!`);
        setTimeout(() => { setAndroidImportMsg(''); setAndroidImporting(false); }, 3000);
      } catch(e) {
        setAndroidImportMsg('❌ ' + (e.message || '가져오기 실패'));
        setTimeout(() => { setAndroidImportMsg(''); setAndroidImporting(false); }, 5000);
      }
      if (androidFileRef.current) androidFileRef.current.value = '';
    };

    /* ── Supabase: 초기 데이터 로드 + URL 파라미터 단축어 연동 ── */
    useEffect(() => {
      // URL 파라미터 읽기 — userId가 비동기로 설정되므로 sessionStorage에 보존
      const params = new URLSearchParams(window.location.search);
      const w      = params.get('w');
      const bf     = params.get('bf');
      const bp     = params.get('bp');     // 혈압 (예: 120/80)
      const steps  = params.get('steps'); // 걸음수
      const cal    = params.get('cal');   // 칼로리 (kcal)
      const dist   = params.get('dist'); // 거리 (km)
      const d  = params.get('d');  // 측정 날짜 (YYYY-MM-DD)
      const freshPatch = {};
      if (w  && !isNaN(parseFloat(w)))  freshPatch.weight  = String(parseFloat(w));
      if (bf && !isNaN(parseFloat(bf))) freshPatch.bodyFat = String(parseFloat(bf));
      if (steps && !isNaN(parseInt(steps)))   freshPatch.steps = String(Math.round(parseFloat(steps)));
      if (cal   && !isNaN(parseFloat(cal)))   freshPatch.cal   = String(Math.round(parseFloat(cal)));
      if (dist  && !isNaN(parseFloat(dist)))  freshPatch.dist  = String(Math.round(parseFloat(dist)*100)/100);
      if (bp) {
        const bpMatch = bp.match(/^(\d{1,3}(?:\.\d+)?)[\/\s](\d{1,3}(?:\.\d+)?)$/);
        if (bpMatch) freshPatch.bp = { sys: String(Math.round(parseFloat(bpMatch[1]))), dia: String(Math.round(parseFloat(bpMatch[2]))) };
      }
      const freshTarget = (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) ? d : todayStr();
      if (Object.keys(freshPatch).length) {
        // ① sessionStorage: 현재 세션용 보존 (userId 로드 전에 URL 사라져도 유지)
        sessionStorage.setItem('cn_url_patch', JSON.stringify({ patch: freshPatch, targetDate: freshTarget }));
        // ② localStorage: PWA/Safari 컨텍스트 분리 대응 — auth 없어도 즉시 로컬 반영
        try {
          const lc = JSON.parse(localStorage.getItem('dm_dash_v2') || '{}');
          const lcData = lc.data || {};
          const existing = lcData[freshTarget] || {};
          // bp는 병합, 나머지는 덮어쓰기
          const merged = { ...existing, ...freshPatch };
          if (freshPatch.bp && existing.bp) merged.bp = { ...existing.bp, ...freshPatch.bp };
          lcData[freshTarget] = merged;
          lc.data = lcData;
          localStorage.setItem('dm_dash_v2', JSON.stringify(lc));
          // 별도 "pending" 키에도 저장 — 나중에 Supabase 동기화 대기용
          localStorage.setItem('cn_pending_patch', JSON.stringify({ patch: freshPatch, targetDate: freshTarget, ts: Date.now() }));
        } catch {}
        window.history.replaceState({}, '', window.location.pathname);
        if (freshTarget !== todayStr()) setDate(freshTarget);
      }
      // sessionStorage에서 보존된 패치 꺼내기 (재실행 시에도 유효)
      let urlPatch = {}, targetDate = todayStr();
      try {
        const saved = sessionStorage.getItem('cn_url_patch');
        if (saved) { const p = JSON.parse(saved); urlPatch = p.patch; targetDate = p.targetDate; }
      } catch {}


      const load = async () => {
        setSyncing(true);
        try {
          // 1차: 현재 Supabase 로그인 계정(authUser.id)으로 조회
          const { data: rows, error } = await supa
            .from('diabetes_data')
            .select('date, payload')
            .eq('user_id', userId);
          if (error) throw error;
          const loaded = {};
          (rows || []).forEach(r => { if (r.date !== '_user_settings_') loaded[r.date] = r.payload; });

          // 2차 폴백: 데이터가 없고, 예전 UUID가 있으면 그걸로도 조회
          // (dm_user_id localStorage 키 또는 cn_legacy_uid 저장 키 모두 시도)
          if (Object.keys(loaded).length === 0) {
            const legacyId = localStorage.getItem('dm_user_id') || localStorage.getItem('cn_legacy_uid');
            if (legacyId && legacyId !== userId) {
              const { data: legacyRows } = await supa
                .from('diabetes_data')
                .select('date, payload')
                .eq('user_id', legacyId);
              (legacyRows || []).forEach(r => { if (r.date !== '_user_settings_') loaded[r.date] = r.payload; });
            }
          }

          // ✅ 로컬 캐시와 필드 단위 병합
          // - Supabase에 없는 날짜: 캐시 전체 사용
          // - Supabase에 있는 날짜: weight/bodyFat이 비어있으면 캐시에서 보완
          //   (건강앱 가져오기 후 saveAllToSupabase가 부분 실패해도 데이터 보존)
          try {
            const cached = JSON.parse(localStorage.getItem('dm_dash_v2') || '{}').data || {};
            Object.keys(cached).forEach(d => {
              if (!loaded[d]) {
                loaded[d] = cached[d];                   // 날짜 자체가 없으면 캐시로
              } else {
                const sb = loaded[d], lc = cached[d];
                // weight / bodyFat 이 Supabase에 없는 경우만 캐시에서 보완
                if (!sb.weight  && lc?.weight)  loaded[d] = { ...sb, weight:  lc.weight  };
                if (!sb.bodyFat && lc?.bodyFat) loaded[d] = { ...loaded[d], bodyFat: lc.bodyFat };
              }
            });
          } catch {}

          // ✅ 건강앱 가져오기 전용 캐시도 항상 병합 (Supabase 동기화 실패 후 새로고침 시 복구)
          try {
            const imported = JSON.parse(localStorage.getItem('dm_imported') || '{}');
            Object.keys(imported).forEach(d => {
              if (!loaded[d]) {
                loaded[d] = imported[d];
              } else {
                if (!loaded[d].weight  && imported[d]?.weight)  loaded[d] = { ...loaded[d], weight:  imported[d].weight  };
                if (!loaded[d].bodyFat && imported[d]?.bodyFat) loaded[d] = { ...loaded[d], bodyFat: imported[d].bodyFat };
                // 혈압도 복구
                if (!(loaded[d].bp?.sys && loaded[d].bp?.dia) && imported[d]?.bp?.sys)
                  loaded[d] = { ...loaded[d], bp: imported[d].bp };
              }
            });
          } catch {}

          // ── pending patch (localStorage 경유 — Safari→PWA 크로스 컨텍스트) 처리
          try {
            const pending = JSON.parse(localStorage.getItem('cn_pending_patch') || 'null');
            // 24시간 이내 패치만 적용
            if (pending && pending.patch && (Date.now() - (pending.ts||0)) < 86400000) {
              const pd = pending.targetDate || todayStr();
              loaded[pd] = { ...(loaded[pd] || emptyDay()), ...pending.patch };
              // Supabase에도 저장
              try {
                await supa.from('diabetes_data').upsert(
                  { user_id: userId, date: pd, payload: loaded[pd], updated_at: new Date().toISOString() },
                  { onConflict: 'user_id,date' }
                );
              } catch {}
              localStorage.removeItem('cn_pending_patch');
              localStorage.setItem('dm_dash_v2', JSON.stringify({ data: loaded }));
            }
          } catch {}

          if (Object.keys(urlPatch).length) {
            loaded[targetDate] = { ...(loaded[targetDate] || emptyDay()), ...urlPatch };
            sessionStorage.removeItem('cn_url_patch'); // 적용 완료 후 제거
            // URL 파라미터 입력 시 즉시 Supabase 저장 (iOS 백그라운드 전환 전에 완료)
            setSaveStatus('saving');
            try {
              await supa.from('diabetes_data').upsert(
                { user_id: userId, date: targetDate, payload: loaded[targetDate], updated_at: new Date().toISOString() },
                { onConflict: 'user_id,date' }
              );
              localStorage.setItem('dm_dash_v2', JSON.stringify({ data: loaded }));
              setSaveStatus('saved'); setTimeout(() => setSaveStatus('idle'), 3000);
            } catch(saveErr) {
              // 실패해도 로컬캐시에는 남아있음
              localStorage.setItem('dm_dash_v2', JSON.stringify({ data: loaded }));
              setSaveStatus('idle');
            }
          }
          setData(normalizeData(loaded));
        } catch(e) {
          try {
            const s = localStorage.getItem('dm_dash_v2');
            const loaded = s ? (JSON.parse(s).data || {}) : {};
            if (Object.keys(urlPatch).length) {
              loaded[targetDate] = { ...(loaded[targetDate] || emptyDay()), ...urlPatch };
              sessionStorage.removeItem('cn_url_patch');
            }
            setData(normalizeData(loaded));
          } catch(e2) {}
        }
        setSyncing(false);
      };
      if (userId) load();
    }, [userId, refreshKey]);

    /* ── Supabase: 현재 날짜 데이터 저장 (디바운스 1.5초) ── */
    useEffect(() => {
      if (syncing || !data[date]) return;
      // localStorage 캐시 업데이트
      localStorage.setItem('dm_dash_v2', JSON.stringify({ data, lastImport }));
      // Supabase 저장
      if (saveTimer.current) clearTimeout(saveTimer.current);
      setSaveStatus('saving');
      saveTimer.current = setTimeout(async () => {
        try {
          const { error } = await supa.from('diabetes_data').upsert(
            { user_id: userId, date, payload: data[date], updated_at: new Date().toISOString() },
            { onConflict: 'user_id,date' }
          );
          if (error) throw error;
          setSaveStatus('saved');
          setTimeout(() => setSaveStatus('idle'), 2000);
        } catch(e) {
          setSaveStatus('error');
          setTimeout(() => setSaveStatus('idle'), 3000);
        }
      }, 1500);
    }, [data, date, loading]);

    /* ── Supabase: 가져오기 후 여러 날 일괄 저장 ── */
    const saveAllToSupabase = async (newData) => {
      if (!userId) return;
      try {
        const rows = Object.entries(newData).map(([d, payload]) => ({
          user_id: userId, date: d, payload, updated_at: new Date().toISOString()
        }));
        if (!rows.length) return;
        // 50개씩 나눠서 upsert (Supabase 대용량 배치 실패 방지)
        const CHUNK = 50;
        for (let i = 0; i < rows.length; i += CHUNK) {
          await supa.from('diabetes_data').upsert(rows.slice(i, i + CHUNK), { onConflict: 'user_id,date' });
        }
      } catch(e) { console.error('일괄 저장 오류:', e); }
    };

    const day = useMemo(() => normalizeDay(data[date]), [data, date]);
    const upDay = (patch) => setData(prev => ({ ...prev, [date]: { ...(prev[date] || emptyDay()), ...patch } }));
    const togMed  = (id) => upDay({ meds: { ...day.meds, [id]: !day.meds[id] } });
    const updBS   = (id, v) => upDay({ bs: { ...day.bs, [id]: v } });
    const updBP   = (k, v) => upDay({ bp: { ...(day.bp||{sys:'',dia:''}), [k]: v } });
    const updMeal = (id, v) => upDay({ meals: { ...day.meals, [id]: v } });
    const updEx       = (k, v) => upDay({ exercise: { ...(day.exercise||{}), [k]: v } });
    const addExLog    = (type='') => { const logs = [...(day.exercise?.logs||[]), {type, mins:''}]; upDay({ exercise: {...(day.exercise||{}), logs} }); };
    const updateExLog = (i,k,v)  => { const logs = (day.exercise?.logs||[]).map((l,idx)=>idx===i?{...l,[k]:v}:l); upDay({ exercise: {...(day.exercise||{}), logs} }); };
    const removeExLog = (i)      => { const logs = (day.exercise?.logs||[]).filter((_,idx)=>idx!==i); upDay({ exercise: {...(day.exercise||{}), logs} }); };

    /* 가져오기: 기존 수동 입력 유지, 빈 슬롯만 채움 */
    const handleImport = async (importedData) => {
      // data 클로저를 직접 사용해 merged를 동기적으로 계산 (setState 콜백 의존 X)
      const next = { ...data };
      const merged = {};
      Object.entries(importedData).forEach(([d, imported]) => {
        if (!next[d]) { next[d] = imported; }
        else {
          const ex = next[d];
          next[d] = {
            ...ex,
            bs: { ...imported.bs, ...ex.bs },
            weight:  ex.weight  || imported.weight  || '',
            bodyFat: ex.bodyFat || imported.bodyFat || '',
            bp: (ex.bp?.sys && ex.bp?.dia) ? ex.bp : (imported.bp || ex.bp || {sys:'',dia:''})
          };
        }
        merged[d] = next[d];
      });
      setData(next);
      // ✅ 즉시 dm_dash_v2 저장 (save effect의 data[date] 조건 우회)
      try {
        localStorage.setItem('dm_dash_v2', JSON.stringify({ data: next, lastImport: new Date().toLocaleString('ko-KR') }));
      } catch {}
      // ✅ 가져온 데이터를 전용 키에 별도 저장 — 새로고침 후에도 복구 가능
      try {
        const existing = JSON.parse(localStorage.getItem('dm_imported') || '{}');
        const updated  = { ...existing };
        Object.entries(importedData).forEach(([d, imp]) => {
          if (!updated[d]) { updated[d] = imp; }
          else {
            updated[d] = {
              ...updated[d],
              weight:  updated[d].weight  || imp.weight  || '',
              bodyFat: updated[d].bodyFat || imp.bodyFat || '',
              bp: (updated[d].bp?.sys && updated[d].bp?.dia) ? updated[d].bp : (imp.bp || updated[d].bp),
            };
          }
        });
        localStorage.setItem('dm_imported', JSON.stringify(updated));
      } catch {}
      setLastImport(new Date().toLocaleString('ko-KR'));
      await saveAllToSupabase(merged);
    };

    /* medsConfig 저장 */
    // 복약 설정: Supabase(_user_settings_ row) → localStorage 순으로 로드
    // Supabase에 저장하므로 기기/브라우저 바뀌어도 복구됨
    useEffect(() => {
      if (!userId) { setMedsReadyFor(''); return; }
      (async () => {
        try {
          const { data: row } = await supa.from('diabetes_data')
            .select('payload').eq('user_id', userId).eq('date', '_user_settings_')
            .maybeSingle();
          const fromSB = row?.payload?.medsConfig;
          // 각 슬롯의 items가 반드시 배열이 되도록 정규화
          const normMeds = (arr) => Array.isArray(arr)
            ? arr.map(s => ({ ...s, items: Array.isArray(s.items) ? s.items : [] }))
            : [];
          if (fromSB && Array.isArray(fromSB)) {
            // Supabase 우선 — localStorage도 동기화
            setMedsConfig(normMeds(fromSB));
            localStorage.setItem(`hcd_meds_config_${userId}`, JSON.stringify(fromSB));
          } else {
            // localStorage 폴백
