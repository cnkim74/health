  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    /* м ңлӘ©мҡ© Gmarket Sans (ліёл¬ёмқҖ Pretendard) */
    @font-face { font-family:'GmarketSans'; font-weight:700; font-display:swap;
      src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff'); }
    @font-face { font-family:'GmarketSans'; font-weight:500; font-display:swap;
      src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff'); }
    :root {
      --font-title: 'GmarketSans', 'Pretendard', -apple-system, sans-serif;
      /* CARENOTE Design Tokens v2.0 */
      --cn-brand:        #2F6BFF;
      --cn-brand-600:    #1F4FD9;
      --cn-brand-100:    #EAF1FF;
      --cn-ink:          #0B1B3B;
      --cn-ok:           #10B981;
      --cn-ok-100:       #E6FAF4;
      --cn-warn:         #F59E0B;
      --cn-warn-100:     #FFF7E0;
      --cn-danger:       #EF4444;
      --cn-danger-100:   #FFECEC;
      --cn-low:          #8B5CF6;
      --cn-low-100:      #F3EDFF;
      --bg:              #F4F6FB;
      --bg-soft:         #ECF0F8;
      --card-bg:         #FFFFFF;
      --card-border:     #E5EAF2;
      --card-shadow:     0 1px 2px rgba(11,27,59,0.04), 0 4px 16px rgba(11,27,59,0.05);
      --text:            #0B1B3B;
      --text-sub:        #5B6B85;
      --text-mute:       #8C98AD;
      --input-bg:        var(--input-bg);
      --input-border:    #E5EAF2;
      --divider:         #EEF1F6;
      --chart-grid:      rgba(11,27,59,0.08);
      --chart-axis:      #8C98AD;
      --modal-scrim:     rgba(11,27,59,0.55);
      --font-num: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    }
    body.dark {
      --cn-brand:        #5B8CFF;
      --cn-brand-600:    #3A6FE8;
      --cn-brand-100:    #12244A;
      --cn-ink:          #E8EEF9;
      --cn-ok:           #34D399;
      --cn-ok-100:       #06281D;
      --cn-warn:         #FBBF24;
      --cn-warn-100:     #2A1F00;
      --cn-danger:       #FB7185;
      --cn-danger-100:   #2A0B10;
      --cn-low:          #A78BFA;
      --cn-low-100:      var(--cn-low-100);
      --bg:              #000000;
      --bg-soft:         #050507;
      --card-bg:         #0A0A0F;
      --card-border:     #1C1F28;
      --card-shadow:     0 1px 2px rgba(0,0,0,0.6), 0 6px 20px rgba(0,0,0,0.5);
      --text:            #F2F5FA;
      --text-sub:        #A0ABC0;
      --text-mute:       #6B7689;
      --input-bg:        #0D0F15;
      --input-border:    #1C1F28;
      --divider:         #161923;
      --chart-grid:      rgba(255,255,255,0.06);
      --chart-axis:      #6B7689;
      --modal-scrim:     rgba(0,0,0,0.82);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { margin: 0; padding: 0; overflow-x: clip; max-width: 100%; overscroll-behavior-y: none; }
    body {
      margin: 0; padding: 0;
      overflow-x: hidden;
      overscroll-behavior-y: none;      /* iOS кі л¬ҙмӨ„ л°”мҡҙмҠӨ л°©м§Җ */
      touch-action: pan-y;              /* м„ёлЎң мҠӨнҒ¬лЎӨл§Ң н—Ҳмҡ© вҖ” мўҢмҡ° мқҙлҸҷВ·лҚ”лё”нғӯ мӨҢ м°ЁлӢЁ */
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      max-width: 100%;
      width: 100%;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      word-break: keep-all;
      transition: background 0.25s, color 0.25s;
    }
    h1, h2, h3, .cn-section-title, .cn-card-title { font-family: var(--font-title); letter-spacing: -0.2px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
    input, textarea, select { font-family: inherit; font-size: inherit; }
    button { font-family: inherit; }
    .med-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--cn-brand); flex-shrink: 0; }
    .chart-wrap { position: relative; height: 200px; }
    .cn-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      margin-bottom: 18px;
      transition: background 0.25s, border-color 0.25s;
    }
    .cn-divider { border-color: var(--divider); }

    /* в”Җв”Җ лӢӨнҒ¬лӘЁл“ң нҸ¬кҙ„ мҳӨлІ„лқјмқҙл“ң в”Җв”Җ */
    body.dark input,
    body.dark textarea,
    body.dark select {
      background: var(--input-bg) !important;
      color: var(--text) !important;
      border-color: var(--input-border) !important;
      color-scheme: dark;
    }
    body.dark input::placeholder,
    body.dark textarea::placeholder { color: var(--text-sub) !important; opacity: 1 !important; }

    /* в”Җв”Җ нҳҲм•• мҲ«мһҗ мһ…л Ҙ вҖ” iOS Safari лё”лһҷ л°°кІҪ л°©м§Җ в”Җв”Җ */
    .bp-num-input {
      background: transparent !important;
      -webkit-appearance: none;
      appearance: none;
      color-scheme: inherit;
    }
    body:not(.dark) .bp-num-input {
      background: transparent !important;
      color-scheme: light;
    }
    body.dark .bp-num-input {
      background: transparent !important;
      color-scheme: dark;
    }

    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr !important; } }

    /* нҳҲлӢ№ мһ…л Ҙ мҠӨн”јл„Ҳ м ңкұ° (мҲ«мһҗмҷҖ лӢЁмң„ кІ№м№Ё л°©м§Җ) */
    .bs-num-input::-webkit-inner-spin-button,
    .bs-num-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .bs-num-input { -moz-appearance: textfield; }
  .cn-num, .cn-num * { font-family: var(--font-num) !important; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }

  /* в”Җв”Җ Tab Navigation System в”Җв”Җ */
  /* кё°ліё: лӘЁл°”мқјм—җм„ң лӘЁл“  CardлҠ” мҲЁк№Җ. data-current-tabкіј л§Өм№ҳлҗҳлҠ” кІғл§Ң н‘ңмӢң */
  @media (max-width: 1023px) {
    body[data-current-tab] .cn-card[data-tab]:not([data-tab=""]) { display: none; }
    /* !important н•„мҲҳ: :not() л•Ңл¬ём—җ мҲЁкё°лҠ” к·ңм№ҷмқҳ CSS нҠ№мқҙм„ұмқҙ лҚ” лҶ’м•„м„ң лҚ®м–ҙм”ҢмӣҢм§җ л°©м§Җ */
    body[data-current-tab="home"]      .cn-card[data-tab="home"]      { display: block !important; }
    body[data-current-tab="record"]    .cn-card[data-tab="record"]    { display: block !important; }
    body[data-current-tab="report"]    .cn-card[data-tab="report"]    { display: block !important; }
    body[data-current-tab="challenge"] .cn-card[data-tab="challenge"] { display: block !important; }
    body[data-current-tab="profile"]   .cn-card[data-tab="profile"]   { display: block !important; }
    /* лӘЁл°”мқјм—җм„ң RIGHT м»¬лҹјмқҙ лі„лҸ„ ліҙмқҙм§Җ м•ҠлҸ„лЎқ к·ёлҰ¬л“ң лӢЁмқјм»¬лҹј */
    .main-grid { grid-template-columns: 1fr !important; gap: 12px !important; }
    /* лӮ м§ң мқҙлҸҷмқҖ кё°лЎқ нғӯм—җм„ңл§Ң мқҳлҜёмһҲкІҢ ліҙмқҙкІҢ, лӢӨлҘё нғӯм—җм„  м „м—ӯ н‘ңмӢң мң м§Җ OK */
  }
  .cn-tab-only-mobile { display: block; }
  @media (min-width: 1024px) { .cn-tab-only-mobile { display: none; } }
  .cn-tabbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card-bg);
    border-top: 1px solid var(--card-border);
    display: grid; grid-template-columns: repeat(5, 1fr);
    z-index: 100; padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    box-shadow: 0 -2px 14px rgba(0,0,0,0.10);
    overflow: visible;
  }
  .cn-tab-btn {
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 8px 2px; color: var(--text-mute);
    font-size: 13px; font-weight: 700; font-family: inherit;
    transition: color 0.15s ease;
  }
  .cn-tab-btn svg { width: 28px; height: 28px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .cn-tab-btn.active { color: var(--cn-brand); }
  .cn-tab-btn:hover { color: var(--text); }
  .cn-tab-btn.active:hover { color: var(--cn-brand); }
  /* мӨ‘м•ҷ 'кё°лЎқ' лІ„нҠј вҖ” нҒ¬кі  лҸ„л“ңлқјм§ҖкІҢ (м–ҙлҘҙмӢ  м ‘к·јм„ұ) */
  .cn-tab-center { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
  .cn-tab-center-btn {
    position: absolute; left: 50%; top: -26px; transform: translateX(-50%);
    width: 68px; height: 68px; border-radius: 50%;
    background: linear-gradient(135deg, var(--cn-brand), var(--cn-brand-600));
    border: 5px solid var(--card-bg);
    box-shadow: 0 6px 18px rgba(47,107,255,0.5);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
    transition: transform 0.15s ease;
  }
  .cn-tab-center-btn:active { transform: translateX(-50%) scale(0.94); }
  .cn-tab-center-btn svg { width: 34px; height: 34px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .cn-tab-center-label { font-size: 13px; font-weight: 800; color: var(--cn-brand); margin-top: 46px; white-space: nowrap; }
  body.has-tabbar { padding-bottom: calc(76px + env(safe-area-inset-bottom, 0px)); }
  /* лҚ°мҠӨнҒ¬нҶұм—җм„ңлҠ” нғӯл°” мҲЁкё°кі  кё°мЎҙ л Ҳмқҙм•„мӣғ мң м§Җ */
  @media (min-width: 1024px) {
    .cn-tabbar { display: none; }
    body.has-tabbar { padding-bottom: 0; }
    .cn-tab-content { display: block !important; }
    .main-grid { display: grid !important; }
    /* лҚ°мҠӨнҒ¬нғ‘ м „мҡ© мӮ¬мқҙл“ңл°” лҰ¬нҸ¬нҠё */
    .cn-sidebar-report { display: block !important; }
    /* лҰ¬нҸ¬нҠё нғӯ м№ҙл“ңлҠ” лҚ°мҠӨнҒ¬нғ‘м—җм„ң мӮ¬мқҙл“ңл°”лЎң лҢҖмІҙ вҶ’ мҲЁк№Җ */
    .cn-report-tab-only { display: none !important; }
  }
  @media (max-width: 1023px) {
    /* лӘЁл°”мқјм—җм„ң мӮ¬мқҙл“ңл°” лҰ¬нҸ¬нҠё мҲЁк№Җ (нғӯмңјлЎң ліҙмһ„) */
    .cn-sidebar-report { display: none !important; }
    .cn-report-tab-only { display: block; }
    /* лӘЁл°”мқјм—җм„ң sticky н•ҙм ң */
    .cn-sidebar-right { position: static !important; max-height: none !important; overflow-y: visible !important; }
  }
  /* мӮ¬мқҙл“ңл°” лҰ¬нҸ¬нҠё */
  .cn-sidebar-report { display: block; }
  .cn-sidebar-right { display: block; }
  /* н—ӨлҚ” лӮ м§ң: кё°ліё(лҚ°мҠӨнҒ¬нғ‘)мқҖ м „мІҙ нҳ•мӢқ, лӘЁл°”мқјмқҖ м—°лҸ„ мғқлһөнҳ• */
  .cn-hdr-date-md { display: none; }
  @media (max-width: 1023px) {
    .main-grid { grid-template-columns: 1fr !important; gap: 10px !important; }
    .main-grid > * { min-width: 0 !important; }
    /* н—ӨлҚ”: лӘЁл°”мқјм—җм„ң л¶Ҳн•„мҡ”н•ң мҡ”мҶҢ мҲЁк№Җ */
    .cn-hdr-user    { display: none !important; }
    .cn-hdr-dark    { display: none !important; }
    .cn-hdr-sub     { display: none !important; }
    .cn-hdr-actions { display: none !important; }
    .cn-hdr-logo    { width: 40px !important; height: 40px !important; }
    .cn-hdr-logo svg { width: 40px !important; height: 40px !important; }
    .cn-hdr-title   { font-size: 22px !important; letter-spacing: 0.5px !important; }
    /* лӘЁл°”мқј: лӮ м§ңлҠ” м—°лҸ„ мғқлһөнҳ•мңјлЎң */
    .cn-hdr-date-full { display: none !important; }
    .cn-hdr-date-md   { display: inline !important; }
    /* лӘЁл°”мқј мўҢмҡ° м—¬л°ұ вҖ” vw кё°л°ҳмңјлЎң нҷ”л©ҙ нҒ¬кё°м—җ л№„лЎҖ (3vw = 390pxм—җм„ң м•Ҫ 12px) */
    .cn-main-pad    { padding: 10px 4vw !important; width: 100% !important; box-sizing: border-box !important; }
    .cn-card        { padding: 18px 4vw !important; border-radius: 16px !important; margin-bottom: 14px !important; min-width: 0 !important; width: 100% !important; box-sizing: border-box !important; }
    /* нғӯл°” лҶ’мқҙ л°Ҹ safe-area */
    .cn-tabbar {
      padding-bottom: env(safe-area-inset-bottom, 0px);
      height: auto;
    }
  }
  .cn-challenge-card {
    background: linear-gradient(135deg, var(--cn-brand-100), var(--card-bg));
    border: 1px solid var(--cn-brand);
    border-radius: 12px; padding: 10px 14px; margin-bottom: 8px;
  }
  /* л°°м§Җ м ңкұ°лҗЁ */
  .cn-streak-big { font-family: var(--font-num); font-size: 34px; font-weight: 700; color: var(--cn-brand); line-height: 1; letter-spacing: -0.02em; }
  /* л°°м§Җ CSS м ңкұ°лҗЁ */

  /* в”Җв”Җ лҢҖмӢңліҙл“ң нҷҲнғӯ м¶”к°Җ мҠӨнғҖмқј в”Җв”Җ */
  .dash-score-card { background: linear-gradient(135deg, var(--card-bg) 0%, var(--bg-soft) 100%); border: 1px solid var(--card-border); border-radius: 16px; padding: 18px; margin-bottom: 14px; display: flex; align-items: center; gap: 18px; box-shadow: var(--card-shadow); }
  .dash-score-info { flex: 1; }
  .dash-score-title { font-family: var(--font-title); font-size: 15px; font-weight: 700; color: var(--text-sub); margin-bottom: 4px; letter-spacing: -0.2px; }
  .dash-score-breakdown { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
  .dash-score-row { display: flex; align-items: center; gap: 6px; }
  .dash-score-bar-bg { flex: 1; height: 5px; background: var(--bg-soft); border-radius: 3px; border: 1px solid var(--card-border); overflow: hidden; }
  .dash-score-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .dash-metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .dash-metric-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 18px; padding: 18px 14px; box-shadow: var(--card-shadow); display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; }
  .dash-metric-head { display: flex; flex-direction: column; align-items: center; gap: 7px; margin-bottom: 2px; }
  .dash-metric-emoji { font-size: 30px; line-height: 1; }
  /* 3D м•„мқҙмҪҳ м№© вҖ” нҒ¬кІҢ, м•Ҳ мһҳлҰ¬кІҢ (л°қмқҖ л°°кІҪмқҙлқј лқјмқҙнҠё/лӢӨнҒ¬ лӘЁл‘җ мһҗм—°мҠӨлҹҪкІҢ) */
  .dash-ic-chip { width: 56px; height: 56px; border-radius: 16px; background: radial-gradient(circle at 50% 38%, #ffffff 0%, #eef2f8 92%); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 1px 4px rgba(11,27,59,0.10); }
  .dash-ic-chip img { width: 48px; height: 48px; object-fit: contain; }
  /* м„№м…ҳ м ңлӘ©мҡ© нҒ° м•„мқҙмҪҳ м№© */
  .stitle-chip { width: 46px; height: 46px; border-radius: 14px; background: radial-gradient(circle at 50% 38%, #ffffff 0%, #eef2f8 92%); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 1px 4px rgba(11,27,59,0.10); }
  .stitle-chip img { width: 40px; height: 40px; object-fit: contain; }
  /* мҶҢм ңлӘ© лҜёлӢҲ м•„мқҙмҪҳ м№© */
  .mini-ic-chip { width: 36px; height: 36px; border-radius: 11px; background: radial-gradient(circle at 50% 38%, #ffffff 0%, #eef2f8 92%); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 1px 3px rgba(11,27,59,0.08); }
  .mini-ic-chip img { width: 30px; height: 30px; object-fit: contain; }
  .dash-metric-label { font-size: 14px; font-weight: 800; color: var(--text-sub); }
  .dash-metric-val { font-size: 30px; font-weight: 900; line-height: 1.05; letter-spacing: -0.5px; }
  .dash-metric-unit { font-size: 13px; color: var(--text-mute); font-weight: 600; }
  .dash-trend { display: inline-flex; align-items: center; gap: 2px; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
  .dash-trend-up { background: rgba(239,68,68,0.12); color: var(--cn-danger); }
  .dash-trend-dn { background: rgba(16,185,129,0.12); color: var(--cn-ok); }
  .dash-trend-st { background: var(--cn-brand-100); color: var(--cn-brand); }
  .dash-insight-card { background: linear-gradient(135deg, var(--cn-brand-100), var(--bg-soft)); border: 1px solid var(--cn-brand); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }

  const localFoodEstimate = (mealText) => {
    const rawLines = mealText.split(/[\n]+/).map(s => s.trim()).filter(Boolean)
      .filter(s => !/kcal|м№јлЎңлҰ¬|нғ„мҲҳнҷ”л¬ј|лӢЁл°ұм§Ҳ|м§Җл°©|нҳҲлӢ№|м Ғн•©|к°ңм„ |мҙқ\s*мҳҒм–‘|мқҢмӢқ\s*лӘ©лЎқ|Powered/i.test(s))
      .filter(s => !/^[-вҖўрҹҚҪрҹ“Ҡрҹ©ёвң…рҹ’Ўвҡ пёҸвҖ»]/.test(s));
    // мүјн‘ңВ·мҠ¬лһҳмӢңлЎң л¶„лҰ¬ нӣ„ лӮЁмқҖ нҶ нҒ°
    const items = rawLines.flatMap(s => s.split(/[,\/]+/).map(x => x.trim()).filter(Boolean));
    const results = [];
    let totalCal = 0;

    items.forEach(item => {
      // мҲҳлҹү нҢҢмӢұ (мҳҲ: "л°Ҙ 2кіөкё°" вҶ’ л°Ҙ Г— 2)
      const qMatch = item.match(/(\d+(?:\.\d+)?)\s*(кіөкё°|к°ң|к·ёлҰҮ|лҙү|м ‘мӢң|мһ”|м»ө|мЎ°к°Ғ|мқёл¶„)/);
      const qty = qMatch ? parseFloat(qMatch[1]) : 1;

      let matched = null, matchedName = '';
      for (const [name, cal] of Object.entries(FOOD_DB)) {
        if (item.includes(name)) {
          if (!matched || name.length > matchedName.length) { matched = cal; matchedName = name; }
        }
      }
      const cal = matched ? Math.round(matched * qty) : null;
      if (cal !== null) {
        results.push({ name: item, cal });
        totalCal += cal;
      } else {
        results.push({ name: item, cal: null });
      }
    });

    const knownItems = results.filter(r => r.cal !== null);
    const unknownItems = results.filter(r => r.cal === null);

    if (knownItems.length === 0) return null; // м•„лҠ” кІҢ м—Ҷмңјл©ҙ AIлЎң fallback

    let out = `рҹҚҪпёҸ мқҢмӢқлі„ м№јлЎңлҰ¬ (лӮҙмһҘ DB кё°мӨҖ)\n`;
    knownItems.forEach(r => { out += `- ${r.name}: м•Ҫ ${r.cal} kcal\n`; });
    if (unknownItems.length > 0) out += `- ${unknownItems.map(r=>r.name).join(', ')}: м •ліҙ м—ҶмқҢ\n`;
    out += `\nрҹ“Ҡ м¶”м • н•©кі„\nм№јлЎңлҰ¬: м•Ҫ ${totalCal} kcal\n`;
    out += `\nвҡ пёҸ AI л¶„м„қ л¶Ҳк°Җ мғҒнғңлЎң лӮҙмһҘ DBлҘј мӮ¬мҡ©н–Ҳм–ҙмҡ”. нғ„мҲҳнҷ”л¬јВ·лӢЁл°ұм§Ҳ л“ұ мғҒм„ё м •ліҙлҠ” AI л¶„м„қ мӢң м ңкіөлҗ©лӢҲлӢӨ.`;
    if (unknownItems.length > 0) out += `\nлҜёмқёмӢқ н•ӯлӘ©(${unknownItems.map(r=>r.name).join(', ')})мқҖ нҸ¬н•Ёлҗҳм§Җ м•Ҡм•ҳм–ҙмҡ”.`;
    return out;
  };

  const APP_BUILD = 'v8 В· 07-19 (oauth-diag)'; // л№Ңл“ң нҷ•мқёмҡ© н‘ңмӢқ вҖ” нҷ”л©ҙм—җ мқҙ л¬ёкө¬к°Җ ліҙмқҙл©ҙ мөңмӢ  мҪ”л“ң
  const supa = supabase.createClient(SUPA_URL, SUPA_KEY, _isNativeApp ? {
    auth: {
      lock: (_name, _timeout, fn) => fn(),
      detectSessionInUrl: false
    }
  } : undefined);

  /* в”Җв”Җ eм•ҪмқҖмҡ” мқҳм•Ҫн’Ҳ м •ліҙ API в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
  const DRUG_API_KEY = '12c113eddc12643698f9d49c82bc7ac526c33cc339906c4964299ef4b258ff9d';
  const fetchDrugInfo = async (name) => {
    const trySearch = async (query) => {
      const url = `https://apis.data.go.kr/1471000/DrbEasyDrugInfoService/getDrbEasyDrugList`
        + `?serviceKey=${encodeURIComponent(DRUG_API_KEY)}`
        + `&itemName=${encodeURIComponent(query)}&type=json&numOfRows=5&pageNo=1`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('API м„ңлІ„ мҳӨлҘҳ');
      const json = await res.json();
      const raw = json?.body?.items?.item;
      if (!raw) return null;
      return Array.isArray(raw) ? raw[0] : raw;
    };

    // 1м°Ё: м „мІҙ мқҙлҰ„мңјлЎң кІҖмғү
    let result = await trySearch(name);
    if (result) return result;

    // 2м°Ё: л’ӨмӘҪ м ңнҳ•В·мҡ©лҹү м ‘лҜём–ҙ м ңкұ° нӣ„ мһ¬кІҖмғү
    const stripped = name
      .replace(/\s*(мҶ”лЎңмҠӨнғҖ|м—җмқҙм·Ём•Ңм •|м—җм№ҳм•Ңм •|мқҙм•Ңм •|м„ңл°©нҳ•мәЎмҠҗ|м„ңл°©м •|м—°м§ҲмәЎмҠҗ|мәЎмҠҗ|м •[0-9]*|мЈјмӮ¬|мЈј\s*\d*лӢЁмң„|мЈј\b).*$/i, '')
      .trim();
    if (stripped && stripped !== name && stripped.length >= 2) {
      result = await trySearch(stripped);
      if (result) return result;
    }

    // 3м°Ё: м•һ 4кёҖмһҗ(кіөл°ұ м ңкұ°)лЎң кІҖмғү
    const short = name.replace(/\s+/g, '').slice(0, 4);
    if (short.length >= 3 && short !== stripped.replace(/\s+/g,'')) {
      result = await trySearch(short);
      if (result) return result;
    }

    // лӘЁл‘җ мӢӨнҢЁ вҖ” мЈјмӮ¬м ң м—¬л¶Җ нҢҗлӢЁн•ҙм„ң л©”мӢңм§Җ л¶„кё°
    const isInjectable = /мЈјмӮ¬|мқёмҠҗлҰ°|мҶ”лЎңмҠӨнғҖ|лӢЁмң„\s*мЈј|мЈјмӮ¬м ң/.test(name);
    if (isInjectable) {
      const err = new Error(`мЈјмӮ¬м ңВ·мқёмҠҗлҰ°мқҖ eм•ҪмқҖмҡ” DB лҜёмҲҳлЎқ м•Ҫн’Ҳмһ…лӢҲлӢӨ`);
      err.isInjectable = true;
      throw err;
    }
    throw new Error(`мӢқм•ҪмІҳ eм•ҪмқҖмҡ” DBм—җм„ң м°ҫмқ„ мҲҳ м—ҶлҠ” м•Ҫн’Ҳмһ…лӢҲлӢӨ`);
  };

  const genUUID = () => 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16);
  });
  const getOrCreateUserId = () => {
    let id = localStorage.getItem('dm_user_id');
    if (!id) { id = genUUID(); localStorage.setItem('dm_user_id', id); }
    return id;
  };

  /* в”Җв”Җ м• н”Ң кұҙк°• нҢҢмӢұ (2MB мІӯнҒ¬ мҠӨнҠёлҰ¬л°Қ - лҢҖмҡ©лҹү нҢҢмқј м§Җмӣҗ) в”Җв”Җ */
  const parseAppleHealthXML = async (getChunks, totalBytes, onProgress) => {
    const glucoseByDay = {};
    const weightByDay  = {};
    const bodyFatByDay = {};
    const bpSysByDay   = {}; // мҲҳм¶•кё° нҳҲм••
    const bpDiaByDay   = {}; // мқҙмҷ„кё° нҳҲм••
    const stepsByDay   = {}; // кұёмқҢмҲҳ (н•ҳлЈЁ н•©мӮ°)
    const calByDay     = {}; // нҷңлҸҷ м№јлЎңлҰ¬ (н•ҳлЈЁ н•©мӮ°, kcal)
    const bcalByDay    = {}; // кё°мҙҲлҢҖмӮ¬лҹү (н•ҳлЈЁ н•©мӮ°, kcal)
    const distByDay    = {}; // кұ·кё°+лӢ¬лҰ¬кё° кұ°лҰ¬ (н•ҳлЈЁ н•©мӮ°, km)

    const TARGET_KEYS = {
      'HKQuantityTypeIdentifierBloodGlucose':              'glucose',
      'HKQuantityTypeIdentifierBodyMass':                   'weight',
      'HKQuantityTypeIdentifierBodyFatPercentage':          'fat',
      'HKQuantityTypeIdentifierBloodPressureSystolic':      'bp_sys',
      'HKQuantityTypeIdentifierBloodPressureDiastolic':     'bp_dia',
      'HKQuantityTypeIdentifierStepCount':                  'steps',
      'HKQuantityTypeIdentifierActiveEnergyBurned':         'cal',
      'HKQuantityTypeIdentifierBasalEnergyBurned':          'bcal',
      'HKQuantityTypeIdentifierDistanceWalkingRunning':     'dist',
    };

    const processRecord = (rec) => {
      let type = null;
      for (const [k, t] of Object.entries(TARGET_KEYS)) {
        if (rec.includes(k)) { type = t; break; }
      }
      if (!type) return;
      const val  = parseFloat((rec.match(/\bvalue="([^"]+)"/) || [])[1]);
      const unit = (rec.match(/\bunit="([^"]+)"/) || [])[1] || '';
      const dm   = rec.match(/\bstartDate="(\d{4}-\d{2}-\d{2})\s+(\d{2}):(\d{2})/);
      if (!dm || isNaN(val)) return;
      const dayKey = dm[1];
      const hour   = parseInt(dm[2]) + parseInt(dm[3]) / 60;
      if (type === 'glucose') {
        const mgdl = unit === 'mmol/L' ? Math.round(val * 18.015) : Math.round(val);
        if (!glucoseByDay[dayKey]) glucoseByDay[dayKey] = [];
        glucoseByDay[dayKey].push({ hour, value: mgdl });
      } else if (type === 'weight') {
        const kg = unit === 'lb' ? Math.round(val * 0.453592 * 10) / 10 : Math.round(val * 10) / 10;
        weightByDay[dayKey] = kg;
      } else if (type === 'fat') {
        bodyFatByDay[dayKey] = val <= 1 ? Math.round(val * 100 * 10) / 10 : Math.round(val * 10) / 10;
      } else if (type === 'bp_sys') {
        // к°ҷмқҖ лӮ  м—¬лҹ¬ лІҲ мёЎм • мӢң к°ҖмһҘ л§Ҳм§Җл§ү(hour кё°мӨҖ) к°’ мӮ¬мҡ©
        if (!bpSysByDay[dayKey] || hour > bpSysByDay[dayKey].hour)
          bpSysByDay[dayKey] = { hour, value: Math.round(val) };
      } else if (type === 'bp_dia') {
        if (!bpDiaByDay[dayKey] || hour > bpDiaByDay[dayKey].hour)
          bpDiaByDay[dayKey] = { hour, value: Math.round(val) };
      } else if (type === 'steps') {
        // кұёмқҢмҲҳ: н•ҳлЈЁ м—¬лҹ¬ мғҳн”Ңмқ„ н•©мӮ°
        stepsByDay[dayKey] = (stepsByDay[dayKey] || 0) + Math.round(val);
      } else if (type === 'cal') {
        // нҷңм„ұ м№јлЎңлҰ¬: н•©мӮ° (kcal лӢЁмң„лЎң м ҖмһҘ)
        const kcal = unit === 'kJ' ? val / 4.184 : val;
        calByDay[dayKey] = Math.round(((calByDay[dayKey] || 0) + kcal));
      } else if (type === 'bcal') {
        // кё°мҙҲлҢҖмӮ¬лҹү: н•©мӮ° (kcal лӢЁмң„лЎң м ҖмһҘ) вҖ” Apple Watchк°Җ мӢңк°„лҢҖлі„лЎң мӘјк°ңм„ң м ҖмһҘн•Ё
        const kcal = unit === 'kJ' ? val / 4.184 : val;
        bcalByDay[dayKey] = Math.round(((bcalByDay[dayKey] || 0) + kcal));
      } else if (type === 'dist') {
        // кұ°лҰ¬: н•©мӮ° (km лӢЁмң„лЎң м ҖмһҘ)
        const km = unit === 'mi' ? val * 1.60934 : (unit === 'm' ? val / 1000 : val);
        distByDay[dayKey] = Math.round(((distByDay[dayKey] || 0) + km) * 100) / 100;
      }
    };

    let tail = '';           // мқҙм „ мІӯнҒ¬м—җм„ң мһҳлҰ° л¶Ҳмҷ„м „н•ң л ҲмҪ”л“ң
    let bytesProcessed = 0;
    let recCount = 0;

    for await (const chunk of getChunks()) {
      const text = tail + chunk;
      let pos = 0;
      let lastEnd = 0;

      while (true) {
        const recStart = text.indexOf('<Record', pos);
        if (recStart === -1) break;
        const recEnd = text.indexOf('/>', recStart);
        if (recEnd === -1) break; // мІӯнҒ¬ кІҪкі„м—җм„ң мһҳлҰ° л ҲмҪ”л“ң вҶ’ tailлЎң ліҙкҙҖ

        const rec = text.substring(recStart, recEnd + 2);
        if (Object.keys(TARGET_KEYS).some(k => rec.includes(k))) processRecord(rec);
        lastEnd = recEnd + 2;
        pos = lastEnd;
        recCount++;
        // л§Ө 50кұҙл§ҲлӢӨ лёҢлқјмҡ°м Җм—җ м–‘ліҙ (UI л°ҳмқ‘м„ұ мң м§Җ)
        if (recCount % 50 === 0) await new Promise(r => setTimeout(r, 0));
      }

      // л§Ҳм§Җл§ү мҷ„м „н•ң л ҲмҪ”л“ң мқҙнӣ„ н…ҚмҠӨнҠёлҘј лӢӨмқҢ мІӯнҒ¬лЎң л„ҳк№Җ
      tail = text.substring(lastEnd);
      if (tail.length > 30000) tail = tail.slice(-30000); // м•Ҳм „мһҘм№ҳ

      bytesProcessed += chunk.length;
      if (onProgress && totalBytes) {
        onProgress(Math.min(99, Math.round(bytesProcessed / totalBytes * 100)));
      }
    }

    // мҲҳм¶•кё°/мқҙмҷ„кё° мҢҚмқҙ лӘЁл‘җ мһҲлҠ” лӮ л§Ң нҳҲм••мңјлЎң м ҖмһҘ
    const bpByDay = {};
    Object.keys(bpSysByDay).forEach(d => {
      if (bpDiaByDay[d]) {
        bpByDay[d] = { sys: String(bpSysByDay[d].value), dia: String(bpDiaByDay[d].value) };
      }
    });

    if (onProgress) onProgress(100);
    return { glucoseByDay, weightByDay, bodyFatByDay, bpByDay, stepsByDay, calByDay, bcalByDay, distByDay };
  };

  /* в”Җв”Җ мӮјм„ұ н—¬мҠӨ ZIP нҢҢмӢұ (мІҙмӨ‘В·мІҙм§Җл°©) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
  const parseSamsungHealthZip = async (file, onProgress) => {
    if (typeof JSZip === 'undefined') throw new Error('ZIP лқјмқҙлёҢлҹ¬лҰ¬ лЎңл“ң мӢӨнҢЁ. мқён„°л„· м—°кІ°мқ„ нҷ•мқён•ҙ мЈјм„ёмҡ”.');
    onProgress && onProgress('ZIP м••м¶• н•ҙм ң мӨ‘...');
    const zip = await JSZip.loadAsync(file);
    const allFiles = Object.keys(zip.files);

    // мӮјм„ұ н—¬мҠӨлҠ” com.samsung.shealth.weight.{timestamp}.csv нҳ•нғң
    const weightFile = allFiles.find(n => /com\.samsung\.(shealth|health)\.weight/i.test(n) && n.endsWith('.csv'));
    // нҳҲм•• нҢҢмқј: com.samsung.health.blood_pressure.*.csv
    const bpFile = allFiles.find(n => /com\.samsung\.(shealth|health)\.blood_pressure/i.test(n) && n.endsWith('.csv'));

    if (!weightFile && !bpFile) {
      const csvFiles = allFiles.filter(n => n.endsWith('.csv')).slice(0, 8).join('\n');
      throw new Error(`мӮјм„ұ н—¬мҠӨ мІҙмӨ‘/нҳҲм•• нҢҢмқјмқ„ м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”.\nл°ңкІ¬лҗң CSV нҢҢмқј:\n${csvFiles || 'м—ҶмқҢ'}\n\nмӮјм„ұ н—¬мҠӨ вҶ’ м„Өм • вҶ’ к°ңмқё лҚ°мқҙн„° лӢӨмҡҙлЎңл“ңм—җм„ң лӮҙліҙлӮё ZIPмқём§Җ нҷ•мқён•ҙ мЈјм„ёмҡ”.`);
    }

    const weightByDay  = {};
    const bodyFatByDay = {};
    const bpByDay      = {};
    const stepsByDay   = {};
    const calByDay     = {};
    const distByDay    = {};

    // в”Җв”Җ кұёмқҢмҲҳ/м№јлЎңлҰ¬/кұ°лҰ¬ нҢҢмӢұ (step_daily_trend)
    const stepFile = allFiles.find(n => /com\.samsung\.(shealth|health)\.(step_daily_trend|step\.daily_trend)/i.test(n) && n.endsWith('.csv'));
    if (stepFile) {
      onProgress && onProgress('кұёмқҢмҲҳ лҚ°мқҙн„° л¶„м„қ мӨ‘...');
      const stepText = await zip.files[stepFile].async('string');
      const stepLines = stepText.split('\n').map(l => l.trim()).filter(Boolean);
      const stepHdrIdx = stepLines.findIndex(l => !l.startsWith('#') && (l.includes('count') || l.includes('start_time') || l.includes('calorie')));
      if (stepHdrIdx >= 0) {
        const stepHeaders = stepLines[stepHdrIdx].split(',').map(h => h.trim().replace(/"/g, ''));
        const iCount  = stepHeaders.findIndex(h => /\bcount\b/i.test(h));
        const iCal    = stepHeaders.findIndex(h => /calorie/i.test(h));
        const iDist   = stepHeaders.findIndex(h => /distance/i.test(h));
        const iTime3  = stepHeaders.findIndex(h => /start_time|create_time|day_time/i.test(h));
        for (let i = stepHdrIdx + 1; i < stepLines.length; i++) {
          if (stepLines[i].startsWith('#')) continue;
          const cols = stepLines[i].split(',').map(c => c.trim().replace(/"/g, ''));
          if (cols.length < 2) continue;
          const timeStr = iTime3 >= 0 ? cols[iTime3] : '';
          const dayKey  = timeStr ? timeStr.slice(0, 10) : null;
          if (!dayKey || !/^\d{4}-\d{2}-\d{2}$/.test(dayKey)) continue;
          if (iCount >= 0) { const v = parseInt(cols[iCount]); if (!isNaN(v) && v > 0) stepsByDay[dayKey] = (stepsByDay[dayKey]||0) + v; }
          if (iCal >= 0)   { const v = parseFloat(cols[iCal]); if (!isNaN(v) && v > 0) calByDay[dayKey]   = Math.round((calByDay[dayKey]||0) + v); }
          if (iDist >= 0)  { const v = parseFloat(cols[iDist]); if (!isNaN(v) && v > 0) distByDay[dayKey] = Math.round(((distByDay[dayKey]||0) + v/1000)*100)/100; }
        }
      }
    }

    // в”Җв”Җ мІҙмӨ‘/мІҙм§Җл°© нҢҢмӢұ
    if (weightFile) {
      onProgress && onProgress('мІҙмӨ‘ лҚ°мқҙн„° л¶„м„қ мӨ‘...');
      const csvText = await zip.files[weightFile].async('string');
      const lines = csvText.split('\n').map(l => l.trim()).filter(Boolean);
      const headerIdx = lines.findIndex(l => !l.startsWith('#') && (l.includes('weight') || l.includes('start_time')));
      if (headerIdx >= 0) {
        const headers = lines[headerIdx].split(',').map(h => h.trim().replace(/"/g, ''));
        const iWeight  = headers.findIndex(h => /weight\.weight$|^weight$/i.test(h));
        const iFat     = headers.findIndex(h => /body_fat|fat_percent|fat$/i.test(h));
        const iTime    = headers.findIndex(h => /start_time|create_time|time/i.test(h));
        for (let i = headerIdx + 1; i < lines.length; i++) {
          if (lines[i].startsWith('#')) continue;
          const cols = lines[i].split(',').map(c => c.trim().replace(/"/g, ''));
          if (cols.length < 2) continue;
          const timeStr = iTime >= 0 ? cols[iTime] : '';
          const dayKey  = timeStr ? timeStr.slice(0, 10) : null;
          if (!dayKey || !/^\d{4}-\d{2}-\d{2}$/.test(dayKey)) continue;
          if (iWeight >= 0) {
            const w = parseFloat(cols[iWeight]);
            if (!isNaN(w) && w > 20 && w < 300) weightByDay[dayKey] = w;
          }
          if (iFat >= 0) {
            const f = parseFloat(cols[iFat]);
            if (!isNaN(f) && f > 0)
              bodyFatByDay[dayKey] = f <= 1 ? Math.round(f * 100 * 10) / 10 : Math.round(f * 10) / 10;
          }
        }
      }
    }

    // в”Җв”Җ нҳҲм•• нҢҢмӢұ
    if (bpFile) {
      onProgress && onProgress('нҳҲм•• лҚ°мқҙн„° л¶„м„қ мӨ‘...');
      const bpText = await zip.files[bpFile].async('string');
      const bpLines = bpText.split('\n').map(l => l.trim()).filter(Boolean);
      const bpHdrIdx = bpLines.findIndex(l => !l.startsWith('#') && (l.includes('systolic') || l.includes('diastolic') || l.includes('start_time')));
      if (bpHdrIdx >= 0) {
        const bpHeaders = bpLines[bpHdrIdx].split(',').map(h => h.trim().replace(/"/g,''));
        const iSys  = bpHeaders.findIndex(h => /systolic/i.test(h));
        const iDia  = bpHeaders.findIndex(h => /diastolic/i.test(h));
        const iTime2 = bpHeaders.findIndex(h => /start_time|create_time|time/i.test(h));
        for (let i = bpHdrIdx + 1; i < bpLines.length; i++) {
          if (bpLines[i].startsWith('#')) continue;
          const cols = bpLines[i].split(',').map(c => c.trim().replace(/"/g,''));
          if (cols.length < 2) continue;
          const timeStr = iTime2 >= 0 ? cols[iTime2] : '';
          const dayKey  = timeStr ? timeStr.slice(0, 10) : null;
          if (!dayKey || !/^\d{4}-\d{2}-\d{2}$/.test(dayKey)) continue;
          const sys = iSys >= 0 ? parseInt(cols[iSys]) : NaN;
          const dia = iDia >= 0 ? parseInt(cols[iDia]) : NaN;
          if (!isNaN(sys) && !isNaN(dia) && sys > 50 && dia > 30) {
            bpByDay[dayKey] = { sys: String(sys), dia: String(dia) };
          }
        }
      }
    }

    onProgress && onProgress('мҷ„лЈҢ');
    return { weightByDay, bodyFatByDay, bpByDay, stepsByDay, calByDay, distByDay };
  };

  // в”Җв”Җ Google Fit Takeout ZIP нҢҢм„ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const parseGoogleFitZip = async (file, onProgress) => {
    if (typeof JSZip === 'undefined') throw new Error('ZIP лқјмқҙлёҢлҹ¬лҰ¬ лЎңл“ң мӢӨнҢЁ. мқён„°л„· м—°кІ°мқ„ нҷ•мқён•ҙ мЈјм„ёмҡ”.');
    onProgress && onProgress('ZIP м••м¶• н•ҙм ң мӨ‘...');
    const zip = await JSZip.loadAsync(file);
    const allFiles = Object.keys(zip.files);

    // Google н…ҢмқҙнҒ¬м•„мӣғ кө¬мЎ°:
    //   Takeout/Fit/Daily activity metrics/Daily activity metrics - YYYY-MM-DD.csv
    const metricFiles = allFiles.filter(n =>
      /daily.activity.metrics.*\d{4}-\d{2}-\d{2}\.csv$/i.test(n)
    );

    if (!metricFiles.length) {
      const csvFiles = allFiles.filter(n => n.endsWith('.csv')).slice(0, 10).join('\n');
      throw new Error(
        `Google Fit мқјлі„ нҷңлҸҷ нҢҢмқјмқ„ м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”.\n` +
        `л°ңкІ¬лҗң CSV:\n${csvFiles || 'м—ҶмқҢ'}\n\n` +
        `Google н…ҢмқҙнҒ¬м•„мӣғ(takeout.google.com) вҶ’ Fitл§Ң м„ нғқн•ҙм„ң лӮҙліҙлӮё ZIPмқём§Җ нҷ•мқён•ҙ мЈјм„ёмҡ”.`
      );
    }

    const stepsByDay = {};
    const calByDay   = {};
    const distByDay  = {};

    onProgress && onProgress(`кұёмқҢмҲҳВ·м№јлЎңлҰ¬В·кұ°лҰ¬ л¶„м„қ мӨ‘... (${metricFiles.length}к°ң нҢҢмқј)`);

    for (const fname of metricFiles) {
      // нҢҢмқјлӘ…м—җм„ң лӮ м§ң м¶”м¶ң: ...YYYY-MM-DD.csv
      const dateMatch = fname.match(/(\d{4}-\d{2}-\d{2})\.csv$/i);
      if (!dateMatch) continue;
      const dayKey = dateMatch[1];

      const csvText = await zip.files[fname].async('string');
      const lines = csvText.split('\n').map(l => l.trim()).filter(Boolean);
      if (lines.length < 2) continue;

      const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
      const dataRow  = lines[1].split(',').map(c => c.trim().replace(/"/g, ''));

      const iStep = headers.findIndex(h => /step.count/i.test(h));
      const iCal  = headers.findIndex(h => /calories.*kcal|kcal/i.test(h));
      // Google FitмқҖ лҜён„°(m) лӢЁмң„лЎң кұ°лҰ¬ кё°лЎқ
      const iDist = headers.findIndex(h => /distance.*\(m\)|^distance$/i.test(h));

      if (iStep >= 0) {
        const v = parseInt(dataRow[iStep]);
        if (!isNaN(v) && v > 0) stepsByDay[dayKey] = (stepsByDay[dayKey] || 0) + v;
      }
      if (iCal >= 0) {
        const v = parseFloat(dataRow[iCal]);
        if (!isNaN(v) && v > 0) calByDay[dayKey] = Math.round((calByDay[dayKey] || 0) + v);
      }
      if (iDist >= 0) {
        const v = parseFloat(dataRow[iDist]);
        // m вҶ’ km ліҖнҷҳ
        if (!isNaN(v) && v > 0) distByDay[dayKey] = Math.round(((distByDay[dayKey] || 0) + v / 1000) * 100) / 100;
      }
    }

    onProgress && onProgress('мҷ„лЈҢ');
    return { glucoseByDay: {}, weightByDay: {}, bodyFatByDay: {}, bpByDay: {}, stepsByDay, calByDay, distByDay };
  };

  const buildDashboardData = ({ glucoseByDay, weightByDay, bodyFatByDay = {}, bpByDay = {},
                                 stepsByDay = {}, calByDay = {}, bcalByDay = {}, distByDay = {} }) => {
    const result = {};
    Object.entries(glucoseByDay).forEach(([day, readings]) => {
      const bs = {};
      TIME_WINDOWS.forEach(w => {
        const inWin = readings.filter(r => r.hour >= w.startH && r.hour < w.endH).map(r => r.value);
        const med = median(inWin);
        if (med) bs[w.id] = String(med);
      });
      if (Object.keys(bs).length) { result[day] = result[day] || emptyDay(); result[day].bs = bs; }
    });
    Object.entries(weightByDay).forEach(([day, weight]) => {
      result[day] = result[day] || emptyDay();
      result[day].weight = String(Math.round(weight * 100) / 100);
    });
    Object.entries(bodyFatByDay).forEach(([day, bodyFat]) => {
      result[day] = result[day] || emptyDay();
      result[day].bodyFat = String(bodyFat);
    });
    Object.entries(bpByDay).forEach(([day, bp]) => {
      result[day] = result[day] || emptyDay();
      result[day].bp = bp;
    });
    Object.entries(stepsByDay).forEach(([day, steps]) => {
      result[day] = result[day] || emptyDay();
      result[day].steps = String(steps);
    });
    Object.entries(calByDay).forEach(([day, cal]) => {
      result[day] = result[day] || emptyDay();
      result[day].cal = String(cal);
    });
    Object.entries(bcalByDay).forEach(([day, bcal]) => {
      result[day] = result[day] || emptyDay();
      result[day].bcal = String(bcal);
    });
    Object.entries(distByDay).forEach(([day, dist]) => {
      result[day] = result[day] || emptyDay();
      result[day].dist = String(dist);
    });
    return result;
  };

  /* в”Җв”Җ LibreView CSV нҢҢмӢұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
  const parseCSVRow = (line) => {
    const out = []; let inQ = false; let cur = '';
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    out.push(cur.trim());
    return out;
  };

  const parseLVTimestamp = (s) => {
    s = s.replace(/"/g, '').trim();
    // MM-DD-YYYY HH:MM AM/PM (мҳҒм–ҙ/н•ңкөӯм–ҙ мҳӨм „мҳӨнӣ„)
    let m = s.match(/(\d{1,2})[/-](\d{1,2})[/-](\d{4})\s+(\d{1,2}):(\d{2})\s*(AM|PM|мҳӨм „|мҳӨнӣ„)/i);
    if (m) {
      const [,p1,p2,yyyy,hh,min,ap] = m;
      let h = parseInt(hh);
      if (/PM|мҳӨнӣ„/i.test(ap) && h!==12) h+=12;
      if (/AM|мҳӨм „/i.test(ap) && h===12) h=0;
      // LibreViewлҠ” MM-DD-YYYY нҳ•мӢқ
      return { dayKey:`${yyyy}-${String(p1).padStart(2,'0')}-${String(p2).padStart(2,'0')}`, hour:h+parseInt(min)/60 };
    }
    // YYYY-MM-DD HH:MM
    m = s.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{1,2}):(\d{2})/);
    if (m) {
      const [,yyyy,mm,dd,hh,min] = m;
      return { dayKey:`${yyyy}-${mm}-${dd}`, hour:parseInt(hh)+parseInt(min)/60 };
    }
    return null;
  };

  const parseLibreViewCSV = (csvText) => {
    const lines = csvText.split(/\r?\n/);
    let headerIdx = -1;
    for (let i = 0; i < Math.min(lines.length, 20); i++) {
      if (/timestamp|нғҖмһ„мҠӨнғ¬н”„|ж—¶й—ҙжҲі|мһҘм№ҳ.?нғҖмһ„мҠӨнғ¬н”„/i.test(lines[i])) { headerIdx = i; break; }
    }
    if (headerIdx === -1) return null;

    const headers = parseCSVRow(lines[headerIdx]);
    const tsIdx   = headers.findIndex(h => /timestamp|нғҖмһ„мҠӨнғ¬н”„|мһҘм№ҳ.?нғҖмһ„мҠӨнғ¬н”„/i.test(h));
    const typeIdx = headers.findIndex(h => /record.?type|л ҲмҪ”л“ң|кё°лЎқ.?мң нҳ•/i.test(h));
    const histIdx = headers.findIndex(h => /historic.?glucose|нһҲмҠӨнҶ лҰ¬.*нҸ¬лҸ„лӢ№|кіјкұ°.?нҳҲлӢ№/i.test(h));
    const scanIdx = headers.findIndex(h => /scan.?glucose|мҠӨмә”.*нҸ¬лҸ„лӢ№|нҳҲлӢ№.?мҠӨмә”/i.test(h));

    if (tsIdx === -1) return null;

    const glucoseByDay = {};
    for (let i = headerIdx + 1; i < lines.length; i++) {
      const row = parseCSVRow(lines[i]);
      if (row.length <= tsIdx || !row[tsIdx]) continue;
      const recType = (row[typeIdx] || '').replace(/"/g,'').trim();
      if (recType !== '0' && recType !== '1') continue;

      const rawVal = recType === '0'
        ? parseFloat((row[histIdx]||'').replace(/"/g,''))
        : parseFloat((row[scanIdx]||'').replace(/"/g,''));
      if (isNaN(rawVal) || rawVal <= 0) continue;

      const parsed = parseLVTimestamp(row[tsIdx]);
      if (!parsed) continue;
      const { dayKey, hour } = parsed;
      if (!glucoseByDay[dayKey]) glucoseByDay[dayKey] = [];
      glucoseByDay[dayKey].push({ hour, value: Math.round(rawVal) });
    }
    return glucoseByDay;
  };

  /* в”Җв”Җ к°Җм ёмҳӨкё° лӘЁлӢ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
  const ImportModal = ({ onClose, onImport, initialTab }) => {
    const dm = _dm;
    const [tab,     setTab]     = useState(initialTab || 'apple'); // 'apple' | 'libreview'
    const [status,  setStatus]  = useState('idle');
    const [preview, setPreview] = useState(null);
    const [errMsg,  setErrMsg]  = useState('');
    const [progress, setProgress] = useState('');
    const fileRef = useRef(null);

    const reset = () => { setStatus('idle'); setErrMsg(''); setPreview(null); };
    const onTabChange = (t) => { setTab(t); reset(); };

    const processFile = async (file) => {
      setStatus('loading'); setErrMsg('');
      try {
        /* в”Җв”Җ м•Ҳл“ңлЎңмқҙл“ң: мӮјм„ұ н—¬мҠӨ ZIP в”Җв”Җ */
        if (tab === 'android') {
          const { weightByDay, bodyFatByDay, bpByDay = {}, stepsByDay = {}, calByDay = {}, distByDay = {} } = await parseSamsungHealthZip(file, (msg) => setProgress(msg));
          const wDays    = Object.keys(weightByDay).length;
          const bfDays   = Object.keys(bodyFatByDay).length;
          const stepDays = Object.keys(stepsByDay).length;
          if (!wDays && !bfDays && !stepDays) throw new Error('мІҙмӨ‘В·мІҙм§Җл°©В·кұёмқҢмҲҳ лҚ°мқҙн„°лҘј м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”.\nмӮјм„ұ н—¬мҠӨ вҶ’ к°ңмқё лҚ°мқҙн„° лӢӨмҡҙлЎңл“ңм—җм„ң лӮҙліҙлӮё ZIPмқём§Җ нҷ•мқён•ҙ мЈјм„ёмҡ”.');
          const mapped = buildDashboardData({ glucoseByDay:{}, weightByDay, bodyFatByDay, bpByDay, stepsByDay, calByDay, distByDay });
          setPreview({ mapped, gDays:0, wDays, bfDays, stepDays, totalReadings:0, source:'android' });
          setStatus('preview');
          return;
        }

        /* в”Җв”Җ м•Ҳл“ңлЎңмқҙл“ң: Google Fit Takeout ZIP в”Җв”Җ */
        if (tab === 'googlefit') {
          const { stepsByDay = {}, calByDay = {}, distByDay = {} } = await parseGoogleFitZip(file, (msg) => setProgress(msg));
          const stepDays = Object.keys(stepsByDay).length;
          if (!stepDays) throw new Error('кұёмқҢмҲҳ лҚ°мқҙн„°лҘј м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”.\ntakeout.google.com вҶ’ Fitл§Ң м„ нғқн•ҙм„ң лӮҙліҙлӮё ZIPмқём§Җ нҷ•мқён•ҙ мЈјм„ёмҡ”.');
          const mapped = buildDashboardData({ glucoseByDay:{}, weightByDay:{}, bodyFatByDay:{}, bpByDay:{}, stepsByDay, calByDay, distByDay });
          setPreview({ mapped, gDays:0, wDays:0, bfDays:0, stepDays, totalReadings:0, source:'googlefit' });
          setStatus('preview');
          return;
        }

        /* в”Җв”Җ LibreView CSV в”Җв”Җ */
        if (file.name.endsWith('.csv')) {
          setProgress('CSV нҢҢмқј л¶„м„қ мӨ‘...');
          await new Promise(r => setTimeout(r, 30));
          const csvText = await file.text();
          const glucoseByDay = parseLibreViewCSV(csvText);
          if (!glucoseByDay) throw new Error('LibreView CSV нҳ•мӢқмқ„ мқёмӢқн•  мҲҳ м—Ҷм–ҙмҡ”.\nlibreview.comм—җм„ң лӮҙліҙлӮё нҢҢмқјмқём§Җ нҷ•мқён•ҙ мЈјм„ёмҡ”.');
          const totalDays = Object.keys(glucoseByDay).length;
          const totalReadings = Object.values(glucoseByDay).reduce((a,b)=>a+b.length,0);
          if (!totalDays) throw new Error('нҳҲлӢ№ лҚ°мқҙн„°лҘј м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”. нҢҢмқјмқ„ лӢӨмӢң нҷ•мқён•ҙ мЈјм„ёмҡ”.');
          const mapped = buildDashboardData({ glucoseByDay, weightByDay:{} });
          setPreview({ mapped, gDays:totalDays, wDays:0, totalReadings, source:'libreview' });
          setStatus('preview');
          return;
        }

        /* в”Җв”Җ м• н”Ң кұҙк°• ZIP / XML (мІӯнҒ¬ мҠӨнҠёлҰ¬л°Қ) в”Җв”Җ */
        const CHUNK_SIZE = 2 * 1024 * 1024;
        let getChunks, totalBytes;

        if (file.name.endsWith('.zip')) {
          setProgress('ZIP м••м¶• н•ҙм ң мӨ‘... (мһ мӢң кё°лӢӨл Ө мЈјм„ёмҡ”)');
          if (typeof JSZip === 'undefined') throw new Error('ZIP лқјмқҙлёҢлҹ¬лҰ¬ лЎңл“ң мӢӨнҢЁ. мқён„°л„· м—°кІ°мқ„ нҷ•мқён•ҳкұ°лӮҳ м§Ғм ‘ м••м¶• н•ҙм ң нӣ„ export.xmlмқ„ м„ нғқн•ҙ мЈјм„ёмҡ”.');
          const zip = await JSZip.loadAsync(file);
          const allFiles = Object.keys(zip.files);
          const xmlFile = allFiles.find(name =>
            /export\.xml$/i.test(name) && !/cda/i.test(name)
          ) || allFiles.find(name => /\.xml$/i.test(name) && !/cda/i.test(name));
          if (!xmlFile) {
            const found = allFiles.filter(n => !zip.files[n].dir).slice(0,10).join(', ');
            throw new Error(`ZIP м•Ҳм—җм„ң export.xmlмқ„ м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”.\nл°ңкІ¬лҗң нҢҢмқј: ${found || 'м—ҶмқҢ'}`);
          }
          setProgress('XML м¶”м¶ң мӨ‘...');
          const xmlBlob = await zip.files[xmlFile].async('blob');
          totalBytes = xmlBlob.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = xmlBlob.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else if (file.name.endsWith('.xml')) {
          totalBytes = file.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = file.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else {
          throw new Error('.csv / .zip / .xml нҢҢмқјл§Ң м§Җмӣҗн•ҙмҡ”.');
        }

        setProgress('нҳҲлӢ№В·мІҙмӨ‘В·кұёмқҢмҲҳ лҚ°мқҙн„° м¶”м¶ң мӨ‘... 0%');
        const parsed = await parseAppleHealthXML(getChunks, totalBytes, (pct) => {
          setProgress(`лҚ°мқҙн„° л¶„м„қ мӨ‘... ${pct}%`);
        });
        const mapped = buildDashboardData(parsed);

        const gDays    = Object.keys(parsed.glucoseByDay).length;
        const wDays    = Object.keys(parsed.weightByDay).length;
        const bfDays   = Object.keys(parsed.bodyFatByDay).length;
        const stepDays = Object.keys(parsed.stepsByDay || {}).length;
        const totalReadings = Object.values(parsed.glucoseByDay).reduce((a,b) => a+b.length, 0);

        if (!gDays && !wDays && !bfDays && !stepDays) throw new Error('кұҙк°• лҚ°мқҙн„°лҘј м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”.\nм• н”Ң кұҙк°• м•ұ вҶ’ мҳӨлҘёмӘҪ мң„ н”„лЎңн•„ вҶ’ кұҙк°• лҚ°мқҙн„° лӮҙліҙлӮҙкё°лЎң лӮҙліҙлӮё нҢҢмқјмқём§Җ нҷ•мқён•ҙ мЈјм„ёмҡ”.');

        setPreview({ mapped, gDays, wDays, bfDays, stepDays, totalReadings });
        setStatus('preview');
      } catch (e) {
        setErrMsg(e.message || 'нҢҢмқј мІҳлҰ¬ мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–Ҳм–ҙмҡ”.');
        setStatus('error');
      }
    };

    const confirm = () => { onImport(preview.mapped); setStatus('done'); };

    const isLV        = tab === 'libreview';
    const isAndroid   = tab === 'android';
    const isGoogleFit = tab === 'googlefit';
    const accent  = isLV ? 'var(--cn-low)' : isAndroid ? 'var(--cn-ok)' : isGoogleFit ? '#EA4335' : 'var(--cn-brand)';
    const accentL = isLV ? 'var(--cn-low-100)' : isAndroid ? 'var(--cn-ok-100)' : isGoogleFit ? '#FEE2E2' : 'var(--cn-brand-100)';
    const accentB = isLV ? 'var(--cn-low)' : isAndroid ? 'var(--cn-ok)' : isGoogleFit ? '#EA4335' : 'var(--cn-brand)';

    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.55)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:2000, padding:'20px' }}
           onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
        <div style={{ background:'var(--card-bg)', borderRadius:'18px', padding:'28px', maxWidth:'540px', width:'100%', maxHeight:'92vh', overflowY:'auto', boxShadow:'0 24px 80px rgba(0,0,0,0.25)' }}>

          {/* Header */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'18px' }}>
            <div>
              <div style={{ fontSize:'14px', fontWeight:'800', color:'var(--text)' }}>кіјкұ° лҚ°мқҙн„° к°Җм ёмҳӨкё°</div>
              <div style={{ fontSize:'14px', color:'var(--text-sub)', marginTop:'2px' }}>лҰ¬лёҢл Ҳ2 нҳҲлӢ№ кё°лЎқмқ„ лҢҖмӢңліҙл“ңм—җ мһҗлҸҷ л°ҳмҳҒ</div>
            </div>
            <button onClick={onClose} style={{ background:'var(--divider)', border:'none', borderRadius:'8px', width:'32px', height:'32px', cursor:'pointer', fontSize:'14px', color:'var(--text-sub)' }}>вң•</button>
          </div>

          {/* нғӯ м„ нғқ */}
          <div style={{ display:'flex', gap:'6px', marginBottom:'20px', background:'var(--input-bg)', borderRadius:'10px', padding:'4px' }}>
            {[
              { key:'apple',      label:'рҹҚҺ м• н”Ң кұҙк°•',  sub:'кіјкұ° лҚ°мқҙн„° ZIP' },
              { key:'libreview',  label:'рҹ“Ҡ лҰ¬лёҢл Ҳл·°',   sub:'нҳҲлӢ№ CSV' },
            ].map(t => (
              <button key={t.key} onClick={() => onTabChange(t.key)} style={{
                flex:1, padding:'10px 6px', border:'none', borderRadius:'8px', cursor:'pointer',
                fontSize:'13px', fontWeight:'700', transition:'all 0.2s',
                background: tab===t.key ? (dm?'var(--cn-ink)':'#fff') : 'transparent',
                color: tab===t.key ? accent : 'var(--text-mute)',
                boxShadow: tab===t.key ? '0 1px 4px rgba(0,0,0,0.08)' : 'none'
              }}>
                {t.label}
                {t.sub && <span style={{ display:'block', fontSize:'11px', fontWeight:'500', marginTop:'1px', color: tab===t.key ? accent : 'var(--text-mute)' }}>{t.sub}</span>}
              </button>
            ))}
          </div>

          {/* в”Җв”Җ LibreView нғӯ в”Җв”Җ */}
          {isLV && (status === 'idle' || status === 'error') && (
            <>
              <div style={{ background:dm?'var(--cn-low-100)':'var(--cn-low-100)', border:dm?'1px solid var(--cn-low)':'1px solid var(--cn-low)', borderRadius:'12px', padding:'14px 16px', marginBottom:'16px' }}>
                <div style={{ fontWeight:'700', color:'var(--cn-low)', fontSize:'16px', marginBottom:'8px' }}>рҹ“Ӣ LibreViewм—җм„ң лӮҙліҙлӮҙлҠ” л°©лІ•</div>
                <ol style={{ margin:0, paddingLeft:'18px', fontSize:'16px', color:dm?'var(--cn-low)':'var(--cn-low)', lineHeight:'2.1' }}>
                  <li><strong>libreview.com</strong> м—җ лЎңк·ёмқё (LibreLink кі„м • лҸҷмқј)</li>

            <div style={{ fontSize:'14px', fontWeight:'800', color:'var(--text)' }}>рҹ”— кё°кё° лҸҷкё°нҷ”</div>
            <button onClick={onClose} style={{ background:'var(--divider)', border:'none', borderRadius:'8px', width:'32px', height:'32px', cursor:'pointer', fontSize:'14px' }}>вң•</button>
          </div>

          <div style={{ background:dm?'var(--cn-brand-100)':'var(--cn-brand-100)', border:dm?'1px solid var(--cn-brand-600)':'1px solid var(--cn-brand)', borderRadius:'12px', padding:'16px', marginBottom:'20px' }}>
            <div style={{ fontSize:'14px', color:dm?'var(--cn-brand)':'var(--cn-brand-600)', fontWeight:'700', marginBottom:'8px' }}>рҹ“ұ лӮҙ лҸҷкё°нҷ” мҪ”л“ң</div>
            <div style={{ fontFamily:'monospace', fontSize:'16px', color:'var(--text)', wordBreak:'break-all', background:'var(--card-bg)', padding:'10px 12px', borderRadius:'8px', border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, marginBottom:'10px' }}>
              {userId}
            </div>
            <button onClick={copy} style={{ width:'100%', padding:'10px', background: copied?'var(--cn-ok)':'var(--cn-brand)', color:'#fff', border:'none', borderRadius:'8px', cursor:'pointer', fontWeight:'700', fontSize:'16px', transition:'background 0.2s' }}>
              {copied ? 'вң“ ліөмӮ¬лҗЁ!' : 'мҪ”л“ң ліөмӮ¬'}
            </button>
          </div>

          <div style={{ fontSize:'16px', color:'var(--text-sub)', lineHeight:'1.8', marginBottom:'20px' }}>
            <strong>лӢӨлҘё кё°кё°(iPhone л“ұ)м—җм„ң к°ҷмқҖ лҚ°мқҙн„° ліҙл Өл©ҙ:</strong><br/>
            1. лӢӨлҘё кё°кё°м—җм„ң лҢҖмӢңліҙл“ң м—ҙкё°<br/>
            2. рҹ”— лҸҷкё°нҷ” лІ„нҠј нҒҙлҰӯ<br/>
            3. мң„ мҪ”л“ңлҘј м•„лһҳм—җ мһ…л Ҙ вҶ’ м Ғмҡ©
          </div>

          <div style={{ borderTop:'1px solid var(--divider)', paddingTop:'16px' }}>
            <div style={{ fontSize:'14px', color:'var(--text-sub)', marginBottom:'6px' }}>лӢӨлҘё кё°кё°мқҳ мҪ”л“ң мһ…л Ҙ (лҸҷкё°нҷ” мҪ”л“ң ліҖкІҪ)</div>
            <div style={{ display:'flex', gap:'8px' }}>
              <input value={input} onChange={e=>setInput(e.target.value)} placeholder="мҪ”л“ңлҘј л¶ҷм—¬л„Јм–ҙ мЈјм„ёмҡ”"
                style={{ flex:1, border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, borderRadius:'8px', padding:'10px 12px', fontSize:'16px', outline:'none', fontFamily:'monospace' }} />
              <button onClick={apply} style={{ padding:'10px 16px', background:'var(--cn-low)', color:'#fff', border:'none', borderRadius:'8px', cursor:'pointer', fontWeight:'700', fontSize:'16px' }}>м Ғмҡ©</button>
            </div>
          </div>
        </div>
      </div>
    );
  };

  /* в”Җв”Җ ліөм•Ҫ м„Өм • лӘЁлӢ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
  const MedSettingsModal = ({ meds, onSave, onClose, userId }) => {
    const dm = _dm;
    const SLOT_COLORS_DEF = [
      { color:'var(--cn-brand)', bg:'var(--cn-brand-100)', border:'var(--cn-brand)' },
      { color:'var(--cn-ok)', bg:'var(--cn-ok-100)', border:'var(--cn-ok)' },
      { color:'var(--cn-low)', bg:'var(--cn-low-100)', border:'var(--cn-low)' },
      { color:'var(--cn-danger)', bg:'var(--cn-danger-100)', border:'var(--cn-danger)' },
      { color:'var(--cn-warn)', bg:'var(--cn-warn-100)', border:'var(--cn-warn)' },
    ];
    const DEFAULT_SLOTS = [
      { slot:'м•„м№Ё', icon:'рҹҢ…' }, { slot:'м җмӢ¬', icon:'вҳҖпёҸ' },
      { slot:'м Җл…Ғ', icon:'рҹҢҮ' }, { slot:'м·Ём№Ём „', icon:'рҹҢҷ' },
    ];
    const [cfg, setCfg] = useState(() => {
      const base = JSON.parse(JSON.stringify(meds));
      if (base.length === 0) {
        return DEFAULT_SLOTS.map((d, i) => ({
          slot: d.slot, key: 'slot_def_' + i, icon: d.icon,
          ...SLOT_COLORS_DEF[i % SLOT_COLORS_DEF.length], items: []
        }));
      }
      return base;
    });
    const [editingSlot, setEditingSlot] = useState(null);
    const [editingMed,  setEditingMed]  = useState(null);
    const nameInputRef = useRef(null);
    const [loadingCloud, setLoadingCloud] = useState(false);
    const [loadMsg, setLoadMsg] = useState('');
    const [legacyInput, setLegacyInput] = useState(() => localStorage.getItem('dm_user_id') || '');
    const [showLegacy, setShowLegacy] = useState(false);

    /* в”Җв”Җ мғҲ м•Ҫ м¶”к°Җ нҢЁл„җ мғҒнғң в”Җв”Җ */
    const EDGE_URL = `${SUPA_URL}/functions/v1/drug-search`;
    const [newName, setNewName]         = useState('');
    const [newDose, setNewDose]         = useState('');
    const [newStart, setNewStart]       = useState('');
    const [newEnd, setNewEnd]           = useState('');
    const [newFreq, setNewFreq]         = useState({ type:'daily' });
    const [newSlotKey, setNewSlotKey]   = useState('');
    const [addMsg, setAddMsg]           = useState('');
    const [suggestions, setSuggestions] = useState([]);
    const [isSearching, setIsSearching] = useState(false);
    const searchTimer = useRef(null);
    const slotListEndRef = useRef(null);

    // кё°ліё м„ нғқ мҠ¬лЎҜ
    useEffect(() => {
      if (cfg.length > 0 && !newSlotKey) setNewSlotKey(cfg[0].key);
    }, []);

    const [searchErr, setSearchErr] = useState('');

    const handleNameInput = (val) => {
      setNewName(val);
      setSuggestions([]);
      setSearchErr('');
      clearTimeout(searchTimer.current);
      if (val.trim().length < 2) return;
      searchTimer.current = setTimeout(async () => {
        setIsSearching(true);
        try {
          const res = await fetch(`${EDGE_URL}?q=${encodeURIComponent(val.trim())}`, {
            headers: { 'apikey': SUPA_KEY }
          });
          if (!res.ok) { setSearchErr('вқҢ кІҖмғү м„ңлІ„ мҳӨлҘҳ (' + res.status + ')'); setIsSearching(false); return; }
          const data = await res.json();
          if (Array.isArray(data)) {
            setSuggestions(data);
            if (data.length === 0) setSearchErr('кІҖмғү кІ°кіј м—ҶмқҢ вҖ” м§Ғм ‘ мһ…л Ҙ нӣ„ м¶”к°Җн•ҳкё°лҘј лҲ„лҘҙм„ёмҡ”');
          }
        } catch(e) {
          setSearchErr('вқҢ м—°кІ° мӢӨнҢЁ: ' + e.message);
        }
        setIsSearching(false);
      }, 400);
    };

    const selectSuggestion = (drug) => {
      setNewName(drug.itemName);
      setSuggestions([]);
      setSearchErr('');
    };

    const addDrugToSlot = () => {
      if (!newName.trim()) { setAddMsg('вҡ пёҸ м•Ҫ мқҙлҰ„мқ„ мһ…л Ҙн•ҙ мЈјм„ёмҡ”.'); setTimeout(()=>setAddMsg(''),2500); return; }
      if (!newSlotKey)     { setAddMsg('вҡ пёҸ мӢңк°„лҢҖлҘј м„ нғқн•ҙ мЈјм„ёмҡ”.');  setTimeout(()=>setAddMsg(''),2500); return; }
      // мҡ”мқј/лӮ м§ң м—Ҷмқҙ м ҖмһҘ л°©м§Җ
      if (newFreq.type === 'weekly' && !(newFreq.weekDays||[]).length) {
        setAddMsg('вҡ пёҸ л§ӨмЈј ліөмҡ© мҡ”мқјмқ„ 1к°ң мқҙмғҒ м„ нғқн•ҙ мЈјм„ёмҡ”.'); setTimeout(()=>setAddMsg(''),3000); return;
      }
      if (newFreq.type === 'monthly' && !(newFreq.monthDays||[]).length) {
        setAddMsg('вҡ пёҸ л§Өмӣ” ліөмҡ© лӮ м§ңлҘј 1к°ң мқҙмғҒ м„ нғқн•ҙ мЈјм„ёмҡ”.'); setTimeout(()=>setAddMsg(''),3000); return;
      }
      const id = genId();
      const freqToSave = newFreq.type === 'daily' ? undefined : newFreq;
      setCfg(c => c.map(s => s.key === newSlotKey
        ? { ...s, items: [...(s.items||[]), { id, name: newName.trim(), dose: newDose, startDate: newStart, endDate: newEnd, ...(freqToSave ? {freq: freqToSave} : {}) }] }
        : s));
      const added = newName.trim();
      setNewName(''); setNewDose(''); setNewStart(''); setNewEnd(''); setNewFreq({type:'daily'}); setSuggestions([]);
      setAddMsg('вң… ' + added + ' м¶”к°Җлҗҗм–ҙмҡ”!');
      setTimeout(() => setAddMsg(''), 3000);
    };

    // ліөм•Ҫ м„Өм • л¶Ҳлҹ¬мҳӨкё° вҖ” 4лӢЁкі„ нҸҙл°ұ
    // в‘  нҳ„мһ¬ Supabase кі„м •(authUser.id) вҶ’ в‘Ў localStorage(authUser.id нӮӨ)
    // вҶ’ в‘ў мҳҲм „ кё°кё° UUID(dm_user_id) Supabase вҶ’ в‘Ј мҳҲм „ localStorage нӮӨ
    const loadFromCloud = async () => {
      if (!userId) { setLoadMsg('вҡ пёҸ лЎңк·ёмқёмқҙ н•„мҡ”н•ҙмҡ”.'); setTimeout(()=>setLoadMsg(''),2500); return; }
      setLoadingCloud(true); setLoadMsg('');
      try {
        // в‘  нҳ„мһ¬ кі„м • Supabase
        const { data: row } = await supa.from('diabetes_data')
          .select('payload').eq('user_id', userId).eq('date', '_user_settings_').maybeSingle();
        const fromSB = row?.payload?.medsConfig;
        if (fromSB && Array.isArray(fromSB) && fromSB.length > 0) {
          setCfg(JSON.parse(JSON.stringify(fromSB)));
          setLoadMsg('вң… кі„м • м ҖмһҘ лҚ°мқҙн„°м—җм„ң ' + fromSB.flatMap(s=>(s.items||[])).length + 'к°ң м•Ҫмқ„ л¶Ҳлҹ¬мҷ”м–ҙмҡ”!');
          setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),3500); return;
        }

        // в‘Ў нҳ„мһ¬ кі„м • localStorage
        const ls1 = localStorage.getItem(`hcd_meds_config_${userId}`);
        const fromLS1 = ls1 ? JSON.parse(ls1) : null;
        if (fromLS1 && Array.isArray(fromLS1) && fromLS1.length > 0) {
          setCfg(JSON.parse(JSON.stringify(fromLS1)));
          setLoadMsg('вң… мқҙ кё°кё°мқҳ лЎңм»¬ лҚ°мқҙн„°м—җм„ң ' + fromLS1.flatMap(s=>(s.items||[])).length + 'к°ң м•Ҫмқ„ л¶Ҳлҹ¬мҷ”м–ҙмҡ”!');
          setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),3500); return;
        }

        // в‘ў мҳҲм „ UUID мЎ°нҡҢ (localStorage dm_user_id + м§Ғм ‘ мһ…л Ҙк°’ лӘЁл‘җ мӢңлҸ„)
        const legacyId = localStorage.getItem('dm_user_id');
        const candidates = [...new Set([legacyId, legacyInput.trim()].filter(x => x && x !== userId))];
        for (const lid of candidates) {
          const { data: legacyRow } = await supa.from('diabetes_data')
            .select('payload').eq('user_id', lid).eq('date', '_user_settings_').maybeSingle();
          const fromLegacySB = legacyRow?.payload?.medsConfig;
          if (fromLegacySB && Array.isArray(fromLegacySB) && fromLegacySB.length > 0) {
            setCfg(JSON.parse(JSON.stringify(fromLegacySB)));
            // мқҙ UUIDлҘј кё°м–өн•ҙ лӢӨмқҢлІҲм—” мһҗлҸҷмңјлЎң м°ҫкІҢ н•Ё
            localStorage.setItem('dm_user_id', lid);
            localStorage.setItem('cn_legacy_uid', lid);
            setLoadMsg('вң… мқҙм „ кі„м • лҚ°мқҙн„°м—җм„ң ' + fromLegacySB.flatMap(s=>(s.items||[])).length + 'к°ң м•Ҫмқ„ л¶Ҳлҹ¬мҷ”м–ҙмҡ”! м ҖмһҘмқ„ лҲҢлҹ¬ нҳ„мһ¬ кі„м •м—җ м—°кІ°н•ҳм„ёмҡ”.');
            setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),6000); return;
          }
          // в‘Ј мҳҲм „ кё°кё° localStorage нӮӨ
          const ls2 = localStorage.getItem(`hcd_meds_config_${lid}`);
          const fromLS2 = ls2 ? JSON.parse(ls2) : null;
          if (fromLS2 && Array.isArray(fromLS2) && fromLS2.length > 0) {
            setCfg(JSON.parse(JSON.stringify(fromLS2)));
            setLoadMsg('вң… мқҙм „ лЎңм»¬ лҚ°мқҙн„°м—җм„ң ' + fromLS2.flatMap(s=>(s.items||[])).length + 'к°ң м•Ҫмқ„ л¶Ҳлҹ¬мҷ”м–ҙмҡ”! м ҖмһҘмқ„ лҲҢлҹ¬ нҳ„мһ¬ кі„м •м—җ м—°кІ°н•ҳм„ёмҡ”.');
            setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),6000); return;
          }
        }

        // в‘Ө мөңнӣ„ мҲҳлӢЁ: Supabase мқјлі„ кё°лЎқм—җм„ң ліөм•Ҫ ID мҠӨмә”н•ҙ ліөкө¬
        try {
          const { data: allRows } = await supa.from('diabetes_data')
            .select('payload').eq('user_id', userId);
          const medIdSet = new Set();
          (allRows || []).forEach(r => {
            if (r.payload?.meds) Object.keys(r.payload.meds).forEach(id => medIdSet.add(id));
          });
          if (medIdSet.size > 0) {
              const recovered = [{
              slot: 'ліөкө¬лҗң ліөм•Ҫ лӘ©лЎқ', key: 'recovered_' + Date.now(), icon: 'рҹ’Ҡ',
              ...SLOT_COLORS_DEF[0],
              items: Array.from(medIdSet).map(id => ({ id, name: 'м•Ҫ мқҙлҰ„ мһ…л Ҙ н•„мҡ”', dose: '', startDate: '', endDate: '' }))
            }];
            setCfg(recovered);
            setLoadMsg('рҹ”Қ кё°лЎқм—җм„ң ' + medIdSet.size + 'к°ң ліөм•Ҫ н•ӯлӘ©мқ„ л°ңкІ¬н–Ҳм–ҙмҡ”! м•Ҫ мқҙлҰ„мқ„ вңҸпёҸлЎң мҲҳм • нӣ„ м ҖмһҘн•ҳм„ёмҡ”.');
            setLoadingCloud(false); setTimeout(()=>setLoadMsg(''),6000); return;
          }
        } catch {}

        setLoadMsg('в„№пёҸ м ҖмһҘлҗң ліөм•Ҫ лҚ°мқҙн„°к°Җ м—Ҷм–ҙмҡ”. м•„лһҳм—җм„ң м§Ғм ‘ м¶”к°Җн•ҙ мЈјм„ёмҡ”.');
      } catch(e) {
        setLoadMsg('вқҢ л¶Ҳлҹ¬мҳӨкё° мӢӨнҢЁ: ' + (e.message||'мҳӨлҘҳ'));
      }
      setLoadingCloud(false);
      setTimeout(()=>setLoadMsg(''), 4000);
    };

    // нҺём§‘ мӢңмһ‘ мӢң мқҙлҰ„ input мһҗлҸҷ нҸ¬м»ӨмҠӨ + м „мІҙ м„ нғқ
    useEffect(() => {
      if (editingMed && nameInputRef.current) {
        setTimeout(() => {
          nameInputRef.current?.focus();
          nameInputRef.current?.select();
        }, 50);
      }
    }, [editingMed]);

    const updSlotName = (key, val) => setCfg(c => c.map(s => s.key===key ? {...s, slot:val} : s));
    const updSlotIcon = (key, val) => setCfg(c => c.map(s => s.key===key ? {...s, icon:val} : s));
    const updSlotTime = (key, val) => setCfg(c => c.map(s => s.key===key ? {...s, notifTime:val} : s));

    const requestNotifPermission = async () => {
      if (!('Notification' in window)) { alert('мқҙ лёҢлқјмҡ°м ҖлҠ” м•ҢлҰјмқ„ м§Җмӣҗн•ҳм§Җ м•Ҡм•„мҡ”.'); return; }
      const perm = await Notification.requestPermission();
      if (perm === 'granted') alert('вң… м•ҢлҰјмқҙ н—Ҳмҡ©лҗҗм–ҙмҡ”! ліөм•Ҫ мӢңк°„м—җ м•ҢлҰјмқҙ мҡёл Өмҡ”.');
      else alert('м•ҢлҰјмқ„ н—Ҳмҡ©н•ҙм•ј ліөм•Ҫ м•ҢлһҢмқ„ л°ӣмқ„ мҲҳ мһҲм–ҙмҡ”.');
    };
    const delSlot = (key) => { if(window.confirm('мқҙ мӢңк°„лҢҖлҘј мӮӯм ңн• к№Ңмҡ”?')) setCfg(c => c.filter(s => s.key!==key)); };
    const moveSlot = (key, dir) => setCfg(c => {
      const idx = c.findIndex(s => s.key===key);
      const next = idx + dir;
      if (next < 0 || next >= c.length) return c;
      const arr = [...c];
      [arr[idx], arr[next]] = [arr[next], arr[idx]];
      return arr;
    });
    const addSlot = () => {
      const key = 'slot_' + Date.now();
      const col = SLOT_COLORS_DEF[cfg.length % SLOT_COLORS_DEF.length];
      setCfg(c => [...c, { slot:'мғҲ мӢңк°„лҢҖ', key, icon:'рҹ’Ҡ', items:[], ...col }]);
      setEditingSlot(key);
      setTimeout(() => slotListEndRef.current?.scrollIntoView({ behavior:'smooth', block:'center' }), 150);
    };
    const updMedField = (slotKey, medId, field, val) =>
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items: (s.items||[]).map(m => m.id===medId ? {...m, [field]:val} : m)} : s));
    const delMed = (slotKey, medId) =>
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items: (s.items||[]).filter(m => m.id!==medId)} : s));
    const addMed = (slotKey) => {
      const id = genId();
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items:[...(s.items||[]), {id, name:'', dose:'', startDate:'', endDate:''}]} : s));
      setEditingMed({slotKey, medId:id});
    };
    const reset = () => { if(window.confirm('ліөм•Ҫ лӘ©лЎқмқ„ м „л¶Җ мӮӯм ңн• к№Ңмҡ”?')) setCfg([]); };

    const inpSt = { border:`1px solid ${dm?'var(--card-border)':'var(--card-border)'}`, borderRadius:'6px', padding:'6px 10px', fontSize:'16px', width:'100%', outline:'none' };

    return (
      <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.55)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2000,padding:'16px'}}
           onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div style={{background:'var(--card-bg)',borderRadius:'18px',padding:'20px',maxWidth:'520px',width:'100%',maxHeight:'92vh',overflowY:'auto',boxShadow:'0 24px 80px rgba(0,0,0,0.25)'}}>

          {/* в”Җв”Җ н—ӨлҚ” в”Җв”Җ */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
            <div style={{fontSize:'15px',fontWeight:'800',color:'var(--text)'}}>рҹ’Ҡ ліөм•Ҫ м„Өм •</div>
            <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
              <button onClick={loadFromCloud} disabled={loadingCloud}
                style={{background:loadingCloud?'var(--divider)':'var(--cn-brand-100)',border:'1px solid var(--cn-brand)',
                        borderRadius:'8px',padding:'5px 10px',cursor:loadingCloud?'default':'pointer',
                        fontSize:'11px',fontWeight:'700',color:'var(--cn-brand)',whiteSpace:'nowrap'}}>
                {loadingCloud ? 'вҸі' : 'вҳҒпёҸ л¶Ҳлҹ¬мҳӨкё°'}
              </button>
              <button onClick={onClose} style={{background:'var(--divider)',border:'none',borderRadius:'8px',width:'32px',height:'32px',cursor:'pointer',fontSize:'14px'}}>вң•</button>
            </div>
          </div>

          {/* в”Җв”Җ нҒҙлқјмҡ°л“ң лЎңл“ң л©”мӢңм§Җ в”Җв”Җ */}
          {loadMsg && (
            <div style={{background: loadMsg.startsWith('вң…')||loadMsg.startsWith('рҹ”Қ')?'var(--cn-ok-100)':loadMsg.startsWith('вқҢ')?'var(--cn-danger-100)':'var(--cn-warn-100)',
                         border:`1px solid ${loadMsg.startsWith('вң…')||loadMsg.startsWith('рҹ”Қ')?'var(--cn-ok)':loadMsg.startsWith('вқҢ')?'var(--cn-danger)':'var(--cn-warn)'}`,
                         borderRadius:'8px',padding:'8px 12px',marginBottom:'10px',fontSize:'13px',fontWeight:'600',

  /* в”Җв”Җ лЎңк·ёмқё / нҡҢмӣҗк°Җмһ… нҷ”л©ҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
  const LoginScreen = ({ onBack, initialMode }) => {
    const dm = _dm;

    // л№„л°ҖлІҲнҳё к°•лҸ„ мІҙнҒ¬
    const pwChecks = {
      len:     password.length >= 8,
      letter:  /[a-zA-Z]/.test(password),
      number:  /[0-9]/.test(password),
      special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(password),

    const pwStrong = Object.values(pwChecks).every(Boolean);
    const pwMatch  = password === password2 && password2.length > 0;

    // мқҙл©”мқј мӨ‘ліө нҷ•мқё
    const checkEmail = async () => {
      if (!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
        setError('мҳ¬л°”лҘё мқҙл©”мқј нҳ•мӢқмқ„ мһ…л Ҙн•ҙ мЈјм„ёмҡ”.'); return;
      }
      setEmailChecking(true); setEmailChecked(null); setError('');
      // RLS м Ғмҡ© нӣ„: н”„лЎңн•„ м§Ғм ‘ мЎ°нҡҢлҠ” л§үнһҲлҜҖлЎң SECURITY DEFINER н•ЁмҲҳлЎң мЎҙмһ¬ м—¬л¶Җл§Ң нҷ•мқё
      const { data: exists } = await supa.rpc('email_exists', { p_email: email });
      setEmailChecking(false);
      if (exists) { setEmailChecked('dup'); setError('мқҙлҜё к°Җмһ…лҗң мқҙл©”мқјмқҙм—җмҡ”. лЎңк·ёмқён•ҙ мЈјм„ёмҡ”.'); }
      else        { setEmailChecked('ok'); }
    };

    const handleSubmit = async (e) => {
      e.preventDefault();
      setBusy(true); setError(''); setMessage('');
      try {
        if (mode === 'login') {
          const { error } = await supa.auth.signInWithPassword({ email, password });
          if (error) throw error;
        } else {
          if (!name.trim())   throw new Error('мқҙлҰ„мқ„ мһ…л Ҙн•ҙ мЈјм„ёмҡ”.');
          if (!phone.trim())  throw new Error('м „нҷ”лІҲнҳёлҘј мһ…л Ҙн•ҙ мЈјм„ёмҡ”.');
          if (emailChecked !== 'ok') throw new Error('мқҙл©”мқј мӨ‘ліө нҷ•мқёмқ„ н•ҙ мЈјм„ёмҡ”.');
          if (!pwStrong)      throw new Error('л№„л°ҖлІҲнҳё мЎ°кұҙмқ„ нҷ•мқён•ҙ мЈјм„ёмҡ”.');
          if (!pwMatch)       throw new Error('л№„л°ҖлІҲнҳёк°Җ мқјм№ҳн•ҳм§Җ м•Ҡм•„мҡ”.');
          const { error } = await supa.auth.signUp({
            email, password,
            options: { data: { name: name.trim(), phone: phone.trim(), height: signupHeight || null } }
          });
          if (error) throw error;
          setMessage('вң… к°Җмһ… нҷ•мқё мқҙл©”мқјмқ„ ліҙлғҲм–ҙмҡ”. мқҙл©”мқјмқ„ нҷ•мқён•ҳкі  л§ҒнҒ¬лҘј нҒҙлҰӯн•ҙ мЈјм„ёмҡ”.');
        }
      } catch(e) {
        const msg = e.message || 'мҳӨлҘҳк°Җ л°ңмғқн–Ҳм–ҙмҡ”.';
        setError(
          msg.includes('Invalid login')      ? 'мқҙл©”мқј лҳҗлҠ” л№„л°ҖлІҲнҳёк°Җ мҳ¬л°”лҘҙм§Җ м•Ҡм•„мҡ”.' :
          msg.includes('already registered') ? 'мқҙлҜё к°Җмһ…лҗң мқҙл©”мқјмқҙм—җмҡ”. лЎңк·ёмқён•ҙ мЈјм„ёмҡ”.' :
          msg.includes('Password should')    ? 'л№„л°ҖлІҲнҳё мЎ°кұҙмқ„ нҷ•мқён•ҙ мЈјм„ёмҡ”.' : msg
        );
      }
      setBusy(false);
    };

    const handleGoogle = async () => {
      setBusy(true); setError('');
      // мӣ№: кё°мЎҙ лҰ¬л””л үм…ҳ л°©мӢқ
      if (!_isNativeApp) {
        const { error } = await supa.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + window.location.pathname }

        if (error) { setError(error.message); setBusy(false); }
        return;
      }
      // л„ӨмқҙнӢ°лёҢ м•ұ(iOS): мӮ¬нҢҢлҰ¬лЎң мқҙнғҲн•ҳм§Җ м•Ҡкі  м•ұ м•Ҳм—җм„ң мІҳлҰ¬
      try {
        const Cap     = window.Capacitor;
        const Oauth   = Cap.Plugins?.Oauth;      // ASWebAuthenticationSession (мқём•ұ + м»ӨмҠӨн…Җ мҠӨнӮҙ мҪңл°ұ мһҗлҸҷ мҲҳмӢ )
        const Browser = Cap.Plugins?.Browser;    // нҸҙл°ұ: @capacitor/browser
        const CapApp  = Cap.Plugins?.App;         // нҸҙл°ұ: л”Ҙл§ҒнҒ¬ мҲҳмӢ 
        const redirectTo = 'carenote://login-callback';
        const { data, error } = await supa.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo, skipBrowserRedirect: true }
        });
        if (error) throw error;

        // мҪңл°ұ URL(carenote://login-callback?code=...)м—җм„ң м„ём…ҳ көҗнҷҳ
        const exchange = async (url) => {
          const params = new URLSearchParams(url.split('?')[1] || '');
          const code = params.get('code');
          if (code) {
            const { error: exErr } = await supa.auth.exchangeCodeForSession(code);
            if (exErr) throw exErr;
            return;
          }
          const hp = new URLSearchParams(url.split('#')[1] || '');
          const at = hp.get('access_token'), rt = hp.get('refresh_token');
          if (at && rt) {
            const { error: setErr } = await supa.auth.setSession({ access_token: at, refresh_token: rt });
            if (setErr) throw setErr;
            return;
          }
          throw new Error(params.get('error_description') || 'мқёмҰқ м •ліҙлҘј л°ӣм§Җ лӘ»н–Ҳм–ҙмҡ”.');
        };

        // в”Җв”Җ кё°ліё: ASWebAuthenticationSession (лЎңк·ёмқё нӣ„ м•ұмңјлЎң мһҗлҸҷ ліөк·Җ) в”Җв”Җ
        if (Oauth && Oauth.authenticate) {
          const withTimeout = (p, ms, label) => Promise.race([
            p, new Promise((_, rej) => setTimeout(() => rej(new Error('мӢңк°„мҙҲкіј(' + label + ')')), ms))
          ]);
          try {
            setMessage('в‘  лЎңк·ёмқё м°Ҫ м—¬лҠ” мӨ‘вҖҰ');
            console.log('[gauth] authenticate start');
            const res = await Oauth.authenticate({ url: data.url, callbackScheme: 'carenote' });
            console.log('[gauth] callback url =', res && res.url);
            if (!res || !res.url) throw new Error('мҪңл°ұ URLмқ„ л°ӣм§Җ лӘ»н–Ҳм–ҙмҡ”.');
            setMessage('в‘Ў лЎңк·ёмқё мҷ„лЈҢ вҖ” м„ём…ҳ нҷ•мқё мӨ‘вҖҰ');
            await withTimeout(exchange(res.url), 15000, 'м„ём…ҳ көҗнҷҳ');
            console.log('[gauth] session ok');
            setMessage('');
          } catch (e) {
            console.log('[gauth] error =', e && (e.message || e), '| code =', e && e.code);
            setMessage('');
            if (!(e && (e.code === 'CANCELLED' || /cancel/i.test(e.message || '')))) {
              setError('кө¬кёҖ лЎңк·ёмқё мҳӨлҘҳ: ' + (e && (e.message || e)));
            }
          } finally {
            setBusy(false);
          }
          return;
        }

        // в”Җв”Җ нҸҙл°ұ: н”Ңлҹ¬к·ёмқё лҜёл№Ңл“ң мӢң мқём•ұ лёҢлқјмҡ°м Җ + л”Ҙл§ҒнҒ¬ в”Җв”Җ
        let done = false, appSub = null, brwSub = null;
        const cleanup = () => {
          try { appSub && appSub.remove(); } catch (_) {}
          try { brwSub && brwSub.remove(); } catch (_) {}
        };
        appSub = await CapApp.addListener('appUrlOpen', async ({ url }) => {
          if (done || !url || url.indexOf(redirectTo) !== 0) return;
          done = true;
          try { if (Browser) await Browser.close(); } catch (_) {}
          try { await exchange(url); }
          catch (e) { setError('кө¬кёҖ лЎңк·ёмқё мІҳлҰ¬ мӨ‘ мҳӨлҘҳ: ' + (e.message || e)); }
          finally { cleanup(); setBusy(false); }
        });
        if (Browser) {
          brwSub = await Browser.addListener('browserFinished', () => {
            if (!done) { cleanup(); setBusy(false); }
          });
          await Browser.open({ url: data.url });
        } else {
          window.location.href = data.url;
        }
      } catch (e) {
        setError(e.message || 'кө¬кёҖ лЎңк·ёмқё мҳӨлҘҳ');
        setBusy(false);
      }
    };

    const borderCol = dm ? 'var(--card-border)' : 'var(--card-border)';

          )}

          {/* лЎңкі  мҳҒм—ӯ */}
          <div style={{ textAlign:'center', marginBottom:'28px' }}>
            {/* л§ҲмҠӨмҪ”нҠё мәҗлҰӯн„° */}
            <div style={{ display:'inline-flex', alignItems:'center', justifyContent:'center',
                          width:'150px', height:'150px', borderRadius:'50%',
                          background:'radial-gradient(circle at 50% 40%, #ffffff 0%, #eef3fb 75%, #e2e9f5 100%)',
                          marginBottom:'6px', boxShadow:'0 10px 30px rgba(15,23,42,0.35)', overflow:'hidden' }}>
              <img src="mascot.png" alt="мјҖм–ҙл…ёнҠё мәҗлҰӯн„°" style={{ width:'244px', height:'244px', objectFit:'cover', objectPosition:'center 2%' }}/>
            </div>
            <div style={{ fontSize:'28px', fontWeight:'900', letterSpacing:'2px',
                          background:'linear-gradient(90deg,var(--cn-brand),var(--cn-ok))',
                          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
                          marginBottom:'6px' }}>CARENOTE</div>
            <div style={{ fontSize:'14px', color: dm ? 'rgba(148,163,184,0.9)' : 'var(--text-sub)',

            <div style={{ fontSize:'11px', marginTop:'6px', color:'var(--text-mute)' }}>{APP_BUILD}</div>
          </div>

          {/* лӢЁм¶•м–ҙ лҚ°мқҙн„° мҲҳмӢ  м•ҢлҰј */}
          {(() => {

                if (p.bp?.sys) items.push(`рҹ’“ нҳҲм•• ${p.bp.sys}/${p.bp.dia}`);
                if (!items.length) return null;
                return (
                  <div style={{ background: dm?'rgba(16,185,129,0.15)':'#ecfdf5', border:'1px solid var(--cn-ok)',
                                borderRadius:'12px', padding:'12px 14px', marginBottom:'20px', textAlign:'center' }}>

              }
            } catch {}
            return null;
          })()}

          {/* нғӯ */}
