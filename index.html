<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CARENOTE – 내 몸을 기록하는 노트</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <!-- 러닝 트래커 지도 (Leaflet + OpenStreetMap) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    /* 제목용 Gmarket Sans (본문은 Pretendard) */
    @font-face { font-family:'GmarketSans'; font-weight:700; font-display:swap;
      src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff'); }
    @font-face { font-family:'GmarketSans'; font-weight:500; font-display:swap;
      src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff'); }
    :root {
      --font-title: 'GmarketSans', 'Pretendard', -apple-system, sans-serif;
      /* CARENOTE Design Tokens v2.0 */
      --cn-brand:        #2F6BFF;
      --cn-brand-600:    #1F4FD9;
      --cn-brand-100:    #EAF1FF;
      --cn-ink:          #0B1B3B;
      --cn-ok:           #10B981;
      --cn-ok-100:       #E6FAF4;
      --cn-warn:         #F59E0B;
      --cn-warn-100:     #FFF7E0;
      --cn-danger:       #EF4444;
      --cn-danger-100:   #FFECEC;
      --cn-low:          #8B5CF6;
      --cn-low-100:      #F3EDFF;
      --bg:              #F4F6FB;
      --bg-soft:         #ECF0F8;
      --card-bg:         #FFFFFF;
      --card-border:     #E5EAF2;
      --card-shadow:     0 1px 2px rgba(11,27,59,0.04), 0 4px 16px rgba(11,27,59,0.05);
      --text:            #0B1B3B;
      --text-sub:        #5B6B85;
      --text-mute:       #8C98AD;
      --input-bg:        var(--input-bg);
      --input-border:    #E5EAF2;
      --divider:         #EEF1F6;
      --chart-grid:      rgba(11,27,59,0.08);
      --chart-axis:      #8C98AD;
      --modal-scrim:     rgba(11,27,59,0.55);
      --font-num: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    }
    body.dark {
      --cn-brand:        #5B8CFF;
      --cn-brand-600:    #3A6FE8;
      --cn-brand-100:    #12244A;
      --cn-ink:          #E8EEF9;
      --cn-ok:           #34D399;
      --cn-ok-100:       #06281D;
      --cn-warn:         #FBBF24;
      --cn-warn-100:     #2A1F00;
      --cn-danger:       #FB7185;
      --cn-danger-100:   #2A0B10;
      --cn-low:          #A78BFA;
      --cn-low-100:      var(--cn-low-100);
      --bg:              #000000;
      --bg-soft:         #050507;
      --card-bg:         #0A0A0F;
      --card-border:     #1C1F28;
      --card-shadow:     0 1px 2px rgba(0,0,0,0.6), 0 6px 20px rgba(0,0,0,0.5);
      --text:            #F2F5FA;
      --text-sub:        #A0ABC0;
      --text-mute:       #6B7689;
      --input-bg:        #0D0F15;
      --input-border:    #1C1F28;
      --divider:         #161923;
      --chart-grid:      rgba(255,255,255,0.06);
      --chart-axis:      #6B7689;
      --modal-scrim:     rgba(0,0,0,0.82);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { margin: 0; padding: 0; overflow-x: clip; max-width: 100%; overscroll-behavior-y: none; }
    body {
      margin: 0; padding: 0;
      overflow-x: hidden;
      overscroll-behavior-y: none;      /* iOS 고무줄 바운스 방지 */
      touch-action: pan-y;              /* 세로 스크롤만 허용 — 좌우 이동·더블탭 줌 차단 */
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      max-width: 100%;
      width: 100%;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      word-break: keep-all;
      transition: background 0.25s, color 0.25s;
    }
    h1, h2, h3, .cn-section-title, .cn-card-title { font-family: var(--font-title); letter-spacing: -0.2px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
    input, textarea, select { font-family: inherit; font-size: inherit; }
    button { font-family: inherit; }
    .med-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--cn-brand); flex-shrink: 0; }
    .chart-wrap { position: relative; height: 200px; }
    .cn-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      margin-bottom: 18px;
      transition: background 0.25s, border-color 0.25s;
    }
    .cn-divider { border-color: var(--divider); }

    /* ── 다크모드 포괄 오버라이드 ── */
    body.dark input,
    body.dark textarea,
    body.dark select {
      background: var(--input-bg) !important;
      color: var(--text) !important;
      border-color: var(--input-border) !important;
      color-scheme: dark;
    }
    body.dark input::placeholder,
    body.dark textarea::placeholder { color: var(--text-sub) !important; opacity: 1 !important; }

    /* ── 혈압 숫자 입력 — iOS Safari 블랙 배경 방지 ── */
    .bp-num-input {
      background: transparent !important;
      -webkit-appearance: none;
      appearance: none;
      color-scheme: inherit;
    }
    body:not(.dark) .bp-num-input {
      background: transparent !important;
      color-scheme: light;
    }
    body.dark .bp-num-input {
      background: transparent !important;
      color-scheme: dark;
    }

    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr !important; } }

    /* 혈당 입력 스피너 제거 (숫자와 단위 겹침 방지) */
    .bs-num-input::-webkit-inner-spin-button,
    .bs-num-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .bs-num-input { -moz-appearance: textfield; }
  .cn-num, .cn-num * { font-family: var(--font-num) !important; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }

  /* ── Tab Navigation System ── */
  /* 기본: 모바일에서 모든 Card는 숨김. data-current-tab과 매치되는 것만 표시 */
  @media (max-width: 1023px) {
    body[data-current-tab] .cn-card[data-tab]:not([data-tab=""]) { display: none; }
    /* !important 필수: :not() 때문에 숨기는 규칙의 CSS 특이성이 더 높아서 덮어씌워짐 방지 */
    body[data-current-tab="home"]      .cn-card[data-tab="home"]      { display: block !important; }
    body[data-current-tab="record"]    .cn-card[data-tab="record"]    { display: block !important; }
    body[data-current-tab="report"]    .cn-card[data-tab="report"]    { display: block !important; }
    body[data-current-tab="challenge"] .cn-card[data-tab="challenge"] { display: block !important; }
    body[data-current-tab="profile"]   .cn-card[data-tab="profile"]   { display: block !important; }
    /* 모바일에서 RIGHT 컬럼이 별도 보이지 않도록 그리드 단일컬럼 */
    .main-grid { grid-template-columns: 1fr !important; gap: 12px !important; }
    /* 날짜 이동은 기록 탭에서만 의미있게 보이게, 다른 탭에선 전역 표시 유지 OK */
  }
  .cn-tab-only-mobile { display: block; }
  @media (min-width: 1024px) { .cn-tab-only-mobile { display: none; } }
  .cn-tabbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card-bg);
    border-top: 1px solid var(--card-border);
    display: grid; grid-template-columns: repeat(5, 1fr);
    z-index: 100; padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    box-shadow: 0 -2px 14px rgba(0,0,0,0.10);
    overflow: visible;
  }
  .cn-tab-btn {
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 8px 2px; color: var(--text-mute);
    font-size: 13px; font-weight: 700; font-family: inherit;
    transition: color 0.15s ease;
  }
  .cn-tab-btn svg { width: 28px; height: 28px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .cn-tab-btn.active { color: var(--cn-brand); }
  .cn-tab-btn:hover { color: var(--text); }
  .cn-tab-btn.active:hover { color: var(--cn-brand); }
  /* 중앙 '기록' 버튼 — 크고 도드라지게 (어르신 접근성) */
  .cn-tab-center { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
  .cn-tab-center-btn {
    position: absolute; left: 50%; top: -26px; transform: translateX(-50%);
    width: 68px; height: 68px; border-radius: 50%;
    background: linear-gradient(135deg, var(--cn-brand), var(--cn-brand-600));
    border: 5px solid var(--card-bg);
    box-shadow: 0 6px 18px rgba(47,107,255,0.5);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
    transition: transform 0.15s ease;
  }
  .cn-tab-center-btn:active { transform: translateX(-50%) scale(0.94); }
  .cn-tab-center-btn svg { width: 34px; height: 34px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .cn-tab-center-label { font-size: 13px; font-weight: 800; color: var(--cn-brand); margin-top: 46px; white-space: nowrap; }
  body.has-tabbar { padding-bottom: calc(76px + env(safe-area-inset-bottom, 0px)); }
  /* 데스크톱에서는 탭바 숨기고 기존 레이아웃 유지 */
  @media (min-width: 1024px) {
    .cn-tabbar { display: none; }
    body.has-tabbar { padding-bottom: 0; }
    .cn-tab-content { display: block !important; }
    .main-grid { display: grid !important; }
    /* 데스크탑 전용 사이드바 리포트 */
    .cn-sidebar-report { display: block !important; }
    /* 리포트 탭 카드는 데스크탑에서 사이드바로 대체 → 숨김 */
    .cn-report-tab-only { display: none !important; }
  }
  @media (max-width: 1023px) {
    /* 모바일에서 사이드바 리포트 숨김 (탭으로 보임) */
    .cn-sidebar-report { display: none !important; }
    .cn-report-tab-only { display: block; }
    /* 모바일에서 sticky 해제 */
    .cn-sidebar-right { position: static !important; max-height: none !important; overflow-y: visible !important; }
  }
  /* 사이드바 리포트 */
  .cn-sidebar-report { display: block; }
  .cn-sidebar-right { display: block; }
  /* 헤더 날짜: 기본(데스크탑)은 전체 형식, 모바일은 연도 생략형 */
  .cn-hdr-date-md { display: none; }
  @media (max-width: 1023px) {
    .main-grid { grid-template-columns: 1fr !important; gap: 10px !important; }
    .main-grid > * { min-width: 0 !important; }
    /* 헤더: 모바일에서 불필요한 요소 숨김 */
    .cn-hdr-user    { display: none !important; }
    .cn-hdr-dark    { display: none !important; }
    .cn-hdr-sub     { display: none !important; }
    .cn-hdr-actions { display: none !important; }
    .cn-hdr-logo    { width: 40px !important; height: 40px !important; }
    .cn-hdr-logo svg { width: 40px !important; height: 40px !important; }
    .cn-hdr-title   { font-size: 22px !important; letter-spacing: 0.5px !important; }
    /* 모바일: 날짜는 연도 생략형으로 */
    .cn-hdr-date-full { display: none !important; }
    .cn-hdr-date-md   { display: inline !important; }
    /* 모바일 좌우 여백 — vw 기반으로 화면 크기에 비례 (3vw = 390px에서 약 12px) */
    .cn-main-pad    { padding: 10px 4vw !important; width: 100% !important; box-sizing: border-box !important; }
    .cn-card        { padding: 18px 4vw !important; border-radius: 16px !important; margin-bottom: 14px !important; min-width: 0 !important; width: 100% !important; box-sizing: border-box !important; }
    /* 탭바 높이 및 safe-area */
    .cn-tabbar {
      padding-bottom: env(safe-area-inset-bottom, 0px);
      height: auto;
    }
  }
  .cn-challenge-card {
    background: linear-gradient(135deg, var(--cn-brand-100), var(--card-bg));
    border: 1px solid var(--cn-brand);
    border-radius: 12px; padding: 10px 14px; margin-bottom: 8px;
  }
  /* 배지 제거됨 */
  .cn-streak-big { font-family: var(--font-num); font-size: 34px; font-weight: 700; color: var(--cn-brand); line-height: 1; letter-spacing: -0.02em; }
  /* 배지 CSS 제거됨 */

  /* ── 대시보드 홈탭 추가 스타일 ── */
  .dash-score-card { background: linear-gradient(135deg, var(--card-bg) 0%, var(--bg-soft) 100%); border: 1px solid var(--card-border); border-radius: 16px; padding: 18px; margin-bottom: 14px; display: flex; align-items: center; gap: 18px; box-shadow: var(--card-shadow); }
  .dash-score-info { flex: 1; }
  .dash-score-title { font-family: var(--font-title); font-size: 15px; font-weight: 700; color: var(--text-sub); margin-bottom: 4px; letter-spacing: -0.2px; }
  .dash-score-breakdown { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
  .dash-score-row { display: flex; align-items: center; gap: 6px; }
  .dash-score-bar-bg { flex: 1; height: 5px; background: var(--bg-soft); border-radius: 3px; border: 1px solid var(--card-border); overflow: hidden; }
  .dash-score-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .dash-metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .dash-metric-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 18px; padding: 18px 14px; box-shadow: var(--card-shadow); display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; }
  .dash-metric-head { display: flex; flex-direction: column; align-items: center; gap: 7px; margin-bottom: 2px; }
  .dash-metric-emoji { font-size: 30px; line-height: 1; }
  /* 3D 아이콘 칩 — 크게, 안 잘리게 (밝은 배경이라 라이트/다크 모두 자연스럽게) */
  .dash-ic-chip { width: 56px; height: 56px; border-radius: 16px; background: radial-gradient(circle at 50% 38%, #ffffff 0%, #eef2f8 92%); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 1px 4px rgba(11,27,59,0.10); }
  .dash-ic-chip img { width: 48px; height: 48px; object-fit: contain; }
  /* 섹션 제목용 큰 아이콘 칩 */
  .stitle-chip { width: 46px; height: 46px; border-radius: 14px; background: radial-gradient(circle at 50% 38%, #ffffff 0%, #eef2f8 92%); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 1px 4px rgba(11,27,59,0.10); }
  .stitle-chip img { width: 40px; height: 40px; object-fit: contain; }
  /* 소제목 미니 아이콘 칩 */
  .mini-ic-chip { width: 36px; height: 36px; border-radius: 11px; background: radial-gradient(circle at 50% 38%, #ffffff 0%, #eef2f8 92%); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 1px 3px rgba(11,27,59,0.08); }
  .mini-ic-chip img { width: 30px; height: 30px; object-fit: contain; }
  .dash-metric-label { font-size: 14px; font-weight: 800; color: var(--text-sub); }
  .dash-metric-val { font-size: 30px; font-weight: 900; line-height: 1.05; letter-spacing: -0.5px; }
  .dash-metric-unit { font-size: 13px; color: var(--text-mute); font-weight: 600; }
  .dash-trend { display: inline-flex; align-items: center; gap: 2px; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
  .dash-trend-up { background: rgba(239,68,68,0.12); color: var(--cn-danger); }
  .dash-trend-dn { background: rgba(16,185,129,0.12); color: var(--cn-ok); }
  .dash-trend-st { background: var(--cn-brand-100); color: var(--cn-brand); }
  .dash-insight-card { background: linear-gradient(135deg, var(--cn-brand-100), var(--bg-soft)); border: 1px solid var(--cn-brand); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .dash-insight-text { font-size: 13px; line-height: 1.7; color: var(--text); }
  .dash-steps-bars { display: flex; align-items: flex-end; gap: 5px; height: 56px; }
  .dash-step-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .dash-step-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height 0.4s; }
  .dash-step-day { font-size: 9px; color: var(--text-mute); }

  /* ── 모바일 탭별 최적화 (max-width: 600px) ── */
  @media (max-width: 600px) {

    /* ─ 홈 탭 (카드 너비·모서리·간격을 cn-card와 통일) ─ */
    .dash-score-card {
      padding: 18px 4vw !important;
      gap: 12px !important;
      margin-bottom: 14px !important;
      border-radius: 16px !important;
      width: 100% !important;
      box-sizing: border-box !important;
    }
    .dash-score-breakdown { gap: 4px !important; margin-top: 8px !important; }
    .dash-metric-grid { gap: 12px !important; margin-bottom: 14px !important; width: 100% !important; box-sizing: border-box !important; }
    .dash-metric-card { padding: 16px 14px !important; border-radius: 16px !important; gap: 4px !important; box-sizing: border-box !important; }
    /* 어르신 접근성: 핵심 수치·라벨 키움 */
    .dash-metric-emoji { font-size: 24px !important; }
    .dash-metric-val  { font-size: 28px !important; }
    .dash-metric-label { font-size: 14px !important; }
    .dash-metric-unit  { font-size: 12px !important; }
    .dash-insight-card { padding: 12px 14px !important; margin-bottom: 8px !important; border-radius: 10px !important; }
    .dash-insight-text { font-size: 15px !important; line-height: 1.7 !important; }
    .dash-steps-bars   { height: 44px !important; gap: 4px !important; }
    .dash-step-day     { font-size: 9px !important; }

    /* ─ 기록 탭: 혈당 입력 ─ */
    .bs-num-input { font-size: 30px !important; }
    .bs-input-wrap { width: 58px !important; }
    /* ─ 기록 탭: 혈압 입력 ─ */
    .bp-num-input { font-size: 34px !important; background: transparent !important; color-scheme: inherit; -webkit-appearance: none; }
    /* ─ 기록 탭: 혈압 범례 축소 ─ */
    .bp-legend { font-size: 10px !important; gap: 5px !important; margin-bottom: 10px !important; }

    /* ─ 리포트 탭: 차트 높이 줄임 ─ */
    .chart-wrap { height: 160px !important; }

    /* ─ 챌린지 탭 ─ */
    .cn-challenge-card { padding: 10px 12px !important; }

  const parseAppleHealthXML = async (getChunks, totalBytes, onProgress) => {
    const glucoseByDay = {};
    const weightByDay  = {};
    const bodyFatByDay = {};
    const bpSysByDay   = {}; // 수축기 혈압
    const bpDiaByDay   = {}; // 이완기 혈압
    const stepsByDay   = {}; // 걸음수 (하루 합산)

    const distByDay    = {}; // 걷기+달리기 거리 (하루 합산, km)

    const TARGET_KEYS = {
      'HKQuantityTypeIdentifierBloodGlucose':              'glucose',
      'HKQuantityTypeIdentifierBodyMass':                   'weight',
      'HKQuantityTypeIdentifierBodyFatPercentage':          'fat',
      'HKQuantityTypeIdentifierBloodPressureSystolic':      'bp_sys',
      'HKQuantityTypeIdentifierBloodPressureDiastolic':     'bp_dia',
      'HKQuantityTypeIdentifierStepCount':                  'steps',
      'HKQuantityTypeIdentifierActiveEnergyBurned':         'cal',
      'HKQuantityTypeIdentifierBasalEnergyBurned':          'bcal',
      'HKQuantityTypeIdentifierDistanceWalkingRunning':     'dist',
    };

    const processRecord = (rec) => {
      let type = null;
      for (const [k, t] of Object.entries(TARGET_KEYS)) {
        if (rec.includes(k)) { type = t; break; }
      }
      if (!type) return;
      const val  = parseFloat((rec.match(/\bvalue="([^"]+)"/) || [])[1]);
      const unit = (rec.match(/\bunit="([^"]+)"/) || [])[1] || '';
      const dm   = rec.match(/\bstartDate="(\d{4}-\d{2}-\d{2})\s+(\d{2}):(\d{2})/);
      if (!dm || isNaN(val)) return;
      const dayKey = dm[1];
      const hour   = parseInt(dm[2]) + parseInt(dm[3]) / 60;
      if (type === 'glucose') {
        const mgdl = unit === 'mmol/L' ? Math.round(val * 18.015) : Math.round(val);
        if (!glucoseByDay[dayKey]) glucoseByDay[dayKey] = [];
        glucoseByDay[dayKey].push({ hour, value: mgdl });
      } else if (type === 'weight') {
        const kg = unit === 'lb' ? Math.round(val * 0.453592 * 10) / 10 : Math.round(val * 10) / 10;
        weightByDay[dayKey] = kg;
      } else if (type === 'fat') {
        bodyFatByDay[dayKey] = val <= 1 ? Math.round(val * 100 * 10) / 10 : Math.round(val * 10) / 10;
      } else if (type === 'bp_sys') {
        // 같은 날 여러 번 측정 시 가장 마지막(hour 기준) 값 사용
        if (!bpSysByDay[dayKey] || hour > bpSysByDay[dayKey].hour)
          bpSysByDay[dayKey] = { hour, value: Math.round(val) };
      } else if (type === 'bp_dia') {
        if (!bpDiaByDay[dayKey] || hour > bpDiaByDay[dayKey].hour)
          bpDiaByDay[dayKey] = { hour, value: Math.round(val) };
      } else if (type === 'steps') {
        // 걸음수: 하루 여러 샘플을 합산
        stepsByDay[dayKey] = (stepsByDay[dayKey] || 0) + Math.round(val);
      } else if (type === 'cal') {
        // 활성 칼로리: 합산 (kcal 단위로 저장)
        const kcal = unit === 'kJ' ? val / 4.184 : val;
        calByDay[dayKey] = Math.round(((calByDay[dayKey] || 0) + kcal));
      } else if (type === 'bcal') {
        // 기초대사량: 합산 (kcal 단위로 저장) — Apple Watch가 시간대별로 쪼개서 저장함
        const kcal = unit === 'kJ' ? val / 4.184 : val;
        bcalByDay[dayKey] = Math.round(((bcalByDay[dayKey] || 0) + kcal));
      } else if (type === 'dist') {
        // 거리: 합산 (km 단위로 저장)
        const km = unit === 'mi' ? val * 1.60934 : (unit === 'm' ? val / 1000 : val);
        distByDay[dayKey] = Math.round(((distByDay[dayKey] || 0) + km) * 100) / 100;
      }
    };

    let tail = '';           // 이전 청크에서 잘린 불완전한 레코드
    let bytesProcessed = 0;
    let recCount = 0;

    for await (const chunk of getChunks()) {
      const text = tail + chunk;
      let pos = 0;
      let lastEnd = 0;

      while (true) {
        const recStart = text.indexOf('<Record', pos);
        if (recStart === -1) break;
        const recEnd = text.indexOf('/>', recStart);
        if (recEnd === -1) break; // 청크 경계에서 잘린 레코드 → tail로 보관

        const rec = text.substring(recStart, recEnd + 2);
        if (Object.keys(TARGET_KEYS).some(k => rec.includes(k))) processRecord(rec);
        lastEnd = recEnd + 2;
        pos = lastEnd;
        recCount++;
        // 매 50건마다 브라우저에 양보 (UI 반응성 유지)
        if (recCount % 50 === 0) await new Promise(r => setTimeout(r, 0));
      }

      // 마지막 완전한 레코드 이후 텍스트를 다음 청크로 넘김
      tail = text.substring(lastEnd);
      if (tail.length > 30000) tail = tail.slice(-30000); // 안전장치

      bytesProcessed += chunk.length;
      if (onProgress && totalBytes) {
        onProgress(Math.min(99, Math.round(bytesProcessed / totalBytes * 100)));
      }
    }

    // 수축기/이완기 쌍이 모두 있는 날만 혈압으로 저장
    const bpByDay = {};

      }
    });

    return { glucoseByDay, weightByDay, bodyFatByDay, bpByDay, stepsByDay, calByDay, bcalByDay, distByDay };
  };

        }
      }
    }

    onProgress && onProgress('완료');
    return { weightByDay, bodyFatByDay, bpByDay, stepsByDay, calByDay, distByDay };
  };

  // ── Google Fit Takeout ZIP 파서 ──────────────────────────────────────────
  const parseGoogleFitZip = async (file, onProgress) => {
    if (typeof JSZip === 'undefined') throw new Error('ZIP 라이브러리 로드 실패. 인터넷 연결을 확인해 주세요.');
    onProgress && onProgress('ZIP 압축 해제 중...');
    const zip = await JSZip.loadAsync(file);
    const allFiles = Object.keys(zip.files);

    // Google 테이크아웃 구조:
    //   Takeout/Fit/Daily activity metrics/Daily activity metrics - YYYY-MM-DD.csv
    const metricFiles = allFiles.filter(n =>
      /daily.activity.metrics.*\d{4}-\d{2}-\d{2}\.csv$/i.test(n)
    );

    if (!metricFiles.length) {
      const csvFiles = allFiles.filter(n => n.endsWith('.csv')).slice(0, 10).join('\n');
      throw new Error(
        `Google Fit 일별 활동 파일을 찾을 수 없어요.\n` +
        `발견된 CSV:\n${csvFiles || '없음'}\n\n` +
        `Google 테이크아웃(takeout.google.com) → Fit만 선택해서 내보낸 ZIP인지 확인해 주세요.`
      );
    }

    const stepsByDay = {};
    const calByDay   = {};
    const distByDay  = {};

    onProgress && onProgress(`걸음수·칼로리·거리 분석 중... (${metricFiles.length}개 파일)`);

    for (const fname of metricFiles) {
      // 파일명에서 날짜 추출: ...YYYY-MM-DD.csv
      const dateMatch = fname.match(/(\d{4}-\d{2}-\d{2})\.csv$/i);
      if (!dateMatch) continue;
      const dayKey = dateMatch[1];

      const csvText = await zip.files[fname].async('string');
      const lines = csvText.split('\n').map(l => l.trim()).filter(Boolean);
      if (lines.length < 2) continue;

      const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
      const dataRow  = lines[1].split(',').map(c => c.trim().replace(/"/g, ''));

      const iStep = headers.findIndex(h => /step.count/i.test(h));
      const iCal  = headers.findIndex(h => /calories.*kcal|kcal/i.test(h));
      // Google Fit은 미터(m) 단위로 거리 기록
      const iDist = headers.findIndex(h => /distance.*\(m\)|^distance$/i.test(h));

      if (iStep >= 0) {
        const v = parseInt(dataRow[iStep]);
        if (!isNaN(v) && v > 0) stepsByDay[dayKey] = (stepsByDay[dayKey] || 0) + v;
      }
      if (iCal >= 0) {
        const v = parseFloat(dataRow[iCal]);
        if (!isNaN(v) && v > 0) calByDay[dayKey] = Math.round((calByDay[dayKey] || 0) + v);
      }
      if (iDist >= 0) {
        const v = parseFloat(dataRow[iDist]);
        // m → km 변환
        if (!isNaN(v) && v > 0) distByDay[dayKey] = Math.round(((distByDay[dayKey] || 0) + v / 1000) * 100) / 100;
      }
    }

    onProgress && onProgress('완료');
    return { glucoseByDay: {}, weightByDay: {}, bodyFatByDay: {}, bpByDay: {}, stepsByDay, calByDay, distByDay };
  };

  const buildDashboardData = ({ glucoseByDay, weightByDay, bodyFatByDay = {}, bpByDay = {},
                                 stepsByDay = {}, calByDay = {}, bcalByDay = {}, distByDay = {} }) => {
    const result = {};
    Object.entries(glucoseByDay).forEach(([day, readings]) => {
      const bs = {};
      TIME_WINDOWS.forEach(w => {
        const inWin = readings.filter(r => r.hour >= w.startH && r.hour < w.endH).map(r => r.value);
        const med = median(inWin);
        if (med) bs[w.id] = String(med);
      });
      if (Object.keys(bs).length) { result[day] = result[day] || emptyDay(); result[day].bs = bs; }
    });
    Object.entries(weightByDay).forEach(([day, weight]) => {
      result[day] = result[day] || emptyDay();
      result[day].weight = String(Math.round(weight * 100) / 100);
    });
    Object.entries(bodyFatByDay).forEach(([day, bodyFat]) => {
      result[day] = result[day] || emptyDay();
      result[day].bodyFat = String(bodyFat);
    });
    Object.entries(bpByDay).forEach(([day, bp]) => {
      result[day] = result[day] || emptyDay();
      result[day].bp = bp;
    });
    Object.entries(stepsByDay).forEach(([day, steps]) => {
      result[day] = result[day] || emptyDay();
      result[day].steps = String(steps);
    });
    Object.entries(calByDay).forEach(([day, cal]) => {
      result[day] = result[day] || emptyDay();
      result[day].cal = String(cal);
    });
    Object.entries(bcalByDay).forEach(([day, bcal]) => {
      result[day] = result[day] || emptyDay();
      result[day].bcal = String(bcal);
    });
    Object.entries(distByDay).forEach(([day, dist]) => {
      result[day] = result[day] || emptyDay();
      result[day].dist = String(dist);
    });
    return result;
  };

  /* ── LibreView CSV 파싱 ─────────────────────────────────── */
  const parseCSVRow = (line) => {
    const out = []; let inQ = false; let cur = '';
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    out.push(cur.trim());
    return out;
  };

  const parseLVTimestamp = (s) => {
    s = s.replace(/"/g, '').trim();
    // MM-DD-YYYY HH:MM AM/PM (영어/한국어 오전오후)
    let m = s.match(/(\d{1,2})[/-](\d{1,2})[/-](\d{4})\s+(\d{1,2}):(\d{2})\s*(AM|PM|오전|오후)/i);
    if (m) {
      const [,p1,p2,yyyy,hh,min,ap] = m;
      let h = parseInt(hh);
      if (/PM|오후/i.test(ap) && h!==12) h+=12;
      if (/AM|오전/i.test(ap) && h===12) h=0;
      // LibreView는 MM-DD-YYYY 형식
      return { dayKey:`${yyyy}-${String(p1).padStart(2,'0')}-${String(p2).padStart(2,'0')}`, hour:h+parseInt(min)/60 };
    }
    // YYYY-MM-DD HH:MM
    m = s.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{1,2}):(\d{2})/);
    if (m) {
      const [,yyyy,mm,dd,hh,min] = m;
      return { dayKey:`${yyyy}-${mm}-${dd}`, hour:parseInt(hh)+parseInt(min)/60 };
    }
    return null;
  };

  const parseLibreViewCSV = (csvText) => {
    const lines = csvText.split(/\r?\n/);
    let headerIdx = -1;
    for (let i = 0; i < Math.min(lines.length, 20); i++) {
      if (/timestamp|타임스탬프|时间戳|장치.?타임스탬프/i.test(lines[i])) { headerIdx = i; break; }
    }
    if (headerIdx === -1) return null;

    const headers = parseCSVRow(lines[headerIdx]);
    const tsIdx   = headers.findIndex(h => /timestamp|타임스탬프|장치.?타임스탬프/i.test(h));
    const typeIdx = headers.findIndex(h => /record.?type|레코드|기록.?유형/i.test(h));
    const histIdx = headers.findIndex(h => /historic.?glucose|히스토리.*포도당|과거.?혈당/i.test(h));
    const scanIdx = headers.findIndex(h => /scan.?glucose|스캔.*포도당|혈당.?스캔/i.test(h));

    if (tsIdx === -1) return null;

    const glucoseByDay = {};
    for (let i = headerIdx + 1; i < lines.length; i++) {
      const row = parseCSVRow(lines[i]);
      if (row.length <= tsIdx || !row[tsIdx]) continue;
      const recType = (row[typeIdx] || '').replace(/"/g,'').trim();
      if (recType !== '0' && recType !== '1') continue;

      const rawVal = recType === '0'
        ? parseFloat((row[histIdx]||'').replace(/"/g,''))
        : parseFloat((row[scanIdx]||'').replace(/"/g,''));
      if (isNaN(rawVal) || rawVal <= 0) continue;

      const parsed = parseLVTimestamp(row[tsIdx]);
      if (!parsed) continue;
      const { dayKey, hour } = parsed;
      if (!glucoseByDay[dayKey]) glucoseByDay[dayKey] = [];
      glucoseByDay[dayKey].push({ hour, value: Math.round(rawVal) });
    }
    return glucoseByDay;
  };

  /* ── 가져오기 모달 ─────────────────────────────────────── */
  const ImportModal = ({ onClose, onImport, initialTab }) => {
    const dm = _dm;
    const [tab,     setTab]     = useState(initialTab || 'apple'); // 'apple' | 'libreview'
    const [status,  setStatus]  = useState('idle');
    const [preview, setPreview] = useState(null);
    const [errMsg,  setErrMsg]  = useState('');
    const [progress, setProgress] = useState('');
    const fileRef = useRef(null);

    const reset = () => { setStatus('idle'); setErrMsg(''); setPreview(null); };
    const onTabChange = (t) => { setTab(t); reset(); };

    const processFile = async (file) => {
      setStatus('loading'); setErrMsg('');
      try {
        /* ── 안드로이드: 삼성 헬스 ZIP ── */
        if (tab === 'android') {
          const { weightByDay, bodyFatByDay, bpByDay = {}, stepsByDay = {}, calByDay = {}, distByDay = {} } = await parseSamsungHealthZip(file, (msg) => setProgress(msg));
          const wDays    = Object.keys(weightByDay).length;
          const bfDays   = Object.keys(bodyFatByDay).length;
          const stepDays = Object.keys(stepsByDay).length;
          if (!wDays && !bfDays && !stepDays) throw new Error('체중·체지방·걸음수 데이터를 찾을 수 없어요.\n삼성 헬스 → 개인 데이터 다운로드에서 내보낸 ZIP인지 확인해 주세요.');
          const mapped = buildDashboardData({ glucoseByDay:{}, weightByDay, bodyFatByDay, bpByDay, stepsByDay, calByDay, distByDay });
          setPreview({ mapped, gDays:0, wDays, bfDays, stepDays, totalReadings:0, source:'android' });
          setStatus('preview');
          return;
        }

        /* ── 안드로이드: Google Fit Takeout ZIP ── */
        if (tab === 'googlefit') {
          const { stepsByDay = {}, calByDay = {}, distByDay = {} } = await parseGoogleFitZip(file, (msg) => setProgress(msg));
          const stepDays = Object.keys(stepsByDay).length;
          if (!stepDays) throw new Error('걸음수 데이터를 찾을 수 없어요.\ntakeout.google.com → Fit만 선택해서 내보낸 ZIP인지 확인해 주세요.');
          const mapped = buildDashboardData({ glucoseByDay:{}, weightByDay:{}, bodyFatByDay:{}, bpByDay:{}, stepsByDay, calByDay, distByDay });
          setPreview({ mapped, gDays:0, wDays:0, bfDays:0, stepDays, totalReadings:0, source:'googlefit' });
          setStatus('preview');
          return;
        }

        /* ── LibreView CSV ── */
        if (file.name.endsWith('.csv')) {
          setProgress('CSV 파일 분석 중...');
          await new Promise(r => setTimeout(r, 30));
          const csvText = await file.text();
          const glucoseByDay = parseLibreViewCSV(csvText);
          if (!glucoseByDay) throw new Error('LibreView CSV 형식을 인식할 수 없어요.\nlibreview.com에서 내보낸 파일인지 확인해 주세요.');
          const totalDays = Object.keys(glucoseByDay).length;
          const totalReadings = Object.values(glucoseByDay).reduce((a,b)=>a+b.length,0);
          if (!totalDays) throw new Error('혈당 데이터를 찾을 수 없어요. 파일을 다시 확인해 주세요.');
          const mapped = buildDashboardData({ glucoseByDay, weightByDay:{} });
          setPreview({ mapped, gDays:totalDays, wDays:0, totalReadings, source:'libreview' });
          setStatus('preview');
          return;
        }

        /* ── 애플 건강 ZIP / XML (청크 스트리밍) ── */
        const CHUNK_SIZE = 2 * 1024 * 1024;
        let getChunks, totalBytes;

        if (file.name.endsWith('.zip')) {
          setProgress('ZIP 압축 해제 중... (잠시 기다려 주세요)');
          if (typeof JSZip === 'undefined') throw new Error('ZIP 라이브러리 로드 실패. 인터넷 연결을 확인하거나 직접 압축 해제 후 export.xml을 선택해 주세요.');
          const zip = await JSZip.loadAsync(file);
          const allFiles = Object.keys(zip.files);
          const xmlFile = allFiles.find(name =>
            /export\.xml$/i.test(name) && !/cda/i.test(name)
          ) || allFiles.find(name => /\.xml$/i.test(name) && !/cda/i.test(name));
          if (!xmlFile) {
            const found = allFiles.filter(n => !zip.files[n].dir).slice(0,10).join(', ');
            throw new Error(`ZIP 안에서 export.xml을 찾을 수 없어요.\n발견된 파일: ${found || '없음'}`);
          }
          setProgress('XML 추출 중...');
          const xmlBlob = await zip.files[xmlFile].async('blob');
          totalBytes = xmlBlob.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = xmlBlob.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else if (file.name.endsWith('.xml')) {
          totalBytes = file.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = file.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else {
          throw new Error('.csv / .zip / .xml 파일만 지원해요.');
        }

        setProgress('혈당·체중·걸음수 데이터 추출 중... 0%');
        const parsed = await parseAppleHealthXML(getChunks, totalBytes, (pct) => {
          setProgress(`데이터 분석 중... ${pct}%`);
        });
        const mapped = buildDashboardData(parsed);

        const gDays    = Object.keys(parsed.glucoseByDay).length;
        const wDays    = Object.keys(parsed.weightByDay).length;
        const bfDays   = Object.keys(parsed.bodyFatByDay).length;
        const stepDays = Object.keys(parsed.stepsByDay || {}).length;
        const totalReadings = Object.values(parsed.glucoseByDay).reduce((a,b) => a+b.length, 0);

        if (!gDays && !wDays && !bfDays && !stepDays) throw new Error('건강 데이터를 찾을 수 없어요.\n애플 건강 앱 → 오른쪽 위 프로필 → 건강 데이터 내보내기로 내보낸 파일인지 확인해 주세요.');

        setPreview({ mapped, gDays, wDays, bfDays, stepDays, totalReadings });
        setStatus('preview');
      } catch (e) {
        setErrMsg(e.message || '파일 처리 중 오류가 발생했어요.');
        setStatus('error');
      }
    };

    const confirm = () => { onImport(preview.mapped); setStatus('done'); };

    const isLV        = tab === 'libreview';
    const isAndroid   = tab === 'android';
    const isGoogleFit = tab === 'googlefit';
    const accent  = isLV ? 'var(--cn-low)' : isAndroid ? 'var(--cn-ok)' : isGoogleFit ? '#EA4335' : 'var(--cn-brand)';
    const accentL = isLV ? 'var(--cn-low-100)' : isAndroid ? 'var(--cn-ok-100)' : isGoogleFit ? '#FEE2E2' : 'var(--cn-brand-100)';
    const accentB = isLV ? 'var(--cn-low)' : isAndroid ? 'var(--cn-ok)' : isGoogleFit ? '#EA4335' : 'var(--cn-brand)';

    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.55)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:2000, padding:'20px' }}
           onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
        <div style={{ background:'var(--card-bg)', borderRadius:'18px', padding:'28px', maxWidth:'540px', width:'100%', maxHeight:'92vh', overflowY:'auto', boxShadow:'0 24px 80px rgba(0,0,0,0.25)' }}>

          {/* Header */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'18px' }}>
            <div>
              <div style={{ fontSize:'14px', fontWeight:'800', color:'var(--text)' }}>과거 데이터 가져오기</div>
              <div style={{ fontSize:'14px', color:'var(--text-sub)', marginTop:'2px' }}>리브레2 혈당 기록을 대시보드에 자동 반영</div>
            </div>
            <button onClick={onClose} style={{ background:'var(--divider)', border:'none', borderRadius:'8px', width:'32px', height:'32px', cursor:'pointer', fontSize:'14px', color:'var(--text-sub)' }}>✕</button>
          </div>

          {/* 탭 선택 */}
          <div style={{ display:'flex', gap:'6px', marginBottom:'20px', background:'var(--input-bg)', borderRadius:'10px', padding:'4px' }}>
            {[
              { key:'apple',      label:'🍎 애플 건강',  sub:'과거 데이터 ZIP' },
              { key:'libreview',  label:'📊 리브레뷰',   sub:'혈당 CSV' },
            ].map(t => (
              <button key={t.key} onClick={() => onTabChange(t.key)} style={{
                flex:1, padding:'10px 6px', border:'none', borderRadius:'8px', cursor:'pointer',
                fontSize:'13px', fontWeight:'700', transition:'all 0.2s',
                background: tab===t.key ? (dm?'var(--cn-ink)':'#fff') : 'transparent',
                color: tab===t.key ? accent : 'var(--text-mute)',
                boxShadow: tab===t.key ? '0 1px 4px rgba(0,0,0,0.08)' : 'none'
              }}>
                {t.label}
                {t.sub && <span style={{ display:'block', fontSize:'11px', fontWeight:'500', marginTop:'1px', color: tab===t.key ? accent : 'var(--text-mute)' }}>{t.sub}</span>}
              </button>
            ))}
          </div>

          {/* ── LibreView 탭 ── */}
          {isLV && (status === 'idle' || status === 'error') && (
            <>
              <div style={{ background:dm?'var(--cn-low-100)':'var(--cn-low-100)', border:dm?'1px solid var(--cn-low)':'1px solid var(--cn-low)', borderRadius:'12px', padding:'14px 16px', marginBottom:'16px' }}>
                <div style={{ fontWeight:'700', color:'var(--cn-low)', fontSize:'16px', marginBottom:'8px' }}>📋 LibreView에서 내보내는 방법</div>
                <ol style={{ margin:0, paddingLeft:'18px', fontSize:'16px', color:dm?'var(--cn-low)':'var(--cn-low)', lineHeight:'2.1' }}>
                  <li><strong>libreview.com</strong> 에 로그인 (LibreLink 계정 동일)</li>
                  <li>상단 메뉴 → <strong>보고서</strong></li>
                  <li>기간 선택 후 <strong>"데이터 내보내기"</strong> 클릭</li>
                  <li>CSV 파일 다운로드</li>
                  <li>아래에서 CSV 파일 선택</li>
                </ol>
              </div>
              <div
                onClick={() => fileRef.current?.click()}
                style={{ border:`2px dashed ${accentB}`, borderRadius:'12px', padding:'28px 20px', textAlign:'center', cursor:'pointer', background:dm?'var(--cn-low-100)':'var(--cn-low-100)', transition:'all 0.2s' }}
                onMouseEnter={e => { e.currentTarget.style.background=accentL; e.currentTarget.style.borderColor=accent; }}
                onMouseLeave={e => { e.currentTarget.style.background='var(--cn-low-100)'; e.currentTarget.style.borderColor=accentB; }}
              >
                <div style={{ fontSize:'26px', marginBottom:'8px' }}>📄</div>
                <div style={{ fontWeight:'700', color:accent, fontSize:'16px', marginBottom:'4px' }}>CSV 파일 선택</div>
                <div style={{ fontSize:'14px', color:'var(--text-sub)' }}>libreview.com 에서 내보낸 .csv 파일</div>
              </div>
              <input ref={fileRef} type="file" accept=".csv,.zip,.xml" onChange={e => e.target.files[0] && processFile(e.target.files[0])} style={{ display:'none' }} />
              {status==='error' && <div style={{ background:dm?'var(--cn-danger-100)':'var(--cn-danger-100)', border:'1px solid #fecaca', borderRadius:'10px', padding:'12px 14px', marginTop:'12px', fontSize:'16px', color:'var(--cn-danger)', whiteSpace:'pre-line' }}>⚠️ {errMsg}</div>}
            </>
          )}

          {/* ── 애플 건강 탭 ── */}
          {tab==='apple' && (status === 'idle' || status === 'error') && (
            <>
              <div style={{ background:dm?'var(--cn-warn-100)':'var(--cn-warn-100)', border:dm?'1px solid var(--cn-warn)':'1px solid var(--cn-warn)', borderRadius:'10px', padding:'12px 14px', marginBottom:'14px', fontSize:'14px' }}>
                <div style={{ fontWeight:'700', color:dm?'var(--cn-warn)':'var(--cn-warn)', marginBottom:'5px' }}>⚠️ 리브레2 연동이 필요해요</div>
                <div style={{ color:dm?'var(--cn-warn)':'var(--cn-warn)', lineHeight:'1.8' }}>
                  LibreLink → 메뉴(☰) → <strong>연결된 앱</strong> → <strong>Apple 건강</strong> 토글 ON<br/>
                  연동 후 건강 앱에 데이터가 쌓이면 아래 방법으로 가져올 수 있어요
                </div>
              </div>
              <div style={{ background:dm?'var(--cn-brand-100)':'var(--cn-brand-100)', border:dm?'1px solid var(--cn-brand-600)':'1px solid var(--cn-brand)', borderRadius:'12px', padding:'14px 16px', marginBottom:'16px' }}>

      if (val.trim().length < 2) return;
      searchTimer.current = setTimeout(async () => {
        setIsSearching(true);
        try {
          const res = await fetch(`${EDGE_URL}?q=${encodeURIComponent(val.trim())}`, {
            headers: { 'apikey': SUPA_KEY }
          });
          if (!res.ok) { setSearchErr('❌ 검색 서버 오류 (' + res.status + ')'); setIsSearching(false); return; }
          const data = await res.json();

            setSuggestions(data);
            if (data.length === 0) setSearchErr('검색 결과 없음 — 직접 입력 후 추가하기를 누르세요');
