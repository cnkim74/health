<script type="text/babel">

const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate = d => { const dt = new Date(d+'T00:00:00'); return (dt.getMonth()+1)+'/'+(dt.getDate()); };
const shiftDate = (d,n) => { const dt = new Date(d+'T00:00:00'); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); };

const bsColor = v => {
  if (!v) return 'var(--text2)';
  const n = parseFloat(v);
  if (n < 70) return 'var(--blue)';
  if (n <= 140) return 'var(--green)';
  if (n <= 180) return 'var(--yellow)';
  return 'var(--red)';
};
const bsLabel = v => {
  if (!v) return '';
  const n = parseFloat(v);
  if (n < 70) return '저혈당';
  if (n <= 140) return '정상';
  if (n <= 180) return '주의';
  return '위험';
};

const median = arr => {
  if (!arr.length) return null;
  const s = [...arr].sort((a,b) => a-b);
  const m = Math.floor(s.length/2);
  return s.length % 2 ? s[m] : (s[m-1]+s[m])/2;
};

const emptyDay = () => ({
  meds:{}, bs:{}, bp:{sys:'',dia:''},
  meals:{}, exercise:{type:'',mins:''},

});

const genUUID = () => 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
  const r = Math.random()*16|0;
  return (c==='x' ? r : (r&0x3|0x8)).toString(16);
});

const getOrCreateUserId = () => {
  let id = localStorage.getItem('carenote_uid');
  if (!id) { id = genUUID(); localStorage.setItem('carenote_uid', id); }
  return id;
};

const calcHealthScore = (data) => {
  const dates = Object.keys(data).filter(k => k !== '_user_settings_').sort().slice(-14);
  if (!dates.length) return { total:0, bp:0, glucose:0, meds:0, steps:0 };

  const bpVals = dates.map(d => {
    const b = data[d] && data[d].bp;
    if (!b || !b.sys || !b.dia) return null;
    const sys = parseFloat(b.sys), dia = parseFloat(b.dia);
    if (sys < 120 && dia < 80) return 100;
    if (sys < 130 && dia < 80) return 80;
    if (sys < 140 && dia < 90) return 60;
    if (sys < 160 && dia < 100) return 40;
    return 20;
  }).filter(v => v !== null);
  const bpScore = bpVals.length ? bpVals.reduce((a,b)=>a+b,0)/bpVals.length : 0;

  const bsAll = dates.flatMap(d => {
    const bs = (data[d] && data[d].bs) || {};
    return Object.values(bs).map(v => parseFloat(v)).filter(v => !isNaN(v) && v > 0);
  });
  let glScore = 0;
  if (bsAll.length) {
    const med = median(bsAll);
    if (med < 100) glScore = 100;
    else if (med < 126) glScore = 85;
    else if (med < 154) glScore = 65;
    else if (med < 200) glScore = 40;
    else glScore = 20;
  }

  const medDays = dates.filter(d => {
    const m = data[d] && data[d].meds;
    return m && Object.keys(m).length > 0;
  });
  const medsScore = dates.length ? (medDays.length / dates.length) * 100 : 0;

  const stepsVals = dates.map(d => parseFloat((data[d] && data[d].steps)||0)).filter(v => v > 0);
  let stepsScore = 0;
  if (stepsVals.length) {
    const avg = stepsVals.reduce((a,b)=>a+b,0)/stepsVals.length;
    if (avg >= 10000) stepsScore = 100;
    else if (avg >= 7500) stepsScore = 80;
    else if (avg >= 5000) stepsScore = 60;
    else if (avg >= 2500) stepsScore = 40;
    else stepsScore = 20;
  }

  const total = Math.round(bpScore*0.30 + glScore*0.30 + medsScore*0.25 + stepsScore*0.15);
  return { total, bp:Math.round(bpScore), glucose:Math.round(glScore), meds:Math.round(medsScore), steps:Math.round(stepsScore) };
};

const genInsights = (data) => {
  const dates = Object.keys(data).filter(k => k !== '_user_settings_').sort().slice(-7);
  if (!dates.length) return ['데이터를 입력하면 AI 인사이트가 생성됩니다.'];
  const insights = [];
  const bpVals = dates.map(d => data[d] && data[d].bp).filter(b => b && b.sys).map(b => parseFloat(b.sys));
  if (bpVals.length >= 3) {
    const avg = Math.round(bpVals.reduce((a,b)=>a+b,0)/bpVals.length);
    if (avg > 140) insights.push('최근 7일 평균 수축기 혈압 '+avg+'mmHg — 혈압 관리에 주의가 필요합니다.');
    else if (avg < 120) insights.push('최근 7일 평균 혈압 '+avg+'mmHg — 혈압이 잘 조절되고 있습니다.');
    else insights.push('평균 혈압 '+avg+'mmHg — 정상 범위 내에서 관리되고 있습니다.');
  }
  const bsAll = dates.flatMap(d => {
    const bs = (data[d] && data[d].bs) || {};
    return Object.values(bs).map(v => parseFloat(v)).filter(v => !isNaN(v) && v > 0);
  });
  if (bsAll.length) {
    const avg = Math.round(bsAll.reduce((a,b)=>a+b,0)/bsAll.length);
    if (avg > 180) insights.push('평균 혈당 '+avg+'mg/dL — 식이 조절이 필요합니다.');
    else if (avg < 100) insights.push('평균 혈당 '+avg+'mg/dL — 우수한 혈당 관리입니다.');
    else insights.push('평균 혈당 '+avg+'mg/dL — 목표 범위 내 관리 중입니다.');
  }
  const stepsVals = dates.map(d => parseFloat((data[d] && data[d].steps)||0)).filter(v => v > 0);
  if (stepsVals.length) {
    const avg = Math.round(stepsVals.reduce((a,b)=>a+b,0)/stepsVals.length);
    insights.push('최근 평균 '+avg.toLocaleString()+'보 — '+(avg >= 8000 ? '활발한 신체활동을 유지하고 있습니다.' : '일일 8,000보 목표를 향해 조금 더 걸어보세요.'));
  }
  if (!insights.length) insights.push('더 많은 데이터를 입력하면 맞춤 인사이트를 제공합니다.');
  return insights;
};

const analyzeFood = async (base64, mimeType) => {
  const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+GEMINI_KEY, {

      contents:[{parts:[

        {text:'이 음식 사진을 분석해서 한국어로: 음식 이름, 예상 칼로리, 탄수화물, 단백질, 지방, 혈당 영향(낮음/중간/높음), 당뇨 환자 권고사항을 간결하게 알려주세요.'}

const parseAppleHealthXML = (xmlText) => {
  const result = {};
  const addDay = d => { if (!result[d]) result[d] = emptyDay(); };
  const recordRx = /<Record[^>]+>/g;
  let m;
  while ((m = recordRx.exec(xmlText)) !== null) {
    const tag = m[0];
    const getAttr = (a) => { const mx = tag.match(new RegExp(a+'="([^"]*)"')); return mx ? mx[1] : ''; };
    const type = getAttr('type');
    const val  = getAttr('value');
    const startDate = getAttr('startDate');
    if (!startDate) continue;
    const d = startDate.slice(0,10);
    if (type === 'HKQuantityTypeIdentifierBloodGlucose') {
      addDay(d);
      const mmol = parseFloat(val);
      if (!isNaN(mmol)) {
        const mgdl = Math.round(mmol * 18.0182);
        if (!result[d].bs.fasting) result[d].bs.fasting = String(mgdl);
      }
    } else if (type === 'HKQuantityTypeIdentifierBloodPressureSystolic') {
      addDay(d); result[d].bp.sys = val;
    } else if (type === 'HKQuantityTypeIdentifierBloodPressureDiastolic') {
      addDay(d); result[d].bp.dia = val;
    } else if (type === 'HKQuantityTypeIdentifierBodyMass') {
      addDay(d); result[d].weight = val;
    } else if (type === 'HKQuantityTypeIdentifierStepCount') {
      addDay(d);
      const steps = parseFloat(val)||0;
      const cur = parseFloat(result[d].steps)||0;
      result[d].steps = String(Math.round(cur + steps));
    } else if (type === 'HKCategoryTypeIdentifierSleepAnalysis') {
      const endDate = getAttr('endDate');
      if (endDate && val === 'HKCategoryValueSleepAnalysisAsleep') {
        addDay(d);
        const start = new Date(startDate), end = new Date(endDate);
        const mins = (end - start) / 60000;
        const curH = parseFloat((result[d].sleep && result[d].sleep.h)||0);
        const curM = parseFloat((result[d].sleep && result[d].sleep.m)||0);
        const totalMins = curH*60 + curM + mins;
        result[d].sleep = { h:String(Math.floor(totalMins/60)), m:String(Math.round(totalMins%60)) };
      }
    }
  }
  return result;
};

const parseSamsungHealthZip = async (file) => {
  const result = {};
  const addDay = d => { if (!result[d]) result[d] = emptyDay(); };
  try {
    const zip = await JSZip.loadAsync(file);
    for (const [name, zf] of Object.entries(zip.files)) {
      if (name.includes('com.samsung.shealth.tracker.pedometer') && name.endsWith('.csv')) {
        const text = await zf.async('string');
        const lines = text.split('\n').filter(l => l.trim() && !l.startsWith('#'));
        for (let i = 1; i < lines.length; i++) {
          const cols = lines[i].split(',');
          if (cols.length < 3) continue;
          const d = (cols[0]||'').trim().slice(0,10);
          const steps = parseFloat((cols[2]||'').trim())||0;
          if (d && steps > 0) { addDay(d); result[d].steps = String(steps); }
        }
      } else if (name.includes('com.samsung.health.blood_glucose') && name.endsWith('.csv')) {
        const text = await zf.async('string');
        const lines = text.split('\n').filter(l => l.trim() && !l.startsWith('#'));
        for (let i = 1; i < lines.length; i++) {
          const cols = lines[i].split(',');
          if (cols.length < 4) continue;
          const d = (cols[0]||'').trim().slice(0,10);
          const glc = parseFloat((cols[3]||'').trim())||0;
          if (d && glc > 0) { addDay(d); if (!result[d].bs.fasting) result[d].bs.fasting = String(glc); }
        }
      } else if (name.includes('com.samsung.health.blood_pressure') && name.endsWith('.csv')) {
        const text = await zf.async('string');
        const lines = text.split('\n').filter(l => l.trim() && !l.startsWith('#'));
        for (let i = 1; i < lines.length; i++) {
          const cols = lines[i].split(',');
          if (cols.length < 5) continue;
          const d = (cols[0]||'').trim().slice(0,10);
          const sys = parseFloat((cols[3]||'').trim())||0;
          const dia = parseFloat((cols[4]||'').trim())||0;
          if (d && sys > 0) { addDay(d); result[d].bp = {sys:String(sys),dia:String(dia)}; }
        }
      }
    }
  } catch(e) { console.error('Samsung parse error',e); }
  return result;
};

const parseLibreViewCSV = (text) => {
  const result = {};
  const addDay = d => { if (!result[d]) result[d] = emptyDay(); };
  const lines = text.split('\n');
  const dataStart = lines.findIndex(l => l.includes('Device Timestamp') || l.includes('기기 타임스탬프'));
  if (dataStart < 0) return result;
  for (let i = dataStart+1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    if (cols.length < 5) continue;
    const ts = (cols[1]||'').trim();
    if (!ts) continue;
    const d = ts.slice(0,10).replace(/\//g,'-');
    const historic = parseFloat((cols[4]||'').replace(/[^0-9.]/g,''))||0;
    const scan = parseFloat((cols[5]||'').replace(/[^0-9.]/g,''))||0;
    const val = scan || historic;
    if (d && val > 0) { addDay(d); if (!result[d].bs.fasting) result[d].bs.fasting = String(Math.round(val)); }
  }
  return result;
};

const buildDashboardData = (imported, existing) => {
  const merged = Object.assign({}, existing);
  for (const [d, v] of Object.entries(imported)) {
    if (!merged[d]) merged[d] = emptyDay();
    if (v.bp && v.bp.sys && !(merged[d].bp && merged[d].bp.sys)) merged[d].bp = v.bp;
    if (v.bs && v.bs.fasting && !(merged[d].bs && merged[d].bs.fasting)) merged[d].bs = Object.assign({}, merged[d].bs, v.bs);
    if (v.weight && !merged[d].weight) merged[d].weight = v.weight;
    if (v.steps && !merged[d].steps) merged[d].steps = v.steps;
    if (v.sleep && v.sleep.h && !(merged[d].sleep && merged[d].sleep.h)) merged[d].sleep = v.sleep;
  }
  return merged;
};

/* SVG Components */
const CircleGauge = ({ value, size=100, stroke=8 }) => {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (value / 100) * circ;
  const label = value >= 80 ? '우수' : value >= 60 ? '양호' : value >= 40 ? '보통' : '주의';
  const color = value >= 80 ? 'var(--green)' : value >= 60 ? 'var(--blue)' : value >= 40 ? 'var(--yellow)' : 'var(--red)';
  return (
    <svg width={size} height={size} viewBox={'0 0 '+size+' '+size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset}
        strokeLinecap="round" transform={'rotate(-90 '+(size/2)+' '+(size/2)+')'}
        style={{transition:'stroke-dashoffset 0.6s ease'}}/>
      <text x={size/2} y={size/2-6} textAnchor="middle" fill="var(--text)" fontSize="18" fontWeight="700">{value}</text>
      <text x={size/2} y={size/2+12} textAnchor="middle" fill="var(--text2)" fontSize="10">{label}</text>
    </svg>
  );
};

const Sparkline = ({ data, color='var(--accent)', height=32 }) => {
  if (!data || data.length < 2) return React.createElement('div', {style:{height}});
  const vals = data.map(v => parseFloat(v)||0);
  const mn = Math.min(...vals), mx = Math.max(...vals);
  const range = mx - mn || 1;
  const w = 100, h = height;
  const pts = vals.map((v,i) => {
    const x = (i/(vals.length-1)) * w;
    const y = h - ((v-mn)/range) * (h-4) - 2;
    return x+','+y;
  }).join(' ');
  return (
    <svg viewBox={'0 0 '+w+' '+h} style={{width:'100%',height}} preserveAspectRatio="none">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
};

const TrendBadge = ({ vals }) => {
  if (!vals || vals.length < 2) return null;
  const recent = vals.slice(-3).map(v => parseFloat(v)||0);
  const prev = vals.slice(-6,-3).map(v => parseFloat(v)||0);
  if (!recent.length || !prev.length) return null;
  const rAvg = recent.reduce((a,b)=>a+b,0)/recent.length;
  const pAvg = prev.reduce((a,b)=>a+b,0)/prev.length;
  const diff = rAvg - pAvg;
  if (Math.abs(diff) < 2) return <span className="trend-badge trend-stable">— 안정</span>;
  if (diff > 0) return <span className="trend-badge trend-up">▲ +{Math.round(diff)}</span>;
  return <span className="trend-badge trend-down">▼ {Math.round(diff)}</span>;
};

            <div className="metric-chart"><Sparkline data={stepsVals7.map(x=>x.v)} color="var(--accent)"/></div>

      {bpChartData.length >= 2 && (
        <div className="section">
          <div className="section-title">혈압 추이 (14일)</div>
          <div className="card" style={{padding:'14px 10px 10px'}}>
            <svg viewBox={'0 0 '+chartW+' '+chartH} style={{width:'100%',height:chartH}} preserveAspectRatio="none">
              {[80,120,140,160].map(v=>(
                <line key={v} x1={0} y1={bpToY(v)} x2={chartW} y2={bpToY(v)} stroke="var(--border)" strokeWidth={0.5} strokeDasharray="4,4"/>
              ))}
              <rect x={0} y={bpToY(130)} width={chartW} height={bpToY(90)-bpToY(130)} fill="rgba(67,233,123,0.05)"/>
              {bpChartData.length >= 2 && (
                <polyline
                  points={bpChartData.map((x,i)=>(i/(bpChartData.length-1))*chartW+','+bpToY(x.sys)).join(' ')}

              {bpChartData.length > 0 && <span className="chart-label">{fmtDate(bpChartData[0].d)}</span>}
              {bpChartData.length > 2 && <span className="chart-label">{fmtDate(bpChartData[Math.floor((bpChartData.length-1)/2)].d)}</span>}

              <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:12,height:2,background:'rgba(79,172,254,0.5)'}}></div><span style={{fontSize:10,color:'var(--text2)'}}>이완기</span></div>

      <div className="section">

          <div className="steps-bars">
            {stepsVals7.map((x,i)=>{

              const isGoal = x.v >= 10000;

                <div key={i} className="step-bar-wrap">

};

/* RecordScreen */
const RecordScreen = ({ data, medsConfig, onSave, showToast }) => {
  const [currentDate, setCurrentDate] = useState(todayStr());
  const [entry, setEntry] = useState(() => {
    const d = data[todayStr()];
    return d ? Object.assign(emptyDay(),d) : emptyDay();
  });
  const [bsTab, setBsTab] = useState('fasting');
  const [analyzing, setAnalyzing] = useState(false);
  const [analysisResults, setAnalysisResults] = useState({});
  const mealRefs = useRef({});

  useEffect(() => {
    const d = data[currentDate];
    setEntry(d ? Object.assign(emptyDay(),d) : emptyDay());
  }, [currentDate, data]);

  const upd = (path, val) => {
    setEntry(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const parts = path.split('.');
      let obj = next;
      for (let i = 0; i < parts.length-1; i++) {
        if (!obj[parts[i]]) obj[parts[i]] = {};
        obj = obj[parts[i]];
      }
      obj[parts[parts.length-1]] = val;
      return next;
    });
  };

  const handleMealPhoto = async (time, file) => {
    if (!file) return;
    setAnalyzing(true);
    try {
      const b64 = await fileToBase64(file);
      const url = URL.createObjectURL(file);
      upd('meals.'+time+'.photo', url);
      upd('meals.'+time+'.photoB64', b64);
      upd('meals.'+time+'.mimeType', file.type);
      const result = await analyzeFood(b64, file.type);
      setAnalysisResults(prev => Object.assign({},prev,{[time]:result}));
      upd('meals.'+time+'.analysis', result);
    } catch(e) { showToast('분석 오류: '+e.message); }
    setAnalyzing(false);
  };

  const toggleMed = (medId) => {
    const cur = entry.meds && entry.meds[medId];
    upd('meds.'+medId, cur ? false : true);
  };

  const handleSave = () => { onSave(currentDate, entry); showToast('저장되었습니다'); };

  const bsVal = (entry.bs && entry.bs[bsTab]) || '';
  const bsC = bsColor(bsVal);
  const isToday = currentDate === todayStr();

  return (
    <div className="screen">
      <div className="record-header">
        <div className="record-title">기록</div>
        <div className="date-nav">
          <button className="date-nav-btn" onClick={()=>setCurrentDate(shiftDate(currentDate,-1))}>‹</button>
          <div className="date-display">{isToday?'오늘 · ':''}{currentDate}</div>
          <button className="date-nav-btn" onClick={()=>setCurrentDate(shiftDate(currentDate,1))} disabled={currentDate>=todayStr()} style={{opacity:currentDate>=todayStr()?0.3:1}}>›</button>
        </div>
      </div>
      <div className="section" style={{marginTop:14}}>
        <div className="form-group card-sm">
          <div className="form-label">🫀 혈압</div>
          <div className="form-row">
            <div className="input-group" style={{flex:1}}>
              <input className="input" placeholder="수축기" type="number" value={(entry.bp && entry.bp.sys)||''} onChange={e=>upd('bp.sys',e.target.value)}/>
              <span className="input-unit">mmHg</span>
            </div>
            <div style={{display:'flex',alignItems:'center',color:'var(--text3)',fontWeight:700}}>/</div>
            <div className="input-group" style={{flex:1}}>
              <input className="input" placeholder="이완기" type="number" value={(entry.bp && entry.bp.dia)||''} onChange={e=>upd('bp.dia',e.target.value)}/>
              <span className="input-unit">mmHg</span>
            </div>
          </div>
        </div>

        <div className="form-group card-sm" style={{marginTop:10}}>
          <div className="form-label">🩸 혈당</div>
          <div className="bs-tabs">
            {BS_FIELDS.map(f=>(
              <div key={f.key} className={'bs-tab'+(bsTab===f.key?' active':'')} onClick={()=>setBsTab(f.key)}>
                {f.label}
                {entry.bs && entry.bs[f.key] && <span style={{marginLeft:4,color:bsColor(entry.bs[f.key])}}>{entry.bs[f.key]}</span>}
              </div>
            ))}
          </div>
          <div className="input-group">
            <input className="input" placeholder={(BS_FIELDS.find(f=>f.key===bsTab)||{}).label+' 혈당'} type="number"
              value={bsVal} onChange={e=>upd('bs.'+bsTab,e.target.value)}
              style={bsVal ? {borderColor:bsC} : {}}/>
            <span className="input-unit" style={{color:bsC}}>{bsVal ? bsLabel(bsVal) : 'mg/dL'}</span>
          </div>
        </div>

        {medsConfig.length > 0 && (
          <div className="form-group card-sm" style={{marginTop:10}}>
            <div className="form-label">💊 복약 체크</div>
            <div className="meds-check-grid">
              {medsConfig.map(med=>(
                <div key={med.id} className={'med-check-btn'+((entry.meds && entry.meds[med.id])?' checked':'')} onClick={()=>toggleMed(med.id)}>
                  <div className="med-check-box">{(entry.meds && entry.meds[med.id])?'✓':''}</div>
                  <div>
                    <div className="med-check-name">{med.name}</div>
                    <div style={{fontSize:10,color:'var(--text3)'}}>{med.time} · {med.dose}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div className="form-group card-sm" style={{marginTop:10}}>
          <div className="form-label">⚖️ 체중 / 체지방</div>
          <div className="form-row">
            <div className="input-group" style={{flex:1}}>
              <input className="input" placeholder="체중" type="number" step="0.1" value={entry.weight||''} onChange={e=>upd('weight',e.target.value)}/>
              <span className="input-unit">kg</span>
            </div>
            <div className="input-group" style={{flex:1}}>
              <input className="input" placeholder="체지방" type="number" step="0.1" value={entry.bodyFat||''} onChange={e=>upd('bodyFat',e.target.value)}/>
              <span className="input-unit">%</span>
            </div>
          </div>
        </div>

        <div className="form-group card-sm" style={{marginTop:10}}>
          <div className="form-label">🏃 걸음수 / 수면</div>
          <div className="form-row">
            <div className="input-group" style={{flex:2}}>
              <input className="input" placeholder="걸음수" type="number" value={entry.steps||''} onChange={e=>upd('steps',e.target.value)}/>
              <span className="input-unit">보</span>
            </div>
            <div className="input-group" style={{flex:1}}>
              <input className="input" placeholder="시간" type="number" value={(entry.sleep && entry.sleep.h)||''} onChange={e=>upd('sleep.h',e.target.value)}/>
              <span className="input-unit">h</span>
            </div>
            <div className="input-group" style={{flex:1}}>
              <input className="input" placeholder="분" type="number" value={(entry.sleep && entry.sleep.m)||''} onChange={e=>upd('sleep.m',e.target.value)}/>
              <span className="input-unit">m</span>
            </div>
          </div>
        </div>

        <div className="form-group card-sm" style={{marginTop:10}}>
          <div className="form-label">🍽 식사 기록 (사진 AI 분석)</div>
          {analyzing && <div style={{fontSize:12,color:'var(--accent)',marginBottom:8}}>🤖 분석 중...</div>}
          <div className="meals-row">
            {TIME_WINDOWS.map(time=>{
              const meal = entry.meals && entry.meals[time];
              const openPicker = () => {
                if (!mealRefs.current[time]) {
                  const inp = document.createElement('input');
                  inp.type='file'; inp.accept='image/*';
                  inp.onchange = e => handleMealPhoto(time, e.target.files && e.target.files[0]);
                  mealRefs.current[time] = inp;
                }
                mealRefs.current[time].click();
              };
              return (
                <div key={time} className="meal-slot">
                  <div className="meal-slot-btn" onClick={openPicker}>
                    {meal && meal.photo ? <img src={meal.photo} alt={time}/> : <span style={{fontSize:20,color:'var(--text3)'}}>+</span>}
                  </div>
                  <div className="meal-slot-label">{time}</div>
                </div>
              );
            })}
          </div>
          {Object.entries(analysisResults).map(([time, result]) => (
            <div key={time} className="analysis-result"><b>{time}:</b> {result}</div>
          ))}
        </div>

        <div className="form-group card-sm" style={{marginTop:10}}>
          <div className="form-label">🏋️ 운동</div>
          <div className="form-row">
            <input className="input" style={{flex:2}} placeholder="운동 종류 (예: 걷기, 수영)" value={(entry.exercise && entry.exercise.type)||''} onChange={e=>upd('exercise.type',e.target.value)}/>
            <div className="input-group" style={{flex:1}}>
              <input className="input" placeholder="시간" type="number" value={(entry.exercise && entry.exercise.mins)||''} onChange={e=>upd('exercise.mins',e.target.value)}/>
              <span className="input-unit">분</span>
            </div>
          </div>
        </div>

        <div className="form-group card-sm" style={{marginTop:10}}>
          <div className="form-label">📝 메모</div>
          <textarea className="input" rows={3} placeholder="오늘 특이사항, 증상, 느낌 등..." value={entry.note||''} onChange={e=>upd('note',e.target.value)} style={{resize:'none'}}/>
        </div>

        <button className="save-btn" onClick={handleSave}>저장하기</button>
      </div>
    </div>
  );
};

/* SettingsScreen */
const SettingsScreen = ({ data, medsConfig, onOpenMedSettings, onOpenDrug, showToast, userId, height, onSetHeight, darkMode, onToggleDark }) => {
  const dates = Object.keys(data).filter(k => k !== '_user_settings_').sort();
  const totalDays = dates.length;
  const bpCount = dates.filter(d => data[d] && data[d].bp && data[d].bp.sys).length;
  const bsCount = dates.filter(d => data[d] && data[d].bs && Object.keys(data[d].bs).length > 0).length;
  const medDays = dates.filter(d => { const m = data[d] && data[d].meds; return m && Object.keys(m).length > 0; }).length;
  const stepsAll = dates.map(d => parseFloat((data[d] && data[d].steps)||0)).filter(v => v > 0);
  const avgSteps = stepsAll.length ? Math.round(stepsAll.reduce((a,b)=>a+b,0)/stepsAll.length) : 0;
  const weightVals = dates.map(d => parseFloat(data[d] && data[d].weight)).filter(v => !isNaN(v) && v > 0);
  const curWeight = weightVals.length ? weightVals[weightVals.length-1] : 0;
  const h = parseFloat(height)||0;
  const bmi = (h > 0 && curWeight > 0) ? (curWeight/((h/100)*(h/100))).toFixed(1) : '--';
  const bmiLabel = bmi==='--' ? '' : parseFloat(bmi)<18.5?'저체중':parseFloat(bmi)<23?'정상':parseFloat(bmi)<25?'과체중':'비만';

  return (
    <div className="screen">
      <div className="settings-header">
        <div className="settings-title">설정</div>
      </div>

      <div className="settings-section" style={{marginTop:14}}>
        <div className="section-title">기록 통계</div>
        <div className="stats-grid">
          <div className="stat-card"><div className="stat-val">{totalDays}</div><div className="stat-lbl">기록 일수</div></div>
          <div className="stat-card"><div className="stat-val">{bpCount}</div><div className="stat-lbl">혈압 측정</div></div>
          <div className="stat-card"><div className="stat-val">{bsCount}</div><div className="stat-lbl">혈당 측정</div></div>
          <div className="stat-card"><div className="stat-val">{medDays}</div><div className="stat-lbl">복약 완료</div></div>
          <div className="stat-card"><div className="stat-val">{avgSteps>0?(avgSteps/1000).toFixed(1)+'k':'-'}</div><div className="stat-lbl">평균 걸음</div></div>
          <div className="stat-card">
            <div className="stat-val" style={{color:parseFloat(bmi)>25?'var(--red)':parseFloat(bmi)>23?'var(--yellow)':'var(--green)'}}>{bmi}</div>
            <div className="stat-lbl">BMI {bmiLabel}</div>
          </div>
        </div>
      </div>

      <div className="settings-section" style={{marginTop:10}}>
        <div className="section-title">신체 정보</div>
        <div className="settings-group">
          <div className="settings-row" style={{cursor:'default'}}>
            <div className="settings-row-left">
              <div className="settings-icon" style={{background:'rgba(79,172,254,0.1)'}}>📏</div>
              <div className="settings-label">키</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <input className="input" style={{width:70,textAlign:'center',padding:'6px 10px'}} type="number" placeholder="170" value={height||''} onChange={e=>onSetHeight(e.target.value)}/>
              <span style={{fontSize:13,color:'var(--text2)'}}>cm</span>
            </div>
          </div>
        </div>
      </div>

      <div className="settings-section" style={{marginTop:10}}>
        <div className="section-title">관리</div>
        <div className="settings-group">
          <div className="settings-row" onClick={onOpenMedSettings}>
            <div className="settings-row-left">
              <div className="settings-icon" style={{background:'rgba(108,99,255,0.1)'}}>💊</div>
              <div>
                <div className="settings-label">복약 설정</div>
                <div style={{fontSize:11,color:'var(--text2)'}}>{medsConfig.length}개 약 등록됨</div>
              </div>
            </div>
            <div className="settings-arrow">›</div>
          </div>

              <div className="settings-icon" style={{background:'rgba(247,151,30,0.1)'}}>🔍</div>

            <div className="settings-arrow">›</div>
          </div>
          <div className="settings-row" style={{cursor:'default'}}>
            <div className="settings-row-left">
              <div className="settings-icon" style={{background:'rgba(67,233,123,0.1)'}}>🌙</div>
              <div className="settings-label">다크 모드</div>

          </div>
        </div>

                <div className="settings-label">이메일</div>

            <div className="settings-row-left">
              <div className="settings-icon" style={{background:'rgba(79,172,254,0.1)'}}>💾</div>
              <div className="settings-label">데이터 백업 (JSON)</div>
            </div>
            <div className="settings-arrow">›</div>
          </div>
        </div>
      </div>
    </div>
  );
};

/* App */
const App = () => {
  const [tab, setTab] = useState('home');
  const [data, setData] = useState(() => {
    try { return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); } catch(e) { return {}; }
  });
  const [medsConfig, setMedsConfig] = useState(DEFAULT_MEDS);
  const [medsReadyFor, setMedsReadyFor] = useState(null);
  const [userId] = useState(() => getOrCreateUserId());
  const [height, setHeight] = useState(() => localStorage.getItem('carenote_height')||'');
  const [darkMode, setDarkMode] = useState(true);
  const [showImport, setShowImport] = useState(false);
  const [showSync, setShowSync] = useState(false);
  const [showMedSettings, setShowMedSettings] = useState(false);
  const [showDrug, setShowDrug] = useState(false);
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState('');
  const saveTimerRef = useRef(null);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''),2500); };

  useEffect(() => {
    if (!userId) return;
    (async () => {
      setLoading(true);
      try {
        const { data: rows, error } = await supa.from('diabetes_data').select('*').eq('user_id', userId);
        if (error) throw error;
        const loaded = {};
        (rows||[]).forEach(r => { if (r.date !== '_user_settings_') loaded[r.date] = r.payload; });
        if (Object.keys(loaded).length > 0) {
          setData(loaded);
          localStorage.setItem(LS_KEY, JSON.stringify(loaded));
        }
        const settingsRow = (rows||[]).find(r => r.date === '_user_settings_');
        if (settingsRow && settingsRow.payload && settingsRow.payload.medsConfig) {
          setMedsConfig(settingsRow.payload.medsConfig);
          localStorage.setItem('hcd_meds_config_'+userId, JSON.stringify(settingsRow.payload.medsConfig));
        } else {
          const localMeds = localStorage.getItem('hcd_meds_config_'+userId);
          if (localMeds) { try { setMedsConfig(JSON.parse(localMeds)); } catch(ex) {} }
        }
        setMedsReadyFor(userId);
        localStorage.setItem('carenote_last_sync', new Date().toLocaleString('ko-KR'));
      } catch(e) {
        console.error('Supabase load error:', e);
        const localMeds = localStorage.getItem('hcd_meds_config_'+userId);
        if (localMeds) { try { setMedsConfig(JSON.parse(localMeds)); } catch(ex) {} }
        setMedsReadyFor(userId);
      }
      setLoading(false);
    })();
  }, [userId]);

  useEffect(() => {
    if (!userId || medsReadyFor !== userId) return;
    localStorage.setItem('hcd_meds_config_'+userId, JSON.stringify(medsConfig));
    (async () => {
      try {
        await supa.from('diabetes_data').upsert(
          { user_id:userId, date:'_user_settings_', payload:{medsConfig}, updated_at:new Date().toISOString() },
          { onConflict:'user_id,date' }
        );
      } catch(e) { console.error('복약 설정 저장 오류:', e); }
    })();
  }, [medsConfig, userId, medsReadyFor]);

  useEffect(() => {
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  }, [data]);

  const handleSaveEntry = useCallback((date, entry) => {
    setData(prev => {
      const next = Object.assign({}, prev, {[date]: entry});
      if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
      saveTimerRef.current = setTimeout(async () => {
        try {
          await supa.from('diabetes_data').upsert(
            { user_id:userId, date, payload:entry, updated_at:new Date().toISOString() },
            { onConflict:'user_id,date' }
          );
          localStorage.setItem('carenote_last_sync', new Date().toLocaleString('ko-KR'));
        } catch(e) { console.error('저장 오류:', e); }
      }, 1500);
      return next;
    });
  }, [userId]);

  const handleImport = useCallback((importedData) => {
    setData(prev => {
      const merged = buildDashboardData(importedData, prev);
      localStorage.setItem(LS_KEY, JSON.stringify(merged));
      (async () => {
        try {
          const upserts = Object.entries(merged).map(([date, payload]) => ({
            user_id:userId, date, payload, updated_at:new Date().toISOString()
          }));
          for (let i = 0; i < upserts.length; i += 50) {
            await supa.from('diabetes_data').upsert(upserts.slice(i,i+50), {onConflict:'user_id,date'});
          }
          localStorage.setItem('carenote_last_sync', new Date().toLocaleString('ko-KR'));
          showToast('데이터 동기화 완료');
        } catch(e) { console.error('Import save error:', e); showToast('저장 오류'); }
      })();
      return merged;
    });
  }, [userId]);

  const handleSetHeight = (v) => { setHeight(v); localStorage.setItem('carenote_height', v); };

  const navItems = [
    { id:'home', label:'홈', icon:(
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
    )},
    { id:'record', label:'기록', icon:(
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    )},
    { id:'settings', label:'설정', icon:(
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    )},
  ];

  return (
    <>
      {loading && (
        <div className="loading-overlay">
          <div className="loading-box">
            <div className="spinner"/>
            <div style={{fontSize:13,color:'var(--text2)'}}>데이터 불러오는 중...</div>
          </div>
        </div>
      )}
      {toast && <div className="toast">{toast}</div>}

      {tab==='home' && <HomeScreen data={data} medsConfig={medsConfig} onOpenImport={()=>setShowImport(true)} onOpenSync={()=>setShowSync(true)} onOpenDrug={()=>setShowDrug(true)}/>}
      {tab==='record' && <RecordScreen data={data} medsConfig={medsConfig} onSave={handleSaveEntry} showToast={showToast}/>}
      {tab==='settings' && <SettingsScreen data={data} medsConfig={medsConfig} onOpenMedSettings={()=>setShowMedSettings(true)} onOpenDrug={()=>setShowDrug(true)} showToast={showToast} userId={userId} height={height} onSetHeight={handleSetHeight} darkMode={darkMode} onToggleDark={()=>setDarkMode(p=>!p)}/>}

      <nav className="bottom-nav">
        {navItems.map(item=>(
          <button key={item.id} className={'nav-btn'+(tab===item.id?' active':'')} onClick={()=>setTab(item.id)}>
            {item.icon}
            <span>{item.label}</span>
          </button>
        ))}
      </nav>

      {showImport && <ImportModal onClose={()=>setShowImport(false)} onImport={handleImport}/>}
      {showSync && <SyncModal data={data} userId={userId} onClose={()=>setShowSync(false)}/>}
      {showMedSettings && <MedSettingsModal medsConfig={medsConfig} onChange={setMedsConfig} onClose={()=>setShowMedSettings(false)}/>}
      {showDrug && <DrugInfoModal onClose={()=>setShowDrug(false)}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
