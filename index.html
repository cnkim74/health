  const DRUG_API_KEY = '12c113eddc12643698f9d49c82bc7ac526c33cc339906c4964299ef4b258ff9d';
  const fetchDrugInfo = async (name) => {
    const trySearch = async (query) => {
      const url = `https://apis.data.go.kr/1471000/DrbEasyDrugInfoService/getDrbEasyDrugList`
        + `?serviceKey=${encodeURIComponent(DRUG_API_KEY)}`

    if (isInjectable) {

  /* ── 애플 건강 파싱 (2MB 청크 스트리밍 - 대용량 파일 지원) ── */
  const parseAppleHealthXML = async (getChunks, totalBytes, onProgress) => {
    const glucoseByDay = {};
    const weightByDay  = {};
    const bodyFatByDay = {};

    const TARGET_KEYS = {
      'HKQuantityTypeIdentifierBloodGlucose':     'glucose',
      'HKQuantityTypeIdentifierBodyMass':          'weight',
      'HKQuantityTypeIdentifierBodyFatPercentage': 'fat'
    };

    const processRecord = (rec) => {
      let type = null;
      for (const [k, t] of Object.entries(TARGET_KEYS)) {
        if (rec.includes(k)) { type = t; break; }
      }
      if (!type) return;
      const val  = parseFloat((rec.match(/\bvalue="([^"]+)"/) || [])[1]);
      const unit = (rec.match(/\bunit="([^"]+)"/) || [])[1] || '';
      const dm   = rec.match(/\bstartDate="(\d{4}-\d{2}-\d{2})\s+(\d{2}):(\d{2})/);
      if (!dm || isNaN(val)) return;
      const dayKey = dm[1];
      const hour   = parseInt(dm[2]) + parseInt(dm[3]) / 60;
      if (type === 'glucose') {
        const mgdl = unit === 'mmol/L' ? Math.round(val * 18.015) : Math.round(val);
        if (!glucoseByDay[dayKey]) glucoseByDay[dayKey] = [];
        glucoseByDay[dayKey].push({ hour, value: mgdl });
      } else if (type === 'weight') {
        const kg = unit === 'lb' ? Math.round(val * 0.453592 * 10) / 10 : Math.round(val * 10) / 10;
        weightByDay[dayKey] = kg;
      } else if (type === 'fat') {
        bodyFatByDay[dayKey] = val <= 1 ? Math.round(val * 100 * 10) / 10 : Math.round(val * 10) / 10;
      }
    };

    let tail = '';           // 이전 청크에서 잘린 불완전한 레코드
    let bytesProcessed = 0;
    let recCount = 0;

    for await (const chunk of getChunks()) {
      const text = tail + chunk;
      let pos = 0;
      let lastEnd = 0;

      while (true) {
        const recStart = text.indexOf('<Record', pos);
        if (recStart === -1) break;
        const recEnd = text.indexOf('/>', recStart);
        if (recEnd === -1) break; // 청크 경계에서 잘린 레코드 → tail로 보관

        const rec = text.substring(recStart, recEnd + 2);
        if (Object.keys(TARGET_KEYS).some(k => rec.includes(k))) processRecord(rec);
        lastEnd = recEnd + 2;
        pos = lastEnd;
        recCount++;
        // 매 50건마다 브라우저에 양보 (UI 반응성 유지)
        if (recCount % 50 === 0) await new Promise(r => setTimeout(r, 0));
      }

      // 마지막 완전한 레코드 이후 텍스트를 다음 청크로 넘김
      tail = text.substring(lastEnd);
      if (tail.length > 30000) tail = tail.slice(-30000); // 안전장치

      bytesProcessed += chunk.length;
      if (onProgress && totalBytes) {
        onProgress(Math.min(99, Math.round(bytesProcessed / totalBytes * 100)));
      }
    }

    if (onProgress) onProgress(100);
    return { glucoseByDay, weightByDay, bodyFatByDay };
  };

  const buildDashboardData = ({ glucoseByDay, weightByDay, bodyFatByDay = {} }) => {
    const result = {};
    Object.entries(glucoseByDay).forEach(([day, readings]) => {
      const bs = {};
      TIME_WINDOWS.forEach(w => {
        const inWin = readings.filter(r => r.hour >= w.startH && r.hour < w.endH).map(r => r.value);
        const med = median(inWin);
        if (med) bs[w.id] = String(med);
      });
      if (Object.keys(bs).length) { result[day] = result[day] || emptyDay(); result[day].bs = bs; }
    });
    Object.entries(weightByDay).forEach(([day, weight]) => {
      result[day] = result[day] || emptyDay();
      result[day].weight = String(weight);
    });
    Object.entries(bodyFatByDay).forEach(([day, bodyFat]) => {
      result[day] = result[day] || emptyDay();
      result[day].bodyFat = String(bodyFat);
    });
    return result;
  };

  /* ── LibreView CSV 파싱 ─────────────────────────────────── */
  const parseCSVRow = (line) => {
    const out = []; let inQ = false; let cur = '';
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    out.push(cur.trim());
    return out;
  };

  const parseLVTimestamp = (s) => {
    s = s.replace(/"/g, '').trim();
    // MM-DD-YYYY HH:MM AM/PM (영어/한국어 오전오후)
    let m = s.match(/(\d{1,2})[/-](\d{1,2})[/-](\d{4})\s+(\d{1,2}):(\d{2})\s*(AM|PM|오전|오후)/i);
    if (m) {
      const [,p1,p2,yyyy,hh,min,ap] = m;
      let h = parseInt(hh);
      if (/PM|오후/i.test(ap) && h!==12) h+=12;
      if (/AM|오전/i.test(ap) && h===12) h=0;
      // LibreView는 MM-DD-YYYY 형식
      return { dayKey:`${yyyy}-${String(p1).padStart(2,'0')}-${String(p2).padStart(2,'0')}`, hour:h+parseInt(min)/60 };
    }
    // YYYY-MM-DD HH:MM
    m = s.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{1,2}):(\d{2})/);
    if (m) {
      const [,yyyy,mm,dd,hh,min] = m;
      return { dayKey:`${yyyy}-${mm}-${dd}`, hour:parseInt(hh)+parseInt(min)/60 };
    }
    return null;
  };

  const parseLibreViewCSV = (csvText) => {
    const lines = csvText.split(/\r?\n/);
    let headerIdx = -1;
    for (let i = 0; i < Math.min(lines.length, 20); i++) {
      if (/timestamp|타임스탬프|时间戳|장치.?타임스탬프/i.test(lines[i])) { headerIdx = i; break; }
    }
    if (headerIdx === -1) return null;

    const headers = parseCSVRow(lines[headerIdx]);
    const tsIdx   = headers.findIndex(h => /timestamp|타임스탬프|장치.?타임스탬프/i.test(h));
    const typeIdx = headers.findIndex(h => /record.?type|레코드|기록.?유형/i.test(h));
    const histIdx = headers.findIndex(h => /historic.?glucose|히스토리.*포도당|과거.?혈당/i.test(h));
    const scanIdx = headers.findIndex(h => /scan.?glucose|스캔.*포도당|혈당.?스캔/i.test(h));

    if (tsIdx === -1) return null;

    const glucoseByDay = {};
    for (let i = headerIdx + 1; i < lines.length; i++) {
      const row = parseCSVRow(lines[i]);
      if (row.length <= tsIdx || !row[tsIdx]) continue;
      const recType = (row[typeIdx] || '').replace(/"/g,'').trim();
      if (recType !== '0' && recType !== '1') continue;

      const rawVal = recType === '0'
        ? parseFloat((row[histIdx]||'').replace(/"/g,''))
        : parseFloat((row[scanIdx]||'').replace(/"/g,''));
      if (isNaN(rawVal) || rawVal <= 0) continue;

      const parsed = parseLVTimestamp(row[tsIdx]);
      if (!parsed) continue;
      const { dayKey, hour } = parsed;
      if (!glucoseByDay[dayKey]) glucoseByDay[dayKey] = [];
      glucoseByDay[dayKey].push({ hour, value: Math.round(rawVal) });
    }
    return glucoseByDay;
  };

  /* ── 가져오기 모달 ─────────────────────────────────────── */
  const ImportModal = ({ onClose, onImport }) => {
    const dm = _dm;
    const [tab,     setTab]     = useState('libreview'); // 'apple' | 'libreview'
    const [status,  setStatus]  = useState('idle');
    const [preview, setPreview] = useState(null);
    const [errMsg,  setErrMsg]  = useState('');
    const [progress, setProgress] = useState('');
    const fileRef = useRef(null);

    const reset = () => { setStatus('idle'); setErrMsg(''); setPreview(null); };
    const onTabChange = (t) => { setTab(t); reset(); };

    const processFile = async (file) => {
      setStatus('loading'); setErrMsg('');
      try {
        /* ── LibreView CSV ── */
        if (file.name.endsWith('.csv')) {
          setProgress('CSV 파일 분석 중...');
          await new Promise(r => setTimeout(r, 30));
          const csvText = await file.text();
          const glucoseByDay = parseLibreViewCSV(csvText);
          if (!glucoseByDay) throw new Error('LibreView CSV 형식을 인식할 수 없어요.\nlibreview.com에서 내보낸 파일인지 확인해 주세요.');
          const totalDays = Object.keys(glucoseByDay).length;
          const totalReadings = Object.values(glucoseByDay).reduce((a,b)=>a+b.length,0);
          if (!totalDays) throw new Error('혈당 데이터를 찾을 수 없어요. 파일을 다시 확인해 주세요.');
          const mapped = buildDashboardData({ glucoseByDay, weightByDay:{} });
          setPreview({ mapped, gDays:totalDays, wDays:0, totalReadings, source:'libreview' });
          setStatus('preview');
          return;
        }

        /* ── 애플 건강 ZIP / XML (청크 스트리밍) ── */
        const CHUNK_SIZE = 2 * 1024 * 1024;
        let getChunks, totalBytes;

        if (file.name.endsWith('.zip')) {
          setProgress('ZIP 압축 해제 중... (잠시 기다려 주세요)');
          if (typeof JSZip === 'undefined') throw new Error('ZIP 라이브러리 로드 실패. 인터넷 연결을 확인하거나 직접 압축 해제 후 export.xml을 선택해 주세요.');
          const zip = await JSZip.loadAsync(file);
          const allFiles = Object.keys(zip.files);
          const xmlFile = allFiles.find(name =>
            /export\.xml$/i.test(name) && !/cda/i.test(name)
          ) || allFiles.find(name => /\.xml$/i.test(name) && !/cda/i.test(name));
          if (!xmlFile) {
            const found = allFiles.filter(n => !zip.files[n].dir).slice(0,10).join(', ');
            throw new Error(`ZIP 안에서 export.xml을 찾을 수 없어요.\n발견된 파일: ${found || '없음'}`);
          }
          setProgress('XML 추출 중...');
          const xmlBlob = await zip.files[xmlFile].async('blob');
          totalBytes = xmlBlob.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = xmlBlob.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else if (file.name.endsWith('.xml')) {
          totalBytes = file.size;
          getChunks = async function* () {
            const decoder = new TextDecoder('utf-8');
            let offset = 0;
            while (offset < totalBytes) {
              const slice = file.slice(offset, offset + CHUNK_SIZE);
              const buf = await slice.arrayBuffer();
              yield decoder.decode(new Uint8Array(buf), { stream: offset + CHUNK_SIZE < totalBytes });
              offset += CHUNK_SIZE;
              await new Promise(r => setTimeout(r, 0));
            }
          };
        } else {
          throw new Error('.csv / .zip / .xml 파일만 지원해요.');
        }

        setProgress('혈당·체중·체지방 데이터 추출 중... 0%');
        const parsed = await parseAppleHealthXML(getChunks, totalBytes, (pct) => {
          setProgress(`데이터 분석 중... ${pct}%`);
        });
        const mapped = buildDashboardData(parsed);

        const gDays  = Object.keys(parsed.glucoseByDay).length;
        const wDays  = Object.keys(parsed.weightByDay).length;
        const bfDays = Object.keys(parsed.bodyFatByDay).length;
        const totalReadings = Object.values(parsed.glucoseByDay).reduce((a,b) => a+b.length, 0);

        if (!gDays && !wDays && !bfDays) throw new Error('혈당, 체중, 체지방 데이터를 찾을 수 없어요.\n리브레2가 애플 건강과 연동되어 있는지 확인해 주세요.');

        setPreview({ mapped, gDays, wDays, bfDays, totalReadings });
        setStatus('preview');
      } catch (e) {
        setErrMsg(e.message || '파일 처리 중 오류가 발생했어요.');
        setStatus('error');
      }
    };

    const confirm = () => { onImport(preview.mapped); setStatus('done'); };

    const isLV    = tab === 'libreview';
    const accent  = isLV ? '#7c3aed' : '#2563eb';

    return (

        <div style={{ background:'var(--card-bg)', borderRadius:'18px', padding:'28px', maxWidth:'540px', width:'100%', maxHeight:'92vh', overflowY:'auto', boxShadow:'0 24px 80px rgba(0,0,0,0.25)' }}>

          {/* Header */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'18px' }}>

              <div style={{ fontSize:'14px', fontWeight:'800', color:'var(--text)' }}>혈당 데이터 가져오기</div>
              <div style={{ fontSize:'14px', color:'var(--text-sub)', marginTop:'2px' }}>리브레2 혈당 기록을 대시보드에 자동 반영</div>
            </div>
            <button onClick={onClose} style={{ background:'var(--divider)', border:'none', borderRadius:'8px', width:'32px', height:'32px', cursor:'pointer', fontSize:'14px', color:'var(--text-sub)' }}>✕</button>
          </div>

          {/* 탭 선택 */}
          <div style={{ display:'flex', gap:'8px', marginBottom:'20px', background:'var(--input-bg)', borderRadius:'10px', padding:'4px' }}>
            {[
              { key:'libreview', label:'📊 LibreView CSV', sub:'추천' },
              { key:'apple',     label:'🍎 애플 건강앱', sub:'연동 필요' }
            ].map(t => (
              <button key={t.key} onClick={() => onTabChange(t.key)} style={{
                flex:1, padding:'10px 8px', border:'none', borderRadius:'8px', cursor:'pointer',
                fontSize:'16px', fontWeight:'700', transition:'all 0.2s',
                background: tab===t.key ? '#fff' : 'transparent',
                color: tab===t.key ? accent : '#94a3b8',
                boxShadow: tab===t.key ? '0 1px 4px rgba(0,0,0,0.08)' : 'none'
              }}>
                {t.label}
                {t.sub && <span style={{ display:'block', fontSize:'14px', fontWeight:'500', marginTop:'1px', color: tab===t.key ? accent : '#cbd5e1' }}>{t.sub}</span>}
              </button>
            ))}
          </div>

          {/* ── LibreView 탭 ── */}
          {isLV && (status === 'idle' || status === 'error') && (
            <>
              <div style={{ background:dm?'#1a1030':'#faf5ff', border:dm?'1px solid #4c1d95':'1px solid #c4b5fd', borderRadius:'12px', padding:'14px 16px', marginBottom:'16px' }}>
                <div style={{ fontWeight:'700', color:'#7c3aed', fontSize:'16px', marginBottom:'8px' }}>📋 LibreView에서 내보내는 방법</div>
                <ol style={{ margin:0, paddingLeft:'18px', fontSize:'16px', color:dm?'#c4b5fd':'#4c1d95', lineHeight:'2.1' }}>
                  <li><strong>libreview.com</strong> 에 로그인 (LibreLink 계정 동일)</li>
                  <li>상단 메뉴 → <strong>보고서</strong></li>
                  <li>기간 선택 후 <strong>"데이터 내보내기"</strong> 클릭</li>
                  <li>CSV 파일 다운로드</li>
                  <li>아래에서 CSV 파일 선택</li>
                </ol>
              </div>
              <div
                onClick={() => fileRef.current?.click()}
                style={{ border:`2px dashed ${accentB}`, borderRadius:'12px', padding:'28px 20px', textAlign:'center', cursor:'pointer', background:dm?'#1a1030':'#fdfaff', transition:'all 0.2s' }}
                onMouseEnter={e => { e.currentTarget.style.background=accentL; e.currentTarget.style.borderColor=accent; }}
                onMouseLeave={e => { e.currentTarget.style.background='#fdfaff'; e.currentTarget.style.borderColor=accentB; }}
              >
                <div style={{ fontSize:'26px', marginBottom:'8px' }}>📄</div>
                <div style={{ fontWeight:'700', color:accent, fontSize:'16px', marginBottom:'4px' }}>CSV 파일 선택</div>
                <div style={{ fontSize:'14px', color:'var(--text-sub)' }}>libreview.com 에서 내보낸 .csv 파일</div>
              </div>
              <input ref={fileRef} type="file" accept=".csv,.zip,.xml" onChange={e => e.target.files[0] && processFile(e.target.files[0])} style={{ display:'none' }} />
              {status==='error' && <div style={{ background:dm?'#1f0a0a':'#fef2f2', border:'1px solid #fecaca', borderRadius:'10px', padding:'12px 14px', marginTop:'12px', fontSize:'16px', color:'#dc2626', whiteSpace:'pre-line' }}>⚠️ {errMsg}</div>}
            </>
          )}

          {/* ── 애플 건강 탭 ── */}
          {!isLV && (status === 'idle' || status === 'error') && (
            <>
              <div style={{ background:dm?'#1f1a00':'#fffbeb', border:dm?'1px solid #92400e':'1px solid #fcd34d', borderRadius:'10px', padding:'12px 14px', marginBottom:'14px', fontSize:'14px' }}>
                <div style={{ fontWeight:'700', color:dm?'#fcd34d':'#92400e', marginBottom:'5px' }}>⚠️ 리브레2 연동이 필요해요</div>
                <div style={{ color:dm?'#fde68a':'#78350f', lineHeight:'1.8' }}>
                  LibreLink → 메뉴(☰) → <strong>연결된 앱</strong> → <strong>Apple 건강</strong> 토글 ON<br/>
                  연동 후 건강 앱에 데이터가 쌓이면 아래 방법으로 가져올 수 있어요
                </div>
              </div>
              <div style={{ background:dm?'#0c1e2e':'#f0f9ff', border:dm?'1px solid #0369a1':'1px solid #bae6fd', borderRadius:'12px', padding:'14px 16px', marginBottom:'16px' }}>
                <div style={{ fontWeight:'700', color:dm?'#7ec8f0':'#0369a1', fontSize:'16px', marginBottom:'8px' }}>📋 애플 건강 내보내기 방법</div>
                <ol style={{ margin:0, paddingLeft:'18px', fontSize:'16px', color:dm?'#93c5fd':'#0c4a6e', lineHeight:'2.1' }}>
                  <li>iPhone <strong>건강</strong> 앱 열기</li>
                  <li>우측 상단 <strong>프로필 사진</strong> 탭</li>
                  <li>아래로 스크롤 → <strong>"건강 데이터 내보내기"</strong></li>
                  <li>AirDrop 으로 Mac에 전송</li>
                  <li>아래에서 zip 파일 선택</li>
                </ol>
              </div>
              <div
                onClick={() => fileRef.current?.click()}
                style={{ border:'2px dashed #93c5fd', borderRadius:'12px', padding:'28px 20px', textAlign:'center', cursor:'pointer', background:'var(--input-bg)', transition:'all 0.2s' }}
                onMouseEnter={e => { e.currentTarget.style.background='#eff6ff'; e.currentTarget.style.borderColor='#2563eb'; }}
                onMouseLeave={e => { e.currentTarget.style.background='#f8fafc'; e.currentTarget.style.borderColor='#93c5fd'; }}
              >
                <div style={{ fontSize:'26px', marginBottom:'8px' }}>📂</div>

              </div>
              <input ref={fileRef} type="file" accept=".zip,.xml,.csv" onChange={e => e.target.files[0] && processFile(e.target.files[0])} style={{ display:'none' }} />
              {status==='error' && <div style={{ background:dm?'#1f0a0a':'#fef2f2', border:'1px solid #fecaca', borderRadius:'10px', padding:'12px 14px', marginTop:'12px', fontSize:'16px', color:'#dc2626', whiteSpace:'pre-line' }}>⚠️ {errMsg}</div>}
            </>
          )}

          {/* 로딩 */}
          {status === 'loading' && (
            <div style={{ textAlign:'center', padding:'36px 20px' }}>
              <div style={{ fontSize:'32px', marginBottom:'14px' }}>⏳</div>
              <div style={{ fontWeight:'700', color:'var(--text)', marginBottom:'6px' }}>분석 중...</div>
              <div style={{ fontSize:'16px', color:'var(--text-sub)' }}>{progress}</div>
              <div style={{ fontSize:'14px', color:'var(--text-sub)', marginTop:'8px' }}>잠시만 기다려 주세요</div>
            </div>
          )}

          {/* 미리보기 */}
          {status === 'preview' && preview && (
            <>
              <div style={{ background:dm?'#0a1f12':'#f0fdf4', border:'1px solid #86efac', borderRadius:'12px', padding:'16px 18px', marginBottom:'14px' }}>
                <div style={{ fontWeight:'700', color:'#16a34a', marginBottom:'12px', fontSize:'14px' }}>
                  ✅ {preview.source==='libreview' ? 'LibreView' : '애플 건강'} 데이터 발견
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:'8px', textAlign:'center' }}>
                  {[
                    { label:'혈당 측정일', value:`${preview.gDays}일`, icon:'🩸' },
                    { label:'총 측정 횟수', value:`${preview.totalReadings.toLocaleString()}회`, icon:'📊' },
                    { label:'체중 기록일', value:`${preview.wDays||0}일`, icon:'⚖️' },
                    { label:'체지방 기록일', value:`${preview.bfDays||0}일`, icon:'💪' }
                  ].map(item => (
                    <div key={item.label} style={{ background:dm?'#161b22':'white', borderRadius:'8px', padding:'10px 6px' }}>
                      <div style={{ fontSize:'14px' }}>{item.icon}</div>
                      <div style={{ fontSize:'14px', fontWeight:'800', color:'var(--text)', marginTop:'4px' }}>{item.value}</div>
                      <div style={{ fontSize:'16px', color:'var(--text-sub)' }}>{item.label}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ background:dm?'#1f1a00':'#fffbeb', border:dm?'1px solid #92400e':'1px solid #fcd34d', borderRadius:'10px', padding:'12px 14px', marginBottom:'16px', fontSize:'14px', color:dm?'#fde68a':'#78350f' }}>
                <strong>📌 가져오기 규칙</strong><br/>
                • 직접 입력한 데이터는 유지 (덮어쓰지 않아요)<br/>

              </div>

              <div style={{ fontSize:'16px', color:'var(--text-sub)', marginBottom:'24px', lineHeight:'1.8' }}>
                혈당 데이터가 대시보드에 반영됐어요.<br/>날짜를 이동해서 확인해 보세요.
              </div>

            </div>
          )}
        </div>
      </div>
    );
  };

  /* ── 동기화 코드 모달 ──────────────────────────────────── */
  const SyncModal = ({ userId, onClose, onChangeId }) => {
    const dm = _dm;
    const [input, setInput] = useState('');
    const [copied, setCopied] = useState(false);
    const copy = () => {
      navigator.clipboard.writeText(userId).then(() => { setCopied(true); setTimeout(()=>setCopied(false),2000); });
    };
    const apply = () => {
      const trimmed = input.trim();
      if (!trimmed || trimmed === userId) return;
      if (window.confirm('동기화 코드를 변경하면 이 기기의 기존 데이터와 연결이 끊겨요. 계속할까요?')) {
        localStorage.setItem('dm_user_id', trimmed);
        onChangeId(trimmed);
        onClose();
      }
    };
    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.55)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:2000, padding:'20px' }}
           onClick={e => e.target===e.currentTarget && onClose()}>
        <div style={{ background:'var(--card-bg)', borderRadius:'18px', padding:'28px', maxWidth:'460px', width:'100%', boxShadow:'0 24px 80px rgba(0,0,0,0.2)' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px' }}>
            <div style={{ fontSize:'14px', fontWeight:'800', color:'var(--text)' }}>🔗 기기 동기화</div>
            <button onClick={onClose} style={{ background:'var(--divider)', border:'none', borderRadius:'8px', width:'32px', height:'32px', cursor:'pointer', fontSize:'14px' }}>✕</button>
          </div>

          <div style={{ background:dm?'#0c1e2e':'#f0f9ff', border:dm?'1px solid #0369a1':'1px solid #bae6fd', borderRadius:'12px', padding:'16px', marginBottom:'20px' }}>
            <div style={{ fontSize:'14px', color:dm?'#7ec8f0':'#0369a1', fontWeight:'700', marginBottom:'8px' }}>📱 내 동기화 코드</div>
            <div style={{ fontFamily:'monospace', fontSize:'16px', color:'var(--text)', wordBreak:'break-all', background:'var(--card-bg)', padding:'10px 12px', borderRadius:'8px', border:`1px solid ${dm?'#30363d':'#e2e8f0'}`, marginBottom:'10px' }}>
              {userId}
            </div>
            <button onClick={copy} style={{ width:'100%', padding:'10px', background: copied?'#16a34a':'#2563eb', color:'#fff', border:'none', borderRadius:'8px', cursor:'pointer', fontWeight:'700', fontSize:'16px', transition:'background 0.2s' }}>
              {copied ? '✓ 복사됨!' : '코드 복사'}
            </button>
          </div>

          <div style={{ fontSize:'16px', color:'var(--text-sub)', lineHeight:'1.8', marginBottom:'20px' }}>
            <strong>다른 기기(iPhone 등)에서 같은 데이터 보려면:</strong><br/>
            1. 다른 기기에서 대시보드 열기<br/>
            2. 🔗 동기화 버튼 클릭<br/>
            3. 위 코드를 아래에 입력 → 적용
          </div>

          <div style={{ borderTop:'1px solid #f1f5f9', paddingTop:'16px' }}>
            <div style={{ fontSize:'14px', color:'var(--text-sub)', marginBottom:'6px' }}>다른 기기의 코드 입력 (동기화 코드 변경)</div>
            <div style={{ display:'flex', gap:'8px' }}>
              <input value={input} onChange={e=>setInput(e.target.value)} placeholder="코드를 붙여넣어 주세요"
                style={{ flex:1, border:`1px solid ${dm?'#30363d':'#e2e8f0'}`, borderRadius:'8px', padding:'10px 12px', fontSize:'16px', outline:'none', fontFamily:'monospace' }} />
              <button onClick={apply} style={{ padding:'10px 16px', background:'#7c3aed', color:'#fff', border:'none', borderRadius:'8px', cursor:'pointer', fontWeight:'700', fontSize:'16px' }}>적용</button>
            </div>
          </div>
        </div>
      </div>
    );
  };

  /* ── 복약 설정 모달 ──────────────────────────────────── */
  const MedSettingsModal = ({ meds, onSave, onClose }) => {
    const dm = _dm;
    const [cfg, setCfg] = useState(JSON.parse(JSON.stringify(meds)));
    const [editingSlot, setEditingSlot] = useState(null);
    const [editingMed,  setEditingMed]  = useState(null);
    const nameInputRef = useRef(null);

    const SLOT_COLORS = [
      { color:'#2563eb', bg:'#eff6ff', border:'#93c5fd' },
      { color:'#059669', bg:'#f0fdf4', border:'#86efac' },
      { color:'#7c3aed', bg:'#faf5ff', border:'#c4b5fd' },
      { color:'#dc2626', bg:'#fef2f2', border:'#fca5a5' },
      { color:'#d97706', bg:'#fffbeb', border:'#fcd34d' },
    ];

    // 편집 시작 시 이름 input 자동 포커스 + 전체 선택
    useEffect(() => {
      if (editingMed && nameInputRef.current) {
        setTimeout(() => {
          nameInputRef.current?.focus();
          nameInputRef.current?.select();
        }, 50);
      }
    }, [editingMed]);

    const updSlotName = (key, val) => setCfg(c => c.map(s => s.key===key ? {...s, slot:val} : s));
    const updSlotIcon = (key, val) => setCfg(c => c.map(s => s.key===key ? {...s, icon:val} : s));
    const delSlot = (key) => { if(window.confirm('이 시간대를 삭제할까요?')) setCfg(c => c.filter(s => s.key!==key)); };
    const addSlot = () => {
      const key = 'slot_' + Date.now();
      const col = SLOT_COLORS[cfg.length % SLOT_COLORS.length];
      setCfg(c => [...c, { slot:'새 시간대', key, icon:'💊', items:[], ...col }]);
      setEditingSlot(key);
    };
    const updMedField = (slotKey, medId, field, val) =>
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items: s.items.map(m => m.id===medId ? {...m, [field]:val} : m)} : s));
    const delMed = (slotKey, medId) =>
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items: s.items.filter(m => m.id!==medId)} : s));
    const addMed = (slotKey) => {
      const id = genId();
      setCfg(c => c.map(s => s.key===slotKey ? {...s, items:[...s.items, {id, name:'', dose:'', startDate:'', endDate:''}]} : s));
      setEditingMed({slotKey, medId:id});
    };
    const reset = () => { if(window.confirm('기본값으로 초기화할까요?')) setCfg(JSON.parse(JSON.stringify(DEFAULT_MEDS))); };

    const inpSt = { border:`1px solid ${dm?'#30363d':'#e2e8f0'}`, borderRadius:'6px', padding:'6px 10px', fontSize:'16px', width:'100%', outline:'none' };

    return (
      <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.55)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2000,padding:'20px'}}
           onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div style={{background:'var(--card-bg)',borderRadius:'18px',padding:'24px',maxWidth:'520px',width:'100%',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 24px 80px rgba(0,0,0,0.25)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'}}>
            <div style={{fontSize:'14px',fontWeight:'800',color:'var(--text)'}}>⚙️ 복약 설정</div>
            <button onClick={onClose} style={{background:'var(--divider)',border:'none',borderRadius:'8px',width:'32px',height:'32px',cursor:'pointer',fontSize:'14px'}}>✕</button>
          </div>

          {cfg.map(slot => (
            <div key={slot.key} style={{background:slot.bg,border:`1px solid ${slot.border}`,borderRadius:'12px',padding:'12px 14px',marginBottom:'10px'}}>
              {/* 슬롯 헤더 */}
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}}>
                {editingSlot===slot.key ? (
                  <>
                    <input value={slot.icon} onChange={e=>updSlotIcon(slot.key,e.target.value)}
                      style={{width:'44px',border:`1px solid ${dm?'#30363d':'#e2e8f0'}`,borderRadius:'6px',padding:'4px',fontSize:'14px',textAlign:'center'}}/>
                    <input value={slot.slot} onChange={e=>updSlotName(slot.key,e.target.value)} autoFocus
                      style={{flex:1,border:`1px solid ${dm?'#30363d':'#e2e8f0'}`,borderRadius:'6px',padding:'6px 10px',fontSize:'16px',fontWeight:'700'}}/>
                    <button onClick={()=>setEditingSlot(null)} style={{background:slot.color,color:'#fff',border:'none',borderRadius:'6px',padding:'5px 10px',cursor:'pointer',fontSize:'14px'}}>완료</button>
                  </>
                ) : (
                  <>
                    <span style={{fontSize:'14px'}}>{slot.icon}</span>
                    <span style={{fontSize:'16px',fontWeight:'700',color:slot.color,flex:1}}>{slot.slot}</span>
                    <button onClick={()=>setEditingSlot(slot.key)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'14px',color:'var(--text-sub)'}}>✏️</button>
                    <button onClick={()=>delSlot(slot.key)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'14px',color:'#fca5a5'}}>🗑️</button>
                  </>
                )}
              </div>

              {/* 약 목록 */}
              {slot.items.map(med => (
                <div key={med.id} style={{background:'var(--card-bg)',borderRadius:'8px',padding:'8px 10px',marginBottom:'6px',border:`1px solid ${dm?'#30363d':'#e2e8f0'}`}}>
                  {editingMed?.slotKey===slot.key && editingMed?.medId===med.id ? (
                    <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                      <input ref={nameInputRef} value={med.name}
                        onChange={e=>updMedField(slot.key,med.id,'name',e.target.value)}
                        onFocus={e=>e.target.select()}
                        placeholder="약 이름" style={inpSt}/>
                      <input value={med.dose} onChange={e=>updMedField(slot.key,med.id,'dose',e.target.value)}
                        placeholder="용량 (예: 10mg 1정)" style={inpSt}/>
                      {/* 투약 기간 */}
                      <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:'16px',color:'var(--text-sub)',marginBottom:'3px'}}>투약 시작일</div>
                          <input type="date" value={med.startDate||''} onChange={e=>updMedField(slot.key,med.id,'startDate',e.target.value)} style={inpSt}/>
                        </div>
                        <div style={{color:dm?'#475569':'#cbd5e1',marginTop:'16px'}}>~</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:'16px',color:'var(--text-sub)',marginBottom:'3px'}}>투약 종료일</div>
                          <input type="date" value={med.endDate||''} onChange={e=>updMedField(slot.key,med.id,'endDate',e.target.value)} style={inpSt}/>
                        </div>
                      </div>
                      <div style={{fontSize:'16px',color:'var(--text-sub)'}}>💡 날짜 미입력 시 항상 표시</div>
                      <button onClick={()=>setEditingMed(null)} style={{background:slot.color,color:'#fff',border:'none',borderRadius:'6px',padding:'7px',cursor:'pointer',fontSize:'14px',fontWeight:'700'}}>완료</button>
                    </div>
                  ) : (
                    <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:'16px',fontWeight:'600',color:'var(--text)'}}>{med.name||'(이름 없음)'}</div>
                        <div style={{fontSize:'16px',color:'var(--text-sub)'}}>{med.dose}</div>
                        {(med.startDate||med.endDate) && (
                          <div style={{fontSize:'14px',color:'#2563eb',marginTop:'2px'}}>
                            📅 {med.startDate||'?'} ~ {med.endDate||'계속'}
                          </div>
                        )}
                      </div>
                      <button onClick={()=>setEditingMed({slotKey:slot.key,medId:med.id})} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'16px',color:'var(--text-sub)'}}>✏️</button>
                      <button onClick={()=>delMed(slot.key,med.id)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:'16px',color:'#fca5a5'}}>🗑️</button>
                    </div>
                  )}
                </div>
              ))}
              <button onClick={()=>addMed(slot.key)} style={{width:'100%',padding:'7px',background:'transparent',border:`1px dashed ${slot.border}`,color:slot.color,borderRadius:'8px',cursor:'pointer',fontSize:'14px',fontWeight:'700',marginTop:'4px'}}>
                + 약 추가
              </button>
            </div>
          ))}

          <button onClick={addSlot} style={{width:'100%',padding:'10px',background:'var(--input-bg)',border:'1px dashed #cbd5e1',color:'var(--text-sub)',borderRadius:'10px',cursor:'pointer',fontSize:'16px',fontWeight:'700',marginBottom:'12px'}}>
            + 시간대 추가
          </button>

          <div style={{display:'flex',gap:'8px'}}>
            <button onClick={reset} style={{flex:1,padding:'11px',background:'var(--card-bg)',border:`1px solid ${dm?'#30363d':'#e2e8f0'}`,color:'var(--text-sub)',borderRadius:'10px',cursor:'pointer',fontSize:'16px'}}>기본값으로 초기화</button>
            <button onClick={()=>onSave(cfg)} style={{flex:2,padding:'11px',background:'#2563eb',color:'#fff',border:'none',borderRadius:'10px',cursor:'pointer',fontSize:'14px',fontWeight:'700'}}>저장</button>
          </div>
        </div>
      </div>
    );
  };

  /* ── 배너 슬롯 위치 정의 ─────────────────────────────────── */
  const BANNER_SLOTS = [
    { id:'top',        label:'헤더 바로 아래' },
    { id:'after_meds', label:'복약 체크리스트 아래' },
    { id:'after_bs',   label:'혈당 입력 아래' },
    { id:'sidebar_top',label:'사이드바 상단' },
    { id:'bottom',     label:'페이지 맨 아래' },
  ];

  const loadBanners = () => {
    try { return JSON.parse(localStorage.getItem('cn_banners') || '{}'); } catch { return {}; }
  };
  const saveBanners = (b) => localStorage.setItem('cn_banners', JSON.stringify(b));

  /* ── 배너 렌더 컴포넌트 ──────────────────────────────── */
  const BannerSlot = ({ slotId }) => {
    const banners = loadBanners();
    const b = banners[slotId];
    if (!b || !b.enabled || !b.url) return null;

    const getYoutubeId = (url) => {
      const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    };
    const ytId = getYoutubeId(b.url);

    return (
      <div style={{ margin:'10px 0', borderRadius:'12px', overflow:'hidden', boxShadow:'0 2px 8px rgba(0,0,0,0.08)' }}>
        {ytId ? (
          <iframe
            src={`https://www.youtube.com/embed/${ytId}?rel=0`}
            style={{ width:'100%', height: b.height || '200px', border:'none', display:'block' }}
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowFullScreen
          />
        ) : b.type === 'image' ? (
          <a href={b.link||'#'} target="_blank" rel="noreferrer">
            <img src={b.url} alt={b.label||'배너'} style={{ width:'100%', display:'block', maxHeight:'150px', objectFit:'cover' }} />
          </a>
        ) : (
          <div style={{ background: b.bgColor||'#eff6ff', padding:'12px 16px', fontSize:'13px',
                        color: b.textColor||'#1e40af', fontWeight:'600', textAlign:'center',
                        border:`1px solid ${b.borderColor||'#bfdbfe'}`, borderRadius:'12px' }}>
            {b.url}
          </div>
        )}
        {b.caption && <div style={{ fontSize:'11px', color:'#94a3b8', textAlign:'right', padding:'2px 6px' }}>{b.caption}</div>}
      </div>
    );
  };

  /* ── 관리자 배너 설정 모달 ───────────────────────────── */
  const ADMIN_EMAIL = 'cnkim74@gmail.com';
  const AdminModal = ({ onClose, userEmail }) => {
    // 관리자 권한 이중 검증 — 이메일이 일치하지 않으면 모달 자체를 렌더링하지 않음
    if (userEmail !== ADMIN_EMAIL) return null;
    const dm = _dm;
    const [banners, setBanners] = useState(loadBanners);
    const [editing, setEditing] = useState(null); // slotId
    const [draft, setDraft] = useState({});

    const startEdit = (slotId) => {
      setEditing(slotId);
      setDraft(banners[slotId] || { enabled:false, type:'youtube', url:'', height:'200px', caption:'', link:'', label:'' });
    };
    const saveDraft = () => {
      const next = { ...banners, [editing]: draft };
      setBanners(next);
      saveBanners(next);
      setEditing(null);
    };
    const toggleEnabled = (slotId) => {
      const cur = banners[slotId] || {};
      const next = { ...banners, [slotId]: { ...cur, enabled: !cur.enabled } };
      setBanners(next);
      saveBanners(next);
    };

    const cardBg = dm ? '#161b22' : '#fff';
    const inputSt = { width:'100%', padding:'8px 10px', border:`1px solid ${dm?'#30363d':'#e2e8f0'}`,
                      borderRadius:'8px', fontSize:'13px', background:dm?'#0d1117':'#fff',
                      color:dm?'#e6edf3':'#1e293b', outline:'none', boxSizing:'border-box' };

    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', display:'flex', alignItems:'center',
                    justifyContent:'center', zIndex:3000, padding:'20px' }}
           onClick={e => e.target===e.currentTarget && onClose()}>
        <div style={{ background:cardBg, borderRadius:'20px', padding:'26px', maxWidth:'520px', width:'100%',
                      maxHeight:'85vh', overflowY:'auto', boxShadow:'0 24px 80px rgba(0,0,0,0.35)' }}>

          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px' }}>
            <div style={{ fontSize:'17px', fontWeight:'800', color:'var(--text)' }}>🛠️ 관리자 배너 설정</div>
            <button onClick={onClose} style={{ background:'var(--input-bg)', border:'none', borderRadius:'8px',
              width:'32px', height:'32px', cursor:'pointer', fontSize:'16px', color:'var(--text-sub)' }}>✕</button>
          </div>

          {editing ? (
            <div>
              <div style={{ fontSize:'14px', fontWeight:'700', color:'var(--text)', marginBottom:'14px' }}>
                📍 {BANNER_SLOTS.find(s=>s.id===editing)?.label} 설정
              </div>
              {/* 배너 타입 */}
              <div style={{ marginBottom:'12px' }}>
                <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'5px' }}>배너 종류</div>
                <div style={{ display:'flex', gap:'8px' }}>
                  {[['youtube','🎬 유튜브'],['image','🖼️ 이미지'],['text','📝 텍스트']].map(([v,l])=>(
                    <button key={v} onClick={()=>setDraft(d=>({...d,type:v}))}
                      style={{ flex:1, padding:'7px', border:`1.5px solid ${draft.type===v?'#2563eb':'#e2e8f0'}`,
                               borderRadius:'8px', background: draft.type===v?'#eff6ff':'transparent',
                               color: draft.type===v?'#1d4ed8':'var(--text-sub)',
                               cursor:'pointer', fontSize:'12px', fontWeight:'600' }}>{l}</button>
                  ))}
                </div>
              </div>
              {/* URL */}
              <div style={{ marginBottom:'10px' }}>
                <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'5px' }}>
                  {draft.type==='youtube' ? 'YouTube URL' : draft.type==='image' ? '이미지 URL' : '표시할 텍스트'}
                </div>
                <input style={inputSt} value={draft.url||''} onChange={e=>setDraft(d=>({...d,url:e.target.value}))}
                  placeholder={draft.type==='youtube'?'https://youtube.com/watch?v=...' : draft.type==='image'?'https://...' : '공지 내용 입력'} />
              </div>
              {draft.type==='youtube' && (
                <div style={{ marginBottom:'10px' }}>
                  <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'5px' }}>높이 (기본 200px)</div>
                  <input style={{...inputSt, width:'120px'}} value={draft.height||'200px'}
                    onChange={e=>setDraft(d=>({...d,height:e.target.value}))} placeholder="200px" />
                </div>
              )}
              {draft.type==='image' && (
                <div style={{ marginBottom:'10px' }}>
                  <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'5px' }}>클릭 시 이동 URL</div>
                  <input style={inputSt} value={draft.link||''} onChange={e=>setDraft(d=>({...d,link:e.target.value}))}
                    placeholder="https://..." />
                </div>
              )}
              <div style={{ marginBottom:'14px' }}>
                <div style={{ fontSize:'12px', color:'var(--text-sub)', marginBottom:'5px' }}>캡션 (선택)</div>
                <input style={inputSt} value={draft.caption||''} onChange={e=>setDraft(d=>({...d,caption:e.target.value}))}
                  placeholder="광고 / 협찬 등" />
              </div>
              {/* 활성화 */}
              <label style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'18px', cursor:'pointer' }}>
                <input type="checkbox" checked={!!draft.enabled} onChange={e=>setDraft(d=>({...d,enabled:e.target.checked}))}
                  style={{ width:'16px', height:'16px', accentColor:'#2563eb' }} />
                <span style={{ fontSize:'13px', color:'var(--text)', fontWeight:'600' }}>이 슬롯 활성화</span>
              </label>
              <div style={{ display:'flex', gap:'8px' }}>
                <button onClick={()=>setEditing(null)} style={{ flex:1, padding:'10px', background:'var(--input-bg)',
                  border:`1px solid ${dm?'#30363d':'#e2e8f0'}`, borderRadius:'10px', cursor:'pointer',
                  fontSize:'13px', color:'var(--text-sub)', fontWeight:'600' }}>취소</button>
                <button onClick={saveDraft} style={{ flex:2, padding:'10px', background:'#2563eb',
                  border:'none', borderRadius:'10px', cursor:'pointer', fontSize:'13px', color:'#fff', fontWeight:'700' }}>저장</button>
              </div>
            </div>
          ) : (

    const applyAnalysis = (mealId, text) => {
